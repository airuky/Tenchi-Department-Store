<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>文明の年代記 · Chronicle</title>
<style>
  :root{
    --ink:#4a3b28;
    --ink-soft:#7a6a52;
    --paper:#ece1c4;
    --paper-dark:#e2d4b2;
    --acc:#8a4a32;
    --panel-edge:rgba(74,59,40,.3);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;overflow:hidden;background:#d9cba6;
    font-family:"Hiragino Mincho ProN","Yu Mincho",serif;
    color:var(--ink);-webkit-font-smoothing:antialiased;}
  #world{position:fixed;inset:0;right:374px;display:block;cursor:crosshair;}

  .topbar{position:fixed;top:0;left:0;right:374px;display:flex;align-items:center;gap:12px;
    padding:13px 16px;pointer-events:none;z-index:5;}
  .brand{pointer-events:none;font-weight:700;letter-spacing:.1em;font-size:15px;}
  .brand small{display:block;font-weight:400;font-size:10px;color:var(--ink-soft);letter-spacing:.24em;margin-top:2px}
  .spacer{flex:1}
  .btn{pointer-events:auto;cursor:pointer;border:1.5px solid var(--panel-edge);
    background:rgba(236,225,196,.9);color:var(--ink);border-radius:8px;padding:7px 13px;font-size:12.5px;
    transition:.18s;white-space:nowrap;font-family:inherit;font-weight:600;letter-spacing:.06em;
    box-shadow:0 2px 6px rgba(74,59,40,.18)}
  .btn:hover{border-color:var(--acc);transform:translateY(-1px)}
  .btn:active{transform:translateY(0)}
  .btn.active{background:var(--acc);color:#f4ead2;border-color:var(--acc)}

  .dock{position:fixed;left:12px;bottom:12px;display:flex;flex-wrap:wrap;gap:7px;z-index:5;max-width:50vw}
  .dock.folded .btn:not(.dock-toggle){display:none}
  .dock .dock-toggle{font-size:14px;padding:7px 10px}

  .hint{position:fixed;left:calc((100vw - 374px)/2);top:46%;transform:translate(-50%,-50%);
    text-align:center;color:var(--ink-soft);font-size:14px;line-height:2.1;pointer-events:none;z-index:2;
    transition:opacity .8s}
  .hint .big{font-size:18px;color:var(--ink);letter-spacing:.1em;font-weight:700}

  /* ---- the chronicle book ---- */
  .book{position:fixed;top:0;right:0;bottom:0;width:374px;z-index:6;display:flex;flex-direction:column;
    background:linear-gradient(105deg,#f2e8cd 0%,#ece1c4 55%,#e5d8b6 100%);
    border-left:double 5px rgba(74,59,40,.45);
    box-shadow:-10px 0 30px rgba(74,59,40,.25)}
  .book header{padding:16px 18px 10px;border-bottom:1.5px solid rgba(74,59,40,.35)}
  .book h1{margin:0;font-size:19px;letter-spacing:.5em;text-align:center;font-weight:700}
  .book .era{margin-top:7px;text-align:center;font-size:12.5px;color:var(--ink-soft);letter-spacing:.18em}
  .book .era b{color:var(--acc);font-size:15px;letter-spacing:.08em}
  .entries{flex:1;overflow-y:auto;padding:12px 16px 18px;scrollbar-width:thin;scroll-behavior:smooth}
  .entries::-webkit-scrollbar{width:7px}
  .entries::-webkit-scrollbar-thumb{background:rgba(74,59,40,.3);border-radius:4px}
  .ent{margin:0 0 11px;font-size:12.8px;line-height:1.95;letter-spacing:.02em;
    animation:entIn .6s ease-out}
  @keyframes entIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
  .ent .y{font-weight:700;color:var(--acc);letter-spacing:.05em;margin-right:.4em;white-space:nowrap}
  .ent.t-war .y{color:#7e2f24}
  .ent.t-birth .y{color:#3f6346}
  .ent.t-doom{background:rgba(74,59,40,.07);padding:6px 9px;border-left:3px solid #7e2f24;border-radius:3px}
  .ent.t-era{text-align:center;color:var(--ink-soft);letter-spacing:.2em;font-size:12px;
    border-top:1px solid rgba(74,59,40,.25);border-bottom:1px solid rgba(74,59,40,.25);
    padding:7px 0;margin:14px 0}
  .book footer{padding:9px 14px;border-top:1.5px solid rgba(74,59,40,.35);display:flex;gap:8px;align-items:center}
  .book footer .btn{flex:none;padding:6px 11px;font-size:12px}
  .book footer .stat{flex:1;text-align:right;font-size:10.5px;color:var(--ink-soft);letter-spacing:.08em}

  .toast{position:fixed;left:calc((100vw - 374px)/2);bottom:22px;transform:translateX(-50%) translateY(20px);
    background:rgba(58,46,30,.92);color:#f2e8cd;border-radius:8px;
    padding:8px 16px;font-size:12.5px;opacity:0;transition:.3s;z-index:7;pointer-events:none;letter-spacing:.05em}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<svg id="world" xmlns="http://www.w3.org/2000/svg"></svg>

<div class="topbar">
  <div class="brand">文明の年代記<small>CHRONICLE</small></div>
  <div class="spacer"></div>
  <button class="btn" id="seed">🌱 文明の種を蒔く</button>
  <button class="btn" id="pause">⏸ 時を止める</button>
  <button class="btn" id="speed">▶ 等速</button>
  <button class="btn" id="reset">⟲ 白紙にもどす</button>
</div>

<div class="hint" id="hint">
  <div class="big">大陸をクリックして、文明の種を蒔いてください</div>
  あとは眺めるだけです。興り、栄え、争い、滅びます<br>
  <span style="font-size:12px">すべては右の年代記に記録されます</span>
</div>

<aside class="book">
  <header>
    <h1>年代記</h1>
    <div class="era" id="eraLine"><b id="eraName">暁の紀</b>　<span id="yearNum">元年</span></div>
  </header>
  <div class="entries" id="entries"></div>
  <footer>
    <span class="stat" id="statLine">文明 0 ／ 遺跡 0</span>
  </footer>
</aside>

<div class="toast" id="toast"></div>
<div class="dock" id="dock"></div>

<script>
(() => {
  "use strict";
  const SVGNS = "http://www.w3.org/2000/svg";
  const svg = document.getElementById("world");

  // ---- layers ----
  const defs       = mk("defs");
  const gLand      = mk("g");   // continent, terrain ink
  const gTerritory = mk("g");   // civ territory washes (under ink details)
  const gDetail    = mk("g");   // rivers, mountains, forests
  const gRuins     = mk("g");   // ruins of dead civs
  const gCities    = mk("g");   // city marks + labels
  const gFx        = mk("g");   // battle marks, plugin actors
  svg.append(defs, gLand, gTerritory, gDetail, gRuins, gCities, gFx);

  defs.innerHTML = `
    <filter id="rough" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency=".012" numOctaves="2" result="n" seed="7"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="6"/>
    </filter>`;

  // ---- state ----
  let W = 0, H = 0;
  let continent = null;        // {pts, cx, cy, rx, ry}
  const civs = [];             // see makeCiv
  const ruins = [];            // {x, y, name, civName, year}
  const wars = [];             // {a, b, since, heat}
  let year = 0, eraIdx = 0, eraStartYear = 0, eraLen = 80 + (Math.random()*40|0);
  let running = true, speed = 1;
  let nextCivId = 1;
  let lonelyYears = 0;

  // ---- event bus ----
  const listeners = new Map();
  function on(name, fn){
    if(!listeners.has(name)) listeners.set(name, []);
    listeners.get(name).push(fn);
  }
  function emit(name, arg){
    for(const f of listeners.get(name) || []){
      try{ f(arg); }catch(err){ console.error(`[plugin handler for "${name}"]`, err); }
    }
  }

  // ====================================================================
  //  lore
  // ====================================================================
  const STEM = ["カラ","ヴェル","ナギ","オル","シャム","トト","ミル","ハダル","ユグ","ケシ",
    "アルマ","ニヌ","サフラ","ロデ","ウル","エンキ","タヴ","イシュ","モヘ","ザル","フニ","ペル"];
  const CIV_SUF = ["王国","朝","同盟","公国","部族連合","商国","聖王国","遊牧連合"];
  const CITY_SUF = ["城","市","港","丘","泉","砦","坊","津"];
  const DEITY_ADJ = ["ねむりの","塩の","逆風の","薄明の","算術の","留守の","沈黙の","二度寝の",
    "境界の","埃の","収穫の","忘れ物の","遠雷の","湯気の"];
  const TEMPER = ["好戦的","商人気質","詩人肌","慎重","大食らい","心配性","凝り性","朝型","祭り好き","記録魔"];
  const ERA_NAMES = ["暁の紀","風の紀","長雨の紀","二つ月の紀","灰の紀","蜜の紀","凪の紀","遠雷の紀",
    "落穂の紀","霧の紀","薪の紀","渡り鳥の紀"];
  const WAR_CAUSE = ["国境の井戸","一頭の牛","聞き間違い","挨拶の順番","川の名前の読み方",
    "塩の値段","先に手を振ったのはどちらか","羊の数えかた","神々の格付け","古い地図の解釈"];

  function pick(a){ return a[(Math.random()*a.length)|0]; }
  const usedNames = new Set();

  function makeCivName(){
    let n, tries = 0;
    do{ n = pick(STEM) + pick(STEM).toLowerCase === undefined ? pick(STEM)+pick(STEM) : pick(STEM)+pick(STEM); n += pick(CIV_SUF); }
    while(usedNames.has(n) && ++tries < 20);
    usedNames.add(n);
    return n;
  }
  function makeCityName(){
    let n, tries = 0;
    do{ n = pick(STEM) + pick(CITY_SUF); }
    while(usedNames.has(n) && ++tries < 20);
    usedNames.add(n);
    return n;
  }
  function makeDeity(){
    return pick(DEITY_ADJ) + "神" + pick(STEM);
  }

  // ---- chronicle prose ----
  const P_BIRTH = [
    (c)=>`${c.cities[0].name}のほとりに${c.name}が興る。${c.deity}を奉じ、${c.temperament}な民であったという。`,
    (c)=>`${c.name}、建国。最初の王は王冠が完成するまで三年、鍋の蓋をかぶっていた。`,
    (c)=>`どこからともなく民が集まり、${c.name}を名乗りはじめる。${c.deity}がそうさせたと伝わる。`,
  ];
  const P_CITY = [
    (c,t)=>`${c.name}、${t}を築く。城壁は立派だが、門の場所を三度変えた。`,
    (c,t)=>`${c.name}の民、新たに${t}を建設。井戸を掘ったら先に水が出たので、そこに決めたという。`,
    (c,t)=>`${t}、${c.name}の新都として開かれる。落成式は雨で、それが吉兆とされた。`,
  ];
  const P_GOOD = [
    (c)=>`${c.name}の地、豊作。穀倉が足りず、隣人の家に麦を預ける者が続出した。`,
    (c)=>`${c.name}に良い年。家畜が増え、家畜の名前が足りなくなった。`,
    (c)=>`${c.name}、空前の豊漁。魚の数え役が過労で休んだ。`,
  ];
  const P_BAD = [
    (c)=>`${c.name}、飢饉に苦しむ。神官は雨乞いの踊りを改良した（効果は不明）。`,
    (c)=>`${c.name}に疫病広がる。医師は「とにかく寝ること」と布告し、これは概ね正しかった。`,
    (c)=>`${c.name}、大いに荒れる。${c.deity}への供物が値上がりした。`,
  ];
  const P_WAR_START = [
    (a,b,cause)=>`${a.name}と${b.name}、ついに干戈を交える。発端は${cause}であったと伝わる。`,
    (a,b,cause)=>`${a.name}、${b.name}に宣戦。布告文には${cause}のことしか書かれていなかった。`,
  ];
  const P_WAR_END = [
    (a,b)=>`${a.name}と${b.name}、和睦。条約文は長すぎて、最後まで読んだ者がいない。`,
    (a,b)=>`${a.name}と${b.name}の戦、終わる。両軍とも、なぜ始めたかをよく覚えていなかった。`,
  ];
  const P_CONQUER = [
    (w,l,t)=>`${w.name}の軍、${l.name}の${t}を落とす。城壁は静かに苔へ引き渡された。`,
    (w,l,t)=>`${t}、陥落。${l.name}の民は財産より先に漬物石を運び出した。`,
  ];
  const P_DOOM = [
    (c)=>`${c.name}、ここに潰える。最後の王は「また来る」と言い残した。${c.deity}だけが、しばらくその地に残った。`,
    (c)=>`${c.name}の灯、消える。年代記の書き手は、この行を書くのに少し時間をかけた。`,
    (c)=>`${c.name}、歴史から退場する。退場の作法は、たいへん丁寧であったという。`,
  ];
  const P_TRADE = [
    (a,b)=>`${a.name}と${b.name}、交易をはじめる。最初の取引は塩と、塩の入れ物だった。`,
    (a,b)=>`${a.name}の隊商、${b.name}に至る。言葉は通じなかったが、値切りは通じた。`,
  ];

  // ====================================================================
  //  the book
  // ====================================================================
  const entriesEl = document.getElementById("entries");
  const eraNameEl = document.getElementById("eraName");
  const yearNumEl = document.getElementById("yearNum");
  const statEl = document.getElementById("statLine");
  let stickBottom = true;
  entriesEl.addEventListener("scroll", () => {
    stickBottom = entriesEl.scrollTop + entriesEl.clientHeight > entriesEl.scrollHeight - 60;
  });

  function write(text, type){
    const d = document.createElement("p");
    d.className = "ent" + (type ? " t-"+type : "");
    if(type === "era"){
      d.textContent = text;
    } else {
      const y = document.createElement("span");
      y.className = "y";
      y.textContent = `${year}年`;
      d.append(y, document.createTextNode(text));
    }
    entriesEl.append(d);
    while(entriesEl.children.length > 400) entriesEl.firstChild.remove();
    if(stickBottom) entriesEl.scrollTop = entriesEl.scrollHeight;
    emit("written", {year, text, type});
  }

  function updateHeader(){
    eraNameEl.textContent = ERA_NAMES[eraIdx % ERA_NAMES.length];
    yearNumEl.textContent = `${year}年`;
    statEl.textContent = `文明 ${civs.filter(c=>c.alive).length} ／ 遺跡 ${ruins.length}`;
  }

  // ====================================================================
  //  map generation
  // ====================================================================
  function smoothPath(pts, scale){
    scale = scale || 1;
    const p = pts.map(([x,y]) => [x*scale, y*scale]);
    const n = p.length;
    let d = "";
    for(let i=0;i<n;i++){
      const c = p[i], nx = p[(i+1)%n];
      const mx = (c[0]+nx[0])/2, my = (c[1]+nx[1])/2;
      if(i===0) d = `M ${mx.toFixed(1)} ${my.toFixed(1)}`;
      else d += ` Q ${c[0].toFixed(1)} ${c[1].toFixed(1)}, ${mx.toFixed(1)} ${my.toFixed(1)}`;
    }
    d += ` Q ${p[0][0].toFixed(1)} ${p[0][1].toFixed(1)}, ${((p[0][0]+p[1][0])/2).toFixed(1)} ${((p[0][1]+p[1][1])/2).toFixed(1)}`;
    return d + " Z";
  }

  function buildContinent(){
    gLand.replaceChildren(); gDetail.replaceChildren();
    const cx = W*.5, cy = H*.52, rx = W*.4, ry = H*.38;
    const N = 22, pts = [];
    const a = 2+(Math.random()*2|0), b = 5+(Math.random()*3|0);
    const p1 = Math.random()*Math.PI*2, p2 = Math.random()*Math.PI*2;
    for(let i=0;i<N;i++){
      const t = i/N*Math.PI*2;
      const r = .78 + .14*Math.sin(a*t+p1) + .1*Math.sin(b*t+p2);
      pts.push([cx + Math.cos(t)*rx*r, cy + Math.sin(t)*ry*r]);
    }
    continent = {pts, cx, cy, rx, ry};
    const sea = mk("rect",{x:0,y:0,width:"100%",height:"100%",fill:"#cfdcca"});
    sea.setAttribute("opacity",.5);
    const land = mk("path",{d:smoothPath(pts), fill:"#ece1c4", stroke:"#4a3b28",
      "stroke-width":2.2, filter:"url(#rough)"});
    const coast2 = mk("path",{d:smoothPath(pts), fill:"none", stroke:"#4a3b28",
      "stroke-width":.8, opacity:.5, transform:`translate(0 0) scale(1)`, filter:"url(#rough)"});
    coast2.setAttribute("transform-origin", `${cx} ${cy}`);
    coast2.setAttribute("transform", "scale(1.025)");
    gLand.append(sea, land, coast2);

    // mountains: ^ ink marks in 2-3 ranges
    for(let rng=0; rng<2+(Math.random()*2|0); rng++){
      const mx0 = cx + (Math.random()-.5)*rx*.9;
      const my0 = cy + (Math.random()-.5)*ry*.9;
      const n = 4 + (Math.random()*6|0);
      for(let i=0;i<n;i++){
        const x = mx0 + (Math.random()-.5)*90, y = my0 + (Math.random()-.5)*50;
        if(!inLand(x,y)) continue;
        const s = 5 + Math.random()*6;
        gDetail.append(mk("path",{d:`M ${x-s} ${y} L ${x} ${y-s*1.2} L ${x+s} ${y} M ${x+s*.2} ${y-s*.5} L ${x+s*.55} ${y-s*.05}`,
          stroke:"#4a3b28","stroke-width":1.3,fill:"none","stroke-linecap":"round",opacity:.75}));
      }
    }
    // rivers
    for(let rv=0; rv<2+(Math.random()*2|0); rv++){
      const t0 = Math.random()*Math.PI*2;
      const ex = cx + Math.cos(t0)*rx*.85, ey = cy + Math.sin(t0)*ry*.85;
      const sx = cx + (Math.random()-.5)*rx*.5, sy = cy + (Math.random()-.5)*ry*.5;
      const m1x = (sx+ex)/2 + (Math.random()-.5)*80, m1y = (sy+ey)/2 + (Math.random()-.5)*80;
      gDetail.append(mk("path",{d:`M ${sx} ${sy} Q ${m1x} ${m1y}, ${ex} ${ey}`,
        stroke:"#7d99a8","stroke-width":2,fill:"none",opacity:.7,"stroke-linecap":"round", filter:"url(#rough)"}));
    }
    // forests
    for(let f=0; f<3+(Math.random()*3|0); f++){
      const fx0 = cx + (Math.random()-.5)*rx*1.1, fy0 = cy + (Math.random()-.5)*ry*1.1;
      for(let i=0;i<8+(Math.random()*10|0);i++){
        const x = fx0+(Math.random()-.5)*70, y = fy0+(Math.random()-.5)*46;
        if(!inLand(x,y)) continue;
        gDetail.append(mk("circle",{cx:x, cy:y, r:1.6+Math.random()*1.6, fill:"#6e7d52", opacity:.55}));
      }
    }
  }

  function inLand(x, y){
    if(!continent) return false;
    // cheap test against the unsmoothed polygon
    const {pts} = continent;
    let inside = false;
    for(let i=0, j=pts.length-1; i<pts.length; j=i++){
      const xi=pts[i][0], yi=pts[i][1], xj=pts[j][0], yj=pts[j][1];
      if(((yi>y)!==(yj>y)) && (x < (xj-xi)*(y-yi)/(yj-yi)+xi)) inside = true;
    }
    return inside;
  }

  // ====================================================================
  //  civilizations
  // ====================================================================
  const CIV_COLORS = ["#a04a32","#3a5a7a","#6b7a36","#7a4a6e","#3a7a6a","#9a7a2e","#5a4a8a","#8a3a4a"];

  function makeCiv(x, y, over){
    over = over || {};
    const c = {
      id: nextCivId++,
      name: over.name || makeCivName(),
      color: over.color || CIV_COLORS[(nextCivId-2) % CIV_COLORS.length],
      deity: over.deity || makeDeity(),
      temperament: over.temperament || pick(TEMPER),
      pop: over.pop || (300 + (Math.random()*500|0)),
      born: year,
      cities: [],
      trades: new Set(),
      alive: true,
      el: mk("g"), tEl: mk("g"),
    };
    gCities.append(c.el);
    gTerritory.append(c.tEl);
    foundCity(c, x, y, true);
    return c;
  }

  function cityMark(c, city){
    const g = mk("g");
    g.append(mk("rect",{x:city.x-3.2, y:city.y-3.2, width:6.4, height:6.4,
      fill:c.color, stroke:"#4a3b28", "stroke-width":1, transform:`rotate(45 ${city.x} ${city.y})`}));
    const t = mk("text",{x:city.x, y:city.y+14, "text-anchor":"middle", "font-size":9,
      fill:"#4a3b28", "letter-spacing":".06em"});
    t.textContent = city.name;
    g.append(t);
    return g;
  }

  function foundCity(c, x, y, isCapital){
    const city = {x, y, name: makeCityName(), capital: !!isCapital, size: isCapital?1.2:1};
    c.cities.push(city);
    c.el.append(cityMark(c, city));
    redrawTerritory(c);
    if(!isCapital){
      write(pick(P_CITY)(c, city.name), "civic");
      emit("city-founded", {civ: c, city});
    }
    return city;
  }

  function redrawTerritory(c){
    c.tEl.replaceChildren();
    // bounded growth — great empires deserve presence, not the whole continent
    const r = 20 + Math.min(55, Math.sqrt(Math.max(0, c.pop)) * 0.5);
    for(const ct of c.cities){
      c.tEl.append(mk("circle",{cx:ct.x, cy:ct.y, r:r*ct.size, fill:c.color, opacity:.13}));
    }
  }

  function rollSpot(near){
    // find a land spot, optionally near a civ's cities
    for(let i=0;i<60;i++){
      let x, y;
      if(near && near.cities.length){
        const base = pick(near.cities);
        const a = Math.random()*Math.PI*2, d = 50 + Math.random()*70;
        x = base.x + Math.cos(a)*d; y = base.y + Math.sin(a)*d;
      } else {
        x = continent.cx + (Math.random()-.5)*continent.rx*1.5;
        y = continent.cy + (Math.random()-.5)*continent.ry*1.5;
      }
      if(!inLand(x,y)) continue;
      let ok = true;
      for(const o of civs){ if(!o.alive) continue;
        for(const ct of o.cities){ if(Math.hypot(ct.x-x, ct.y-y) < 42){ ok = false; break; } }
        if(!ok) break;
      }
      if(ok) return {x, y};
    }
    return null;
  }

  function addCiv(x, y, over){
    if(civs.filter(c=>c.alive).length >= 6){ toast("大陸が手狭です。どこかが滅びるのを待ちましょう"); return null; }
    if(!inLand(x, y)){ toast("そこは海です。文明は泳げません"); return null; }
    for(const o of civs){ if(!o.alive) continue;
      for(const ct of o.cities){ if(Math.hypot(ct.x-x, ct.y-y) < 42){ toast("先客がいます"); return null; } }
    }
    const c = makeCiv(x, y, over);
    civs.push(c);
    write(pick(P_BIRTH)(c), "birth");
    emit("civ-born", c);
    updateHeader();
    hideHint();
    return c;
  }

  function killCiv(c, quiet){
    c.alive = false;
    for(const ct of c.cities) makeRuin(ct, c);
    c.cities.length = 0;
    c.el.replaceChildren(); c.tEl.replaceChildren();
    for(const w of wars.slice()){
      if(w.a===c || w.b===c) wars.splice(wars.indexOf(w),1);
    }
    for(const o of civs) o.trades.delete(c.id);
    if(!quiet) write(pick(P_DOOM)(c), "doom");
    emit("civ-died", c);
    updateHeader();
  }

  function makeRuin(city, c){
    const r = {x: city.x, y: city.y, name: city.name, civName: c.name, year};
    ruins.push(r);
    const g = mk("g", {opacity:.55});
    g.append(mk("path",{d:`M ${r.x-4} ${r.y+2} L ${r.x-1} ${r.y-4} L ${r.x+1.5} ${r.y+0} L ${r.x+4} ${r.y-2.5} L ${r.x+5} ${r.y+2} Z`,
      fill:"#8d8273", stroke:"#4a3b28","stroke-width":.8}));
    const t = mk("text",{x:r.x, y:r.y+12, "text-anchor":"middle","font-size":7.5,fill:"#7a6a52","font-style":"italic"});
    t.textContent = `${r.name}跡`;
    g.append(t);
    gRuins.append(g);
    r.el = g;
    return r;
  }

  // ====================================================================
  //  yearly simulation
  // ====================================================================
  function yearTick(){
    year++;
    // era change
    if(year - eraStartYear >= eraLen){
      eraIdx++; eraStartYear = year; eraLen = 80 + (Math.random()*40|0);
      write(`― 時代は移り、人々はこれを「${ERA_NAMES[eraIdx % ERA_NAMES.length]}」と呼んだ ―`, "era");
      emit("era-change", {era: ERA_NAMES[eraIdx % ERA_NAMES.length], year});
    }

    const alive = civs.filter(c=>c.alive);
    if(!alive.length){
      lonelyYears++;
      if(lonelyYears > 12){
        lonelyYears = 0;
        const spot = rollSpot();
        if(spot) addCiv(spot.x, spot.y);
      }
    } else lonelyYears = 0;

    for(const c of alive){
      // population drift
      const atWar = wars.some(w=>w.a===c || w.b===c);
      // logistic-ish: the continent feeds only so many — keeps the book's numbers believable
      const crowd = c.pop > 50000 ? 0.25 : c.pop > 20000 ? 0.6 : 1;
      c.pop = Math.round(c.pop * (atWar ? .97 : 1 + (0.012 + Math.random()*.02) * crowd));

      // random yearly events
      const roll = Math.random();
      if(roll < .02){ c.pop = Math.round(c.pop*1.15); write(pick(P_GOOD)(c), "good"); emit("harvest",{civ:c}); }
      else if(roll < .035){ c.pop = Math.round(c.pop*.82); write(pick(P_BAD)(c), "bad"); emit("famine",{civ:c}); }

      // found a city when prosperous
      if(c.pop > 900*c.cities.length && c.cities.length < 5 && Math.random() < .25){
        const spot = rollSpot(c);
        if(spot) foundCity(c, spot.x, spot.y);
      }
      // trade
      if(Math.random() < .03){
        const partner = pick(alive.filter(o=>o!==c && !o.trades.has(c.id) && !wars.some(w=>(w.a===c&&w.b===o)||(w.a===o&&w.b===c))) || []);
        if(partner){
          c.trades.add(partner.id); partner.trades.add(c.id);
          write(pick(P_TRADE)(c, partner), "trade");
          emit("trade-start", {a:c, b:partner});
        }
      }
      // decline & death
      if(c.pop < 120 && Math.random() < .3) killCiv(c);
      redrawTerritory(c);
    }

    // war ignition
    const alive2 = civs.filter(c=>c.alive);
    for(let i=0;i<alive2.length;i++) for(let j=i+1;j<alive2.length;j++){
      const a = alive2[i], b = alive2[j];
      if(wars.some(w=>(w.a===a&&w.b===b)||(w.a===b&&w.b===a))) continue;
      const near = a.cities.some(ca=>b.cities.some(cb=>Math.hypot(ca.x-cb.x,ca.y-cb.y) < 150));
      if(!near) continue;
      // trade relations fray — eternal universal peace makes for a dull chronicle
      if(a.trades.has(b.id) && Math.random() < .006){
        a.trades.delete(b.id); b.trades.delete(a.id);
        write(`${a.name}と${b.name}の交易、関税の解釈をめぐって途絶える。商人たちは三日泣き、四日目に別の街へ向かった。`, "civic");
      }
      let p = .008;
      if(a.temperament==="好戦的"||b.temperament==="好戦的") p *= 4;
      if(a.trades.has(b.id)) p *= .3;
      if(Math.random() < p){
        const cause = pick(WAR_CAUSE);
        wars.push({a, b, since: year, cause});
        write(pick(P_WAR_START)(a, b, cause), "war");
        emit("war-start", {a, b, cause});
      }
    }

    // ongoing wars
    for(const w of wars.slice()){
      if(!w.a.alive || !w.b.alive){ wars.splice(wars.indexOf(w),1); continue; }
      // battle flash midway between closest cities
      let best = null, bd = 1e9;
      for(const ca of w.a.cities) for(const cb of w.b.cities){
        const d = Math.hypot(ca.x-cb.x, ca.y-cb.y);
        if(d < bd){ bd = d; best = [(ca.x+cb.x)/2, (ca.y+cb.y)/2]; }
      }
      if(best) battleFlash(best[0], best[1]);
      const age = year - w.since;
      if(age >= 3 && Math.random() < .25){
        // resolution
        const loser = w.a.pop < w.b.pop ? w.a : w.b;
        const winner = loser === w.a ? w.b : w.a;
        if(Math.random() < .45 && loser.cities.length){
          const lost = loser.cities.length > 1
            ? loser.cities.splice(1 + (Math.random()*(loser.cities.length-1)|0), 1)[0]
            : loser.cities.splice(0, 1)[0];
          makeRuin(lost, loser);
          loser.el.replaceChildren();
          for(const ct of loser.cities) loser.el.append(cityMark(loser, ct));
          write(pick(P_CONQUER)(winner, loser, lost.name), "war");
          emit("city-fell", {winner, loser, city: lost});
          if(!loser.cities.length) killCiv(loser);
        } else {
          write(pick(P_WAR_END)(w.a, w.b), "peace");
          emit("war-end", {a: w.a, b: w.b});
        }
        wars.splice(wars.indexOf(w),1);
      }
    }

    updateHeader();
    emit("year", {year});
  }

  function battleFlash(x, y){
    const g = mk("g", {opacity:.85});
    g.append(mk("path",{d:`M ${x-5} ${y-5} L ${x+5} ${y+5} M ${x+5} ${y-5} L ${x-5} ${y+5}`,
      stroke:"#7e2f24","stroke-width":1.8,"stroke-linecap":"round"}));
    gFx.append(g);
    g.animate([{opacity:.85},{opacity:0}],{duration:1600, easing:"ease-out"}).onfinish = ()=>g.remove();
  }

  // ---- clock ----
  let acc = 0, lastT = 0;
  function frame(now){
    const dt = Math.min(.25, (now - lastT)/1000 || 0);
    lastT = now;
    if(running){
      acc += dt * speed;
      while(acc >= 2){ acc -= 2; yearTick(); }   // 1 year per 2s (×speed)
    }
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(t => { lastT = t; requestAnimationFrame(frame); });

  // ====================================================================
  //  interaction & UI
  // ====================================================================
  svg.addEventListener("pointerdown", e => {
    if(e.defaultPrevented || e.button !== 0) return;
    const r = svg.getBoundingClientRect();
    addCiv(e.clientX - r.left, e.clientY - r.top);
  });

  document.getElementById("seed").addEventListener("click", () => {
    const spot = rollSpot();
    if(spot) addCiv(spot.x, spot.y);
  });
  const pauseBtn = document.getElementById("pause");
  pauseBtn.addEventListener("click", () => {
    running = !running;
    pauseBtn.textContent = running ? "⏸ 時を止める" : "▶ 時を動かす";
    pauseBtn.classList.toggle("active", !running);
    toast(running ? "時が流れはじめました" : "時が止まりました。歴史家は休憩に入ります");
  });
  const speedBtn = document.getElementById("speed");
  speedBtn.addEventListener("click", () => {
    speed = speed === 1 ? 4 : 1;
    speedBtn.textContent = speed === 1 ? "▶ 等速" : "⏩ 駆け足";
    toast(speed === 1 ? "等速にもどしました" : "歴史が駆け足になりました");
  });

  document.getElementById("reset").addEventListener("click", () => {
    if(!confirm("大陸を白紙にもどしますか？ 歴史は失われます。\n（年代記の書き手は、別の紙に書き写したと主張しています）")) return;
    // close the books: let plugins hear each fall, then wipe the slate
    for(const c of civs.filter(c => c.alive)) killCiv(c, true);
    civs.length = 0;
    wars.length = 0;
    for(const r of ruins){ try{ if(r.el) r.el.remove(); }catch(_){} }
    ruins.length = 0;
    gRuins.replaceChildren(); gCities.replaceChildren(); gTerritory.replaceChildren(); gFx.replaceChildren();
    year = 0; eraIdx = 0; eraStartYear = 0; eraLen = 80 + (Math.random()*40|0);
    lonelyYears = 0;
    usedNames.clear();
    entriesEl.replaceChildren();
    continent = null; buildContinent();          // a brand-new landmass rises
    // refresh the political-map clip if the patch installed one
    try{
      const clip = document.querySelector("#kokkyo-landclip path");
      const land = gLand.querySelector("path");
      if(clip && land) clip.setAttribute("d", land.getAttribute("d"));
    }catch(_){}
    updateHeader();
    write("― ここに、まだ誰もいない大陸の記録を始める ―", "era");
    emit("reset", {});
    toast("大陸は白紙にもどりました。海だけが、前の大陸を覚えています");
  });

  // ---- dock ----
  const dock = document.getElementById("dock");
  const dockToggle = document.createElement("button");
  dockToggle.className = "btn dock-toggle";
  dockToggle.textContent = "🧰";
  dockToggle.addEventListener("click", () => dock.classList.toggle("folded"));
  dock.append(dockToggle);
  function addButton(label, onClick){
    const b = document.createElement("button");
    b.className = "btn";
    b.textContent = label;
    b.addEventListener("click", onClick);
    dock.append(b);
    return b;
  }

  // ---- hint & toast ----
  const hint = document.getElementById("hint");
  function hideHint(){ hint.style.opacity = 0; }

  const toastEl = document.getElementById("toast");
  let toastT = null;
  function toast(msg){
    toastEl.textContent = msg; toastEl.classList.add("show");
    clearTimeout(toastT); toastT = setTimeout(()=>toastEl.classList.remove("show"), 2400);
  }

  // ---- helpers ----
  function mk(tag, attrs){
    const el = document.createElementNS(SVGNS, tag);
    if(attrs) for(const k in attrs) el.setAttribute(k, attrs[k]);
    return el;
  }

  function resize(){
    W = window.innerWidth - 374; H = window.innerHeight;
    svg.setAttribute("viewBox", `0 0 ${W} ${H}`);
    if(!continent) buildContinent();
  }
  window.addEventListener("resize", () => { /* keep continent; just extend viewBox */
    W = window.innerWidth - 374; H = window.innerHeight;
    svg.setAttribute("viewBox", `0 0 ${W} ${H}`);
  });

  // ==================================================================
  //  plugin API
  // ==================================================================
  window.REKISHI = {
    svg, defs, gLand, gTerritory, gDetail, gRuins, gCities, gFx,
    civs, ruins, wars,                       // live arrays (do not reassign)
    get year(){ return year; },
    get era(){ return ERA_NAMES[eraIdx % ERA_NAMES.length]; },
    get W(){ return W; }, get H(){ return H; },
    get running(){ return running; }, get speed(){ return speed; },
    mk, toast, pick, inLand, smoothPath, rollSpot,
    addCiv, killCiv, foundCity, makeRuin,
    tick: yearTick,                          // advance one simulated year (for fast-forward plugins)
    write,                                   // write(text, type) — types: birth/civic/good/bad/war/peace/trade/doom/era or your own
    addButton,
    lore: {STEM, CIV_SUF, CITY_SUF, DEITY_ADJ, TEMPER, ERA_NAMES, WAR_CAUSE,
           P_BIRTH, P_CITY, P_GOOD, P_BAD, P_WAR_START, P_WAR_END, P_CONQUER, P_DOOM, P_TRADE},
    on, emit,
    // events: "year"({year}) every simulated year — the main plugin hook,
    //   "civ-born"(civ), "civ-died"(civ), "city-founded"({civ,city}), "city-fell"({winner,loser,city}),
    //   "war-start"({a,b,cause}), "war-end"({a,b}), "trade-start"({a,b}),
    //   "harvest"({civ}), "famine"({civ}), "era-change"({era,year}), "written"({year,text,type})
  };

  resize();
  updateHeader();
  write("― ここに、まだ誰もいない大陸の記録を始める ―", "era");
})();
</script>

<script>
// ════ plugin: seishi-hensan ════ Plugin "seishi-hensan" (正史の編纂). Paste into its own <script> tag after the core script in chronicle/index.html.  Integration details: - Keeps a private full l
(()=>{ "use strict";
if(!window.REKISHI) return;
const R = window.REKISHI;
const TAG = "[seishi-hensan]";

// ---------------------------------------------------------------- helpers
const esc = s => String(s==null?"":s).replace(/[&<>"']/g, c =>
  ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const KD = "〇一二三四五六七八九";
function kanjiNum(n){
  n = n|0;
  if(n<=0) return "〇";
  if(n<10) return KD[n];
  if(n<100){ const t=(n/10)|0, o=n%10; return (t>1?KD[t]:"")+"十"+(o?KD[o]:""); }
  return String(n);
}

// ------------------------------------------------- continent name (once)
const STEM = (R.lore && R.lore.STEM && R.lore.STEM.length) ? R.lore.STEM : ["ナギ"];
const continentName = R.pick(STEM) + R.pick(STEM) + "大陸";

// ------------------------------------------------------- the full record
const LOG_CAP = 5000;
const log = [];
let trimmed = 0;
let warCount = 0;

// backfill whatever the visible book already holds (DOM caps at 400)
try{
  for(const p of document.querySelectorAll("#entries .ent")){
    const m = /(?:^|\s)t-([a-z]+)/.exec(p.className || "");
    const ySpan = p.querySelector(".y");
    let y = R.year|0, text = p.textContent || "";
    if(ySpan){
      const n = parseInt(ySpan.textContent, 10);
      if(!isNaN(n)) y = n;
      text = text.slice(ySpan.textContent.length);
    }
    log.push({year:y, text, type: m ? m[1] : "", era: String(R.era||"")});
  }
}catch(err){ console.error(TAG, "backfill", err); }

R.on("written", e=>{
  try{
    if(!e) return;
    log.push({year: e.year|0, text: String(e.text||""), type: String(e.type||""), era: String(R.era||"")});
    if(log.length > LOG_CAP){ trimmed += log.length - LOG_CAP; log.splice(0, log.length - LOG_CAP); }
  }catch(err){ console.error(TAG, err); }
});
R.on("war-start", ()=>{ warCount++; });
R.on("civ-died", c=>{
  try{ if(c && typeof c._seishiDied !== "number") c._seishiDied = R.year|0; }
  catch(err){ console.error(TAG, err); }
});

function longestDynasty(){
  let best = null, bl = -1;
  try{
    for(const c of (R.civs||[])){
      if(!c || typeof c.born !== "number") continue;
      const end = c.alive ? (R.year|0) : (typeof c._seishiDied==="number" ? c._seishiDied : c.born);
      const l = end - c.born;
      if(l > bl){ bl = l; best = c; }
    }
  }catch(err){ console.error(TAG, err); }
  return best ? {name: best.name, len: bl, alive: !!best.alive} : null;
}

// ------------------------------------------------------------------ prose
const OBIT = [
  (c,l)=>`享国${l}年。長かったか短かったかは、後世の暇な者が決めることになっている。`,
  (c,l)=>`${c.deity}は最後まで祀られていたが、返答の記録は残っていない。`,
  (c,l)=>`滅亡の原因には諸説あり、どの説もたがいに一歩も譲らない。`,
  (c,l)=>`${c.temperament}な民であった。最後の年も、おそらくそうであった。`,
  (c,l)=>`都の名は石に残ったが、正しい発音のほうが先に失われた。`,
];
const GLYPH = {war:"⚔", doom:"†"};

function entHTML(e){
  const t = String(e.type||"");
  const cls = t ? ` seishi-t-${esc(t)}` : "";
  const g = GLYPH[t] ? `<span class="seishi-glyph">${GLYPH[t]}</span>` : "";
  return `<p class="seishi-ent${cls}"><span class="seishi-y">${e.year|0}年</span>${g}${esc(e.text)}</p>`;
}
function appxHead(n, title){
  return `<h2 class="seishi-head seishi-appx"><span class="seishi-head-no">附録${kanjiNum(n)}</span>${esc(title)}</h2>`;
}

// ------------------------------------------------------------ compilation
function renderBody(){
  const yearNow = R.year|0, eraNow = String(R.era||"");
  const civsAll = (R.civs||[]).filter(c=>c);
  const ruins = (R.ruins||[]).filter(r=>r);
  const dead = civsAll.filter(c=>!c.alive);
  const living = civsAll.filter(c=>c.alive);

  // --- title page ---
  let epi = "― 編者しるす。事実はつとめて正確に、感想はつとめて控えめに ―";
  if(log.length && log[0].type === "era" && log[0].text) epi = log[0].text;
  let h = `<div class="seishi-titlepage">
    <div class="seishi-orn">❖ ❖ ❖</div>
    <h1>${esc(continentName)}　正史</h1>
    <div class="seishi-sub">${esc(eraNow)}　${yearNow}年 編纂</div>
    <div class="seishi-epi">${esc(epi)}</div>
  </div>`;

  // --- chapters by era ---
  const chs = [];
  for(const e of log){
    if(!e || e.type === "era") continue;
    const last = chs[chs.length-1];
    if(last && last.era === e.era) last.entries.push(e);
    else chs.push({era: e.era, entries:[e]});
  }
  if(!chs.length){
    h += `<p class="seishi-empty">（記録はまだ薄い。歴史は始まったばかりである）</p>`;
  } else {
    h += `<div class="seishi-cols">`;
    chs.forEach((ch,i)=>{
      const fy = ch.entries[0].year|0, ly = ch.entries[ch.entries.length-1].year|0;
      h += `<h2 class="seishi-head"><span class="seishi-head-no">第${kanjiNum(i+1)}章　${fy}年 — ${ly}年</span>${esc(ch.era)}</h2>`;
      for(const e of ch.entries) h += entHTML(e);
    });
    h += `</div>`;
  }

  // --- appendix 1: lost nations ---
  h += appxHead(1, "失われた国々");
  if(!dead.length){
    h += `<p class="seishi-empty">（いまだ滅びた国はない。歴史家はいくぶん手持ち無沙汰である）</p>`;
  } else {
    h += `<div class="seishi-cols">`;
    for(const c of dead){
      try{
        const died = (typeof c._seishiDied==="number") ? c._seishiDied : null;
        const life = (died===null ? yearNow : died) - (c.born|0);
        const span = died===null
          ? `${c.born|0}年 —（没年は写本の虫食いにより不詳）`
          : `${c.born|0}年 — ${died}年（享国${life}年）`;
        const obit = OBIT[Math.abs(c.id|0) % OBIT.length](c, life);
        h += `<div class="seishi-grave">
          <div class="seishi-name">${esc(c.name)}<span class="seishi-span">${esc(span)}</span></div>
          <div class="seishi-sub2">奉神　${esc(c.deity)}</div>
          <div class="seishi-obit">${esc(obit)}</div></div>`;
      }catch(err){ console.error(TAG, err); }
    }
    h += `</div>`;
  }

  // --- appendix 2: living nations ---
  h += appxHead(2, "現存する国々");
  if(!living.length){
    h += `<p class="seishi-empty">（現存する国はない。大陸はたいへん静かである）</p>`;
  } else {
    h += `<div class="seishi-cols">`;
    for(const c of living){
      try{
        const cities = c.cities || [];
        const names = cities.map(ct=>esc(ct && ct.name)).join("、") || "—";
        h += `<div class="seishi-grave">
          <div class="seishi-name">${esc(c.name)}<span class="seishi-span">${c.born|0}年建国・治世${yearNow-(c.born|0)}年</span></div>
          <div class="seishi-sub2">人口およそ${c.pop|0}　都市${cities.length}：${names}</div>
          <div class="seishi-obit">${esc(c.deity)}を奉じる${esc(c.temperament)}の民。本書編纂の時点では健在である。</div></div>`;
      }catch(err){ console.error(TAG, err); }
    }
    h += `</div>`;
  }

  // --- appendix 3: ruins ---
  h += appxHead(3, "遺跡一覧");
  if(!ruins.length){
    h += `<p class="seishi-empty">（遺跡はまだ無い。石はみな現役である）</p>`;
  } else {
    h += `<div class="seishi-cols">`;
    for(const r of ruins){
      h += `<p class="seishi-ruin">▴ ${esc(r.name)}跡 ― もと${esc(r.civName)}の地。${r.year|0}年に滅す。</p>`;
    }
    h += `</div>`;
  }

  // --- appendix 4: statistics ---
  h += appxHead(4, "統計");
  const dyn = longestDynasty();
  h += `<div class="seishi-stats">
    <p>この大陸に興った文明はあわせて${civsAll.length}。うち現存${living.length}、滅亡${dead.length}。</p>
    <p>記録に残る戦争は${warCount}。和睦の数は、数えはじめた者が途中で眠った。</p>
    <p>${dyn ? `最長の王朝は${esc(dyn.name)}の${dyn.len|0}年${dyn.alive ? "。その治世はなお続いている" : ""}。` : "最長王朝の項は空欄である。どの王朝も、まだこれからであった。"}</p>
    <p>本書に収めた記事は${log.length}条。${trimmed ? `紙数の都合により、最も古い${trimmed}条を割愛した。` : "一条も割愛していない。これは編者のささやかな自慢である。"}</p>
  </div>`;

  // --- colophon ---
  h += `<div class="seishi-colophon">「${esc(continentName)}　正史」　${esc(eraNow)}${yearNow}年 編纂<br>誤りはすべて、後世の写本家のせいである</div>`;
  return h;
}

}
function saveBook(){

    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `正史_${R.year|0}年版.html`;
    document.body.append(a);
    a.click();
    a.remove();
    setTimeout(()=>URL.revokeObjectURL(url), 4000);
    R.toast("正史が編まれました。歴史家は肩を回した");
  }catch(err){

<script>
// ════ plugin: koukogaku ════ 考古学 plugin, verified live in a browser against chronicle/index.html (source copy at chronicle/plugin-koukogaku.js)
(()=>{ "use strict";
  if(!window.REKISHI) return;
  const R = window.REKISHI;

  // ---------------- utils ----------------
  const esc = s => String(s).replace(/[&<>"']/g, ch =>
    ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[ch]));
  function hash(str){
    let h = 2166136261 >>> 0;
    for(let i = 0; i < str.length; i++){ h ^= str.charCodeAt(i); h = Math.imul(h, 16777619); }
    return h >>> 0;
  }
  function mulberry(seed){
    let s = seed >>> 0;
    return () => {
      s = (s + 0x6D2B79F5) >>> 0;
      let t = Math.imul(s ^ (s >>> 15), 1 | s);
      t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  }
  const rpick = (r, a) => a[Math.min(a.length - 1, (r() * a.length) | 0)];
  function rshuffle(r, a){
    const b = a.slice();
    for(let i = b.length - 1; i > 0; i--){ const j = (r() * (i + 1)) | 0; [b[i], b[j]] = [b[j], b[i]]; }
    return b;
  }

  // ---------------- style ----------------
  const style = document.createElement("style");
  style.textContent = `
  .koukogaku-ruin{cursor:pointer;transition:opacity .25s}
  .koukogaku-ruin:hover{opacity:.95}
  .koukogaku-overlay{position:fixed;inset:0;z-index:8;background:rgba(58,46,30,.45);
    display:flex;align-items:center;justify-content:center}
  .koukogaku-panel{width:min(430px,calc(100vw - 40px));max-height:min(580px,84vh);overflow-y:auto;
    background:linear-gradient(115deg,#f2e8cd,#ece1c4 55%,#e2d4b2);color:#4a3b28;
    border:double 5px rgba(74,59,40,.55);border-radius:4px;box-shadow:0 14px 44px rgba(40,30,16,.5);
    padding:22px 26px 18px;font-family:"Hiragino Mincho ProN","Yu Mincho",serif;
    animation:koukogaku-in .25s ease-out;scrollbar-width:thin}
  @keyframes koukogaku-in{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .koukogaku-title{margin:0 0 6px;font-size:17px;letter-spacing:.12em;text-align:center;font-weight:700}
  .koukogaku-sub{text-align:center;font-size:12px;color:#7a6a52;letter-spacing:.08em}
  .koukogaku-rule{border-top:1px solid rgba(74,59,40,.35);margin:12px 0 10px}
  .koukogaku-label{font-size:11px;color:#7a6a52;letter-spacing:.3em;margin-bottom:6px}
  .koukogaku-item{margin:0 0 7px;font-size:12.8px;line-height:1.9;letter-spacing:.02em}
  .koukogaku-note{margin:0 0 6px;font-size:12.5px;line-height:1.9}
  .koukogaku-reroll{display:inline-block;margin-top:4px;font-size:11.5px;color:#8a4a32;
    text-decoration:underline dotted;cursor:pointer;letter-spacing:.04em}
  .koukogaku-reroll:hover{color:#4a3b28}
  .koukogaku-close{display:block;margin:14px auto 0;cursor:pointer;font-family:inherit;font-weight:600;
    border:1.5px solid rgba(74,59,40,.4);background:rgba(236,225,196,.9);color:#4a3b28;border-radius:8px;
    padding:7px 16px;font-size:12.5px;letter-spacing:.06em;transition:.18s}
  .koukogaku-close:hover{border-color:#8a4a32;transform:translateY(-1px)}`;
  document.head.append(style);

  // ---------------- history index (listen from load, key by civ name) ----------------
  const hist = new Map(); // civName -> [{k,...}]
  function rec(civ, item){
    try{
      const nm = civ && civ.name;
      if(!nm) return;
      let arr = hist.get(nm);
      if(!arr){ arr = []; hist.set(nm, arr); }
      if(arr.length < 60) arr.push(item);
    }catch(err){ console.error("[koukogaku] rec", err); }
  }
  const nameOf = v => (typeof v === "string") ? v : (v && (v.name || v.title)) || null;

  R.on("hatsumei:invented", e => { const n = nameOf(e && e.invention); if(e && e.civ && n) rec(e.civ, {k:"inv", n}); });
  R.on("ijin:born",  e => { const n = nameOf(e && e.person); if(e && e.civ && n) rec(e.civ, {k:"ijin", n}); });
  R.on("ijin:died",  e => { const n = nameOf(e && e.person); if(e && e.civ && n) rec(e.civ, {k:"ijin2", n}); });
  R.on("shukyo:spread", e => { const n = nameOf(e && e.faith); if(e && e.civ && n) rec(e.civ, {k:"faith", n}); });
  R.on("war-start",  e => { if(e && e.a && e.b){ rec(e.a, {k:"war", o:e.b.name, c:e.cause}); rec(e.b, {k:"war", o:e.a.name, c:e.cause}); } });
  R.on("war-end",    e => { if(e && e.a && e.b){ rec(e.a, {k:"peace", o:e.b.name}); rec(e.b, {k:"peace", o:e.a.name}); } });
  R.on("trade-start",e => { if(e && e.a && e.b){ rec(e.a, {k:"trade", o:e.b.name}); rec(e.b, {k:"trade", o:e.a.name}); } });
  R.on("harvest", e => { if(e && e.civ) rec(e.civ, {k:"harvest"}); });
  R.on("famine",  e => { if(e && e.civ) rec(e.civ, {k:"famine"}); });
  R.on("ekibyo:outbreak", e => { if(e && e.civ) rec(e.civ, {k:"plague"}); });
  R.on("city-founded", e => { if(e && e.civ && e.city && e.city.name) rec(e.civ, {k:"city", t:e.city.name}); });
  R.on("city-fell", e => {
    if(!e) return;
    if(e.winner) rec(e.winner, {k:"won", t:e.city && e.city.name});
    if(e.loser)  rec(e.loser,  {k:"lost", t:e.city && e.city.name});
  });

  // ---------------- artifact corpora ----------------
  function histArtifacts(ruin, r){
    const out = [];
    for(const it of hist.get(ruin.civName) || []){
      switch(it.k){
        case "inv":   out.push({a:`「${it.n}」の破片`, n:rpick(r, [
                        "組み立て直す勇気は、調査団の誰にもなかった",
                        "当時の最先端。今も当時のままである",
                        "説明書は出土しなかった（当時から無かった可能性がある）"])}); break;
        case "ijin":  out.push({a:`${it.n}の印章`, n:"持ち主より長持ちした"}); break;
        case "ijin2": out.push({a:`${it.n}を悼む小さな碑`, n:"碑文の末尾に「まだ信じられない」と追記がある"}); break;
        case "faith": out.push({a:`${it.n}の護符`, n:"裏に、前に信じていたものの図柄が透けている"}); break;
        case "war":   out.push({a:"矢尻の堆積", n:`${it.o}との戦の層。発端（${it.c || "諸説あり"}）までは出土しない`}); break;
        case "peace": out.push({a:`${it.o}との和約の写し`, n:"最後の頁にだけ、折り目がない"}); break;
        case "trade": out.push({a:"異国の秤", n:`${it.o}の度量衡。値切りに耐えた補強の痕がある`}); break;
        case "harvest": out.push({a:"増築された穀倉の礎石", n:"麦を預けた隣人の名簿が添えられている"}); break;
        case "famine":  out.push({a:"雨乞いの踊りの図解（改良版）", n:"効果の欄は空白のままである"}); break;
        case "plague":  out.push({a:"「とにかく寝ること」の布告板", n:"摩耗が激しい。よく読まれたのだろう"}); break;
        case "won":   out.push({a:"戦勝の柱の断片", n:"碑文の三割は誇張と鑑定された"}); break;
        case "lost":  out.push({a:"置き去りの漬物石", n:`${it.t || "陥落の都"}から運び出されなかった、最後の一つ`}); break;
        case "city":  out.push({a:`${it.t}の定礎の瓦`, n:"門の位置の修正案が、三つ刻まれている"}); break;
      }
    }
    const civ = (R.civs || []).find(c => c && c.name === ruin.civName);
    if(civ){
      if(civ.deity) out.push({a:`${civ.deity}の小さな祠`, n:"供物の皿は空のまま出土した"});
      if(civ.temperament) out.push({a:`「${civ.temperament}な民」と評した隣国の書簡`, n:"概ね当たっていたようである"});
    }
    return out;
  }

  const GENERIC = [
    {a:"欠けた皿", n:"欠けていないものは出土しない"},
    {a:"謎の小像", n:"当時から謎だった可能性がある"},
    {a:"税の記録", n:"未払いに丸がついている"},
    {a:"子供の落書きのある瓦", n:"上手い。役人の似顔絵と思われる"},
    {a:"鍵", n:"対応する錠は、まだ誰も見つけていない"},
    {a:"サイコロ", n:"六の面が三つある"},
    {a:"借用書の束", n:"いずれも「明日返す」とのみ記される"},
    {a:"編みかけの籠", n:"編み手は急用だったらしい"},
    {a:"空の酒壺", n:"中身の行方については諸説ある"},
    {a:"天文観測の記録", n:"曇りの日は愚痴が書かれている"},
    {a:"礎石に残る職人の署名", n:"設計者の名より深く彫られている"},
    {a:"香炉", n:"灰は当時のまま。香りは退役した"},
    {a:"大物の魚の骨", n:"数え役が休んだ年のものか"},
    {a:"鍋の蓋", n:"王冠の代用とされた時期がある"},
    {a:"古い地図", n:"戦争の発端になれる程度には、曖昧である"},
    {a:"砥石", n:"包丁より雄弁に、台所を語る"},
  ];

  const SHOKEN = [
    "総じて、よく生きた人々であったと思われる。",
    "出土品は暮らしの苦労を語るが、筆跡はどれも楽しげである。",
    "争いの跡と宴の跡が同じ深さから出る。両者の区別は困難である。",
    "滅びの原因は特定できなかった。家賃のような、静かな何かであろう。",
    "彼らが何を信じていたかは分かった。守っていたかどうかは、分からない。",
    "記録は几帳面だが、肝心の年だけ頁が破られている。",
    "掘れば掘るほど、現代との差が見当たらなくなる。",
  ];

  const P_DIG = [
    (n)=>`考古学者の一団、${n}跡に鋤を入れる。最も多く出土したのは、例によって土であった。`,
    (n)=>`${n}跡で発掘調査が始まる。近隣の住民は「前から何かあると思っていた」と述べた。`,
    (n)=>`学者たち、${n}跡を掘り返す。眠っていた歴史は、起こされて少し不機嫌である。`,
  ];

  // ---------------- report generation (deterministic per ruin; salt = 追加調査) ----------------
  function buildReport(ruin, salt){
    const seed = hash(`${ruin.name}|${ruin.year}`);
    const r = mulberry((seed + Math.imul(salt, 0x9E3779B9)) >>> 0);
    const count = 3 + ((r() * 3) | 0); // 3..5
    const fromHist = rshuffle(r, histArtifacts(ruin, r));
    const fromGen  = rshuffle(r, GENERIC);
    const lines = [], seen = new Set();
    for(const it of fromHist){ if(lines.length >= count - 1) break; if(seen.has(it.a)) continue; seen.add(it.a); lines.push(it); }
    for(const it of fromGen){ if(lines.length >= count) break; if(seen.has(it.a)) continue; seen.add(it.a); lines.push(it); }
    const shoken = rpick(mulberry(seed ^ 0x5F3759DF), SHOKEN); // 所見は追加調査でも揺らがない
    return {lines, shoken};
  }

  // ---------------- modal ----------------
  let overlay = null, escHandler = null;
  const visited = new Set();

  function closeReport(){
    try{
      if(overlay){ overlay.remove(); overlay = null; }
      if(escHandler){ document.removeEventListener("keydown", escHandler); escHandler = null; }
    }catch(err){ console.error("[koukogaku] close", err); }
  }

  function openReport(ruin){
    try{
      closeReport();
      let salt = 0;
      const name = ruin.name || "無名", master = ruin.civName || "不明の民";
      const yr = (typeof ruin.year === "number") ? ruin.year : "？";
      overlay = document.createElement("div");
      overlay.className = "koukogaku-overlay";
      const panel = document.createElement("div");
      panel.className = "koukogaku-panel";
      overlay.append(panel);

      function render(){
        const rep = buildReport(ruin, salt);
        panel.innerHTML = `
          <h2 class="koukogaku-title">${esc(name)}跡 発掘調査報告</h2>
          <div class="koukogaku-sub">往年の主: ${esc(master)}（${esc(yr)}年に没す）</div>
          <div class="koukogaku-rule"></div>
          <div class="koukogaku-label">出土品目録</div>
          ${rep.lines.map(it => `<p class="koukogaku-item">・${esc(it.a)}　—　${esc(it.n)}</p>`).join("")}
          <a class="koukogaku-reroll" href="#">※追加調査をすれば、別のものが出るかもしれない</a>
          <div class="koukogaku-rule"></div>
          <div class="koukogaku-label">所見</div>
          <p class="koukogaku-note">${esc(rep.shoken)}</p>
          <p class="koukogaku-note">調査団は日没により撤収した。</p>
          <button class="koukogaku-close">報告書を閉じる</button>`;
        panel.querySelector(".koukogaku-reroll").addEventListener("click", ev => {
          ev.preventDefault();
          try{ salt++; render(); }catch(err){ console.error("[koukogaku] reroll", err); }
        });
        panel.querySelector(".koukogaku-close").addEventListener("click", closeReport);
      }
      render();

      overlay.addEventListener("pointerdown", ev => { if(ev.target === overlay) closeReport(); });
      escHandler = ev => { if(ev.key === "Escape") closeReport(); };
      document.addEventListener("keydown", escHandler);
      document.body.append(overlay);

      const key = `${name}|${yr}`;
      if(!visited.has(key)){
        visited.add(key);
        R.write(R.pick(P_DIG)(name), "civic");
      }
    }catch(err){ console.error("[koukogaku] openReport", err); }
  }

  // ---------------- ruin binding (initial + late-created ruins) ----------------
  const bound = new WeakSet();
  function rescan(){
    try{
      for(const ruin of R.ruins || []){
        const el = ruin && ruin.el;
        if(!el || bound.has(el)) continue;
        bound.add(el);
        el.classList.add("koukogaku-ruin");
        el.addEventListener("pointerdown", ev => {
          try{
            if(ev.button !== 0) return;
            ev.preventDefault();
            openReport(ruin);
          }catch(err){ console.error("[koukogaku] ruin click", err); }
        });
      }
    }catch(err){ console.error("[koukogaku] rescan", err); }
  }
  R.on("year", rescan);
  R.on("civ-died", rescan);
  R.on("city-fell", rescan);
  rescan();
})();
</script>

<script>

if(!window.REKISHI) return;
const R = window.REKISHI;

try{

// ------------------------------------------------------------------

// corpora

const ASPECTS = ["沈黙","装飾","朝の祈り","倹約","笑い","行列","香の焚き方","沐浴",
  "写本","鐘の鳴らし方","供物の盛り付け","断食明けの食事"];

];

const P_SPREAD = [
  (d,c)=>`${d}の教え、${c.name}に伝わる。最初の信徒は三人で、うち一人は気の迷いだったという。`,
  (d,c)=>`${c.name}の市に${d}の説法師が立つ。聴衆の半分は雨宿りであったが、雨は長かった。`,
  (d,c)=>`${d}の祠、${c.name}の街道沿いに建つ。建てた大工は信徒ではないが、賽銭は受け取った。`,
  (d,c)=>`${c.name}の民、${d}を拝みはじめる。理由を尋ねられた者は「隣がそうしているので」と答えた。`,
];

const P_SCHISM = [
  (c,old,asp,nu)=>`${c.name}の神殿にて教義論争、決着せず。${old}の${asp}を重んじる一派が新たに${nu}を立て、これが国教となる。残った側は静かに席を詰めた。`,
  (c,old,asp,nu)=>`${c.name}にて${old}の信徒が二つに割れる。${old}の${asp}を重んじる一派が${nu}を奉じ、宮廷もこれに従った。割れた理由を双方に尋ねると、答えは三つ返ってきた。`,
  (c,old,asp,nu)=>`${old}の${asp}を重んじる一派、${c.name}で勢いを得て${nu}を新たな神と定める。古い祈祷書は捨てられず、棚の奥へ移された。`,
];

const P_HOLY = [
  (t,d)=>`${t}、${d}の聖地と定められる。参拝の作法は三年ごとに改定される。`,
  (t,d)=>`${d}の神託により、${t}が聖地と布告される。神託の原文は短く、解釈は長かった。`,
  (t,d)=>`${t}に大鳥居が建ち、${d}の聖地となる。鳥居の寸法を巡って大工が二人辞めた。`,
];

// ------------------------------------------------------------------
// state
// ------------------------------------------------------------------
const faiths = new Map();   // name -> {name, firstYear, origin, parent, aspect, dogma}
const sites = [];           // {city, civ, deity, el}

function ensureFaith(name, civ){
  if(!name) return null;
  if(faiths.has(name)) return faiths.get(name);
  const f = {name, firstYear: R.year, origin: civ ? civ.name : null,
    parent: null, aspect: null, dogma: R.pick(DOGMAS)};
  faiths.set(name, f);
  return f;
}

function faithsOf(c){
  if(!Array.isArray(c._shukyoFaiths)) c._shukyoFaiths = [];
  const fs = c._shukyoFaiths;
  if(c.deity && !fs.includes(c.deity)){
    fs.unshift(c.deity);
    while(fs.length > 2) fs.pop();
  }
  for(const n of fs) ensureFaith(n, c);
  return fs;
}

function newDeityName(){
  for(let i=0;i<30;i++){
    const n = R.pick(L.DEITY_ADJ) + "神" + R.pick(L.STEM);
    if(!faiths.has(n)) return n;
  }
  return R.pick(L.DEITY_ADJ) + "神" + R.pick(L.STEM) + "二世";
}

function closeBy(a, b){
  return a.cities.some(ca => b.cities.some(cb =>
    Math.hypot(ca.x - cb.x, ca.y - cb.y) < 140));
}

// ------------------------------------------------------------------
// (a) spread / (b) schism / (c) holy sites — per year
// ------------------------------------------------------------------
function canAdopt(c, deity){
  if(!deity) return false;
  const fs = faithsOf(c);
  return fs.length < 2 && !fs.includes(deity);
}

function adopt(c, deity){
  const fs = faithsOf(c);
  fs.push(deity);
  ensureFaith(deity, c);
  R.write(R.pick(P_SPREAD)(deity, c), "trade");
  R.emit("shukyo:spread", {faith: deity, civ: c});
}

function schism(c){
  const old = c.deity;
  if(!old) return;
  const asp = R.pick(ASPECTS);
  const nu = newDeityName();
  const f = ensureFaith(nu, c);
  f.parent = old; f.aspect = asp;
  const fs = faithsOf(c);
  const i = fs.indexOf(old);
  if(i >= 0) fs[i] = nu; else { fs.unshift(nu); while(fs.length > 2) fs.pop(); }
  c.deity = nu;
  c._shukyoLastSchism = R.year;
  R.write(R.pick(P_SCHISM)(c, old, asp, nu), "civic");
}

function shrineGlyph(x, y){
  const d = `M ${x-6} ${y-6.5} Q ${x} ${y-8.5} ${x+6} ${y-6.5}`
          + ` M ${x-4.6} ${y-4.4} L ${x+4.6} ${y-4.4}`
          + ` M ${x-3.4} ${y-6.4} L ${x-3.4} ${y+1.6}`
          + ` M ${x+3.4} ${y-6.4} L ${x+3.4} ${y+1.6}`;
  const g = R.mk("g", {opacity:.82, "pointer-events":"none"});
  g.append(R.mk("path", {d, stroke:"#4a3b28", "stroke-width":1.2, fill:"none",
    "stroke-linecap":"round"}));
  try{ g.animate([{opacity:0},{opacity:.82}], {duration:900, easing:"ease-out"}); }catch(_){}
  return g;
}

function declareHolySite(c){
  const cand = c.cities.filter(ct => ct && !sites.some(s => s.city === ct));
  if(!cand.length) return;
  const city = R.pick(cand);
  const deity = c.deity;
  if(!deity) return;
  ensureFaith(deity, c);
  const el = shrineGlyph(city.x + 11, city.y - 6);
  R.gFx.append(el);
  sites.push({city, civ: c, deity, el});
  R.write(R.pick(P_HOLY)(city.name, deity), "civic");
}

function removeSite(s){
  const i = sites.indexOf(s);
  if(i >= 0) sites.splice(i, 1);
  try{ if(s.el) s.el.remove(); }catch(_){}
}

onSafe("year", () => {
  const alive = R.civs.filter(c => c && c.alive);
  for(const c of alive) faithsOf(c);   // register every deity ever seen

  // (a) spread along trade routes / close borders
  for(let i=0;i<alive.length;i++) for(let j=i+1;j<alive.length;j++){
    const a = alive[i], b = alive[j];
    if(!(a.trades.has(b.id) || closeBy(a, b))) continue;
    if(Math.random() >= .02) continue;
    const opts = [];
    if(canAdopt(b, a.deity)) opts.push([a, b]);
    if(canAdopt(a, b.deity)) opts.push([b, a]);
    if(!opts.length) continue;
    const [giver, recv] = R.pick(opts);
    adopt(recv, giver.deity);
  }

  // (b) schism in large civs
  for(const c of alive){
    if(c.pop > 8000 && Math.random() < .01
       && R.year - (c._shukyoLastSchism || -999) > 20) schism(c);
  }

  // (c) holy sites
  for(const c of alive){
    if(Math.random() < .005) declareHolySite(c);
  }
});

// ------------------------------------------------------------------
// holy-site bookkeeping on loss
// ------------------------------------------------------------------
onSafe("city-fell", ({city}) => {
  for(const s of sites.slice()){
    if(s.city !== city) continue;
    removeSite(s);
    R.write(`${s.deity}の聖地${city.name}、戦火に没す。巡礼路だけが、しばらく道として残った。`, "bad");
  }
});

onSafe("civ-died", civ => {
  const lost = sites.filter(s => s.civ === civ);
  for(const s of lost) removeSite(s);
  if(lost.length){
    R.write(`${civ.name}の滅びにより、聖地${lost.map(s=>s.city.name).join("、")}も守る者を失う。神は引き続き在宅とされる。`, "bad");
  }
});

onSafe("civ-born", civ => { faithsOf(civ); });

// ------------------------------------------------------------------
// (d) religious flavor on war
// ------------------------------------------------------------------
onSafe("war-start", ({a, b}) => {
  if(!a || !b) return;
  const fa = faithsOf(a), fb = faithsOf(b);
  const shared = fa.find(n => fb.includes(n));
  if(shared){
    R.write(`なお両国は同じ${shared}を奉じており、神は困っている。`, "war");
  } else if(a.deity && b.deity){
    R.write(`これを聖戦と呼ぶ者もいたが、${a.deity}も${b.deity}も特に乗り気ではなかった。`, "war");
  }
});

const overlay = document.createElement("div");

overlay.innerHTML = `
  <div class="shukyo-modal" role="dialog" aria-label="諸神録">
    <div class="shukyo-head">
      <span class="shukyo-title">⛩ 諸神録</span>

    <div class="shukyo-list"></div>
    <div class="shukyo-foot"><button class="shukyo-close">閉じる</button></div>
  </div>`;
document.body.append(overlay);
const listEl = overlay.querySelector(".shukyo-list");

function renderModal(){
  try{
    const fl = [...faiths.values()].sort((a,b) => a.firstYear - b.firstYear);
    if(!fl.length){
      listEl.innerHTML = `<div class="shukyo-empty">まだ神は観測されていない。神々のほうでも、こちらを観測していない。</div>`;
      return;
    }
    listEl.replaceChildren();
    const alive = R.civs.filter(c => c && c.alive);
    for(const f of fl){
      const followers = alive.filter(c => faithsOf(c).includes(f.name));
      const fTxt = followers.length
        ? followers.map(c => c.deity === f.name ? `${c.name}（国教）` : c.name).join("、")
        : "信徒なし（求人中）";
      const my = sites.filter(s => s.deity === f.name);
      const sTxt = my.length ? my.map(s => s.city.name).join("、") : "なし";
      const note = f.parent ? `　／　${f.parent}より分かれる（${f.aspect}を重んじる）`
                 : (f.origin ? `　／　${f.origin}に発す` : "");
      const row = document.createElement("div");
      row.className = "shukyo-faith";
      row.innerHTML =
        `<div class="shukyo-fname">${esc(f.name)}<span class="shukyo-fsince">${esc(String(f.firstYear))}年より${esc(note)}</span></div>` +
        `<div class="shukyo-frow">信徒: ${esc(fTxt)}</div>` +
        `<div class="shukyo-frow">聖地: ${esc(sTxt)}</div>` +
        `<div class="shukyo-fdogma">${esc(f.dogma)}</div>`;
      listEl.append(row);
    }
  }catch(err){ console.error("[shukyo] renderModal", err); }
}

function openModal(){ renderModal(); overlay.classList.add("shukyo-open"); }
function closeModal(){ overlay.classList.remove("shukyo-open"); }

overlay.addEventListener("pointerdown", e => { if(e.target === overlay) closeModal(); });
overlay.querySelector(".shukyo-close").addEventListener("click", closeModal);
document.addEventListener("keydown", e => {
  if(e.key === "Escape" && overlay.classList.contains("shukyo-open")) closeModal();
});

R.addButton("⛩ 諸神録", () => { try{ openModal(); }catch(err){ console.error("[shukyo] open", err); } });

// register deities of civs that existed before this plugin loaded
for(const c of R.civs){ if(c && c.alive) faithsOf(c); }

}catch(err){ console.error("[shukyo] init failed", err); }
})();
