.gengo-bunka-modal{width:min(480px,86vw);max-height:76vh;display:flex;flex-direction:column;color:#4a3b28;
  font-family:"Hiragino Mincho ProN","Yu Mincho",serif;
  background:linear-gradient(105deg,#f2e8cd 0%,#ece1c4 55%,#e5d8b6 100%);
  border:double 5px rgba(74,59,40,.5);border-radius:6px;box-shadow:0 16px 44px rgba(40,30,16,.45);}
.gengo-bunka-head{position:relative;padding:14px 40px 10px;text-align:center;
  border-bottom:1.5px solid rgba(74,59,40,.35);}
.gengo-bunka-title{font-size:16px;font-weight:700;letter-spacing:.32em;text-indent:.32em;}
.gengo-bunka-sub{margin-top:5px;font-size:11px;color:#7a6a52;letter-spacing:.14em;}
.gengo-bunka-x{position:absolute;right:9px;top:9px;cursor:pointer;border:1.5px solid rgba(74,59,40,.3);
  background:rgba(236,225,196,.9);color:#4a3b28;border-radius:7px;padding:3px 9px;font-size:13px;
  font-family:inherit;line-height:1.4;transition:.18s;}
.gengo-bunka-x:hover{border-color:#8a4a32;}
.gengo-bunka-list{flex:1;overflow-y:auto;padding:10px 20px 14px;scrollbar-width:thin;}
.gengo-bunka-list::-webkit-scrollbar{width:7px;}
.gengo-bunka-list::-webkit-scrollbar-thumb{background:rgba(74,59,40,.3);border-radius:4px;}
.gengo-bunka-row{margin:0;padding:8px 2px 9px;border-bottom:1px dashed rgba(74,59,40,.28);
  font-size:13px;line-height:1.85;letter-spacing:.03em;}
.gengo-bunka-row:last-child{border-bottom:none;}
.gengo-bunka-arrow{color:#8a4a32;margin:0 .35em;}
.gengo-bunka-meta{display:block;font-size:11px;color:#7a6a52;letter-spacing:.06em;}
.gengo-bunka-worm{margin:0 0 4px;font-size:11px;color:#7a6a52;font-style:italic;text-align:center;
  padding:6px 0;}
.gengo-bunka-empty{padding:34px 12px;text-align:center;color:#7a6a52;font-size:12.5px;
  letter-spacing:.1em;line-height:2.2;}
.gengo-bunka-foot{padding:10px 18px 12px;border-top:1.5px solid rgba(74,59,40,.35);
  font-size:11.3px;color:#7a6a52;letter-spacing:.05em;line-height:1.9;text-align:center;}
`;
document.head.append(style);

// ---------------------------------------------------------------- modal
const overlay = document.createElement("div");
overlay.className = "gengo-bunka-overlay";
overlay.innerHTML = `
  <div class="gengo-bunka-modal" role="dialog" aria-label="古語辞典">
    <div class="gengo-bunka-head">
      <div class="gengo-bunka-title">古語辞典</div>
      <div class="gengo-bunka-sub"></div>
      <button class="gengo-bunka-x" type="button" aria-label="閉じる">✕</button>
    </div>
    <div class="gengo-bunka-list"></div>
    <div class="gengo-bunka-foot">発音の変化に理由はない。あえて言えば、口が疲れたのである</div>
  </div>`;
document.body.append(overlay);
const listEl = overlay.querySelector(".gengo-bunka-list");
const subEl  = overlay.querySelector(".gengo-bunka-sub");

function civLabel(g){
  try{
    if(g.civ && g.civ.name) return g.civ.name;     // 現在の呼び名で引く
  }catch(_){ }
  return g.new;
}

function renderModal(){
  try{
    subEl.textContent = glossary.length ? `失われた呼び名、${glossary.length}語を収める` : "国々の名の、移ろいの記録";
    if(!glossary.length){
      listEl.innerHTML = `<div class="gengo-bunka-empty">まだ誰の口も疲れていない。</div>`;
      return;
    }
    let h = "";
    if(glossTrimmed) h += `<p class="gengo-bunka-worm">（これより古い${glossTrimmed}語は、写本の余白ごと失われた）</p>`;
    for(const g of glossary){
      h += `<p class="gengo-bunka-row">${esc(g.old)}<span class="gengo-bunka-arrow">→</span>${esc(g.new)}` +
        `<span class="gengo-bunka-meta">（${g.year|0}年ごろ・${esc(civLabel(g))}）</span></p>`;
    }
    listEl.innerHTML = h;
  }catch(err){ console.error(TAG, "render", err); }
}

function openModal(){ renderModal(); overlay.classList.add("gengo-bunka-open"); listEl.scrollTop = 0; }
function closeModal(){ overlay.classList.remove("gengo-bunka-open"); }

overlay.addEventListener("pointerdown", e => { if(e.target === overlay) closeModal(); });
overlay.querySelector(".gengo-bunka-x").addEventListener("click", closeModal);
document.addEventListener("keydown", e => {
  try{ if(e.key === "Escape" && overlay.classList.contains("gengo-bunka-open")) closeModal(); }
  catch(err){ console.error(TAG, err); }
});

try{
  R.addButton("📖 古語辞典", () => { try{ openModal(); }catch(err){ console.error(TAG, "open", err); } });
}catch(err){ console.error(TAG, "addButton", err); }
})();
</script>

<script>
// ════ plugin: kokka (wave2) ════ Plugin 国歌 (kokka). Paste into its own <script> tag after the existing plugin blocks in chronicle/index.html. Composition is fully deterministic per civ name (FN
(()=>{ "use strict";
if(!window.REKISHI) return;
const R = window.REKISHI;
const TAG = "[kokka]";
try{

// ================================================================ helpers
const esc = s => String(s==null?"":s).replace(/[&<>"']/g, c =>
  ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
function hash(str){
  let h = 2166136261 >>> 0;
  for(let i=0;i<str.length;i++){ h ^= str.charCodeAt(i); h = Math.imul(h, 16777619); }

}
function mulberry(seed){

    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
const midiHz = m => 440 * Math.pow(2, (m - 69) / 12);

const TITLES = [
  c=>`${c.deity}にささげる行進曲`,
  ()=>`やや長い賛歌`,
  ()=>`起床のための頌歌`,
  c=>`${c.name}よ永遠なれ（暫定版）`,
  ()=>`税を納める日の歌`,
  ()=>`勝利、もしくは引き分けの歌`,
  c=>`${c.deity}は聴いておられる（はず）`,
  ()=>`二番から始まる行進曲`,
  ()=>`麦と塩と、その他いっさいのための頌歌`,
];
const LYRICS = [
  c=>`♪ ああ ${c.name}よ ${c.name}よ（以下くりかえし）`,
  c=>`♪ ${c.deity}は今日も だいたい われらとともに`,
  ()=>`♪ 起てよ民 起てなくてもよい 座ったままでよい`,
  c=>`♪ ${c.name}の旗は 洗うと少し縮む`,
  ()=>`♪ 麦よ実れ 隣の麦も まあ実れ`,
  ()=>`♪ 山より高く 井戸より深く 税はほどほどに`,
  ()=>`♪ 進め進め 道はまだないが 進め`,
];
const SLOW_NOTE = "亡国の歌は、なぜか少しゆっくり聞こえる";

// temperament -> scale (semitones from root)
const SCALES = {
  "好戦的":   [0,2,3,5,7,8,11],   // harmonic minor
  "商人気質": [0,2,4,5,7,9,11],   // major
  "詩人肌":   [0,2,4,7,9],        // major pentatonic
  "慎重":     [0,2,3,5,7,9,10],   // dorian
  "大食らい": [0,2,4,5,7,9,10],   // mixolydian
  "心配性":   [0,2,3,5,7,8,10],   // natural minor
  "凝り性":   [0,2,4,6,7,9,11],   // lydian
  "朝型":     [0,4,5,7,11],       // ryukyu
  "祭り好き": [0,3,5,7,10],       // minor pentatonic
  "記録魔":   [0,2,4,5,7,9,11],   // major (filed correctly)
};
const DEFAULT_SCALE = [0,2,4,5,7,9,11];

// title + lyric: generated once per civ name, deterministic
const anthemCache = new Map();
function anthemOf(civ){
  let a = anthemCache.get(civ.name);
  if(!a){
    const r = mulberry(hash(String(civ.name)) ^ 0xA5A5A5);
    a = { title: TITLES[(r()*TITLES.length)|0](civ),
          lyric: LYRICS[(r()*LYRICS.length)|0](civ) };
    anthemCache.set(civ.name, a);
  }
  return a;
}

// ================================================================ composer
function compose(civ){
  const r = mulberry(hash(String(civ.name)));
  const scale = SCALES[civ.temperament] || DEFAULT_SCALE;
  const root = 57 + ((r()*7)|0);              // A3..D#4
  const count = 10 + ((r()*5)|0);             // 10-14 notes
  const notes = [];
  let t = 1, deg = 0;                         // 1 beat of drone+tick lead-in
  for(let i=0; i<count-2; i++){
    const beats = r() < .42 ? .5 : 1;         // eighth / quarter mix
    notes.push({t, beats, deg});
    t += beats;
    const mv = r();
    if(mv < .15) deg += 3;                    // small leap up
    else if(mv < .27) deg -= 3;
    else deg += ((r()*5)|0) - 2;              // walk -2..+2
    if(deg > 9) deg = 9 - ((r()*4)|0);
    if(deg < -3) deg = -3 + ((r()*3)|0);
  }
  while(t < 7){                               // pad short pieces toward ~8s
    const beats = r() < .5 ? .5 : 1;
    notes.push({t, beats, deg});
    t += beats;
    deg += ((r()*3)|0) - 1;
  }
  notes.push({t, beats:1, deg:1}); t += 1;    // cadence: step down...
  notes.push({t, beats:2, deg:0}); t += 2;    // ...land on the tonic, held
  const total = t + .5;
  const L = scale.length;
  for(const n of notes){
    const oct = Math.floor(n.deg / L), idx = ((n.deg % L) + L) % L;
    n.midi = root + oct*12 + scale[idx];
  }
  // pick tempo (84-120) so the whole thing lands near 7-9 s
  const lo = Math.max(84, Math.ceil(total*60/9));
  const hi = Math.max(lo, Math.min(120, Math.floor(total*60/7)));
  return {notes, total, root, tempo: lo + ((r()*(hi - lo + 1))|0)};
}

// ================================================================ audio
let ctx = null, tickBuf = null, current = null;
function ensureCtx(){
  if(ctx) return true;
  try{
    const AC = window.AudioContext || window.webkitAudioContext;
    if(!AC) return false;
    ctx = new AC();
    return true;
  }catch(err){ console.error(TAG, "ctx", err); return false; }
}
function getTickBuf(){
  if(tickBuf) return tickBuf;
  const len = Math.max(1, (ctx.sampleRate * .04) | 0);
  tickBuf = ctx.createBuffer(1, len, ctx.sampleRate);
  const d = tickBuf.getChannelData(0);
  for(let i=0;i<len;i++) d[i] = (Math.random()*2 - 1) * Math.pow(1 - i/len, 2);
  return tickBuf;
}

function stopCurrent(){
  const cur = current;
  if(!cur) return;
  current = null;
  try{ clearTimeout(cur.timer); }catch(_){}
  for(const a of cur.anims){ try{ a.cancel(); }catch(_){} }
  try{
    const now = ctx.currentTime;
    cur.master.gain.cancelScheduledValues(now);
    cur.master.gain.setTargetAtTime(.0001, now, .05);
  }catch(_){}
  for(const o of cur.oscs){ try{ o.stop(ctx.currentTime + .3); }catch(_){} }
  setTimeout(()=>{ try{ cur.master.disconnect(); }catch(_){} }, 900);
  try{ R.emit("kokka:stop", {civ: cur.civ}); }catch(_){}
}

function play(civ){
  stopCurrent();
  if(!civ) return;
  if(!ensureCtx()){ try{ R.toast("この大陸に、楽器はまだ発明されていない"); }catch(_){} return; }
  try{ if(ctx.state === "suspended") ctx.resume(); }catch(_){}
  try{
    const piece = compose(civ);
    const tempo = piece.tempo * (civ.alive ? 1 : .85);   // the dead sing slower
    const spb = 60 / tempo;
    const t0 = ctx.currentTime + .08;
    const tEnd = t0 + piece.total * spb;
    const master = ctx.createGain();
    master.gain.value = .9;
    master.connect(ctx.destination);
    const oscs = [];

    // melody: quiet square through a lowpass
    const lp = ctx.createBiquadFilter();
    lp.type = "lowpass"; lp.frequency.value = 1700; lp.Q.value = .6;
    const mg = ctx.createGain(); mg.gain.value = 0;
    const mo = ctx.createOscillator(); mo.type = "square";
    mo.connect(lp); lp.connect(mg); mg.connect(master);
    for(const n of piece.notes){
      const a = t0 + n.t*spb, b = a + n.beats*spb;
      mo.frequency.setValueAtTime(midiHz(n.midi), a);
      mg.gain.setValueAtTime(.0001, a);
      mg.gain.linearRampToValueAtTime(.055, a + .025);
      mg.gain.setValueAtTime(.055, Math.max(a + .03, b - .08));
      mg.gain.linearRampToValueAtTime(.0001, b - .015);
    }
    mo.start(t0); mo.stop(tEnd + .2); oscs.push(mo);

    // drone: triangle root + fifth, an octave down
    for(const dm of [piece.root - 12, piece.root - 5]){
      const o = ctx.createOscillator();
      o.type = "triangle"; o.frequency.value = midiHz(dm);
      const g = ctx.createGain();
      g.gain.setValueAtTime(.0001, t0);
      g.gain.linearRampToValueAtTime(.022, t0 + .5);
      g.gain.setValueAtTime(.022, Math.max(t0 + .5, tEnd - .9));
      g.gain.linearRampToValueAtTime(.0001, tEnd);
      o.connect(g); g.connect(master);
      o.start(t0); o.stop(tEnd + .1); oscs.push(o);
    }

    // soft tick pulse on each beat
    const buf = getTickBuf();
    for(let b=0; b < piece.total - .01; b++){
      const src = ctx.createBufferSource(); src.buffer = buf;
      const bp = ctx.createBiquadFilter();
      bp.type = "bandpass"; bp.frequency.value = 1900; bp.Q.value = 1.4;
      const g = ctx.createGain(); g.gain.value = (b % 2 === 0) ? .05 : .03;
      src.connect(bp); bp.connect(g); g.connect(master);
      src.start(t0 + b*spb);
    }

    // gentle pulse on territory + cities (WAAPI: wall-time driven)
    const anims = [];
    try{
      if(civ.tEl) anims.push(civ.tEl.animate(
        [{opacity:1},{opacity:.4},{opacity:1}],
        {duration:1600, iterations:Infinity, easing:"ease-in-out"}));
      if(civ.el && civ.alive) anims.push(civ.el.animate(
        [{opacity:1},{opacity:.6},{opacity:1}],
        {duration:1600, iterations:Infinity, easing:"ease-in-out"}));
    }catch(err){ console.error(TAG, "pulse", err); }

    const token = {};
    const timer = setTimeout(()=>{
      try{
        if(current && current.token === token){ stopCurrent(); renderIfOpen(); }
      }catch(err){ console.error(TAG, err); }
    }, (tEnd - ctx.currentTime)*1000 + 350);
    current = {civ, master, oscs, anims, timer, token};
    try{ R.emit("kokka:play", {civ}); }catch(_){}
  }catch(err){ console.error(TAG, "play", err); stopCurrent(); }
}

const subEl = overlay.querySelector(".kokka-sub");
let isOpen = false, dockBtn = null;

function rowHTML(c){
  const a = anthemOf(c);
  const playing = current && current.civ === c;
  const slow = c.alive ? "" : `<div class="kokka-slow">${esc(SLOW_NOTE)}</div>`;
  return `<div class="kokka-row${c.alive ? "" : " kokka-dead"}${playing ? " kokka-playing" : ""}" data-kokka-id="${c.id|0}">
    <span class="kokka-chip" style="background:${esc(c.color)}"></span>

    </div>
    <button class="kokka-play" type="button" aria-label="演奏">${playing ? "■" : "▶"}</button>
  </div>`;
}

function render(){
  try{
    const all = (R.civs || []).filter(c => c && c.name);
    const living = all.filter(c => c.alive);
    const dead = all.filter(c => !c.alive).reverse();
    subEl.textContent = `諸国の歌、ここに集む ― 現存${living.length}曲・旧${dead.length}曲`;
    if(!all.length){
      listEl.innerHTML = `<div class="kokka-empty">まだ国がなく、したがって国歌もない。<br>大陸はいま、風の音だけを演奏している。</div>`;
      return;
    }
    let html = living.map(rowHTML).join("");
    if(dead.length){
      html += `<div class="kokka-deadhead">― 旧国歌 ―</div>`;
      html += dead.slice(0, 30).map(rowHTML).join("");
      if(dead.length > 30) html += `<div class="kokka-empty">（これより古い歌は、楽譜ごと失われた）</div>`;
    }
    const st = listEl.scrollTop;
    listEl.innerHTML = html;
    listEl.scrollTop = st;
  }catch(err){ console.error(TAG, "render", err); }
}
function renderIfOpen(){ if(isOpen) render(); }

listEl.addEventListener("click", e => {
  try{
    const btn = e.target && e.target.closest ? e.target.closest(".kokka-play") : null;
    if(!btn) return;
    const row = btn.closest("[data-kokka-id]");
    if(!row) return;
    const id = +row.getAttribute("data-kokka-id");
    const civ = (R.civs || []).find(c => c && c.id === id);
    if(!civ) return;
    if(current && current.civ === civ) stopCurrent();   // toggle off
    else play(civ);                                     // the click is the gesture
    render();
  }catch(err){ console.error(TAG, "click", err); }
});

function openPanel(){ isOpen = true; render(); overlay.classList.add("kokka-open"); if(dockBtn) dockBtn.classList.add("active"); }
function closePanel(){ isOpen = false; overlay.classList.remove("kokka-open"); if(dockBtn) dockBtn.classList.remove("active"); }

overlay.addEventListener("pointerdown", e => { if(e.target === overlay) closePanel(); });
overlay.querySelector(".kokka-close").addEventListener("click", () => { try{ closePanel(); }catch(err){ console.error(TAG, err); } });
document.addEventListener("keydown", e => {
  try{ if(e.key === "Escape" && isOpen) closePanel(); }catch(err){ console.error(TAG, err); }
});

  catch(err){ console.error(TAG, "toggle", err); }
});

}catch(err){ console.error(TAG, "init failed", err); }
})();

const noTail = t => String(t).replace(/[。．]\s*$/, "");

      <button type="button" class="kodan-stop">やめる</button>
    </div>
    <div class="kodan-line"></div>
  </div>`;
document.body.append(stage);
const lineEl  = stage.querySelector(".kodan-line");
const countEl = stage.querySelector(".kodan-count");
const papEl   = stage.querySelector(".kodan-pap");
stage.querySelector(".kodan-stop").addEventListener("click", ()=>{
  try{ stopPerform(true); }catch(err){ console.error(TAG, "stop", err); }
});

// ------------------------------------------------------- 張り扇 (WebAudio)
let actx = null;
function audio(){
  if(actx) return actx;
  try{
    const AC = window.AudioContext || window.webkitAudioContext;
    if(AC) actx = new AC();
  }catch(err){ console.error(TAG, "audio", err); actx = null; }
  return actx;
}
function burst(ctx, at){
  const dur = .05;
  const buf = ctx.createBuffer(1, Math.max(1, Math.round(ctx.sampleRate*dur)), ctx.sampleRate);
  const d = buf.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i] = (Math.random()*2-1)*Math.pow(1 - i/d.length, 2.2);
  const src = ctx.createBufferSource(); src.buffer = buf;
  const f = ctx.createBiquadFilter(); f.type = "bandpass"; f.frequency.value = 2100; f.Q.value = .7;
  const g = ctx.createGain();
  g.gain.setValueAtTime(.0001, at);
  g.gain.exponentialRampToValueAtTime(.16, at + .005);   // 控えめな張り扇
  g.gain.exponentialRampToValueAtTime(.0001, at + dur);
  src.connect(f); f.connect(g); g.connect(ctx.destination);
  src.start(at); src.stop(at + dur + .03);
}
function papan(){
  try{
    const ctx = audio();
    if(ctx){
      if(ctx.state === "suspended"){ const p = ctx.resume(); if(p && p.catch) p.catch(()=>{}); }
      const t = ctx.currentTime + .02;
      burst(ctx, t); burst(ctx, t + .115);               // 二打で「パパン」
    }
    try{
      papEl.animate([{opacity:0},{opacity:1,offset:.15},{opacity:1,offset:.55},{opacity:0}],
        {duration:520, easing:"ease-out"});
    }catch(_){}
  }catch(err){ console.error(TAG, "papan", err); }
}

// --------------------------------------------------------------------- TTS
const hasTTS = typeof window.speechSynthesis !== "undefined"
            && typeof window.SpeechSynthesisUtterance === "function";
let voiceJa = null;
function findVoice(){
  try{
    if(!hasTTS) return;
    const vs = window.speechSynthesis.getVoices() || [];
    voiceJa = vs.find(v => v && /^ja(-|_|$)/i.test(v.lang || "")) || null;
  }catch(err){ console.error(TAG, "voices", err); }
}
if(hasTTS){
  findVoice();
  try{ window.speechSynthesis.addEventListener("voiceschanged", findVoice); }
  catch(_){ try{ window.speechSynthesis.onvoiceschanged = findVoice; }catch(__){} }
}

// ----------------------------------------------- performance state machine
// 進行は壁時計（performance.now）基準。TTSの onend が本線、deadline は保険。
let performing = false, usingTTS = false;
let lines = [], idx = -1, phase = "pre", deadline = 0, lineStart = 0, ticker = null;
let dockBtn = null;

const timedMs = t => Math.max(1300, t.length * 170);     // TTSなしの間合い

function setLine(text){
  lineEl.textContent = text;
  countEl.textContent = `${idx+1}／${lines.length}`;
  try{
    lineEl.animate([{opacity:0, transform:"translateY(4px)"},{opacity:1, transform:"none"}],
      {duration:240, easing:"ease-out"});
  }catch(_){}
}

function speakLine(text, i){
  try{
    const u = new SpeechSynthesisUtterance(text);
    u.lang = "ja-JP"; u.rate = 1.05; u.pitch = 1.02; u.volume = .9;
    if(voiceJa) u.voice = voiceJa;
    u.onend = ()=>{ if(performing && idx === i && phase === "line") toGap(); };
    u.onerror = ()=>{                                    // 喉の不調。以後は字幕の間で進む
      if(!performing || idx !== i || phase !== "line") return;
      usingTTS = false;
      deadline = lineStart + timedMs(text);
    };
    window.speechSynthesis.speak(u);
  }catch(err){
    console.error(TAG, "speak", err);
    usingTTS = false;
    deadline = lineStart + timedMs(text);
  }
}

function startLine(i){
  idx = i; phase = "line"; lineStart = performance.now();
  const text = lines[i];
  setLine(text);
  if(usingTTS){
    deadline = lineStart + text.length * 360 + 4500;     // 詰まったときの保険
    speakLine(text, i);
  } else {
    deadline = lineStart + timedMs(text);
  }
}

function toGap(){
  phase = "gap";
  const lastLine = idx >= lines.length - 1;
  if(!lastLine) papan();                                 // 行間に一発「パパン」
  deadline = performance.now() + (lastLine ? 1100 : 430);
}

function tick(){
  try{
    if(!performing || performance.now() < deadline) return;
    if(phase === "pre"){ startLine(0); }
    else if(phase === "line"){
      if(usingTTS){ try{ window.speechSynthesis.cancel(); }catch(_){} }
      toGap();
    }
    else if(phase === "gap"){
      if(idx >= lines.length - 1) stopPerform(false);
      else startLine(idx + 1);
    }
  }catch(err){ console.error(TAG, "tick", err); stopPerform(false); }
}

function perform(){
  try{
    if(performing){ R.toast("ただいま高座の最中でございます"); return; }
    if(log.length < 3){ R.toast("語るほどの歴史が、まだありません"); return; }
    lines = composeScript();
    performing = true;
    usingTTS = hasTTS;
    if(hasTTS){ try{ window.speechSynthesis.cancel(); }catch(_){} }
    if(dockBtn) dockBtn.classList.add("active");
    lineEl.textContent = "";
    countEl.textContent = "";
    stage.classList.add("kodan-on");
    idx = -1; phase = "pre";
    papan();                                             // 開幕の一打（最初のユーザー操作＝音声の解禁）
    deadline = performance.now() + 560;
    if(ticker){ clearInterval(ticker); }
    ticker = setInterval(tick, 90);
    try{ selfWrite = true; R.write(R.pick(P_STAGE), "civic"); }
    catch(err){ console.error(TAG, "stage-write", err); }
    finally{ selfWrite = false; }
  }catch(err){
    console.error(TAG, "perform", err);
    stopPerform(false);
  }
}

function stopPerform(byUser){
  performing = false;
  if(ticker){ clearInterval(ticker); ticker = null; }
  if(hasTTS){ try{ window.speechSynthesis.cancel(); }catch(_){} }
  stage.classList.remove("kodan-on");
  if(dockBtn) dockBtn.classList.remove("active");
  if(byUser){ try{ R.toast("講談師は一礼して、高座を下りました"); }catch(_){} }
}

document.addEventListener("keydown", e=>{
  try{ if(e.key === "Escape" && performing) stopPerform(true); }
  catch(err){ console.error(TAG, "esc", err); }
});

// ------------------------------------------------------------- dock button
try{
  dockBtn = R.addButton("🎙 講談", ()=>{ try{ perform(); }catch(err){ console.error(TAG, err); } });
}catch(err){ console.error(TAG, "addButton", err); }
})();
</script>

<script>
// ════ plugin: kairyu-bin (wave3) ════ Plugin "kairyu-bin" (🌊 海流便, chronicle side). Paste verbatim into its own <script> tag at the end of chronicle/index.h
(()=>{ "use strict";
// ════ plugin: kairyu-bin (wave3) ════ 🌊 海流便（年代記側） — 大陸の浜に、よその世界の便りが流れ着く
if(!window.REKISHI) return;
const R = window.REKISHI;
const TAG = "[kairyu-bin]";

// ------------------------------------------------ protocol constants
const SELF = "chronicle";
const OTHERS = ["aquarium", "island"];
const CH_NAME = "sandbox-kairyu-v1";
const INBOX = n => "kairyu-inbox-" + n;
const INBOX_CAP = 20;
const PORTS = {
  aquarium:  {icon:"🐠", name:"深海の水槽"},
  island:    {icon:"🏝", name:"沖の島々"},
  chronicle: {icon:"📜", name:"この大陸"},
};
const GLYPH = {creature:"🐟", bottle:"🍶", specialty:"📦", page:"📜"};

const esc = s => String(s==null?"":s).replace(/[&<>"']/g, c =>
  ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const clean = (v, n, fb) => {
  const s = String(v==null?"":v).replace(/\s+/g," ").trim();
  return s ? s.slice(0, n) : fb;
};
function fmtTime(v){
  try{
    const d = v == null ? new Date() : new Date(v);
    if(isNaN(d.getTime())) return "—";
    return String(d.getHours()).padStart(2,"0") + ":" + String(d.getMinutes()).padStart(2,"0");
  }catch(_){ return "—"; }
}

// ------------------------------------------------ storage (degrade gracefully)
let lsOK = false;
try{ localStorage.setItem("kairyu-probe","1"); localStorage.removeItem("kairyu-probe"); lsOK = true; }
catch(err){ console.error(TAG, "書庫（localStorage）が使えない。潮の便りは生身のみ", err); }

function loadBox(name){
  if(!lsOK) return [];
  try{
    const arr = JSON.parse(localStorage.getItem(INBOX(name)) || "[]");
    return Array.isArray(arr) ? arr : [];
  }catch(err){ console.error(TAG, "loadBox", err); return []; }
}
function saveBox(name, arr){
  if(!lsOK) return;
  try{ localStorage.setItem(INBOX(name), JSON.stringify(arr)); }
  catch(err){ console.error(TAG, "saveBox", err); }
}

let channel = null;
try{ if(typeof BroadcastChannel !== "undefined") channel = new BroadcastChannel(CH_NAME); }
catch(err){ console.error(TAG, "BroadcastChannel", err); }

// ------------------------------------------------ state
const seen = new Set();      // 処理済み封筒id
const inLog = [];            // 受信録 {icon, sum, time} 新しい順
const outLog = [];           // 発信録
const places = [];           // 異邦地名録 {name, note, year}
const placeNames = new Set();
const recent = [];           // 年代記の近況（送る頁の種）
let selfWriting = false;
let isOpen = false, dockBtn = null;

// ------------------------------------------------ rolling chronicle log
R.on("written", e => {
  try{
    if(selfWriting) return;
    if(!e || typeof e.text !== "string" || !e.text) return;
    if(e.type === "era") return;                                // 幕間の線は送らない
    if(e.text.indexOf("（なお、先の記述は") === 0) return;       // 検閲官の追記も送らない
    recent.push({year: e.year|0, text: e.text});
    while(recent.length > 24) recent.shift();
  }catch(err){ console.error(TAG, "written", err); }
});

function writeSelf(text, type){
  selfWriting = true;
  try{ R.write(text, type); }catch(err){ console.error(TAG, "write", err); }
  finally{ selfWriting = false; }
}

// ------------------------------------------------ coast finding & marker
function coastalPoint(){
  try{
    const W = R.W, H = R.H;
    if(!W || !H) return null;
    const cx = W*.5, cy = H*.52, R0 = Math.max(W, H)*.62;
    for(let t=0; t<24; t++){
      const a = Math.random()*Math.PI*2;
      for(let s=0; s<64; s++){                       // 沖から岸へ歩み寄り、最初の陸＝浜
        const f = 1 - s/64;
        const x = cx + Math.cos(a)*R0*f, y = cy + Math.sin(a)*R0*f;
        if(x<8 || y<8 || x>W-8 || y>H-8) continue;
        if(R.inLand(x, y)) return {x, y};
      }
    }
  }catch(err){ console.error(TAG, "coastalPoint", err); }
  return null;
}

function dropMarker(kind){
  try{
    const pt = coastalPoint();
    if(!pt) return;
    const g = R.mk("g", {opacity:0, "pointer-events":"none"});
    const halo = R.mk("circle", {cx:pt.x, cy:pt.y, r:9.5, fill:"none",
      stroke:"#7d99a8", "stroke-width":1, opacity:.55});
    const t = R.mk("text", {x:pt.x, y:pt.y+4, "text-anchor":"middle", "font-size":12});
    t.textContent = GLYPH[kind] || "🌊";
    g.append(halo, t);
    R.gFx.append(g);
    const fade = g.animate(
      [{opacity:0},{opacity:.92, offset:.03},{opacity:.92, offset:.85},{opacity:0}],
      {duration:120000, easing:"linear", fill:"forwards"});       // 実時間で約2分
    fade.onfinish = ()=>{ try{ g.remove(); }catch(_){} };
    t.animate([{transform:"translateY(0px)"},{transform:"translateY(-3px)"},{transform:"translateY(0px)"}],
      {duration:2700, iterations:Infinity, easing:"ease-in-out"});
    halo.animate([{opacity:.55},{opacity:.15},{opacity:.55}],
      {duration:2700, iterations:Infinity, easing:"ease-in-out"});
    setTimeout(()=>{ try{ if(g.isConnected) g.remove(); }catch(_){} }, 126000);
  }catch(err){ console.error(TAG, "dropMarker", err); }
}

// ------------------------------------------------ civ helpers
function isCoastCity(ct){
  for(let i=0;i<8;i++){
    const a = i/8*Math.PI*2;
    if(!R.inLand(ct.x + Math.cos(a)*55, ct.y + Math.sin(a)*55)) return true;
  }
  return false;
}
function coastalCiv(){
  try{
    const cands = (R.civs||[]).filter(c => c && c.alive && (c.cities||[]).some(isCoastCity));
    return cands.length ? R.pick(cands) : null;
  }catch(err){ console.error(TAG, "coastalCiv", err); return null; }
}
function aliveCiv(){
  const al = (R.civs||[]).filter(c => c && c.alive);
  return al.length ? R.pick(al) : null;
}
function addPlace(name, note){
  const n = clean(name, 24, "");
  if(!n || placeNames.has(n)) return;
  placeNames.add(n);
  places.push({name:n, note: note||"", year: R.year|0});
  while(places.length > 40){ const d = places.shift(); placeNames.delete(d.name); }
}

// ------------------------------------------------ arrival handlers
function fmtLen(v){
  if(typeof v === "number" && isFinite(v)) return (Math.round(v*10)/10) + "メートル";
  return clean(v, 16, "ほどほどの長さ");
}
function handleCreature(p){
  const name = clean(p.name, 24, "名無しの大魚");
  writeSelf(`海より奇妙なるもの上がる。漁師はこれを「${name}」と呼んだ（${fmtLen(p.lenM)}、と主張する者もいる）。学者は三日見つめて、海に返した。`, "civic");
  if(Math.random() < .25){
    const c = coastalCiv();
    if(c && c.alive) writeSelf(`${c.name}では、${name}の目撃が豊漁の前触れとされるようになった。`, "civic");
  }
  return `海の獣「${name}」の知らせ、浜に上がる`;
}
function handleBottle(p){
  const msg = clean(p.message, 80, "……（潮に滲んで読めない）");
  const isle = clean(p.fromIsland, 24, "名も知れぬ島");
  writeSelf(`浜に瓶、流れ着く。中の手紙に曰く——「${msg}」。${isle}なる土地は、いずれの地図にも見えない。`, "trade");
  const vil = clean(p.fromVillage, 24, "");
  addPlace(isle, vil ? `${vil}の民の瓶より` : "瓶の手紙より");
  return `${isle}より瓶の手紙`;
}
function handleSpecialty(p){
  const name = clean(p.name, 24, "何かの干物");
  if(p.island) addPlace(p.island, "名産の産地と伝わる");
  const c = aliveCiv();
  if(c){
    writeSelf(`異国より「${name}」なる品、伝わる。${c.name}の市場では三日で偽物が出回った。`, "trade");
    if(Math.random() < .3 && c.alive){
      writeSelf(`のちに${c.name}では、${name}を模して作ることが祭りの習いとなった。`, "civic");
    }
  } else {
    writeSelf(`異国より「${name}」なる品、浜に流れ着く。受け取る民は、まだこの大陸にいない。`, "trade");
  }
  return `異国の名産「${name}」、伝来`;
}

function processEnvelope(env){
  try{
    if(!env || typeof env !== "object") return false;
    if(!env.id || env.to !== SELF || typeof env.type !== "string") return false;
    if(seen.has(env.id)) return false;
    seen.add(env.id);
    if(seen.size > 600){ for(const id of seen){ seen.delete(id); if(seen.size <= 300) break; } }
    const p = (env.payload && typeof env.payload === "object") ? env.payload : {};
    let sum;
    if(env.type === "creature")       sum = handleCreature(p);
    else if(env.type === "bottle")    sum = handleBottle(p);
    else if(env.type === "specialty") sum = handleSpecialty(p);
    else sum = `見慣れぬ漂着物（${clean(env.type, 16, "?")}）。浜の者は触らずにおいた`;
    dropMarker(env.type);
    const port = PORTS[env.from] || {icon:"🌊"};
    inLog.unshift({icon: port.icon, sum, time: fmtTime()});
    while(inLog.length > 30) inLog.pop();
    if(isOpen) render();
    try{ R.toast(`🌊 海流便 — ${sum}`); }catch(_){}
    try{ R.emit("kairyu:arrived", {from: env.from, type: env.type}); }catch(_){}
    return true;
  }catch(err){ console.error(TAG, "process", err); return false; }
}

// ------------------------------------------------ send
function makeId(){ return "chr-" + Date.now().toString(36) + "-" + Math.random().toString(36).slice(2,9); }
function send(to, type, payload){
  const env = {id: makeId(), from: SELF, to, type, payload, sentAt: new Date().toISOString()};
  try{
    const arr = loadBox(to);
    arr.push(env);
    while(arr.length > INBOX_CAP) arr.shift();
    saveBox(to, arr);
  }catch(err){ console.error(TAG, "send/queue", err); }
  if(channel){ try{ channel.postMessage(env); }catch(err){ console.error(TAG, "send/post", err); } }
  return env;
}
function sendPage(){
  if(!recent.length) return false;
  const entry = R.pick(recent);
  const to = R.pick(OTHERS);
  send(to, "page", {year: R.year, era: R.era, text: entry.text});
  const port = PORTS[to] || {icon:"🌊", name:String(to)};
  outLog.unshift({icon: port.icon, sum: `${entry.year|0}年の頁を一葉、${port.name}へ`, time: fmtTime()});
  while(outLog.length > 30) outLog.pop();
  if(isOpen) render();
  try{ R.emit("kairyu:sent", {to, type:"page"}); }catch(_){}
  return true;
}

// ------------------------------------------------ receive wiring
if(channel){
  channel.onmessage = ev => {
    try{
      const env = ev && ev.data;
      if(!env || env.to !== SELF) return;
      if(lsOK && env.id){                       // 放送前に書庫へ積まれた分は取り下げる
        try{
          const arr = loadBox(SELF);
          const kept = arr.filter(e => !(e && e.id === env.id));
          if(kept.length !== arr.length) saveBox(SELF, kept);
        }catch(err){ console.error(TAG, "dequeue", err); }
      }
      processEnvelope(env);
    }catch(err){ console.error(TAG, "onmessage", err); }
  };
}
function drainInbox(){
  if(!lsOK) return;
  try{
    const arr = loadBox(SELF);
    if(!arr.length) return;
    const mine = arr.filter(e => e && typeof e === "object" && e.id && e.to === SELF && !seen.has(e.id));
    saveBox(SELF, []);                          // 受け取った分（と難破物）を浜から引き上げる
    mine.forEach((env, i) => {
      setTimeout(()=>{ try{ processEnvelope(env); }catch(err){ console.error(TAG, err); } }, 600 + i*1100);
    });
  }catch(err){ console.error(TAG, "drain", err); }
}
setTimeout(drainInbox, 1200);

// 自動送信：助走60〜120秒ののち、3〜6分ごとに一通（種があれば）
function scheduleAuto(ms){
  setTimeout(()=>{
    try{ if(recent.length) sendPage(); }catch(err){ console.error(TAG, "auto", err); }
    scheduleAuto(180000 + Math.random()*180000);
  }, ms);
}
scheduleAuto(60000 + Math.random()*60000);

// ------------------------------------------------ css
const style = document.createElement("style");
style.textContent = `

  background:rgba(42,32,18,.45);}

  border-bottom:1px solid rgba(74,59,40,.25);padding-bottom:3px;}

  border-bottom:1px dashed rgba(74,59,40,.22);font-size:12.4px;line-height:1.8;}

.kairyu-bin-time{flex:none;font-size:10.5px;color:#7a6a52;letter-spacing:.05em;}
.kairyu-bin-empty{padding:9px 4px;color:#7a6a52;font-style:italic;font-size:11.8px;letter-spacing:.06em;}
.kairyu-bin-places{padding:6px 2px 2px;font-size:12.2px;line-height:2.1;}
.kairyu-bin-place{display:inline-block;margin:0 12px 2px 0;border-bottom:1px dotted rgba(74,59,40,.55);cursor:help;}
.kairyu-bin-foot{padding:9px 14px;border-top:1.5px solid rgba(74,59,40,.35);display:flex;gap:10px;align-items:center;}
.kairyu-bin-flow{cursor:pointer;border:1.5px solid rgba(74,59,40,.35);background:rgba(236,225,196,.92);
  color:#4a3b28;border-radius:8px;padding:6px 13px;font-size:12.5px;font-family:inherit;font-weight:600;
  letter-spacing:.06em;transition:.18s;}
.kairyu-bin-flow:hover{border-color:#8a4a32;transform:translateY(-1px);}
.kairyu-bin-stat{flex:1;text-align:right;font-size:10.5px;color:#7a6a52;letter-spacing:.06em;}
`;
document.head.append(style);

// ------------------------------------------------ modal
const overlay = document.createElement("div");
overlay.className = "kairyu-bin-overlay";
overlay.innerHTML = `
  <div class="kairyu-bin-modal" role="dialog" aria-label="海流便">
    <div class="kairyu-bin-head">海流便　— 潮のはこぶ便り —
      <button class="kairyu-bin-close" type="button" aria-label="閉じる">✕</button>
    </div>
    <div class="kairyu-bin-body">
      <div class="kairyu-bin-sec">受信録</div>
      <div class="kairyu-bin-in"></div>
      <div class="kairyu-bin-sec">発信録</div>
      <div class="kairyu-bin-out"></div>
      <div class="kairyu-bin-sec">異邦地名録</div>
      <div class="kairyu-bin-places"></div>
    </div>
    <div class="kairyu-bin-foot">
      <button class="kairyu-bin-flow" type="button">🌊 いま流す</button>
      <span class="kairyu-bin-stat"></span>
    </div>
  </div>`;
document.body.append(overlay);
const inEl = overlay.querySelector(".kairyu-bin-in");
const outEl = overlay.querySelector(".kairyu-bin-out");
const placesEl = overlay.querySelector(".kairyu-bin-places");
const statEl = overlay.querySelector(".kairyu-bin-stat");

function rowsHTML(log, emptyMsg){
  if(!log.length) return `<div class="kairyu-bin-empty">${emptyMsg}</div>`;
  return log.map(r => `<div class="kairyu-bin-row"><span class="kairyu-bin-ico">${esc(r.icon)}</span><span class="kairyu-bin-sum">${esc(r.sum)}</span><span class="kairyu-bin-time">${esc(r.time)}</span></div>`).join("");
}
function render(){
  try{
    inEl.innerHTML = rowsHTML(inLog, "まだ何も流れ着いていない。潮は気まぐれである。");
    outEl.innerHTML = rowsHTML(outLog, "まだ何も流していない。");
    placesEl.innerHTML = places.length
      ? places.slice().reverse().map(p =>
          `<span class="kairyu-bin-place" title="${esc(p.note)}（${esc(p.year)}年に知る）">${esc(p.name)}</span>`).join("")
      : `<div class="kairyu-bin-empty">異邦の地名は、まだ一つも知られていない。</div>`;
    statEl.textContent = lsOK
      ? `受信 ${inLog.length} ／ 発信 ${outLog.length}`
      : "書庫が使えないため、留守中の便りは届かない";
  }catch(err){ console.error(TAG, "render", err); }
}

function openModal(){ isOpen = true; render(); overlay.classList.add("kairyu-bin-open");
  if(dockBtn) dockBtn.classList.add("active"); }
function closeModal(){ isOpen = false; overlay.classList.remove("kairyu-bin-open");
  if(dockBtn) dockBtn.classList.remove("active"); }

overlay.addEventListener("pointerdown", e => { if(e.target === overlay) closeModal(); });
overlay.querySelector(".kairyu-bin-close").addEventListener("click", closeModal);
document.addEventListener("keydown", e => {
  try{ if(e.key === "Escape" && isOpen) closeModal(); }catch(err){ console.error(TAG, err); }
});
overlay.querySelector(".kairyu-bin-flow").addEventListener("click", () => {
  try{
    if(!recent.length){ R.toast("まだ流せる頁がない。歴史をしばらく待つこと"); return; }
    if(sendPage()) R.toast("頁を一葉、潮に流した");
  }catch(err){ console.error(TAG, "flow", err); }
});

try{
  dockBtn = R.addButton("🌊 海流便", () => {
    try{ isOpen ? closeModal() : openModal(); }catch(err){ console.error(TAG, "toggle", err); }
  });
}catch(err){ console.error(TAG, "addButton", err); }
})();
</script>

<script>
// ════ plugin: eiyu-jojishi (wave3) ════ Plugin "eiyu-jojishi" (🗡 英雄叙事詩) for chronicle/index.html — paste into its own <script> tag after the existing plugin 
(()=>{ "use strict";
// ════ plugin: eiyu-jojishi (wave3) ════ 🗡 英雄叙事詩 — 長い戦は、歌になる。
if(!window.REKISHI) return;
if(window.__JOJISHI_LOADED__) return;
window.__JOJISHI_LOADED__ = true;
const R = window.REKISHI;
const TAG = "[jojishi]";

const esc = s => String(s==null?"":s).replace(/[&<>"']/g, m =>
  ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));

// ---------------------------------------------------------------- corpora
const FLAIR = ["ガル","レン","ダイン","ファ","ロク","セム","ティル","ノア","バルド","リン","カイ","ウェン","ザール","モト"];
const EPITHET = ["鍋持ちの","遅れて来た","よく迷う","七つ川の","歌い負けぬ","靴を煮た","犬に好かれた","地図を持たぬ"];
const NUM_KANJI = ["零","一","二","三","四","五","六","七","八","九","十"];
const kanji = n => (n >= 1 && n <= 10) ? NUM_KANJI[n] : String(n);

const OPENERS = [
  (h,c,cause,ep)=>`${c}に${h}という者あり。${cause}のことで始まった戦に、鍋と歌だけを持って出た。`,
  (h,c,cause,ep)=>`${c}の${h}、戦に立つ。発端は${cause}と聞かされたが、本人は最後まで別の理由だと思っていた。`,
  (h,c,cause,ep)=>`のちに「${ep}${h}」と歌われる者、このとき畑にいた。${cause}の戦が、その鍬を槍に持ち替えさせた。`,
  (h,c,cause,ep)=>`${h}、${c}の門を出る。見送りは犬が一匹。詩人はのちに、これを千の群衆に書き直した。`,
];
const ST_SHIREN = [
  h=>`${h}、三日三晩歩いて道を間違える。詩人はここを最も美しく歌う。`,
  h=>`${h}、川を七度渡る。あとで数えれば同じ川であった。歌では七つの川になっている。`,
  h=>`${h}、山中で老婆に謎をかけられる。答えは伝わっていない。通してはもらえた。`,
  h=>`${h}、糧尽きて靴を煮る。歌ではこの椀が「最初の宴」と呼ばれる。`,
];
const ST_SENYU = [
  (h,k)=>`${h}、${k}という者と出会う。互いを敵と思い込み、三合打ち合ってから名乗り合った。`,
  (h,k)=>`${k}なる者、${h}の隣に並ぶ。理由を問われ「列が短かった」と答えた。歌では運命ということになっている。`,
  (h,k)=>`${h}に戦友あり。名を${k}。煮炊きの腕は軍一で、慕われたのはむしろこちらだったと伝わる。`,
];
const ST_URAGIRI = [
  h=>`${h}、信じた道案内に道を売られる。歌のこの段で、聴き手は毎度ため息をつく。`,
  h=>`味方のひとり、夜陰に敵へ走る。${h}は追わなかった。「歌が一節増えるだけだ」と言ったと伝わる。`,
  h=>`${h}、裏切りに遭う。裏切った者の名は、歌い手によって毎回違う。`,
];
const ST_KISAKU = [
  h=>`${h}、一計を案じる。かがり火を倍に焚き、軍を倍に見せた。敵は数えてから帰った。`,
  h=>`${h}の奇策、成る。羊の群れに旗を立てただけだが、夜目には大軍であった。`,
  h=>`${h}、敵将へ長い長い手紙を送る。敵将が返事を書いているあいだに、川を渡った。`,
];
const ST_KESSEN = [
  h=>`決戦の前夜、${h}はよく眠った。歌ではここで月が長々と語る。`,
  h=>`決戦の前夜、${h}は兵に歌をひとつ教えた。音程は揃わなかったが、翌朝の足並みは揃った。`,
  h=>`前夜、${h}は鍋を磨いていた。「帰って、返すものがある」とだけ言った。`,
];
const END_HOME = [
  (h,c)=>`${h}は帰郷し、鍋を返した。歌だけが返ってこなかった。いまも誰かが歌っているからである。`,
  (h,c)=>`戦は終わり、${h}は畑へ戻った。英雄の鍬の音は、ほかの者の鍬と同じ音がしたという。`,
  (h,c)=>`${h}、${c}に帰る。門の犬だけが顔を覚えていた。歌のほうは、皆が覚えていた。`,
];
const END_FALL = [
  (h,c)=>`歌は途中で終わっている。続きは、聞いた者がそれぞれ持っている。`,
  (h,c)=>`${c}は地図から消え、${h}の最期を見た者はいない。それで歌は、終わりかたを千通り持つことになった。`,
  (h,c)=>`最後の一節を知る者はいない。知らないまま、誰もが口ずさんだ。`,
];
const STAGE_TPL = { shiren: ST_SHIREN, uragiri: ST_URAGIRI, kisaku: ST_KISAKU, kessen: ST_KESSEN };

// ------------------------------------------------------------------ state
const COOLDOWN = 30;     // 終歌から次の叙事詩までの年数
const epics = [];        // newest first
let active = null;
let cooldownUntil = -1;

function makeName(avoid){
  try{
    let n, t = 0;
    do{ n = R.pick(R.lore.STEM) + R.pick(FLAIR); }while(n === avoid && ++t < 12);
    return n;
  }catch(err){ console.error(TAG, "name", err); return "名も無き者"; }
}

function addCanto(epic, label, body, type){
  epic.cantos.push({label, body, year: R.year|0});
  R.write(`【${epic.hero}の歌・${label}】　${body}`, type || "war");
  try{ R.emit("jojishi:canto", {hero: epic.hero, label, n: epic.cantos.length}); }catch(_){}
}

function startEpic(a, b, cause){
  const weaker = (a.pop|0) <= (b.pop|0) ? a : b;   // 英雄は劣勢の側から生まれる
  const hero = makeName();
  const epic = {
    hero, ep: R.pick(EPITHET),
    a, b, civ: weaker, enemy: weaker === a ? b : a,
    civName: weaker.name, color: weaker.color, cause,
    startYear: R.year|0, endYear: null,
    cantos: [], lastCantoYear: R.year|0,
    stages: ["shiren", "senyu", Math.random() < .5 ? "uragiri" : "kisaku", "kessen"],
    stageIdx: 0, comp: null, done: false, outcome: null,
  };
  active = epic;
  epics.unshift(epic);
  if(epics.length > 40) epics.length = 40;
  addCanto(epic, "第一歌", R.pick(OPENERS)(hero, epic.civName, cause, epic.ep), "war");
  try{ R.toast(`詩人が筆を執った——「${hero}の歌」、ここに始まる`); }catch(_){}
  try{ R.emit("jojishi:start", {hero, civ: weaker}); }catch(_){}
}

function nextCanto(epic){
  const stage = epic.stages[epic.stageIdx++];
  let body;
  if(stage === "senyu"){
    epic.comp = makeName(epic.hero);
    body = R.pick(ST_SENYU)(epic.hero, epic.comp);
  } else {
    body = R.pick(STAGE_TPL[stage] || ST_SHIREN)(epic.hero);
  }
  addCanto(epic, `第${kanji(epic.cantos.length + 1)}歌`, body, "war");
  epic.lastCantoYear = R.year|0;
}

function finishEpic(epic, survived){
  if(!epic || epic.done) return;
  epic.done = true;
  epic.endYear = R.year|0;
  epic.outcome = survived ? "home" : "fall";
  const body = survived
    ? R.pick(END_HOME)(epic.hero, epic.civName)
    : R.pick(END_FALL)(epic.hero, epic.civName);
  addCanto(epic, "終歌", body, survived ? "peace" : "doom");
  if(active === epic) active = null;
  cooldownUntil = (R.year|0) + COOLDOWN;
  try{ R.emit("jojishi:end", {hero: epic.hero, outcome: epic.outcome}); }catch(_){}
}

// ------------------------------------------------------------------ hooks
R.on("war-start", e => {
  try{
    if(!e || !e.a || !e.b) return;
    if(active || (R.year|0) < cooldownUntil) return;
    if(Math.random() >= .3) return;
    startEpic(e.a, e.b, e.cause || "些細な行き違い");
  }catch(err){ console.error(TAG, "war-start", err); }
});

R.on("year", () => {
  try{
    if(!active || active.done) return;
    const e = active;
    const warOn = (R.wars || []).some(w => w &&
      ((w.a === e.a && w.b === e.b) || (w.a === e.b && w.b === e.a)));
    if(!warOn){ finishEpic(e, !!(e.civ && e.civ.alive)); return; }  // 保険：取りこぼした終戦
    if(e.stageIdx >= e.stages.length) return;          // 段はすべて歌った。あとは結末を待つ
    if((R.year|0) - e.lastCantoYear < 2) return;       // 二年に一歌まで
    if(Math.random() < .4) nextCanto(e);
  }catch(err){ console.error(TAG, "year", err); }
});

R.on("war-end", ev => {
  try{
    if(!active || active.done || !ev) return;
    const e = active;
    if((ev.a === e.a && ev.b === e.b) || (ev.a === e.b && ev.b === e.a))
      finishEpic(e, true);                             // 和睦——英雄は生きて帰る
  }catch(err){ console.error(TAG, "war-end", err); }
});

R.on("city-fell", ev => {
  try{
    if(!active || active.done || !ev || !ev.winner || !ev.loser) return;
    const e = active;
    const ours = (ev.winner === e.a && ev.loser === e.b) || (ev.winner === e.b && ev.loser === e.a);
    if(!ours) return;
    // 都を落とされて滅びる側か（cities は emit 前に削られている）
    const fellWhole = ev.loser === e.civ && (!ev.loser.cities || ev.loser.cities.length === 0);
    finishEpic(e, !fellWhole);
  }catch(err){ console.error(TAG, "city-fell", err); }
});

R.on("civ-died", c => {
  try{
    if(!active || active.done || !c) return;
    const e = active;
    if(c === e.civ) finishEpic(e, false);
    else if(c === e.enemy) finishEpic(e, true);
  }catch(err){ console.error(TAG, "civ-died", err); }
});

// -------------------------------------------------------------------- css
const style = document.createElement("style");
style.id = "jojishi-style";
style.textContent = `
.jojishi-overlay{position:fixed;inset:0;z-index:8;display:none;align-items:center;justify-content:center;
  background:rgba(42,32,18,.45);}
.jojishi-overlay.jojishi-show{display:flex;}
.jojishi-modal{width:min(580px,86vw);max-height:78vh;display:flex;flex-direction:column;color:#4a3b28;
  font-family:"Hiragino Mincho ProN","Yu Mincho",serif;
  background:linear-gradient(105deg,#f2e8cd 0%,#ece1c4 55%,#e5d8b6 100%);
  border:double 5px rgba(74,59,40,.5);border-radius:6px;box-shadow:0 14px 40px rgba(30,22,10,.45);}
.jojishi-head{position:relative;padding:15px 40px 11px;text-align:center;font-weight:700;font-size:15.5px;
  letter-spacing:.18em;border-bottom:1.5px solid rgba(74,59,40,.35);}
.jojishi-close{position:absolute;right:9px;top:9px;cursor:pointer;border:1.5px solid rgba(74,59,40,.3);
  background:rgba(236,225,196,.9);color:#4a3b28;border-radius:7px;padding:3px 9px;font-size:13px;
  font-family:inherit;line-height:1.4;}
.jojishi-close:hover{border-color:#8a4a32;}
.jojishi-list{flex:1;overflow-y:auto;padding:6px 16px 12px;scrollbar-width:thin;}
.jojishi-list::-webkit-scrollbar{width:7px;}
.jojishi-list::-webkit-scrollbar-thumb{background:rgba(74,59,40,.3);border-radius:4px;}
.jojishi-ep{border-bottom:1px dashed rgba(74,59,40,.28);}
.jojishi-ep:last-child{border-bottom:none;}
.jojishi-ephead{display:flex;align-items:baseline;gap:8px;padding:11px 2px 10px;cursor:pointer;}
.jojishi-ephead:hover b{color:#8a4a32;}
.jojishi-ephead b{font-size:13.8px;letter-spacing:.08em;white-space:nowrap;}
.jojishi-dot{flex:none;display:inline-block;width:8px;height:8px;border-radius:50%;
  border:1px solid rgba(74,59,40,.5);align-self:center;}
.jojishi-meta{flex:1;color:#7a6a52;font-size:11.3px;letter-spacing:.04em;}
.jojishi-live{color:#8a4a32;}
.jojishi-arrow{flex:none;color:#7a6a52;font-size:11px;transition:transform .2s;}
.jojishi-ep.jojishi-openrow .jojishi-arrow{transform:rotate(180deg);}
.jojishi-cantos{display:none;padding:0 4px 12px 18px;border-left:2px solid rgba(74,59,40,.18);
  margin:0 0 10px 3px;}
.jojishi-ep.jojishi-openrow .jojishi-cantos{display:block;}
.jojishi-canto{font-size:12.4px;line-height:1.95;letter-spacing:.02em;margin:0 0 7px;}
.jojishi-cn{font-weight:700;color:#8a4a32;letter-spacing:.1em;margin-right:.55em;white-space:nowrap;}
.jojishi-cy{color:#7a6a52;font-size:10.8px;margin-left:.4em;white-space:nowrap;}
.jojishi-empty{padding:34px 10px;text-align:center;color:#7a6a52;font-size:12.5px;
  letter-spacing:.12em;line-height:2.2;}
.jojishi-foot{padding:9px 16px;border-top:1.5px solid rgba(74,59,40,.35);text-align:center;
  font-size:10.8px;color:#7a6a52;letter-spacing:.06em;line-height:1.8;}
`;
document.head.append(style);

// ------------------------------------------------------------------ modal
const overlay = document.createElement("div");
overlay.className = "jojishi-overlay";
overlay.innerHTML = `
  <div class="jojishi-modal" role="dialog" aria-label="叙事詩">
    <div class="jojishi-head">叙事詩　— 歌い継がれる者たち —
      <button class="jojishi-close" type="button" aria-label="閉じる">✕</button>
    </div>
    <div class="jojishi-list"></div>
    <div class="jojishi-foot">英雄の実在を疑う者は、いつの時代もいる。歌のほうが長生きするだけである。</div>
  </div>`;
document.body.append(overlay);
const listEl = overlay.querySelector(".jojishi-list");

function epicRow(e){
  const years = e.done ? `${e.startYear}年〜${e.endYear}年` : `${e.startYear}年〜`;
  const state = e.done ? "" : `<span class="jojishi-live">・歌い継ぎ中</span>`;
  let cantos = "";
  for(const c of e.cantos){
    cantos += `<div class="jojishi-canto"><span class="jojishi-cn">${esc(c.label)}</span>${esc(c.body)}<span class="jojishi-cy">（${c.year|0}年）</span></div>`;
  }
  if(!e.done) cantos += `<div class="jojishi-canto"><span class="jojishi-cn">……</span>この歌はまだ終わっていない。</div>`;
  return `<div class="jojishi-ep">
    <div class="jojishi-ephead">
      <span class="jojishi-dot" style="background:${esc(e.color)}"></span>
      <b>${esc(e.hero)}の歌</b>
      <span class="jojishi-meta">${esc(e.civName)}・${esc(years)}・全${e.cantos.length}歌${state}</span>
      <span class="jojishi-arrow">▾</span>
    </div>
    <div class="jojishi-cantos">${cantos}</div>
  </div>`;
}

function renderModal(){
  try{
    if(!epics.length){
      listEl.innerHTML = `<div class="jojishi-empty">まだ、歌になった英雄はいない。<br>長い戦だけが、英雄を生む。</div>`;
      return;
    }
    listEl.innerHTML = epics.map(epicRow).join("");
    const first = listEl.querySelector(".jojishi-ep");
    if(first) first.classList.add("jojishi-openrow");   // 最新の歌は開いて見せる
  }catch(err){
    console.error(TAG, "render", err);
    listEl.textContent = "頁が虫に食われている。";
  }
}

listEl.addEventListener("click", e => {
  try{
    const head = e.target.closest(".jojishi-ephead");
    if(!head || !listEl.contains(head)) return;
    head.parentElement.classList.toggle("jojishi-openrow");
  }catch(err){ console.error(TAG, "toggle", err); }
});

function openModal(){ renderModal(); overlay.classList.add("jojishi-show"); listEl.scrollTop = 0; }
function closeModal(){ overlay.classList.remove("jojishi-show"); }

overlay.addEventListener("pointerdown", e => { if(e.target === overlay) closeModal(); });
overlay.querySelector(".jojishi-close").addEventListener("click", closeModal);
document.addEventListener("keydown", e => {
  try{ if(e.key === "Escape" && overlay.classList.contains("jojishi-show")) closeModal(); }
  catch(err){ console.error(TAG, "esc", err); }
});

// ------------------------------------------------------------ dock button
try{
  R.addButton("🗡 叙事詩", () => { try{ openModal(); }catch(err){ console.error(TAG, "open", err); } });
}catch(err){ console.error(TAG, "addButton", err); }
})();
</script>

<script>
// ════ plugin: rakugaki (wave3) ════ Plugin "rakugaki" (🖋 余白の落書き), wave 3. Paste into its own <script> tag after the existing plugin blocks in chronicle/i
// ════ plugin: rakugaki (wave3) ════ 🖋 余白の落書き — the bored scribe doodles in the sea margins.
(()=>{ "use strict";
if(!window.REKISHI) return;
const R = window.REKISHI;
const TAG = "[rakugaki]";

// innerHTMLは本プラグインでは不使用（SVGテキストはtextContentのみ）。規約に従いesc()は備えておく。
const esc = s => String(s==null?"":s).replace(/[&<>"']/g, c =>
  ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
void esc;

try{

// ---------------------------------------------------------------- css
const style = document.createElement("style");
style.textContent = `
.rakugaki-layer{pointer-events:none;}
.rakugaki-cat{pointer-events:auto;cursor:pointer;}
`;
document.head.append(style);

// ---------------------------------------------------------------- ink & layer
const INK = "#52402a";
const FONT = `"Hiragino Mincho ProN","Yu Mincho",serif`;

const filt = R.mk("filter", {id:"rakugaki-rough", x:"-40%", y:"-40%", width:"180%", height:"180%"});
filt.append(R.mk("feTurbulence", {type:"fractalNoise", baseFrequency:".055", numOctaves:"2", seed:"23", result:"n"}));
filt.append(R.mk("feDisplacementMap", {in:"SourceGraphic", in2:"n", scale:"2.4"}));
R.defs.append(filt);

const layer = R.mk("g", {"class":"rakugaki-layer"});
R.svg.append(layer);

// ---------------------------------------------------------------- state
const doodles = [];                 // {g, x, y, framed}
let inkW = 1.2;                     // 書記ごとの筆圧。紀が替わるたび 1.2 / 1.7 で交代
let lastNoteAt = -1e9;

function r(a, b){ return a + Math.random()*(b-a); }

// ---------------------------------------------------------------- spots (sea margin only)
function uiClear(x, y){
  const W = R.W, H = R.H;
  if(x < 22 || x > W-22 || y < 74 || y > H-28) return false;       // 端と上部バー
  if(x < 440 && y > H-200) return false;                            // ドックと凡例
  if(y > H-74 && x > W*.28 && x < W*.72) return false;              // トースト
  if(Math.hypot(x - W*.10, y - H*.90) < 135) return false;          // 天変の記の刻み
  return true;
}
function seaClear(x, y, rad){
  try{
    if(R.inLand(x, y)) return false;
    for(let k=0; k<8; k++){
      const a = k/8*Math.PI*2;
      if(R.inLand(x + Math.cos(a)*rad, y + Math.sin(a)*rad)) return false;
    }
    return true;
  }catch(e){ return false; }
}
function farFromOthers(x, y, min){
  return !doodles.some(d => Math.hypot(d.x-x, d.y-y) < min);
}
function findSpot(){
  const W = R.W, H = R.H;
  for(const clear of [38, 24]){
    for(let i=0; i<150; i++){
      const x = 22 + Math.random()*(W-44), y = 74 + Math.random()*(H-104);
      if(uiClear(x,y) && seaClear(x,y,clear) && farFromOthers(x,y,92)) return {x, y};
    }
  }
  return null;
}
function spotNearEdge(wx, wy){
  const W = R.W, H = R.H, m = 54;
  const cands = [[m,wy], [W-m,wy], [wx,80], [wx,H-m]];
  const dists = [wx, W-wx, wy, H-wy];
  let bi = 0;
  for(let i=1; i<4; i++) if(dists[i] < dists[bi]) bi = i;
  const bx = cands[bi][0], by = cands[bi][1];
  for(let i=0; i<70; i++){
    const rr = 8 + i*2.4, a = Math.random()*Math.PI*2;
    const x = bx + Math.cos(a)*rr, y = by + Math.sin(a)*rr;
    if(uiClear(x,y) && seaClear(x,y,20) && farFromOthers(x,y,70)) return {x, y};
  }
  return findSpot();
}

// ---------------------------------------------------------------- ink primitives
function circlePath(cx, cy, rad){
  return `M ${(cx-rad).toFixed(1)} ${cy.toFixed(1)} a ${rad} ${rad} 0 1 1 ${2*rad} 0 a ${rad} ${rad} 0 1 1 ${-2*rad} 0`;
}
function strokePath(d, w, o, color){
  return R.mk("path", {d, fill:"none", stroke:(color||INK),
    "stroke-width":(w==null?1:w), opacity:(o==null?.8:o),
    "stroke-linecap":"round", "stroke-linejoin":"round"});
}
function inkText(tx){
  const t = R.mk("text", {x:tx.x, y:tx.y, "font-size":tx.size, fill:INK,
    opacity:(tx.o==null?.8:tx.o), "text-anchor":(tx.anchor||"start"),
    "font-family":FONT, "letter-spacing":".04em"});
  if(tx.rot) t.setAttribute("transform", `rotate(${tx.rot} ${tx.x} ${tx.y})`);
  if(tx.vert) t.style.writingMode = "vertical-rl";
  t.textContent = tx.str;
  return t;
}
// 一画ずつ描く（壁時計＝WAAPI、計~1.5秒）
function inkDraw(paths, total){
  const lens = paths.map(p => { try{ return Math.max(3, p.getTotalLength()); }catch(e){ return 30; } });
  const sum = lens.reduce((a,b)=>a+b, 0) || 1;
  let t = 0;
  paths.forEach((p, i) => {
    const L = lens[i];
    const dur = Math.max(130, total*L/sum);
    p.setAttribute("stroke-dasharray", L.toFixed(1));
    p.setAttribute("stroke-dashoffset", L.toFixed(1));
    try{
      const a = p.animate([{strokeDashoffset:`${L}px`}, {strokeDashoffset:"0px"}],
        {duration:dur, delay:t, easing:"ease-out", fill:"both"});
      a.onfinish = () => { try{ p.setAttribute("stroke-dashoffset", 0); a.cancel(); }catch(e){} };
    }catch(e){ p.setAttribute("stroke-dashoffset", 0); }
    t += dur*.85;
  });
  return t + 260;
}
function fadeIn(el, delay, to){
  el.setAttribute("opacity", 0);
  try{
    const a = el.animate([{opacity:0}, {opacity:to}],
      {duration:430, delay, easing:"ease-out", fill:"both"});
    a.onfinish = () => { try{ el.setAttribute("opacity", to); a.cancel(); }catch(e){} };
  }catch(e){ el.setAttribute("opacity", to); }
}

// ---------------------------------------------------------------- the doodle corpus (8 kinds)
function dCat(){
  return { cat:true, rot:r(-10,10), strokes:[
    {d:"M -15 5 C -17 -7, -6 -16, 4 -14 C 14 -12, 19 -2, 13 7 C 8 13, -8 14, -15 5"},
    {d:circlePath(9,-9,6)},
    {d:"M 5 -13 L 4 -18 L 9 -15 M 10 -14 L 13 -19 L 15 -13", w:.85},
    {d:"M -14 6 C -9 13, 5 15, 13 9", w:.9},
    {d:"M 6 -9 q 1.7 1.4 3.4 0", w:.75},
    {d:"M 14.5 -8 l 4.5 .8 M 14.5 -10.5 l 4.5 -1.4", w:.55, o:.6},
  ]};
}
function dSun(){
  let rays = "";
  for(let k=0; k<8; k++){
    const a = k/8*Math.PI*2 + .26;
    rays += `M ${(Math.cos(a)*14).toFixed(1)} ${(Math.sin(a)*14).toFixed(1)} L ${(Math.cos(a)*19).toFixed(1)} ${(Math.sin(a)*19).toFixed(1)} `;
  }
  return { rot:r(-8,8), strokes:[
    {d:circlePath(0,0,11)},
    {d:rays, w:.8},
    {d:"M -6 -2 q 1.8 1.7 3.6 0 M 2.4 -2 q 1.8 1.7 3.6 0", w:.75},
    {d:"M -2 4.5 q 2 1.8 4 0", w:.75},
  ], texts:[{str:"ぐう", x:16, y:-15, size:7.5, rot:-12, o:.6}]};
}
function dFishbone(){
  let ribs = "";
  for(const rx of [-1, 4, 9]) ribs += `M ${rx} 0 l -2.4 -5.4 M ${rx} 0 l -2.4 5.4 `;
  return { rot:r(-12,12), strokes:[
    {d:"M -17 0 C -15 -5.5, -9 -6.5, -6 -4.5 L -6 4.5 C -9 6.5, -15 5.5, -17 0"},
    {d:"M -12.5 -1.6 l .7 .1", w:2, o:.85},
    {d:"M -6 0 L 14 0", w:.9},
    {d:ribs, w:.8},
    {d:"M 14 0 L 20 -5 L 20 5 L 14 0", w:.9},
  ]};
}
function dTeacup(){
  return { rot:r(-6,6), strokes:[
    {d:"M -10 -2 Q 0 1.5, 10 -2"},
    {d:"M -10 -2 L -7.5 7 Q 0 10.5, 7.5 7 L 10 -2"},
    {d:"M 10 -.5 q 6.5 .5 4.6 5 q -1.6 3.4 -5.4 2.2", w:.85},
    {d:"M -13 10.5 Q 0 14.5, 13 10.5", w:.85},
    {d:"M -3 -6 q 2.2 -3 0 -6 q -2.2 -3 0 -6", w:.7, o:.5},
    {d:"M 3 -7 q 2.2 -3 0 -6", w:.7, o:.5},
    {d:"M 20 11 a 8.5 8.5 0 1 1 15 4", w:3.2, o:.14, s:"#7a5230"},   // 茶渋の輪染み
  ]};
}
function dBookmark(x){
  const left = x > R.W*.55;
  return { rot:r(-6,6), strokes:[
    {d:"M -4 -14 L 4 -14 L 4 12 L 0 6.5 L -4 12 L -4 -14"},
    {d:"M -1.5 -11 l 3 0 M -1.5 -8.5 l 3 0", w:.6, o:.55},
  ], texts:[{str:"ここまで読んだ", x:(left?-9:9), y:2, size:10, rot:r(-3,3),
             anchor:(left?"end":"start"), o:.8}]};
}
function dPortrait(){
  return { rot:r(-8,8), strokes:[
    {d:circlePath(0,3,9)},
    {d:"M -12.5 -5 L 12.5 -5", w:.95},
    {d:"M -7 -5 L -5.5 -12 L 5.5 -12 L 7 -5", w:.95},
    {d:"M -3.2 2 l .7 .1 M 3.2 2 l .7 .1", w:2, o:.85},
    {d:"M -2 7.5 q 2 1.3 4 0", w:.75},
  ], texts:[{str:"わたし", x:0, y:23, size:7.5, rot:r(-5,5), anchor:"middle", o:.6}]};
}
function dArrow(x, y){
  const ang = Math.atan2(R.H*.52 - y, R.W*.5 - x);
  const deg = +(ang*180/Math.PI).toFixed(1);
  const tx = -Math.cos(ang)*30, ty = -Math.sin(ang)*30;
  return { rot:deg, strokes:[
    {d:"M -14 1 C -6 -2, 4 -2, 12 0"},
    {d:"M 12 0 L 5 -4.5 M 12 0 L 5.5 4.5"},
  ], texts:[{str:"ひろい", x:+tx.toFixed(1), y:+(ty+4).toFixed(1), size:10,
             rot:r(-4,4), anchor:"middle", o:.8}]};
}
function dFlower(){
  let petals = "";
  for(let k=0; k<5; k++){
    const a = -Math.PI/2 + k/5*Math.PI*2;
    petals += circlePath(Math.cos(a)*5.6, -6 + Math.sin(a)*5.6, 3.1) + " ";
  }
  return { rot:r(-8,8), strokes:[
    {d:"M 0 16 C -2 9, 1.5 4, .4 -1", w:.9},
    {d:"M -.8 9.5 C -6.5 9, -9 5.5, -10 3.2 C -6 3.4, -2.2 5.8, -.8 9.5", w:.8},
    {d:petals, w:.8},
    {d:circlePath(0,-6,2.1), w:.8},
  ]};
}
const BUILDERS = [dCat, dSun, dFishbone, dTeacup, dBookmark, dPortrait, dArrow, dFlower];

// ---------------------------------------------------------------- rendering
function renderDoodle(spec, x, y){
  try{
    const g = R.mk("g", {transform:`translate(${x.toFixed(1)} ${y.toFixed(1)})`});
    const ink = R.mk("g", {filter:"url(#rakugaki-rough)"});
    if(spec.rot) ink.setAttribute("transform", `rotate(${spec.rot})`);
    g.append(ink);
    const paths = [];
    for(const s of spec.strokes){
      const p = strokePath(s.d, inkW*(s.w==null?1:s.w), s.o, s.s);
      ink.append(p);
      paths.push(p);
    }
    layer.append(g);
    const total = inkDraw(paths, 1500);
    for(const tx of (spec.texts||[])){
      const t = inkText(tx);
      g.append(t);
      fadeIn(t, total, (tx.o==null?.8:tx.o));
    }
    if(spec.cat) bindCat(g, ink, spec.rot||0);
    const rec = {g, x, y, framed:false};
    doodles.push(rec);
    while(doodles.length > 6) eraseDoodle(doodles.shift());
    return rec;
  }catch(err){ console.error(TAG, "render", err); return null; }
}

// 7枚目が来ると一番古い絵が消される（書記が消した）。30秒だけ薄い染みが残る。
function eraseDoodle(rec){
  try{
    const g = rec.g;
    try{
      const a = g.animate([{opacity:1},{opacity:0}], {duration:650, easing:"ease-in", fill:"forwards"});
      a.onfinish = () => { try{ g.remove(); }catch(e){} };
    }catch(e){ g.remove(); }
    const sm = R.mk("ellipse", {cx:rec.x, cy:rec.y, rx:24, ry:10, fill:INK, opacity:.08,
      transform:`rotate(${(Math.random()*40-20)|0} ${rec.x} ${rec.y})`});
    layer.append(sm);
    try{
      const b = sm.animate([{opacity:.08},{opacity:.08,offset:.6},{opacity:0}],
        {duration:30000, fill:"forwards"});
      b.onfinish = () => { try{ sm.remove(); }catch(e){} };
    }catch(e){ setTimeout(()=>{ try{ sm.remove(); }catch(_){} }, 30000); }
  }catch(err){ console.error(TAG, "erase", err); }
}

// ---------------------------------------------------------------- the cat stretches
function bindCat(g, ink, rot){
  g.setAttribute("class", "rakugaki-cat");
  const hit = R.mk("circle", {cx:0, cy:0, r:22, fill:"#000", "fill-opacity":0, "pointer-events":"fill"});
  g.insertBefore(hit, g.firstChild);
  let busy = false;
  g.addEventListener("pointerdown", ev => {
    try{
      if(ev.button !== 0) return;
      ev.preventDefault();                 // 海クリックで核が反応しないように
      if(busy) return;
      busy = true;
      ink.style.transformBox = "fill-box";
      ink.style.transformOrigin = "center";
      const a = ink.animate([
        {transform:`rotate(${rot}deg) scale(1,1)`},
        {transform:`rotate(${rot}deg) scale(1.27,.8)`, offset:.42},
        {transform:`rotate(${rot}deg) scale(.96,1.06)`, offset:.74},
        {transform:`rotate(${rot}deg) scale(1,1)`},
      ], {duration:980, easing:"ease-in-out"});
      a.onfinish = a.oncancel = () => { busy = false; };
      R.toast("絵の猫が伸びをした。書記は見ていない");
    }catch(err){ busy = false; console.error(TAG, "cat", err); }
  });
}

// ---------------------------------------------------------------- margin notes (count toward the cap)
function addNote(str, spot){
  try{
    if(!spot) return;
    if(performance.now() - lastNoteAt < 30000) return;   // 走り書きの連発は避ける
    lastNoteAt = performance.now();
    const W = R.W, H = R.H;
    const vert = Math.min(spot.x, W-spot.x) < Math.min(spot.y, H-spot.y);
    const len = str.length*10.6;
    let x = spot.x, y = spot.y;
    if(vert) y = Math.min(Math.max(y, 82+len/2), H-36-len/2);
    else     x = Math.min(Math.max(x, 26+len/2), W-26-len/2);
    const spec = { rot:0, strokes:[
      vert ? {d:`M 8 ${(-len/2).toFixed(1)} q 3 ${(len/2).toFixed(1)} 0 ${len.toFixed(1)}`, w:.55, o:.42}
           : {d:`M ${(-len/2).toFixed(1)} 8 q ${(len/2).toFixed(1)} 3 ${len.toFixed(1)} 0`, w:.55, o:.42},
    ], texts:[{str, x:0, y:0, size:10, rot:(vert?0:r(-3,3)), anchor:"middle", o:.78, vert}]};
    renderDoodle(spec, x, y);
  }catch(err){ console.error(TAG, "note", err); }
}

R.on("war-start", ev => {
  try{
    if(Math.random() >= .15) return;
    const a = ev && ev.a, b = ev && ev.b;
    if(!a || !b || !a.cities || !b.cities || !a.cities.length || !b.cities.length) return;
    let best = null, bd = 1e9;
    for(const ca of a.cities) for(const cb of b.cities){
      const d = Math.hypot(ca.x-cb.x, ca.y-cb.y);
      if(d < bd){ bd = d; best = [(ca.x+cb.x)/2, (ca.y+cb.y)/2]; }
    }
    if(!best) return;
    addNote("※また戦。インクがもったいない", spotNearEdge(best[0], best[1]));
  }catch(err){ console.error(TAG, "war note", err); }
});
R.on("harvest", () => {
  try{
    if(Math.random() >= .10) return;
    addNote("※今年の麦はよく書ける（インクではない）", findSpot());
  }catch(err){ console.error(TAG, "harvest note", err); }
});

// ---------------------------------------------------------------- era change: the scribe retires
R.on("era-change", () => {
  try{
    R.write("書記、交代いたします。前任者の猫の絵は、残します。", "civic");
    inkW = (inkW === 1.2) ? 1.7 : 1.2;     // 新しい書記の筆圧
    for(const rec of doodles){
      if(rec.framed) continue;
      rec.framed = true;
      try{
        const bb = rec.g.getBBox();
        const pad = 5;
        const fr = strokePath(
          `M ${(bb.x-pad).toFixed(1)} ${(bb.y-pad).toFixed(1)} h ${(bb.width+pad*2).toFixed(1)} v ${(bb.height+pad*2).toFixed(1)} h ${(-(bb.width+pad*2)).toFixed(1)} Z`,
          .7, .45);
        rec.g.append(fr);
        inkDraw([fr], 850);
      }catch(e){ /* 未描画なら額装は省略 */ }
    }
  }catch(err){ console.error(TAG, "era", err); }
});

// ---------------------------------------------------------------- the bored clock (wall time, outside the sim)
let nextAt = performance.now() + r(120000, 240000);
setInterval(() => {
  try{
    if(document.hidden) return;                       // 戻ってきてから描く
    if(performance.now() < nextAt) return;
    nextAt = performance.now() + r(120000, 240000);
    const spot = findSpot();
    if(!spot) return;
    const spec = R.pick(BUILDERS)(spot.x, spot.y);
    renderDoodle(spec, spot.x, spot.y);
  }catch(err){ console.error(TAG, "tick", err); }
}, 7000);

}catch(err){ console.error(TAG, err); }
})();
</script>


<script>
// ════ plugin: rekishi-bgm (bgm) ════ Plugin "rekishi-bgm" (🎶 歴史のBGM) — paste into its own <script> tag after the existing plugin blocks in chronicle/index
(() => { "use strict";
if(!window.REKISHI) return;
const R = window.REKISHI;
const TAG = "[rekishi-bgm]";
const LS_KEY = "rekishi-bgm";
const log = (...a) => console.error(TAG, ...a);

// ════════════════════════════════════════════════ 🎶 歴史のBGM ════
//  古い弦楽器が、大陸の歴史を思い出しながら爪弾く。
//  Dドリア。戦になれば翳り、国が滅べば鐘を撞き、豊作には第6音が輝く。
// ══════════════════════════════════════════════════════════════════

let ctx = null;                 // 自前の AudioContext（他プラグインと共有しない）
let playing = false;
let enabled = true;
try{ enabled = (localStorage.getItem(LS_KEY) || "on") !== "off"; }catch(_){}

let master=null, gPluck=null, gPerc=null, gDrone=null, gSparkle=null;
let droneOscs=[], sparkleOscs=[], sparkleLfo=null;
let schedTimer=null, stopTimer=null, armed=false;
let nextBeat=0, beatIdx=0, lastTickAt=0, nextBell=0;
let warMix=0, lastRun=true, sparkleOn=false;
let transp=0;                                // 半音単位の移調（時代ごとに完全四度上昇）
let mournUntil=0, abundUntil=0;              // 壁時計(ms)
let soloUntil=0;                             // 音声時計(s)
let chord=null, curPat=null;
let lastChordName="", lastFragSig="", lastBarSig="";

const BPM=70, HORIZON=1.6;                   // 先読み1.6秒：背面タブのタイマー間引きに耐える
const SCALE=[0,2,3,5,7,9,10];                // Dドリア（第2音は戦時に確率的にE♭へ滲む）
const midiHz = m => 440*Math.pow(2,(m-69)/12);
const rnd = (a,b)=>a+Math.random()*(b-a);
const pick = arr => arr[(Math.random()*arr.length)|0];
const rootMidi = () => 50 + transp;          // D3 基準
const beatDur = () => 60/(BPM*(1+.08*warMix));  // 戦時はテンポ+8%（warMixで滑らかに）

// ---------------------------------------------- カープラス＝ストロング弦
// ノイズバーストを遅延線へ流し、ループ内の2点平均ローパスで減衰させる。
// 遅延長（＝遅延時間）が音高を決める。音高ごとにバッファへ描画してキャッシュ。
const ksCache = new Map();
function ksBuffer(freq, damp){
  const sr = ctx.sampleRate;
  const key = ((freq*10)|0)+"_"+((damp*1000)|0);
  let buf = ksCache.get(key);
  if(buf) return buf;
  if(ksCache.size > 72) ksCache.clear();
  const N = Math.max(2, Math.round(sr/freq - .5));  // 平均化フィルタの半サンプル遅延を補正
  const len = (sr*2.6)|0;
  buf = ctx.createBuffer(1, len, sr);
  const d = buf.getChannelData(0);
  let p = 0;
  for(let i=0;i<N;i++){ p = .5*p + .5*(Math.random()*2-1); d[i]=p; }  // 柔らかい爪弾き
  for(let i=N;i<len;i++){
    const a=d[i-N], b=(i-N-1>=0)?d[i-N-1]:0;
    d[i]=damp*.5*(a+b);
  }
  ksCache.set(key, buf);
  return buf;
}
function pluck(t, midi, vel, damp){
  try{
    const src=ctx.createBufferSource();
    src.buffer=ksBuffer(midiHz(midi), damp||.996);
    const g=ctx.createGain();
    g.gain.setValueAtTime(vel, t);
    g.gain.setValueAtTime(vel, t+2.1);
    g.gain.exponentialRampToValueAtTime(.0001, t+2.55);  // 尾をクリックなしで畳む
    src.connect(g); g.connect(gPluck);
    src.start(t); src.stop(t+2.6);
  }catch(err){ log("pluck", err); }
}

// ---------------------------------------------- 打楽器と鐘
let noiseBuf=null;
function getNoise(){
  if(noiseBuf) return noiseBuf;
  const len=(ctx.sampleRate*.4)|0;
  noiseBuf=ctx.createBuffer(1,len,ctx.sampleRate);
  const d=noiseBuf.getChannelData(0);
  for(let i=0;i<len;i++) d[i]=Math.random()*2-1;
  return noiseBuf;
}
function thump(t, vel){    // 枠太鼓の鼓動：ローパスを通したノイズの胴鳴り
  const s=ctx.createBufferSource(); s.buffer=getNoise();
  const f=ctx.createBiquadFilter(); f.type="lowpass"; f.frequency.value=140; f.Q.value=.7;
  const g=ctx.createGain();
  g.gain.setValueAtTime(.0001,t);
  g.gain.exponentialRampToValueAtTime(vel,t+.012);
  g.gain.exponentialRampToValueAtTime(.0001,t+.38);
  s.connect(f); f.connect(g); g.connect(gPerc);
  s.start(t); s.stop(t+.42);
}
function rim(t, vel){      // 戦時のリム打ち
  const s=ctx.createBufferSource(); s.buffer=getNoise();
  const f=ctx.createBiquadFilter(); f.type="bandpass"; f.frequency.value=2700; f.Q.value=6;
  const g=ctx.createGain();
  g.gain.setValueAtTime(.0001,t);
  g.gain.exponentialRampToValueAtTime(vel,t+.005);
  g.gain.exponentialRampToValueAtTime(.0001,t+.08);
  s.connect(f); f.connect(g); g.connect(gPerc);
  s.start(t); s.stop(t+.1);
}
function bellToll(t){      // 弔鐘：220Hz＋1.5倍音、長い減衰
  const r=Math.pow(2,transp/12);
  for(const [mult,g0,dur] of [[1,.09,4.8],[1.5,.045,3.4]]){
    const o=ctx.createOscillator(); o.type="sine"; o.frequency.value=220*r*mult;
    const g=ctx.createGain();
    g.gain.setValueAtTime(.0001,t);
    g.gain.exponentialRampToValueAtTime(g0,t+.02);
    g.gain.exponentialRampToValueAtTime(.0001,t+dur);
    o.connect(g); g.connect(gPluck);
    o.start(t); o.stop(t+dur+.1);
  }
}

// ---------------------------------------------- 和音と楽句の生成
const CHORDS_PEACE = [
  ["Dm9",[0,7,12,15,19,26]],
  ["C",  [-2,5,10,14,17,22]],
  ["F",  [3,10,15,19,22,27]],
  ["Am", [7,14,19,22,26,31]],
  ["G6", [5,12,17,21,24,29]],   // 第6音(B)＝ドリアの光
];
const CHORDS_WAR = [
  ["Dm", [0,7,12,15,19,24]],
  ["E♭", [1,8,13,17,20,25]],    // フリジアの♭II
  ["B♭", [-4,3,8,12,15,20]],
  ["Gm", [5,12,17,20,24,29]],
];
function pickChord(){
  const ab = Date.now() < abundUntil;
  const table = (warMix > .5 ? CHORDS_WAR : CHORDS_PEACE).slice();
  if(ab && warMix <= .5) table.push(CHORDS_PEACE[4], CHORDS_PEACE[4]);  // 豊穣は第6音へ傾く
  let c, guard=0;
  do{ c = pick(table); }while(c[0] === lastChordName && ++guard < 8);   // 同じ和音を続けない
  lastChordName = c[0];
  return c;
}
function genBarPattern(){       // 1小節＝8分音符8枠。毎回生成、固定ループ禁止。休符は美徳。
  const mourn = Date.now() < mournUntil;
  const slots = [];
  for(let s=0;s<8;s++){
    let p = (s===0)?.9 : (s%2===0?.5:.3);
    if(mourn) p = (s===0)?.85:(s===4?.2:0);                 // 喪：単音まで痩せる
    if(!Math.random() < 0){} // no-op (読みやすさのための区切り)
    slots.push(Math.random()<p
      ? (mourn ? 1+((Math.random()*2)|0)
               : 1+Math.min(5, ((s/2)|0) + ((Math.random()*3)|0)))     // 小節内でゆるく上行
      : 0);
  }
  if(slots.join("") === lastBarSig){                        // 同じ型を二度続けない
    const i=(Math.random()*8)|0; slots[i] = slots[i] ? 0 : 2;
  }
  lastBarSig = slots.join("");
  return slots;
}
function fragmentNotes(t0, count, baseDeg){   // 音階上のランダムウォークで3〜5音の旋律片
  const ab = Date.now() < abundUntil;
  let deg = baseDeg, t = t0;
  const notes=[];
  for(let i=0;i<count;i++){
    const di = ((deg%7)+7)%7;
    let semi = SCALE[di] + 12*Math.floor(deg/7);
    if(di===1 && Math.random()<warMix) semi -= 1;           // 戦時、EがE♭へ翳る
    notes.push([t, semi]);
    t += pick(warMix>.5 ? [beatDur()*.5, beatDur()*.5, beatDur()]
                        : [beatDur(), beatDur(), beatDur()*.5, beatDur()*1.5]);
    deg += pick([-2,-1,-1,1,1,2]);
    if(ab && Math.random()<.3) deg = 12;                    // 豊穣は高い第6音(B)へ手が伸びる
    deg = Math.max(3, Math.min(14, deg));
  }
  return notes;
}
function scheduleFragment(t0){
  const notes = fragmentNotes(t0, 3+((Math.random()*3)|0), 7+((Math.random()*4)|0));
  const sig = notes.map(x=>x[1]).join(",");
  if(sig === lastFragSig) return;                           // 同じ旋律を続けない（代わりに休む）
  lastFragSig = sig;
  for(const [t, semi] of notes)
    pluck(t, rootMidi()+semi, rnd(.16,.26)*(1+.5*warMix), .997);  // 戦時はより切迫して
}

// ---------------------------------------------- 拍ごとの采配
function scheduleBeat(t, idx){
  const beat = idx % 4, bar = (idx/4)|0;
  if(!lastRun) return;            // 「時が止まると、音楽も息をひそめる」（ドローンだけ残す）
  if(t < soloUntil) return;       // 時代の独奏の間、伴奏は聴き入る
  const mourn = Date.now() < mournUntil;

  // 弦のアルペジオ（2小節ごとに和音が変わる）
  if(beat===0 && bar%2===0) chord = pickChord();
  if(beat===0) curPat = genBarPattern();
  if(chord && curPat){
    const half = beatDur()/2;
    for(const sub of [0,1]){
      const v = curPat[beat*2+sub];
      if(!v) continue;
      const offs = chord[1];
      pluck(t + sub*half + rnd(-.008,.012),
            rootMidi() + offs[(v-1) % offs.length],
            rnd(.15,.26) + .05*warMix,
            mourn ? .994 : .996);
    }
  }

  // 旋律の断片（戦時はより頻繁に）
  if(beat===0 && !mourn && Math.random() < .1 + .16*warMix)
    scheduleFragment(t + beatDur()*rnd(1,2));

  // 枠太鼓：平時は1小節おき、戦時は毎小節＋リム打ち（warMixでクロスフェード）
  if(beat===0){
    const g = bar%2===0 ? .5 : .5*warMix;
    if(g > .02) thump(t, g);
  }
  if(beat===2 && warMix > .05) rim(t + beatDur()*.5, .1*warMix);
}

// ---------------------------------------------- 先読みスケジューラ（約250ms刻み）
function tick(){
  try{
    if(!ctx || !playing) return;
    if(ctx.state === "suspended"){     // 偽クリックで解錠できなかった場合：次の実ジェスチャを待つ
      if(!armed){
        armed = true;
        window.addEventListener("pointerdown", ()=>{ armed=false; try{ ctx.resume(); }catch(_){ } },
          {capture:true, passive:true, once:true});
      }
      return;
    }
    const now = ctx.currentTime;
    const dt = Math.max(.05, Math.min(2, now - lastTickAt)); lastTickAt = now;

    // 状態の観測とパラメータの追従（約4秒のクロスフェード）
    let warTarget = 0;
    try{ warTarget = (R.wars && R.wars.length > 0) ? 1 : 0; }catch(_){}
    warMix += (warTarget - warMix) * Math.min(1, dt/4);
    if(Math.abs(warMix - warTarget) < .01) warMix = warTarget;

    const run = !!R.running;
    if(run !== lastRun){
      lastRun = run;
      gPluck.gain.setTargetAtTime(run ? .9 : .0001, now, .8);
      gPerc.gain.setTargetAtTime(run ? .8 : .0001, now, .8);
      gDrone.gain.setTargetAtTime(run ? 1 : .5, now, .8);     // ドローンだけ半分の声で残る
    }
    const ab = run && Date.now() < abundUntil;                // 豊穣のきらめき
    if(ab !== sparkleOn){
      sparkleOn = ab;
      gSparkle.gain.setTargetAtTime(ab ? 1 : .0001, now, .9);
    }

    // 音声時計基準で先読み窓内の拍をすべて確定（背面タブでも途切れない）
    if(nextBeat < now - 2) nextBeat = now + .05;
    while(nextBeat < now + HORIZON){
      scheduleBeat(nextBeat, beatIdx);
      nextBeat += beatDur();
      beatIdx++;
    }

    // 弔鐘：5秒ごと
    if(run && Date.now() < mournUntil){
      if(nextBell < now) nextBell = now + .1;
      while(nextBell < now + HORIZON){ bellToll(nextBell); nextBell += 5; }
    }
  }catch(err){ log("tick", err); }
}

// ---------------------------------------------- 音響グラフの構築と起動・停止
function ensureCtx(){
  if(ctx) return true;
  try{
    const AC = window.AudioContext || window.webkitAudioContext;
    if(!AC) return false;
    ctx = new AC();
    return true;
  }catch(err){ log("ctx", err); return false; }
}
function buildGraph(){
  master = ctx.createGain(); master.gain.value = .0001;       // 音楽は同伴者、独奏会ではない
  const lp = ctx.createBiquadFilter(); lp.type="lowpass"; lp.frequency.value=9000; lp.Q.value=.4;
  master.connect(lp); lp.connect(ctx.destination);
  gPluck=ctx.createGain(); gPluck.gain.value=.9;    gPluck.connect(master);
  gPerc =ctx.createGain(); gPerc.gain.value=.8;     gPerc.connect(master);
  gDrone=ctx.createGain(); gDrone.gain.value=1;     gDrone.connect(master);
  gSparkle=ctx.createGain(); gSparkle.gain.value=.0001; gSparkle.connect(master);
  const r = Math.pow(2, transp/12);
  for(const f0 of [73.42, 110]){                    // D2+A2 ののこぎり波を重いローパスへ
    const o=ctx.createOscillator(); o.type="sawtooth"; o.frequency.value=f0*r;
    const f=ctx.createBiquadFilter(); f.type="lowpass"; f.frequency.value=260; f.Q.value=.6;
    const g=ctx.createGain(); g.gain.value=.03;
    o.connect(f); f.connect(g); g.connect(gDrone);
    o.start(); droneOscs.push(o);
  }
  for(const f0 of [1174.66, 1760]){                 // 豊穣のきらめき（D6+A6、普段は無音）
    const o=ctx.createOscillator(); o.type="sine"; o.frequency.value=f0*r;
    const g=ctx.createGain(); g.gain.value=.011;
    o.connect(g); g.connect(gSparkle);
    o.start(); sparkleOscs.push(o);
  }
  sparkleLfo = ctx.createOscillator(); sparkleLfo.frequency.value=.18;
  const lg = ctx.createGain(); lg.gain.value=5;     // ±5セントの揺らぎ
  sparkleLfo.connect(lg);
  for(const o of sparkleOscs) lg.connect(o.detune);
  sparkleLfo.start();
}
function start(){
  try{
    if(playing) return;
    if(!ensureCtx()){ try{ R.toast("この大陸の空気は、まだ音を運べないようだ"); }catch(_){ } return; }
    if(stopTimer){ clearTimeout(stopTimer); stopTimer=null; }
    try{ if(ctx.state==="suspended") ctx.resume(); }catch(_){}
    buildGraph();
    const now = ctx.currentTime;
    master.gain.setValueAtTime(.0001, now);
    master.gain.exponentialRampToValueAtTime(.16, now+2.5);   // 2.5秒かけて立ち上がる
    lastRun = !!R.running;
    if(!lastRun){ gPluck.gain.value=.0001; gPerc.gain.value=.0001; gDrone.gain.value=.5; }
    try{ warMix = (R.wars && R.wars.length>0) ? 1 : 0; }catch(_){ warMix=0; }
    lastTickAt = now; nextBeat = now + .8; beatIdx = 0; nextBell = 0;
    playing = true;
    if(schedTimer) clearInterval(schedTimer);
    schedTimer = setInterval(tick, 250);
  }catch(err){ log("start", err); }
}
function stop(){
  try{
    playing = false;
    if(schedTimer){ clearInterval(schedTimer); schedTimer=null; }
    if(master && ctx){
      const now = ctx.currentTime;
      try{
        master.gain.cancelScheduledValues(now);
        master.gain.setValueAtTime(Math.max(.0001, master.gain.value), now);
        master.gain.exponentialRampToValueAtTime(.0001, now+1);   // 約1秒で羊皮紙へ沈む
      }catch(_){}
      const m=master, olds=droneOscs.concat(sparkleOscs), lf=sparkleLfo;
      stopTimer = setTimeout(()=>{ try{
        for(const o of olds){ try{ o.stop(); }catch(_){ } }
        if(lf){ try{ lf.stop(); }catch(_){ } }
        try{ m.disconnect(); }catch(_){}
      }catch(err){ log(err); } }, 1200);
    }
    master=gPluck=gPerc=gDrone=gSparkle=null;
    droneOscs=[]; sparkleOscs=[]; sparkleLfo=null; sparkleOn=false;
  }catch(err){ log("stop", err); }
}

// ---------------------------------------------- 歴史への耳
R.on("civ-died", ()=>{ try{           // 喪：25秒
  mournUntil = Date.now() + 25000;
  if(playing && ctx && nextBell < ctx.currentTime) nextBell = ctx.currentTime + .4;
}catch(err){ log(err); } });

R.on("harvest", ()=>{ try{ abundUntil = Date.now() + 15000; }catch(err){ log(err); } });  // 豊穣：15秒

R.on("era-change", ()=>{ try{         // 時代が変われば、弦は完全四度高く張り替えられる
  transp += 5;
  if(transp > 9) transp -= 12;        // 高くなりすぎたら一オクターブ畳む
  if(!playing || !ctx) return;
  const now = ctx.currentTime, r = Math.pow(2, transp/12);
  [73.42,110].forEach((f,i)=>{ try{ droneOscs[i].frequency.setTargetAtTime(f*r, now, 1.4); }catch(_){ } });
  [1174.66,1760].forEach((f,i)=>{ try{ sparkleOscs[i].frequency.setTargetAtTime(f*r, now, 1.4); }catch(_){ } });
  if(!R.running) return;
  // 新しい時代、新しい歌 — 伴奏なしの短い独奏
  const t0 = now + .25;
  soloUntil = t0 + 4.6;
  let t = t0;
  for(const [tt, semi] of fragmentNotes(t0, 5+((Math.random()*3)|0), pick([7,8,9]))){
    pluck(tt, rootMidi()+semi, rnd(.2,.3), .997); t = tt;
  }
  pluck(t + rnd(.4,.6), rootMidi()+12, .26, .997);   // 主音で結ぶ
}catch(err){ log("era", err); } });

// ---------------------------------------------- ドックボタンと自動開始
let btn = null;
function updateBtn(){ try{ if(btn) btn.textContent = enabled ? "🎶 BGM" : "🔇 BGM"; }catch(_){ } }
btn = R.addButton("🎶 BGM", ()=>{ try{
  enabled = !enabled;
  try{ localStorage.setItem(LS_KEY, enabled ? "on" : "off"); }catch(_){}
  if(enabled){ start(); try{ R.toast("歴史が、低く歌いはじめる"); }catch(_){ } }   // クリック自体が解錠の儀
  else { stop(); try{ R.toast("音楽は羊皮紙の余白へ退いた"); }catch(_){ } }
  updateBtn();
}catch(err){ log("toggle", err); } });
updateBtn();

if(enabled){
  // 最初のポインタ操作ひとつで目を覚ます（一度きり・capture・passive）
  window.addEventListener("pointerdown", function unlockOnce(e){
    try{
      if(btn && e && e.target && btn.contains(e.target)) return;  // ボタン自身はトグル側に任せる
      if(enabled && !playing) start();
    }catch(err){ log("unlock", err); }
  }, {capture:true, passive:true, once:true});
}
})();
</script>
