<script>
// ════ plugin: ekibyo ════ Plague plugin for chronicle/index.html. Paste verbatim into its own <script> tag after the core script. All simulation runs on the "year" event (pause/speed/
(()=>{ "use strict";
  if(!window.REKISHI) return;
  if(window.__EKIBYO_LOADED__) return;   // guard against double inclusion
  window.__EKIBYO_LOADED__ = true;

  const R = window.REKISHI;

  // ==================================================================
  //  疫病 (ekibyo) — plagues travel the trade routes.
  //  Quiet plugin: no dock button. History doing what history does.
  //
  //  Custom props added to civ objects (survive per host contract):
  //    civ._ekibyo            {until:number, mark:<g>|null}  while infected
  //    civ._ekibyoImmuneUntil number — survivors are immune until this year
  //
  //  Emits: "ekibyo:outbreak"({civ}) / "ekibyo:end"({civ})
  // ==================================================================

  // ---- tunables ----
  const P_OUTBREAK = 0.01;            // /year, one random living civ
  const P_CONTAGION = 0.2;            // /year, per trade partner of an infected civ
  const DUR_MIN = 3, DUR_MAX = 7;     // infection length, years
  const LOSS_MIN = .06, LOSS_RANGE = .06;   // 6–12 % pop loss per infected year
  const IMM_MIN = 25, IMM_RANGE = 11;       // ~30 years of immunity (25–35)

  // small escaper — chronicle entries go through R.write (textContent),
  // but anything we ever put into innerHTML must pass through this.
  const esc = s => String(s).replace(/[&<>"']/g,
    ch => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[ch]));

  // ---- visuals: CSS + blur filter ----
  try{
    const style = document.createElement("style");
    style.textContent =
      ".ekibyo-miasma{pointer-events:none;transform-box:fill-box;transform-origin:center;" +
        "animation:ekibyo-pulse 5.6s ease-in-out infinite;}" +
      "@keyframes ekibyo-pulse{" +
        "0%,100%{opacity:.32;transform:scale(1);}" +
        "50%{opacity:.6;transform:scale(1.13);}}";
    document.head.appendChild(style);

    const filt = R.mk("filter", {id:"ekibyo-blur", x:"-80%", y:"-80%", width:"260%", height:"260%"});
    filt.append(R.mk("feGaussianBlur", {stdDeviation: 7}));
    R.defs.append(filt);
  }catch(err){ console.error("[ekibyo setup]", err); }

  // ---- prose (history-book voice, dry asides) ----
  const P_HASSEI = [   // outbreak — type "bad"
    (c)=>`${c.name}に熱病はやる。医師団は原因を「空気」と断定し、おおむね正しかった。`,
    (c)=>`${c.name}、悪疫に見舞われる。市場は閉じ、噂だけが平常通り流通した。`,
    (c)=>`${c.name}の街々に病広がる。神官は${c.deity}の機嫌を疑い、医師は井戸を疑った。後者がいくらか近かった。`,
    (c)=>`${c.name}に疫病おこる。処方は「葱を首に巻くこと」。効かなかったが、よく売れた。`,
    (c)=>`${c.name}、熱病に伏す。鳥の面をつけた医師が現れ、病人より先に子供たちを泣かせた。`,
  ];
  const P_DENPA = [    // contagion via trade — type "bad"
    (a,b)=>`疫病、隊商とともに${b.name}へ渡る。商品は無事だった。`,
    (a,b)=>`${a.name}の病、交易路を伝って${b.name}に至る。これだけは関税を払わなかった。`,
    (a,b)=>`${b.name}にも熱病が達する。隊商は荷とともに、帳簿に載らぬものを運んでいた。`,
  ];
  const P_SHUSOKU = [  // recovery — type "good"
    (c)=>`${c.name}の疫病、去る。人々は鐘を鳴らし、医師団は手柄を主張した。`,
    (c)=>`${c.name}、ようやく病から癒える。生き残った者たちは、まず井戸を掘り直した。`,
    (c)=>`${c.name}の悪疫、終わる。記録係は死者の名を書き終え、長い昼寝をした。`,
    (c)=>`${c.name}に静けさ戻る。${c.deity}への感謝祭が開かれ、医師団は招かれなかった。`,
  ];

  // ---- miasma visual ----
  function capitalOf(c){
    if(!c || !c.alive || !Array.isArray(c.cities) || !c.cities.length) return null;
    return c.cities.find(ct => ct && ct.capital) || c.cities[0];
  }

  function drawMiasma(c){
    try{
      removeMiasma(c);
      const cap = capitalOf(c);
      if(!cap || !c._ekibyo) return;
      const g = R.mk("g", {class:"ekibyo-miasma"});
      g.append(R.mk("circle", {cx:cap.x, cy:cap.y, r:32, fill:"#7d8f46",
        "fill-opacity":.55, filter:"url(#ekibyo-blur)"}));
      g.append(R.mk("circle", {cx:cap.x, cy:cap.y, r:15, fill:"#5f7a36",
        "fill-opacity":.6, filter:"url(#ekibyo-blur)"}));
      R.gFx.append(g);
      c._ekibyo.mark = g;
    }catch(err){ console.error("[ekibyo miasma]", err); }
  }

  function removeMiasma(c){
    const st = c && c._ekibyo;
    if(!st || !st.mark) return;
    const g = st.mark;
    st.mark = null;
    try{
      // WAAPI wins over the CSS pulse, so this fades out cleanly
      const a = g.animate([{opacity:.45},{opacity:0}], {duration:1100, easing:"ease-out", fill:"forwards"});
      a.onfinish = ()=>{ try{ g.remove(); }catch(_){/* gone */} };
      setTimeout(()=>{ try{ g.remove(); }catch(_){/* gone */} }, 1500); // belt and braces
    }catch(err){
      try{ g.remove(); }catch(_){/* gone */}
    }
  }

  // ---- infection lifecycle ----
  function infect(c, src){
    try{
      if(!c || !c.alive || c._ekibyo) return false;                           // already sick: skip
      if(typeof c._ekibyoImmuneUntil === "number" && R.year < c._ekibyoImmuneUntil) return false;
      const dur = DUR_MIN + (Math.random()*(DUR_MAX - DUR_MIN + 1) | 0);      // 3–7 years
      c._ekibyo = {until: R.year + dur, mark: null};
      drawMiasma(c);
      if(src) R.write(R.pick(P_DENPA)(src, c), "bad");
      else    R.write(R.pick(P_HASSEI)(c), "bad");
      R.emit("ekibyo:outbreak", {civ: c});
      return true;
    }catch(err){ console.error("[ekibyo infect]", err); return false; }
  }

  function recover(c){
    try{
      removeMiasma(c);
      delete c._ekibyo;
      c._ekibyoImmuneUntil = R.year + IMM_MIN + (Math.random()*IMM_RANGE | 0);
      if(c.alive){
        R.write(R.pick(P_SHUSOKU)(c), "good");
        R.emit("ekibyo:end", {civ: c});
      }
    }catch(err){ console.error("[ekibyo recover]", err); }
  }

  // ---- yearly simulation ----
  R.on("year", ({year})=>{
    try{
      // 1) ongoing infections (snapshot — civs infected this very year start suffering next year)
      const infected = R.civs.filter(c => c && c._ekibyo);
      for(const c of infected){
        if(!c._ekibyo) continue;            // recovered earlier in this loop (paranoia)
        if(!c.alive){ removeMiasma(c); delete c._ekibyo; continue; }

        // population loss: 6–12 % per infected year (core collapses civs below 120 pop on its own)
        c.pop = Math.max(1, Math.round(c.pop * (1 - (LOSS_MIN + Math.random()*LOSS_RANGE))));

        // contagion along trade routes
        if(c.trades && c.trades.size){
          for(const pid of c.trades){
            if(Math.random() >= P_CONTAGION) continue;
            const partner = R.civs.find(o => o && o.id === pid && o.alive);
            if(partner) infect(partner, c);
          }
        }

        // recovery at the end of its course
        if(year >= c._ekibyo.until) recover(c);
      }

      // 2) spontaneous outbreak: ~1%/year, one random living civ
      if(Math.random() < P_OUTBREAK){
        const alive = R.civs.filter(c => c && c.alive);
        if(alive.length) infect(R.pick(alive), null);
      }
    }catch(err){ console.error("[ekibyo year]", err); }
  });

  // ---- cleanup when a civ dies (plague-driven collapse is core behavior) ----
  R.on("civ-died", c => {
    try{
      if(c && c._ekibyo){ removeMiasma(c); delete c._ekibyo; }
    }catch(err){ console.error("[ekibyo civ-died]", err); }
  });

  // if the anchor city somehow falls while infected, re-anchor the blotch
  R.on("city-fell", ({loser})=>{
    try{
      if(loser && loser._ekibyo && loser.alive) drawMiasma(loser);
    }catch(err){ console.error("[ekibyo city-fell]", err); }
  });

  void esc; // reserved: no innerHTML in this plugin today
})();
</script>

<script>
// ════ plugin: hatsumei ════ Paste into its own <script> tag after the core script in chronicle/index.html. Per civ ~2%/year an invention is picked from a 26-item corpus (8 items, ~31%, are "spread"-type per the {name, effect} sh
(() => {
  "use strict";
  if(!window.REKISHI) return;
  const R = window.REKISHI;

  // ==================================================================
  //  発明 — 文明はものを発明する。おおむね役に立つ。
  //  effect "growth": 人口成長 +2% を10年間
  //  effect "spread": 5年後、交易相手の一国へ伝播（コーパスの約3割）
  // ==================================================================

  const esc = s => String(s).replace(/[&<>"']/g, m =>
    ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" }[m]));

  const CORPUS = [
    {name:"二枚目の地図（一枚目を失くしたときのため）", effect:"spread"},
    {name:"改良された櫂（漕ぐと進む）", effect:"growth"},
    {name:"苦情受付箱（火気厳禁）", effect:"growth"},
    {name:"会議を終わらせる銅鑼", effect:"spread"},
    {name:"雨の日専用の靴（雨の日しか履けない）", effect:"growth"},
    {name:"数を三つまで数える教育課程", effect:"spread"},
    {name:"干し草の新しい積み方（前と同じだが名前がついた）", effect:"spread"},
    {name:"持ち運べる日時計（夜は、ただ持ち運ぶ）", effect:"growth"},
    {name:"結び目で記録する縄（ほどくと忘れる）", effect:"spread"},
    {name:"嘘を計る天秤（重い嘘ほど沈む、とされた）", effect:"growth"},
    {name:"麦を倍に見せる籠（徴税の日に禁止された）", effect:"growth"},
    {name:"眠気を測る砂時計（見ていると眠くなる）", effect:"growth"},
    {name:"誰にも聞こえない太鼓（夜間の演奏用）", effect:"growth"},
    {name:"風見羊（風ではなく、羊の気分を示す）", effect:"growth"},
    {name:"謝罪用の帽子（深くかぶるほど誠意とされる）", effect:"spread"},
    {name:"川を渡らない橋（両岸の眺めが良い）", effect:"growth"},
    {name:"文字を覚えるための歌（歌のほうが本文より長い）", effect:"spread"},
    {name:"来年の暦（中身は今年と同じ）", effect:"spread"},
    {name:"取っ手が二つある壺（貸し借りの争いを防ぐ）", effect:"growth"},
    {name:"逆さに立てる箒（客が来る前兆とされた）", effect:"growth"},
    {name:"開戦を予告する旗（揚げた時点で手遅れ）", effect:"growth"},
    {name:"伝書鳩の通り道の地図（鳩は読まなかった）", effect:"growth"},
    {name:"二人用の椅子（仲の良いあいだに限る）", effect:"growth"},
    {name:"王のための長い廊下（引き返す練習用）", effect:"growth"},
    {name:"穴のない笛（静かな祭りのため）", effect:"growth"},
    {name:"塩の升の改良型（量っても減らないように見える）", effect:"growth"},
  ];

  const COMMENTS = [
    "生活は変わらなかったが、会話は増えた。",
    "のちに当たり前になりすぎて、発明者は忘れられた。",
    "発明者は称えられ、一年だけ税を免じられた。",
    "最初の試作品は、なぜか隣家の屋根の上で見つかった。",
    "神官たちは反対したが、使ってみてからは黙った。",
    "これで何かが便利になったと、記録は強く主張している。",
    "使い方は、子どもたちが先に覚えた。",
    "王は一目見て「前からあった」と言ったが、なかった。",
    "発明の動機は伝わっていない。おそらく退屈であった。",
  ];

  // ---- per-civ record: civ._hatsumei = [{name, effect, year, boostUntil?, spreadIn?, spread, spreadTo?, spreadYear?}]

  function tradePartner(c){
    try{
      if(!c.trades || !c.trades.size) return null;
      const cand = R.civs.filter(o => o && o.alive && o !== c && c.trades.has(o.id));
      return cand.length ? R.pick(cand) : null;
    }catch(_){ return null; }
  }

  function invent(c, yr){
    if(!c._hatsumei) c._hatsumei = [];
    const have = new Set(c._hatsumei.map(r => r.name));
    const avail = CORPUS.filter(i => !have.has(i.name));
    if(!avail.length) return;                      // すべて発明し尽くした国は、しばらく休む
    const base = R.pick(avail);
    const rec = { name: base.name, effect: base.effect, year: yr, spread: false };
    if(base.effect === "spread") rec.spreadIn = yr + 5;
    else rec.boostUntil = yr + 10;
    c._hatsumei.push(rec);
    R.write(`${c.name}、${rec.name}を発明する。${R.pick(COMMENTS)}`, "civic");
    R.emit("hatsumei:invented", { civ: c, invention: rec });
  }

  R.on("year", arg => {
    try{
      const yr = (arg && typeof arg.year === "number") ? arg.year : R.year;
      for(const c of R.civs.slice()){
        if(!c || !c.alive || !c.cities) continue;
        const list = c._hatsumei;
        if(list && list.length){
          // growth boosts: +2%/年（重複は3件まで効く）
          let boosts = 0;
          for(const rec of list){
            if(rec.effect === "growth" && yr <= rec.boostUntil) boosts++;
          }
          if(boosts > 0 && c.pop > 0){
            c.pop = Math.round(c.pop * Math.pow(1.02, Math.min(boosts, 3)));
          }
          // pending spreads: 5年経過後、交易相手が現れ次第ひろまる
          for(const rec of list){
            if(rec.effect !== "spread" || rec.spread || yr < rec.spreadIn) continue;
            const partner = tradePartner(c);
            if(!partner) continue;                 // 商路がなければ、知恵は家にこもる
            rec.spread = true; rec.spreadTo = partner.name; rec.spreadYear = yr;
            R.write(`${rec.name}、${partner.name}に伝わる。改良され、名前だけ変わった。`, "trade");
          }
        }
        // 新発明 ~2%/年
        if(c.alive && Math.random() < .02) invent(c, yr);
      }
    }catch(err){ console.error("[hatsumei] year handler", err); }
  });

  R.on("civ-died", c => {
    try{
      if(!c) return;
      const n = c._hatsumei ? c._hatsumei.length : 0;
      if(n > 0){
        R.write(`${c.name}の発明${n}件、灰の下に眠る。いくつかは、また誰かが発明するだろう。`, "civic");
      }
    }catch(err){ console.error("[hatsumei] civ-died handler", err); }
  });

  // ==================================================================
  //  発明目録（modal）
  // ==================================================================

  const style = document.createElement("style");
  style.textContent = `
    .hatsumei-ovl{position:fixed;inset:0;z-index:8;display:flex;align-items:center;justify-content:center;
      background:rgba(46,36,22,.45);}
    .hatsumei-modal{width:min(540px,calc(100vw - 44px));max-height:min(74vh,620px);display:flex;flex-direction:column;
      background:linear-gradient(105deg,#f2e8cd 0%,#ece1c4 55%,#e5d8b6 100%);color:#4a3b28;
      border:double 5px rgba(74,59,40,.5);border-radius:6px;box-shadow:0 16px 48px rgba(40,30,16,.5);
      font-family:"Hiragino Mincho ProN","Yu Mincho",serif;}
    .hatsumei-modal header{padding:14px 18px 10px;border-bottom:1.5px solid rgba(74,59,40,.35);}
    .hatsumei-modal h2{margin:0;font-size:16px;letter-spacing:.4em;text-align:center;font-weight:700;}
    .hatsumei-sub{margin-top:6px;text-align:center;font-size:11.5px;color:#7a6a52;letter-spacing:.1em;}
    .hatsumei-legend{color:#8a4a32;}
    .hatsumei-body{flex:1;overflow-y:auto;padding:12px 18px;scrollbar-width:thin;}
    .hatsumei-body::-webkit-scrollbar{width:7px}
    .hatsumei-body::-webkit-scrollbar-thumb{background:rgba(74,59,40,.3);border-radius:4px}
    .hatsumei-civ{margin:0 0 13px;}
    .hatsumei-civname{font-size:13px;font-weight:700;letter-spacing:.06em;margin-bottom:3px;}
    .hatsumei-sw{display:inline-block;width:8px;height:8px;margin-right:7px;transform:rotate(45deg);
      border:1px solid #4a3b28;vertical-align:1px;}
    .hatsumei-cnt{font-weight:400;font-size:11px;color:#7a6a52;margin-left:.2em;}
    .hatsumei-item{margin:0 0 2px 17px;font-size:12.3px;line-height:1.8;letter-spacing:.02em;}
    .hatsumei-year{font-weight:700;color:#8a4a32;margin-right:.45em;white-space:nowrap;}
    .hatsumei-dia{color:#8a4a32;font-size:10px;margin-left:.4em;cursor:help;}
    .hatsumei-lost{margin-top:6px;border-top:1px solid rgba(74,59,40,.25);padding-top:9px;}
    .hatsumei-losttitle{text-align:center;font-size:11.5px;color:#7a6a52;letter-spacing:.25em;margin-bottom:9px;}
    .hatsumei-lostciv{opacity:.7;}
    .hatsumei-lostciv .hatsumei-civname{font-style:italic;}
    .hatsumei-empty{margin:18px 4px;text-align:center;font-size:12.5px;color:#7a6a52;line-height:2;}
    .hatsumei-modal footer{padding:10px 14px;border-top:1.5px solid rgba(74,59,40,.35);text-align:right;}
  `;
  document.head.appendChild(style);

  let ovl = null;
  function onKey(e){ if(e.key === "Escape") closeModal(); }
  function closeModal(){
    if(ovl){ ovl.remove(); ovl = null; document.removeEventListener("keydown", onKey); }
  }

  function itemRow(rec){
    const p = document.createElement("p");
    p.className = "hatsumei-item";
    p.innerHTML = `<span class="hatsumei-year">${esc(rec.year)}年</span>${esc(rec.name)}` +
      (rec.spread ? `<span class="hatsumei-dia" title="${esc(rec.spreadYear)}年、${esc(rec.spreadTo || "他国")}に伝播">◆</span>` : "");
    return p;
  }

  function civBlock(c, lost){
    const div = document.createElement("div");
    div.className = "hatsumei-civ" + (lost ? " hatsumei-lostciv" : "");
    const h = document.createElement("div");
    h.className = "hatsumei-civname";
    h.innerHTML = `<span class="hatsumei-sw" style="background:${esc(c.color || "#7a6a52")}"></span>` +
      `${esc(c.name)}<span class="hatsumei-cnt">（${c._hatsumei.length}件）</span>`;
    div.appendChild(h);
    for(const rec of c._hatsumei) div.appendChild(itemRow(rec));
    return div;
  }

  function openModal(){
    try{
      closeModal();
      ovl = document.createElement("div");
      ovl.className = "hatsumei-ovl";
      ovl.addEventListener("pointerdown", e => { if(e.target === ovl) closeModal(); });

      const box = document.createElement("div");
      box.className = "hatsumei-modal";

      const inventors = R.civs.filter(c => c && c._hatsumei && c._hatsumei.length);
      const living = inventors.filter(c => c.alive);
      const lost = inventors.filter(c => !c.alive);
      const total = inventors.reduce((s, c) => s + c._hatsumei.length, 0);

      const head = document.createElement("header");
      head.innerHTML = `<h2>発明目録</h2>` +
        `<div class="hatsumei-sub">これまでの発明　${esc(total)}件<span class="hatsumei-legend">　◆＝他国へ伝播</span></div>`;
      box.appendChild(head);

      const body = document.createElement("div");
      body.className = "hatsumei-body";
      if(!total){
        const p = document.createElement("p");
        p.className = "hatsumei-empty";
        p.textContent = "まだ何も発明されていない。必要は、まだ眠っている。";
        body.appendChild(p);
      } else {
        for(const c of living) body.appendChild(civBlock(c, false));
        if(lost.length){
          const sec = document.createElement("div");
          sec.className = "hatsumei-lost";
          const t = document.createElement("div");
          t.className = "hatsumei-losttitle";
          t.textContent = "― 失われた技術 ―";
          sec.appendChild(t);
          for(const c of lost) sec.appendChild(civBlock(c, true));
          body.appendChild(sec);
        }
      }
      box.appendChild(body);

      const foot = document.createElement("footer");
      const closeBtn = document.createElement("button");
      closeBtn.className = "btn hatsumei-close";
      closeBtn.textContent = "綴じる";
      closeBtn.addEventListener("click", closeModal);
      foot.appendChild(closeBtn);
      box.appendChild(foot);

      ovl.appendChild(box);
      document.body.appendChild(ovl);
      document.addEventListener("keydown", onKey);
    }catch(err){ console.error("[hatsumei] modal", err); }
  }

  try{
    R.addButton("💡 発明目録", openModal);
  }catch(err){ console.error("[hatsumei] addButton", err); }
})();
</script>

<script>
// ════ plugin: yogen-prophet ════ 預言者 plugin. Per-year 1% chance a prophet appears in a random living civ (on the "year" event, so pause/speed/fast-forward safe). Five prophecy kinds: war (any "war-start"), doom ("civ-died"), triple h
(()=>{
"use strict";
if(!window.REKISHI) return;
const R = window.REKISHI;
const log = (e)=>console.error("[yogen]", e);
const esc = (s)=>String(s).replace(/[&<>"']/g, ch=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[ch]));

/* ================= state ================= */
const prophecies = [];   // {id,type,text,civName,made,deadline,count,resolved,hit,resolvedYear}
let seq = 1;
let isOpen = false;

/* ================= corpus ================= */
const ASIDES = [
  "人々は半分だけ信じた。",
  "聞き手の多くは、市が立つ日取りと勘違いして集まった者である。",
  "預言者はそれだけ言うと、ふつうに畑へ帰った。",
  "書記は念のため、同じ文を二枚に書き写した。",
  "王は眉をひそめ、それから供物の在庫を確かめさせた。",
  "子どもたちだけが、最後まで真剣に聞いていた。",
  "翌朝には、預言の文言が三通りに増えていた。",
];
const HIT_PROSE = [
  p=>`かつて${p.civName}に下った預言、成就す。預言者の故郷では記念の市が立った。`,
  p=>`${p.civName}の預言、的中。広場に預言者の像が建てられたが、顔はだいぶ別人だという。`,
  p=>`${p.civName}の預言、まことになる。疑っていた者たちは、最初から信じていたことにした。`,
  p=>`預言「${p.text}」、成就と裁定される。台帳に朱の印が、ことさら丁寧に押された。`,
];
const MISS_PROSE = [
  p=>`${p.civName}の預言、外れる。預言者は「解釈の問題」と述べた。`,
  p=>`${p.civName}の預言、期限を迎えて成らず。台帳には小さく「外」とだけ記された。`,
  p=>`かつて${p.civName}で語られた預言、ついに成らず。預言者は前の年から、静かに占いの店を畳んでいた。`,
];
const WIND_PROSE = [
  p=>`かつて${p.civName}に下った預言「${p.text}」、成就と認められる。風は事実、幾度も向きを変えていた。`,
  p=>`${p.civName}の預言、期限を迎えて成就と裁定。異議を唱える者はなかった（いたが、声は風に流された）。`,
  p=>`預言「${p.text}」、成る。台帳係は印を押しながら、何かを言いかけて、やめた。`,
];
const TYPES = ["war","doom","harvest","city","wind"];

/* ================= prophecy life cycle ================= */
function makeProphecy(){
  const alive = R.civs.filter(c=>c && c.alive);
  if(!alive.length) return;
  const civ = R.pick(alive);
  const n = 10 + (Math.random()*16|0);          // 10..25
  const type = R.pick(TYPES);
  let text;
  if(type==="war")          text = `${n}年のうちに、大きな戦がある`;
  else if(type==="doom")    text = `${n}年のうちに、ひとつの国が地図から消える`;
  else if(type==="harvest") text = `${n}年のうちに、豊作が三度ある`;
  else if(type==="city")    text = `${n}年のうちに、新しい都がひらかれる`;
  else                      text = "いつか、風の向きが変わるだろう";
  const p = {id:seq++, type, text, civName:civ.name, made:R.year, deadline:R.year+n,
             count:0, resolved:false, hit:null, resolvedYear:0};
  prophecies.push(p);
  R.write(`${civ.name}に預言者あらわる。曰く——「${text}」。${R.pick(ASIDES)}`, "civic");
  R.emit("yogen:made", {text, deadline:p.deadline, civ});
}

function resolve(p, hit, corpus){
  if(p.resolved) return;
  p.resolved = true; p.hit = !!hit; p.resolvedYear = R.year;
  try{ R.write(R.pick(corpus || (hit ? HIT_PROSE : MISS_PROSE))(p), hit ? "good" : "bad"); }catch(e){ log(e); }
  try{ R.emit("yogen:resolved", {hit:p.hit}); }catch(e){ log(e); }
  renderIfOpen();
}

function openOf(type){ return prophecies.filter(p=>!p.resolved && p.type===type); }

/* ================= event wiring ================= */
R.on("war-start",   ()=>{ try{ for(const p of openOf("war"))  resolve(p, true); }catch(e){ log(e); } });
R.on("civ-died",    ()=>{ try{ for(const p of openOf("doom")) resolve(p, true); }catch(e){ log(e); } });
R.on("city-founded",()=>{ try{ for(const p of openOf("city")) resolve(p, true); }catch(e){ log(e); } });
R.on("harvest",     ()=>{ try{
  for(const p of openOf("harvest")){ p.count++; if(p.count>=3) resolve(p, true); }
  renderIfOpen();
}catch(e){ log(e); } });

R.on("year", ({year})=>{ try{
  for(const p of prophecies){
    if(p.resolved || year < p.deadline) continue;
    if(p.type==="wind") resolve(p, true, WIND_PROSE);   // 解釈の問題を含む
    else resolve(p, false);
  }
  if(Math.random() < .01) makeProphecy();
  renderIfOpen();                                       // keep countdowns honest
}catch(e){ log(e); } });

/* ================= style ================= */
const style = document.createElement("style");
style.textContent = `
.yogen-overlay{position:fixed;inset:0;z-index:9;display:none;align-items:center;justify-content:center;
  background:rgba(58,46,30,.42);}
.yogen-overlay.yogen-show{display:flex;}
.yogen-modal{width:min(560px,88vw);max-height:78vh;display:flex;flex-direction:column;
  background:linear-gradient(105deg,#f2e8cd 0%,#ece1c4 55%,#e5d8b6 100%);color:#4a3b28;
  border:double 5px rgba(74,59,40,.5);border-radius:6px;box-shadow:0 18px 50px rgba(40,30,16,.45);
  font-family:inherit;}
.yogen-modal header{padding:14px 20px 10px;border-bottom:1.5px solid rgba(74,59,40,.35);}
.yogen-title{margin:0;font-size:17px;letter-spacing:.4em;text-align:center;font-weight:700;}
.yogen-rate{margin-top:6px;text-align:center;font-size:12px;color:#7a6a52;letter-spacing:.08em;}
.yogen-body{overflow-y:auto;padding:10px 18px 14px;scrollbar-width:thin;}
.yogen-body::-webkit-scrollbar{width:7px}
.yogen-body::-webkit-scrollbar-thumb{background:rgba(74,59,40,.3);border-radius:4px}
.yogen-h{margin:12px 0 6px;font-size:12px;letter-spacing:.25em;color:#7a6a52;font-weight:700;
  border-bottom:1px solid rgba(74,59,40,.25);padding-bottom:4px;}
.yogen-row{display:flex;gap:11px;align-items:center;padding:7px 4px;
  border-bottom:1px dashed rgba(74,59,40,.18);}
.yogen-rowmain{flex:1;min-width:0;}
.yogen-meta{font-size:10.5px;color:#7a6a52;letter-spacing:.05em;}
.yogen-text{font-size:12.8px;line-height:1.8;letter-spacing:.02em;}
.yogen-left{flex:none;font-size:11px;font-weight:700;color:#8a4a32;white-space:nowrap;
  border:1.5px solid rgba(138,74,50,.55);border-radius:6px;padding:3px 8px;letter-spacing:.05em;
  background:rgba(138,74,50,.06);}
.yogen-prog{font-size:10.5px;color:#8a4a32;letter-spacing:.05em;}
.yogen-stamp{flex:none;width:37px;height:37px;border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:11px;font-weight:700;border:2px solid;transform:rotate(-9deg);
  letter-spacing:.08em;}
.yogen-stamp-hit{color:#9b2f1f;border-color:rgba(155,47,31,.85);background:rgba(155,47,31,.07);}
.yogen-stamp-miss{color:#857a69;border-color:rgba(133,122,105,.8);background:rgba(133,122,105,.08);}
.yogen-empty{font-size:12px;color:#7a6a52;padding:8px 4px 10px;letter-spacing:.04em;}
.yogen-modal footer{padding:10px 16px;border-top:1.5px solid rgba(74,59,40,.35);text-align:right;}
.yogen-close{cursor:pointer;border:1.5px solid rgba(74,59,40,.3);background:rgba(236,225,196,.9);
  color:#4a3b28;border-radius:8px;padding:6px 14px;font-size:12px;font-family:inherit;font-weight:600;
  letter-spacing:.06em;transition:.18s;}
.yogen-close:hover{border-color:#8a4a32;transform:translateY(-1px);}
`;
document.head.append(style);

/* ================= ledger modal ================= */
const overlay = document.createElement("div");
overlay.className = "yogen-overlay";
overlay.innerHTML = `
  <div class="yogen-modal" role="dialog" aria-label="預言台帳">
    <header>
      <h2 class="yogen-title">預言台帳</h2>
      <div class="yogen-rate"></div>
    </header>
    <div class="yogen-body">
      <div class="yogen-h">審判を待つ預言</div>
      <div class="yogen-open"></div>
      <div class="yogen-h">裁かれた預言</div>
      <div class="yogen-done"></div>
    </div>
    <footer><button type="button" class="yogen-close">帳を閉じる</button></footer>
  </div>`;
document.body.append(overlay);
const rateEl = overlay.querySelector(".yogen-rate");
const openEl = overlay.querySelector(".yogen-open");
const doneEl = overlay.querySelector(".yogen-done");

function render(){ try{
  const waiting = prophecies.filter(p=>!p.resolved).sort((a,b)=>a.deadline-b.deadline);
  const judged  = prophecies.filter(p=>p.resolved).slice().reverse();
  const hits = judged.filter(p=>p.hit).length;
  rateEl.textContent = judged.length
    ? `的中率 ${Math.round(hits/judged.length*100)}%（解釈の問題を含む）`
    : "的中率 ―%（まだ一件も裁かれていない）";

  openEl.innerHTML = waiting.length ? waiting.map(p=>`
    <div class="yogen-row">
      <div class="yogen-rowmain">
        <div class="yogen-meta">${esc(p.made)}年 ・ ${esc(p.civName)}${
          p.type==="harvest" ? `　<span class="yogen-prog">豊作 ${esc(p.count)}／3</span>` : ""}</div>
        <div class="yogen-text">「${esc(p.text)}」</div>
      </div>
      <span class="yogen-left">残り${esc(Math.max(0, p.deadline - R.year))}年</span>
    </div>`).join("")
    : `<div class="yogen-empty">審判を待つ預言はない。大陸は珍しく静かである。</div>`;

  const shown = judged.slice(0, 30);
  doneEl.innerHTML = (shown.length ? shown.map(p=>`
    <div class="yogen-row">
      <span class="yogen-stamp ${p.hit ? "yogen-stamp-hit" : "yogen-stamp-miss"}">${p.hit ? "的中" : "外れ"}</span>
      <div class="yogen-rowmain">
        <div class="yogen-meta">${esc(p.made)}年 ・ ${esc(p.civName)} ―― ${esc(p.resolvedYear)}年に裁定</div>
        <div class="yogen-text">「${esc(p.text)}」</div>
      </div>
    </div>`).join("")
    : `<div class="yogen-empty">台帳のこの頁は、まだ白紙である。</div>`)
    + (judged.length > 30 ? `<div class="yogen-empty">（これより古い記録は、紙魚が食べた）</div>` : "");
}catch(e){ log(e); } }

function renderIfOpen(){ if(isOpen) render(); }

let dockBtn = null;
function openLedger(){ isOpen = true; overlay.classList.add("yogen-show"); render(); if(dockBtn) dockBtn.classList.add("active"); }
function closeLedger(){ isOpen = false; overlay.classList.remove("yogen-show"); if(dockBtn) dockBtn.classList.remove("active"); }

try{
  dockBtn = R.addButton("🔮 預言台帳", ()=>{ try{ isOpen ? closeLedger() : openLedger(); }catch(e){ log(e); } });
}catch(e){ log(e); }
overlay.addEventListener("pointerdown", e=>{ if(e.target === overlay) closeLedger(); });
overlay.querySelector(".yogen-close").addEventListener("click", ()=>{ try{ closeLedger(); }catch(e){ log(e); } });
document.addEventListener("keydown", e=>{ try{ if(e.key === "Escape" && isOpen) closeLedger(); }catch(err){ log(err); } });
})();
</script>

function tallyMark(glyph){

    if(!tallyG){
      tallyG = R.mk("g", {"class":"tenpen-chii-tally"});
      const cap = R.mk("text", {x: tallyBase.x - 6, y: tallyBase.y - 15,
        "font-size":7.5, fill:"#7a6a52", "letter-spacing":".3em", opacity:.65});
      cap.textContent = "天変の記";
      tallyG.append(cap);
      R.gDetail.append(tallyG);
    }
    const col = tallyN % 8, row = (tallyN / 8) | 0;
    tallyN++;
    const t = R.mk("text", {x: tallyBase.x + col*13, y: tallyBase.y + row*13,
      "font-size":10, fill:"#4a3b28", opacity:.6, "text-anchor":"middle"});
    t.textContent = glyph;
    tallyG.append(t);
  }catch(err){ console.error("[tenpen-chii] tally", err); }
}

// ---------------- 都市の後始末（核のcityMarkは非公開なので印を名前で探す） ----------------
function removeCityMark(civ, city, idx){
  try{
    let mark = null;
    for(const g of civ.el.children){
      const t = g.querySelector && g.querySelector("text");
      if(t && t.textContent === city.name){ mark = g; break; }
    }
    if(!mark) mark = civ.el.children[idx] || null;
    if(mark) mark.remove();
    for(const circ of civ.tEl.children){   // 領域の輪も一つ消す（次のtickで核が描き直す）
      if(Math.abs(parseFloat(circ.getAttribute("cx")) - city.x) < .6 &&
         Math.abs(parseFloat(circ.getAttribute("cy")) - city.y) < .6){ circ.remove(); break; }
    }
  }catch(err){ console.error("[tenpen-chii] removeCityMark", err); }
}

// ================= (a) 大地震 =================
const QUAKE_LINES = [
  "大地震おこる。山々は沈黙を守ったが、家々はそうでもなかった。",
  "大地震おこる。諸国の塔は無事を競い、井戸はそれぞれ深さを変えた。",
  "大地震おこる。被害の記録は詳細だが、割れた皿の数だけは誰も数え切れなかった。",
];
function doQuake(){
  try{
    R.svg.classList.add("tenpen-chii-shaking");
    setTimeout(()=>{ try{ R.svg.classList.remove("tenpen-chii-shaking"); }catch(e){} }, 1000);
  }catch(err){ console.error("[tenpen-chii] shake", err); }

  const alive = R.civs.filter(c=>c && c.alive);
  for(const c of alive){
    c.pop = Math.max(1, Math.round(c.pop * (0.90 + Math.random()*0.05)));  // 5〜10%を失う
  }
  let fallen = null, victim = null;
  if(Math.random() < .3){
    const cands = alive.filter(c=>c.cities && c.cities.length);
    if(cands.length){
      victim = R.pick(cands);
      const idx = (Math.random()*victim.cities.length) | 0;
      fallen = victim.cities.splice(idx, 1)[0];
      removeCityMark(victim, fallen, idx);
      R.makeRuin(fallen, victim);
    }
  }
  if(fallen){
    R.write(`大地震おこる。${fallen.name}、石もて記されし歴史に加わる。鶏だけが先に知っていたという。`, "doom");
  } else if(alive.length){
    R.write(R.pick(QUAKE_LINES), "bad");
  } else {
    R.write("大地震おこる。倒れるべき塔がまだ無かったのは、双方にとって幸いであった。", "bad");
  }
  if(victim && victim.alive && !victim.cities.length) R.killCiv(victim);
  tallyMark("△");
  R.emit("tenpen:quake", {year: R.year, city: fallen, civ: victim});
}

// ================= (b) 彗星 =================
function cometFx(){
  const W = R.W, H = R.H;
  const ltr = Math.random() < .5;
  const y0 = H*(0.08 + Math.random()*0.25), y1 = H*(0.18 + Math.random()*0.35);
  const x0 = ltr ? -80 : W+80, x1 = ltr ? W+80 : -80;
  const ang = Math.atan2(y1-y0, x1-x0) * 180 / Math.PI;
  const outer = R.mk("g", {"class":"tenpen-chii-comet"});
  const inner = R.mk("g", {transform:`rotate(${ang.toFixed(1)})`});
  // 尾は進行方向の後ろへ（セピアの墨で三筋）
  inner.append(R.mk("path",{d:"M -5 0 L -46 0",  stroke:"#8a6a45","stroke-width":1.7,"stroke-linecap":"round",opacity:.55}));
  inner.append(R.mk("path",{d:"M -4 -1 L -34 -4",stroke:"#8a6a45","stroke-width":1.1,"stroke-linecap":"round",opacity:.4}));
  inner.append(R.mk("path",{d:"M -4 1 L -34 4",  stroke:"#8a6a45","stroke-width":1.1,"stroke-linecap":"round",opacity:.4}));
  inner.append(R.mk("circle",{cx:0, cy:0, r:2.6, fill:"#4a3b28"}));
  inner.append(R.mk("circle",{cx:0, cy:0, r:4.6, fill:"none", stroke:"#4a3b28","stroke-width":.7, opacity:.45}));
  outer.append(inner);
  R.gFx.append(outer);
  const anim = outer.animate([
    {transform:`translate(${x0}px, ${y0}px)`, opacity:0},
    {transform:`translate(${(x0+(x1-x0)*.1).toFixed(0)}px, ${(y0+(y1-y0)*.1).toFixed(0)}px)`, opacity:.95, offset:.1},
    {transform:`translate(${(x0+(x1-x0)*.88).toFixed(0)}px, ${(y0+(y1-y0)*.88).toFixed(0)}px)`, opacity:.9, offset:.88},
    {transform:`translate(${x1}px, ${y1}px)`, opacity:0}
  ], {duration:6000, easing:"cubic-bezier(.3,.1,.7,.9)"});
  anim.onfinish = ()=>{ try{ outer.remove(); }catch(e){} };
  setTimeout(()=>{ if(outer.isConnected) outer.remove(); }, 7500);
}
function doComet(){
  try{ cometFx(); }catch(err){ console.error("[tenpen-chii] cometFx", err); }
  const alive = R.civs.filter(c=>c && c.alive);
  for(const c of alive){ c.pop = Math.round(c.pop * 1.06) + 3; }   // 一年ぶんの熱狂
  if(alive.length){
    R.write("彗星あらわる。諸国の預言者、繁忙期に入る。", "good");
  } else {
    R.write("彗星あらわる。見上げる者はまだいない。彗星のほうは気にしなかった。", "good");
  }
  tallyMark("☄");
  R.emit("tenpen:comet", {year: R.year});
}

// ================= (c) 大洪水 =================
function riverPoint(){
  try{
    const rivers = R.gDetail.querySelectorAll('path[stroke="#7d99a8"]');
    if(rivers.length){
      const rv = rivers[(Math.random()*rivers.length) | 0];
      const L = rv.getTotalLength();
      const p = rv.getPointAtLength(L * (0.2 + Math.random()*0.6));
      if(isFinite(p.x) && isFinite(p.y)) return {x: p.x, y: p.y};
    }
  }catch(err){ console.error("[tenpen-chii] riverPoint", err); }
  return R.rollSpot();   // 川が見当たらなければ陸のどこかで（地図の都合は水に通じない）
}
function floodFx(x, y){
  for(let i=0; i<2; i++){
    const r0 = 26 + i*16, pts = [], n = 9;
    for(let k=0; k<n; k++){
      const a = k/n*Math.PI*2, rr = r0*(0.7 + Math.random()*0.6);
      pts.push([x + Math.cos(a)*rr, y + Math.sin(a)*rr*0.72]);
    }
    const p = R.mk("path", {d: R.smoothPath(pts), fill:"#7d99a8", opacity:0, "class":"tenpen-chii-flood"});
    R.gFx.append(p);
    p.style.transformOrigin = `${x}px ${y}px`;
    const a = p.animate([
      {transform:"scale(.25)", opacity:0},
      {transform:"scale(1)",   opacity:.34 - i*.1,  offset:.3},
      {transform:"scale(1.12)",opacity:.26 - i*.08, offset:.7},
      {transform:"scale(1.22)",opacity:0}
    ], {duration:5000, delay:i*350, easing:"ease-out", fill:"both"});
    a.onfinish = ()=>{ try{ p.remove(); }catch(e){} };
    setTimeout(()=>{ if(p.isConnected) p.remove(); }, 6800 + i*400);
  }
}
function doFlood(){
  const pt = riverPoint();
  if(!pt) return false;
  try{ floodFx(pt.x, pt.y); }catch(err){ console.error("[tenpen-chii] floodFx", err); }
  const affected = [];
  for(const c of R.civs){
    if(!c || !c.alive || !c.cities || !c.cities.length) continue;
    if(c.cities.some(ct=>Math.hypot(ct.x-pt.x, ct.y-pt.y) < 150)){
      c.pop = Math.max(1, Math.round(c.pop * (0.84 + Math.random()*0.06)));
      c[FERTILE] = R.year + 10;   // 肥沃：十年のあいだ余分に育つ
      affected.push(c);
    }
  }
  let line = "大いなる川、あふれる。失われたものは多く、土だけが肥えた。";
  if(affected.length) line += `${affected.map(c=>c.name).join("、")}の民、しばらく高いところを好んだ。`;
  R.write(line, "bad");
  tallyMark("〰");
  R.emit("tenpen:flood", {year: R.year, x: pt.x, y: pt.y, civs: affected});
  return true;
}

// ---------------- 年の歩み ----------------
R.on("year", ({year})=>{
  try{
    // 洪水あとの肥沃（静かに効く。年代記は毎年の麦の背丈までは記さない）
    for(const c of R.civs){
      if(!c || typeof c[FERTILE] !== "number") continue;
      if(!c.alive){ delete c[FERTILE]; continue; }
      if(c[FERTILE] >= year) c.pop = Math.round(c.pop * 1.025) + 1;
      else delete c[FERTILE];
    }
    // 天変地異の賽（各0.3%／年・40年に一度まで）
    if(year - lastCata < 40) return;
    const r = Math.random();
    if(r < .003){ lastCata = year; doQuake(); }
    else if(r < .006){ lastCata = year; doComet(); }
    else if(r < .009){ if(doFlood()) lastCata = year; }
  }catch(err){ console.error("[tenpen-chii] year", err); }
});
})();
</script>

<script>
// ════ plugin: kyutei-shijin ════ Court-poet plugin for chronicle/index.html. Paste into its own <script> tag after the core script. No dock button, no map actors — it only listens and writes
(()=>{
  "use strict";
  if(!window.REKISHI) return;
  const R = window.REKISHI;
  const KEY = "kyutei-shijin"; // 宮廷詩人 — the court poet. heard, not seen.

  // ================================================================
  //  style — the poet writes in a fainter, slanted ink
  //  (.ent.t-poem is generated by the core from our write type "poem")
  // ================================================================
  try{
    const st = document.createElement("style");
    st.id = KEY + "-style";
    st.textContent = [
      ".ent.t-poem{",
      "  white-space:pre-line;",
      "  font-style:italic;",
      "  color:rgba(74,59,40,.74);",
      "  padding:5px 9px 5px 16px;",
      "  border-left:2px solid rgba(74,59,40,.22);",
      "  letter-spacing:.045em;",
      "  line-height:2.1;",
      "}",
      ".ent.t-poem .y{font-style:normal;opacity:.8;}",
    ].join("\n");
    document.head.appendChild(st);
  }catch(err){ console.error("["+KEY+"] style", err); }

  // no innerHTML is used by this plugin; esc() kept for safe extension
  const esc = s => String(s).replace(/[&<>"']/g,
    ch => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[ch]));

  // ================================================================
  //  corpora — 挽歌（自由律）
  // ================================================================
  const L_WAR = [   // 戦の多い紀
    "剣はよく研がれ、よく錆びた",
    "鍛冶屋ばかりが、よく肥えた",
    "太鼓の革は、張り替える間もなかった",
    "地図の線は、引かれては消された",
    "凱旋の門は、くぐられる前に古びた",
    "井戸の名より、戦の名が多く残った",
    "矢は空に問いを放ち、答えは落ちてこなかった",
  ];
  const L_PEACE = [ // 静かな紀
    "井戸の水位だけが、事件だった",
    "見張り台では、よく昼寝がなされた",
    "年代記の書き手は、しばしば筆を乾かした",
    "鐘は時刻のためにだけ鳴った",
    "噂話が、いちばん遠くまで旅をした",
    "犬の喧嘩が、広場の大事件であった",
    "砥石は、包丁のためにだけ回った",
  ];
  const L_DOOM = [  // 滅びの多い紀
    "名前を呼ばれなくなった名前たち",
    "鍵は残り、扉のほうが先に失われた",
    "灯を消す役の者が、最後に自分の灯を消した",
    "苔だけが、約束を守って通いつづけた",
    "地図から消えても、風はその道を覚えていた",
    "空き家の煙突に、鳥が代わって住んだ",
    "祭の日付だけが、誰のものでもなく残った",
  ];
  const L_BIRTH = [ // 誕生の多い紀
    "産声がいちばんの楽器だった",
    "旗を縫う針が、足りなくなった",
    "地図描きは、うれしい悲鳴とともに線を増やした",
    "新しい名が、古い舌を少し噛ませた",
    "礎石はまだ温かく、誰もが触りたがった",
    "井戸を掘る音が、子守唄の代わりをした",
    "王冠より先に、ゆりかごが作られた",
  ];
  const L_HARVEST = [ // 豊作の多い紀
    "倉の鍵番だけが、痩せる暇もなく働いた",
    "麦の重さで、荷車の歌が低くなった",
    "蜜の値が下がり、機嫌の値が上がった",
    "税吏でさえ、帰り道に鼻歌をこぼした",
    "祭は長引き、誰もそれを咎めなかった",
    "皿の数より、招かれた客のほうが多かった",
  ];
  const L_CLOSE = [ // 結びの行
    "それを誰も、不幸とは呼ばなかった。",
    "歴史は、そのように静かに頁をめくった。",
    "されど井戸の水は、変わらず冷たかった。",
    "詩人はここで筆を置き、酒を求めた。",
    "後の世がこれを何と呼ぶかは、後の世に任せる。",
    "風だけが、最後まで聴いていた。",
    "次の紀も、おおかた似たようなものだろう。",
  ];

  // ================================================================
  //  corpora — 俳句（上五・中七・下五）
  // ================================================================
  const KAMI = [  // 上五
    "兵帰る", "旗あせて", "鐘の音や", "遠雷や", "井戸深し",
    "古地図に", "城跡や", "長雨や", "麦秋や",
  ];
  const NAKA = [  // 中七
    "麦は実りて", "王の名を彫る", "税の重さよ", "灯はみな遠く",
    "使者の老いゆく", "塩の値高し", "軍旗色褪せ", "鐘鳴りやまず", "噂の実る",
  ];
  const SHIMO = [ // 下五
    "王は留守", "民知らず", "苔の上", "風渡る", "犬眠る",
    "市は立つ", "誰も見ず", "墨の跡", "鳥帰る",
  ];
  const HAIKU_ATTR = [ // 詞書――乾いた注釈つき
    n => `${n}の宮廷詩人、詠める。王は一度だけうなずいた。`,
    n => `${n}の宴にて披露される。褒美の記録は残っていない。`,
    n => `${n}の詩人の作。本人は中七に不満が残ったと伝わる。`,
    n => `${n}の宮廷にて。季語の有無は、誰も問わなかった。`,
    n => `${n}の王の御前で詠まれる。王は留守であった。`,
    n => `${n}の市でうたわれ、子らが勝手に節をつけた。`,
  ];

  // ================================================================
  //  state
  // ================================================================
  let log = [];                 // この紀に書かれた記事 {text,type}
  let curEra = R.era;           // いま進行中の紀の名（挽歌はこの名で詠む）
  let haikuDue = R.year + 35 + ((Math.random()*20)|0);  // 紀の半ばごろ
  let haikuDone = false;

  function pickLine(corpus, used){
    for(let i = 0; i < 12; i++){
      const s = corpus[(Math.random()*corpus.length)|0];
      if(!used.has(s)){ used.add(s); return s; }
    }
    return corpus[(Math.random()*corpus.length)|0];
  }

  // ================================================================
  //  挽歌 — era's end: 3-4 lines drawn from what actually happened
  // ================================================================
  function composeElegy(eraName){
    let wars = 0, dooms = 0, births = 0, harvests = 0;
    for(const e of log){
      if(e.type === "war") wars++;
      else if(e.type === "doom") dooms++;
      else if(e.type === "birth") births++;
      else if(e.type === "good") harvests++;
    }
    const used = new Set();
    const body = [];
    if(wars + dooms === 0) body.push(pickLine(L_PEACE, used));   // 静かな紀
    const scored = [[wars, L_WAR], [dooms, L_DOOM], [births, L_BIRTH], [harvests, L_HARVEST]]
      .filter(s => s[0] > 0)
      .sort((a, b) => b[0] - a[0]);
    for(const s of scored){
      if(body.length >= 3) break;
      body.push(pickLine(s[1], used));
    }
    while(body.length < 2) body.push(pickLine(L_PEACE, used));   // 何も無かった紀も詠む
    body.push(pickLine(L_CLOSE, used));
    return `【${eraName}の挽歌】　詠み人知らず\n` + body.map(l => "　" + l).join("\n");
  }

  // ================================================================
  //  俳句 — once per era, about a random living civ
  // ================================================================
  function tryHaiku(){
    try{
      const alive = (R.civs || []).filter(c => c && c.alive && c.name);
      if(!alive.length) return false;   // 詠む相手がいない年は、黙って待つ
      const civ = R.pick(alive);
      const verse = `${R.pick(KAMI)}　${R.pick(NAKA)}　${R.pick(SHIMO)}`;
      const attr = R.pick(HAIKU_ATTR)(civ.name);
      R.write(`【句】　${verse}\n　――${attr}`, "poem");
      return true;
    }catch(err){ console.error("["+KEY+"] haiku", err); return false; }
  }

  // ================================================================
  //  hooks
  // ================================================================
  R.on("written", w => {
    try{
      if(!w || typeof w.text !== "string") return;
      if(w.type === "poem" || w.type === "era") return;  // 自作と幕間は数に入れない
      log.push({text: w.text, type: w.type});
      if(log.length > 600) log.splice(0, log.length - 600);
    }catch(err){ console.error("["+KEY+"] written", err); }
  });

  R.on("era-change", ev => {
    try{
      const ended = curEra;
      R.write(composeElegy(ended), "poem");
      log = [];
      curEra = (ev && ev.era) || R.era;
      const y0 = (ev && typeof ev.year === "number") ? ev.year : R.year;
      haikuDue = y0 + 35 + ((Math.random()*20)|0);
      haikuDone = false;
    }catch(err){ console.error("["+KEY+"] era-change", err); }
  });

  R.on("year", ev => {
    try{
      const y = (ev && typeof ev.year === "number") ? ev.year : R.year;
      if(!haikuDone && y >= haikuDue && tryHaiku()) haikuDone = true;
    }catch(err){ console.error("["+KEY+"] year", err); }
  });
})();
</script>

<script>
// ════ plugin: ocho-keizu ════ 王朝の系譜 (dynasty lineage) plugin for chronicle/index.html. Paste the code into its own <script> tag after the core script. Design notes: (1) State lives on eac
(()=>{
  "use strict";
  if(!window.REKISHI) return;
  const R = window.REKISHI;
  const PROP = "_keizuState";

  // ---------- small helpers ----------
  const esc = s => String(s).replace(/[&<>"']/g,
    m => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));

  const KD = ["","一","二","三","四","五","六","七","八","九"];
  function kanjiNum(n){
    n = Math.max(0, n|0);
    if(n === 0) return "零";
    if(n < 10) return KD[n];
    if(n < 100){
      const t = (n/10)|0, o = n%10;
      return (t>1 ? KD[t] : "") + "十" + (o ? KD[o] : "");
    }
    return String(n);
  }

  function makeBase(avoid){
    const S = R.lore.STEM;
    for(let i=0;i<24;i++){
      const b = Math.random() < .5 ? R.pick(S) : R.pick(S) + R.pick(S);
      if(!avoid || !avoid.includes(b)) return b;
    }
    return R.pick(S) + R.pick(S);
  }

  // ---------- prose ----------
  const P_SUCC = [
    (o,h)=>`${o}、世を去る。${h}が立つ。戴冠式で冠が少し大きいことが判明した。`,
    (o,h)=>`${o}、眠るように崩御。${h}が玉座に就く。玉座は先王の形に少し凹んでいた。`,
    (o,h)=>`${o}、位を退いて隠棲する。${h}が継いだ。引き継ぎの覚え書きは一行、「井戸に気をつけよ」。`,
    (o,h)=>`${o}の御世、終わる。${h}、即位してまず宝物庫の鍵の在処を尋ねた。`,
    (o,h)=>`${o}、世を去る。喪が明けるより先に、${h}は税の帳簿を検めたという。`,
  ];

  // epithet corpus, mapped to reign profile (17 total)
  const EPI = {
    plague: ["耐え王","薬湯王","蒼ざめの王"],
    war:    ["苛烈王","鉄の王","軍鼓王"],
    peace:  ["和睦王","条約綴じの王"],
    build:  ["築き王","石積み王"],
    fat:    ["麦の王","居眠り王","蜜月の王"],
    lean:   ["空鍋王","忍耐の王"],
    long:   ["長閑王","不動の王"],
  };

  function epithetFor(r, len){
    const e = r.ev;
    if(e.plague >= 1) return R.pick(EPI.plague);
    if(e.war >= 2) return R.pick(EPI.war);
    if(e.peace >= 2 || (e.peace >= 1 && e.war === 0)) return R.pick(EPI.peace);
    if(e.city >= 2) return R.pick(EPI.build);
    if(e.harvest >= 2 && e.famine === 0) return R.pick(EPI.fat);
    if(e.famine >= 2) return R.pick(EPI.lean);
    if(len >= 40 && e.war === 0 && e.famine === 0) return R.pick(EPI.long);
    return null;
  }

  // ---------- dynasty state (lives on civ custom props) ----------
  function crown(st, base, startYear){
    const ord = (st.ordinals[base] || 0) + 1;
    st.ordinals[base] = ord;
    const r = {
      base, ord,
      name: base + kanjiNum(ord) + "世",
      epithet: null,
      reignStart: startYear,
      reignEnd: null,
      reignLen: 15 + (Math.random()*31|0),       // 15-45 years
      ev: {war:0, peace:0, harvest:0, famine:0, city:0, plague:0},
    };
    st.cur = r;
    st.gen++;
    st.rulers.push(r);
    while(st.rulers.length > 30){ st.rulers.shift(); st.lost++; }  // cap lineage at 30
    return r;
  }

  function ensure(civ){
    if(!civ[PROP]){
      const st = civ[PROP] = {
        pool: [], ordinals: Object.create(null),
        rulers: [], gen: 0, lost: 0, cur: null,
      };
      const n = 2 + (Math.random()*2|0);          // 2-3 dynasty names per civ
      while(st.pool.length < n){
        const b = makeBase(st.pool);
        if(!st.pool.includes(b)) st.pool.push(b);
      }
      crown(st, st.pool[0], (typeof civ.born === "number" ? civ.born : R.year));
    }
    return civ[PROP];
  }

  function succeed(civ, st){
    const old = st.cur;
    old.reignEnd = R.year;
    old.epithet = epithetFor(old, old.reignEnd - old.reignStart);

    let base = old.base, fresh = false;
    if(Math.random() < .2){                       // 20%: a new name takes the throne
      fresh = true;
      const others = st.pool.filter(b => b !== old.base);
      if(others.length && Math.random() < .6){
        base = R.pick(others);
      } else {
        base = makeBase(st.pool);
        st.pool.push(base);
        if(st.pool.length > 5) st.pool.shift();
      }
    }
    const heir = crown(st, base, R.year);

    let line = R.pick(P_SUCC)(`${civ.name}の${old.name}`, heir.name);
    if(old.epithet) line += `先王は後世、「${old.epithet}」と呼ばれる。`;
    if(fresh && heir.base !== old.base) line += `血筋はここで替わり、好事家はこれを新王朝と呼んだ（ひと月で飽きた）。`;
    R.write(line, "civic");
  }

  // ---------- event counting for epithets ----------
  function bump(civ, key){
    try{
      if(!civ || !civ.alive) return;
      const st = civ[PROP];
      if(!st || !st.cur) return;
      st.cur.ev[key]++;
    }catch(err){ console.error("[keizu] bump", err); }
  }
  R.on("war-start",      d => { if(d){ bump(d.a, "war"); bump(d.b, "war"); } });
  R.on("war-end",        d => { if(d){ bump(d.a, "peace"); bump(d.b, "peace"); } });
  R.on("harvest",        d => bump(d && d.civ, "harvest"));
  R.on("famine",         d => bump(d && d.civ, "famine"));
  R.on("city-founded",   d => bump(d && d.civ, "city"));
  R.on("ekibyo:outbreak", d => bump(d && d.civ, "plague"));

  // ---------- lifecycle ----------
  R.on("civ-born", civ => {
    try{ if(civ) ensure(civ); }
    catch(err){ console.error("[keizu] civ-born", err); }
  });

  R.on("year", () => {
    try{
      for(const c of R.civs){
        if(!c || !c.alive) continue;
        const st = ensure(c);
        const r = st.cur;
        if(!r) continue;
        if(R.year - r.reignStart >= r.reignLen) succeed(c, st);
      }
    }catch(err){ console.error("[keizu] year", err); }
  });

  R.on("civ-died", civ => {
    try{
      if(!civ) return;
      const st = civ[PROP];
      if(!st) return;
      if(st.cur && st.cur.reignEnd == null){
        st.cur.reignEnd = R.year;
        st.cur.epithet = st.cur.epithet ||
          epithetFor(st.cur, st.cur.reignEnd - st.cur.reignStart);
      }
      R.write(`${civ.name}の王統、${kanjiNum(st.gen)}代で絶える。系図は巻物ごと質に流れた。`, "civic");
    }catch(err){ console.error("[keizu] civ-died", err); }
  });

  // ---------- style ----------
  const style = document.createElement("style");
  style.textContent = `
  .keizu-overlay{position:fixed;inset:0;z-index:8;background:rgba(46,36,22,.45);
    display:flex;align-items:center;justify-content:center;}
  .keizu-modal{width:min(540px,88vw);max-height:80vh;overflow-y:auto;
    background:linear-gradient(115deg,#f2e8cd 0%,#ece1c4 55%,#e3d5b3 100%);
    border:5px double rgba(74,59,40,.5);border-radius:6px;color:#4a3b28;
    font-family:"Hiragino Mincho ProN","Yu Mincho",serif;
    box-shadow:0 18px 50px rgba(40,30,16,.45);scrollbar-width:thin;}
  .keizu-modal::-webkit-scrollbar{width:7px;}
  .keizu-modal::-webkit-scrollbar-thumb{background:rgba(74,59,40,.3);border-radius:4px;}
  .keizu-head{position:sticky;top:0;display:flex;align-items:center;justify-content:space-between;
    padding:13px 18px 10px;background:linear-gradient(180deg,#f2e8cd 80%,rgba(242,232,205,0));
    border-bottom:1.5px solid rgba(74,59,40,.35);}
  .keizu-title{font-weight:700;letter-spacing:.35em;font-size:15px;}
  .keizu-x{border:none;background:none;color:#7a6a52;font-size:20px;cursor:pointer;
    font-family:inherit;line-height:1;padding:2px 6px;}
  .keizu-x:hover{color:#8a4a32;}
  .keizu-body{padding:4px 22px 20px;}
  .keizu-empty{font-size:12.5px;color:#7a6a52;text-align:center;padding:28px 0;letter-spacing:.05em;}
  .keizu-civ{margin:16px 0 0;}
  .keizu-civ.keizu-dead{opacity:.55;filter:grayscale(.45);}
  .keizu-civhead{display:flex;align-items:baseline;gap:8px;}
  .keizu-dot{flex:none;width:10px;height:10px;border-radius:50%;
    border:1.5px solid #4a3b28;align-self:center;}
  .keizu-cname{font-weight:700;font-size:14px;letter-spacing:.06em;}
  .keizu-status{font-size:10.5px;color:#7a6a52;letter-spacing:.12em;}
  .keizu-line{list-style:none;margin:9px 0 0 4px;padding:3px 0 3px 18px;
    border-left:1.5px solid rgba(74,59,40,.55);}
  .keizu-line li{position:relative;margin:0 0 9px;font-size:12.8px;line-height:1.55;}
  .keizu-line li:last-child{margin-bottom:2px;}
  .keizu-line li::before{content:"";position:absolute;left:-22.5px;top:.5em;width:6px;height:6px;
    border-radius:50%;background:#ece1c4;border:1.5px solid #4a3b28;}
  .keizu-worm{font-style:italic;color:#7a6a52;font-size:11.5px;}
  .keizu-worm::before{display:none !important;}
  .keizu-years{display:block;font-size:10.5px;color:#8a4a32;letter-spacing:.06em;}
  .keizu-rname{font-weight:700;letter-spacing:.04em;}
  .keizu-epi{margin-left:.55em;font-size:11.5px;color:#7a6a52;}
  `;
  document.head.append(style);

  // ---------- the genealogy modal ----------
  function buildHTML(){
    let body = "";
    const list = R.civs.filter(c => c && c[PROP]);
    if(!list.length){
      body = `<p class="keizu-empty">まだ王は一人もいない。系図書きは、筆を舐めて待っている。</p>`;
    } else {
      for(const c of list){
        const st = c[PROP];
        const status = (c.alive ? "現存" : "滅亡") + "・全" + kanjiNum(st.gen) + "代";
        body += `<section class="keizu-civ${c.alive ? "" : " keizu-dead"}">
          <div class="keizu-civhead">
            <span class="keizu-dot" style="background:${esc(c.color)}"></span>
            <span class="keizu-cname">${esc(c.name)}</span>
            <span class="keizu-status">${esc(status)}</span>
          </div>
          <ul class="keizu-line">`;
        if(st.lost > 0){
          body += `<li class="keizu-worm">（これより前の${esc(kanjiNum(st.lost))}代の記録は、虫が食べた）</li>`;
        }
        for(const r of st.rulers){
          const span = r.reignEnd == null
            ? `${r.reignStart}年〜（在位中）`
            : `${r.reignStart}年〜${r.reignEnd}年`;
          body += `<li><span class="keizu-years">${esc(span)}</span>` +
            `<span class="keizu-rname">${esc(r.name)}</span>` +
            (r.epithet ? `<span class="keizu-epi">「${esc(r.epithet)}」</span>` : "") +
            `</li>`;
        }
        body += `</ul></section>`;
      }
    }
    return `<div class="keizu-head">
        <span class="keizu-title">王朝の系譜</span>
        <button class="keizu-x" type="button" aria-label="閉じる">×</button>
      </div>
      <div class="keizu-body">${body}</div>`;
  }

  let overlay = null, escHandler = null;

  function closeModal(){
    if(overlay){ overlay.remove(); overlay = null; }
    if(escHandler){ document.removeEventListener("keydown", escHandler); escHandler = null; }
    btn.classList.remove("active");
  }

  function openModal(){
    overlay = document.createElement("div");
    overlay.className = "keizu-overlay";
    overlay.addEventListener("pointerdown", e => { if(e.target === overlay) closeModal(); });
    const modal = document.createElement("div");
    modal.className = "keizu-modal";
    modal.innerHTML = buildHTML();
    overlay.append(modal);
    document.body.append(overlay);
    modal.querySelector(".keizu-x").addEventListener("click", closeModal);
    escHandler = e => { if(e.key === "Escape") closeModal(); };
    document.addEventListener("keydown", escHandler);
    btn.classList.add("active");
  }

  const btn = R.addButton("👑 系譜", () => {
    try{ overlay ? closeModal() : openModal(); }
    catch(err){ console.error("[keizu] modal", err); }
  });
})();
</script>


<script>
// ════ plugin: kokkyo (wave2) ════ Plugin "kokkyo" (🗺 国境 — political map mode) for chronicle/index.html. Paste into its own <script> tag after the existing plugins.  Integration: own <g> inserted
(()=>{ "use strict";
if(!window.REKISHI) return;
const R = window.REKISHI;
const TAG = "[kokkyo]";

// ════ 国境 — political map mode. Nearest-city Voronoi over a fixed land grid,
//      painted squares per civ, stitched ink borders, parchment legend. ════

const esc = s => String(s==null?"":s).replace(/[&<>"']/g, c =>
  ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

try{

// ---------------------------------------------------------------- css
const style = document.createElement("style");
style.textContent = `
.kokkyo-legend{position:fixed;left:12px;bottom:118px;z-index:5;pointer-events:none;
  max-width:208px;padding:9px 13px 10px;border:1.5px solid rgba(74,59,40,.35);border-radius:8px;
  background:linear-gradient(115deg,rgba(244,234,210,.93),rgba(230,217,184,.93));
  box-shadow:0 3px 10px rgba(74,59,40,.22);color:#4a3b28;
  font-family:"Hiragino Mincho ProN","Yu Mincho",serif;font-size:11.5px;letter-spacing:.05em;}
.kokkyo-legend-title{display:flex;align-items:baseline;gap:8px;font-weight:700;font-size:11px;
  letter-spacing:.3em;color:#7a6a52;border-bottom:1px solid rgba(74,59,40,.25);
  padding-bottom:4px;margin-bottom:6px;}
.kokkyo-legend-year{margin-left:auto;font-weight:400;font-size:10px;letter-spacing:.08em;}
.kokkyo-row{display:flex;align-items:center;gap:7px;line-height:1.9;}
.kokkyo-chip{flex:none;width:9px;height:9px;border-radius:2.5px;border:1px solid rgba(74,59,40,.55);}
.kokkyo-name{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.kokkyo-share{flex:none;font-size:10px;color:#7a6a52;letter-spacing:.04em;}
.kokkyo-empty{color:#7a6a52;font-style:italic;font-size:11px;line-height:1.9;}
`;
document.head.append(style);

// ---------------------------------------------------------------- svg layer (just after gTerritory)
const gMap = R.mk("g", {"class":"kokkyo-layer", "pointer-events":"none"});
gMap.style.display = "none";
const gFill = R.mk("g", {opacity:.3});
const borderPath = R.mk("path", {fill:"none", stroke:"#4a3b28", "stroke-width":1.3,
  "stroke-linecap":"round", "stroke-dasharray":"2.6 2.3", opacity:.6});
gMap.append(gFill, borderPath);
R.svg.insertBefore(gMap, R.gTerritory.nextSibling);

// ---------------------------------------------------------------- legend
const legend = document.createElement("div");
legend.className = "kokkyo-legend";
legend.style.display = "none";
document.body.append(legend);

// ---------------------------------------------------------------- grid (built once; the continent never changes)
let SP = 14, cols = 0, rows = 0;
let gi = null;        // grid index -> point index (or -1, sea)
let pts = null;       // [{x,y,i,j}]
let rects = null;     // one reusable <rect> per land point
let lastOwner = null; // Int32Array of civ ids (0 = unowned), to skip untouched cells

function buildGrid(){
  SP = 14;
  const W = Math.max(1, R.W), H = Math.max(1, R.H);
  while(Math.ceil(W/SP) * Math.ceil(H/SP) > 16000) SP += 2;  // keep it a few thousand points
  cols = Math.ceil(W/SP); rows = Math.ceil(H/SP);
  gi = new Int32Array(cols*rows).fill(-1);
  pts = []; rects = [];
  const size = SP - 1, off = size/2, rx = Math.max(2.5, SP*.3);
  const frag = document.createDocumentFragment();
  for(let j=0;j<rows;j++) for(let i=0;i<cols;i++){
    const x = i*SP + SP/2, y = j*SP + SP/2;
    if(!R.inLand(x, y)) continue;
    gi[j*cols+i] = pts.length;
    pts.push({x, y, i, j});
    const rc = R.mk("rect", {x:(x-off).toFixed(1), y:(y-off).toFixed(1),
      width:size, height:size, rx:rx.toFixed(1)});
    rc.style.display = "none";
    rects.push(rc); frag.append(rc);
  }
  lastOwner = new Int32Array(pts.length);
  gFill.append(frag);
}

// ---------------------------------------------------------------- state
let on = false, lastComputeYear = -1e9;
let prevCounts = new Map();        // civ id -> owned-point count at last recompute
const lastSwing = new Map();       // civ id -> sim year of last 地図屋 entry

// ---------------------------------------------------------------- recompute
function recompute(){
  try{
    if(!pts) buildGrid();
    const cs = [];
    for(const c of R.civs || []){
      if(!c || !c.alive || !Array.isArray(c.cities)) continue;
      for(const ct of c.cities){
        if(ct && isFinite(ct.x) && isFinite(ct.y)) cs.push({x:ct.x, y:ct.y, civ:c});
      }
    }
    const n = pts.length;
    const ownIdx = new Int32Array(n);
    const ownerOf = new Map();     // civ id -> civ
    const counts = new Map();      // civ id -> point count
    for(let k=0;k<n;k++){
      const p = pts[k];
      let best = -1, bd = Infinity;
      for(let m=0;m<cs.length;m++){
        const dx = cs[m].x - p.x, dy = cs[m].y - p.y, d = dx*dx + dy*dy;
        if(d < bd){ bd = d; best = m; }
      }
      if(best < 0) continue;       // no living civs: leave blank
      const civ = cs[best].civ;
      ownIdx[k] = civ.id|0;
      if(!ownerOf.has(civ.id)) ownerOf.set(civ.id, civ);
      counts.set(civ.id, (counts.get(civ.id)||0) + 1);
    }
    // paint (touch only changed cells)
    for(let k=0;k<n;k++){
      const id = ownIdx[k];
      if(id === lastOwner[k]) continue;
      const rc = rects[k];
      if(!id){ rc.style.display = "none"; }
      else{
        const civ = ownerOf.get(id);
        rc.setAttribute("fill", (civ && civ.color) || "#7a6a52");
        rc.style.display = "";
      }
      lastOwner[k] = id;
    }
    // stitched ink borders between differing neighbors
    let d = "";
    const st = SP * .33;
    for(let k=0;k<n;k++){
      const a = ownIdx[k];
      if(!a) continue;
      const p = pts[k];
      if(p.i + 1 < cols){
        const q = gi[p.j*cols + p.i + 1];
        if(q >= 0){ const b = ownIdx[q];
          if(b && b !== a){ const mx = p.x + SP/2;
            d += `M${mx.toFixed(1)} ${(p.y-st).toFixed(1)}V${(p.y+st).toFixed(1)}`; } }
      }
      if(p.j + 1 < rows){
        const q = gi[(p.j+1)*cols + p.i];
        if(q >= 0){ const b = ownIdx[q];
          if(b && b !== a){ const my = p.y + SP/2;
            d += `M${(p.x-st).toFixed(1)} ${my.toFixed(1)}H${(p.x+st).toFixed(1)}`; } }
      }
    }
    borderPath.setAttribute("d", d);
    // history hook: territory swings >15% (max once per 20 years per civ)
    const yr = R.year|0;
    function swingLine(civ, grew){
      lastSwing.set(civ.id, yr);
      R.write(`${civ.name}の版図、大いに${grew ? "広がる" : "縮む"}。地図屋は今月二度目の引き直しに肩を落とした。`, "civic");
    }
    for(const [id, now] of counts){
      const civ = ownerOf.get(id);
      const old = prevCounts.get(id);
      if(!civ || !civ.alive || typeof old !== "number" || old < 10) continue;
      if(Math.abs(now - old) / old <= .15) continue;
      if(yr - (lastSwing.get(id) ?? -1e9) < 20) continue;
      swingLine(civ, now > old);
    }
    for(const [id, old] of prevCounts){
      if(counts.has(id) || old < 10) continue;       // shrank to nothing while still alive
      const civ = (R.civs || []).find(c => c && c.id === id && c.alive);
      if(!civ || yr - (lastSwing.get(id) ?? -1e9) < 20) continue;
      swingLine(civ, false);
    }
    prevCounts = counts;
    renderLegend(counts);
  }catch(err){ console.error(TAG, "recompute", err); }
}

// ---------------------------------------------------------------- legend
function renderLegend(counts){
  try{
    const total = pts ? pts.length : 0;
    const alive = (R.civs || []).filter(c => c && c.alive);
    let h = `<div class="kokkyo-legend-title">国境図<span class="kokkyo-legend-year">${R.year|0}年</span></div>`;
    if(!alive.length){
      h += `<div class="kokkyo-empty">国境なし。大陸はいま、誰のものでもない。</div>`;
    }else{
      for(const c of alive){
        const pct = total ? Math.round((counts.get(c.id)||0) / total * 100) : 0;
        h += `<div class="kokkyo-row"><span class="kokkyo-chip" style="background:${esc(c.color)}"></span>` +
             `<span class="kokkyo-name">${esc(c.name)}</span><span class="kokkyo-share">${pct}%</span></div>`;
      }
    }
    legend.innerHTML = h;
  }catch(err){ console.error(TAG, "legend", err); }
}

// ---------------------------------------------------------------- toggle
let btn = null;
function setOn(v){
  on = !!v;
  if(btn) btn.classList.toggle("active", on);
  if(on){
    if(!pts) buildGrid();
    prevCounts = new Map();                    // fresh baseline; no swing entry on enable
    R.gTerritory.style.opacity = "0";          // hide core washes while the political map is up
    gMap.style.display = "";
    legend.style.display = "";
    recompute();
    lastComputeYear = R.year|0;
    R.toast("地図屋、国境を引きはじめた");
  }else{
    gMap.style.display = "none";
    legend.style.display = "none";
    R.gTerritory.style.opacity = "";           // restore core washes
    R.toast("地図屋は筆を洗った。国境はまた曖昧になる");
  }
}

// ---------------------------------------------------------------- hooks
R.on("year", e => {
  try{
    if(!on) return;
    const y = (e && typeof e.year === "number") ? e.year : (R.year|0);
    if(y - lastComputeYear >= 5){ lastComputeYear = y; recompute(); }
  }catch(err){ console.error(TAG, "year", err); }
});
for(const ev of ["city-founded", "city-fell", "civ-born", "civ-died"]){
  R.on(ev, () => {
    try{
      if(!on) return;
      lastComputeYear = R.year|0;
      recompute();
    }catch(err){ console.error(TAG, ev, err); }
  });
}

btn = R.addButton("🗺 国境", () => {
  try{ setOn(!on); }catch(err){ console.error(TAG, "toggle", err); }
});

}catch(err){ console.error(TAG, "init failed", err); }
})();
</script>

<script>
// ════ plugin: kenetsu (wave2) ════ Plugin key "kenetsu" (検閲). Paste into its own <script> tag after the existing plugin blocks in chronicle/index.html. Design notes: (1) Targets the newest entry 
(()=>{ "use strict";
if(!window.REKISHI) return;
const R = window.REKISHI;
const TAG = "[kenetsu]";

// ------------------------------------------------------------- helpers
const esc = s => String(s==null?"":s).replace(/[&<>"']/g, c =>
  ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

const entriesEl = document.getElementById("entries");
if(!entriesEl){ console.error(TAG, "entries container not found"); return; }

// ------------------------------------------------------------------ css
const style = document.createElement("style");
style.textContent = `
/* ---- 墨塗り（年代記内） ---- */
.kenetsu-censored{position:relative;}
.kenetsu-blot{cursor:help;}
.kenetsu-ch{
  background-color:#241a0e;color:transparent;text-shadow:none;
  border-radius:1.5px;padding:2px 0 3px;
  transition:background-color .45s ease,color .45s ease;

}
/* ---- 禁書庫（薄暗い羊皮紙） ---- */
.kenetsu-overlay{position:fixed;inset:0;z-index:8;display:none;align-items:center;justify-content:center;
  background:rgba(18,13,6,.62);}
.kenetsu-overlay.kenetsu-open{display:flex;}

  background:linear-gradient(115deg,#4a3f2e 0%,#403526 55%,#372d1f 100%);
  color:#d6c69e;border:double 5px rgba(214,198,158,.4);border-radius:6px;
  box-shadow:0 22px 64px rgba(0,0,0,.65), inset 0 0 60px rgba(0,0,0,.35);
  font-family:"Hiragino Mincho ProN","Yu Mincho",serif;}

.kenetsu-row:last-child{border-bottom:none;}

  line-height:2.2;letter-spacing:.08em;}

  font-size:10.5px;color:rgba(214,198,158,.55);letter-spacing:.1em;}
`;
document.head.append(style);

// ---------------------------------------------------------------- state
const archive = [];      // {year, text, type, censor, at} — 原本はここに眠る
let sinceCensor = 5;     // 直近で塗ってからの記事数（5記事につき最大1件）
let writingSelf = false; // 自分の追記は検閲しない
let isOpen = false;
let dockBtn = null;

function mostPopulous(){
  try{
    let best = null;
    for(const c of R.civs || []){
      if(c && c.alive && (!best || (c.pop|0) > (best.pop|0))) best = c;
    }
    return (best && best.name) ? best.name : "何者か";
  }catch(err){ console.error(TAG, "mostPopulous", err); return "何者か"; }
}

// --------------------------------------------------------- the brush
function censorNow(el, rec){
  if(!el.isConnected) return;   // 頁がすでに繰られていた。検閲官の到着が遅い
  // 本文のテキストノード（年号spanの後ろ）を探す
  let node = null;
  for(const n of el.childNodes){
    if(n.nodeType === 3 && (!node || (n.nodeValue||"").length > (node.nodeValue||"").length)) node = n;
  }
  if(!node || !(node.nodeValue||"").trim()) return;
  const chars = Array.from(node.nodeValue);
  if(chars.length < 8) return;

  const frac = .4 + Math.random()*.3;                       // 40〜70%
  const L = Math.max(3, Math.min(chars.length, Math.round(chars.length*frac)));
  const start = Math.floor(Math.random()*(chars.length - L + 1));
  const stepMs = Math.max(8, Math.min(24, Math.round(700/L)));
  const sweepMs = L*stepMs + 160;

  const blot = document.createElement("span");
  blot.className = "kenetsu-blot";
  for(let i=0;i<L;i++){
    const ch = document.createElement("span");
    ch.className = "kenetsu-ch";
    ch.textContent = chars[start+i];
    ch.style.animationDelay = (i*stepMs)+"ms";              // 左から右へ、刷毛の一掃き
    blot.append(ch);
  }
  const frag = document.createDocumentFragment();
  if(start > 0) frag.append(document.createTextNode(chars.slice(0,start).join("")));
  frag.append(blot);
  if(start+L < chars.length) frag.append(document.createTextNode(chars.slice(start+L).join("")));
  node.replaceWith(frag);

  el.classList.add("kenetsu-censored");
  const stamp = document.createElement("span");
  stamp.className = "kenetsu-stamp";
  stamp.textContent = "検閲済";
  stamp.style.animationDelay = sweepMs+"ms";                // 墨が乾いてから判を押す
  el.append(stamp);

  const censor = rec.censor || mostPopulous();
  archive.push({year: rec.year, text: rec.text, type: rec.type, censor, at: R.year|0});
  try{ R.emit("kenetsu:censored", {year: rec.year, text: rec.text, censor}); }catch(err){ console.error(TAG, err); }
  if(isOpen) renderList();
}

// ----------------------------------------------------------- the watch
R.on("written", e => {
  try{
    sinceCensor++;
    if(writingSelf) return;                                  // 自分の追記には触れない
    if(!e || typeof e.text !== "string" || !e.text) return;
    if(e.text.indexOf("（なお、先の記述は") === 0) return;   // 念のための二重の守り
    const t = String(e.type||"");
    if(t === "era" || t === "doom" || t === "poem") return;  // 幕間・滅び・詩は塗らない
    if(sinceCensor < 5) return;                              // 5記事につき最大1件
    if(Math.random() >= .06) return;

    const el = entriesEl.lastElementChild;                   // writeは同期emitなので末尾が当該記事
    if(!el || !el.classList || !el.classList.contains("ent")) return;
    if(el.dataset.kenetsu) return;
    if(el.textContent.indexOf(e.text.slice(0, 12)) < 0) return;

    sinceCensor = 0;
    el.dataset.kenetsu = "1";
    const rec = {year: e.year|0, text: e.text, type: t, censor: mostPopulous()};
    // 注記は当該記事の直後に同期で置く — 早送りでも注記が末尾に溜まらない
    try{
      writingSelf = true;
      R.write(`（なお、先の記述は${rec.censor}の意向により一部が墨で塗られた。墨の質は良い。）`, "civic");
    }catch(err){ console.error(TAG, "follow-up", err); }
    finally{ writingSelf = false; }
    setTimeout(()=>{ try{ censorNow(el, rec); }catch(err){ console.error(TAG, "censor", err); } },
      1000 + Math.random()*2000);
  }catch(err){ console.error(TAG, "written", err); }
});

// ----------------------------------------------------------- 禁書庫
const overlay = document.createElement("div");
overlay.className = "kenetsu-overlay";
overlay.innerHTML = `
  <div class="kenetsu-modal" role="dialog" aria-label="禁書庫">
    <div class="kenetsu-head">
      <div class="kenetsu-title">禁書庫　— 声を小さく —</div>
      <div class="kenetsu-sub"></div>
    </div>
    <div class="kenetsu-list"></div>
    <div class="kenetsu-foot">閲覧記録は残ります（あなたのことです）</div>
  </div>`;
document.body.append(overlay);
const listEl = overlay.querySelector(".kenetsu-list");
const subEl = overlay.querySelector(".kenetsu-sub");

function renderList(){
  try{
    subEl.textContent = archive.length
      ? `墨に葬られた記述、${archive.length}件。原文はここに眠る。`
      : "ここには、まだ何も隠されていない。";
    if(!archive.length){
      listEl.innerHTML = `<div class="kenetsu-empty">まだ一行も塗られていない。<br>権力は今のところ、機嫌が良い。</div>`;
      return;
    }
    listEl.innerHTML = archive.slice().reverse().map(a => `
      <div class="kenetsu-row">
        <div class="kenetsu-meta"><span class="kenetsu-ry">${esc(a.year)}年</span>　検閲者：${esc(a.censor)}（${esc(a.at)}年に塗抹）</div>
        <div class="kenetsu-text">${esc(a.text)}</div>
      </div>`).join("");
  }catch(err){ console.error(TAG, "render", err); }
}

function openVault(){
  isOpen = true;
  renderList();
  overlay.classList.add("kenetsu-open");
  listEl.scrollTop = 0;
  if(dockBtn) dockBtn.classList.add("active");
}
function closeVault(){
  isOpen = false;
  overlay.classList.remove("kenetsu-open");
  if(dockBtn) dockBtn.classList.remove("active");
}

overlay.addEventListener("pointerdown", e => { if(e.target === overlay) closeVault(); });
document.addEventListener("keydown", e => {
  try{ if(e.key === "Escape" && isOpen) closeVault(); }catch(err){ console.error(TAG, err); }
});

try{
  dockBtn = R.addButton("⬛ 禁書庫", () => {
    try{ isOpen ? closeVault() : openVault(); }catch(err){ console.error(TAG, "toggle", err); }
  });
}catch(err){ console.error(TAG, "addButton", err); }
})();
</script>

<script>
// ════ plugin: gengo-bunka (wave2) ════ Plugin 言語の分化 (gengo-bunka) for chronicle/index.html — paste into its own <script> tag after the existing plugin blocks. Drift runs on the "year" event only (pau
(()=>{ "use strict";
if(!window.REKISHI) return;
const R = window.REKISHI;
const TAG = "[gengo-bunka]";

// ---------------------------------------------------------------- helpers
const esc = s => String(s==null?"":s).replace(/[&<>"']/g, c =>
  ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

// ==================================================================
//  言語の分化 — 名は、口の中で少しずつ磨り減る。
//  Sim logic on "year" only. civ.name is mutated in place; the book
//  naturally adopts the new name in all future entries.
//  Custom prop on civ: civ._gengoBunka = {next, count}
//  Emits: "gengo:drift"({civ, oldName, newName, year})
// ==================================================================

// ---- 音韻規則 (sound-shift corpus; applied to the katakana head only) ----
const RULES = [
  {re:/ハ/,            to:"ァ"},     // 頭子音の弱化（h音の脱落）
  {re:/カ/,            to:"ガ"},     // 濁音化
  {re:/キ/,            to:"ギ"},
  {re:/ク/,            to:"グ"},
  {re:/タ/,            to:"ダ"},
  {re:/サ(?!ー)/,      to:"ザ"},
  {re:/シ(?![ャュョ])/, to:"ジ"},
  {re:/ロ(?!ー)/,      to:"ロー"},   // 長音化
  {re:/ル(?!ー)/,      to:"ルー"},
  {re:/ラロ/,          to:"ロ"},     // 連続音の融合
  {re:/([ァ-ヶ])\1/,   to:"$1"},     // 重複音の脱落（トト→ト）
  {re:/ヴェ/,          to:"ベ"},     // 外来音の土着化
  {re:/ヴ(?!ェ)/,      to:"ブ"},
  {re:/ム/,            to:"ン"},     // 撥音化
  {re:/ティ/,          to:"チ"},
  {re:/シャ/,          to:"サ"},     // 拗音の単純化
  {re:/([^ンー])$/,    to:"$1ン"},   // 語尾にン追加
];

function applyOnce(kana){
  const idx = RULES.map((_,i)=>i);
  for(let i=idx.length-1;i>0;i--){ const j=(Math.random()*(i+1))|0; const t=idx[i]; idx[i]=idx[j]; idx[j]=t; }
  for(const i of idx){
    const r = RULES[i];
    if(r.re.test(kana)) return kana.replace(r.re, r.to);
  }
  return null;
}
function applyShift(kana){            // 1-2 transformations
  let out = applyOnce(kana);
  if(out == null) return null;
  if(Math.random() < .4){
    const second = applyOnce(out);
    if(second != null) out = second;
  }
  return out;
}

// ---- prose ----
const VARIANTS = [
  (o,n)=>`このころより、人々は${o}を「${n}」と呼びはじめる。年寄りは最後まで${o}と言い張った。`,
  (o,n)=>`${o}の名、訛って「${n}」となる。改名の布告は出ていない。口が勝手にそうしたのである。`,
  (o,n)=>`旅人の帳面に、はじめて「${n}」の表記があらわれる。${o}のことである。書き間違いではなかった。`,
  (o,n)=>`${o}、いつのまにか「${n}」と呼ばれている。境の市では、しばらく両方の名が通用した。`,
];
const ASIDE = "なお都の名は変わらない。石に彫ってしまったからである。";

// ---- state ----
const glossary = [];        // {old, new, year, civ}  (chronological)
const GLOSS_CAP = 400;
let glossTrimmed = 0;
let firstAsideDone = false;
const NAME_CAP = 14;

function interval(c, k){    // 60-80 years, staggered by civ id
  return 60 + (((c.id|0)*7 + k*5) % 21);
}

function driftCiv(c, year, st){
  const m = /^[ァ-ヶー]+/.exec(c.name || "");
  if(!m) return;                                   // 仮名の頭が無い名は流れない
  const kana = m[0], rest = c.name.slice(kana.length);
  const nu = applyShift(kana);
  if(nu == null || nu === kana) return;
  const newName = nu + rest;
  if(newName.length > NAME_CAP) return;            // 口が回らぬほど長くはならない
  const old = c.name;
  c.name = newName;                                // mutate in place
  st.count++;
  glossary.push({old, new: newName, year, civ: c});
  if(glossary.length > GLOSS_CAP){ glossTrimmed += glossary.length - GLOSS_CAP; glossary.splice(0, glossary.length - GLOSS_CAP); }
  let text = R.pick(VARIANTS)(old, newName);
  if(!firstAsideDone){ firstAsideDone = true; text += ASIDE; }
  R.write(text, "civic");
  R.emit("gengo:drift", {civ: c, oldName: old, newName, year});
}

R.on("year", ev => {
  try{
    const year = (ev && typeof ev.year === "number") ? ev.year : R.year;
    for(const c of R.civs){
      if(!c || !c.alive) continue;                 // 滅びた国の名は、もう磨り減らない
      let st = c._gengoBunka;
      if(!st){ c._gengoBunka = {next: year + interval(c, 0), count: 0}; continue; }
      if(year < st.next) continue;
      st.next = year + interval(c, st.count + 1);
      driftCiv(c, year, st);
    }
  }catch(err){ console.error(TAG, "year", err); }
});

// civs alive before this plugin loaded get their clock on the next tick;
// seed them now too so a paused world is already scheduled
try{
  for(const c of R.civs){
    if(c && c.alive && !c._gengoBunka) c._gengoBunka = {next: (R.year|0) + interval(c, 0), count: 0};
  }
}catch(err){ console.error(TAG, "seed", err); }

// ---------------------------------------------------------------- css
const style = document.createElement("style");
style.textContent = `

  background:rgba(58,46,30,.45);}
