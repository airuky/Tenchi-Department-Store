<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>百貨店の夜警 · Night Watch</title>
<style>
  :root{
    --ink:#e8e4d8;
    --dim:#8b93a8;
    --acc:#ffd27a;
    --cool:#7fa8d8;
    --panel:rgba(10,12,24,.82);
    --panel-edge:rgba(255,210,122,.16);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;overflow:hidden;background:#030409;
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",-apple-system,system-ui,sans-serif;
    color:var(--ink);-webkit-font-smoothing:antialiased;}
  #store{position:fixed;inset:0;display:block;width:100vw;height:100vh;}

  /* ---- toolbar ---- */
  .topbar{position:fixed;top:0;left:0;right:0;display:flex;align-items:center;gap:12px;
    padding:13px 18px;pointer-events:none;z-index:5;}
  .brand{pointer-events:none;font-weight:600;letter-spacing:.04em;font-size:15px;
    text-shadow:0 0 18px rgba(255,210,122,.4);}
  .brand small{display:block;font-weight:400;font-size:11px;color:var(--dim);letter-spacing:.18em;margin-top:2px}
  .spacer{flex:1}
  .btn{pointer-events:auto;cursor:pointer;border:1px solid var(--panel-edge);
    background:var(--panel);color:var(--ink);border-radius:999px;padding:8px 15px;font-size:13px;
    backdrop-filter:blur(10px);transition:.18s;white-space:nowrap;font-family:inherit}
  .btn:hover{border-color:rgba(255,210,122,.5);background:rgba(26,24,16,.85);transform:translateY(-1px)}
  .btn:active{transform:translateY(0)}
  .chip{pointer-events:none;border:1px solid var(--panel-edge);background:var(--panel);
    color:var(--ink);border-radius:999px;padding:8px 14px;font-size:13px;backdrop-filter:blur(10px);
    white-space:nowrap;font-variant-numeric:tabular-nums;letter-spacing:.06em}
  .chip small{color:var(--dim);margin-right:6px;font-size:11px}

  /* ---- plugin dock (toy box) ---- */
  .dock{position:fixed;left:14px;bottom:14px;display:flex;flex-wrap:wrap;gap:8px;z-index:5;max-width:70vw}
  .dock .btn{pointer-events:auto}
  .dock.folded .btn:not(.dock-toggle){display:none}
  .dock .dock-toggle{font-size:15px;padding:8px 12px}

  /* ---- hint ---- */
  .hint{position:fixed;left:50%;top:44%;transform:translate(-50%,-50%);text-align:center;
    color:var(--dim);font-size:15px;line-height:2;pointer-events:none;z-index:4;
    transition:opacity 1.2s;text-shadow:0 0 20px rgba(0,0,0,.9)}
  .hint .big{font-size:19px;color:var(--ink);letter-spacing:.08em}

  /* ---- diary panel ---- */
  .panel{position:fixed;top:64px;right:14px;width:340px;max-height:calc(100vh - 84px);
    overflow-y:auto;background:var(--panel);border:1px solid var(--panel-edge);border-radius:16px;
    padding:14px;backdrop-filter:blur(14px);z-index:6;
    box-shadow:0 18px 50px rgba(0,0,0,.5);transition:transform .3s, opacity .3s;scrollbar-width:thin;}
  .panel.hidden{transform:translateX(120%);opacity:0;pointer-events:none}
  .panel::-webkit-scrollbar{width:7px}
  .panel::-webkit-scrollbar-thumb{background:rgba(255,210,122,.25);border-radius:4px}
  .panel h2{margin:2px 4px 10px;font-size:13px;letter-spacing:.14em;color:var(--dim);font-weight:600}
  .panel .empty{color:var(--dim);font-size:13px;padding:8px 6px;line-height:1.8}
  .dsep{display:flex;align-items:center;gap:10px;color:var(--dim);font-size:11px;
    letter-spacing:.2em;margin:14px 2px 8px}
  .dsep::before,.dsep::after{content:"";flex:1;height:1px;background:rgba(255,210,122,.14)}
  .dent{border-left:2px solid rgba(255,210,122,.3);padding:2px 0 2px 10px;margin:0 2px 11px}
  .dent .dt{font-size:11px;color:var(--acc);letter-spacing:.08em;opacity:.85}
  .dent .dx{font-size:12.5px;line-height:1.95;color:#d9d4c4;margin-top:2px}

  /* ---- 3:00 vignette ---- */
  .vignette{position:fixed;inset:0;pointer-events:none;z-index:3;opacity:0;transition:opacity 3s;
    background:radial-gradient(ellipse at center, transparent 26%, rgba(6,3,14,.9) 100%)}
  .vignette.on{opacity:1;animation:yk-blink 5.5s ease-in-out infinite}
  @keyframes yk-blink{0%,100%{opacity:1}50%{opacity:.78}}

  /* ---- morning summary ---- */
  .sumwrap{position:fixed;inset:0;z-index:8;display:flex;align-items:center;justify-content:center;
    background:rgba(3,4,9,.55);backdrop-filter:blur(3px);opacity:0;transition:opacity .6s;padding:18px}
  .sumwrap.hidden{display:none}
  .sumwrap.show{opacity:1}
  .summary{width:min(430px,92vw);background:var(--panel);border:1px solid var(--panel-edge);
    border-radius:16px;padding:22px 24px;backdrop-filter:blur(14px);
    box-shadow:0 22px 70px rgba(0,0,0,.65);transform:translateY(14px);transition:transform .6s}
  .sumwrap.show .summary{transform:translateY(0)}
  .summary h3{margin:0 0 4px;font-size:17px;letter-spacing:.08em;font-weight:600}
  .summary h3 small{display:block;font-weight:400;font-size:10px;color:var(--dim);letter-spacing:.24em;margin-top:3px}
  .summary .row{display:flex;gap:8px;flex-wrap:wrap;margin:14px 0 4px}
  .sumchip{border:1px solid var(--panel-edge);border-radius:999px;padding:4px 12px;font-size:12px;
    color:var(--dim);background:rgba(255,255,255,.03)}
  .sumchip b{color:var(--ink);font-weight:600;margin-left:4px}
  .summary .line{font-size:12.5px;line-height:2;color:#d9d4c4;margin:13px 0 2px;
    border-left:2px solid rgba(255,210,122,.3);padding-left:10px}
  .summary .line .lt{font-size:11px;color:var(--dim);letter-spacing:.14em;display:block}
  .summary .quiet{font-size:11.5px;color:var(--cool);margin-top:9px;letter-spacing:.04em}
  .summary .total{font-size:11px;color:var(--dim);margin-top:11px;letter-spacing:.06em}
  .summary .nap{margin-top:16px;width:100%;text-align:center;font-size:14px;padding:10px}

  .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);
    background:var(--panel);border:1px solid var(--panel-edge);border-radius:999px;
    padding:9px 18px;font-size:13px;backdrop-filter:blur(10px);opacity:0;transition:.3s;z-index:7;pointer-events:none}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<svg id="store" xmlns="http://www.w3.org/2000/svg"></svg>

<div class="topbar">
  <div class="brand">百貨店の夜警<small>YOZORA DEPT. — NIGHT WATCH</small></div>
  <div class="spacer"></div>
  <div class="chip" id="clockChip"><small>第1夜</small>23:00</div>
  <div class="chip" id="floorChip">1F・改装中</div>
  <button class="btn" id="diaryBtn">📖 夜警日誌</button>
</div>

<div class="hint" id="hint">
  <div class="big">23時。閉店した百貨店を、見回ってください</div>
  ← → で歩く　／　↑ ↓ か 階名クリックでエレベーター<br>
  <span style="font-size:13px">異変を懐中電灯で照らしつづけると、だいたい解決します</span>
</div>

<div class="panel hidden" id="panel">
  <h2>夜警日誌</h2>
  <div id="diaryList"></div>
</div>

<div class="vignette" id="vignette"></div>
<div class="sumwrap hidden" id="sumwrap"><div class="summary" id="summary"></div></div>
<div class="toast" id="toast"></div>
<div class="dock" id="dock"></div>

<script>
(() => {
  "use strict";
  const SVGNS = "http://www.w3.org/2000/svg";
  const svg = document.getElementById("store");

  // ---- layers (bottom -> top) ----
  const defs    = mk("defs");
  const gBuild  = mk("g");   // building, floors, props (under darkness)
  const gAnoms  = mk("g");   // anomaly figures (under darkness, revealed by light)
  const darkR   = mk("rect");// the darkness itself (masked by the flashlight)
  const gGlow   = mk("g");   // faint glows visible THROUGH darkness
  const gGlowS  = mk("g");   // ...static (stars, signs) — rebuilt on resize
  const gGlowA  = mk("g");   // ...anomaly markers
  const gFx     = mk("g");   // particles, key flights, streaks
  const gGuard  = mk("g");   // the guard + visible beam (above darkness)
  const gUI     = mk("g");   // floor labels, focus rings (always visible)
  gGlow.append(gGlowS, gGlowA);
  svg.append(defs, gBuild, gAnoms, darkR, gGlow, gFx, gGuard, gUI);

  defs.innerHTML = `
    <radialGradient id="yk-holeRad">
      <stop offset="0%" stop-color="#000"/>
      <stop offset="55%" stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#fff"/>
    </radialGradient>
    <linearGradient id="yk-holeCone" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#000"/>
      <stop offset="62%" stop-color="#4a4a4a"/>
      <stop offset="100%" stop-color="#fff"/>
    </linearGradient>
    <linearGradient id="yk-beam" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffd27a" stop-opacity=".22"/>
      <stop offset="100%" stop-color="#ffd27a" stop-opacity="0"/>
    </linearGradient>
    <filter id="yk-holeblur" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="7"/>
    </filter>
    <filter id="yk-glow" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>`;

  // flashlight mask: white = darkness stays, black = darkness cut away
  const maskEl  = mk("mask", {id:"yk-darkmask", maskUnits:"userSpaceOnUse"});
  const maskBg  = mk("rect", {fill:"#fff"});
  const hole    = mk("g", {filter:"url(#yk-holeblur)"});
  const holeCone= mk("polygon", {points:"6,-7 232,-62 246,-26 246,26 232,62 6,7", fill:"url(#yk-holeCone)"});
  const holeOrb = mk("circle", {r:62, fill:"url(#yk-holeRad)"});
  hole.append(holeCone, holeOrb);
  maskEl.append(maskBg, hole);
  defs.append(maskEl);
  darkR.setAttribute("fill", "#020308");
  darkR.setAttribute("opacity", ".94");
  darkR.setAttribute("mask", "url(#yk-darkmask)");
  darkR.style.pointerEvents = "none";

  // ---- helpers ----
  function mk(tag, attrs){
    const el = document.createElementNS(SVGNS, tag);
    if(attrs) for(const k in attrs) el.setAttribute(k, attrs[k]);
    return el;
  }
  function pick(a){ return a[(Math.random()*a.length)|0]; }
  const esc = s => String(s == null ? "" : s).replace(/[&<>"']/g,
    m => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));
  function lsGet(k, fb){
    try{ const r = localStorage.getItem(k); return r == null ? fb : JSON.parse(r); }
    catch(err){ return fb; }
  }
  function lsSet(k, v){ try{ localStorage.setItem(k, JSON.stringify(v)); }catch(err){} }

  // ---- plugin event bus ----
  const listeners = new Map();
  function on(name, fn){
    if(!listeners.has(name)) listeners.set(name, []);
    listeners.get(name).push(fn);
  }
  function emit(name, arg){
    for(const f of listeners.get(name) || []){
      try{ f(arg); }catch(err){ console.error(`[plugin handler for "${name}"]`, err); }
    }
  }

  // ====================================================================
  //  the building
  // ====================================================================
  const FLOORS = [
    {key:"R",   dn:"屋上",  name:"屋上",         sub:"星空が漏れる"},
    {key:"2F",  dn:"2F",   name:"島づくり用品",   sub:"在庫: 島"},
    {key:"1F",  dn:"1F",   name:"改装中",        sub:"立入可・真っ暗"},
    {key:"B1F", dn:"B1F",  name:"深海水族館",     sub:"消灯済 (たぶん)"},
    {key:"B5F", dn:"B5F",  name:"考古・文明売り場", sub:"文明 各種"},
  ];
  const TINTS = ["#0a1124","#0e1322","#0d1120","#091526","#120f1e"];
  let W = 0, H = 0, bx = 0, bw = 0, floorTop = 70, floorH = 100;
  const MACH_XR = .18;          // vending machine, 1F
  function floorY(i){ return floorTop + (i+1)*floorH; }   // walking line of floor i
  const labelEls = [];

  function buildBuilding(){
    gBuild.replaceChildren(); gGlowS.replaceChildren(); gUI.replaceChildren();
    labelEls.length = 0;
    const slab = 8;

    for(let i=0;i<5;i++){
      const yT = floorY(i) - floorH, yF = floorY(i);
      gBuild.append(mk("rect",{x:bx, y:yT, width:bw, height:floorH, fill:TINTS[i]}));
      gBuild.append(mk("rect",{x:bx-6, y:yF, width:bw+12, height:slab, fill:"#1b2236"})); // slab
      drawProps(i, yT, yF);
      // elevator door (right side)
      const ex = bx + bw - 52;
      gBuild.append(mk("rect",{x:ex, y:yF-58, width:36, height:58, rx:2, fill:"#141b30", stroke:"#222c47","stroke-width":1}));
      gBuild.append(mk("line",{x1:ex+18, y1:yF-56, x2:ex+18, y2:yF-2, stroke:"#0a0e1c","stroke-width":2}));
      // emergency-exit green dot — visible through darkness
      gGlowS.append(mk("rect",{x:ex-16, y:yF-62, width:10, height:6, rx:2, fill:"#3fae6a",
        opacity:.4, filter:"url(#yk-glow)"}));
      // floor label chip (always lit signage)
      const lab = mk("g", {cursor:"pointer"});
      lab.append(mk("rect",{x:bx+8, y:yT+10, width:44, height:22, rx:11,
        fill:"rgba(10,12,24,.8)", stroke:"rgba(255,210,122,.25)","stroke-width":1}));
      const lt = mk("text",{x:bx+30, y:yT+25, "text-anchor":"middle","font-size":"11",
        fill:"#cfd8ea","letter-spacing":".05em"});
      lt.textContent = FLOORS[i].key;
      const nm = mk("text",{x:bx+60, y:yT+25, "font-size":"10.5", fill:"#8b93a8",
        opacity:".55","letter-spacing":".12em"});
      nm.textContent = `${FLOORS[i].name}　${FLOORS[i].sub}`;
      lab.append(lt, nm);
      lab.addEventListener("pointerdown", e => { e.stopPropagation(); gotoFloor(i); hideHint(); });
      gUI.append(lab);
      labelEls.push({box:lab.firstChild, txt:lt});
    }
    // building shell
    gBuild.append(mk("rect",{x:bx-6, y:floorTop-4, width:bw+12, height:floorH*5+slab+4,
      fill:"none", stroke:"#202840","stroke-width":2}));
    paintLabels();
  }
  function paintLabels(){
    labelEls.forEach((l,i) => {
      const cur = i === guard.floor;
      l.box.setAttribute("stroke", cur ? "rgba(255,210,122,.85)" : "rgba(255,210,122,.25)");
      l.txt.setAttribute("fill", cur ? "#ffd27a" : "#cfd8ea");
    });
  }

  function drawProps(i, yT, yF){
    const g = gBuild, dark = "#10182b", lite = "#182238";
    const X = r => bx + r*bw;          // ratio -> px
    if(i === 0){ // R 屋上 — open sky, railing, water tank
      for(let r=.04; r<.97; r+=.045)
        g.append(mk("line",{x1:X(r), y1:yF, x2:X(r), y2:yF-16, stroke:dark,"stroke-width":2}));
      g.append(mk("line",{x1:X(.03), y1:yF-16, x2:X(.965), y2:yF-16, stroke:lite,"stroke-width":2.5}));
      g.append(mk("rect",{x:X(.78), y:yF-44, width:46, height:44, rx:5, fill:dark}));   // tank
      g.append(mk("rect",{x:X(.3), y:yF-12, width:54, height:12, rx:3, fill:dark}));    // bench
      g.append(mk("line",{x1:X(.6), y1:yF, x2:X(.6), y2:yF-52, stroke:dark,"stroke-width":2})); // antenna
      g.append(mk("circle",{cx:X(.6), cy:yF-54, r:2.5, fill:lite}));
      // leaking stars — visible through darkness
      for(let s=0;s<16;s++){
        const st = mk("circle",{cx:bx+20+Math.random()*(bw-40), cy:yT+8+Math.random()*(floorH*.55),
          r:(.6+Math.random()*1.1).toFixed(2), fill:"#cfe2ff", opacity:.5});
        st.animate([{opacity:.15},{opacity:.65},{opacity:.15}],
          {duration:2400+Math.random()*4200, iterations:Infinity, easing:"ease-in-out", delay:-Math.random()*4000});
        gGlowS.append(st);
      }
    }
    else if(i === 1){ // 2F 島づくり用品
      for(const r of [.12, .42, .68]){
        g.append(mk("rect",{x:X(r), y:yF-46, width:bw*.16, height:46, fill:dark}));
        g.append(mk("line",{x1:X(r), y1:yF-24, x2:X(r)+bw*.16, y2:yF-24, stroke:lite,"stroke-width":1.5}));
        g.append(mk("polygon",{points:`${X(r)+10},${yF-46} ${X(r)+24},${yF-62} ${X(r)+38},${yF-46}`, fill:lite})); // 島(小)
      }
      g.append(mk("line",{x1:X(.92), y1:yF, x2:X(.92), y2:yF-34, stroke:dark,"stroke-width":3})); // ヤシ
      g.append(mk("path",{d:`M ${X(.92)} ${yF-34} q -14 -10 -24 -6 M ${X(.92)} ${yF-34} q 14 -10 24 -6 M ${X(.92)} ${yF-34} q 2 -14 10 -18`,
        stroke:lite,"stroke-width":2, fill:"none"}));
      g.append(mk("rect",{x:X(.33), y:yF-13, width:20, height:13, fill:dark})); // 砂袋
    }
    else if(i === 2){ // 1F 改装中
      g.append(mk("path",{d:`M ${X(.45)} ${yF} q 14 -38 30 -38 q 18 0 26 38 Z`, fill:dark})); // シート
      g.append(mk("path",{d:`M ${X(.62)} ${yF} q 8 -24 20 -24 q 12 0 16 24 Z`, fill:lite, opacity:.7}));
      g.append(mk("line",{x1:X(.8), y1:yF, x2:X(.8)+18, y2:yF-52, stroke:dark,"stroke-width":3})); // 脚立
      g.append(mk("line",{x1:X(.8)+36, y1:yF, x2:X(.8)+18, y2:yF-52, stroke:dark,"stroke-width":3}));
      for(let s=1;s<4;s++)
        g.append(mk("line",{x1:X(.8)+s*4.5, y1:yF-s*12, x2:X(.8)+36-s*4.5, y2:yF-s*12, stroke:lite,"stroke-width":2}));
      g.append(mk("rect",{x:X(.32), y:yF-12, width:11, height:12, fill:dark})); // ペンキ缶
      g.append(mk("rect",{x:X(.32)+14, y:yF-9, width:11, height:9, fill:dark}));
      const sign = mk("g");                                                     // 立入可
      sign.append(mk("rect",{x:X(.55), y:yF-30, width:40, height:18, rx:2, fill:lite}),
        mk("line",{x1:X(.55)+6, y1:yF, x2:X(.55)+12, y2:yF-13, stroke:lite,"stroke-width":2}));
      const st = mk("text",{x:X(.55)+20, y:yF-17, "text-anchor":"middle","font-size":"9", fill:"#0a0e1c"});
      st.textContent = "立入可"; sign.append(st); g.append(sign);
      // vending machine — the only warm light in the building
      const mx = X(MACH_XR);
      const mach = mk("g",{cursor:"pointer"});
      mach.append(
        mk("rect",{x:mx-17, y:yF-60, width:34, height:60, rx:3, fill:"#1c2336", stroke:"#2a3450","stroke-width":1}),
        mk("rect",{x:mx-12, y:yF-54, width:24, height:30, rx:2, fill:"#2b3250"}),
        mk("rect",{x:mx-12, y:yF-18, width:24, height:8, rx:1, fill:"#11162a"}));
      for(let s=0;s<3;s++)
        mach.append(mk("rect",{x:mx-9+s*8, y:yF-50, width:6, height:9, rx:1, fill:"#3a4668"}));
      mach.addEventListener("pointerdown", e => { e.stopPropagation(); buyCoffee(); hideHint(); });
      g.append(mach);
      const mg = mk("rect",{x:mx-12, y:yF-54, width:24, height:30, fill:"#ffb36a",
        opacity:.18, filter:"url(#yk-glow)"});
      mg.animate([{opacity:.1},{opacity:.24},{opacity:.1}],
        {duration:3000, iterations:Infinity, easing:"ease-in-out"});
      mg.style.pointerEvents = "none";
      gGlowS.append(mg);
    }
    else if(i === 3){ // B1F 深海水族館
      for(const r of [.1, .38, .66]){
        const tx = X(r), tw = bw*.2;
        g.append(mk("rect",{x:tx, y:yF-52, width:tw, height:52, rx:6, fill:"#081a2e", stroke:"#1b3450","stroke-width":1.5}));
        g.append(mk("path",{d:`M ${tx+tw*.2} ${yF} q -5 -16 3 -30 q 6 -10 2 -18`, stroke:"#143049","stroke-width":2.5, fill:"none"}));
        g.append(mk("path",{d:`M ${tx+tw*.7} ${yF} q 6 -14 -2 -26`, stroke:"#143049","stroke-width":2, fill:"none"}));
        g.append(mk("ellipse",{cx:tx+tw*.5, cy:yF-30, rx:6, ry:2.4, fill:"#1d4666"}));
        const tg = mk("rect",{x:tx, y:yF-52, width:tw, height:52, rx:6, fill:"#3fa8d8", opacity:.07});
        tg.style.pointerEvents = "none";
        gGlowS.append(tg);
      }
      g.append(mk("rect",{x:X(.9), y:yF-26, width:18, height:26, rx:2, fill:dark})); // 餌バケツ棚
    }
    else { // B5F 考古・文明売り場
      g.append(mk("path",{d:`M ${X(.1)} ${yF} l 5 -38 l 8 -6 l 8 6 l 5 38 Z`, fill:dark}));  // 像
      g.append(mk("circle",{cx:X(.1)+13, cy:yF-48, r:7, fill:dark}));
      g.append(mk("path",{d:`M ${X(.55)} ${yF} l 4 -30 l 7 -5 l 7 5 l 4 30 Z`, fill:dark}));
      g.append(mk("circle",{cx:X(.55)+11, cy:yF-39, r:5.5, fill:dark}));

  let actx = null;
  function ding(freqs){
    try{
      actx = actx || new (window.AudioContext || window.webkitAudioContext)();
      if(actx.state === "suspended") actx.resume();
      const t = actx.currentTime;
      (freqs || [880, 1318]).forEach((f, i) => {
        const o = actx.createOscillator(), g = actx.createGain();
        o.type = "sine"; o.frequency.value = f;
        g.gain.setValueAtTime(0, t + i*.13);
        g.gain.linearRampToValueAtTime(.07, t + i*.13 + .012);
        g.gain.exponentialRampToValueAtTime(.0001, t + i*.13 + .5);
        o.connect(g); g.connect(actx.destination);
        o.start(t + i*.13); o.stop(t + i*.13 + .55);
      });
    }catch(err){}
  }

  function spawnAnomaly(typeKey, floorIdx){
    if(ended) return null;

      id: anomId++, key, type: T, floor: T.floor,

      root: mk("g"), ring: null, glow: null,

    gAnoms.append(a.root);
    a.glow = mk("circle",{r:5, fill:`hsl(${T.hue},90%,72%)`, opacity:.3, filter:"url(#yk-glow)"});
    a.glow.animate([{opacity:.12},{opacity:.4},{opacity:.12}],
      {duration:2400, iterations:Infinity, easing:"ease-in-out"});
    a.glow.style.pointerEvents = "none";
    gGlowA.append(a.glow);
    const C = 2*Math.PI*15;
    a.ring = mk("circle",{r:15, fill:"none", stroke:"#ffd27a","stroke-width":2.5,
      "stroke-dasharray":C, "stroke-dashoffset":C, opacity:0, "stroke-linecap":"round"});
    a.ring.style.pointerEvents = "none";
    gUI.append(a.ring);
    positionAnomaly(a);
    anomalies.push(a);
    if(guard.floor === a.floor) toast("……同じフロアで、何かの気配がする。");
    else toast(T.far);
    emit("anomaly-spawn", a);
    return a;
  }
  function positionAnomaly(a){
    const ax = bx + a.xr*bw, ay = floorY(a.floor);
    a.root.setAttribute("transform", `translate(${ax.toFixed(1)} ${ay.toFixed(1)})`);
    a.glow.setAttribute("cx", ax); a.glow.setAttribute("cy", ay - 12);
    a.ring.setAttribute("cx", ax); a.ring.setAttribute("cy", ay - 10);
    a.ring.setAttribute("transform", `rotate(-90 ${ax} ${ay - 10})`);
  }

  function resolveAnomaly(a){
    const i = anomalies.indexOf(a);
    if(i < 0) return;
    anomalies.splice(i, 1);
    nightResolved++;
    const ax = bx + a.xr*bw, ay = floorY(a.floor);
    // reveal pop
    const fig = a.root.firstChild;
    if(fig){
      fig.style.transformOrigin = "0px -10px";
      fig.animate([
        {transform:"scale(1)", opacity:1},
        {transform:"scale(1.5) translateY(-8px)", opacity:0}
      ],{duration:650, easing:"cubic-bezier(.2,.8,.3,1)", fill:"forwards"});
    }
    sparkle(ax, ay - 12, a.type.hue);
    if(a.key === "tako") keyFlight(ax, ay);
    setTimeout(() => { a.root.remove(); }, 700);
    a.glow.remove(); a.ring.remove();
    const line = pick(a.type.diary).replace(/\{fish\}/g, `『${a.fish || "魚"}』`);
    const e = writeDiary(line, FLOORS[a.floor].dn);
    nightLines.push(`${e.t} ${e.f}。${e.x}`);
    toast(a.key === "hikaru" ? `『${a.fish}』は水槽に帰った` : a.type.done);
    ding([1318, 1760]);
    emit("anomaly-resolved", a);
  }
  function sparkle(x, y, hue){
    for(let i=0;i<9;i++){
      const p = mk("circle",{cx:x, cy:y, r:1.2+Math.random()*1.8,
        fill:`hsl(${hue},90%,75%)`, opacity:.9});
      gFx.append(p);
      const ang = Math.random()*Math.PI*2, d = 18+Math.random()*30;
      p.animate([
        {transform:"translate(0,0)", opacity:.9},
        {transform:`translate(${Math.cos(ang)*d}px, ${Math.sin(ang)*d - 10}px)`, opacity:0}
      ],{duration:700+Math.random()*500, easing:"ease-out"}).onfinish = () => p.remove();
    }
  }

    gFx.append(k);
    inner.animate([
      {transform:"translate(0,0) rotate(0deg)", opacity:1},
      {transform:`translate(${(gx-ax)*.6}px, -26px) rotate(180deg)`, opacity:1},
      {transform:`translate(${gx-ax}px, -6px) rotate(360deg)`, opacity:0}
    ],{duration:950, easing:"ease-in-out"}).onfinish = () => k.remove();
  }

  // ====================================================================
  //  coffee (1F vending machine)
  // ====================================================================
  const COFFEE_FAR = ["自販機は遠い。光は届くが、腕は届かない。","自販機は1Fの奥だ。歩こう。"];
  const COFFEE_LINES = [
    "自販機のコーヒーで覚醒した。豆の産地は不明。効き目は確かだった。",
    "コーヒーを飲んだ。眠気は引き継ぎ事項から削除する。",
    "熱い缶を頬に当ててから飲んだ。夜警の正式な作法である。",
  ];
  function buyCoffee(){
    if(ended || guard.riding) return;
    if(guard.floor !== 2){ toast("自販機は1Fにある。"); return; }
    const gx = bx + guard.xr*bw, mx = bx + MACH_XR*bw;
    if(Math.abs(gx - mx) > 70){ toast(pick(COFFEE_FAR)); return; }
    ding([660, 880]);
    const my = floorY(2);
    for(let i=0;i<4;i++){
      const s = mk("path",{d:`M ${mx-4+i*3} ${my-16} q 3 -6 0 -12`,
        stroke:"#d8cfc0","stroke-width":1.2, fill:"none", opacity:.7});
      gFx.append(s);
      s.animate([{opacity:.7, transform:"translateY(0)"},{opacity:0, transform:"translateY(-14px)"}],
        {duration:1100+i*180, easing:"ease-out"}).onfinish = () => s.remove();
    }
    if(guard.sleepy){
      guard.sleepy = false;
      vignette.classList.remove("on");
      toast("ホットコーヒー。目が覚めた。たぶん。");
    }else{
      toast("目は冴えている。それでも飲む。");
    }
    writeDiary(pick(COFFEE_LINES), "1F");
    emit("coffee:bought");
  }

  // ====================================================================
  //  night flow
  // ====================================================================
  const QUIET_LINES = [
    "何も起きなかった。記録すべきことが無いことを、記録しておく。",
    "売り場がしんとしていた。「良い夜だ」と書く欄が日誌に欲しい。",
    "一分間、店がただの店だった。",
  ];
  const vignette = document.getElementById("vignette");
  const sumwrap = document.getElementById("sumwrap");
  const summary = document.getElementById("summary");
  const clockChip = document.getElementById("clockChip");
  const floorChip = document.getElementById("floorChip");

  function endNight(){
    if(ended) return;
    ended = true;
    const missed = anomalies.length;
    for(const a of anomalies){
      a.root.animate([{opacity:1},{opacity:0}],{duration:1200, fill:"forwards"});
      a.glow.remove(); a.ring.remove();
      setTimeout(((r)=>()=>r.remove())(a.root), 1300);
    }
    anomalies.length = 0;
    if(guard.sleepy){ guard.sleepy = false; vignette.classList.remove("on"); }
    writeDiary(`夜が明けた。解決${nightResolved}件、見逃し${missed}件。店は何事もなかった顔をしている。`, "全館", "6:00");
    const best = nightLines.length ? pick(nightLines) : "6:00 全館。異状なし。それが一番むずかしいのだと、誰も褒めてくれない。";
    rec.nights = night;
    rec.resolved = (rec.resolved|0) + nightResolved;
    rec.missed = (rec.missed|0) + missed;
    if(quietHappened) rec.quiet = (rec.quiet|0) + 1;
    rec.best = {night, text: best};
    lsSet(RKEY, rec);
    const stats = {night, resolved: nightResolved, missed, quiet: quietHappened};
    summary.innerHTML =
      `<h3>第${night}夜の記録<small>NIGHT REPORT</small></h3>`+
      `<div class="row"><span class="sumchip">解決<b>${nightResolved}件</b></span>`+
      `<span class="sumchip">見逃し<b>${missed}件</b></span></div>`+
      `<div class="line"><span class="lt">今夜の一行</span>${esc(best)}</div>`+
      (quietHappened ? `<div class="quiet">4:44 — 一分間だけ、店はただの店だった。</div>` : "")+
      `<div class="total">通算 ${rec.nights}夜 ／ 解決 ${rec.resolved}件 ／ 静けさに立ち会った夜 ${rec.quiet|0}回</div>`+
      `<button class="btn nap" id="napBtn">🛏 仮眠して、また今夜</button>`;
    sumwrap.classList.remove("hidden");
    requestAnimationFrame(() => sumwrap.classList.add("show"));
    summary.querySelector("#napBtn").addEventListener("click", nextNight);
    emit("night-end", {stats});
  }

  function nextNight(){
    night++;
    gameMin = 0; ended = false;
    sleepyDone = quietDone = quietHappened = false; quietT = 0;
    nightResolved = 0; nightLines.length = 0;
    pendingSep = true;
    walkTarget = null;
    nextSpawn = performance.now() + 6000 + Math.random()*5000;
    sumwrap.classList.remove("show");
    setTimeout(() => sumwrap.classList.add("hidden"), 600);
    clockChip.innerHTML = `<small>第${night}夜</small>23:00`;
    toast("23:00。開店はしない。見回りは、する。");
  }

  // ====================================================================
  //  input
  // ====================================================================
  const input = { l:false, r:false };
  window.addEventListener("keydown", e => {
    if(e.repeat && (e.key === "ArrowUp" || e.key === "ArrowDown")) return;
    if(e.key === "ArrowLeft"){ input.l = true; walkTarget = null; hideHint(); e.preventDefault(); }
    else if(e.key === "ArrowRight"){ input.r = true; walkTarget = null; hideHint(); e.preventDefault(); }
    else if(e.key === "ArrowUp"){ gotoFloor(guard.floor - 1); hideHint(); e.preventDefault(); }
    else if(e.key === "ArrowDown"){ gotoFloor(guard.floor + 1); hideHint(); e.preventDefault(); }
  });
  window.addEventListener("keyup", e => {
    if(e.key === "ArrowLeft") input.l = false;
    if(e.key === "ArrowRight") input.r = false;
  });
  svg.addEventListener("pointerdown", e => {
    if(ended || guard.riding) return;
    const i = Math.floor((e.clientY - floorTop) / floorH);
    if(i < 0 || i > 4) return;
    hideHint();
    if(i === guard.floor){
      walkTarget = Math.max(.03, Math.min(.97, (e.clientX - bx) / bw));
      const tx = bx + walkTarget*bw, ty = floorY(i) - 3;
      const m = mk("circle",{cx:tx, cy:ty, r:3, fill:"#ffd27a", opacity:.7});
      m.style.transformOrigin = `${tx}px ${ty}px`;
      gFx.append(m);
      m.animate([{opacity:.7, transform:"scale(1)"},{opacity:0, transform:"scale(2.4)"}],
        {duration:600, easing:"ease-out"}).onfinish = () => m.remove();
    }else{
      gotoFloor(i);
    }
  });

  // ====================================================================
  //  main loop — elapsed wall time, never frame counting
  // ====================================================================
  let lastT = 0, lastClock = "";
  function frame(now){
    const dt = Math.min(.1, (now - lastT)/1000 || 0);
    lastT = now;

    if(!ended){
      // clock (frozen during the 4:44 quiet)
      if(quietT > 0){
        quietT -= dt;
        if(quietT <= 0){
          gAnoms.style.opacity = gGlowA.style.opacity = "1";
          writeDiary(pick(QUIET_LINES), "全館", "4:44");
          toast("……時計が、また動き出した。");
        }
      }else{
        gameMin += dt / 1.5;
      }
      // 3:00 — eyelids heavy
      if(!sleepyDone && gameMin >= 240){
        sleepyDone = true; guard.sleepy = true;
        vignette.classList.add("on");
        toast("3:00。まぶたが、重い。1Fの自販機を思い出す。");
      }
      // 4:44 — the quiet minute
      if(!quietDone && gameMin >= 344){
        quietDone = true; quietHappened = true; quietT = 20;
        gAnoms.style.transition = gGlowA.style.transition = "opacity 1.6s";
        gAnoms.style.opacity = gGlowA.style.opacity = ".12";
        toast("4:44。売り場が、しんとしている。");
      }
      // 6:00 — morning
      if(gameMin >= 420) endNight();
      // spawns
      if(!ended && quietT <= 0 && now >= nextSpawn){
        nextSpawn = now + 20000 + Math.random()*20000;
        if(anomalies.length < 3) spawnAnomaly();
      }
    }

    // clock chip
    const ts = ended ? "6:00" : timeStr();
    if(ts !== lastClock){
      lastClock = ts;
      clockChip.innerHTML = `<small>第${night}夜</small>${ts}`;
    }

    // movement
    let vx = 0;
    if(!ended && !guard.riding){
      if(input.l) vx -= 1;
      if(input.r) vx += 1;
      if(!vx && walkTarget != null){
        const d = walkTarget - guard.xr;
        if(Math.abs(d)*bw < 4) walkTarget = null;
        else vx = d > 0 ? 1 : -1;
      }
    }
    guard.moving = vx !== 0;
    if(vx){
      guard.dir = vx > 0 ? 1 : -1;
      const mul = guard.sleepy ? .7 : 1;
      guard.xr = Math.max(.03, Math.min(.97, guard.xr + vx*170*mul*dt/Math.max(1,bw)));
      guard.bob += dt*(guard.sleepy ? 6.5 : 9.5);
    }
    const gx = bx + guard.xr*bw;
    const gy = floorY(guard.floor);
    const bob = guard.moving ? -Math.abs(Math.sin(guard.bob))*2.4 : 0;
    const tilt = guard.moving ? Math.sin(guard.bob)*2.5 : 0;
    guardEl.setAttribute("transform",
      `translate(${gx.toFixed(1)} ${(gy+bob).toFixed(1)}) rotate(${tilt.toFixed(1)}) scale(${guard.dir} 1)`);
    const lightTf = `translate(${gx.toFixed(1)} ${(gy+bob-18).toFixed(1)}) scale(${guard.dir} 1)`;
    hole.setAttribute("transform", lightTf);
    beam.setAttribute("transform", lightTf);

    // flashlight vs anomalies
    let lit = null, litD = 1e9;
    if(!ended && !guard.riding && quietT <= 0){
      for(const a of anomalies){
        if(a.floor !== guard.floor) continue;
        const ax = bx + a.xr*bw, dx = ax - gx, ahead = dx*guard.dir;
        if((ahead > 12 && ahead < 235) || Math.abs(dx) < 52){
          const d = Math.abs(dx);
          if(d < litD){ litD = d; lit = a; }
        }
      }
    }
    const C = 2*Math.PI*15;
    for(const a of [...anomalies]){
      if(a === lit) a.prog = Math.min(1.5, a.prog + dt);
      else a.prog = Math.max(0, a.prog - dt*2);
      a.ring.setAttribute("opacity", a.prog > 0 ? "1" : "0");
      a.ring.setAttribute("stroke-dashoffset", (C*(1 - a.prog/1.5)).toFixed(1));
      if(a.prog >= 1.5) resolveAnomaly(a);
    }

    requestAnimationFrame(frame);
  }
  requestAnimationFrame(t => { lastT = t; requestAnimationFrame(frame); });

  // occasional shooting star across the rooftop strip
  setInterval(() => {
    if(document.hidden || Math.random() < .4) return;
    const y0 = floorTop + 14 + Math.random()*floorH*.4;
    const x0 = bx + 30 + Math.random()*bw*.5;
    const s = mk("line",{x1:x0, y1:y0, x2:x0+46, y2:y0+12, stroke:"#cfe2ff","stroke-width":1.3,

    s.animate([{opacity:0, transform:"translate(0,0)"},{opacity:.8, transform:"translate(24px,6px)"},
      {opacity:0, transform:"translate(60px,16px)"}],

  // ---- dock ----
  const dock = document.getElementById("dock");
  const dockToggle = document.createElement("button");
  dockToggle.className = "btn dock-toggle";
  dockToggle.textContent = "🧰";
  dockToggle.title = "おもちゃ箱をひらく／たたむ";
  dockToggle.addEventListener("click", () => dock.classList.toggle("folded"));
  dock.append(dockToggle);
  function addButton(label, onClick){
    const b = document.createElement("button");
    b.className = "btn";
    b.textContent = label;
    b.addEventListener("click", onClick);
    dock.append(b);
    return b;
  }

  // ---- hint & toast ----
  const hint = document.getElementById("hint");
  let hintT = setTimeout(hideHint, 10000);
  function hideHint(){ clearTimeout(hintT); hint.style.opacity = 0; }

  const toastEl = document.getElementById("toast");
  let toastT = null;
  function toast(msg){
    toastEl.textContent = msg; toastEl.classList.add("show");
    clearTimeout(toastT); toastT = setTimeout(() => toastEl.classList.remove("show"), 2600);
  }

  // ---- resize ----
  function resize(){
    W = window.innerWidth; H = window.innerHeight;
    svg.setAttribute("viewBox", `0 0 ${W} ${H}`);
    bx = W*.07; bw = W*.86;
    floorTop = 70; floorH = (H - floorTop - 18)/5;
    maskEl.setAttribute("x", 0); maskEl.setAttribute("y", 0);
    maskEl.setAttribute("width", W); maskEl.setAttribute("height", H);
    maskBg.setAttribute("width", W); maskBg.setAttribute("height", H);
    darkR.setAttribute("width", W); darkR.setAttribute("height", H);
    buildBuilding();
    for(const a of anomalies) positionAnomaly(a);
  }
  window.addEventListener("resize", resize);

  // ==================================================================
  //  plugin API
  // ==================================================================
  window.YAKEI = {
    svg, defs, gBuild, gAnoms, gGlow, gGlowA, gFx, gGuard, gUI,
    floors: FLOORS, anomalies, guard, diary,            // live (do not reassign)
    get W(){ return W; }, get H(){ return H; },
    get night(){ return night; }, get gameMin(){ return gameMin; },
    get time(){ return ended ? "6:00" : timeStr(); },
    floorY, mk, toast, pick, esc,
    spawnAnomaly,                    // spawnAnomaly(typeKey?, floorIdx?) -> a
    resolveAnomaly, writeDiary,      // writeDiary(text, floorDn?, time?) -> entry
    gotoFloor, buyCoffee, ding,
    addButton,
    lore: {ANOM, FLOOR_POOL, QUIET_LINES, COFFEE_LINES},
    on, emit,                        // events: anomaly-spawn(a), anomaly-resolved(a),
                                     //   floor-changed({floor,index}), night-end({stats}),
                                     //   diary-entry(e), coffee:bought()
                                     // plugins may emit custom namespaced events
  };

  // ---- opening ----
  resize();
  clockChip.innerHTML = `<small>第${night}夜</small>23:00`;
  floorChip.textContent = "1F・改装中";
  nextSpawn = performance.now() + 7000 + Math.random()*4000;
  setTimeout(() => toast("23:00。見回りを開始する。"), 1400);
})();
</script>

      desc:"光がすこし明るくなる。それだけ。それがいい",
      tw:"予備電池を装填。光が、誇らしげだ。",
      dw:"予備電池を購入。明るさは士気に計上する。",
      apply:applyDenchi },
  ];
  for(const it of ITEMS) if(owned[it.id] && it.apply) it.apply();   // restore on load

  const soubiPanel = document.createElement("div");
  soubiPanel.className = "yakei-teate-soubi hidden";
  document.body.append(soubiPanel);

  function renderSoubi(){
    let h = `<h2>装備 — 夜警手当でそろえる</h2><div class="yakei-teate-wallet">`;
    for(const id of CUR_IDS){
      h += `<span class="yakei-teate-wchip">${esc(CUR[id].emoji)} ${esc(CUR[id].name)}<b>${curGet(id)|0}</b></span>`;
    }
    h += `</div>`;
    for(const it of ITEMS){
      h += `<div class="yakei-teate-item"><div class="yakei-teate-ibody">`+
        `<div class="yakei-teate-iname">${esc(it.icon)} ${esc(it.name)}</div>`+
        `<div class="yakei-teate-idesc">${esc(it.desc)}</div></div>`+
        (owned[it.id]
          ? `<span class="yakei-teate-owned">✓ 装備中</span>`
          : `<button class="btn yakei-teate-buy" data-id="${esc(it.id)}">${it.cost|0} で購入</button>`)+
        `</div>`;
    }
    h += `<div class="yakei-teate-note">支払いはいちばん多い通貨から自動で精算。領収書は出ない。返品は夜明けまで不可。</div>`;
    soubiPanel.innerHTML = h;
    soubiPanel.querySelectorAll(".yakei-teate-buy").forEach(b =>
      b.addEventListener("click", () => buy(b.dataset.id)));
  }
  function buy(id){
    const it = ITEMS.find(x => x.id === id);
    if(!it || owned[it.id]) return;
    let best = null, bv = -1;
    for(const cid of CUR_IDS){ const v = curGet(cid); if(v > bv){ bv = v; best = cid; } }
    if(!best || bv < it.cost){
      Y.toast("持ち合わせが足りない。経理に前借りは通じない。");
      return;
    }
    curSet(best, bv - it.cost);                       // never below zero (checked above)
    owned[it.id] = 1; saveOwned();
    if(it.apply) it.apply();
    Y.toast(`${it.tw}（${CUR[best].emoji}${it.cost}で精算）`);
    Y.writeDiary(it.dw);
    Y.ding([784, 1175]);
    Y.emit("soubi:bought", {item:it.id, name:it.name, cost:it.cost, paidWith:best});
    renderSoubi();
  }
  Y.addButton("🔦 装備", () => {
    if(soubiPanel.classList.contains("hidden")) renderSoubi();
    soubiPanel.classList.toggle("hidden");
  });

  // ================= 夜警手当 (allowance per resolved anomaly) =================
  let nightPay = Object.create(null);
  const HOME = {0:"hoshizora", 1:"shima", 3:"shinkai", 4:"rekishi"};  // 1F=改装中: 経理も未分類
  const QUIPS = [
    "（経理の趣味だそうです）",
    "（明細は手書きでした）",
    "（現物支給です）",
    "（振込先：胸ポケット）",
    "（査定基準は非公開）",
    "（源泉徴収はありません）",
  ];
  Y.on("anomaly-resolved", a => {
    const fl = a && typeof a.floor === "number" ? a.floor : G.floor;
    const home = HOME[fl];
    const id = (home && Math.random() < .72) ? home : CUR_IDS[(Math.random()*CUR_IDS.length)|0];
    const amt = 3 + ((Math.random()*4)|0);            // 3..6
    curSet(id, curGet(id) + amt);
    nightPay[id] = (nightPay[id]|0) + amt;
    const c = CUR[id];
    setTimeout(() => {                                 // let the core's "done" toast breathe first
      try{ Y.toast(`手当が出ました: ${c.emoji}${amt}${Y.pick(QUIPS)}`); }catch(e){}
    }, 1600);
    if(!soubiPanel.classList.contains("hidden")) renderSoubi();
    Y.emit("teate:paid", {currency:id, amount:amt, name:c.name, emoji:c.emoji});
  });

  // ================= ミニマップ =================
  const PAD = 6, CW = 46, CH = 26, GAP = 4;
  const map = document.createElement("div");
  map.className = "yakei-teate-map";
  map.title = "ミニマップ — クリックでエレベーター移動";
  const cells = [];
  for(let i = 0; i < 5; i++){
    const c = document.createElement("div");
    c.className = "yakei-teate-cell";
    const k = document.createElement("span");
    k.className = "yakei-teate-fk";
    k.textContent = Y.floors[i].key;
    c.append(k);
    c.addEventListener("click", () => { try{ Y.gotoFloor(i); }catch(e){} });
    map.append(c);
    cells.push(c);
  }
  const pin = document.createElement("div");
  pin.className = "yakei-teate-pin";
  pin.textContent = "📍";
  map.append(pin);
  document.body.append(map);

  function paintMapFloor(){
    cells.forEach((c, i) => c.classList.toggle("yakei-teate-cur", i === G.floor));
  }
  paintMapFloor();
  Y.on("floor-changed", paintMapFloor);

  const pings = new Map();
  function addPing(a){
    if(!a || a.id == null || pings.has(a.id)) return;
    const d = document.createElement("div");
    d.className = "yakei-teate-ping";
    const col = `hsl(${a.type && a.type.hue != null ? a.type.hue : 48},90%,68%)`;
    d.style.background = col;
    d.style.color = col;                               // currentColor drives the glow pulse
    d.style.left = (10 + (a.xr == null ? .5 : a.xr) * 80).toFixed(1) + "%";
    d.style.top = "62%";
    const fi = Math.max(0, Math.min(4, a.floor|0));
    cells[fi].append(d);
    pings.set(a.id, d);
  }
  function dropPing(a){
    const d = a && pings.get(a.id);
    if(d){ d.remove(); pings.delete(a.id); }
  }
  Y.on("anomaly-spawn", addPing);
  Y.on("anomaly-resolved", dropPing);
  for(const a of Y.anomalies) addPing(a);              // in case we loaded mid-night

  // far-floor sound toasts get a direction arrow (re-toast right after the core's)
  Y.on("anomaly-spawn", a => {
    if(!a || a.floor === G.floor || !a.type || !a.type.far) return;
    Y.toast(a.type.far + (a.floor < G.floor ? " ↑" : " ↓"));
  });

  // ================= morning summary: the night's pay =================
  Y.on("night-end", () => {
    for(const d of pings.values()) d.remove();         // missed anomalies leave no pings
    pings.clear();
    try{
      const sumEl = document.getElementById("summary");
      if(sumEl){
        const ids = CUR_IDS.filter(id => (nightPay[id]|0) > 0);
        const div = document.createElement("div");
        div.className = "yakei-teate-sumpay";
        let h = `<span class="yakei-teate-lt">夜警手当</span>`;
        if(ids.length){
          h += `<div class="yakei-teate-paychips">`;
          for(const id of ids)
            h += `<span class="sumchip">${esc(CUR[id].emoji)} ${esc(CUR[id].name)}<b>+${nightPay[id]|0}</b></span>`;
          h += `</div>`;
        }else{
          h += `今夜は未払い（経理も寝ていた）`;
        }
        div.innerHTML = h;
        const nap = sumEl.querySelector("#napBtn");
        if(nap) sumEl.insertBefore(div, nap); else sumEl.append(div);
      }
    }catch(e){}
    nightPay = Object.create(null);
  });

  // ================= per-frame: gear speed bonus + map pin =================
  // The core moves the guard at 170*mul px/s (mul=.7 when sleepy) by mutating guard.xr.
  // We add our bonus the same way: shoes +25%; mahobin restores half the sleepy
  // penalty (.7 -> ~.85 effective). Elapsed wall time, dt clamped like the core.
  let lastT = performance.now();
  function loop(now){
    const dt = Math.min(.1, (now - lastT)/1000 || 0);
    lastT = now;
    try{
      if(G.moving && !G.riding){
        let bonus = 0;
        if(owned.shoes) bonus += .25;
        if(owned.mahobin && G.sleepy) bonus += .214;
        if(bonus > 0){
          const mul = G.sleepy ? .7 : 1;
          const bw = Math.max(1, Y.W * .86);           // same building width the core computes
          G.xr = Math.max(.03, Math.min(.97, G.xr + G.dir*170*mul*bonus*dt/bw));
        }
      }
      const fi = Math.max(0, Math.min(4, G.floor|0));
      pin.style.top = (PAD + fi*(CH + GAP) + CH - 15) + "px";
      pin.style.left = (PAD + Math.max(0, Math.min(1, G.xr))*(CW - 16)) + "px";
    }catch(e){}
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(t => { lastT = t; requestAnimationFrame(loop); });
})();
</script>

<script>
// ════ plugin: yakei-yoru (wave2) ════ Append before </body> after the core script. Uses only the YAKEI API plus state mutation in the core's style: anomalies array splice (as resolveAnomaly/endNight
(() => {
  "use strict";
  if(!window.YAKEI) return;
  try{
  const Y = window.YAKEI;
  const { mk, esc, pick, toast, floorY, writeDiary, spawnAnomaly, on, emit, ding, addButton } = Y;
  const PK = "yakei-yoru";

  // ---------- persistence ----------
  const SKEY = PK + "-stats-v1";
  let stats = { fullmoon:0, blackout:0, rain:0, quiet:0, catResolved:0, pets:0 };
  try{ const r = JSON.parse(localStorage.getItem(SKEY)); if(r && typeof r === "object") stats = Object.assign(stats, r); }catch(err){}
  const saveStats = () => { try{ localStorage.setItem(SKEY, JSON.stringify(stats)); }catch(err){} };

  // ---------- css / dom ----------
  const style = document.createElement("style");
  style.textContent =
    `.${PK}-card{position:fixed;left:50%;top:36%;transform:translate(-50%,-50%);z-index:9;pointer-events:none;text-align:center;opacity:0;transition:opacity 1.1s ease;width:min(92vw,560px)}.${PK}-card.show{opacity:1}`+
    `.${PK}-t{font-size:clamp(26px,5vw,38px);letter-spacing:.3em;color:var(--ink);font-weight:600;text-shadow:0 0 34px rgba(255,210,122,.5),0 0 90px rgba(127,168,216,.35)}`+
    `.${PK}-s{font-size:11px;color:var(--dim);letter-spacing:.42em;margin-top:9px}.${PK}-d{font-size:13px;color:#d9d4c4;margin-top:14px;letter-spacing:.08em;line-height:1.9;text-shadow:0 0 14px rgba(0,0,0,.95)}`+
    `.${PK}-toast{position:fixed;left:50%;bottom:66px;transform:translateX(-50%) translateY(16px);background:var(--panel);border:1px solid var(--panel-edge);border-radius:999px;padding:9px 18px;font-size:13px;backdrop-filter:blur(10px);opacity:0;transition:.3s;z-index:9;pointer-events:none}`+
    `.${PK}-toast.show{opacity:1;transform:translateX(-50%) translateY(0)}`;
  document.head.append(style);
  const card = document.createElement("div"); card.className = PK + "-card";
  const myToastEl = document.createElement("div"); myToastEl.className = PK + "-toast";
  document.body.append(card, myToastEl);
  let myToastT = null, cardT = null;
  function myToast(m){
    myToastEl.textContent = m; myToastEl.classList.add("show");
    clearTimeout(myToastT); myToastT = setTimeout(() => myToastEl.classList.remove("show"), 3200);
  }

  // ---------- geometry (mirrors core resize()) / flashlight internals ----------
  const geom = () => ({ W:Y.W, H:Y.H, bx:Y.W*.07, bw:Y.W*.86, fh:floorY(1)-floorY(0) });
  const elevXr = g => 1 - 34/Math.max(60, g.bw);
  const inQuiet = () => { const o = Y.gAnoms.style.opacity; return o !== "" && o !== "1"; };
  const maskHole = Y.defs.querySelector("#yk-darkmask g");   // mask hole + visible beam (state, not functions)
  const beamEl = Y.gGuard.querySelector("polygon");
  function setLight(onoff){
    if(maskHole) maskHole.style.visibility = onoff ? "" : "hidden";
    if(beamEl) beamEl.style.visibility = onoff ? "" : "hidden";
  }
  // my layer above the darkness (core's resize only clears its own glow subgroups)
  const glowLayer = mk("g");
  glowLayer.style.pointerEvents = "none";
  Y.gGlow.append(glowLayer);

  // ---------- 特異夜 ----------
  const KINDS = {
    fullmoon:{ t:"満月の夜", en:"FULL MOON NIGHT", d:"月明かりで、異変がうっすら見える。数は増える。手当は倍。", open:"23:00。月が満ちている。店の中まで、うっすら明るい。今夜は忙しくなる予感がする。手当は倍だと聞いた。" },
    blackout:{ t:"停電の夜", en:"BLACKOUT NIGHT", d:"懐中電灯が、ときどき、ためらう。非常灯を頼りに。", open:"23:00。電力会社いわく「今夜は不安定」。懐中電灯がときどき沈黙する。非常灯のオレンジだけが律儀だ。" },
    rain:{ t:"雨の夜", en:"RAINY NIGHT", d:"閉店後の店に、雨。足音が、すこし濡れる。", open:"23:00。雨。閉店後の店に降る雨は、誰のためでもなく降る。傘の忘れ物に注意、と申し送りにある。" },
    quiet:{ t:"静かすぎる夜", en:"TOO QUIET", d:"今夜は、何も起きない。それが、いちばん難しい。", open:"23:00。今夜は静かすぎる、と前任者のメモにある。静かなのは良いことのはずだが、ペンだけが重い。" },
  };
  const QUIET_REF = [
    "何も起きない夜は、何も起きなかったことを書く。これがいちばん難しい。",
    "静かだ。静けさに理由を探すのをやめられたら、夜警は一人前らしい。",
    "巡回、異状なし。異状がないことを三度たしかめた。三度目はただの癖だ。",
    "今夜の暗がりは、ただの暗がりだった。それでいい。それがいい。",
    "書くことがないので、1Fの自販機が今夜も律儀に灯っていることを書いておく。",
  ];

  // 傘忘れ — registered additively; spawned only by this plugin on rainy nights
  Y.lore.ANOM.kasawasure = {
    floor:2, label:"傘の忘れ物", hue:205, harmless:true,
    far:"……1Fの入口あたりで、雨音が一つぶん濃い気がします",
    done:"傘は遺失物として、お預かりした",
    diary:[
      "入口に傘が一本、開いたまま立っていた。閉店後に降り出した雨を、誰かの代わりに眺めていたらしい。",
      "忘れ物の傘を照らすと、申し訳なさそうにすぼまった。遺失物棚で雨宿りしてもらう。",
      "傘の忘れ物。持ち主は濡れて帰ったのだろうか。傘のほうが乾いたまま心配していた。",
      "傘が雨音に合わせて小さく揺れていた。踊っていたのかもしれない。お預かりとする。",
    ],
    draw(g){
      const u = mk("g");
      u.append(
        mk("path",{d:"M -11 -13 A 11 11 0 0 1 11 -13 A 3.67 3.67 0 0 1 3.67 -13 A 3.67 3.67 0 0 1 -3.67 -13 A 3.67 3.67 0 0 1 -11 -13 Z", fill:"#7fa8d8"}),
        mk("line",{x1:0, y1:-24, x2:0, y2:-27, stroke:"#9fc8e8","stroke-width":1.4}),
        mk("line",{x1:0, y1:-13, x2:0, y2:0, stroke:"#52688c","stroke-width":1.5}),
        mk("path",{d:"M 0 0 q 3.4 .4 3.8 -3", stroke:"#52688c","stroke-width":1.5, fill:"none"}));
      const dr = mk("circle",{cx:8, cy:-11, r:1, fill:"#9fc8e8"});
      dr.animate([{transform:"translateY(0)", opacity:0},{opacity:.8, offset:.3},{transform:"translateY(10px)", opacity:0}], {duration:1700, iterations:Infinity, easing:"ease-in"});
      u.append(dr);
      u.style.transformOrigin = "0px 0px";
      u.animate([{transform:"rotate(-3deg)"},{transform:"rotate(3deg)"},{transform:"rotate(-3deg)"}], {duration:4200, iterations:Infinity, easing:"ease-in-out"});
      g.append(u);
      g.setAttribute("filter","url(#yk-glow)");
    },
  };

  let kind = null, endedFlag = false;
  let fmNext = 0, flickNext = 0, flickUntil = 0, flickAnnounced = false;
  let umbrella = null, quietPlan = null, quietIdx = 0, splashT = 0;
  let rainLayer = null, lampLayer = null, moonLayer = null;
  const ghosts = new Map();   // anomaly.id -> {a, el}

  function rainStart(){
    rainStop();
    rainLayer = mk("g"); rainLayer.style.pointerEvents = "none";
    Y.gFx.append(rainLayer);
    const g = geom();
    for(let i=0;i<38;i++){
      const x = g.bx - 8 + Math.random()*(g.bw + 16), dur = 750 + Math.random()*650;
      const ln = mk("line",{x1:x, y1:-34, x2:x-3, y2:-24+Math.random()*8, stroke:"#7fa8d8","stroke-width":1, opacity:(.15+Math.random()*.22).toFixed(2), "stroke-linecap":"round"});
      ln.animate([{transform:"translate(0,0)"},{transform:`translate(-14px, ${g.H+80}px)`}], {duration:dur, iterations:Infinity, easing:"linear", delay:-Math.random()*dur});
      rainLayer.append(ln);
    }
  }
  const rainStop = () => { if(rainLayer){ rainLayer.remove(); rainLayer = null; } };
  function lampsStart(){
    lampsStop();
    lampLayer = mk("g");
    glowLayer.append(lampLayer);
    const g = geom();
    for(let i=0;i<5;i++){
      const x = g.bx + 16, y = floorY(i);
      const r = mk("rect",{x:x-5, y:y-42, width:10, height:6, rx:2, fill:"#ff9a5a", opacity:.55, filter:"url(#yk-glow)"});
      r.animate([{opacity:.3},{opacity:.62},{opacity:.3}],{duration:1900+i*340, iterations:Infinity, easing:"ease-in-out"});
      lampLayer.append(r, mk("ellipse",{cx:x, cy:y-2, rx:13, ry:2.6, fill:"#ff9a5a", opacity:.1}));
    }
  }
  const lampsStop = () => { if(lampLayer){ lampLayer.remove(); lampLayer = null; } };
  function moonStart(){
    moonStop();
    moonLayer = mk("g");
    glowLayer.append(moonLayer);
    const g = geom(), mx = g.bx + g.bw*.64, my = 70 + g.fh*.32;
    const halo = mk("circle",{cx:mx, cy:my, r:26, fill:"#f3ead0", opacity:.1, filter:"url(#yk-glow)"});
    halo.animate([{opacity:.07},{opacity:.17},{opacity:.07}],{duration:5200, iterations:Infinity, easing:"ease-in-out"});
    moonLayer.append(halo, mk("circle",{cx:mx, cy:my, r:13, fill:"#f3ead0", opacity:.92}),
      mk("circle",{cx:mx-4, cy:my-3, r:2.4, fill:"#d9cfb2", opacity:.5}),
      mk("circle",{cx:mx+4, cy:my+4, r:1.7, fill:"#d9cfb2", opacity:.45}),
      mk("circle",{cx:mx+3, cy:my-5, r:1.2, fill:"#d9cfb2", opacity:.4}));
  }
  const moonStop = () => { if(moonLayer){ moonLayer.remove(); moonLayer = null; } };

  function addGhost(a){
    try{
      if(!a || ghosts.has(a.id)) return;
      const fig = a.root && a.root.firstChild;
      if(!fig) return;
      const el = mk("g",{opacity:".2", transform:a.root.getAttribute("transform") || ""});
      el.style.pointerEvents = "none";
      el.append(fig.cloneNode(true));
      glowLayer.append(el);
      ghosts.set(a.id, {a, el});
    }catch(err){}
  }
  function removeGhost(a){
    const gh = a && ghosts.get(a.id);
    if(gh){ gh.el.remove(); ghosts.delete(a.id); }
  }
  function teardown(){
    rainStop(); lampsStop(); moonStop();
    for(const [,gh] of ghosts) gh.el.remove();
    ghosts.clear();
    flickNext = flickUntil = 0;
    setLight(true);
  }
  function rollNight(){
    teardown();
    kind = null; fmNext = 0; umbrella = quietPlan = null; quietIdx = 0; flickAnnounced = false;
    if(Math.random() < .2){
      const k = pick(["fullmoon","blackout","rain","quiet"]);
      setTimeout(() => { if(!endedFlag) announce(k); }, 2100);
    }
  }
  function announce(k){
    kind = k;
    const K = KINDS[k];
    stats[k] = (stats[k]|0) + 1; saveStats();
    card.innerHTML = `<div class="${PK}-t">${esc(K.t)}</div><div class="${PK}-s">${esc(K.en)}</div><div class="${PK}-d">${esc(K.d)}</div>`;
    card.classList.add("show");
    clearTimeout(cardT);
    cardT = setTimeout(() => card.classList.remove("show"), 4800);
    writeDiary(K.open, "全館", "23:00");
    emit("night:special", {kind:k});
    if(k === "fullmoon"){
      moonStart();
      fmNext = performance.now() + 26000 + Math.random()*20000;
      for(const a of Y.anomalies) addGhost(a);
    }
    else if(k === "blackout") lampsStart();
    else if(k === "rain"){ rainStart(); umbrella = { times:[50+Math.random()*110, 230+Math.random()*120], i:0 }; }
    else if(k === "quiet") quietPlan = [70+Math.random()*40, 200+Math.random()*40, 320+Math.random()*40];
  }
  // quiet-night: most spawns lose interest and leave on their own
  function dissolve(a){
    const i = Y.anomalies.indexOf(a);
    if(i < 0) return;
    Y.anomalies.splice(i, 1);
    try{
      a.ring.remove(); a.glow.remove();
      a.root.animate([{opacity:1},{opacity:0}],{duration:1300, fill:"forwards"});
      setTimeout(() => { try{ a.root.remove(); }catch(e){} }, 1400);
    }catch(err){}
    removeGhost(a);
    if(Math.random() < .45) toast("……気配は消えた。気のせい、ということにしておく。");
  }
  function flickerStep(now){
    if(flickUntil > 0){
      if(now >= flickUntil){ flickUntil = 0; setLight(true); flickNext = now + 4000 + Math.random()*5500; }
    }else{
      if(flickNext === 0) flickNext = now + 3000 + Math.random()*5000;
      if(now >= flickNext){
        flickUntil = now + 350 + Math.random()*250;
        setLight(false);
        if(!flickAnnounced){ flickAnnounced = true; toast("……電圧が、ふらついている。"); }
      }
    }
  }
  function splashStep(dt, g){
    if(!Y.guard.moving || Y.guard.riding){ splashT = 0; return; }
    splashT -= dt;
    if(splashT > 0) return;
    splashT = .22;
    const gx = g.bx + Y.guard.xr*g.bw, gy = floorY(Y.guard.floor);
    const s = mk("path",{d:`M ${(gx-3).toFixed(1)} ${gy} q -3 -2.5 -5.5 -1.5 M ${(gx+3).toFixed(1)} ${gy} q 3 -2.5 5.5 -1.5`, stroke:"#7fa8d8","stroke-width":1.1, fill:"none", opacity:.5});
    s.style.pointerEvents = "none";
    Y.gFx.append(s);
    s.animate([{opacity:.5, transform:"translateY(0)"},{opacity:0, transform:"translateY(-3px)"}], {duration:430, easing:"ease-out"}).onfinish = () => s.remove();
  }

  // ---------- 相棒の猫 ----------
  const CAT_LINES = [
    "猫が処理した、と猫が主張している。物証は毛が三本。",
    "異変の上に猫が座った。異変は数分で諦めて帰った。座布団の完全勝利である。",
    "猫の報告：『片付けた』。手段は不明。尻尾だけが満足げだった。",
    "現場には猫が先着していた。夜警の出る幕はなかった。手当の配分について猫と協議する。",
    "異変は猫に踏まれて観念した。報告書の対応者欄に、肉球の判が押してあった。",
    "猫いわく、座れば大抵のことは解決するらしい。夜警業務の核心かもしれない。",
  ];
  const cat = { floor:(Math.random()*5)|0, xr:.3+Math.random()*.4, dir:1, bob:0, mode:"idle", t:2.5, walkTo:null, target:null, destFloor:null };
  let petCD = 0, buffUntil = 0, buffActive = false;
  const catG = mk("g",{cursor:"pointer"});
  const catInner = mk("g");
  const tail = mk("path",{d:"M -6 -4 q -5.5 -2 -4.5 -8.5", stroke:"#252e4c","stroke-width":2.2, fill:"none","stroke-linecap":"round"});
  tail.style.transformOrigin = "-6px -4px";
  tail.animate([{transform:"rotate(0deg)"},{transform:"rotate(16deg)"},{transform:"rotate(0deg)"}], {duration:2300, iterations:Infinity, easing:"ease-in-out"});
  catInner.append(
    mk("ellipse",{cx:0, cy:.8, rx:7, ry:1.8, fill:"#000", opacity:.45}), tail,
    mk("path",{d:"M -7 0 Q -8.5 -7 -2 -7.5 L 2 -7.5 Q 6 -7.5 6.5 -3.5 L 7 0 Z", fill:"#252e4c"}),
    mk("circle",{cx:6.5, cy:-9, r:4.6, fill:"#252e4c"}),
    mk("polygon",{points:"3.4,-12 4.4,-16.4 6.6,-12.6", fill:"#252e4c"}),
    mk("polygon",{points:"7.2,-12.8 9.6,-16.2 10.4,-12.2", fill:"#252e4c"}),
    mk("path",{d:"M 3 -5.4 q 3.5 2 7 0", stroke:"#b8504a","stroke-width":1.3, fill:"none"}),
    mk("circle",{cx:6.6, cy:-4.4, r:1.1, fill:"#ffd27a", filter:"url(#yk-glow)"}));
  for(const ex of [5.2, 8.4]){   // night-glow eyes, slow blink
    const eye = mk("circle",{cx:ex, cy:-9.6, r:.85, fill:"#ffd27a", filter:"url(#yk-glow)"});
    eye.animate([{opacity:1, offset:0},{opacity:1, offset:.91},{opacity:.05, offset:.95},{opacity:1, offset:1}], {duration:4200+Math.random()*1500, iterations:Infinity});
    catInner.append(eye);
  }
  const catHit = mk("circle",{cx:2, cy:-8, r:15, fill:"#fff", opacity:"0"});
  catHit.style.pointerEvents = "all";
  catG.append(catInner, catHit);
  Y.gGuard.insertBefore(catG, Y.gGuard.firstChild);   // above darkness, below the guard

  function findTrivial(){
    let best = null, bd = 1e9;
    for(const a of Y.anomalies){
      if(!a._yoruTrivial) continue;
      const d = Math.abs(a.floor - cat.floor)*10 + Math.abs(a.xr - cat.xr);
      if(d < bd){ bd = d; best = a; }
    }
    return best;
  }
  function stepToward(xr, speed, dt, g){
    const d = xr - cat.xr;
    if(Math.abs(d)*g.bw < 5) return true;
    cat.dir = d > 0 ? 1 : -1;
    cat.xr = Math.max(.02, Math.min(.985, cat.xr + cat.dir*speed*dt/Math.max(1, g.bw)));
    return false;
  }
  function catThink(){
    const t = findTrivial();
    if(t){
      cat.target = t;
      if(t.floor === cat.floor) cat.mode = "seek";
      else { cat.destFloor = t.floor; cat.walkTo = elevXr(geom()); cat.mode = "toElev"; }
      return;
    }
    const r = Math.random();
    if(r < .55){ cat.walkTo = .06 + Math.random()*.82; cat.mode = "walk"; }
    else if(r < .82){ cat.mode = "sit"; cat.t = 3 + Math.random()*6; }
    else{
      const f = Math.max(0, Math.min(4, cat.floor + (Math.random() < .5 ? -1 : 1)));
      if(f === cat.floor){ cat.mode = "sit"; cat.t = 2; }
      else { cat.destFloor = f; cat.walkTo = elevXr(geom()); cat.mode = "toElev"; }
    }
  }
  function startRide(){
    cat.mode = "ride"; cat.t = 1.5;
    catInner.animate([{opacity:1},{opacity:0}],{duration:200, fill:"forwards", easing:"ease-in"});
    ding([1760, 2217]);   // tiny ding, a register above the guard's elevator
  }
  function catResolve(a){
    const i = Y.anomalies.indexOf(a);
    if(i < 0) return;
    Y.anomalies.splice(i, 1);
    try{
      a.ring.remove(); a.glow.remove();
      const fig = a.root.firstChild;
      if(fig){
        fig.style.transformOrigin = "0px -8px";
        fig.animate([{transform:"scale(1)", opacity:1},{transform:"scale(.4) translateY(4px)", opacity:0}], {duration:700, easing:"ease-in", fill:"forwards"});
      }
      setTimeout(() => { try{ a.root.remove(); }catch(e){} }, 760);
    }catch(err){}
    removeGhost(a);
    const g = geom(), ax = g.bx + a.xr*g.bw, ay = floorY(a.floor);
    for(let k=0;k<5;k++){   // dust puff
      const p = mk("circle",{cx:ax + (Math.random()*16-8), cy:ay - 6 - Math.random()*8, r:1.4, fill:"#b8c4de", opacity:.6});
      p.style.pointerEvents = "none";
      Y.gFx.append(p);
      p.animate([{opacity:.6, transform:"translateY(0)"},{opacity:0, transform:"translateY(-10px)"}], {duration:800+Math.random()*300, easing:"ease-out"}).onfinish = () => p.remove();
    }
    writeDiary(pick(CAT_LINES), Y.floors[a.floor].dn);
    toast("猫が座った。異変のほうが先に折れた。");
    stats.catResolved = (stats.catResolved|0) + 1; saveStats();
    emit("cat:resolved", a);
  }
  function hearts(x, y){
    for(let i=0;i<3;i++){
      const w = mk("g",{transform:`translate(${(x-7+Math.random()*14).toFixed(1)} ${(y-Math.random()*6).toFixed(1)})`});
      const h = mk("path",{d:"M 0 2.4 C -3.6 -1.6 -1.3 -5.2 0 -2.4 C 1.3 -5.2 3.6 -1.6 0 2.4 Z", fill:"#e8909a", opacity:.9, filter:"url(#yk-glow)"});
      w.style.pointerEvents = "none";
      w.append(h);
      Y.gFx.append(w);
      h.animate([{transform:"translateY(0) scale(.7)", opacity:.9},{transform:"translateY(-20px) scale(1.1)", opacity:0}], {duration:900+i*220, easing:"ease-out"}).onfinish = () => w.remove();
    }
  }
  catG.addEventListener("pointerdown", e => {
    e.preventDefault(); e.stopPropagation();
    try{ petCat(); }catch(err){}
  });
  function petCat(){
    if(cat.mode === "ride" || Y.guard.riding) return;
    if(Y.guard.floor !== cat.floor){ toast("猫は別のフロアだ。鳴き声だけが返ってきた。"); return; }
    const g = geom(), gx = g.bx + Y.guard.xr*g.bw, cx = g.bx + cat.xr*g.bw;
    if(Math.abs(gx - cx) > 85){ toast("猫まで遠い。猫から歩み寄る制度は、ない。"); return; }
    const now = performance.now();
    if(now < petCD){ toast("撫ですぎだ。猫の業務に支障が出ている。"); return; }
    petCD = now + 3500;
    if(Math.random() < .3){ toast("猫は夜勤に厳しい。"); cat.dir *= -1; return; }
    buffUntil = now + 60000; buffActive = true;
    stats.pets = (stats.pets|0) + 1; saveStats();
    hearts(cx, floorY(cat.floor) - 14);
    toast("士気が上がった。60秒ほど、歩幅が軽い。");
    if(Math.random() < .3) writeDiary("巡回の途中で猫を撫でた。業務日誌に書くことではないが、書いておく。", Y.floors[cat.floor].dn);
    emit("cat:petted");
  }
  function catStep(dt, g){
    if(cat.mode === "idle" || cat.mode === "sit"){
      cat.t -= dt;
      if(cat.t <= 0) catThink();
    }
    else if(cat.mode === "walk" || cat.mode === "toElev"){
      if(stepToward(cat.walkTo, 56, dt, g)){
        if(cat.mode === "toElev") startRide();
        else { cat.mode = "idle"; cat.t = 1.5 + Math.random()*3.5; }
      }
    }
    else if(cat.mode === "seek"){
      const a = cat.target;
      if(!a || Y.anomalies.indexOf(a) < 0){ cat.target = null; cat.mode = "idle"; cat.t = 1.2; }
      else if(a.floor !== cat.floor){ cat.destFloor = a.floor; cat.walkTo = elevXr(g); cat.mode = "toElev"; }
      else if(stepToward(a.xr, 84, dt, g)){ cat.mode = "siton"; cat.t = 6 + Math.random()*5; cat.xr = a.xr; }
    }
    else if(cat.mode === "siton"){
      const a = cat.target;
      if(!a || Y.anomalies.indexOf(a) < 0){ cat.target = null; cat.mode = "idle"; cat.t = 1.5; }
      else{
        cat.t -= dt; cat.xr = a.xr;
        if(cat.t <= 0){ catResolve(a); cat.target = null; cat.mode = "sit"; cat.t = 2.5; }
      }
    }
    else if(cat.mode === "ride"){
      cat.t -= dt;
      if(cat.t <= 0){
        if(cat.destFloor != null) cat.floor = cat.destFloor;
        cat.destFloor = null; cat.xr = elevXr(g);
        catInner.animate([{opacity:0},{opacity:1}],{duration:240, fill:"forwards", easing:"ease-out"});
        cat.mode = cat.target ? "seek" : "idle"; cat.t = 1;
      }
    }
    const moving = cat.mode === "walk" || cat.mode === "seek" || cat.mode === "toElev";
    if(moving) cat.bob += dt*10;
    const cx = g.bx + cat.xr*g.bw, cy = floorY(cat.floor);
    const bob = moving ? -Math.abs(Math.sin(cat.bob))*1.6 : 0;
    catG.setAttribute("transform", `translate(${cx.toFixed(1)} ${(cy+bob).toFixed(1)}) scale(${cat.dir} 1)`);
    catInner.setAttribute("transform", (cat.mode === "sit" || cat.mode === "siton") ? "scale(1.07 .93)" : "");
  }

  // ---------- shared currency: 夜勤手当 (満月は倍額) ----------
  function award(n, label){
    if(n <= 0) return;
    let ok = false;
    try{
      const cur = parseInt(localStorage.getItem("currency-hoshizora") || "0", 10) || 0;
      localStorage.setItem("currency-hoshizora", String(Math.max(0, cur + n)));
      ok = true;
    }catch(err){}
    setTimeout(() => myToast(ok ? label : "金庫が開かない。手当は明晩に持ち越し。"), 900);
  }

  // ---------- bus wiring ----------
  on("anomaly-spawn", a => {
    if(!a) return;
    if(Math.random() < .3) a._yoruTrivial = true;        // 30%: 猫マター
    if(kind === "fullmoon" && !endedFlag) addGhost(a);
    if(kind === "quiet" && !endedFlag && Math.random() < .75)
      setTimeout(() => { if(!endedFlag) dissolve(a); }, 1600 + Math.random()*1800);
  });
  on("anomaly-resolved", a => {
    removeGhost(a);
    if(cat.target === a){
      cat.target = null;
      if(cat.mode === "seek" || cat.mode === "siton"){ cat.mode = "idle"; cat.t = 1; }
    }
  });
  on("night-end", arg => {
    endedFlag = true;
    const resolved = arg && arg.stats ? arg.stats.resolved|0 : 0;
    let pay = Math.min(7, 2 + resolved);
    if(kind === "fullmoon"){ pay = Math.min(15, pay*2); award(pay, `満月手当（倍額）　星屑 +${pay}`); }
    else award(pay, `夜勤手当　星屑 +${pay}`);
    teardown();
    if(cat.mode === "seek" || cat.mode === "siton"){ cat.mode = "idle"; cat.t = 2; cat.target = null; }
  });

  // ---------- main loop (wall time, dt clamped like the core) ----------
  let lastT = performance.now(), lastNight = Y.night;
  function loop(now){
    try{
      const dt = Math.min(.1, (now - lastT)/1000 || 0);
      lastT = now;
      const g = geom();
      if(Y.night !== lastNight){ lastNight = Y.night; endedFlag = false; rollNight(); }
      if(kind === "blackout" && !endedFlag) flickerStep(now);
      if(kind === "fullmoon" && !endedFlag && fmNext > 0 && now >= fmNext){
        fmNext = now + 33000 + Math.random()*34000;        // ≈ +60% on the core's pace
        if(Y.anomalies.length < 4 && !inQuiet()) spawnAnomaly();
      }
      if(kind === "rain" && !endedFlag){
        if(umbrella && umbrella.i < umbrella.times.length && Y.gameMin >= umbrella.times[umbrella.i]){
          umbrella.i++;
          if(Y.anomalies.length < 4 && !inQuiet()) spawnAnomaly("kasawasure");
        }
        splashStep(dt, g);
      }
      if(kind === "quiet" && !endedFlag && quietPlan && quietIdx < quietPlan.length && Y.gameMin >= quietPlan[quietIdx]){
        quietIdx++;
        writeDiary(quietIdx === 1 ? QUIET_REF[0] : pick(QUIET_REF.slice(1)), "全館");
        if(quietIdx === 1) toast("書くことがない。それを、書く。");
      }
      for(const [id, gh] of ghosts){   // ghosts follow their anomalies (covers resize too)
        if(Y.anomalies.indexOf(gh.a) < 0){ gh.el.remove(); ghosts.delete(id); }
        else gh.el.setAttribute("transform", gh.a.root.getAttribute("transform") || "");
      }
      if(buffActive){   // pet buff: extra stride alongside the core's own movement
        if(now >= buffUntil){ buffActive = false; toast("士気は平常に戻った。悪くない60秒だった。"); }
        else if(Y.guard.moving && !Y.guard.riding){
          const mul = Y.guard.sleepy ? .7 : 1;
          Y.guard.xr = Math.max(.03, Math.min(.97, Y.guard.xr + Y.guard.dir*170*.45*mul*dt/Math.max(1, g.bw)));
        }
      }
      catStep(dt, g);
    }catch(err){ console.error("[yakei-yoru]", err); }
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(t => { lastT = t; requestAnimationFrame(loop); });

  window.addEventListener("resize", () => {   // core has already recomputed W/H/floors
    try{
      if(kind === "rain" && !endedFlag && rainLayer) rainStart();
      if(kind === "blackout" && !endedFlag && lampLayer) lampsStart();
      if(kind === "fullmoon" && !endedFlag && moonLayer) moonStart();
    }catch(err){}
  });
  addButton("🌗 空模様", () => {
    const k = kind ? KINDS[kind].t : "ふつうの夜";
    toast(`今夜は「${k}」。猫の検挙 通算${stats.catResolved|0}件／撫で成功 ${stats.pets|0}回。`);
  });
  rollNight();   // the first night rolls too
  }catch(err){ console.error("[yakei-yoru] install failed", err); }
})();
</script>
