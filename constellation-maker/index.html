// ════ plugin: suisei-kaiki (彗星の回帰) ════ ambient named comet; periodic quadratic sweep in gShoot, twin tails aimed away from a virtual sun off bottom-left; click the nucleus once per pass for survey data
(()=>{ "use strict";
  if(!window.SKY) return;
  try{
    const SKY = window.SKY;
    const mk  = SKY.mk;
    const rand    = (a,b)=>a + Math.random()*(b-a);
    const randInt = (a,b)=>Math.floor(rand(a, b+1));
    const clamp   = (v,a,b)=>Math.max(a, Math.min(b, v));
    const esc = s => String(s).replace(/[&<>"']/g, m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));

    /* ---------- style ---------- */
    const style = document.createElement("style");
    style.textContent = `.suisei-kaiki-hit{cursor:pointer}`;
    document.head.append(style);

    /* ---------- one-time defs (prefixed ids) ---------- */
    try{
      SKY.defs.insertAdjacentHTML("beforeend", `
        <radialGradient id="suisei-kaiki-coma">
          <stop offset="0%"   stop-color="#ffffff" stop-opacity=".95"/>
          <stop offset="38%"  stop-color="#e3f1ff" stop-opacity=".5"/>
          <stop offset="100%" stop-color="#bfe2ff" stop-opacity="0"/>
        </radialGradient>`);
    }catch(err){ console.error("[suisei-kaiki] defs", err); }

    /* ---------- identity ---------- */
    const SURNAMES = ["タカハシ","サトウ","スズキ","ワタナベ","イトウ","ヤマモト","ナカムラ","コバヤシ",
                      "カトウ","ヨシダ","ホシノ","ミカヅキ","アマノ","ホシザワ","ツキオカ","ヨアケ"];
    const HALF_MONTH = "ABCDEFGHJKLMNOPQRSTUVWXY"; // 実在の彗星符号と同じく I と Z を欠番に
    function makeIdentity(){
      const a = SKY.pick(SURNAMES);
      let b; do{ b = SKY.pick(SURNAMES); }while(b === a);
      const year = new Date().getFullYear();
      return {
        name:  `${a}・${b}彗星`,
        desig: `(C/${year} ${SKY.pick(HALF_MONTH.split(""))}${randInt(1,9)})`,
        diaKm: randInt(3, 60),
        period: randInt(7, 880),
      };
    }

    /* ---------- path: gentle quadratic across the whole screen ---------- */
    function edgePoint(e, W, H, M){
      if(e===0) return {x:rand(0,W), y:-M};
      if(e===1) return {x:W+M, y:rand(0,H)};
      if(e===2) return {x:rand(0,W), y:H+M};
      return {x:-M, y:rand(0,H)};
    }
    function makePath(){
      const W = SKY.W, H = SKY.H, M = 170;     // margin > tail length so nothing pops at the rim
      let p0, p1, tries = 0;
      do{
        const e0 = randInt(0,3);
        let e1; do{ e1 = randInt(0,3); }while(e1 === e0);
        p0 = edgePoint(e0, W, H, M); p1 = edgePoint(e1, W, H, M);
      }while(Math.hypot(p1.x-p0.x, p1.y-p0.y) < 0.75*Math.hypot(W,H) && ++tries < 40);
      const dx = p1.x-p0.x, dy = p1.y-p0.y, d = Math.hypot(dx,dy) || 1;
      const k  = rand(.13,.26) * (Math.random()<.5 ? -1 : 1);   // perpendicular bow
      const c  = { x:(p0.x+p1.x)/2 - dy*k, y:(p0.y+p1.y)/2 + dx*k };
      c.x += (W*.5 - c.x)*.18; c.y += (H*.45 - c.y)*.18;        // pull the arc toward the view
      return {p0, c, p1};
    }
    const bezier = (P,t)=>({
      x:(1-t)*(1-t)*P.p0.x + 2*(1-t)*t*P.c.x + t*t*P.p1.x,
      y:(1-t)*(1-t)*P.p0.y + 2*(1-t)*t*P.c.y + t*t*P.p1.y,
    });
    const bezierVel = (P,t)=>({
      x:2*(1-t)*(P.c.x-P.p0.x) + 2*t*(P.p1.x-P.c.x),
      y:2*(1-t)*(P.c.y-P.p0.y) + 2*t*(P.p1.y-P.c.y),
    });
    const norm = (x,y)=>{ const d = Math.hypot(x,y) || 1; return {x:x/d, y:y/d}; };

    /* ---------- dust-tail spine: blends anti-sun -> minus-velocity along its length ---------- */
    const SPINE_N = 8;
    function buildSpine(aS, mV, L){
      const pts = [{x:0, y:0}];
      let x = 0, y = 0;
      const step = L / SPINE_N;
      for(let k=1; k<=SPINE_N; k++){
        const w = .12 + .55*(k/SPINE_N);                 // curve outward toward -v
        const d = norm(aS.x*(1-w)+mV.x*w, aS.y*(1-w)+mV.y*w);
        x += d.x*step; y += d.y*step;
        pts.push({x, y});
      }
      return pts;
    }
    function layerPoints(spine, lenFrac, wScale){
      const n = Math.max(2, Math.round((spine.length-1)*lenFrac) + 1);
      const Lp = [], Rp = [];
      for(let i=0; i<n; i++){
        const s = i/(n-1), p = spine[i];
        const q = spine[Math.min(i+1, spine.length-1)], r = spine[Math.max(i-1, 0)];
        const t = norm(q.x-r.x, q.y-r.y);
        const nx = -t.y, ny = t.x;
        let w = (0.8 + 9.5*s) * wScale;                  // fans out away from the nucleus
        if(s > .85) w *= 1 - (s-.85)/.15*.45;            // soften the very tip
        Lp.push((p.x+nx*w).toFixed(1)+","+(p.y+ny*w).toFixed(1));
        Rp.push((p.x-nx*w).toFixed(1)+","+(p.y-ny*w).toFixed(1));
      }
      return Lp.concat(Rp.reverse()).join(" ");
    }

    /* ---------- one pass ---------- */
    let cur = null, passTimer = null, sparkles = 0;

    function shedSparkle(ax, ay, spine){
      try{
        if(sparkles >= 22) return;
        const i = 1 + ((Math.random()*(spine.length-2))|0);
        const p = spine[i];
        const c = mk("circle", {
          cx:(ax + p.x + rand(-4,4)).toFixed(1), cy:(ay + p.y + rand(-4,4)).toFixed(1),
          r:rand(.5,1.3).toFixed(2), fill:"#fff0d6", opacity:.9, "pointer-events":"none",
        });
        SKY.gShoot.append(c);
        sparkles++;
        const a = c.animate(
          [{opacity:.9, transform:"translate(0,0)"},
           {opacity:0,  transform:`translate(${rand(-7,7).toFixed(1)}px, ${rand(2,11).toFixed(1)}px)`}],
          {duration:rand(900,1700), easing:"ease-out", fill:"forwards"});
        a.onfinish = ()=>{ try{ c.remove(); }catch(_){ } sparkles--; };
      }catch(err){ console.error("[suisei-kaiki] sparkle", err); }
    }

    function endPass(){
      try{
        if(!cur) return;
        if(cur.raf) cancelAnimationFrame(cur.raf);
        cur.g.remove();
        cur = null;
        scheduleNext(rand(100000, 160000));              // 次の回帰は 100–160 秒後
      }catch(err){ console.error("[suisei-kaiki] end", err); }
    }

    function frame(now){
      try{
        if(!cur) return;
        const u  = Math.min(1, (now - cur.start) / cur.dur);   // wall-time driven
        const el = (now - cur.start) / 1000;
        const pos = bezier(cur.path, u);
        const v   = bezierVel(cur.path, u);
        const mV  = norm(-v.x, -v.y);
        const aS  = norm(pos.x - cur.sun.x, pos.y - cur.sun.y);

        cur.g.setAttribute("transform", `translate(${pos.x.toFixed(1)} ${pos.y.toFixed(1)})`);

        // ion tail: straight anti-sun, subtle flicker in length/opacity
        const iLen = cur.ionLen * (0.95 + 0.06*Math.sin(el*7.3));
        cur.ion.setAttribute("x2", (aS.x*iLen).toFixed(1));
        cur.ion.setAttribute("y2", (aS.y*iLen).toFixed(1));
        cur.ion.setAttribute("opacity",
          clamp(.5 + .14*Math.sin(el*11.1) + .08*Math.sin(el*29.4 + 1.7), .3, .72).toFixed(2));
        const a2 = Math.atan2(aS.y, aS.x) + .07;        // faint second streamer, slightly skewed
        cur.ion2.setAttribute("x2", (Math.cos(a2)*iLen*.72).toFixed(1));
        cur.ion2.setAttribute("y2", (Math.sin(a2)*iLen*.72).toFixed(1));
        cur.ion2.setAttribute("opacity",
          clamp(.28 + .1*Math.sin(el*17.6 + .9), .12, .42).toFixed(2));

        // dust tail: curved fan, rebuilt from current position + velocity
        const spine = buildSpine(aS, mV, cur.dustLen);
        cur.dust.forEach(([poly, lf, ws])=>poly.setAttribute("points", layerPoints(spine, lf, ws)));

        // shed a few particles along the dust tail
        if(now - cur.lastShed > cur.shedGap && u > .02 && u < .98){
          cur.lastShed = now; cur.shedGap = rand(120, 260);
          shedSparkle(pos.x, pos.y, spine);
        }

        if(u >= 1){ endPass(); return; }
        cur.raf = requestAnimationFrame(frame);
      }catch(err){
        console.error("[suisei-kaiki] frame", err);
        endPass();
      }
    }

    function startPass(){
      try{
        if(cur){ scheduleNext(rand(100000,160000)); return; }
        const W = SKY.W, H = SKY.H;
        const id   = makeIdentity();
        const path = makePath();
        const g = mk("g");
        g.style.pointerEvents = "auto";

        // dust tail (under everything): 3 layered tapered polygons, warm cream
        const dust = [
          [mk("polygon",{fill:"#ffdfa8", opacity:".12", "pointer-events":"none"}), 1.0, 1.0],
          [mk("polygon",{fill:"#ffe7bd", opacity:".17", "pointer-events":"none"}), .8,  .72],
          [mk("polygon",{fill:"#fff3da", opacity:".26", "pointer-events":"none"}), .55, .45],
        ];
        dust.forEach(([p])=>g.append(p));

        // ion tails: thin bluish streamers
        const ion  = mk("line",{x1:0, y1:0, x2:0, y2:0, stroke:"#9fd0ff", "stroke-width":1.6,
                                "stroke-linecap":"round", filter:"url(#line-glow)", opacity:.55, "pointer-events":"none"});
        const ion2 = mk("line",{x1:0, y1:0, x2:0, y2:0, stroke:"#9fd0ff", "stroke-width":.9,
                                "stroke-linecap":"round", filter:"url(#line-glow)", opacity:.3, "pointer-events":"none"});
        // coma + nucleus
        const coma    = mk("circle",{r:10, fill:"url(#suisei-kaiki-coma)", "pointer-events":"none"});
        const nucleus = mk("circle",{r:2.5, fill:"#ffffff", "pointer-events":"none"});
        coma.animate([{opacity:.85},{opacity:1},{opacity:.85}],
          {duration:2300, iterations:Infinity, easing:"ease-in-out"});
        // invisible hit circle following the nucleus
        const hit = mk("circle",{r:20, fill:"transparent", "pointer-events":"all", class:"suisei-kaiki-hit"});
        g.append(ion2, ion, coma, nucleus, hit);

        let surveyed = false;
        hit.addEventListener("pointerdown", e=>{
          try{
            if(e.button !== 0 || e.defaultPrevented) return;  // another plugin already claimed it
            e.preventDefault();                                // core skips star placement
            e.stopPropagation();
            if(surveyed) return;                               // once per pass
            surveyed = true;
            SKY.toast(`☄️ ${id.name} — 核直径 約${id.diaKm}km／次回帰は${id.period}年後（係の者の計算による）`);
          }catch(err){ console.error("[suisei-kaiki] click", err); }
        });

        SKY.gShoot.append(g);
        cur = {
          g, ion, ion2, dust, path,
          sun: {x:-W*0.9, y:H*2.0},                  // 仮想太陽は画面のはるか左下
          ionLen: rand(95, 125), dustLen: rand(80, 120),
          start: performance.now(), dur: rand(18000, 25000),
          lastShed: 0, shedGap: rand(120, 260), raf: 0,
        };
        SKY.toast(`☄️ ${id.name} ${id.desig} が回帰しました`);
        cur.raf = requestAnimationFrame(frame);
      }catch(err){
        console.error("[suisei-kaiki] pass", err);
        scheduleNext(rand(100000, 160000));
      }
    }

    function scheduleNext(ms){
      clearTimeout(passTimer);
      passTimer = setTimeout(()=>{ try{ startPass(); }catch(err){ console.error("[suisei-kaiki]", err); } }, ms);
    }

    scheduleNext(rand(15000, 30000));                  // 初回帰はロード後 15–30 秒
  }catch(err){
    console.error("[suisei-kaiki] init", err);
  }
})();
</script>
<script>
// ════ plugin: tsuki (wave3) ════ Paste verbatim into its own <script> tag after wave-2 plugins, before sharelink. Ambient, no dock button. Adds gradient defs ids "tsuki-glow" and "tsuki-kasa-grad" to SKY.defs (do not reuse) via appen
// ════ plugin: tsuki (月) ════ ambient real-phase moon; click for tonight's haiku
(()=>{ "use strict";
  if(!window.SKY) return;
  try{
    const SKY = window.SKY;
    const mk  = SKY.mk;
    const rand = (a,b)=>a + Math.random()*(b-a);
    const esc = s => String(s).replace(/[&<>"']/g, ch =>
      ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[ch]));

    /* ---------- 月齢: 既知の新月 (2000-01-06T18:14Z) からの経過日数 mod 朔望月 ---------- */
    const SYNODIC = 29.530588;
    const EPOCH = Date.UTC(2000, 0, 6, 18, 14, 0);
    function lunarAge(){
      const d = (Date.now() - EPOCH) / 86400000;
      return ((d % SYNODIC) + SYNODIC) % SYNODIC;
    }
    const PHASE_NAMES = [
      [0,     "新月"], [2.7,  "三日月"], [7.38, "上弦の月"], [12.4, "十三夜"],
      [14.77, "満月"], [15.8, "十六夜"], [22.15,"下弦の月"], [26.3, "有明の月"],
    ];
    function phaseName(age){
      let best = "新月", bd = Infinity;
      for(const [a, n] of PHASE_NAMES){
        const d = Math.min(Math.abs(age - a), SYNODIC - Math.abs(age - a));
        if(d < bd){ bd = d; best = n; }
      }
      return best;
    }

    /* ---------- 影のパス(二弧法): 縁の半円 + 明暗境界の半楕円 (x半径 = r·|cos(2πp)|)
       満ちる夜は右が光り、欠ける夜は左が光る (北半球流) ---------- */
    function shadowD(r, age){
      const p  = age / SYNODIC;
      const c  = Math.cos(p * 2 * Math.PI);
      const rx = Math.max(.01, Math.abs(c) * r);
      const waxing = p < .5;
      const limbSweep = waxing ? 0 : 1;               // 影側の縁: 満ちる時は左、欠ける時は右
      const termSweep = (waxing === (c > 0)) ? 0 : 1; // 境界の膨らむ向き
      return `M 0 ${-r} A ${r} ${r} 0 0 ${limbSweep} 0 ${r} A ${rx} ${r} 0 0 ${termSweep} 0 ${-r} Z`;
    }

    /* ---------- style ---------- */
    const style = document.createElement("style");
    style.textContent = `
      .tsuki-moon{cursor:pointer}
      .tsuki-card{position:fixed;top:62px;left:50%;transform:translateX(-50%);z-index:7;
        width:min(300px,86vw);padding:18px 20px 13px;border-radius:14px;color:var(--ink);
        background:radial-gradient(130% 110% at 50% -25%, rgba(42,50,98,.93) 0%,
          rgba(11,15,38,.97) 55%, rgba(5,7,20,.98) 100%);
        border:1px solid rgba(245,238,220,.24);backdrop-filter:blur(9px);
        box-shadow:0 0 36px rgba(245,238,220,.09), 0 22px 60px rgba(0,0,0,.62)}
      .tsuki-close{position:absolute;top:8px;right:10px;border:none;background:none;
        color:var(--dim);font-size:14px;line-height:1;padding:6px;cursor:pointer;transition:.2s}
      .tsuki-close:hover{color:var(--ink)}
      .tsuki-head{display:flex;align-items:center;gap:14px;margin:0 2px}
      .tsuki-mini{flex:none;filter:drop-shadow(0 0 7px rgba(245,238,220,.35))}
      .tsuki-age{font-size:15px;font-weight:600;letter-spacing:.1em}
      .tsuki-pname{font-size:11.5px;color:var(--accent);letter-spacing:.24em;margin-top:4px;
        text-shadow:0 0 10px rgba(255,210,122,.45)}
      .tsuki-label{text-align:center;font-size:10px;letter-spacing:.4em;color:var(--dim);
        margin:13px 0 9px;padding-left:.4em}
      .tsuki-haiku-wrap{display:flex;justify-content:center}
      .tsuki-haiku{writing-mode:vertical-rl;text-orientation:upright;height:12em;
        font-family:"Hiragino Mincho ProN","Yu Mincho",serif;font-size:15.5px;
        letter-spacing:.3em;line-height:2.05;color:#f0ecdc;
        text-shadow:0 0 12px rgba(245,238,220,.28)}
      .tsuki-ku2{padding-top:1.5em}
      .tsuki-ku3{padding-top:3em}
      .tsuki-foot{margin-top:9px;text-align:center;font-size:9.5px;color:var(--dim);
        letter-spacing:.12em}
    `;
    document.head.append(style);

    /* ---------- defs (ids: tsuki-glow / tsuki-kasa-grad — 他プラグインは使用しないこと) ---------- */
    const glowGrad = mk("radialGradient", {id:"tsuki-glow"});
    glowGrad.append(
      mk("stop", {offset:"0%",   "stop-color":"#fff3cf", "stop-opacity":".5"}),
      mk("stop", {offset:"45%",  "stop-color":"#ffeec2", "stop-opacity":".22"}),
      mk("stop", {offset:"100%", "stop-color":"#ffeec2", "stop-opacity":"0"})
    );
    const kasaGrad = mk("linearGradient", {id:"tsuki-kasa-grad", x1:"0", y1:"0", x2:"1", y2:"1"});
    kasaGrad.append(
      mk("stop", {offset:"0%",   "stop-color":"#ffd9e8", "stop-opacity":".5"}),
      mk("stop", {offset:"35%",  "stop-color":"#fff3c9", "stop-opacity":".4"}),
      mk("stop", {offset:"68%",  "stop-color":"#cfeaff", "stop-opacity":".5"}),
      mk("stop", {offset:"100%", "stop-color":"#e2d2ff", "stop-opacity":".45"})
    );
    SKY.defs.append(glowGrad, kasaGrad);

    /* ---------- 月本体 (gShoot / svg座標) ---------- */
    const R = 20;
    const gMoon = mk("g", {class:"tsuki-moon"});
    gMoon.style.pointerEvents = "auto";
    const glow = mk("circle", {cy:0, r:46, fill:"url(#tsuki-glow)", opacity:".4", "pointer-events":"none"});
    const disc = mk("g", {"pointer-events":"none"});
    const shadow = mk("path", {fill:"#0a0f2c", "fill-opacity":".93"});
    disc.append(
      mk("circle", {r:R, fill:"#f5eedc"}),
      mk("circle", {cx:-6.5, cy:-3,   r:3.6, fill:"#e3d7ba", opacity:".75"}),
      mk("circle", {cx:4.5,  cy:6.5,  r:2.6, fill:"#e3d7ba", opacity:".6"}),
      mk("circle", {cx:3,    cy:-7.5, r:1.9, fill:"#ddd0b1", opacity:".55"}),
      shadow,
      mk("circle", {r:R, fill:"none", stroke:"rgba(255,250,230,.26)", "stroke-width":".7"})
    );
    const hit = mk("circle", {r:34, fill:"transparent", "pointer-events":"all"});
    gMoon.append(glow, disc, hit);
    gMoon.setAttribute("transform", "translate(-300,-300)");   // 地平線の下で待機
    SKY.gShoot.append(gMoon);

    function updatePhase(){
      const age = lunarAge();
      shadow.setAttribute("d", shadowD(R, age));
      const p = age / SYNODIC, c = Math.cos(p * 2 * Math.PI), illum = (1 - c) / 2;
      const litDir = p < .5 ? 1 : -1;
      glow.setAttribute("cx", (litDir * 8 * Math.max(0, c)).toFixed(1));
      glow.setAttribute("opacity", (.15 + .6 * illum).toFixed(2));
    }

    /* ---------- 月暈 (約8%の月の出に同伴) ---------- */
    let kasa = null;
    function setKasa(on){
      if(kasa){ kasa.remove(); kasa = null; }
      if(!on) return;
      kasa = mk("g", {"pointer-events":"none"});
      const soft = mk("circle", {r:56, fill:"none", stroke:"#dfe6ff", "stroke-width":"6",
        opacity:".05", filter:"url(#soft)"});
      const ring = mk("circle", {r:56, fill:"none", stroke:"url(#tsuki-kasa-grad)",
        "stroke-width":"1.3", opacity:".35"});
      kasa.append(soft, ring);
      gMoon.prepend(kasa);
      ring.animate([{opacity:.22},{opacity:.5},{opacity:.22}],
        {duration:11000, iterations:Infinity, easing:"ease-in-out"});
    }

    /* ---------- 運行: 8〜12分で上空をひと渡り → 約1分沈んで反対側から再昇 ---------- */
    let anim = null, riseT = null, safeT = null, passToken = 0;
    const dir = Math.random() < .5 ? 1 : -1;          // 今宵の進行方向 (セッション固定)

    function setBelow(token){
      if(token !== passToken) return;                 // onfinish と保険タイマーの二重発火ガード
      passToken++;
      try{ if(anim) anim.cancel(); }catch(_){}
      anim = null;
      gMoon.setAttribute("transform", "translate(-300,-300)");
      clearTimeout(riseT);
      riseT = setTimeout(()=>{ try{ rise(false); }catch(err){ console.error("[tsuki] rise", err); } },
        rand(50000, 75000));
    }

    function rise(first){
      try{
        updatePhase();
        setKasa(Math.random() < .08);
        const W = SKY.W, H = SKY.H, M = 90;
        const x1 = dir > 0 ? -M : W + M;
        const x2 = dir > 0 ? W + M : -M;
        const y  = H * rand(.13, .24);
        const lift = H * rand(.03, .06);
        const DUR = rand(480000, 720000);             // 8〜12分 (経過実時間駆動: WAAPI)
        try{ if(anim) anim.cancel(); }catch(_){}
        anim = gMoon.animate([
          {transform:`translate(${x1}px, ${y}px)`},
          {transform:`translate(${(x1+x2)/2}px, ${(y-lift).toFixed(1)}px)`},
          {transform:`translate(${x2}px, ${y}px)`},
        ], {duration:DUR, easing:"linear", fill:"forwards"});
        if(first) anim.currentTime = DUR * rand(.2, .5);   // 初回は空の途中から
        const token = passToken;
        anim.onfinish = ()=>{ try{ setBelow(token); }catch(err){ console.error("[tsuki]", err); } };
        clearTimeout(safeT);
        safeT = setTimeout(()=>{ try{ setBelow(token); }catch(err){ console.error("[tsuki]", err); } },
          DUR - (Number(anim.currentTime) || 0) + 5000);
      }catch(err){
        console.error("[tsuki] rise", err);
        clearTimeout(riseT);
        riseT = setTimeout(()=>rise(false), 60000);
      }
    }

    /* ---------- 俳句の語彙 (モーラ数固定: 上五5 / 中七7 / 下五5) ---------- */
    const KAMI = [   // 5
      "月影の", "冬銀河", "星ひとつ", "夜半の月", "天の川", "流れ星",
      "月白や", "しんしんと", "雲間より", "眠られず", "UFOは", "ベランダに",
    ];
    const NAKA = [   // 7
      "一人見上げる", "遠い日のこと", "誰かの願い", "光は昔", "名前も知らぬ",
      "答えぬ空に", "忘れたころに", "まばたきの間に", "指でなぞった", "千億年の",
      "布団を出れず", "電波届かぬ",
    ];
    const SHIMO = [  // 5
      "月のぼる", "星の声", "夜が更ける", "ただ光る", "月あかり", "風の音",
      "夢のあと", "遠い街", "猫が鳴く", "しずかなり", "茶が冷める", "明日仕事",
    ];
    let lastKu = [-1, -1, -1];
    function pickHaiku(){
      let a, b, c, t = 0;
      do{
        a = (Math.random() * KAMI.length)  | 0;
        b = (Math.random() * NAKA.length)  | 0;
        c = (Math.random() * SHIMO.length) | 0;
      }while(++t < 10 && (
        (a === lastKu[0] && b === lastKu[1] && c === lastKu[2]) ||           // 同句の連続を回避
        (KAMI[a].includes("月") && SHIMO[c].includes("月"))                  // 月の重なりすぎを回避
      ));
      lastKu = [a, b, c];
      return [KAMI[a], NAKA[b], SHIMO[c]];
    }

    /* ---------- カード ---------- */
    let card = null;
    function closeCard(){ if(card){ card.remove(); card = null; } }

    function renderHaiku(fade){
      try{
        if(!card) return;
        const [k, n, s] = pickHaiku();
        const el = card.querySelector(".tsuki-haiku");
        if(!el) return;
        el.innerHTML =
          `<div class="tsuki-ku1">${esc(k)}</div>` +
          `<div class="tsuki-ku2">${esc(n)}</div>` +
          `<div class="tsuki-ku3">${esc(s)}</div>`;
        if(fade) el.animate([{opacity:0},{opacity:1}], {duration:420, easing:"ease-out"});
      }catch(err){ console.error("[tsuki] haiku", err); }
    }

    function openCard(){
      try{
        closeCard();
        const age = lunarAge();
        card = document.createElement("div");
        card.className = "tsuki-card";
        card.innerHTML = `
          <button class="tsuki-close" title="とじる">✕</button>
          <div class="tsuki-head">
            <svg class="tsuki-mini" width="36" height="36" viewBox="-12 -12 24 24" aria-hidden="true">
              <circle r="9.5" fill="#f5eedc"/>
              <path d="${esc(shadowD(9.5, age))}" fill="rgba(7,10,28,.93)"/>
              <circle r="9.5" fill="none" stroke="rgba(245,238,220,.3)" stroke-width=".5"/>
            </svg>
            <div>
              <div class="tsuki-age">月齢 ${esc(age.toFixed(1))}</div>
              <div class="tsuki-pname">${esc(phaseName(age))}</div>
            </div>
          </div>
          <div class="tsuki-label">今夜の俳句</div>
          <div class="tsuki-haiku-wrap"><div class="tsuki-haiku"></div></div>
          <div class="tsuki-foot">月にもう一度ふれると、別の一句</div>`;
        document.body.append(card);
        const x = card.querySelector(".tsuki-close");
        if(x) x.addEventListener("click", ()=>{ try{ closeCard(); }catch(_){} });
        renderHaiku(false);
        card.animate([
          {opacity:0, transform:"translateX(-50%) translateY(-10px)"},
          {opacity:1, transform:"translateX(-50%) translateY(0)"},
        ], {duration:280, easing:"ease-out"});
      }catch(err){ console.error("[tsuki] card", err); }
    }

    // 月をつつく: 初回はカード、以降は詠み直し
    gMoon.addEventListener("pointerdown", e=>{
      try{
        if(e.button !== 0) return;
        if(e.defaultPrevented) return;                // 他プラグインが先に取った
        e.preventDefault();                           // 星を置かせない
        e.stopPropagation();                          // 外側クリック閉じも発火させない
        if(card) renderHaiku(true);
        else openCard();
      }catch(err){ console.error("[tsuki] click", err); }
    });

    // カード外クリックで閉じる (月クリックは stopPropagation 済みなので届かない)
    document.addEventListener("pointerdown", e=>{
      try{
        if(!card) return;
        if(card.contains(e.target)) return;
        closeCard();
      }catch(err){ console.error("[tsuki] outside", err); }
    });

    rise(true);
  }catch(err){
    console.error("[tsuki] init", err);
  }
})();
</script>
<script>
// ════ plugin: wakusei-gyakko (wave3) ════ Browser-verified live against constellation-maker.html (throwaway test copy with a debug hook; production code unchanged): planets render/stagger (2 visible 
// ════ plugin: wakusei-gyakko (惑星の逆行) ════ ambient wandering planets with retrograde loops
(()=>{ "use strict";
  if(!window.SKY) return;
  try{
    const SKY = window.SKY;
    const mk  = SKY.mk;
    const PRE = "wakusei-gyakko";
    const TAU = Math.PI*2;
    const rand = (a,b)=>a + Math.random()*(b-a);
    // kept for safety — any string ever placed into innerHTML must pass through here
    const esc = s=>String(s).replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

    /* ---------- style ---------- */
    const style = document.createElement("style");
    style.textContent = `.${PRE}-planet{cursor:pointer}`;
    document.head.append(style);

    /* ---------- per-planet glow gradients (ids prefixed, no collisions) ---------- */
    function addGlow(id, stops){
      const g = mk("radialGradient", {id});
      for(const [offset, col, op] of stops)
        g.append(mk("stop", {offset, "stop-color":col, "stop-opacity":op}));
      SKY.defs.append(g);
    }
    addGlow(`${PRE}-glow-v`, [["0%","#ffffff",.95],["30%","#ffeecf",.55],["100%","#ffd98f",0]]);
    addGlow(`${PRE}-glow-m`, [["0%","#ffb09a",.8],["40%","#ff8866",.32],["100%","#ff8866",0]]);
    addGlow(`${PRE}-glow-j`, [["0%","#f7efd9",.8],["40%","#f0e6c8",.3],["100%","#f0e6c8",0]]);

    /* ---------- corpora ---------- */
    const lastPick = new WeakMap();
    function pickNR(arr){            // pick, never the same twice in a row
      let i, last = lastPick.has(arr) ? lastPick.get(arr) : -1;
      do{ i = (Math.random()*arr.length)|0; }while(arr.length > 1 && i === last);
      lastPick.set(arr, i);
      return arr[i];
    }

    const PLANETS = [
      {
        key:"venus", name:"金星",
        dur:[180000, 250000], band:[.12, .26],
        warn:[
          "過去の人から連絡が来ます。来ません。",
          "既読がつかないのは電波のせいです。今夜だけはそういうことにしましょう",
          "懐かしい名前を検索したくなりますが、おすすめはしません",
          "今夜書いた長文は、朝に読み返してから送ってください",
          "思わせぶりな星の並びに深い意味はありません",
        ],
        trivia:[
          "金星: 表面温度465℃。今夜の服装の参考にはなりません",
          "金星: 一日が一年より長い星です。月曜日が長いとお嘆きのあなたへ",
          "金星: 雲は硫酸でできています。それでも明けの明星と呼ばれます",
          "金星: 明るさはマイナス4等級。夜空ではほぼ優勝です",
          "金星: 自転が逆向きです。逆行とは別の話ですが、気持ちはわかります",
        ],
        draw(g){
          const halo = mk("circle", {r:13, fill:`url(#${PRE}-glow-v)`});
          g.append(halo, mk("circle",{r:3.2, fill:"#fff7e8"}), mk("circle",{r:1.3, fill:"#ffffff"}));
          try{ halo.animate([{opacity:.72},{opacity:1},{opacity:.72}], {duration:4200, iterations:Infinity, easing:"ease-in-out"}); }catch(_){}
          return 3.2;
        },
      },
      {
        key:"mars", name:"火星",
        dur:[210000, 300000], band:[.26, .42],
        warn:[
          "レビューコメントの口調にご注意ください",
          "今夜の「了解です」は冷たく届きます。絵文字をひとつ足してください",
          "送信ボタンの前で三秒数えると、だいたいの戦争は回避できます",
          "タイポは増えます。指摘する側の誤字は、もっと増えます",
          "強めの正論は今夜、誰も救いません",
        ],
        trivia:[
          "火星: 夕焼けは青いそうです。向こうからこちらの空がどう見えるかは不明です",
          "火星: 重力は地球の38%。体重の悩みが38%になるわけではありません",
          "火星: オリンポス山は高さ約2万メートル。登山届の提出先はまだありません",
          "火星: 衛星の名はフォボスとダイモス。意味は「恐怖」と「狼狽」。かわいい名前です",
          "火星: 砂嵐が星全体を覆うことがあります。洗濯物は室内干しが安全です",
        ],
        draw(g){
          g.append(
            mk("circle", {r:8, fill:`url(#${PRE}-glow-m)`}),
            mk("circle", {r:2.4, fill:"#ff8866", stroke:"#d96a4f", "stroke-width":.4})
          );
          return 2.4;
        },
      },
      {
        key:"jupiter", name:"木星",
        dur:[260000, 360000], band:[.40, .58],
        warn:[
          "財布のひもと締切がゆるみます",
          "「大は小を兼ねる」で買ったものは、だいたい大きすぎます",
          "計画が雄大になりがちです。見積もりは三割増しでお願いします",
          "ポイント還元は収入ではありません。今夜は特に",
          "サブスクがひとつ増えそうな夜です",
        ],
        trivia:[
          "木星: 大赤斑は350年続く嵐です。月曜日の比ではありません",
          "木星: 衛星は90個以上。全員の名前を覚えている人は神話の中にもいません",
          "木星: 一日は約10時間。締切が来るのも1.4倍速です",
          "木星: ほぼガスでできています。中身の話はあまり聞かないであげてください",
          "木星: 地球が1300個入ります。入れる予定はありません",
        ],
        draw(g){
          g.append(
            mk("circle", {r:10, fill:`url(#${PRE}-glow-j)`}),
            mk("circle", {r:3.6, fill:"#f0e6c8"}),
            mk("line", {x1:-3.2,  y1:-1.15, x2:3.2,  y2:-1.15, stroke:"#c5b08a", "stroke-width":.55, opacity:.6}),
            mk("line", {x1:-3.25, y1:1.05,  x2:3.25, y2:1.05,  stroke:"#c5b08a", "stroke-width":.55, opacity:.6})
          );
          return 3.6;
        },
      },
    ];

    /* ---------- build one planet group ---------- */
    function build(def){
      const g = mk("g", {class:`${PRE}-planet`, "data-planet":def.key});
      g.style.pointerEvents = "auto";
      g.style.display = "none";
      g.append(mk("circle", {r:16, fill:"transparent", "pointer-events":"all"})); // hit area
      const r = def.draw(g);
      const label = mk("text", {y:(r+13).toFixed(1), "text-anchor":"middle",
        "font-size":9, fill:"var(--dim)", opacity:.55,
        "font-family":"inherit", "letter-spacing":".12em", "pointer-events":"none"});
      label.textContent = def.name;
      g.append(label);
      g.addEventListener("pointerdown", e=>{
        try{
          if(e.button !== 0) return;
          if(e.defaultPrevented) return;     // another plugin claimed this click
          e.preventDefault();                // core skips star placement
          e.stopPropagation();
          SKY.toast(pickNR(def.trivia));
        }catch(err){ console.error("[wakusei-gyakko] click", err); }
      });
      return g;
    }

    /* ---------- retrograde trail dots ---------- */
    const gTrail = mk("g", {"pointer-events":"none"});
    let dotLive = 0;
    function dropDot(x, y){
      try{
        if(dotLive > 180) return;
        dotLive++;
        const c = mk("circle", {cx:x.toFixed(1), cy:y.toFixed(1), r:1.1, fill:"#cdd6ff", opacity:.5});
        gTrail.append(c);
        const a = c.animate([{opacity:.5},{opacity:.38, offset:.55},{opacity:0}],
          {duration:9000, easing:"linear", fill:"forwards"});
        a.onfinish = ()=>{ try{ c.remove(); }catch(_){} dotLive--; };
      }catch(err){ console.error("[wakusei-gyakko] dot", err); }
    }

    /* ---------- state machine (elapsed-wall-time driven) ---------- */
    const planets = PLANETS.map(def=>({def, el:build(def), state:"wait", tNext:Infinity}));
    SKY.gShoot.append(gTrail, ...planets.map(p=>p.el));

    const MARGIN = 70;                                   // off-screen overshoot, px
    function enter(pl, skip){
      try{
        const d = pl.def;
        pl.fromLeft = Math.random() < .5;                // may re-enter from either side
        pl.dur = rand(d.dur[0], d.dur[1]);               // 3–6 min crossing
        pl.yf  = rand(d.band[0], d.band[1]);             // own height band
        pl.amp = rand(12, 26);                           // gentle sine wander
        pl.cyc = rand(1.1, 2.3);
        pl.ph  = rand(0, TAU);
        pl.retro = null;
        if(Math.random() < .30){                         // rolled once at entry
          const w = 7500 / pl.dur;                       // half-window: 15s total
          pl.retro = {c:rand(.42,.58), w, K:(2*w/Math.PI)*1.8, B:rand(8,14),
                      toasted:false, lastDot:0, dotNow:false};
        }
        pl.t0 = performance.now() - (skip || 0)*pl.dur;  // stagger: start partway in
        pl.state = "cross";
        pl.el.style.display = "";
        try{ pl.el.animate([{opacity:0},{opacity:1}], {duration:1400, easing:"ease-out"}); }catch(_){}
      }catch(err){
        console.error("[wakusei-gyakko] enter", err);
        pl.state = "wait"; pl.tNext = performance.now() + 60000;
      }
    }

    function leave(pl){
      pl.el.style.display = "none";
      pl.state = "wait";
      pl.tNext = performance.now() + rand(30000, 90000); // off-screen 30–90s
    }

    function announceRetro(pl){
      try{
        SKY.toast(`⚠ ${pl.def.name}が逆行をはじめました。${pickNR(pl.def.warn)}`);
      }catch(err){ console.error("[wakusei-gyakko] retro toast", err); }
    }

    function frame(){
      try{
        const now = performance.now(), W = SKY.W, H = SKY.H;
        for(const pl of planets){
          if(pl.state === "wait"){
            if(now >= pl.tNext) enter(pl, 0);
            continue;
          }
          const p = (now - pl.t0) / pl.dur;
          if(p >= 1.001){ leave(pl); continue; }
          let pe = p, yEx = 0;
          const R = pl.retro;
          if(R){
            const t = (p - (R.c - R.w)) / (2*R.w);       // 0..1 inside the retro window
            if(t > 0 && t < 1){
              pe  = p - R.K * Math.sin(Math.PI*t)**2;    // decelerate → reverse → resume
              yEx = -R.B * Math.sin(TAU*t);              // slight vertical bulge → loop
              if(!R.toasted){
                R.toasted = true;
                if(t < .5) announceRetro(pl);            // skip stale toast after a bg tab
              }
              if(now - R.lastDot > 140){ R.lastDot = now; R.dotNow = true; }
            }
          }
          // x from CURRENT viewport width, so resizes mid-crossing stay correct
          const span = W + 2*MARGIN;
          const x = pl.fromLeft ? (-MARGIN + span*pe) : (W + MARGIN - span*pe);
          const y = H*pl.yf + pl.amp*Math.sin(pl.ph + pe*pl.cyc*TAU) + yEx;
          pl.el.setAttribute("transform", `translate(${x.toFixed(1)} ${y.toFixed(1)})`);
          if(R && R.dotNow){ R.dotNow = false; dropDot(x, y); }
        }
      }catch(err){ console.error("[wakusei-gyakko] frame", err); }
      requestAnimationFrame(frame);
    }

    /* ---------- stagger: 2 visible early, 1 arrives later ---------- */
    enter(planets[0], rand(.12, .30));                   // 金星 — already partway across
    enter(planets[2], rand(.40, .60));                   // 木星 — mid-sky
    planets[1].tNext = performance.now() + rand(25000, 75000); // 火星 — first entry 25–75s

    requestAnimationFrame(frame);
  }catch(err){
    console.error("[wakusei-gyakko] init", err);
  }
})();
</script>

<script>
// ════ plugin: sharelink ════ Browser-verified against constellation-maker.html (share, restore-on-load, 600ms debounced hash refresh, corrupt-payload ignore all pass). Passes mag as addS
(() => {
  "use strict";
  if (!window.SKY) return;
  const SKY = window.SKY;
  const TAG = "[sharelink]";

  // ==================================================================
  //  夜空の共有リンク — the whole sky fits in a URL
  //  stars -> [round(x/W*1000), round(y/H*1000), round(mag*100)]
  //        -> JSON -> base64 -> location.hash "#s=..."
  // ==================================================================

  // ---- serialization ----------------------------------------------
  function serialize(){
    if (!SKY.stars.length) return null;
    const W = SKY.W || 1, H = SKY.H || 1;
    const triplets = SKY.stars.map(s => [
      Math.round(s.x / W * 1000),
      Math.round(s.y / H * 1000),
      Math.round(s.mag * 100),
    ]);
    return btoa(unescape(encodeURIComponent(JSON.stringify(triplets))));
  }

  function deserialize(b64){
    const data = JSON.parse(decodeURIComponent(escape(atob(b64))));
    if (!Array.isArray(data)) throw new Error("payload is not an array");
    return data;
  }

  // ---- URL hash ----------------------------------------------------
  function readHashPayload(){
    const m = (location.hash || "").match(/[#&]s=([^&]+)/);
    return m ? m[1] : null;
  }

  function writeHash(b64){
    const base = location.href.split("#")[0];
    const next = b64 ? base + "#s=" + b64 : base;
    if (next === location.href) return;
    try {
      history.replaceState(null, "", next);
    } catch (err) {
      // some browsers refuse replaceState on file:// — plain hash assignment still works
      try { location.hash = b64 ? "s=" + b64 : ""; }
      catch (err2) { console.error(TAG, err2); }
    }
  }

  // ---- keep the address bar always-fresh (debounced 600ms) ----------
  let refreshT = null;
  function scheduleRefresh(){
    clearTimeout(refreshT);
    refreshT = setTimeout(() => {
      try { writeHash(serialize()); }   // empty sky -> serialize() === null -> hash stripped
      catch (err) { console.error(TAG, err); }
    }, 600);
  }
  SKY.on("recomputed", scheduleRefresh);
  SKY.on("cleared", scheduleRefresh);   // the clear button skips recompute — catch it too

  // ---- clipboard -----------------------------------------------------
  async function copyText(text){
    if (navigator.clipboard && navigator.clipboard.writeText) {
      try { await navigator.clipboard.writeText(text); return true; }
      catch (err) { /* fall through to the legacy path */ }
    }
    try {
      const ta = document.createElement("textarea");
      ta.value = text;
      ta.setAttribute("readonly", "");
      ta.style.cssText = "position:fixed;left:-9999px;top:0;opacity:0";
      document.body.append(ta);
      ta.select();
      ta.setSelectionRange(0, text.length);
      const ok = document.execCommand("copy");
      ta.remove();
      return ok;
    } catch (err) {
      console.error(TAG, err);
      return false;
    }
  }

  // ---- share button ----------------------------------------------------
  const btn = SKY.addButton("🔗 夜空を共有", async () => {
    try {
      if (!SKY.stars.length) { SKY.toast("まだ何もない夜空です"); return; }
      const b64 = serialize();
      writeHash(b64);
      const url = location.href.split("#")[0] + "#s=" + b64;
      const ok = await copyText(url);
      if (ok) {
        SKY.toast("リンクをコピーしました。この夜空の神話は、開くたびに語り直されます");
        btn.animate(
          [
            { boxShadow: "0 0 0 rgba(255,210,122,0)" },
            { boxShadow: "0 0 18px rgba(255,210,122,.6)" },
            { boxShadow: "0 0 0 rgba(255,210,122,0)" },
          ],
          { duration: 1100, easing: "ease-in-out" }
        );
      } else {
        SKY.toast("コピーできませんでした — アドレスバーのURLをそのままどうぞ");
      }
    } catch (err) {
      console.error(TAG, err);
    }
  });

  // ---- restore a shared sky on load --------------------------------------
  (function restore(){
    const b64 = readHashPayload();
    if (!b64) return;
    try {
      const data = deserialize(b64);
      const W = SKY.W || 1, H = SKY.H || 1;
      let added = 0;
      for (const t of data) {
        if (!Array.isArray(t) || t.length < 2) continue;
        const x = (+t[0]) / 1000 * W;
        const y = (+t[1]) / 1000 * H;
        const mag = Number.isFinite(+t[2]) ? (+t[2]) / 100 : undefined;
        if (!Number.isFinite(x) || !Number.isFinite(y)) continue;
        if (SKY.addStar(x, y, mag)) added++;
      }
      if (added) {
        SKY.recompute();   // one rebuild for the whole restored sky
        SKY.toast("共有された夜空を復元しました　— 神話は新たに紡がれます");
      }
    } catch (err) {
      console.error(TAG, "corrupt share payload — ignoring", err);
    }
  })();
})();

</script>


<script>
// ════ plugin: hoshizora-bgm (bgm) ════ Paste verbatim into its own <script> tag after the core script (anywhere among the plugins). Toykey "hoshizora", localStorage key "hoshizora-bgm" (default "on" 
(()=>{ "use strict";
if(!window.SKY) return;
try{
  const SKY = window.SKY;
  const TAG = "[hoshizora-bgm]";
  const KEY = "hoshizora-bgm";              // localStorage: "on" (default) / "off"

  // ---------- style (subtle glow while the night is humming) ----------
  const style = document.createElement("style");
  style.textContent = `
    .hoshizora-bgm-on{color:var(--accent);border-color:rgba(255,210,122,.5);
      box-shadow:0 0 12px rgba(255,210,122,.14);}
  `;
  document.head.append(style);

  // ---------- musical material ----------
  const fOf = m => 440 * Math.pow(2, (m-69)/12);
  // A major pentatonic across two high octaves — the music-box register (A5..A7)
  const SCALE = [81,83,85,88,90,93,95,97,100,102,105].map(fOf);
  // low harp voicings (octave 2-3), every tone inside A-pentatonic
  const HARPS = [
    [45,52,57],   // A2 E3 A3 — home
    [42,49,54],   // F#2 C#3 F#3 — wistful
    [40,47,52],   // E2 B2 E3 — open fifth dusk
  ].map(ch => ch.map(fOf));
  const DRONE_A1 = fOf(33), DRONE_E2 = fOf(40);

  const BEAT = 60/66;                       // ~66bpm feel
  const BAR  = BEAT*4;                      // ~3.64s
  const LOOKAHEAD = 1.6;                    // background-tab-safe horizon (s)

  // ---------- state ----------
  let ctx = null, graph = null, tickId = null, teardownT = null;
  let running = false, armed = false;
  let queue = [];                           // pending events {t, type, ...} on the AUDIO clock
  let nextBarTime = 0, barCount = 0, busyUntil = 0, nextSparkleAt = 0;
  let lastPhraseKey = "";                   // never the same phrase twice in a row
  let btn = null;
  const LABEL_ON = "\u{1F3B6} BGM";         // 🎶 shown while ON
  const LABEL_OFF = "\u{1F507} BGM";        // 🔇 shown while OFF

  function prefGet(){ try{ return localStorage.getItem(KEY) || "on"; }catch(_){ return "on"; } }
  function prefSet(v){ try{ localStorage.setItem(KEY, v); }catch(_){} }

  function ensureCtx(){
    try{
      if(!ctx){
        const AC = window.AudioContext || window.webkitAudioContext;
        if(!AC) return null;
        ctx = new AC();                     // our OWN context — orgel/夜の音 keep theirs
      }
      if(ctx.state === "suspended") ctx.resume().catch(()=>{});
      return ctx;
    }catch(err){ console.error(TAG, "audio", err); return null; }
  }

  // ---------- graph: fade -> master(.16) -> gentle lowpass(9k) -> out ----------
  function buildGraph(){
    try{
      const c = ctx, nodes = [];
      const keep = n => (nodes.push(n), n);
      const lp = keep(c.createBiquadFilter());
      lp.type = "lowpass"; lp.frequency.value = 9000; lp.Q.value = .5;
      lp.connect(c.destination);
      const master = keep(c.createGain()); master.gain.value = .16;   // companionship, not a concert
      master.connect(lp);
      const fade = keep(c.createGain()); fade.gain.value = .0001;
      fade.connect(master);
      // tine bus through a feedback delay (.42s / fb .32 / wet .25)
      const tineBus = keep(c.createGain()); tineBus.connect(fade);
      const delay = keep(c.createDelay(2)); delay.delayTime.value = .42;
      const fb  = keep(c.createGain()); fb.gain.value = .32;
      const wet = keep(c.createGain()); wet.gain.value = .25;
      tineBus.connect(delay); delay.connect(fb); fb.connect(delay);
      delay.connect(wet); wet.connect(fade);
      // harp bus stays dry — keeps the low register clean
      const harpBus = keep(c.createGain()); harpBus.connect(fade);
      // barely-audible drone, alternating A1/E2 on a 16-bar swell
      const drone = keep(c.createOscillator());
      drone.type = "sine"; drone.frequency.value = DRONE_A1;
      const droneGain = keep(c.createGain()); droneGain.gain.value = .0001;
      drone.connect(droneGain); droneGain.connect(fade);
      drone.start();
      return { nodes, fade, tineBus, harpBus, drone, droneGain };
    }catch(err){ console.error(TAG, "build", err); return null; }
  }

  function teardown(){
    if(!graph) return;
    try{ graph.drone.stop(); }catch(_){}
    for(const n of graph.nodes){ try{ n.disconnect(); }catch(_){} }
    graph = null;
    if(ctx && ctx.state === "running") ctx.suspend().catch(()=>{});
  }

  // ---------- voices (all envelopes exponential — no clicks) ----------
  function tine(t, f, amp){                 // orgel tine: sine + 4x partial (~0.2s)
    const c = ctx;
    const st = Math.max(t, c.currentTime + .02);
    const env = c.createGain();
    env.gain.setValueAtTime(.0001, st);
    env.gain.exponentialRampToValueAtTime(amp, st + .008);
    env.gain.exponentialRampToValueAtTime(.0001, st + 2.2);
    const o = c.createOscillator(); o.type = "sine"; o.frequency.value = f;
    const p = c.createOscillator(); p.type = "sine"; p.frequency.value = f*4;
    const pg = c.createGain();
    pg.gain.setValueAtTime(.3, st);
    pg.gain.exponentialRampToValueAtTime(.0001, st + .2);
    o.connect(env); p.connect(pg); pg.connect(env); env.connect(graph.tineBus);
    o.start(st); p.start(st); o.stop(st + 2.4); p.stop(st + .25);
    o.onended = ()=>{ try{ env.disconnect(); }catch(_){} };
  }

  function harp(t, f){                      // soft low arpeggio voice
    const c = ctx;
    const st = Math.max(t, c.currentTime + .02);
    const env = c.createGain();
    env.gain.setValueAtTime(.0001, st);
    env.gain.exponentialRampToValueAtTime(.045, st + .02);
    env.gain.exponentialRampToValueAtTime(.0001, st + 3);
    const o = c.createOscillator(); o.type = "triangle"; o.frequency.value = f;
    o.connect(env); env.connect(graph.harpBus);
    o.start(st); o.stop(st + 3.2);
    o.onended = ()=>{ try{ env.disconnect(); }catch(_){} };
  }

  function droneCycle(t, phase){            // 16-bar swell, glide A1 <-> E2
    try{
      const st = Math.max(t, ctx.currentTime + .02);
      const cyc = BAR*16;
      const fr = graph.drone.frequency, g = graph.droneGain.gain;
      fr.cancelScheduledValues(st);
      fr.setValueAtTime(Math.max(20, fr.value), st);
      fr.exponentialRampToValueAtTime(phase ? DRONE_E2 : DRONE_A1, st + 10);
      g.cancelScheduledValues(st);
      g.setValueAtTime(Math.max(g.value, .0001), st);
      g.linearRampToValueAtTime(.025, st + cyc*.45);
      g.linearRampToValueAtTime(.006, st + cyc);
    }catch(err){ console.error(TAG, "drone", err); }
  }

  // ---------- generative phrases: 3-6 note arcs, never repeated back-to-back ----------
  function genPhrase(){
    for(let tries = 0; tries < 6; tries++){
      const n = 3 + ((Math.random()*4)|0);
      let ix = 2 + ((Math.random()*6)|0);
      let dir = Math.random() < .5 ? 1 : -1;
      const turn = 1 + ((Math.random()*(n-1))|0);   // one bend makes it an arc
      const idxs = [ix];
      for(let k = 1; k < n; k++){
        if(k === turn) dir = -dir;
        ix += dir * (1 + ((Math.random()*2)|0));
        ix = Math.max(0, Math.min(SCALE.length-1, ix));
        idxs.push(ix);
      }
      const key = idxs.join(",");
      if(key !== lastPhraseKey){ lastPhraseKey = key; return idxs; }
    }
    return null;
  }

  function planBar(t0, bar){
    if(bar % 16 === 0)                      // drone breathes on a 16-bar cycle
      queue.push({ t: t0, type: "drone", phase: ((bar/16)|0) % 2 });
    if(bar % 8 === 4){                      // every 8 bars: a low 3-note harp ripple
      const ch = SKY.pick(HARPS);
      ch.forEach((f, k)=> queue.push({ t: t0 + k*(.38 + Math.random()*.1), type: "harp", f }));
    }
    // melody: rests are a feature — roughly 30-50% of bars stay silent
    if(t0 >= busyUntil && Math.random() < .62){
      const idxs = genPhrase();
      if(idxs){
        let tt = t0 + BEAT * SKY.pick([0, 0, .5, 1]);
        for(const ix of idxs){
          queue.push({ t: tt, type: "tine", f: SCALE[ix], amp: .08 + Math.random()*.07 });
          tt += BEAT * SKY.pick([.5, .75, 1, 1, 1.5]);
        }
        busyUntil = tt + .6;                // a phrase may spill; the next bar then rests
      }
    }
  }

  // ---------- lookahead scheduler (250ms tick, audio-clock horizon) ----------
  function tick(){
    try{
      if(!running || !ctx || !graph) return;
      const now = ctx.currentTime;
      const horizon = now + LOOKAHEAD;
      while(nextBarTime < horizon){ planBar(nextBarTime, barCount); barCount++; nextBarTime += BAR; }
      if(nextSparkleAt < horizon){          // a shooting star in sound, every 90-180s
        let ix = SCALE.length - 1 - ((Math.random()*2)|0);
        const n = 6 + ((Math.random()*4)|0);
        const tt = Math.max(nextSparkleAt, now + .05);
        for(let k = 0; k < n && ix >= 0; k++, ix--)
          queue.push({ t: tt + k*.06, type: "tine", f: SCALE[ix], amp: .04 + Math.random()*.02 });
        nextSparkleAt = now + 90 + Math.random()*90;
      }
      for(let i = queue.length - 1; i >= 0; i--){
        const ev = queue[i];
        if(ev.t < horizon){
          queue.splice(i, 1);
          if(ev.type === "drone") droneCycle(ev.t, ev.phase);
          else if(ev.t > now - .12){        // drop notes that throttling made stale
            if(ev.type === "tine") tine(ev.t, ev.f, ev.amp);
            else if(ev.type === "harp") harp(ev.t, ev.f);
          }
        }
      }
    }catch(err){ console.error(TAG, "tick", err); }
  }

  // ---------- start / stop ----------
  function start(){
    const c = ensureCtx();
    if(!c){ SKY.toast("この夜空では音を鳴らせないようです"); return false; }
    if(teardownT){ clearTimeout(teardownT); teardownT = null; teardown(); }
    if(!graph) graph = buildGraph();
    if(!graph){ SKY.toast("この夜空では音を鳴らせないようです"); return false; }
    removeArm();
    const t = c.currentTime, g = graph.fade.gain;
    g.cancelScheduledValues(t);
    g.setValueAtTime(.0001, t);
    g.linearRampToValueAtTime(1, t + 2.5);  // ~2.5s fade-in
    queue.length = 0;
    barCount = 0; busyUntil = 0; lastPhraseKey = "";
    nextBarTime = t + .2;
    nextSparkleAt = t + 90 + Math.random()*90;
    running = true;
    if(tickId) clearInterval(tickId);
    tickId = setInterval(tick, 250);
    updateBtn();
    return true;
  }

  function stop(){
    running = false;
    if(tickId){ clearInterval(tickId); tickId = null; }
    queue.length = 0;
    if(graph && ctx){
      const t = ctx.currentTime, g = graph.fade.gain;
      g.cancelScheduledValues(t);
      g.setValueAtTime(Math.max(g.value, .0001), t);
      g.linearRampToValueAtTime(.0001, t + 1);          // ~1s fade-out
    }
    if(teardownT) clearTimeout(teardownT);
    teardownT = setTimeout(()=>{                        // then disconnect everything
      teardownT = null;
      try{ teardown(); }catch(err){ console.error(TAG, err); }
    }, 1200);
    updateBtn();
  }

  // ---------- armed autostart (waits for the first real gesture) ----------
  function armHandler(e){
    try{
      if(btn && e && e.target instanceof Node && btn.contains(e.target)) return; // toggle decides itself
      const c = ensureCtx(); if(!c) return;
      const go = ()=>{ try{
        if(armed && !running && ctx && ctx.state === "running") start();
      }catch(err){ console.error(TAG, err); } };
      if(c.state === "running") go();
      else c.resume().then(go).catch(()=>{});           // unlock failed -> stays armed
    }catch(err){ console.error(TAG, "arm", err); }
  }
  function arm(){
    if(armed) return;
    armed = true;
    window.addEventListener("pointerdown", armHandler, { capture: true, passive: true });
    updateBtn();
  }
  function removeArm(){
    window.removeEventListener("pointerdown", armHandler, { capture: true });
    armed = false;
  }

  function updateBtn(){
    if(!btn) return;
    btn.textContent = (running || armed) ? LABEL_ON : LABEL_OFF;
    btn.classList.toggle("hoshizora-bgm-on", running);
  }

  // ---------- dock toggle ----------
  btn = SKY.addButton(prefGet() !== "off" ? LABEL_ON : LABEL_OFF, ()=>{
    try{
      if(running){
        stop(); prefSet("off");
        SKY.toast("BGMをとめました。星はまだ瞬いています");
      }else if(armed){
        removeArm(); prefSet("off"); updateBtn();
        SKY.toast("BGMはお休みです");
      }else{
        prefSet("on");                                  // this click is the unlock gesture
        if(start()) SKY.toast("夜のオルゴールが、そっと流れはじめます");
      }
    }catch(err){ console.error(TAG, "toggle", err); }
  });
  btn.title = "星空BGMのオン・オフ（とても静かなオルゴール）";

  if(prefGet() !== "off") arm();
}catch(err){ console.error("[hoshizora-bgm] init", err); }
})();
</script>

               {opacity:0, transform:"translateY(-18px)"}],
              {duration:380, easing:"ease-in"});

      SKY.on("hoshizora:currency", p => {
        try { if (p && Number(p.total) >= 500) unlock("hoshizora:choja"); } catch (err) { console.error(TAG, err); }
      });
    } catch (err) { console.error(TAG, "events", err); }

    // ---------- トースト観測（出来事はだいたい掲示板に貼り出される） ----------
    function onToast(t) {

      if (t.includes("超新星になりました")) unlock("hoshizora:choshinsei");
      if (t.includes("しらみはじめました")) unlock("hoshizora:asa-yobi");
      if (t.includes("願いは、ひとつの星になりました")) unlock("hoshizora:negaigoto");
      if (t.includes("順に奏でます")) unlock("hoshizora:ensoka");
      if (t.includes("現像しました") && !t.includes("失敗")) unlock("hoshizora:shashinka");
      if (t.includes("証明書を発行しました")) unlock("hoshizora:konin");
      if (t.includes("目を覚ました")) unlock("hoshizora:kemono");
      if (t.includes("海流")) unlock("hoshizora:rinsekai");
      if (t.includes("BGM") || t.includes("オルゴール")) checkShijuso();
    }
    try {
      const toastEl = document.getElementById("toast");
      if (toastEl) {
        let lastTxt = "", lastAt = 0;
        new MutationObserver(() => {

            const now = Date.now();
            if (t === lastTxt && now - lastAt < 150) return;

        }).observe(toastEl, {childList:true, characterData:true, subtree:true});
      }
    } catch (err) { console.error(TAG, "observe", err); }

    // ---------- 黙って起こる出来事は DOM で見張る（上映会・月の俳句） ----------
    try {
      new MutationObserver(recs => {
        try {
          for (const r of recs) for (const n of r.addedNodes) {
            if (!n || n.nodeType !== 1 || !n.classList) continue;
            if (n.classList.contains("pshow-root")) {
              if (bump("hoshizora-pshow") >= 3) unlock("hoshizora:joei-jouren");
            } else if (n.classList.contains("tsuki-card")) {
              if (bump("hoshizora-haiku") >= 3) unlock("hoshizora:haijin");
            }
          }
        } catch (err) { console.error(TAG, "body-mo", err); }
      }).observe(document.body, {childList:true});
    } catch (err) { console.error(TAG, err); }

    // ---------- 手帳（四つの世界ぶん） ----------
    let nb = null;
    function onKey(e) {
      if (e.key === "Escape" && nb) { e.preventDefault(); closeNB(); }
    }
    function closeNB() {
      if (!nb) return;
      try { nb.remove(); } catch (_) {}
      nb = null;
      document.removeEventListener("keydown", onKey, true);
    }
    function row(def, st) {
      if (!def || !def.id) return "";
      const un = st[def.id];
      const hidden = def.secret && !un;
      const icon = hidden ? "？" : (def.icon || "🏆");
      const title = hidden ? "？？？" : (def.title || def.id);
      const desc = hidden ? "？？？" : (def.desc || "");
      return `<div class="${P}-row${un ? ` ${P}-un` : ""}">` +
        `<div class="${P}-ic">${esc(icon)}</div>` +
        `<div class="${P}-tx"><div class="${P}-t">${esc(title)}</div>` +
        `<div class="${P}-d">${esc(desc)}</div></div>` +
        (un ? `<div class="${P}-date">${esc(fmtDate(un.at))}</div>` : "") +
        `</div>`;
    }
    function openNB() {
      try {
        closeNB();
        const defs = lsGet(K_DEFS, {});
        const st = lsGet(K_STATE, {});
        let total = 0, got = 0;
        const secs = [];
        for (const [key, label] of SECTIONS) {
          const arr = Array.isArray(defs[key]) ? defs[key].filter(d => d && d.id) : null;
          if (!arr || !arr.length) {
            secs.push(`<div class="${P}-sec"><div class="${P}-sech">` +
              `<span>${esc(label)}</span><span>（未踏の世界）</span></div></div>`);
            continue;
          }
          const g = arr.filter(d => st[d.id]).length;
          total += arr.length; got += g;
          secs.push(`<div class="${P}-sec"><div class="${P}-sech">` +
            `<span>${esc(label)}</span><span>${g}/${arr.length}</span></div>` +
            arr.map(d => row(d, st)).join("") + `</div>`);
        }
        nb = document.createElement("div");
        nb.className = `${P}-ov`;
        nb.innerHTML = `<div class="${P}-modal">` +
          `<div class="${P}-head"><div class="${P}-h1">🏆 実績手帳</div>` +
          `<div class="${P}-count">${got}/${total}</div>` +
          `<button class="${P}-x" title="とじる">✕</button></div>` +
          secs.join("") +
          `<div class="${P}-foot">となりの世界の手帳とも、つながっています</div></div>`;
        nb.addEventListener("pointerdown", e => { if (e.target === nb) closeNB(); });
        const x = nb.querySelector(`.${P}-x`);
        if (x) x.addEventListener("click", e => { e.stopPropagation(); closeNB(); });
        document.addEventListener("keydown", onKey, true);
        document.body.append(nb);
        checkShijuso();   // 手帳を開くのは確認の好機
      } catch (err) { console.error(TAG, "notebook", err); }
    }
    try {
      SKY.addButton("🏆 実績", () => {
        try { nb ? closeNB() : openNB(); } catch (err) { console.error(TAG, err); }
      });
    } catch (err) { console.error(TAG, "button", err); }

    // ---------- 起動時のひと仕事 ----------
    bump("visited-" + TOY);   // 来訪の判をひとつ（checkCross も走る）
    checkShijuso();
    try {
      const st = lsGet(K_STATE, {});
      if (Object.keys(st).length >= 30) unlock("cross:kiroku-ma");
    } catch (err) { console.error(TAG, err); }
    // 共有リンク復元などで UR がすでに空にいる場合の遅延チェック
    setTimeout(() => {
      try {
        if (SKY.constellations.some(x => x && x.rarity === "UR")) unlock("hoshizora:kanteigan");
      } catch (err) { console.error(TAG, err); }
    }, 1500);

  } catch (err) { console.error(TAG, "init", err); }
})();
</script>

  document.head.append(css);

  const esc = s => String(s).replace(/[&<>"]/g,

  function bcast(name, detail){

  }

    for(let i=0;i<str.length;i++){ h = Math.imul(h ^ str.charCodeAt(i), 3432918353); h = h<<13 | h>>>19; }

  /* ================= 幾何（最小二乗の主軸フィット） ================= */
  function ptsOf(c){
    try{ return (c.indices || []).map(i=>SKY.stars[i]).filter(Boolean); }catch(_){ return []; }
  }
  function geometry(pts){
    const n = pts.length;
    if(n < 3) return null;
    let mx=0, my=0;
    for(const p of pts){ mx+=p.x; my+=p.y; }
    mx/=n; my/=n;
    let sxx=0, syy=0, sxy=0;
    for(const p of pts){ const dx=p.x-mx, dy=p.y-my; sxx+=dx*dx; syy+=dy*dy; sxy+=dx*dy; }
    const th = 0.5*Math.atan2(2*sxy, sxx-syy);
    const ux = Math.cos(th), uy = Math.sin(th);
    const proj = pts.map(p=>({ t:(p.x-mx)*ux+(p.y-my)*uy, d:(p.y-my)*ux-(p.x-mx)*uy }));
    proj.sort((a,b)=>a.t-b.t);
    const span = proj[n-1].t - proj[0].t;
    if(span < 1) return null;
    let maxD = 0, minGap = Infinity;
    for(const q of proj) maxD = Math.max(maxD, Math.abs(q.d));
    for(let i=1;i<n;i++) minGap = Math.min(minGap, proj[i].t - proj[i-1].t);
    let flips = 0, prev = 0;
    const eps = Math.max(4, span*0.03);
    for(const q of proj){
      const s = q.d > eps ? 1 : q.d < -eps ? -1 : 0;
      if(s !== 0){ if(prev !== 0 && s !== prev) flips++; prev = s; }
    }
    return { straightness: maxD/span, flips, gapRatio: minGap/span };
  }
  function ringStats(pts){
    const n = pts.length;
    let mx=0, my=0;
    for(const p of pts){ mx+=p.x; my+=p.y; }
    mx/=n; my/=n;
    const rad = pts.map(p=>Math.hypot(p.x-mx, p.y-my));

    if(mean < 24) return null;                               // 退化した「環」は対象外
    let v=0; for(const r of rad) v += (r-mean)*(r-mean);

    const ang = pts.map(p=>Math.atan2(p.y-my, p.x-mx)).sort((a,b)=>a-b);
    let maxGap = ang[0] + Math.PI*2 - ang[n-1];

    for(const c of SKY.constellations){ const n = ptsOf(c).length; if(n >= 2 && (!b || n > b.n)) b = {c, n}; }

    g1:["合格です。拍手は心の中で","規定はクリア。情熱は次回に期待します","審査員の眉が、1ミリ動きました","及第点です。お茶が出ます"],
    g2:["なかなかの腕前。メモが2行になりました","審査員一同、思わず身を乗り出しました","夜空の職人と呼ばせていただきます","採点表に、小さな花丸が付きました"],
    g3:["定規を疑うレベルです","審査員一同、沈黙ののち拍手","審査基準の見直しを検討します。上限の方向に",
        "完璧です。本日の審査はこれにて閉廷","この星座、天文台に通報します（賞賛の意です）"],
  };

  /* ================= お題テーブル ================= */
  const TYPES = {
    line: { icon:"📏", name:"一直線",
      desc:"5つ以上の星をひとつの星座にして、限りなくまっすぐ並べてください。",
      prog(){ const b=bestLine(); return b ? `いまの最有力「${nm(b.c)}」: 残差比 ${pct(b.g.straightness)}` : "5星以上の星座が、まだ見当たりません"; },
      judge(){
        const b = bestLine();
        if(!b) return {ok:false, nums:"対象なし（5星以上の星座が必要です）"};
        const s = b.g.straightness;
        const nums = `「${nm(b.c)}」残差比 ${pct(s)}（合格ライン 10.0%未満）`;
        if(s >= 0.10) return {ok:false, nums};
        return {ok:true, grade: s < 0.03 ? 3 : s < 0.06 ? 2 : 1, nums};
      }},
    zigzag: { icon:"⚡", name:"W字",
      desc:"5つ以上の星で、4回以上折り返す稲妻のジグザグを描いてください。",
      prog(){ const b=bestZig(); return b ? `いまの最有力「${nm(b.c)}」: 折り返し ${b.g.flips}回` : "5星以上の星座が、まだ見当たりません"; },
      judge(){
        const b = bestZig();
        if(!b) return {ok:false, nums:"対象なし（5星以上の星座が必要です）"};
        const nums = `「${nm(b.c)}」折り返し ${b.g.flips}回 / 残差比 ${pct(b.g.straightness)}（基準 4回以上）`;
        if(b.g.flips < 4 || b.g.straightness > 0.45) return {ok:false, nums};
        return {ok:true, grade: b.g.flips >= 6 ? 3 : b.g.flips === 5 ? 2 : 1, nums};
      }},
    ring: { icon:"⭕", name:"環",
      desc:"6つ以上の星で、中心からの距離をそろえた閉じた環を描いてください。",
      prog(){ const b=bestRing(); return b ? `いまの最有力「${nm(b.c)}」: ぶれ ${pct(b.r.cv)} / すき間 ${Math.round(b.r.maxGapDeg)}°` : "6星以上の星座が、まだ見当たりません"; },
      judge(){
        const b = bestRing();
        if(!b) return {ok:false, nums:"対象なし（6星以上の星座が必要です）"};
        const nums = `「${nm(b.c)}」半径のぶれ ${pct(b.r.cv)} / 最大のすき間 ${Math.round(b.r.maxGapDeg)}°（基準 25%・120°以内）`;
        if(b.r.cv > 0.25 || b.r.maxGapDeg > 120) return {ok:false, nums};
        const g = (b.r.cv <= 0.08 && b.r.maxGapDeg <= 80) ? 3 : (b.r.cv <= 0.16 && b.r.maxGapDeg <= 100) ? 2 : 1;
        return {ok:true, grade:g, nums};
      }},
    big: { icon:"🐋", name:"大物",
      desc:"ひとつの星座に、12個以上の星をつなげてください。",
      prog(){ const b=biggest(); return b ? `最大の星座「${nm(b.c)}」: ${b.n}星（目標 12星）` : "星座が、まだありません"; },
      judge(){
        const b = biggest();
        if(!b) return {ok:false, nums:"対象なし（星座がまだありません）"};
        const nums = `「${nm(b.c)}」${b.n}星（基準 12星以上）`;
        if(b.n < 12) return {ok:false, nums};
        return {ok:true, grade: b.n >= 20 ? 3 : b.n >= 15 ? 2 : 1, nums};
      }},
    mini: { icon:"🍃", name:"ミニマリスト",
      desc:"夜空に星をちょうど2つだけ。300px以上はなして置いてください。",
      prog(){ const m=miniStat(); return m.n === 2 ? `いまの夜空: 2星 / 距離 ${Math.round(m.d)}px` : `いまの夜空: ${m.n}星（2星ちょうどに）`; },
      judge(){
        const m = miniStat();
        if(m.n !== 2) return {ok:false, nums:`いまの夜空: ${m.n}星（ちょうど2星が必要です）`};
        const nums = `星 2個 / 距離 ${Math.round(m.d)}px（合格ライン 300px以上）`;
        if(m.d < 300) return {ok:false, nums};
        return {ok:true, grade: m.d >= 800 ? 3 : m.d >= 500 ? 2 : 1, nums};
      }},
  };

  function planFor(date){
    const rng = mulberry32(xmur3(date)());
    const keys = Object.keys(TYPES);
    const daily = keys.splice(rng()*keys.length|0, 1)[0];
    for(let i=keys.length-1;i>0;i--){ const j = rng()*(i+1)|0; [keys[i],keys[j]] = [keys[j],keys[i]]; }
    return {daily, free: keys.slice(0,3)};
  }
  function dailyGrade(date){
    try{ const v = localStorage.getItem(DK + date); return v ? (parseInt(v,10) || 1) : 0; }catch(_){ return 0; }
  }
  function markDaily(date, grade){ try{ localStorage.setItem(DK + date, String(grade)); }catch(err){ console.error(TAG, err); } }
  function fpClears(date){
    try{ const o = JSON.parse(localStorage.getItem(FPK + date) || "{}"); return o && typeof o === "object" ? o : {}; }
    catch(_){ return {}; }
  }
  function markFp(date, type, grade){
    try{ const o = fpClears(date); o[type] = grade; localStorage.setItem(FPK + date, JSON.stringify(o)); }
    catch(err){ console.error(TAG, err); }
  }
  // 昨日以前の自由お題記録は掃除しておく
  try{
    const t = FPK + todayStr();
    for(let i=localStorage.length-1;i>=0;i--){
      const k = localStorage.key(i);
      if(k && k.startsWith(FPK) && k !== t) localStorage.removeItem(k);
    }
  }catch(_){}

  /* ================= チャレンジボード ================= */
  let overlay = null;
  const SHOP = [
    {key:"shower",  icon:"☄️", label:"流星群を呼ぶ", cost:30,  note:"星屑が、ひととき雨になります"},
    {key:"rainbow", icon:"🌈", label:"七色の星",     cost:50,  note:"つぎに置く5つの星に、虹の暈がかかります"},
    {key:"seed",    icon:"🌀", label:"大いなる種",   cost:100, note:"12の星が、渦を巻いていちどに芽吹きます"},
  ];

  function onKey(e){ if(e.key === "Escape") closeBoard(); }
  function closeBoard(){
    try{
      if(!overlay) return;
      const o = overlay; overlay = null;
      document.removeEventListener("keydown", onKey);
      o.animate([{opacity:1},{opacity:0}], {duration:180, easing:"ease-out", fill:"forwards"});
      setTimeout(()=>o.remove(), 420);
    }catch(err){ console.error(TAG, err); }
  }
  function openBoard(){
    try{
      closeBoard();
      const o = document.createElement("div");
      o.className = `${P}-overlay`;
      const m = document.createElement("div");
      m.className = `${P}-modal`;
      const x = document.createElement("button");
      x.className = `${P}-close`;
      x.setAttribute("aria-label","閉じる");
      x.textContent = "✕";
      x.addEventListener("click", e=>{ e.stopPropagation(); closeBoard(); });
      const body = document.createElement("div");
      m.append(x, body);
      o.append(m);
      document.body.append(o);
      overlay = o;
      o.addEventListener("click", e=>{ if(e.target === o) closeBoard(); });
      document.addEventListener("keydown", onKey);
      renderBoard(body);
      o.animate([{opacity:0},{opacity:1}], {duration:220, easing:"ease-out"});
      m.animate([{transform:"translateY(14px) scale(.95)",opacity:0},{transform:"translateY(0) scale(1)",opacity:1}],
        {duration:360, easing:"cubic-bezier(.2,1.25,.35,1)"});
    }catch(err){ console.error(TAG, err); }
  }

  function cardHTML(key, daily, date){
    const t = TYPES[key];
    const cleared = daily ? dailyGrade(date) : (fpClears(date)[key] || 0);
    const rw = daily ? "60〜80" : "10／25／50";
    return `<div class="${P}-card" data-type="${esc(key)}" data-daily="${daily?1:0}">
      <div class="${P}-ct">${t.icon} ${esc(t.name)}<span class="${P}-rw">報酬 ✨${rw}</span></div>
      <div class="${P}-cd">${esc(t.desc)}</div>
      <div class="${P}-prog" data-type="${esc(key)}"></div>
      <div class="${P}-verdict"></div>
      ${cleared ? `<span class="${P}-done">達成 ${starsOf(cleared)}</span>` : `<button class="${P}-judge">審査する</button>`}
    </div>`;
  }
  function renderBoard(body){
    const date = todayStr();
    const plan = planFor(date);
    body.innerHTML =
      `<div class="${P}-head">🎯 星座のお題チャレンジ</div>` +
      `<div class="${P}-bal">手持ちの星屑　✨ <b class="${P}-baln">${getBal()}</b></div>` +
      `<div class="${P}-sec">📅 今日の依頼</div>` + cardHTML(plan.daily, true, date) +
      `<div class="${P}-sec">🎯 自由のお題</div>` + plan.free.map(k=>cardHTML(k, false, date)).join("") +
      `<div class="${P}-sec">✨ 星屑のつかいみち</div>` +
      `<div class="${P}-shop">` + SHOP.map(s=>
        `<button class="${P}-sbtn" data-key="${esc(s.key)}" data-cost="${s.cost}">
          <span class="${P}-sl">${s.icon} ${esc(s.label)}</span>
          <span class="${P}-sprice">${s.cost}✨</span>
          <span class="${P}-snote">${esc(s.note)}</span></button>`).join("") + `</div>` +
      `<div class="${P}-foot">お題は毎日0時に入れ替わります</div>`;
    for(const card of body.querySelectorAll(`.${P}-card`)){
      const btn = card.querySelector(`.${P}-judge`);
      if(btn) btn.addEventListener("click", e=>{
        e.stopPropagation();
        try{ onJudge(card, card.dataset.type, card.dataset.daily === "1", btn); }
        catch(err){ console.error(TAG, err); }
      });
    }
    for(const sb of body.querySelectorAll(`.${P}-sbtn`)){
      sb.addEventListener("click", e=>{
        e.stopPropagation();
        try{ buy(sb.dataset.key, sb); }catch(err){ console.error(TAG, err); }
      });
    }
    refreshProgress();
    updateSpendUI();
  }

  function showVerdict(card, v, comment, awardText){
    try{
      const box = card.querySelector(`.${P}-verdict`);
      if(!box) return;
      box.innerHTML =
        `<div class="${P}-vg ${v.ok ? "" : P+"-vfail"}">${v.ok ? starsOf(v.grade) : "審査結果：不合格"}</div>` +
        `<div class="${P}-vn">${esc(v.nums)}</div>` +
        `<div class="${P}-vc">「${esc(comment)}」</div>` +
        (awardText ? `<div class="${P}-va">${esc(awardText)}</div>` : "");
      box.animate([{opacity:0, transform:"translateY(6px)"},{opacity:1, transform:"translateY(0)"}],
        {duration:320, easing:"ease-out"});
    }catch(err){ console.error(TAG, err); }
  }
  function onJudge(card, typeKey, isDaily, btn){
    const t = TYPES[typeKey];
    if(!t) return;
    const date = todayStr();
    const v = t.judge();
    if(!v.ok){ showVerdict(card, v, pickFrom(CM.fail), null); return; }
    const already = isDaily ? dailyGrade(date) > 0 : !!fpClears(date)[typeKey];
    const reward = isDaily ? [0,60,70,80][v.grade] : [0,10,25,50][v.grade];
    showVerdict(card, v, pickFrom(v.grade >= 3 ? CM.g3 : v.grade === 2 ? CM.g2 : CM.g1),
      already ? null : `+${reward} 星屑`);
    if(already){ SKY.toast("本日はもう審査済みです（記録のみ）"); return; }
    if(isDaily) markDaily(date, v.grade); else markFp(date, typeKey, v.grade);
    award(reward, isDaily ? "daily-quest" : "challenge", btn);
    bcast("challenge:clear", {grade: v.grade, type: typeKey, daily: isDaily});
    if(isDaily){ bcast("quest:daily-clear", {date, grade: v.grade}); dailyBanner(); }
    const done = document.createElement("span");
    done.className = `${P}-done`;
    done.textContent = `達成 ${starsOf(v.grade)}`;
    btn.replaceWith(done);
    updateSpendUI();
  }
  function dailyBanner(){
    try{
      const b = document.createElement("div");
      b.className = `${P}-banner`;
      b.textContent = "本日の依頼、達成！";
      document.body.append(b);
      b.animate([{transform:"translateX(-50%) scale(.7)",opacity:0},
                 {transform:"translateX(-50%) scale(1.04)",opacity:1,offset:.18},
                 {transform:"translateX(-50%) scale(1)",opacity:1,offset:.3},
                 {transform:"translateX(-50%) scale(1)",opacity:1,offset:.84},
                 {transform:"translateX(-50%) scale(.96)",opacity:0}],
        {duration:2600, easing:"ease-out", fill:"forwards"});
      setTimeout(()=>b.remove(), 2700);
      SKY.toast("本日の依頼、達成！");
    }catch(err){ console.error(TAG, err); }
  }

  /* ---- 進捗のライブ更新 ---- */
  let progPend = false;
  function refreshSoon(){
    if(progPend) return;
    progPend = true;
    requestAnimationFrame(()=>{
      progPend = false;
      try{ refreshProgress(); }catch(err){ console.error(TAG, err); }
    });
  }
  function refreshProgress(){
    if(!overlay) return;
    for(const el of overlay.querySelectorAll(`.${P}-prog`)){
      const t = TYPES[el.dataset.type];
      try{ el.textContent = t ? t.prog() : ""; }catch(err){ console.error(TAG, err); }
    }
  }
  function updateSpendUI(){
    try{
      if(!overlay) return;
      const bal = getBal();
      const bn = overlay.querySelector(`.${P}-baln`);
      if(bn) bn.textContent = String(bal);
      for(const sb of overlay.querySelectorAll(`.${P}-sbtn`)){
        sb.classList.toggle(`${P}-poor`, bal < parseInt(sb.dataset.cost, 10));
        if(sb.dataset.key === "rainbow"){
          const note = sb.querySelector(`.${P}-snote`);
          if(note) note.textContent = rainbowLeft > 0
            ? `あと ${rainbowLeft} 星に虹がやどります（重ね買いで延長）`
            : "つぎに置く5つの星に、虹の暈がかかります";
        }
      }
    }catch(err){ console.error(TAG, err); }
  }

  /* ================= つかいみち ================= */
  let rainbowLeft = 0, rainbowSeq = 0;
  const gradIds = new Map();   // starId -> gradient要素

  function buy(key, btnEl){
    const item = SHOP.find(s=>s.key === key);
    if(!item) return;
    if(!spend(item.cost)) return;
    if(key === "shower"){
      closeBoard();
      miniShower();
      SKY.toast("星屑が、流星に変わりました");
    }else if(key === "rainbow"){
      rainbowLeft += 5;
      updateSpendUI();
      SKY.toast("つぎの5星に、虹がやどります");
    }else if(key === "seed"){
      closeBoard();
      grandSeed();
    }
  }

  function miniShower(){
    try{
      const W = SKY.W, H = SKY.H;
      const left = Math.random() < .5;
      const rx = left ? W*(0.04 + Math.random()*0.10) : W*(0.86 + Math.random()*0.10);
      const ry = H*(0.03 + Math.random()*0.10);
      const n = 12 + (Math.random()*4|0);
      for(let i=0;i<n;i++){
        const theta = 0.5 + (Math.random()-0.5)*0.6;
        const dx = Math.cos(theta)*(left?1:-1), dy = Math.sin(theta);
        const off = 12 + Math.random()*120, pj = (Math.random()-0.5)*70;
        const sx = rx + dx*off - dy*pj, sy = ry + dy*off + dx*pj;
        const len = 38 + Math.random()*60;
        const dist = Math.max(W,H)*(0.32 + Math.random()*0.4);
        const l = SKY.mk("line", {x1:sx, y1:sy, x2:sx-dx*len, y2:sy-dy*len,
          stroke:"#ffeec9", "stroke-width":(0.9+Math.random()).toFixed(2),
          "stroke-linecap":"round", filter:"url(#line-glow)", opacity:0});
        SKY.gShoot.append(l);
        const peak = .45 + Math.random()*.45;
        l.animate([
          {transform:"translate(0,0)", opacity:0, offset:0},
          {opacity:peak, offset:.15},
          {opacity:peak, offset:.7},
          {transform:`translate(${dx*dist}px,${dy*dist}px)`, opacity:0, offset:1},
        ], {duration:750+Math.random()*900, delay:Math.random()*2200, easing:"ease-in", fill:"backwards"})
          .onfinish = ()=>l.remove();
      }
    }catch(err){ console.error(TAG, err); }
  }

  function grandSeed(){
    try{
      const W = SKY.W, H = SKY.H;
      const cx = W*(0.30 + Math.random()*0.40), cy = H*(0.32 + Math.random()*0.36);
      const a0 = Math.random()*Math.PI*2, dir = Math.random() < .5 ? 1 : -1;
      const N = 12, STEP = 85;
      for(let i=0;i<N;i++){
        const ang = a0 + dir*i*0.66;
        const r = 16 + i*13;
        const x = Math.min(W-20, Math.max(20, cx + Math.cos(ang)*r));
        const y = Math.min(H-24, Math.max(24, cy + Math.sin(ang)*r));
        setTimeout(()=>{ try{ SKY.addStar(x, y); }catch(err){ console.error(TAG, err); } }, i*STEP);
      }
      setTimeout(()=>{
        try{ SKY.recompute(); SKY.toast("大いなる種は、渦を巻いて芽吹きました"); }
        catch(err){ console.error(TAG, err); }
      }, N*STEP + 80);
    }catch(err){ console.error(TAG, err); }
  }

  /* ---- 七色の星：halo に星ごとの虹グラデーション ---- */
  SKY.on("star-added", star=>{
    try{
      refreshSoon();
      if(rainbowLeft <= 0 || !star || !star.halo) return;
      rainbowLeft--;
      const hue = (rainbowSeq++ * 67) % 360;
      const id = `${P}-rg-${star.id}`;
      const grad = SKY.mk("radialGradient", {id});
      const s0 = SKY.mk("stop", {offset:"0%",  "stop-color":"#fff", "stop-opacity":"1"});
      const s1 = SKY.mk("stop", {offset:"38%", "stop-color":`hsl(${hue}, 95%, 78%)`, "stop-opacity":".85"});
      const s2 = SKY.mk("stop", {offset:"100%","stop-color":`hsl(${(hue+45)%360}, 95%, 65%)`, "stop-opacity":"0"});
      grad.append(s0, s1, s2);
      SKY.defs.append(grad);
      star.halo.setAttribute("fill", `url(#${id})`);
      star.halo.setAttribute("r", String((star.mag || 2) * 4.6));
      gradIds.set(star.id, grad);
      if(rainbowLeft === 0) SKY.toast("虹の星は、ここまで。良い夜を");
      updateSpendUI();
    }catch(err){ console.error(TAG, err); }
  });
  SKY.on("star-removed", s=>{
    try{
      refreshSoon();
      const g = s && gradIds.get(s.id);
      if(g){ g.remove(); gradIds.delete(s.id); }
    }catch(err){ console.error(TAG, err); }
  });
  SKY.on("cleared", ()=>{
    try{
      for(const g of gradIds.values()) g.remove();
      gradIds.clear();
      refreshSoon();
    }catch(err){ console.error(TAG, err); }
  });
  SKY.on("recomputed", refreshSoon);

  /* ================= ドックボタン ================= */
  SKY.addButton("🎯 お題", ()=>{
    try{ openBoard(); }catch(err){ console.error(TAG, err); }
  });
})();
</script>

</body>
