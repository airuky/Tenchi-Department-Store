  style.textContent = `
    .${PFX}-on{
      border-color: rgba(255,178,110,.9) !important;
      background: rgba(58,34,14,.78) !important;
      animation: ${PFX}-tick 2.4s ease-in-out infinite;
    }
    @keyframes ${PFX}-tick{
      0%,100%{ box-shadow: 0 0 8px rgba(255,160,90,.30); }
      50%    { box-shadow: 0 0 18px rgba(255,160,90,.70); }
    }`;
  document.head.append(style);
}catch(err){ console.error(TAG, err); }

// ---------- gradients (nova shockwave + remnant nebula) ----------
try{
  const nova = SKY.mk("linearGradient",{id:`${PFX}-nova`, x1:"0%",y1:"0%",x2:"100%",y2:"100%"});
  nova.append(
    SKY.mk("stop",{offset:"0%",  "stop-color":"#8ec5ff"}),
    SKY.mk("stop",{offset:"50%", "stop-color":"#ff8ad0"}),
    SKY.mk("stop",{offset:"100%","stop-color":"#ffd27a"})
  );
  const rem = SKY.mk("radialGradient",{id:`${PFX}-remnant`});
  rem.append(
    SKY.mk("stop",{offset:"0%",  "stop-color":"#ffb78a", "stop-opacity":".55"}),
    SKY.mk("stop",{offset:"45%", "stop-color":"#b86a9e", "stop-opacity":".30"}),
    SKY.mk("stop",{offset:"100%","stop-color":"#7a4ad0", "stop-opacity":"0"})
  );
  SKY.defs.append(nova, rem);
}catch(err){ console.error(TAG, err); }

// ---------- stellar colour ramp: white -> pale yellow -> amber -> deep orange -> red ----------
const STOPS = [
  [0.00, [255,246,224]],   // #fff6e0 (host --star)
  [0.30, [255,233,170]],
  [0.58, [255,196,106]],
  [0.82, [255,138, 74]],
  [1.00, [255, 90, 60]],   // #ff5a3c
];
function ageColor(t){
  if(t<=0) return "rgb(255,246,224)";
  if(t>=1) return "rgb(255,90,60)";
  for(let i=1;i<STOPS.length;i++){
    if(t <= STOPS[i][0]){
      const [t0,a] = STOPS[i-1], [t1,b] = STOPS[i];
      const k = (t - t0)/(t1 - t0);
      return `rgb(${Math.round(a[0]+(b[0]-a[0])*k)},${Math.round(a[1]+(b[1]-a[1])*k)},${Math.round(a[2]+(b[2]-a[2])*k)})`;
    }
  }
  return "rgb(255,90,60)";
}

// ---------- state ----------
let running  = false;
let rafId    = null;
let lastTs   = 0;
let lastNova = -Infinity;
const queue    = [];          // overdue star ids, FIFO
const queued   = new Set();   // dedupe guard for queue
const remnants = new Set();   // live remnant blobs (wiped on "cleared")

SKY.on("star-removed", (s)=>{
  try{
    if(queued.has(s.id)){
      queued.delete(s.id);
      const i = queue.indexOf(s.id);
      if(i >= 0) queue.splice(i,1);
    }
  }catch(err){ console.error(TAG, err); }
});

SKY.on("cleared", ()=>{
  try{
    queue.length = 0; queued.clear();
    lastNova = -Infinity;
    for(const b of remnants){ try{ b.remove(); }catch(_){} }
    remnants.clear();
  }catch(err){ console.error(TAG, err); }
});

// ---------- dock toggle ----------
const BTN_ON  = "⏳ 星に時を流す";
const BTN_OFF = "⏳ 時を止める";
const btn = SKY.addButton(BTN_ON, ()=>{
  try{
    running = !running;
    btn.textContent = running ? BTN_OFF : BTN_ON;
    btn.classList.toggle(`${PFX}-on`, running);
    if(running){
      lastTs = performance.now();
      if(rafId == null) rafId = requestAnimationFrame(loop);
      SKY.toast("星々が、年老いはじめました");
    }else{
      SKY.toast("時は止まりました");
    }
  }catch(err){ console.error(TAG, err); }
});

// ---------- the river of time ----------
function loop(now){
  if(!running){ rafId = null; return; }
  try{
    const dt = Math.min(0.1, Math.max(0, (now - lastTs)/1000));
    lastTs = now;
    for(const s of SKY.stars){
      if(s._agingAge === undefined){      // first seen -> born young, randomized lifespan
        s._agingAge  = 0;
        s._agingLife = LIFE_MIN + Math.random()*LIFE_VAR;
        s._agingMag0 = s.mag;
        s._agingQ    = -1;
      }
      if(s._agingDead) continue;          // mid-supernova
      s._agingAge += dt;
      const t = Math.min(1, s._agingAge / s._agingLife);
      const q = (t*140)|0;                // quantize to skip redundant DOM writes
      if(q !== s._agingQ){
        s._agingQ = q;
        s.core.setAttribute("fill", ageColor(t));
        s.mag = s._agingMag0 * (1 - MAG_SHRINK*t);   // twinkle loop reads mag each frame
      }
      if(s._agingAge >= s._agingLife && !queued.has(s.id)){
        queued.add(s.id); queue.push(s.id);
      }
    }
    // pace limiter: at most one supernova per NOVA_GAP; overdue stars wait their turn
    if(queue.length && now - lastNova >= NOVA_GAP){
      while(queue.length){
        const id = queue.shift(); queued.delete(id);
        const s = SKY.stars.find(x => x.id === id);
        if(s && !s._agingDead && s.el.isConnected){   // black hole / UFO may have eaten it
          lastNova = now;
          supernova(s);
          break;
        }
      }
    }
  }catch(err){ console.error(TAG, err); }
  rafId = requestAnimationFrame(loop);
}

// ---------- supernova ----------
function supernova(s){
  try{
    const id = s.id, x = s.x, y = s.y;
    s._agingDead = true;
    const host = SKY.constellations.find(c => c.name && c.starIds.has(id));
    const name = host ? host.name : null;

    spawnNova(x, y);
    shake();

    // remove the star once the flash has swallowed it, maybe seed newborns
    setTimeout(()=>{ try{
      const removed = SKY.removeStar(id, {recompute:false});
      if(!removed) return;                       // someone else got there first
      if(Math.random() < RECYCLE_P){
        const n = 2 + ((Math.random() < .5) ? 0 : 1);   // 2-3 newborns
        for(let i=0;i<n;i++){
          const a = Math.random()*Math.PI*2, d = 60 + Math.random()*80;
          const nx = Math.min(SKY.W-12, Math.max(12, x + Math.cos(a)*d));
          const ny = Math.min(SKY.H-12, Math.max(12, y + Math.sin(a)*d));
          SKY.addStar(nx, ny);
        }
      }
      SKY.recompute();
      SKY.toast(name ? `${name}の星が、超新星になりました`
                     : "ひとつの星が、最期にいちばん輝きました");
    }catch(err){ console.error(TAG, err); } }, 260);

    // remnant nebula drifts in as the shockwave fades
    setTimeout(()=>{ try{ spawnRemnant(x, y); }catch(err){ console.error(TAG, err); } }, 700);
  }catch(err){ console.error(TAG, err); }
}

// white core flash + double shockwave ring, ~900ms, in world coords
function spawnNova(x, y){
  const mk = SKY.mk;
  const g = mk("g");
  const ring2 = mk("circle",{cx:x, cy:y, r:2, fill:"none", stroke:`url(#${PFX}-nova)`, "stroke-width":6.5, filter:"url(#line-glow)"});
  const ring1 = mk("circle",{cx:x, cy:y, r:3, fill:"none", stroke:"#fff", "stroke-width":4.5, filter:"url(#line-glow)"});
  const flash = mk("circle",{cx:x, cy:y, r:3, fill:"#fff", filter:"url(#soft)"});
  g.append(ring2, ring1, flash);
  SKY.gWorld.append(g);
  const T0 = performance.now(), DUR = 900;
  function step(now){
    try{
      const t = Math.min(1, (now - T0)/DUR);
      const e = 1 - Math.pow(1 - t, 2.2);                 // ease-out expansion
      flash.setAttribute("r", (3 + 30*e).toFixed(1));
      flash.setAttribute("opacity", Math.max(0, 1 - t/0.55).toFixed(2));
      ring1.setAttribute("r", (4 + 64*e).toFixed(1));
      ring1.setAttribute("stroke-width", (4.5*(1-t) + .4).toFixed(2));
      ring1.setAttribute("opacity", (1 - t).toFixed(2));
      ring2.setAttribute("r", (2 + 92*e).toFixed(1));
      ring2.setAttribute("stroke-width", (6.5*(1-t) + .5).toFixed(2));
      ring2.setAttribute("opacity", (.95*(1 - t)).toFixed(2));
      if(t < 1) requestAnimationFrame(step);
      else g.remove();
    }catch(err){ console.error(TAG, err); try{ g.remove(); }catch(_){} }
  }
  requestAnimationFrame(step);
}

// gentle page shake, ~400ms
function shake(){
  try{
    document.body.animate([
      {transform:"translate(0,0)"},
      {transform:"translate(3px,-2px)"},
      {transform:"translate(-3px,2px)"},
      {transform:"translate(2px,2px)"},
      {transform:"translate(-2px,-1px)"},
      {transform:"translate(0,0)"},
    ],{duration:400, easing:"ease-out"});
  }catch(err){ console.error(TAG, err); }
}

// soft remnant nebula: drifts and fades out over ~30s, behind everything in the world
function spawnRemnant(x, y){
  const r = 46 + Math.random()*28;
  const b = SKY.mk("circle",{cx:x, cy:y, r:r.toFixed(1), fill:`url(#${PFX}-remnant)`, opacity:0});
  b.style.transformBox = "fill-box";
  b.style.transformOrigin = "center";
  SKY.gWorld.insertBefore(b, SKY.gBg);     // beneath edges / labels / stars
  remnants.add(b);
  const dx = (Math.random()*2 - 1)*44, dy = (Math.random()*2 - 1)*32;
  const anim = b.animate([
    {transform:"translate(0px,0px) scale(.55)", opacity:0},
    {opacity:.62, offset:.10},
    {opacity:.40, offset:.55},
    {transform:`translate(${dx.toFixed(1)}px,${dy.toFixed(1)}px) scale(1.3)`, opacity:0},
  ],{duration:30000, easing:"ease-out", fill:"forwards"});
  anim.onfinish = ()=>{ try{ b.remove(); remnants.delete(b); }catch(_){} };
}
})();
</script>

}

}

  const FAKE_N = 150;                     // 背景の淡い星の数
  const SANS = `"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif`;
  const MAIN_TINTS = [[255,246,224],[255,233,190],[255,222,170],[205,221,255],[228,236,255]];
  const FAKE_TINTS = [[226,232,255],[255,228,196],[188,206,255],[240,240,250]];

  // ---- styles --------------------------------------------------------
  const style = document.createElement("style");
  style.textContent = `
    .long-exposure-overlay{position:fixed;inset:0;z-index:8;display:flex;flex-direction:column;
      align-items:center;justify-content:center;gap:16px;background:rgba(2,3,12,.74);
      backdrop-filter:blur(7px);opacity:0;transition:opacity .35s ease}
    .long-exposure-overlay.long-exposure-in{opacity:1}
    .long-exposure-frame{background:#06080f;border:1px solid rgba(150,170,255,.22);
      border-radius:8px;padding:16px 16px 12px;
      box-shadow:0 34px 90px rgba(0,0,0,.75), 0 0 50px rgba(90,120,230,.12)}
    .long-exposure-frame img{display:block;max-width:80vw;max-height:75vh;width:auto;height:auto;
      border-radius:3px;opacity:0}
    .long-exposure-note{margin-top:11px;text-align:center;font-size:11px;color:var(--dim);
      letter-spacing:.14em;user-select:none}
    .long-exposure-row{display:flex;gap:10px}
    .long-exposure-btn{cursor:pointer;border:1px solid var(--panel-edge);background:var(--panel);
      color:var(--ink);border-radius:999px;padding:8px 24px;font-size:13px;font-family:inherit;
      backdrop-filter:blur(10px);transition:.18s;white-space:nowrap}
    .long-exposure-btn:hover{border-color:rgba(160,180,255,.5);background:rgba(30,38,80,.85);
      transform:translateY(-1px)}
    .long-exposure-btn:active{transform:translateY(0)}
    .long-exposure-save{border-color:rgba(255,210,122,.45);color:var(--accent)}
    .long-exposure-save:hover{border-color:rgba(255,210,122,.85);background:rgba(70,55,20,.5)}`;
  document.head.append(style);

  // ---- small helpers -------------------------------------------------
  const tint = list => list[(Math.random()*list.length)|0];
  function todayStr(){
    const d = new Date();
    return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,"0")}.${String(d.getDate()).padStart(2,"0")}`;
  }
  function dot(ctx, x, y, r, col, a){
    ctx.fillStyle = `rgba(${col[0]},${col[1]},${col[2]},${a.toFixed(3)})`;
    ctx.beginPath(); ctx.arc(x, y, r, 0, TAU); ctx.fill();
  }
  // 極を中心に、尾が薄く頭が明るい円弧を短いセグメントの連なりで描く
  function trail(ctx, px, py, x, y, col, width, baseA){
    const dx = x-px, dy = y-py, r = Math.hypot(dx, dy);
    if(r < 1.5) return;
    const aHead = Math.atan2(dy, dx), a0 = aHead - SWEEP;
    const segs = Math.min(120, Math.max(10, Math.round(r*SWEEP/4)));
    ctx.lineCap = "round"; ctx.lineWidth = width;
    for(let i=0;i<segs;i++){
      const t1 = (i+1)/segs;
      const a = baseA * Math.pow(t1, 1.7);   // 尾に向けてフェードアウト
      if(a < .004) continue;
      ctx.strokeStyle = `rgba(${col[0]},${col[1]},${col[2]},${a.toFixed(3)})`;
      ctx.beginPath();
      ctx.arc(px, py, r, a0 + SWEEP*(i/segs), a0 + SWEEP*t1);
      ctx.stroke();
    }
  }

  // ---- 現像本体: 2x 解像度のキャンバスに夜空を組み立てる ----------------
  function develop(){
    const W = SKY.W, H = SKY.H;
    const cv = document.createElement("canvas");
    cv.width = Math.max(2, Math.round(W*2));
    cv.height = Math.max(2, Math.round(H*2));
    const ctx = cv.getContext("2d");
    ctx.scale(2, 2);
    const px = W*0.5, py = H*0.30;          // 天の極 (diurnal と同じ点)

    // 1) ほぼ黒に近い深い紺のグラデーション
    const bg = ctx.createRadialGradient(px, py, 0, px, py, Math.max(W,H)*0.95);
    bg.addColorStop(0, "#0a102c");
    bg.addColorStop(.45, "#050818");
    bg.addColorStop(1, "#01020a");
    ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);

    // 2) 星雲パレットを引き継いだ淡い色の滲み
    const washes = [
      [91,58,158,  .26*W, .30*H, .42],
      [31,111,140, .74*W, .62*H, .38],
      [140,47,95,  .54*W, .18*H, .30],
    ];
    for(const [r,g,b,cx,cy,rr] of washes){
      const jx = cx + (Math.random()-.5)*W*.06, jy = cy + (Math.random()-.5)*H*.06;
      const rad = rr*Math.max(W,H);
      const grad = ctx.createRadialGradient(jx, jy, 0, jx, jy, rad);
      grad.addColorStop(0, `rgba(${r},${g},${b},${(0.07+Math.random()*0.05).toFixed(3)})`);
      grad.addColorStop(1, `rgba(${r},${g},${b},0)`);
      ctx.fillStyle = grad; ctx.fillRect(0, 0, W, H);
    }

    // 3) 背景のごく淡い星 ~150 個ぶんの軌跡
    for(let i=0;i<FAKE_N;i++){
      const x = Math.random()*W, y = Math.random()*H;
      const col = tint(FAKE_TINTS);
      const wd = .35 + Math.random()*.5;
      const al = .10 + Math.random()*.20;
      trail(ctx, px, py, x, y, col, wd, al);
      dot(ctx, x, y, wd*.9, col, Math.min(1, al+.18));
    }

    // 4) 置かれた星の軌跡 (回転を反映した現在位置を頭にする)
    const heads = SKY.stars.map(s=>{
      try{ return SKY.worldToSky(s.x, s.y); }catch(_){ return {x:s.x, y:s.y}; }
    });
    SKY.stars.forEach((s, i)=>{
      const h = heads[i];
      const col = tint(MAIN_TINTS);
      trail(ctx, px, py, h.x, h.y, col, Math.max(1, s.mag*.85), .8);
      const glow = ctx.createRadialGradient(h.x, h.y, 0, h.x, h.y, s.mag*3.2);
      glow.addColorStop(0, "rgba(255,255,255,.95)");
      glow.addColorStop(.35, `rgba(${col[0]},${col[1]},${col[2]},.55)`);
      glow.addColorStop(1, `rgba(${col[0]},${col[1]},${col[2]},0)`);
      ctx.fillStyle = glow;
      ctx.beginPath(); ctx.arc(h.x, h.y, s.mag*3.2, 0, TAU); ctx.fill();
      dot(ctx, h.x, h.y, s.mag*.95, [255,255,255], .95);
    });

    // 極星はじっとしている (点のまま)
    dot(ctx, px, py, 1.3, [255,240,210], .85);

    // 5) 星座の線画と名前 (注釈つき星図ふうに、ごく薄く)
    for(const c of SKY.constellations){
      if(!c.name) continue;
      ctx.lineCap = "round";
      for(const [i, j] of (c.edges || [])){
        const a = heads[i], b = heads[j];
        if(!a || !b) continue;
        ctx.strokeStyle = "rgba(255,210,122,.09)"; ctx.lineWidth = 2.2;
        ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
        ctx.strokeStyle = "rgba(255,210,122,.22)"; ctx.lineWidth = .7;
        ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
      }
      let sx = 0, sy = 0, top = Infinity, n = 0;
      for(const i of (c.indices || [])){
        const h = heads[i]; if(!h) continue;
        sx += h.x; sy += h.y; top = Math.min(top, h.y); n++;
      }
      if(n){
        ctx.font = `10.5px ${SANS}`;
        ctx.textAlign = "center"; ctx.textBaseline = "alphabetic";
        ctx.fillStyle = "rgba(255,214,130,.6)";
        ctx.fillText(c.name, sx/n, top - 12);
      }
    }

    // 6) 地平線のシルエット (なだらかな丘 + 松 + 小さな天文台)
    const pts = [];
    const NSEG = 7;
    for(let i=0;i<=NSEG;i++){
      pts.push({ x: W*i/NSEG, y: H*0.885 + (Math.random()-.45)*H*0.055 });
    }
    const hillY = x=>{
      const t = Math.min(Math.max(x/W, 0), 1)*(pts.length-1);
      const i = Math.min(Math.floor(t), pts.length-2), f = t-i;
      return pts[i].y*(1-f) + pts[i+1].y*f;
    };
    ctx.fillStyle = "#020309";
    ctx.beginPath();
    ctx.moveTo(-2, H+2); ctx.lineTo(-2, pts[0].y);
    for(let i=0;i<pts.length-1;i++){
      ctx.quadraticCurveTo(pts[i].x, pts[i].y, (pts[i].x+pts[i+1].x)/2, (pts[i].y+pts[i+1].y)/2);
    }
    ctx.lineTo(W+2, pts[NSEG].y); ctx.lineTo(W+2, H+2);
    ctx.closePath(); ctx.fill();
    const pines = 5 + (Math.random()*4|0);
    for(let i=0;i<pines;i++){
      const x = W*(.04 + Math.random()*.92);
      const gy = hillY(x) + 3;
      const h = 9 + Math.random()*11, w = h*.55;
      ctx.beginPath();
      ctx.moveTo(x, gy-h); ctx.lineTo(x-w*.5, gy-h*.42); ctx.lineTo(x+w*.5, gy-h*.42);
      ctx.closePath(); ctx.fill();
      ctx.beginPath();
      ctx.moveTo(x, gy-h*.62); ctx.lineTo(x-w*.72, gy); ctx.lineTo(x+w*.72, gy);
      ctx.closePath(); ctx.fill();
      ctx.fillRect(x-.8, gy-2, 1.6, 3);
    }
    const ox = W*(.15 + Math.random()*.7);
    const oy = hillY(ox) + 2, ow = 30, oh = 13, dr = 13;
    ctx.fillRect(ox-ow/2, oy-oh, ow, oh+3);
    ctx.beginPath(); ctx.arc(ox, oy-oh, dr, Math.PI, 0); ctx.closePath(); ctx.fill();
    ctx.strokeStyle = "rgba(22,30,66,.9)"; ctx.lineWidth = 1.5;   // ドームのスリット
    ctx.beginPath(); ctx.moveTo(ox+2, oy-oh-dr+3); ctx.lineTo(ox+5, oy-oh-3); ctx.stroke();

    // 7) 周辺減光 + 微かなフィルム粒子
    const vg = ctx.createRadialGradient(W/2, H/2, Math.min(W,H)*.42, W/2, H/2, Math.hypot(W,H)*.55);
    vg.addColorStop(0, "rgba(0,0,0,0)");
    vg.addColorStop(1, "rgba(0,0,0,.42)");
    ctx.fillStyle = vg; ctx.fillRect(0, 0, W, H);
    const grains = Math.min(2200, Math.round(W*H/1400));
    for(let i=0;i<grains;i++){
      ctx.fillStyle = `rgba(255,255,255,${(Math.random()*.03+.008).toFixed(3)})`;
      ctx.fillRect(Math.random()*W, Math.random()*H, .7, .7);
    }

    // 8) 隅のキャプション (フィルムの日付焼き込みふう)
    ctx.font = `11px ${SANS}`;
    try{ ctx.letterSpacing = "1px"; }catch(_){}
    ctx.textAlign = "right"; ctx.textBaseline = "alphabetic";
    ctx.shadowColor = "rgba(255,140,60,.5)"; ctx.shadowBlur = 4;
    ctx.fillStyle = "rgba(255,176,96,.78)";
    ctx.fillText(`露光25分　ISO1600　どこかの夜空　${todayStr()}`, W-16, H-14);
    ctx.shadowBlur = 0;
    try{ ctx.letterSpacing = "0px"; }catch(_){}
    return cv;
  }

  // ---- プレビューモーダル ----------------------------------------------
  let busy = false;
  function openModal(blob, nStars){
    const url = URL.createObjectURL(blob);
    const ov = document.createElement("div");
    ov.className = "long-exposure-overlay";
    const frame = document.createElement("div");
    frame.className = "long-exposure-frame";
    const img = document.createElement("img");
    img.alt = "長時間露光写真";
    img.src = url;
    const note = document.createElement("div");
    note.className = "long-exposure-note";
    note.textContent = `── ${nStars} 個の星が、ゆっくりと円を描きました ──`;
    const row = document.createElement("div");
    row.className = "long-exposure-row";
    const bSave = document.createElement("button");
    bSave.className = "long-exposure-btn long-exposure-save";
    bSave.textContent = "保存";
    const bClose = document.createElement("button");
    bClose.className = "long-exposure-btn";
    bClose.textContent = "閉じる";
    row.append(bSave, bClose);
    frame.append(img, note);
    ov.append(frame, row);
    document.body.append(ov);
    requestAnimationFrame(()=>ov.classList.add("long-exposure-in"));
    img.animate(
      [{opacity:0, filter:"brightness(.1) saturate(0)"},
       {opacity:1, filter:"brightness(1) saturate(1)"}],
      {duration:1500, easing:"ease-out", fill:"forwards"});

    function close(){
      try{
        window.removeEventListener("keydown", onKey);
        ov.classList.remove("long-exposure-in");
        setTimeout(()=>{ ov.remove(); URL.revokeObjectURL(url); }, 1500);
        busy = false;
      }catch(err){ console.error("[long-exposure] close", err); busy = false; }
    }
    function onKey(e){ if(e.key === "Escape") close(); }
    window.addEventListener("keydown", onKey);
    ov.addEventListener("pointerdown", e=>{ if(e.target === ov) close(); });
    bClose.addEventListener("click", close);
    bSave.addEventListener("click", e=>{
      try{
        e.stopPropagation();
        const a = document.createElement("a");
        a.href = url; a.download = "night-photograph.png"; a.click();
        SKY.toast("現像しました");
      }catch(err){ console.error("[long-exposure] save", err); SKY.toast("保存に失敗しました"); }
    });
  }

  // ---- dock button -----------------------------------------------------
  SKY.addButton("📷 長時間露光", ()=>{
    try{
      if(busy) return;
      if(!SKY.stars.length){ SKY.toast("写すものがありません"); return; }
      busy = true;
      const n = SKY.stars.length;
      const cv = develop();
      cv.toBlob(b=>{
        try{
          if(!b){ busy = false; SKY.toast("現像に失敗しました"); return; }
          openModal(b, n);
        }catch(err){ busy = false; console.error("[long-exposure] open", err); }
      }, "image/png");
    }catch(err){
      busy = false;
      console.error("[long-exposure] shoot", err);
      SKY.toast("現像に失敗しました");
    }
  });
})();
</script>
<script>
// ════ plugin: hoshi-drag (wave2) ════ Browser-verified against the live host: claims star clicks via capture pointerdown+preventDefault (bails if already claimed, so black-hole armed mode wins), live-follows snapshotted gEdges line ends (
// ════ plugin: hoshi-drag ════ 星をつかんで動かす — drag stars to reshape constellations.
// Silent: no button, no toast, no UI except grab/grabbing cursors.
(()=>{ "use strict";
if(!window.SKY) return;
const SKY = window.SKY;
const PFX = "hoshi-drag";
const TAG = "[hoshi-drag]";

/* ---------- cursors ----------
   grab over any star; grabbing everywhere while a drag is live.
   !important beats inline cursor styles other plugins may set on #sky. */
try{
  const style = document.createElement("style");
  style.textContent =
    `body.${PFX}-grabbing, body.${PFX}-grabbing #sky, body.${PFX}-grabbing #sky *{` +
    `cursor:grabbing !important;}`;
  document.head.append(style);
  SKY.gStars.style.cursor = "grab";
}catch(err){ console.error(TAG, err); }

/* ---------- state ---------- */
let drag = null;  // {star, pointerId, offX, offY, ends:[{line,end}], pop, moved}

/* which star (if any) owns this pointer target? */
function hitStar(target){
  if(!(target instanceof Element)) return null;
  if(target === SKY.gStars || !SKY.gStars.contains(target)) return null;
  for(const s of SKY.stars){
    if(s.el && (s.el === target || s.el.contains(target))) return s;
  }
  return null;
}

/* snapshot the <line>s in gEdges touching the star (within 1px), remembering
   which end; strip their dash setup so the live length change stays solid */
function snapshotEdges(star){
  const ends = [];
  for(const line of SKY.gEdges.children){
    if(line.tagName !== "line") continue;
    for(const end of [1, 2]){
      const ex = parseFloat(line.getAttribute("x"+end));
      const ey = parseFloat(line.getAttribute("y"+end));
      if(Math.abs(ex - star.x) <= 1 && Math.abs(ey - star.y) <= 1) ends.push({line, end});
    }
  }
  for(const {line} of ends){
    try{ line.getAnimations().forEach(a => a.finish()); }catch(_){}
    line.removeAttribute("stroke-dasharray");
    line.removeAttribute("stroke-dashoffset");
  }
  return ends;
}

/* ---------- pickup ---------- */
SKY.svg.addEventListener("pointerdown", e=>{
  try{
    if(e.defaultPrevented || e.button !== 0 || drag) return;  // another plugin claimed it / not a left click / already dragging
    const star = hitStar(e.target);
    if(!star) return;
    e.preventDefault();                       // suppress core add-star, signal later capture plugins
    const p = SKY.screenToWorld(e.clientX, e.clientY);
    drag = {
      star, pointerId: e.pointerId,
      offX: star.x - p.x, offY: star.y - p.y, // keep the grab point under the finger
      ends: snapshotEdges(star),
      pop: null, moved: false,
    };
    try{ SKY.svg.setPointerCapture(e.pointerId); }catch(_){}
    document.body.classList.add(`${PFX}-grabbing`);
    // pickup pop — held slightly enlarged while dragging
    try{
      star.el.style.transformBox = "fill-box";
      star.el.style.transformOrigin = "center";
      drag.pop = star.el.animate(
        [{transform:"scale(1)"},{transform:"scale(1.5)",offset:.45},{transform:"scale(1.16)"}],
        {duration:240, easing:"cubic-bezier(.2,1.5,.4,1)", fill:"forwards"});
    }catch(_){}
  }catch(err){ console.error(TAG, err); }
}, {capture:true});

/* ---------- move ---------- */
SKY.svg.addEventListener("pointermove", e=>{
  try{
    if(!drag || e.pointerId !== drag.pointerId) return;
    const star = drag.star;
    if(!SKY.stars.includes(star)){ abortDrag(); return; }  // devoured mid-drag (UFO / black hole)
    const p = SKY.screenToWorld(e.clientX, e.clientY);     // handles rotation + viewBox zoom
    const x = p.x + drag.offX, y = p.y + drag.offY;
    if(!drag.moved && Math.hypot(x - star.x, y - star.y) > .5) drag.moved = true;
    star.x = x; star.y = y;
    star.core.setAttribute("cx", x); star.core.setAttribute("cy", y);
    star.halo.setAttribute("cx", x); star.halo.setAttribute("cy", y);
    for(const en of drag.ends){
      if(!en.line.isConnected) continue;
      en.line.setAttribute("x"+en.end, x);
      en.line.setAttribute("y"+en.end, y);
    }
  }catch(err){ console.error(TAG, err); }
});

/* ---------- drop / abort ---------- */
function cleanup(){
  if(!drag) return null;
  const d = drag; drag = null;
  document.body.classList.remove(`${PFX}-grabbing`);
  try{ SKY.svg.releasePointerCapture(d.pointerId); }catch(_){}
  if(d.pop){ try{ d.pop.cancel(); }catch(_){} }
  return d;
}
function abortDrag(){ cleanup(); }   // star vanished mid-drag: no recompute (the remover does its own)
function endDrag(){
  try{
    const d = cleanup();
    if(!d) return;
    const star = d.star;
    if(!SKY.stars.includes(star)) return;  // removed at the very last moment
    try{
      star.el.animate(
        [{transform:"scale(1.16)"},{transform:"scale(.94)",offset:.55},{transform:"scale(1)"}],
        {duration:280, easing:"ease-out"});
    }catch(_){}
    if(d.moved) SKY.recompute();           // re-link once; names carry over via reconcile
  }catch(err){ console.error(TAG, err); }
}

SKY.svg.addEventListener("pointerup", e=>{
  try{ if(drag && e.pointerId === drag.pointerId) endDrag(); }
  catch(err){ console.error(TAG, err); }
});
SKY.svg.addEventListener("pointercancel", e=>{
  try{ if(drag && e.pointerId === drag.pointerId) endDrag(); }
  catch(err){ console.error(TAG, err); }
});
SKY.svg.addEventListener("lostpointercapture", e=>{
  try{ if(drag && e.pointerId === drag.pointerId) endDrag(); }
  catch(err){ console.error(TAG, err); }
});
SKY.on("cleared", ()=>{ try{ abortDrag(); }catch(err){ console.error(TAG, err); } });
})();
</script>

      "星座の線は、軌道上からは見えないのです。少しうらやましいです",
      "次回の通過予定は約2分後です。たぶん",
      "ブラックホールとUFOには近づかないよう言われています",
      "本日の業務報告: 地球を16周しました。明日も16周の予定です",
    ];
    let lastLine = -1;
    function pickLine(){
      let i;
      do{ i = (Math.random()*LINES.length)|0; }while(LINES.length > 1 && i === lastLine);
      lastLine = i;
      return LINES[i];
    }

    let radioT = null;
    function radioToast(line){
      try{
        SKY.toast("📡 受信: " + line);
        const t = document.getElementById("toast");
        if(t){
          t.classList.add("eisei-radio");
          clearTimeout(radioT);
          radioT = setTimeout(()=>t.classList.remove("eisei-radio"), 1900); // matches host toast life
        }
      }catch(err){ console.error("[jinko-eisei] toast", err); }
    }

    /* ---------- two short beeps (lazy AudioContext, quiet square waves) ---------- */
    let actx = null;
    function beepBeep(){
      try{
        const AC = window.AudioContext || window.webkitAudioContext;
        if(!AC) return;
        if(!actx) actx = new AC();
        if(actx.state === "suspended") actx.resume().catch(()=>{});
        const t0 = actx.currentTime + .02;
        [[880, 0], [1320, .13]].forEach(([f, dt])=>{
          const o = actx.createOscillator(), g = actx.createGain();
          o.type = "square"; o.frequency.value = f;
          g.gain.setValueAtTime(.0001, t0+dt);
          g.gain.exponentialRampToValueAtTime(.035, t0+dt+.012);  // quiet
          g.gain.setValueAtTime(.035, t0+dt+.06);
          g.gain.exponentialRampToValueAtTime(.0001, t0+dt+.082); // ~80ms each
          o.connect(g); g.connect(actx.destination);
          o.start(t0+dt); o.stop(t0+dt+.1);
          o.onended = ()=>{ try{ g.disconnect(); }catch(_){} };
        });
      }catch(err){ console.error("[jinko-eisei] beep", err); }
    }

    /* ---------- build one satellite (~19px wing-to-wing, cool grays) ---------- */
    function buildSat(angDeg){
      const gPos = mk("g", {class:"eisei-sat"});          // translated along the path (sky coords)
      const gAim = mk("g", {transform:`rotate(${angDeg.toFixed(1)})`}); // fixed travel heading
      const gWob = mk("g");                                // waggle target
      gPos.append(gAim); gAim.append(gWob);
      gPos.style.pointerEvents = "auto";

      // invisible enlarged hit area
      gWob.append(mk("circle", {r:18, fill:"transparent", "pointer-events":"all"}));

      // body + struts + solar wings + panel cells + antenna — simple rects/lines
      gWob.append(
        mk("line",  {x1:-4.4, y1:0, x2:4.4, y2:0, stroke:"#8b94a6", "stroke-width":.7}),
        mk("rect",  {x:-9.6, y:-1.6, width:5.2, height:3.2, rx:.4, fill:"#46536e", stroke:"#7d8cab", "stroke-width":.5}),
        mk("rect",  {x:4.4,  y:-1.6, width:5.2, height:3.2, rx:.4, fill:"#46536e", stroke:"#7d8cab", "stroke-width":.5}),
        mk("line",  {x1:-7.9, y1:-1.6, x2:-7.9, y2:1.6, stroke:"#7d8cab", "stroke-width":.4}),
        mk("line",  {x1:-6.2, y1:-1.6, x2:-6.2, y2:1.6, stroke:"#7d8cab", "stroke-width":.4}),
        mk("line",  {x1:6.2,  y1:-1.6, x2:6.2,  y2:1.6, stroke:"#7d8cab", "stroke-width":.4}),
        mk("line",  {x1:7.9,  y1:-1.6, x2:7.9,  y2:1.6, stroke:"#7d8cab", "stroke-width":.4}),
        mk("rect",  {x:-2.7, y:-2.1, width:5.4, height:4.2, rx:.7, fill:"#9aa3b2", stroke:"#5d6678", "stroke-width":.6}),
        mk("line",  {x1:-2.7, y1:.4, x2:2.7, y2:.4, stroke:"#6c7689", "stroke-width":.45}),
        mk("line",  {x1:0, y1:-2.1, x2:0, y2:-4.4, stroke:"#8b94a6", "stroke-width":.5})
      );

      // blinking light at the antenna tip: red / white alternate
      const red   = mk("circle", {cx:0, cy:-4.9, r:1.05, fill:"#ff5a52"});
      const white = mk("circle", {cx:0, cy:-4.9, r:.85,  fill:"#ffffff"});
      gWob.append(red, white);
      red.animate(  [{opacity:1},{opacity:1,offset:.42},{opacity:.05,offset:.5},{opacity:.05,offset:.92},{opacity:1}],
        {duration:1200, iterations:Infinity});
      white.animate([{opacity:.05},{opacity:.05,offset:.42},{opacity:1,offset:.5},{opacity:1,offset:.92},{opacity:.05}],
        {duration:1200, iterations:Infinity});

      // waggle pivots around the satellite's own centre
      gWob.style.transformBox = "fill-box";
      gWob.style.transformOrigin = "center";

      return {gPos, gWob};
    }

    function waggle(gWob){
      try{
        gWob.animate([
          {transform:"rotate(0deg)"},
          {transform:"rotate(6deg)",  offset:.22},
          {transform:"rotate(-5deg)", offset:.52},
          {transform:"rotate(2.5deg)",offset:.78},
          {transform:"rotate(0deg)"},
        ], {duration:700, easing:"ease-in-out"});
      }catch(_){}
    }

    // one brief glint sparkle on the panels, midway through the pass
    function glint(gWob){
      try{
        const gl = mk("g", {opacity:0, "pointer-events":"none"});
        gl.append(
          mk("line",  {x1:-7, y1:0, x2:7, y2:0, stroke:"#fff", "stroke-width":1, "stroke-linecap":"round", filter:"url(#line-glow)"}),
          mk("line",  {x1:0, y1:-7, x2:0, y2:7, stroke:"#fff", "stroke-width":1, "stroke-linecap":"round", filter:"url(#line-glow)"}),
          mk("circle",{r:2.1, fill:"#fff", opacity:.9})
        );
        gl.style.transformBox = "fill-box";
        gl.style.transformOrigin = "center";
        gWob.append(gl);
        gl.animate([
          {opacity:0,   transform:"scale(.2)"},
          {opacity:.95, transform:"scale(1)", offset:.35},
          {opacity:0,   transform:"scale(.3)"},
        ], {duration:650, easing:"ease-out"}).onfinish = ()=>gl.remove();
      }catch(err){ console.error("[jinko-eisei] glint", err); }
    }

    /* ---------- one full pass across the sky ---------- */
    let passTimer = null, midTimer = null, endTimer = null, current = null;

    function endPass(){
      try{
        if(!current) return;
        current.gPos.remove();
        current = null;
        clearTimeout(midTimer); clearTimeout(endTimer);
        scheduleNext(rand(70000, 130000));          // next pass in 70–130s
      }catch(err){ console.error("[jinko-eisei] end", err); }
    }

    function startPass(){
      try{
        const W = SKY.W, H = SKY.H, M = 40;
        const ltr = Math.random() < .5;
        const y1  = H * rand(.12, .62);
        const dy  = H * rand(.08, .20) * (Math.random() < .5 ? -1 : 1); // slightly diagonal
        const y2  = Math.max(H*.06, Math.min(H*.85, y1 + dy));
        const x1  = ltr ? -M : W + M;
        const x2  = ltr ? W + M : -M;
        const ang = Math.atan2(y2 - y1, x2 - x1) * 180 / Math.PI;
        const DUR = rand(11000, 13500);             // ~12s pass

        const sat = buildSat(ang);
        const {gPos, gWob} = sat;
        let transmitted = false;

        gPos.addEventListener("pointerdown", e=>{
          try{
            if(e.button !== 0) return;
            if(e.defaultPrevented) return;          // another plugin already claimed this click
            e.preventDefault();                     // core skips star placement
            e.stopPropagation();
            if(transmitted) return;                 // once per pass
            transmitted = true;
            beepBeep();
            waggle(gWob);                           // small acknowledgment wobble
            radioToast(pickLine());
          }catch(err){ console.error("[jinko-eisei] click", err); }
        });

        SKY.gShoot.append(gPos);
        const anim = gPos.animate([
          {transform:`translate(${x1}px, ${y1}px)`},
          {transform:`translate(${x2}px, ${y2}px)`},
        ], {duration:DUR, easing:"linear", fill:"forwards"});
        anim.onfinish = endPass;

        current = sat;
        midTimer = setTimeout(()=>{ if(current === sat) glint(gWob); }, DUR * rand(.42, .58));
        endTimer = setTimeout(endPass, DUR + 1500); // safety net
      }catch(err){
        console.error("[jinko-eisei] pass", err);
        scheduleNext(rand(70000, 130000));
      }
    }

    function scheduleNext(ms){
      clearTimeout(passTimer);
      passTimer = setTimeout(()=>{ try{ startPass(); }catch(err){ console.error("[jinko-eisei]", err); } }, ms);
    }

    scheduleNext(rand(20000, 40000));               // first flyover 20–40s after load
  }catch(err){
    console.error("[jinko-eisei] init", err);
  }
})();
</script>
<script>
// ════ plugin: yoru-no-oto (wave2) ════ Adds one dock toggle 「🌌 夜の音」(on: 「🔇 夜の音」). Own lazy AudioContext (coexists with orgel; suspended after fade-out teardown, resumed on re-toggle). Bell pings pulse a random gBg star via WAAPI transform/
(()=>{ "use strict";
if(!window.SKY) return;
try{
  const SKY = window.SKY;
  const TAG = "[yoru-no-oto]";

  // ---------- style (button glow while the night is sounding) ----------
  const style = document.createElement("style");
  style.textContent = `
    .yoru-no-oto-on{color:var(--accent);border-color:rgba(255,210,122,.55);
      box-shadow:0 0 14px rgba(255,210,122,.18);}
  `;
  document.head.append(style);

  // ---------- pitch material ----------
  const fOf = m => 440 * Math.pow(2, (m-69)/12);
  // 4 hand-picked low dreamy voicings, all tones inside the C-pentatonic family
  const CHORDS = [
    [36,43,50],   // C2 G2 D3 — open, weightless
    [33,40,48],   // A1 E2 C3 — minor dusk
    [38,45,52],   // D2 A2 E3 — drifting upward
    [31,38,45],   // G1 D2 A2 — the deep field
  ].map(ch => ch.map(fOf));
  // sparse bells: C-pentatonic, two high octaves
  const BELLS = [72,74,76,79,81,84,86,88,91,93,96].map(fOf);

  // ---------- state ----------
  let ctx = null;        // our OWN AudioContext (orgel has its own; they coexist)
  let graph = null;      // live node graph, null when torn down
  let isOn = false;
  let teardownT = null;  // pending post-fade teardown timer
  const timers = new Set();
  let btn = null;
  const LABEL_OFF = "🌌 夜の音";
  const LABEL_ON  = "🔇 夜の音";

  function after(ms, fn){
    const id = setTimeout(()=>{
      timers.delete(id);
      try{ fn(); }catch(err){ console.error(TAG, err); }
    }, ms);
    timers.add(id);
    return id;
  }
  function clearTimers(){ for(const id of timers) clearTimeout(id); timers.clear(); }

  function ensureCtx(){
    try{
      if(!ctx){
        const AC = window.AudioContext || window.webkitAudioContext;
        if(!AC) return null;
        ctx = new AC();
      }
      if(ctx.state === "suspended") ctx.resume().catch(()=>{});
      return ctx;
    }catch(err){ console.error(TAG, "audio", err); return null; }
  }

  // ---------- build the whole ambient graph ----------
  function buildGraph(){
    try{
      const c = ctx;
      const sources = [], nodes = [];
      const keep = n => (nodes.push(n), n);

      const master = keep(c.createGain()); master.gain.value = .25;   // total bed level
      master.connect(c.destination);
      const fade = keep(c.createGain()); fade.gain.value = .0001;     // 2s in/out ramp
      fade.connect(master);

      // ── layer 1: deep pad — 3 detuned triangles, slow swell, chord glides ──
      const padLevel = keep(c.createGain()); padLevel.gain.value = .55;
      padLevel.connect(fade);
      const padLP = keep(c.createBiquadFilter());
      padLP.type = "lowpass"; padLP.frequency.value = 720; padLP.Q.value = .4;
      padLP.connect(padLevel);
      const padGain = keep(c.createGain()); padGain.gain.value = .5;  // LFO target
      padGain.connect(padLP);
      const lfo = keep(c.createOscillator());                          // ~8-13s swell
      lfo.type = "sine"; lfo.frequency.value = 1/(8 + Math.random()*5);
      const lfoDepth = keep(c.createGain()); lfoDepth.gain.value = .22;
      lfo.connect(lfoDepth); lfoDepth.connect(padGain.gain);
      lfo.start(); sources.push(lfo);

      const padOscs = [];
      const freqs = CHORDS[0].slice();
      CHORDS[0].forEach((f, k)=>{
        const o = keep(c.createOscillator());
        o.type = "triangle";
        o.frequency.value = f;
        o.detune.value = [-6, 0, 7][k] + (Math.random()*4 - 2);
        const og = keep(c.createGain()); og.gain.value = .33;
        o.connect(og); og.connect(padGain);
        o.start(); sources.push(o); padOscs.push(o);
      });

      // ── layer 2: sparse bells through a feedback delay ──
      const bellDry = keep(c.createGain()); bellDry.gain.value = .9;
      bellDry.connect(fade);
      const bellDelay = keep(c.createDelay(1.5)); bellDelay.delayTime.value = .46;
      const bellFb  = keep(c.createGain()); bellFb.gain.value = .32;   // feedback shimmer
      const bellWet = keep(c.createGain()); bellWet.gain.value = .4;
      bellDry.connect(bellDelay); bellDelay.connect(bellFb); bellFb.connect(bellDelay);
      bellDelay.connect(bellWet); bellWet.connect(fade);

      // ── layer 3: wind — looping pink-ish noise, lowpass ~300Hz, breathing slowly ──
      const len = Math.floor(c.sampleRate * 4);
      const buf = c.createBuffer(1, len, c.sampleRate);
      const d = buf.getChannelData(0);
      let b = 0;
      for(let i=0;i<len;i++){                       // one-pole filtered random samples
        b = b*.97 + (Math.random()*2 - 1)*.03;
        d[i] = b * 3.2;
      }
      const wind = keep(c.createBufferSource());
      wind.buffer = buf; wind.loop = true;
      const windLP = keep(c.createBiquadFilter());
      windLP.type = "lowpass"; windLP.frequency.value = 300; windLP.Q.value = .3;
      const windGain = keep(c.createGain()); windGain.gain.value = .015;
      wind.connect(windLP); windLP.connect(windGain); windGain.connect(fade);
      wind.start(); sources.push(wind);
      const windLfo = keep(c.createOscillator());                      // very slow breath
      windLfo.type = "sine"; windLfo.frequency.value = .028;
      const windDepth = keep(c.createGain()); windDepth.gain.value = .008;
      windLfo.connect(windDepth); windDepth.connect(windGain.gain);
      windLfo.start(); sources.push(windLfo);

      return { fade, master, bellDry, padOscs, freqs, chordIx: 0, sources, nodes };
    }catch(err){ console.error(TAG, "build", err); return null; }
  }

  function teardown(){
    if(!graph) return;
    for(const s of graph.sources){ try{ s.stop(); }catch(_){} }
    for(const n of graph.nodes){ try{ n.disconnect(); }catch(_){} }
    graph = null;
    if(ctx && ctx.state === "running") ctx.suspend().catch(()=>{});
  }

  // ---------- chord glides: every ~20s, drift to another voicing ----------
  function glide(){
    if(!isOn || !graph || !ctx) return;
    let ix = graph.chordIx;
    while(ix === graph.chordIx) ix = (Math.random()*CHORDS.length)|0;
    graph.chordIx = ix;
    const t = ctx.currentTime;
    CHORDS[ix].forEach((f, k)=>{
      const p = graph.padOscs[k].frequency;
      try{
        p.cancelScheduledValues(t);
        p.setValueAtTime(Math.max(20, p.value), t);
        p.exponentialRampToValueAtTime(f, t + 5.5);   // long sleepy glide
      }catch(_){}
      graph.freqs[k] = f;
    });
  }
  function scheduleGlide(){
    after(17000 + Math.random()*7000, ()=>{ glide(); scheduleGlide(); });
  }

  // ---------- bells + the star that hears them ----------
  function pulseBgStar(){
    try{
      const kids = SKY.gBg && SKY.gBg.children;
      if(!kids || !kids.length) return;
      const el = kids[(Math.random()*kids.length)|0];
      if(!el.animate) return;
      el.style.transformBox = "fill-box";
      el.style.transformOrigin = "center";
      // opacity is left out of the first/last keyframes so the core twinkle
      // loop's attribute value shines through before and after the pulse
      el.animate(
        [{transform:"scale(1)"},
         {transform:"scale(2.8)", opacity:.95, offset:.3},
         {transform:"scale(1)"}],
        {duration:1500, easing:"cubic-bezier(.2,.7,.3,1)"});
    }catch(_){}
  }

  function bell(){
    if(!isOn || !graph || !ctx) return;
    try{
      const t = ctx.currentTime;
      const f = SKY.pick(BELLS);
      const amp = .05 + Math.random()*.08;
      const env = ctx.createGain();
      env.gain.setValueAtTime(.0001, t);
      env.gain.exponentialRampToValueAtTime(amp, t + .008);
      env.gain.exponentialRampToValueAtTime(.0001, t + 2.4);   // fast decay, long tail in delay
      const o = ctx.createOscillator();
      o.type = "sine"; o.frequency.value = f;
      o.connect(env); env.connect(graph.bellDry);
      o.start(t); o.stop(t + 2.5);
      o.onended = ()=>{ try{ env.disconnect(); }catch(_){} };
      pulseBgStar();
    }catch(err){ console.error(TAG, "bell", err); }
  }
  function scheduleBell(){
    after(4000 + Math.random()*5000, ()=>{ bell(); scheduleBell(); });
  }

  // ---------- toggle ----------
  function turnOn(){
    if(!ensureCtx()){ SKY.toast("この夜空では音を鳴らせないようです"); return; }
    if(teardownT){ clearTimeout(teardownT); teardownT = null; }
    if(!graph) graph = buildGraph();
    if(!graph){ SKY.toast("この夜空では音を鳴らせないようです"); return; }
    const t = ctx.currentTime;
    const g = graph.fade.gain;
    g.cancelScheduledValues(t);
    g.setValueAtTime(Math.max(g.value, .0001), t);
    g.linearRampToValueAtTime(1, t + 2);                       // 2s fade in
    isOn = true;
    btn.textContent = LABEL_ON;
    btn.classList.add("yoru-no-oto-on");
    clearTimers();
    scheduleGlide();
    scheduleBell();
    after(900, bell);                                          // a first chime, soon
    SKY.toast("夜の音が、満ちていきます");
  }

  function turnOff(){
    isOn = false;
    btn.textContent = LABEL_OFF;
    btn.classList.remove("yoru-no-oto-on");
    clearTimers();
    if(graph && ctx){
      const t = ctx.currentTime;
      const g = graph.fade.gain;
      g.cancelScheduledValues(t);
      g.setValueAtTime(Math.max(g.value, .0001), t);
      g.linearRampToValueAtTime(.0001, t + 2);                 // 2s fade out
    }
    teardownT = setTimeout(()=>{                               // then full stop + disconnect
      teardownT = null;
      try{ teardown(); }catch(err){ console.error(TAG, err); }
    }, 2200);
    SKY.toast("夜の音が、遠ざかっていきます");
  }

  btn = SKY.addButton(LABEL_OFF, ()=>{
    try{ isOn ? turnOff() : turnOn(); }
    catch(err){ console.error(TAG, "toggle", err); }
  });

  // NOTE: deliberately no "cleared" handler — the ambience is mood, not content;
  // it keeps sounding even over an empty sky.
}catch(err){ console.error("[yoru-no-oto] init", err); }
})();
</script>

<script>
// ════ plugin: yozora-shinbun (wave3) ════ Plugin key "yozora-shinbun" (夜空新聞). Paste verbatim into its own <script> tag after wave-2 plugins, before sharelink. Records from load: star-added tally, star-removed with 3s-chained burst grouping (>
(()=>{ "use strict";
  if(!window.SKY) return;
  const SKY = window.SKY;
  const TAG = "[yozora-shinbun]";
  const P = "yozora-shinbun";
  const KEY_ISSUE = "sky-yozora-shinbun-issue-v1";

  // ====================================================================
  //  夜空新聞 — 今夜この空で起きたことを、真顔で報じる
  // ====================================================================

  const esc = s => String(s).replace(/[&<>"]/g,
    ch => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;" }[ch]));
  const tm = t => { const d=new Date(t); return `${d.getHours()}時${String(d.getMinutes()).padStart(2,"0")}分`; };

  const WITNESS = "目撃者の証言は『眩しかった』『緑色だった』『黒い渦に吸われた』と食い違っており、当局は頭を抱えている。";

  // ---- 記録 ----------------------------------------------------------
  const events = [];        // chronological: {type:"lost"|"mass"|"clear"|"named", t, ...}
  let born = 0;             // star-added count
  let liveCount = 0;        // current stars (for the clear headline)

  // removal burst detection: removals chained within 3s collapse into one group
  let group = null, groupTimer = 0;
  function flushRemovals(){
    try{
      if(groupTimer){ clearTimeout(groupTimer); groupTimer = 0; }
      if(!group) return;
      const g = group; group = null;
      if(g.count >= 3) events.push({ type:"mass", t:g.t0, n:g.count });
      else for(let i=0;i<g.count;i++) events.push({ type:"lost", t:g.t0 });
    }catch(err){ console.error(TAG, err); }
  }

  SKY.on("star-added", ()=>{ try{ born++; liveCount++; }catch(err){ console.error(TAG, err); } });

  SKY.on("star-removed", ()=>{
    try{
      liveCount = Math.max(0, liveCount - 1);
      const now = Date.now();
      if(group && now - group.tLast <= 3000){ group.count++; group.tLast = now; }
      else { flushRemovals(); group = { t0:now, tLast:now, count:1 }; }
      clearTimeout(groupTimer);
      groupTimer = setTimeout(flushRemovals, 3200);
    }catch(err){ console.error(TAG, err); }
  });

  SKY.on("constellation-named", c=>{
    try{
      const e = { type:"named", t:Date.now(), name:c.name, rarity:null, story:"", size:c.size||0 };
      events.push(e);
      // gacha が c.rarity を書き込んだ後に一拍置いて控える
      setTimeout(()=>{ try{
        e.rarity = c.rarity || null;
        e.story  = c.story || "";
        e.size   = c.size || e.size;
      }catch(err){ console.error(TAG, err); } }, 0);
    }catch(err){ console.error(TAG, err); }
  });

  SKY.on("cleared", ()=>{
    try{
      flushRemovals();
      events.push({ type:"clear", t:Date.now(), n:liveCount });
      liveCount = 0;
    }catch(err){ console.error(TAG, err); }
  });

  // ---- 紙面の語彙 ------------------------------------------------------
  const LOST_LINES = [
    e=>`${tm(e.t)}ごろ、星がひとつ所在不明に。書き置きは見つかっていない。`,
    e=>`${tm(e.t)}、星一名が帰宅せず。近隣の星は「静かな星だった」と話す。`,
    e=>`${tm(e.t)}ごろ、星ひとつが消灯したまま。電気系統に異常はなかった。`,
    e=>`${tm(e.t)}、星がひとつ行方不明。当局は「よくあること」とだけ述べた。`,
  ];
  const MASS_LINE  = e=>`${tm(e.t)}ごろ、星${e.n}個が約3秒のあいだに相次いで失踪。偶然と断定するには数が多い。`;
  const CLEAR_LINE = e=>`${tm(e.t)}、全天の星${e.n}個が一斉に消失（一面参照）。`;
  const NAMED_LINE = e=>`${tm(e.t)}、新星座「${e.name}」の誕生が届け出られた。`;

  const SPORT_CM = [
    "勝因を問われ、本人は「日頃の瞬き」とだけ答えた。",
    "敗れた側は本紙の取材に応じていない。",
    "観客の星々におおむね被害はなかった。",
    "次戦の予定は未定。夜空に休みはないが、星合戦にはある。",
    "関係者によれば賞品は名誉のみ。夜空は今日も清貧である。",
  ];

  const ADS = [
    "星座保険のさそり生命──おひとつ消えても、安心。",
    "中古ブラックホール高価買取中。査定無料・吸引注意。",
    "家庭用プラネタリウム『本物の夜空に飽きたあなたへ』",
    "流れ星予報アプリ◆当たるとは言っていません",
    "星占い士養成講座（通信）：金星が逆行していても受講できます",
    "月面分譲地、好評販売中。眺望良好（地球が見えます）。",
    "UFO目撃情報、買い取ります。緑色のものは特に高値。",
    "星磨き専門店『シリウス堂』──くすんだ一等星、新品同様に。",
    "隕石保険はじめました。落ちてからでは遅いので。",
    "天の川クルーズ、乗組員募集。泳げる方優遇。",
    "引力に頼らない暮らし、はじめませんか。【反重力工務店】",
    "夜空新聞 定期購読：今ならふたつ目の願いが半額。",
  ];

  // ---- styles ---------------------------------------------------------
  const style = document.createElement("style");
  style.textContent = `
    .${P}-overlay{position:fixed;inset:0;z-index:8;display:flex;align-items:center;
      justify-content:center;background:rgba(3,4,14,.62);backdrop-filter:blur(5px);}
    .${P}-paper{position:relative;display:flex;flex-direction:row;gap:16px;
      width:min(640px,94vw);max-height:86vh;overflow-y:auto;scrollbar-width:thin;
      background:repeating-linear-gradient(0deg,rgba(32,36,44,.025) 0 1px,transparent 1px 3px),#f2ead8;
      color:#20242c;font-family:"Hiragino Mincho ProN","Yu Mincho","YuMincho",serif;
      padding:26px 22px 28px 24px;border-radius:2px;
      box-shadow:3px 4px 0 rgba(32,36,44,.16),8px 10px 0 rgba(32,36,44,.07),0 30px 80px rgba(0,0,0,.65);}
    .${P}-paper::-webkit-scrollbar{width:7px}
    .${P}-paper::-webkit-scrollbar-thumb{background:rgba(32,36,44,.3);border-radius:4px}
    .${P}-close{position:absolute;top:6px;left:8px;border:none;background:none;color:rgba(32,36,44,.55);
      font-size:15px;line-height:1;padding:6px;cursor:pointer;transition:.2s;font-family:inherit;}
    .${P}-close:hover{color:#20242c;transform:rotate(90deg);}
    .${P}-content{flex:1 1 auto;min-width:0;}
    .${P}-mast{flex:none;border-left:1px solid rgba(32,36,44,.7);padding-left:13px;margin-left:2px;}
    .${P}-mtitle{writing-mode:vertical-rl;font-size:clamp(30px,6vh,42px);font-weight:800;
      letter-spacing:.2em;line-height:1;margin:0 auto;}
    .${P}-mslogan{writing-mode:vertical-rl;font-size:10px;letter-spacing:.42em;
      color:rgba(32,36,44,.6);margin:14px auto 0;}
    .${P}-dateline{display:flex;flex-wrap:wrap;gap:3px 14px;align-items:baseline;font-size:10.5px;
      letter-spacing:.08em;border-bottom:3px double #20242c;padding-bottom:8px;margin-bottom:13px;}
    .${P}-dateline b{font-size:12px;letter-spacing:.14em;}
    .${P}-sec{margin-top:15px;padding-top:12px;border-top:3px double rgba(32,36,44,.7);}
    .${P}-dateline + .${P}-sec{border-top:none;margin-top:0;padding-top:0;}
    .${P}-sech{display:inline-block;background:#20242c;color:#f2ead8;font-size:10px;
      letter-spacing:.34em;padding:2px 7px 2px 11px;margin-bottom:8px;}
    .${P}-gogai{display:inline-block;color:#a3261a;border:2px solid #a3261a;font-weight:700;
      font-size:12px;letter-spacing:.32em;padding:1px 6px 1px 10px;transform:rotate(-4deg);
      margin:0 0 7px 6px;}
    .${P}-headline{font-size:21px;font-weight:700;line-height:1.55;letter-spacing:.04em;margin:1px 0 7px;}

    .${P}-line{font-size:12px;line-height:1.95;padding-left:1em;text-indent:-1em;}
    .${P}-note{font-size:10px;color:rgba(32,36,44,.6);margin-top:4px;}

    .${P}-sport{margin-top:7px;}

    .${P}-ad{border:1px solid rgba(32,36,44,.6);padding:7px 10px;font-size:11.5px;line-height:1.85;
      margin-top:8px;background:rgba(32,36,44,.028);}

      border:1px solid rgba(32,36,44,.4);padding:0 4px 0 6px;margin-right:8px;vertical-align:1px;}

  document.head.append(style);

  // ---- 紙面の組版 ------------------------------------------------------
  const latest = pred => { for(let i=events.length-1;i>=0;i--){ if(pred(events[i])) return events[i]; } return null; };
  const battleWinners = () => SKY.constellations.filter(c =>
    c && c.name && typeof c.story === "string" && c.story.includes("星合戦を制した"));
  const sec = (label, inner) => `<div class="${P}-sec"><span class="${P}-sech">${esc(label)}</span>${inner}</div>`;

  function frontSection(winners){
    const clearE = latest(e=>e.type==="clear");
    const massE  = latest(e=>e.type==="mass");
    const rareE  = latest(e=>e.type==="named" && (e.rarity==="UR" || e.rarity==="SSR"));
    const namedE = latest(e=>e.type==="named");
    let stamp = "", hl, body;
    if(clearE){
      stamp = `<span class="${P}-gogai">号外</span>`;
      hl = "天体一斉消失　夜空、在庫ゼロに";
      body = `本日${tm(clearE.t)}、観測中だった星${clearE.n}個がひとつ残らず消失した。当局は「まっさらである」と現状を認めたうえで、原因については沈黙を守っている。${WITNESS}`;
    } else if(massE){
      hl = `星${massE.n}個、一夜にして大量失踪`;
      body = `${tm(massE.t)}ごろ、${massE.n}個の星が約3秒のあいだに相次いで所在不明となった。偶然にしては手際が良すぎる、と匿名の天文関係者は語る。${WITNESS}`;
    } else if(rareE){
      hl = `${rareE.rarity}級星座「${rareE.name}」誕生`;
      body = `${tm(rareE.t)}、夜空に星座「${rareE.name}」が出現した。鑑定の結果、希少度は${rareE.rarity}。市場関係者は「そうそう出るものではない」と興奮を隠しきれない様子だった。なお、当紙の占い欄とは無関係である。`;
    } else if(winners.length){
      const w = winners[winners.length-1];
      hl = `${w.name}、星合戦を制す`;
      body = `夜空を二分した星合戦は、${w.name}の勝利で幕を閉じた。主催者は「星に被害はない」と繰り返し強調している。詳報はスポーツ面。`;
    } else if(namedE){
      hl = `新星座「${namedE.name}」誕生`;
      body = `${tm(namedE.t)}、${namedE.size || "数"}個の星からなる新星座「${namedE.name}」が確認された。命名の経緯について、空は例によって何も語っていない。詳しくは文化面。`;
    } else {
      hl = "本日、夜空は平和";
      body = "特筆すべき事件は確認されなかった。星は定刻どおりに瞬き、記者は定刻どおりに欠伸をした。平和は当面続く見込みだが、当紙は油断を続ける方針である。";
    }
    return sec("一面", `${stamp}<div class="${P}-headline">${esc(hl)}</div><div class="${P}-body">${esc(body)}</div>`);
  }

  function societySection(){
    const lines = [];
    let lost = 0;
    for(const e of events){
      if(e.type==="lost"){ lost++; lines.push(SKY.pick(LOST_LINES)(e)); }
      else if(e.type==="mass"){ lost += e.n; lines.push(MASS_LINE(e)); }
      else if(e.type==="clear"){ lines.push(CLEAR_LINE(e)); }
      else if(e.type==="named"){ lines.push(NAMED_LINE(e)); }
    }
    if(!born && !lines.length) return "";
    let omitted = 0;
    if(lines.length > 7){ omitted = lines.length - 7; lines.splice(0, omitted); }
    return sec("社会面",
      `<div class="${P}-tally">今夜の出生：${esc(born)}星　／　行方不明：${esc(lost)}星</div>` +
      lines.map(l=>`<div class="${P}-line">▼ ${esc(l)}</div>`).join("") +
      (omitted ? `<div class="${P}-note">（紙幅の都合により、ほか${esc(omitted)}件は割愛した）</div>` : ""));
  }

  function cultureSection(){
    const e = latest(ev=>ev.type==="named");
    if(!e) return "";
    const story = e.story || "";
    const ex = story ? (story.length > 60 ? story.slice(0,60) + "…" : story) : "（神話は現在取材中）";
    return sec("文化面",
      `<div class="${P}-cname">${esc(e.name)}</div>` +
      `<div class="${P}-cmeta">希少度：${esc(e.rarity || "鑑定中")}　／　${esc(e.size || "?")}星構成</div>` +
      `<div class="${P}-body">${esc(ex)}</div>` +
      `<div class="${P}-note">${esc("（神話面に続く…続かない）")}</div>`);
  }

  function sportsSection(winners){
    if(!winners.length) return "";
    return sec("スポーツ面", winners.map(c =>
      `<div class="${P}-sport"><b>${esc(c.name + "、星合戦を制す")}</b>` +
      `<div class="${P}-body">${esc(SKY.pick(SPORT_CM))}</div></div>`).join(""));
  }

  function adsSection(){
    const pool = ADS.slice(), picked = [];
    for(let i=0;i<2 && pool.length;i++) picked.push(pool.splice((Math.random()*pool.length)|0, 1)[0]);
    return sec("広告", picked.map(a =>
      `<div class="${P}-ad"><span class="${P}-adlabel">広告</span>${esc(a)}</div>`).join(""));
  }

  function nextIssue(){
    let n = 1;
    try{
      n = (parseInt(localStorage.getItem(KEY_ISSUE), 10) || 0) + 1;
      localStorage.setItem(KEY_ISSUE, String(n));
    }catch(err){ console.error(TAG, "issue", err); }
    return n;
  }
  function dateLabel(){
    const d = new Date(), w = "日月火水木金土"[d.getDay()];
    return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（${w}）`;
  }

  // ---- modal ----------------------------------------------------------
  let overlay = null;
  function onKey(e){ if(e.key === "Escape") closePaper(); }
  function closePaper(){
    try{
      if(!overlay) return;
      const o = overlay; overlay = null;
      document.removeEventListener("keydown", onKey);
      o.animate([{opacity:1},{opacity:0}], {duration:200, easing:"ease-out", fill:"forwards"})
        .onfinish = ()=>o.remove();
    }catch(err){ console.error(TAG, err); }
  }

  function openPaper(){
    try{
      closePaper();
      flushRemovals();                        // 締め切り：進行中の失踪も紙面に間に合わせる
      const winners = battleWinners();
      const o = document.createElement("div");
      o.className = `${P}-overlay`;
      const paper = document.createElement("div");
      paper.className = `${P}-paper`;
      paper.innerHTML =
        `<button class="${P}-close" aria-label="閉じる">✕</button>` +
        `<div class="${P}-content">` +
          `<div class="${P}-dateline"><b>${esc(`第${nextIssue()}号`)}</b>` +
            `<span>${esc(dateLabel())}</span>` +
            `<span>${esc("夜空新聞社発行／購読料：ひとつの願い")}</span></div>` +
          frontSection(winners) +
          societySection() +
          cultureSection() +
          sportsSection(winners) +
          adsSection() +
          `<div class="${P}-foot">${esc("本紙は夜空で起きたことのみを報じます。起きなかったことは報じません。")}</div>` +
        `</div>` +
        `<div class="${P}-mast"><div class="${P}-mtitle">${esc("夜空新聞")}</div>` +
          `<div class="${P}-mslogan">${esc("眠らぬ者の友")}</div></div>`;
      o.append(paper);
      document.body.append(o);
      overlay = o;
      o.addEventListener("click", e => { if(e.target === o) closePaper(); });
      paper.querySelector(`.${P}-close`).addEventListener("click", e => { e.stopPropagation(); closePaper(); });
      document.addEventListener("keydown", onKey);
      o.animate([{opacity:0},{opacity:1}], {duration:220, easing:"ease-out"});
      paper.animate(
        [{transform:"translateY(16px) rotate(.8deg) scale(.97)", opacity:0},
         {transform:"translateY(0) rotate(0deg) scale(1)", opacity:1}],
        {duration:380, easing:"cubic-bezier(.2,1.2,.35,1)"});
    }catch(err){ console.error(TAG, err); }
  }

  try{ SKY.addButton("🗞 夜空新聞", openPaper); }
  catch(err){ console.error(TAG, err); }
})();
</script>
<script>
// ════ plugin: asa-ga-kuru (wave3) ════ Plugin "asa-ga-kuru" (朝が来る): paste verbatim into its own <script> tag after wave-2 plugins, before sharelink. 44s cycle, all phases computed from performance.now() elapsed time inside one rAF loop (ba
(()=>{ "use strict";
  if(!window.SKY) return;
  try{
    const SKY = window.SKY;
    const TAG = "[asa-ga-kuru]";

    // ---------- style ----------
    const style = document.createElement("style");
    style.textContent = `
      .asa-ga-kuru-overlay{position:fixed;inset:0;pointer-events:none;z-index:2;opacity:0;}
      .asa-ga-kuru-sun{position:absolute;left:57%;bottom:-32%;width:17vmin;height:17vmin;
        margin-left:-8.5vmin;border-radius:50%;
        background:radial-gradient(circle at 50% 42%,#fffdf2 0%,#ffedb8 38%,#ffc168 62%,rgba(255,160,80,0) 74%);
        box-shadow:0 0 9vmin 3.5vmin rgba(255,196,110,.5),0 0 26vmin 10vmin rgba(255,170,90,.22);}
    `;
    document.head.append(style);

    // ---------- timeline (seconds; everything is elapsed-wall-time driven) ----------
    const TOTAL = 44;            // 夜明け8 + 日の出10 + 朝10 + 夕暮れ8 + 夜へ8
    const DIM = 0.08;
    const hx = h => [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)];
    const NIGHT   = ["#06081f","#0a0f2e","#141233","#241a38"].map(hx);
    const BLUSH   = ["#101b42","#2c3168","#8e4f6d","#ffae6e"].map(hx);
    const MORNING = ["#7fb5e6","#a9d2f0","#ffe9c8","#fff4da"].map(hx);
    const DUSK    = ["#28284f","#553a63","#c66a5b","#ff9550"].map(hx);
    const GRAD_KEYS = [[0,NIGHT],[8,BLUSH],[16,MORNING],[27,MORNING],[33,DUSK],[40,NIGHT],[TOTAL,NIGHT]];

    const clamp01 = v => v<0?0:v>1?1:v;
    const lerp = (a,b,f)=>a+(b-a)*f;
    const easeOutCubic = f => 1-Math.pow(1-f,3);
    const easeInCubic  = f => f*f*f;

    function gradientAt(el){
      let a=GRAD_KEYS[0], b=GRAD_KEYS[GRAD_KEYS.length-1];
      for(let i=0;i<GRAD_KEYS.length-1;i++){
        if(el>=GRAD_KEYS[i][0] && el<=GRAD_KEYS[i+1][0]){ a=GRAD_KEYS[i]; b=GRAD_KEYS[i+1]; break; }
      }
      const f = a[0]===b[0] ? 0 : clamp01((el-a[0])/(b[0]-a[0]));
      const st = a[1].map((c0,i)=>{ const c1=b[1][i];
        return `rgb(${Math.round(lerp(c0[0],c1[0],f))},${Math.round(lerp(c0[1],c1[1],f))},${Math.round(lerp(c0[2],c1[2],f))})`; });
      return `linear-gradient(180deg, ${st[0]} 0%, ${st[1]} 55%, ${st[2]} 80%, ${st[3]} 100%)`;
    }
    function overlayOpacity(el){
      if(el<6)  return clamp01(el/6);
      if(el<37) return 1;
      return clamp01(1-(el-37)/7);
    }
    function sunBottom(el){
      const LOW=-32, HIGH=30;
      if(el<6)  return LOW;
      if(el<18) return lerp(LOW,HIGH,easeOutCubic((el-6)/12));   // 日の出
      if(el<28) return HIGH;                                      // 朝のまどろみ
      if(el<36) return lerp(HIGH,LOW,easeInCubic((el-28)/8));     // 夕暮れ
      return LOW;
    }
    function starOpacity(el, from){
      if(el<8)  return lerp(from,DIM,clamp01(el/8));
      if(el<36) return DIM;
      return lerp(DIM,from,clamp01((el-36)/7));
    }

    // ---------- birds (lazy WebAudio; own context, quiet) ----------
    let actx=null, birdBus=null, birds=[];
    function ensureAudio(){
      try{
        if(!actx){
          const AC = window.AudioContext || window.webkitAudioContext;
          if(!AC) return null;
          actx = new AC();
          birdBus = actx.createGain();
          birdBus.gain.value = 0;
          birdBus.connect(actx.destination);
        }
        if(actx.state==="suspended") actx.resume().catch(()=>{});
        return actx;
      }catch(err){ console.error(TAG+" audio", err); return null; }
    }
    function initBirds(){
      const n = 2 + (Math.random()*3|0);               // 2〜4羽、それぞれの声で
      birds = Array.from({length:n}, ()=>({
        base: 2000 + Math.random()*1700,
        next: 9 + Math.random()*3,
      }));
    }
    function birdEnv(el){                              // バスの聞こえ方(0..1)
      if(el<9)  return 0;
      if(el<12) return (el-9)/3;
      if(el<31) return 1;
      if(el<35) return 1-(el-31)/4;
      return 0;
    }
    function chirp(t, base){
      const o = actx.createOscillator(); o.type="sine";
      const g = actx.createGain();
      const f0 = base*(0.8+Math.random()*0.15);
      const f1 = base*(1.15+Math.random()*0.25);
      const dur = 0.08 + Math.random()*0.06;
      o.frequency.setValueAtTime(f0, t);
      o.frequency.exponentialRampToValueAtTime(f1, t+dur*0.7);
      g.gain.setValueAtTime(0.0001, t);
      g.gain.exponentialRampToValueAtTime(0.5+Math.random()*0.4, t+0.012);
      g.gain.exponentialRampToValueAtTime(0.0001, t+dur);
      o.connect(g); g.connect(birdBus);
      o.start(t); o.stop(t+dur+0.03);
      o.onended = ()=>{ try{ g.disconnect(); }catch(_){} };
    }
    function scheduleCluster(b){                       // 不規則なひとさえずり(2〜5声)
      try{
        let t = actx.currentTime + 0.02 + Math.random()*0.1;
        const n = 2 + (Math.random()*4|0);
        for(let i=0;i<n;i++){ chirp(t, b.base); t += 0.07 + Math.random()*0.1; }
      }catch(err){ console.error(TAG+" chirp", err); }
    }
    function birdsTick(el){
      if(!actx || !birdBus) return;
      try{
        birdBus.gain.value = 0.08 * birdEnv(el);
        if(el<9 || el>33) return;
        for(const b of birds){
          if(el >= b.next){ scheduleCluster(b); b.next = el + 1.4 + Math.random()*3.2; }
        }
      }catch(err){ console.error(TAG+" birds", err); }
    }

    // ---------- the cycle ----------
    let running=false, btn=null, overlay=null, sun=null;
    let t0=0, toasted=false, saved=null, safetyT=null;

    function snapshotOpacities(){
      const num = el => { const v = parseFloat(getComputedStyle(el).opacity); return isFinite(v)?v:1; };
      return {
        worldStr: SKY.gWorld.style.opacity,  worldNum: num(SKY.gWorld),
        nebStr:   SKY.gNebula.style.opacity, nebNum:   num(SKY.gNebula),
      };
    }
    function restoreOpacities(){
      if(!saved) return;
      try{ SKY.gWorld.style.opacity  = saved.worldStr; }catch(_){}
      try{ SKY.gNebula.style.opacity = saved.nebStr;  }catch(_){}
    }
    function teardown(){
      clearTimeout(safetyT); safetyT=null;
      restoreOpacities(); saved=null;
      try{ if(overlay) overlay.remove(); }catch(_){}
      overlay=null; sun=null; birds=[];
      try{ if(birdBus) birdBus.gain.value = 0; }catch(_){}
      setTimeout(()=>{ try{ if(!running && actx && actx.state==="running") actx.suspend().catch(()=>{}); }catch(_){} }, 300);
      running=false;
      if(btn) btn.style.opacity="";
    }
    function abort(){ try{ teardown(); }catch(err){ console.error(TAG+" abort", err); running=false; } }

    function tick(now){
      if(!running) return;
      try{
        const el = (now - t0)/1000;
        if(el >= TOTAL){ teardown(); return; }
        overlay.style.background = gradientAt(el);
        overlay.style.opacity = overlayOpacity(el).toFixed(3);
        sun.style.bottom = sunBottom(el).toFixed(2) + "%";
        SKY.gWorld.style.opacity  = starOpacity(el, saved.worldNum).toFixed(3);
        SKY.gNebula.style.opacity = starOpacity(el, saved.nebNum).toFixed(3);
        if(!toasted && el>=18){ toasted=true; SKY.toast("おはようございます。星たちは、また夜に"); }
        birdsTick(el);
        requestAnimationFrame(tick);
      }catch(err){ console.error(TAG, err); abort(); }
    }

    function startCycle(){
      running = true; toasted = false;
      btn.style.opacity = ".5";
      saved = snapshotOpacities();
      overlay = document.createElement("div");
      overlay.className = "asa-ga-kuru-overlay";
      overlay.style.background = gradientAt(0);
      sun = document.createElement("div");
      sun.className = "asa-ga-kuru-sun";
      overlay.append(sun);
      document.body.append(overlay);
      if(ensureAudio()) initBirds();        // 音が出せない夜空でも、朝は来る
      t0 = performance.now();
      // 背面タブで rAF が止まっても、壁時計で必ず夜へ帰す保険
      safetyT = setTimeout(()=>{ try{ if(running) teardown(); }catch(err){ console.error(TAG, err); } }, (TOTAL+4)*1000);
      requestAnimationFrame(tick);
      SKY.toast("東の空が、しらみはじめました");
    }

    btn = SKY.addButton("🌅 朝を呼ぶ", ()=>{
      try{
        if(running) return;                 // 朝は一日に一度ずつ
        startCycle();
      }catch(err){ console.error(TAG+" start", err); abort(); }
    });
  }catch(err){ console.error("[asa-ga-kuru] init", err); }
})();

<script>
// ════ plugin: seiza-no-kemono (wave3) ════ Plugin 星座の獣 (seiza-no-kemono). Paste verbatim into its own <script> tag after wave-2 plugins, before sharelink. Integration notes: (1) Per-card 「🐾 起こす」 action follows the seiza-cert convention — visib
(()=>{ "use strict";
  if(!window.SKY) return;
  const SKY = window.SKY;
  const TAG = "[seiza-no-kemono]";

  /* ---------- style: per-card action, native .reroll flavour ---------- */
  try{
    const style = document.createElement("style");
    style.textContent = `
      .seiza-no-kemono-act{display:none;font-size:11px;color:var(--line);margin:8px 12px 0 14px;
        cursor:pointer;letter-spacing:.04em;user-select:none;transition:.18s}
      .card.open .seiza-no-kemono-act{display:inline-block}
      .seiza-no-kemono-act:hover{color:var(--accent);text-decoration:underline}`;
    document.head.append(style);
  }catch(err){ console.error(TAG, "style", err); }

  /* ---------- helpers ---------- */
  const esc = s => String(s).replace(/[&<>"']/g,
    m => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));
  const easeIO = t => t < .5 ? 4*t*t*t : 1 - Math.pow(-2*t+2, 3)/2;

  let active = null;   // the one beast allowed to walk at a time

  /* ---------- random stroll: 3-4 waypoints with some leg length ---------- */
  function wander(origin){
    const n = 3 + (Math.random() < .5 ? 0 : 1);
    const pts = []; let prev = origin;
    const minLeg = Math.min(SKY.W, SKY.H) * .22;
    for(let i = 0; i < n; i++){
      let p = null;
      for(let g = 0; g < 24 && !p; g++){
        const cand = { x: SKY.W*(.12 + Math.random()*.76), y: SKY.H*(.14 + Math.random()*.68) };
        if(Math.hypot(cand.x - prev.x, cand.y - prev.y) > minLeg) p = cand;
      }
      if(!p) p = { x: SKY.W*(.12 + Math.random()*.76), y: SKY.H*(.14 + Math.random()*.68) };
      pts.push(p); prev = p;
    }
    return pts;
  }

  /* ---------- dim / restore the real constellation ---------- */
  function dimReal(st){
    for(const m of st.members){
      if(!m.el || !m.el.isConnected) continue;
      if(!st.prevStar.has(m)) st.prevStar.set(m, m.el.style.opacity);
      m.el.style.opacity = ".15";
    }
    for(const line of [...SKY.gEdges.children]){
      if(line.dataset.cid !== st.cidStr) continue;
      if(!st.prevEdge.has(line)) st.prevEdge.set(line, line.getAttribute("stroke-opacity") || ".55");
      line.setAttribute("stroke-opacity", ".05");
    }
  }
  function restoreReal(st, dur){
    try{
      for(const m of st.members){
        if(!m.el || !m.el.isConnected) continue;
        const prev = st.prevStar.has(m) ? st.prevStar.get(m) : "";
        m.el.style.opacity = prev;
        const target = prev === "" ? 1 : (parseFloat(prev) || 1);
        try{ m.el.animate([{opacity:.15},{opacity:target}], {duration:dur, easing:"ease-out"}); }catch(_){}
      }
      for(const line of [...SKY.gEdges.children]){
        if(line.dataset.cid !== st.cidStr) continue;
        line.setAttribute("stroke-opacity", st.prevEdge.has(line) ? st.prevEdge.get(line) : ".55");
        try{ line.animate([{opacity:0},{opacity:1}], {duration:dur, easing:"ease-out"}); }catch(_){}
      }
    }catch(err){ console.error(TAG, "restore", err); }
  }

  /* ---------- build the ghost beast in gShoot (sky coords) ---------- */
  function buildState(c){
    const members = c.indices.map(i => SKY.stars[i]);
    if(members.some(m => !m) || members.length < 2) return null;

    const skyPts = members.map(m => SKY.worldToSky(m.x, m.y));
    const origin = {
      x: skyPts.reduce((a,p)=>a+p.x, 0) / skyPts.length,
      y: skyPts.reduce((a,p)=>a+p.y, 0) / skyPts.length,
    };
    const rel = skyPts.map(p => ({ x: p.x - origin.x, y: p.y - origin.y }));
    const relByGi = new Map();
    c.indices.forEach((gi, k) => relByGi.set(gi, rel[k]));

    const root  = SKY.mk("g");                  // position along the path
    const tilt  = SKY.mk("g");                  // gentle rotation
    const breath= SKY.mk("g");                  // scale pulse
    const lines = SKY.mk("g");
    root.setAttribute("pointer-events", "none");
    root.append(tilt); tilt.append(breath); breath.append(lines);
    for(const g of [tilt, breath]){
      g.style.transformBox = "fill-box";
      g.style.transformOrigin = "center";
    }
    const anims = [];

    // edges -> shimmering lines
    for(const [i, j] of (c.edges || [])){
      const a = relByGi.get(i), b = relByGi.get(j);
      if(!a || !b) continue;
      const line = SKY.mk("line", { x1:a.x, y1:a.y, x2:b.x, y2:b.y,
        stroke:"var(--line)", "stroke-width":1.1, "stroke-opacity":.7,
        "stroke-linecap":"round", filter:"url(#line-glow)" });
      lines.append(line);
      anims.push(line.animate([{opacity:.85},{opacity:.3},{opacity:.85}],
        {duration:1700 + Math.random()*1400, delay:Math.random()*900,
         iterations:Infinity, easing:"ease-in-out"}));
    }

    // stars -> halo + core clones
    members.forEach((m, k) => {
      breath.append(
        SKY.mk("circle", {cx:rel[k].x, cy:rel[k].y, r:(m.mag*3).toFixed(2),
          fill:"url(#glow)", opacity:.8}),
        SKY.mk("circle", {cx:rel[k].x, cy:rel[k].y, r:m.mag.toFixed(2), fill:"var(--star)"})
      );
    });

    // two blinking eyes near the brightest star's ghost
    let bk = 0;
    members.forEach((m, k) => { if(m.mag > members[bk].mag) bk = k; });
    const bx = rel[bk].x, by = rel[bk].y - members[bk].mag - 2.5;
    const eyeOff = Math.max(2.6, members[bk].mag * 1.1);
    const blinkDur = 2200 + Math.random()*1700;
    for(const ex of [bx - eyeOff, bx + eyeOff]){
      const eye = SKY.mk("circle", {cx:ex, cy:by, r:1.6, fill:"#fff"});
      eye.style.transformBox = "fill-box";
      eye.style.transformOrigin = "center";
      breath.append(eye);
      anims.push(eye.animate([
        {transform:"scaleY(1)",   offset:0},
        {transform:"scaleY(1)",   offset:.9},
        {transform:"scaleY(.08)", offset:.94},
        {transform:"scaleY(1)",   offset:.98},
        {transform:"scaleY(1)",   offset:1},
      ], {duration:blinkDur, iterations:Infinity}));
    }

    // breathing (±4%) + gentle tilt (±8deg)
    anims.push(breath.animate(
      [{transform:"scale(1)"},{transform:"scale(1.04)"},{transform:"scale(1)"},
       {transform:"scale(.96)"},{transform:"scale(1)"}],
      {duration:3800 + Math.random()*1200, iterations:Infinity, easing:"ease-in-out"}));
    anims.push(tilt.animate(
      [{transform:"rotate(0deg)"},{transform:"rotate(8deg)"},{transform:"rotate(0deg)"},
       {transform:"rotate(-8deg)"},{transform:"rotate(0deg)"}],
      {duration:7600 + Math.random()*2400, iterations:Infinity, easing:"ease-in-out"}));

    // wandering path: origin -> waypoints -> origin, duration split by distance
    const T = 14000 + Math.random()*4000;
    const pts = [origin, ...wander(origin), origin];
    const segs = []; let total = 0;
    for(let i = 0; i < pts.length - 1; i++){
      const len = Math.hypot(pts[i+1].x - pts[i].x, pts[i+1].y - pts[i].y);
      segs.push({ a: pts[i], b: pts[i+1], len });
      total += len;
    }
    let acc = 0;
    for(const s of segs){ s.t0 = acc; acc += T * (total > 1 ? s.len/total : 1/segs.length); s.t1 = acc; }

    const trail = SKY.mk("g");
    trail.setAttribute("pointer-events", "none");

    const st = {
      cid: c.id, cidStr: String(c.id), name: c.name,
      members, idSet: new Set(members.map(m => m.id)),
      origin, ghost: root, trail, anims,
      prevStar: new Map(), prevEdge: new Map(),
      cur: { x: origin.x, y: origin.y },
      segs, T, dead: false, phase: "walk", disposed: false,
    };
    setPos(st, origin.x, origin.y);
    return st;
  }

  function setPos(st, x, y){
    st.cur.x = x; st.cur.y = y;
    st.ghost.setAttribute("transform", `translate(${x.toFixed(1)} ${y.toFixed(1)})`);
  }

  /* ---------- stardust trail ---------- */
  function spawnDust(st){
    if(st.trail.childElementCount > 26) return;
    const x = st.cur.x + (Math.random()-.5)*12;
    const y = st.cur.y + (Math.random()-.5)*12;
    const d = SKY.mk("circle", {cx:x, cy:y, r:(Math.random()*1.3 + .7).toFixed(2),
      fill:"var(--star)", opacity:.8});
    st.trail.append(d);
    try{
      d.animate([
        {opacity:.8, transform:"translate(0,0)"},
        {opacity:0,  transform:`translate(${((Math.random()-.5)*8).toFixed(1)}px, ${(4+Math.random()*6).toFixed(1)}px)`},
      ], {duration:1200, easing:"ease-out", fill:"forwards"}).onfinish = ()=>d.remove();
    }catch(_){ setTimeout(()=>d.remove(), 1200); }
  }

  /* ---------- teardown ---------- */
  function fadeOutGhost(st, ms){
    const fin = ()=>{
      if(st.disposed) return;
      st.disposed = true;
      for(const a of st.anims){ try{ a.cancel(); }catch(_){} }
      st.ghost.remove();
      setTimeout(()=>{ try{ st.trail.remove(); }catch(_){} }, 1300);
    };
    try{
      const a = st.ghost.animate([{opacity:1},{opacity:0}],
        {duration:ms, easing:"ease-out", fill:"forwards"});
      a.onfinish = fin;
      setTimeout(fin, ms + 900);   // safety net if onfinish never fires
    }catch(err){ console.error(TAG, err); fin(); }
  }

  function finish(st){
    if(st.dead) return;
    st.dead = true; st.phase = "fading";
    try{
      setPos(st, st.origin.x, st.origin.y);
      SKY.toast(`${st.name}は、また眠りについた`);
      fadeOutGhost(st, 1500);
      restoreReal(st, 1500);
    }catch(err){ console.error(TAG, err); fadeOutGhost(st, 200); restoreReal(st, 200); }
    if(active === st) active = null;
  }

  function abort(st, withToast){
    if(st.dead) return;
    st.dead = true; st.phase = "fading";
    try{
      if(withToast) SKY.toast(`${st.name}の散歩は、夢のように途切れた`);
      fadeOutGhost(st, 450);
      restoreReal(st, 600);
    }catch(err){ console.error(TAG, err); }
    if(active === st) active = null;
  }

  /* ---------- the stroll (elapsed-wall-time driven) ---------- */
  function startWalk(st){
    const t0 = performance.now();
    let lastTick = t0;
    function frame(now){
      if(st.dead) return;
      try{
        const e = now - t0;
        if(e >= st.T){ finish(st); return; }
        let seg = st.segs[st.segs.length - 1];
        for(const s of st.segs){ if(e < s.t1){ seg = s; break; } }
        const u = Math.min(1, Math.max(0, (e - seg.t0) / Math.max(1, seg.t1 - seg.t0)));
        const k = easeIO(u);
        setPos(st, seg.a.x + (seg.b.x - seg.a.x)*k, seg.a.y + (seg.b.y - seg.a.y)*k);
        if(now - lastTick > 180){
          lastTick = now;
          spawnDust(st);
          dimReal(st);   // re-assert: hover-highlight / recompute may have stomped opacities
        }
        requestAnimationFrame(frame);
      }catch(err){
        console.error(TAG, "walk", err);
        abort(st, false);
      }
    }
    requestAnimationFrame(frame);
  }

  /* ---------- wake ---------- */
  function wake(cid){
    try{
      if(active){ SKY.toast("いまは別の星座が散歩中です"); return; }
      const c = SKY.constellations.find(x => x.id === cid);
      if(!c || !c.name || !c.indices || c.indices.length < 2){
        SKY.toast("その星座は、もう空にいないようです"); return;
      }
      const st = buildState(c);
      if(!st){ SKY.toast("その星座は、まだ深く眠っているようです"); return; }
      active = st;
      dimReal(st);
      SKY.gShoot.append(st.trail, st.ghost);
      try{ st.ghost.animate([{opacity:0},{opacity:1}], {duration:420, easing:"ease-out"}); }catch(_){}
      SKY.toast(`${st.name}が、目を覚ました`);
      startWalk(st);
    }catch(err){
      console.error(TAG, "wake", err);
      if(active){ abort(active, false); }
    }
  }

  /* ---------- abort triggers ---------- */
  SKY.on("star-removed", star => {
    try{ if(active && !active.dead && active.idSet.has(star.id)) abort(active, true); }
    catch(err){ console.error(TAG, err); }
  });
  SKY.on("cleared", () => {
    try{ if(active) abort(active, false); }
    catch(err){ console.error(TAG, err); }
  });
  SKY.on("recomputed", () => {
    // gEdges is rebuilt on every recompute — re-dim the fresh lines mid-walk
    try{ if(active && !active.dead && active.phase === "walk") dimReal(active); }
    catch(err){ console.error(TAG, err); }
  });

  /* ---------- per-card action (cards rebuilt every panel render) ---------- */
  SKY.on("panel-rendered", ({container}) => {
    try{
      container.querySelectorAll(".card").forEach(card => {
        if(card.querySelector(".seiza-no-kemono-act")) return;
        const cid = Number(card.dataset.cid);
        const act = document.createElement("span");
        act.className = "seiza-no-kemono-act";
        act.textContent = "🐾 起こす";
        act.title = esc("星座を起こして、夜空を散歩させる");
        act.addEventListener("click", e => {
          e.stopPropagation();
          try{ wake(cid); }catch(err){ console.error(TAG, err); }
        });
        card.append(act);
      });
    }catch(err){ console.error(TAG, err); }
  });

  // reflect onto the already-rendered panel
  try{ SKY.refreshPanel(); }catch(err){ console.error(TAG, err); }
})();
