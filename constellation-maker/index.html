  f.style.transformBox = "fill-box"; f.style.transformOrigin = "center";
  SKY.gWorld.append(f);
  f.animate([{opacity:1, transform:"scale(1)"},{opacity:0, transform:"scale(3.4)"}],
    {duration:300, easing:"ease-out"}).onfinish = ()=>{ try{ f.remove(); }catch(_){} };
}
function sparkles(hx, hy){
  for(let i=0;i<10;i++){
    const a = Math.random()*Math.PI*2, d = 22 + Math.random()*44;
    const c = SKY.mk("circle",{cx:hx, cy:hy, r:(1+Math.random()*1.6).toFixed(2), fill:"#fff", filter:"url(#soft)"});
    SKY.gWorld.append(c);
    c.animate(
      [{transform:"translate(0,0)", opacity:.95},
       {transform:`translate(${(Math.cos(a)*d).toFixed(1)}px,${(Math.sin(a)*d).toFixed(1)}px)`, opacity:0}],
      {duration:520+Math.random()*380, easing:"cubic-bezier(.1,.7,.3,1)"}
    ).onfinish = ()=>{ try{ c.remove(); }catch(_){} };
  }
}
function evaporate(hole, scaler, hx, hy){
  const a = scaler.animate(
    [{transform:"scale(1)", opacity:1},
     {transform:"scale(1.12)", opacity:1, offset:.25},
     {transform:"scale(0)", opacity:0}],
    {duration:680, easing:"cubic-bezier(.6,0,.8,.3)", fill:"forwards"});
  a.onfinish = ()=>{ try{ hole.remove(); }catch(_){} };
  setTimeout(()=>{ try{ sparkles(hx, hy); }catch(err){ console.error("[black-hole]", err); } }, 540);
}

// ---------- the hole itself ----------
function spawnHole(hx, hy){
  const mk = SKY.mk;
  const hole = mk("g");
  hole.setAttribute("transform", `translate(${hx} ${hy})`);
  const scaler = mk("g");                      // CSS-transform layer (birth / wobble / evaporation)
  scaler.style.transformBox = "fill-box";
  scaler.style.transformOrigin = "center";
  hole.append(scaler);

  // accretion disk: three tilted dashed ellipses, slowly tumbling forever
  const disks = [
    {rx:34, ry:11, tilt:-16, dur:3600, dir: 1},
    {rx:47, ry:15, tilt: 22, dur:5200, dir:-1},
    {rx:60, ry:19, tilt:-38, dur:7200, dir: 1},
  ];
  for(const d of disks){
    const tiltG = mk("g",{transform:`rotate(${d.tilt})`});
    const el = mk("ellipse",{rx:d.rx, ry:d.ry, fill:"none",
      stroke:`url(#${PFX}-grad)`, "stroke-width":1.8,
      "stroke-dasharray":"9 13", "stroke-linecap":"round",
      opacity:.85, filter:"url(#line-glow)"});
    el.style.transformBox = "fill-box"; el.style.transformOrigin = "center";
    el.animate([{transform:"rotate(0deg)"},{transform:`rotate(${360*d.dir}deg)`}],
      {duration:d.dur, iterations:Infinity, easing:"linear"});
    tiltG.append(el); scaler.append(tiltG);
  }
  // event horizon: black disk with a thin hot rim
  scaler.append(
    mk("circle",{r:14.6, fill:"none", stroke:"#ffb35e", "stroke-width":1.3, opacity:.9, filter:"url(#line-glow)"}),
    mk("circle",{r:13.4, fill:"#000"})
  );
  SKY.gWorld.append(hole);

  // birth: scale 0 -> 1 with a soft overshoot
  scaler.animate(
    [{transform:"scale(0)"},{transform:"scale(1.15)", offset:.7},{transform:"scale(1)"}],
    {duration:520, easing:"cubic-bezier(.2,1.3,.4,1)"});

  // ---------- gather victims ----------
  const victims = [];
  for(const s of SKY.stars){
    if(claimed.has(s.id)) continue;
    const dx = s.x - hx, dy = s.y - hy, d = Math.hypot(dx, dy);
    if(d <= EAT_R){
      claimed.add(s.id);
      victims.push({s, r0:Math.max(d, 10), a0:Math.atan2(dy, dx),
                    t0:0, dur:1500 + Math.random()*600, done:false});
    }
  }

  // nothing in reach: wobble sadly, then give up
  if(!victims.length){
    setTimeout(()=>{ try{
      const w = scaler.animate(
        [{transform:"scale(1) rotate(0deg)"},
         {transform:"scale(1.02) rotate(-5deg)"},
         {transform:"scale(.97) rotate(4deg)"},
         {transform:"scale(1.01) rotate(-3deg)"},
         {transform:"scale(1) rotate(0deg)"}],
        {duration:1000, easing:"ease-in-out"});
      w.onfinish = ()=>{ try{
        evaporate(hole, scaler, hx, hy);
        SKY.toast("何も食べられませんでした");
      }catch(err){ console.error("[black-hole]", err); } };
    }catch(err){ console.error("[black-hole]", err); } }, 560);
    return;
  }

  // snapshot name -> starIds BEFORE feeding, to mourn fully devoured constellations
  const snapshot = SKY.constellations.filter(c=>c.name).map(c=>({name:c.name, ids:[...c.starIds]}));
  const feed = {aborted:false};
  activeFeeds.add(feed);

  const begin = performance.now() + 430;     // let the birth animation breathe
  victims.forEach((v,i)=>{ v.t0 = begin + i*70 + Math.random()*90; });

  function finishFeast(){
    activeFeeds.delete(feed);
    SKY.recompute();
    evaporate(hole, scaler, hx, hy);
    SKY.toast("ブラックホールは蒸発しました（ホーキング放射）");
    if(feed.aborted) return;
    const alive = new Set(SKY.stars.map(s=>s.id));
    const lost = snapshot.filter(c => !c.ids.some(id => alive.has(id)));
    lost.forEach((c,i)=>{
      setTimeout(()=>{ try{ SKY.toast(`${c.name}は特異点の彼方へ`); }catch(_){} },
        2050 + i*2050);
    });
  }

  // ---------- spiral-in loop ----------
  function tick(now){
    try{
      let pending = false;
      for(const v of victims){
        if(v.done) continue;
        const s = v.s;
        if(!s.el.isConnected){ v.done = true; claimed.delete(s.id); continue; }  // removed elsewhere
        if(now < v.t0){ pending = true; continue; }
        const t = Math.min(1, (now - v.t0)/v.dur);
        const rad = v.r0 * Math.pow(1 - t, 1.55);          // accelerating infall
        const ang = v.a0 + 1.4*t + 4.6*t*t*t;              // tightening swirl
        const x = hx + Math.cos(ang)*rad, y = hy + Math.sin(ang)*rad;
        s.x = x; s.y = y;
        s.core.setAttribute("cx", x); s.core.setAttribute("cy", y);
        s.halo.setAttribute("cx", x); s.halo.setAttribute("cy", y);
        // spaghettification: radial stretch as the horizon nears
        const near = Math.max(0, Math.min(1, (95 - rad)/85));
        if(near > 0){
          const sr = 1 + near*2.6, st = Math.max(.22, 1 - near*.75);
          const deg = ang*180/Math.PI;
          s.el.setAttribute("transform",
            `translate(${x} ${y}) rotate(${deg}) scale(${sr} ${st}) rotate(${-deg}) translate(${-x} ${-y})`);
        }
        if(rad < 8 || t >= 1){
          v.done = true;
          flash(x, y);
          SKY.removeStar(s.id, {recompute:false});
          claimed.delete(s.id);
          continue;
        }
        pending = true;
      }
      if(pending) requestAnimationFrame(tick);
      else finishFeast();
    }catch(err){
      console.error("[black-hole]", err);
      try{ finishFeast(); }catch(_){}
    }
  }
  requestAnimationFrame(tick);
}
})();
</script>

<script>
// ════ plugin: ufo-abduction ════ Paste into its own script tag after the core script. Adds gradient defs with ids ufo-hull/ufo-dome/ufo-beam to SKY.defs (no other plugin should reuse those ids); reuses the host #glow gradient for sta
(()=>{ "use strict";
  if(!window.SKY) return;
  const S = window.SKY;

  /* ---------- one-time gradients ---------- */
  try{
    S.defs.insertAdjacentHTML("beforeend", `
      <linearGradient id="ufo-hull" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#e6ecfa"/>
        <stop offset=".55" stop-color="#9ba8cf"/>
        <stop offset="1" stop-color="#566089"/>
      </linearGradient>
      <linearGradient id="ufo-dome" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#c8f0ff" stop-opacity=".95"/>
        <stop offset="1" stop-color="#5fb6d8" stop-opacity=".5"/>
      </linearGradient>
      <linearGradient id="ufo-beam" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#a4ffb6" stop-opacity=".8"/>
        <stop offset="1" stop-color="#52ff86" stop-opacity=".05"/>
      </linearGradient>`);
  }catch(err){ console.error("[ufo] defs", err); }

  /* ---------- tiny helpers ---------- */
  const wait  = ms => new Promise(r=>setTimeout(r, ms));
  const clamp = (v,a,b)=>Math.max(a, Math.min(b, v));
  const easeIO = t => t<.5 ? 4*t*t*t : 1-Math.pow(-2*t+2,3)/2;
  const easeIn = t => t*t*t;
  function tween(dur, step){
    return new Promise(res=>{
      const t0 = performance.now();
      function fr(now){
        const t = Math.min(1, (now-t0)/dur);
        try{ step(t); }catch(err){ console.error("[ufo] tween", err); res(); return; }
        if(t < 1) requestAnimationFrame(fr); else res();
      }
      requestAnimationFrame(fr);
    });
  }

  let busy = false;
  const alive = id => S.stars.some(s=>s.id===id);

  /* ---------- the saucer (built fresh per visit) ---------- */
  function buildShip(){
    const g     = S.mk("g");   // position (sky coords)
    const bob   = S.mk("g");   // gentle hover bobbing
    const beamG = S.mk("g");   // beam, painted under the hull
    const body  = S.mk("g");
    bob.append(beamG, body); g.append(bob);
    const anims = [];

    body.append(
      S.mk("path",   {d:"M -15 -7 A 15 15 0 0 1 15 -7 Z", fill:"url(#ufo-dome)"}),
      S.mk("ellipse",{cx:-5, cy:-13, rx:4.5, ry:2, fill:"#fff", opacity:.35}),
      S.mk("ellipse",{cx:0, cy:0, rx:36, ry:12, fill:"url(#ufo-hull)",
                      stroke:"rgba(255,255,255,.28)", "stroke-width":.8}),
      S.mk("ellipse",{cx:0, cy:4.5, rx:27, ry:7, fill:"rgba(10,14,36,.4)"})
    );
    // belly lights, blinking in sequence
    [[-21,7.6],[-7,9.5],[7,9.5],[21,7.6]].forEach(([x,y],i)=>{
      const halo = S.mk("circle",{cx:x, cy:y, r:5.5, fill:"url(#glow)"});
      const lamp = S.mk("circle",{cx:x, cy:y, r:2.3, fill:"var(--accent)"});
      body.append(halo, lamp);
      for(const el of [halo, lamp])
        anims.push(el.animate([{opacity:.15},{opacity:1},{opacity:.15}],
          {duration:880, iterations:Infinity, delay:i*200, easing:"ease-in-out"}));
    });
    anims.push(bob.animate(
      [{transform:"translateY(0)"},{transform:"translateY(-5px)"},{transform:"translateY(0)"}],
      {duration:2400, iterations:Infinity, easing:"ease-in-out"}));

    const cur = {x:0, y:0};
    const setPos = (x,y)=>{ cur.x=x; cur.y=y; g.setAttribute("transform",`translate(${x} ${y})`); };
    return { g, beamG, anims, cur, setPos };
  }

  function fly(ship, toX, toY, dur, wob){
    const fx = ship.cur.x, fy = ship.cur.y;
    return tween(dur, t=>{
      const k = easeIO(t);
      const w = wob ? Math.sin(t*Math.PI*5)*wob*(1-t) : 0;
      ship.setPos(fx+(toX-fx)*k, fy+(toY-fy)*k + w);
    });
  }

  function dartAway(ship){
    const fx = ship.cur.x, fy = ship.cur.y;
    const exitX = fx < S.W/2 ? S.W+140 : -140;
    return tween(260, t=>ship.setPos(fx + Math.sin(t*32)*3, fy))   // ぷるぷる…
      .then(()=>tween(900, t=>{
        const zig = (Math.abs(((t*6)%2)-1)*2-1) * 26 * Math.min(1, t*4);
        ship.setPos(fx+(exitX-fx)*easeIn(t), fy + zig);
      }));
  }

  /* ---------- tractor beam ---------- */
  function beamOn(ship, dx, dy){
    const wHalf = 13 + dy*.2;
    const poly = S.mk("polygon",{fill:"url(#ufo-beam)",
      points:`-8,9 8,9 ${dx+wHalf},${dy+15} ${dx-wHalf},${dy+15}`});
    poly.style.transformBox = "fill-box";
    poly.style.transformOrigin = "50% 0%";
    poly.style.transform = "scaleY(0)";
    ship.beamG.append(poly);
    ship.anims.push(ship.beamG.animate(
      [{opacity:.95},{opacity:.55},{opacity:.9},{opacity:.45},{opacity:.95}],
      {duration:620, iterations:Infinity}));
    return new Promise(res=>{
      poly.animate([{transform:"scaleY(0)"},{transform:"scaleY(1)"}],
        {duration:380, easing:"ease-out", fill:"forwards"}).onfinish = res;
    });
  }
  function beamOff(ship){
    const poly = ship.beamG.firstChild;
    if(!poly) return Promise.resolve();
    return new Promise(res=>{
      poly.animate([{transform:"scaleY(1)"},{transform:"scaleY(0)"}],
        {duration:300, easing:"ease-in", fill:"forwards"}).onfinish = ()=>{ poly.remove(); res(); };
    });
  }

  /* ---------- star clones riding the beam ---------- */
  function glowDot(mag){
    const cg = S.mk("g");
    cg.append(S.mk("circle",{r:mag*3.4, fill:"url(#glow)"}),
              S.mk("circle",{r:mag, fill:"var(--star)"}));
    S.gShoot.append(cg);
    return cg;
  }
  function riseStar(sx, sy, mag, ux, uy){
    const cg = glowDot(mag);
    return new Promise(res=>{
      cg.animate([
        {transform:`translate(${sx}px,${sy}px) scale(1)`,    opacity:1},
        {transform:`translate(${ux}px,${uy+5}px) scale(.2)`, opacity:0}
      ],{duration:1150, easing:"cubic-bezier(.55,.05,.65,1)", fill:"forwards"})
       .onfinish = ()=>{ cg.remove(); res(); };
    });
  }
  function dropStar(ux, uy, sx, sy){
    const cg = glowDot(2.2);
    return new Promise(res=>{
      cg.animate([
        {transform:`translate(${ux}px,${uy+5}px) scale(.2)`, opacity:0},
        {transform:`translate(${sx}px,${sy}px) scale(1)`,    opacity:1}
      ],{duration:1000, easing:"cubic-bezier(.35,0,.45,1)", fill:"forwards"})
       .onfinish = ()=>{ cg.remove(); res(); };
    });
  }

  /* ---------- the visit ---------- */
  async function runEvent(){
    if(busy) return;
    busy = true;
    const ship = buildShip();
    try{
      if(!S.stars.length) return;
      const donate = Math.random() < .15;
      const anchor = S.pick(S.stars);
      const aid = anchor.id;

      // donation: pick a free landing spot near the anchor (offset < 120)
      let spot = null;
      if(donate){
        for(let i=0; i<14 && !spot; i++){
          const a = Math.random()*Math.PI*2, d = 40 + Math.random()*75;
          const x = anchor.x + Math.cos(a)*d, y = anchor.y + Math.sin(a)*d;
          if(S.stars.every(s=>Math.hypot(s.x-x, s.y-y) >= 20)) spot = {x, y};
        }
        if(!spot) spot = {x:anchor.x+90, y:anchor.y+40};
      }

      // fly in from off-screen toward a hover point above the target
      const aim = S.worldToSky(donate ? spot.x : anchor.x, donate ? spot.y : anchor.y);
      const hx = clamp(aim.x, 70, S.W-70);
      const hy = clamp(aim.y - 96, 46, S.H-40);
      ship.setPos(hx < S.W/2 ? -90 : S.W+90, clamp(hy - 40 + Math.random()*80, 40, S.H-60));
      S.gShoot.append(ship.g);
      await fly(ship, hx, hy, 1900, 16);
      await wait(380);

      if(!alive(aid)){ await dartAway(ship); return; }   // 目当ての星はもういない

      // fresh ground point (the sky may have turned while we flew)
      const live = S.stars.find(s=>s.id===aid);
      const gp = S.worldToSky(donate ? spot.x : live.x, donate ? spot.y : live.y);
      await beamOn(ship, gp.x-ship.cur.x, gp.y-ship.cur.y);
      await wait(520);

      if(donate){
        await dropStar(ship.cur.x, ship.cur.y, gp.x, gp.y);
        const ns = S.addStar(spot.x, spot.y);
        if(ns){ S.recompute(); S.toast("🛸 ……ひとつ増えてる？"); }
      }else{
        if(!alive(aid)){ await beamOff(ship); await dartAway(ship); return; }
        const st = S.stars.find(s=>s.id===aid);
        const c  = S.constellations.find(k=>k.starIds.has(aid));
        const home = (c && c.name) || "名もなき星";
        st.el.style.visibility = "hidden";
        await riseStar(gp.x, gp.y, st.mag, ship.cur.x, ship.cur.y);
        S.removeStar(aid);
        S.toast(`🛸 ${home}から星がひとつ採取されました`);
      }
      await beamOff(ship);
      await wait(220);
      await dartAway(ship);
    }catch(err){
      console.error("[ufo]", err);
    }finally{
      for(const a of ship.anims){ try{ a.cancel(); }catch(_){} }
      ship.g.remove();
      busy = false;
    }
  }

  /* ---------- scheduling + dock button ---------- */
  let timer = null;
  function schedule(){
    clearTimeout(timer);
    timer = setTimeout(()=>{
      try{ if(!busy && S.stars.length) runEvent(); }
      catch(err){ console.error("[ufo]", err); }
      schedule();
    }, 45000 + Math.random()*35000);
  }
  schedule();

  S.addButton("🛸 UFOを呼ぶ", ()=>{
    try{
      if(busy){ S.toast("もう来ています"); return; }
      if(!S.stars.length){ S.toast("星のない空には、来てくれないようです"); return; }
      runEvent();
    }catch(err){ console.error("[ufo]", err); }
  });
})();
</script>

<script>
// ════ plugin: planetarium-show ════ Paste verbatim into its own <script> tag after the core script. Uses speechSynthesis with a ja-JP voice when available (handles async voiceschanged); otherwise subtitles advance on a ~170ms/char timer
(()=>{ "use strict";
if(!window.SKY) return;
const SKY = window.SKY;

// ====================================================================
//  プラネタリウム上映会 — a guided, narrated tour of your constellations
// ====================================================================

// ---------- style ----------
try{
  const st = document.createElement("style");
  st.textContent = `
  .pshow-root{position:fixed;inset:0;z-index:7;pointer-events:none}
  .pshow-veil{position:absolute;inset:0;pointer-events:auto;opacity:0;transition:opacity 1.1s ease;
    background:radial-gradient(ellipse 60% 52% at 50% 46%, rgba(2,3,10,0) 0%, rgba(2,3,10,.42) 58%, rgba(1,2,8,.93) 100%)}
  .pshow-root.pshow-on .pshow-veil{opacity:1}
  .pshow-close{position:absolute;top:16px;right:16px;z-index:8;pointer-events:auto;cursor:pointer;
    width:38px;height:38px;border-radius:50%;border:1px solid var(--panel-edge);
    background:var(--panel);color:var(--ink);font-size:15px;line-height:1;
    backdrop-filter:blur(10px);transition:.25s;opacity:0}
  .pshow-root.pshow-on .pshow-close{opacity:1}
  .pshow-close:hover{border-color:rgba(160,180,255,.55);background:rgba(30,38,80,.85);transform:rotate(90deg)}
  .pshow-title{position:absolute;left:50%;top:42%;transform:translate(-50%,-50%);z-index:8;
    font-size:clamp(18px,3.2vw,28px);letter-spacing:.14em;color:var(--ink);white-space:nowrap;
    text-shadow:0 0 26px rgba(120,150,255,.55),0 0 4px rgba(0,0,0,.8);opacity:0;pointer-events:none}
  .pshow-sub{position:absolute;left:50%;bottom:30px;transform:translateX(-50%);z-index:8;
    width:min(740px,86vw);padding:13px 22px;border-radius:14px;text-align:center;
    background:var(--panel);border:1px solid var(--panel-edge);backdrop-filter:blur(12px);
    font-size:14px;line-height:2;color:var(--ink);opacity:0;transition:opacity .45s ease;
    box-shadow:0 14px 40px rgba(0,0,0,.45);pointer-events:none}
  .pshow-hidden{opacity:0 !important;pointer-events:none !important;transition:opacity .5s ease !important}`;
  document.head.append(st);
}catch(err){ console.error("[pshow] style", err); }

// ---------- ja-JP voice (handles async voiceschanged) ----------
let _voice = null;
function jaVoice(){
  if(!window.speechSynthesis) return null;
  if(_voice) return _voice;
  const vs = speechSynthesis.getVoices() || [];
  _voice = vs.find(v=>/^ja\b/i.test(v.lang)) || vs.find(v=>/japan/i.test(v.name)) || null;
  return _voice;
}
try{
  if(window.speechSynthesis){
    jaVoice(); // first call also kicks off async voice loading
    if(speechSynthesis.addEventListener)
      speechSynthesis.addEventListener("voiceschanged", ()=>{ _voice = null; jaVoice(); });
  }
}catch(err){ console.error("[pshow] voices", err); }

// ---------- timers / abortable waits (all cleared on exit) ----------
function timer(s, fn, ms){
  const t = setTimeout(()=>{ s.timers.delete(t); try{ fn(); }catch(err){ console.error("[pshow]", err); } }, ms);
  s.timers.add(t);
  return t;
}
function later(s, ms){
  return new Promise(res=>{
    let d = false;
    const f = ()=>{ if(!d){ d = true; res(); } };
    s.resolvers.push(f);          // stopShow() releases pending waits
    timer(s, f, ms);
  });
}
function gone(s){ return s.aborted || show !== s; }

// ---------- viewBox animation (rAF, ease-in-out, aspect preserved) ----------
let vbRaf = 0;
const easeIO = t => t < .5 ? 4*t*t*t : 1 - Math.pow(-2*t + 2, 3)/2;
function parseVB(){
  const raw = (SKY.svg.getAttribute("viewBox") || "").trim().split(/\s+/).map(Number);
  return (raw.length === 4 && raw.every(Number.isFinite)) ? raw : fullBox();
}
function fullBox(){ return [0, 0, SKY.W, SKY.H]; }
function constBox(c){
  let x0=Infinity, y0=Infinity, x1=-Infinity, y1=-Infinity, found=false;
  for(const i of (c.indices || [])){
    const st = SKY.stars[i];
    if(!st) continue;
    const p = SKY.worldToSky(st.x, st.y);     // honour gWorld rotation
    x0=Math.min(x0,p.x); y0=Math.min(y0,p.y);
    x1=Math.max(x1,p.x); y1=Math.max(y1,p.y);
    found = true;
  }
  if(!found) return fullBox();
  const PAD = 120;
  x0-=PAD; y0-=PAD; x1+=PAD; y1+=PAD;
  let w = x1-x0, h = y1-y0;
  const aspect = (SKY.W / SKY.H) || 1;        // keep W/H ratio: no distortion
  if(w/h > aspect){ const nh = w/aspect; y0 -= (nh-h)/2; h = nh; }
  else            { const nw = h*aspect; x0 -= (nw-w)/2; w = nw; }
  return [x0, y0, w, h];
}
function animateViewBox(to, dur, s){
  return new Promise(res=>{
    let d = false;
    const done = ()=>{ if(!d){ d = true; res(); } };
    if(s) s.resolvers.push(done);
    cancelAnimationFrame(vbRaf);              // single global animation slot
    const from = parseVB();
    const t0 = performance.now();
    const step = now=>{
      if(s && s.aborted){ done(); return; }
      const k = Math.min(1, (now - t0) / dur), e = easeIO(k);
      SKY.svg.setAttribute("viewBox", from.map((f,i)=>(f + (to[i]-f)*e).toFixed(2)).join(" "));
      if(k < 1) vbRaf = requestAnimationFrame(step);
      else done();
    };
    vbRaf = requestAnimationFrame(step);
  });
}

// ---------- narration: speech + subtitles (subtitles always shown) ----------
function narrate(s, text){
  s.sub.textContent = text;
  s.sub.style.opacity = "1";
  return new Promise(res=>{
    let d = false;
    const finish = ()=>{ if(!d){ d = true; res(); } };
    s.resolvers.push(finish);
    const readTime = Math.max(2200, text.length * 170);   // ~170ms / char
    if(window.speechSynthesis && typeof SpeechSynthesisUtterance === "function"){
      try{
        speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(text);
        u.lang = "ja-JP"; u.rate = 0.95;
        const v = jaVoice(); if(v) u.voice = v;
        u.onend = finish; u.onerror = finish;
        s.utter = u;                                      // hold a ref (Chrome GC quirk)
        timer(s, ()=>{ if(!s.aborted){ try{ speechSynthesis.speak(u); }catch(_){ finish(); } } }, 60);
        timer(s, finish, text.length * 280 + 6000);       // safety net
        return;
      }catch(err){ console.error("[pshow] speech", err); }
    }
    timer(s, finish, readTime);                           // no speech: timed subtitles
  });
}
function hideSub(s){ s.sub.style.opacity = "0"; }

// ---------- title cards ----------
function fade(el, from, to, dur){
  try{
    return el.animate([{opacity:from},{opacity:to}], {duration:dur, fill:"forwards", easing:"ease"})
             .finished.catch(()=>{});
  }catch(_){ el.style.opacity = String(to); return Promise.resolve(); }
}
async function titleCard(s, text, hold){
  s.title.textContent = text;
  await fade(s.title, 0, 1, 900); if(gone(s)) return;
  await later(s, hold);           if(gone(s)) return;
  await fade(s.title, 1, 0, 700);
}

// ---------- show lifecycle ----------
let show = null;

function startShow(named){
  const root  = document.createElement("div");   root.className  = "pshow-root";
  const veil  = document.createElement("div");   veil.className  = "pshow-veil";   // also absorbs clicks during the show
  const close = document.createElement("button");close.className = "pshow-close";
  close.textContent = "✕"; close.setAttribute("aria-label", "上映をやめる");
  const title = document.createElement("div");   title.className = "pshow-title";
  const sub   = document.createElement("div");   sub.className   = "pshow-sub";
  root.append(veil, close, title, sub);
  document.body.append(root);

  const s = show = {
    aborted:false, timers:new Set(), resolvers:[], utter:null,
    root, title, sub,
    onKey: e=>{ if(e.key === "Escape"){ e.preventDefault(); try{ stopShow(); }catch(err){ console.error("[pshow]", err); } } },
  };
  close.addEventListener("click", e=>{ e.stopPropagation(); try{ stopShow(); }catch(err){ console.error("[pshow]", err); } });
  window.addEventListener("keydown", s.onKey, true);
  const pn = document.getElementById("panel"), dk = document.getElementById("dock");
  if(pn) pn.classList.add("pshow-hidden");
  if(dk) dk.classList.add("pshow-hidden");
  requestAnimationFrame(()=>root.classList.add("pshow-on"));
  runShow(s, named).catch(err=>{ console.error("[pshow] show", err); try{ stopShow(); }catch(_){} });
}

async function runShow(s, named){
  await later(s, 1150); if(gone(s)) return;                 // veil fades in
  await titleCard(s, "本日の上映　—　あなたの夜空", 1700); if(gone(s)) return;
  for(const c of named){
    if(gone(s)) return;
    await animateViewBox(constBox(c), 1600, s); if(gone(s)) return;
    SKY.highlight(c.id);
    await later(s, 380); if(gone(s)) return;
    const line = `続いてご覧いただきますのは、『${c.name}』。` + (c.story || "");
    await narrate(s, line); if(gone(s)) return;
    await later(s, 750); if(gone(s)) return;
    hideSub(s);
    await later(s, 350); if(gone(s)) return;
  }
  SKY.highlight(null);
  await animateViewBox(fullBox(), 1600, s); if(gone(s)) return;
  await titleCard(s, "— おしまい。よい夜を。", 2000); if(gone(s)) return;
  endShow(s);
}

function detach(s){
  window.removeEventListener("keydown", s.onKey, true);
  const pn = document.getElementById("panel"), dk = document.getElementById("dock");
  if(pn) pn.classList.remove("pshow-hidden");
  if(dk) dk.classList.remove("pshow-hidden");
  for(const t of s.timers) clearTimeout(t);
  s.timers.clear();
  try{ if(window.speechSynthesis) speechSynthesis.cancel(); }catch(_){}
  hideSub(s);
  s.root.classList.remove("pshow-on");                      // veil fades out…
  setTimeout(()=>{ try{ s.root.remove(); }catch(_){} }, 1200); // …then leaves
}
function endShow(s){              // natural ending (viewBox already restored)
  if(show !== s) return;
  show = null;
  detach(s);
  SKY.highlight(null);
}
function stopShow(){              // Esc / ✕ — exits at ANY point
  const s = show;
  if(!s) return;
  show = null;
  s.aborted = true;
  detach(s);
  for(const f of s.resolvers.splice(0)){ try{ f(); }catch(_){} }  // release pending waits
  SKY.highlight(null);
  animateViewBox(fullBox(), 900, null);
}

// ---------- dock button ----------
try{
  SKY.addButton("🌠 上映会", ()=>{
    try{
      if(show) return;
      const named = SKY.constellations.filter(c=>c && c.name);
      if(!named.length){ SKY.toast("まだ星座がありません。先に星を置いてみてください"); return; }
      startShow(named);
    }catch(err){ console.error("[pshow] start", err); }
  });
}catch(err){ console.error("[pshow] init", err); }
})();
</script>

<script>
// ════ plugin: diurnal ════ Paste into its own script tag after the core script in constellation-maker.html. Owns the gWorld transform attribute (rotate around W*0.5,H*0.30) — incompati
(() => {
  "use strict";
  if (!window.SKY) return;
  const SKY = window.SKY;

  // ==================================================================
  //  日周運動 — the sky slowly turns around a pole star (diurnal)
  // ==================================================================
  const SLOW = 360 / 240;   // ~4 min per revolution (deg/s)
  const FAST = 360 / 25;    // ~25 s per revolution (timelapse)
  const SPEED = [0, SLOW, FAST];                              // by mode
  const NEXT_LABEL = ["🌃 星をめぐらせる", "⏩ タイムラプス", "⏸ 夜を止める"];
  const TOASTS = ["夜が止まりました", "夜が動きはじめました", "時間が早送りされています"];

  let mode = 0;                       // 0 stopped / 1 slow / 2 timelapse
  let angle = 0, speed = 0, target = 0;
  let raf = null, last = 0;
  let gPole = null, gTrails = null;
  let px = SKY.W * 0.5, py = SKY.H * 0.30;   // celestial pole (sky coords)

  // ---- css ----
  const style = document.createElement("style");
  style.textContent = `
    .diurnal-pulse{ transform-box:fill-box; transform-origin:center; }
    .diurnal-trails{ transition:opacity 1.6s ease; }
    .diurnal-pole text{ user-select:none; pointer-events:none; }
  `;
  document.head.append(style);

  // ---- rotation loop ----
  // gWorld turns around the pole; gPole counter-rotates so the
  // glint cross and the ほくしん label stay calm and upright.
  function apply(){
    const a = angle.toFixed(3), x = px.toFixed(1), y = py.toFixed(1);
    SKY.gWorld.setAttribute("transform", `rotate(${a} ${x} ${y})`);
    if (gPole) gPole.setAttribute("transform",
      `translate(${x} ${y}) rotate(${(-angle).toFixed(3)})`);
  }

  function tick(now){
    try {
      const dt = Math.min((now - last) / 1000, 0.1); last = now;
      speed += (target - speed) * Math.min(1, dt * 2.4);   // soft start / stop
      if (Math.abs(target - speed) < 0.02) speed = target;
      angle = (angle + speed * dt) % 360;
      apply();
      if (speed === 0 && target === 0){ raf = null; return; }  // settled
      raf = requestAnimationFrame(tick);
    } catch (err){ raf = null; console.error("[diurnal] tick", err); }
  }

  function ensureLoop(){
    if (raf == null){ last = performance.now(); raf = requestAnimationFrame(tick); }
  }

  // ---- star-trail hints: 3 faint dashed circles around the pole ----
  // they live in gWorld, so the dashes drift with the turning sky
  function trailRadius(i){ return Math.min(SKY.W, SKY.H) * (0.22 + i * 0.18); }

  function buildTrails(){
    gTrails = SKY.mk("g", { class: "diurnal-trails" });
    gTrails.style.opacity = "0";
    for (let i = 0; i < 3; i++){
      gTrails.append(SKY.mk("circle", {
        cx: px, cy: py, r: trailRadius(i), fill: "none",
        stroke: "var(--line)", "stroke-width": 1.1,
        "stroke-opacity": (0.08 - i * 0.015).toFixed(3),
        "stroke-dasharray": "2 15", "stroke-linecap": "round",
      }));
    }
    SKY.gWorld.insertBefore(gTrails, SKY.gWorld.firstChild);
  }

  // ---- 北極星: decorative, drawn by hand so it never joins a constellation ----
  function buildPole(){
    const grad = SKY.mk("radialGradient", { id: "diurnal-gold" });
    [["0%", "#ffffff", "0.95"], ["32%", "#ffe7ae", "0.8"], ["100%", "#ffbe55", "0"]]
      .forEach(([o, c, a]) => grad.append(
        SKY.mk("stop", { offset: o, "stop-color": c, "stop-opacity": a })));
    SKY.defs.append(grad);

    gPole = SKY.mk("g", { class: "diurnal-pole" });
    const pulse = SKY.mk("g", { class: "diurnal-pulse" });
    const glint = { stroke: "#ffeec4", "stroke-width": 0.9,
      "stroke-linecap": "round", opacity: 0.85, filter: "url(#line-glow)" };
    pulse.append(
      SKY.mk("circle", { r: 14, fill: "url(#diurnal-gold)" }),
      SKY.mk("line", { x1: -17, y1: 0, x2: 17, y2: 0, ...glint }),
      SKY.mk("line", { x1: 0, y1: -17, x2: 0, y2: 17, ...glint }),
      SKY.mk("circle", { r: 3.6, fill: "#fff6dd" }),
    );
    const label = SKY.mk("text", {
      y: 30, "text-anchor": "middle", "font-size": 9.5,
      fill: "var(--accent)", opacity: 0.65,
      "letter-spacing": ".2em", "font-family": "inherit",
    });
    label.textContent = "ほくしん";
    gPole.append(pulse, label);
    SKY.gWorld.append(gPole);
    apply();   // pin it to the pivot
    gPole.animate([{ opacity: 0 }, { opacity: 1 }],
      { duration: 1100, easing: "ease-out" });
    pulse.animate(
      [{ transform: "scale(1)",    opacity: 0.82 },
       { transform: "scale(1.14)", opacity: 1    },
       { transform: "scale(1)",    opacity: 0.82 }],
      { duration: 3800, iterations: Infinity, easing: "ease-in-out" });
  }

  // ---- dock button: label always shows what pressing DOES next ----
  const btn = SKY.addButton(NEXT_LABEL[0], () => {
    try {
      mode = (mode + 1) % 3;
      target = SPEED[mode];
      btn.textContent = NEXT_LABEL[mode];
      if (mode !== 0){
        if (!gPole) buildPole();
        if (!gTrails) buildTrails();
        gTrails.style.opacity = "1";
        ensureLoop();
      } else if (gTrails){
        gTrails.style.opacity = "0";   // loop winds itself down to a stop
      }
      SKY.toast(TOASTS[mode]);
    } catch (err){ console.error("[diurnal] toggle", err); }
  });

  // ---- keep the pole at (W*.5, H*.30) when the window changes ----
  window.addEventListener("resize", () => {
    try {
      px = SKY.W * 0.5; py = SKY.H * 0.30;
      if (gTrails) [...gTrails.children].forEach((c, i) => {
        c.setAttribute("cx", px); c.setAttribute("cy", py);
        c.setAttribute("r", trailRadius(i));
      });
      if (gPole || angle !== 0) apply();
    } catch (err){ console.error("[diurnal] resize", err); }
  });
})();
</script>

<script>
// ════ plugin: seiza-zukan (wave2) ════ Paste verbatim into its own <script> tag after the wave-1 plugins (before sharelink is fine: recording defers via setTimeout(0) on constellation-named, so it captures gacha's c.rarity and also catches
(()=>{ "use strict";
  if(!window.SKY) return;
  const SKY = window.SKY;
  const TAG = "[seiza-zukan]";
  const KEY = "sky-zukan-v1";
  const CAP = 200;
  const RANKS = ["N","R","SR","SSR","UR"];

  // ====================================================================
  //  星座図鑑 — 名前が生まれた、すべての夜の永久記録 (localStorage)
  // ====================================================================

  // ---------- storage ----------
  function load(){
    try{
      const a = JSON.parse(localStorage.getItem(KEY) || "[]");
      return Array.isArray(a) ? a.filter(e => e && typeof e === "object") : [];
    }catch(err){ console.error(TAG, "load", err); return []; }
  }
  function save(entries){
    try{ localStorage.setItem(KEY, JSON.stringify(entries)); }
    catch(err){ console.error(TAG, "save", err); }
  }
  function wipe(){
    try{ localStorage.removeItem(KEY); }
    catch(err){ console.error(TAG, "wipe", err); }
  }

  // ---------- recording ----------
  const localDay = d => `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;

  function buildShape(c){
    const idx = new Map();          // star index -> pts index
    const raw = [];
    for(const i of (c.indices || [])){
      const s = SKY.stars[i];
      if(!s) continue;
      idx.set(i, raw.length);
      raw.push([s.x, s.y]);
    }
    if(raw.length < 2) return null;
    let minX=Infinity, minY=Infinity, maxX=-Infinity, maxY=-Infinity;
    for(const [x,y] of raw){
      minX=Math.min(minX,x); maxX=Math.max(maxX,x);
      minY=Math.min(minY,y); maxY=Math.max(maxY,y);
    }
    const w = maxX-minX, h = maxY-minY;
    const nx = x => w < 1e-6 ? 0.5 : (x-minX)/w;   // degenerate bbox -> centre
    const ny = y => h < 1e-6 ? 0.5 : (y-minY)/h;
    const pts = raw.map(([x,y]) =>
      [Math.round(nx(x)*1000)/1000, Math.round(ny(y)*1000)/1000]);
    const edges = [];
    for(const [i,j] of (c.edges || [])){
      const a = idx.get(i), b = idx.get(j);
      if(a !== undefined && b !== undefined) edges.push([a,b]);
    }
    return { pts, edges };

      text-decoration:underline;opacity:.7;transition:.18s;}

  document.head.append(style);

  // ---------- mini constellation thumbnail ----------
  function thumb(shape){

    const svg = SKY.mk("svg", { viewBox:`0 0 ${S} ${S}`, class:"zukan-thumb" });
    const X = v => PAD + (+v || 0) * (S - PAD*2);

    const edges = (shape && Array.isArray(shape.edges)) ? shape.edges : [];

      if(!a || !b) continue;
      svg.append(SKY.mk("line", { x1:X(a[0]), y1:X(a[1]), x2:X(b[0]), y2:X(b[1]) }));
    }
    for(const p of pts){

  }

  function openModal(){

        `<div class="zukan-grid"></div>` +
        `<div class="zukan-foot"></div>`;

    }catch(err){ console.error(TAG, err); }
  }

  // ---------- dock button ----------
  SKY.addButton("📖 図鑑", () => {
    try{ overlay ? closeModal() : openModal(); }
    catch(err){ console.error(TAG, err); }
  });
})();

    requestAnimationFrame(tick);
  }

  function burst(anchor){
    try{
      if(!overlay) return;
      const r = anchor.getBoundingClientRect();
      const cx = r.left + r.width/2, cy = r.top + r.height/2;
      const glyphs = ["✦","✧","✸","･"];
      for(let i=0;i<16;i++){
        const s = document.createElement("span");
        s.className = "aishou-spark";
        s.textContent = glyphs[i % 4];
        s.style.left = cx + "px"; s.style.top = cy + "px";
        overlay.append(s);
        const a = (Math.PI*2*i)/16 + Math.random()*.5;
        const d = 70 + Math.random()*80;
        s.animate([
          {transform:"translate(-50%,-50%) scale(.4)", opacity:1},
          {transform:`translate(${Math.cos(a)*d - 8}px,${Math.sin(a)*d - 8}px) scale(1.1)`, opacity:0},
        ], {duration:800 + Math.random()*500, easing:"cubic-bezier(.1,.7,.3,1)"})
          .onfinish = ()=>s.remove();
      }
    }catch(err){ console.error(TAG, err); }
  }

  function renderResult(body, A, B){
    try{
      const a = snap(A), b = snap(B);
      const score = scoreOf(a.name, b.name);
      const rel = titleOf(a.name, b.name);
      first = null;
      if(overlay) overlay.classList.add("aishou-clear");   // 薄衣にして橋を見せる
      showBridge(A, B);
      body.innerHTML =
        `<div class="aishou-pair">${esc(a.name)}<span class="aishou-x">✦</span>${esc(b.name)}</div>` +
        `<div class="aishou-scorewrap"><span class="aishou-num">0</span><span class="aishou-pct">%</span></div>` +
        `<div class="aishou-beat">……。</div>` +
        `<div class="aishou-result">` +
          `<div class="aishou-label">関係性</div>` +
          `<div class="aishou-rel">${esc(rel)}</div>` +
          `<div class="aishou-label">ふたつの星座の神話</div>` +
          `<div class="aishou-myth">${esc(jointMyth(a,b))}</div>` +
          `<div class="aishou-label">星からの助言</div>` +
          `<div class="aishou-adv">${esc(SKY.pick(ADVICE))}</div>` +
          `<span class="aishou-retell">↻ 語り直す</span>` +
        `</div>`;
      const num = body.querySelector(".aishou-num");
      const res = body.querySelector(".aishou-result");
      const beat = body.querySelector(".aishou-beat");
      body.querySelector(".aishou-retell").addEventListener("click", e=>{
        e.stopPropagation();
        try{
          const myth = body.querySelector(".aishou-myth");
          myth.animate([{opacity:1},{opacity:0}], {duration:180, fill:"forwards"})
            .onfinish = ()=>{
              myth.textContent = jointMyth(a, b);
              myth.animate([{opacity:0},{opacity:1}], {duration:300, fill:"forwards"});
            };
        }catch(err){ console.error(TAG, err); }
      });
      const reveal = ()=>{
        if(!overlay || !res.isConnected) return;
        res.style.display = "block";
        res.animate([{opacity:0, transform:"translateY(8px)"},
                     {opacity:1, transform:"translateY(0)"}],
                    {duration:520, easing:"ease-out", fill:"forwards"});
      };
      countUp(num, score, 1400, ()=>{
        try{
          if(score >= 90){
            burst(num);
            num.animate([{transform:"scale(1)"},{transform:"scale(1.22)"},{transform:"scale(1)"}],
              {duration:600, easing:"cubic-bezier(.2,1.4,.4,1)"});
            setTimeout(reveal, 320);
          } else if(score <= 20){
            beat.style.display = "block";                 // 真顔の間
            beat.animate([{opacity:0},{opacity:1}], {duration:350, fill:"forwards"});
            setTimeout(()=>{
              if(!overlay || !beat.isConnected) return;
              beat.animate([{opacity:1},{opacity:0}], {duration:280, fill:"forwards"})
                .onfinish = ()=>{ beat.style.display = "none"; };
              reveal();
            }, 1450);
          } else setTimeout(reveal, 260);
        }catch(err){ console.error(TAG, err); }
      });
    }catch(err){ console.error(TAG, err); }
  }

  /* ---------------- wiring ---------------- */
  SKY.addButton("💞 相性占い", openModal);
  SKY.on("recomputed", syncBridge);
  SKY.on("cleared", closeModal);
})();
</script>
<script>
// ════ plugin: seiza-battle (wave2) ════ Self-contained IIFE; uses only documented SKY API (addButton, highlight, pick, mk, gWorld, refreshPanel, on). Overlay at z-index 8; all classes prefixed "seiza-battle-". Battle is capped at 12 attacks
// ════ plugin: seiza-battle ════ ⚔️ 星座バトル — two constellations duel, narrated deadpan-JRPG style.
// Stats are deterministic from geometry (HP=60+size*12, ATK=avgMag*22, SPD=4000/avgEdge clamp 20..99,
// LUCK=rarityRank*8). Loser keeps all stars. Aborts cleanly on close / clear. Overlay z-index 8.
(() => {
  "use strict";
  if (!window.SKY) return;
  const SKY = window.SKY;
  const TAG = "[seiza-battle]";
  const P = "seiza-battle";

  /* ================= スタイル ================= */
  const css = document.createElement("style");
  css.textContent = `
    .${P}-overlay{position:fixed;inset:0;z-index:8;display:flex;align-items:center;justify-content:center;
      background:rgba(3,4,14,.6);backdrop-filter:blur(5px)}
    .${P}-modal{position:relative;width:min(560px,92vw);max-height:86vh;overflow-y:auto;scrollbar-width:thin;
      border-radius:18px;padding:22px 24px 18px;color:var(--ink);
      background:radial-gradient(135% 100% at 50% -10%, rgba(140,60,80,.42) 0%, rgba(26,14,44,.97) 52%, rgba(8,6,20,.99) 100%);
      border:1px solid rgba(255,160,140,.32);
      box-shadow:0 0 46px rgba(255,110,100,.16), 0 26px 70px rgba(0,0,0,.65)}
    .${P}-modal::-webkit-scrollbar{width:7px}
    .${P}-modal::-webkit-scrollbar-thumb{background:rgba(255,170,150,.28);border-radius:4px}
    .${P}-close{position:absolute;top:9px;right:12px;border:none;background:none;color:var(--dim);
      font-size:15px;line-height:1;padding:6px;cursor:pointer;transition:.2s;z-index:1}
    .${P}-close:hover{color:var(--ink);transform:rotate(90deg)}
    .${P}-title{text-align:center;font-size:16px;font-weight:700;letter-spacing:.18em;
      text-shadow:0 0 16px rgba(255,140,110,.5)}
    .${P}-sub{text-align:center;font-size:11.5px;color:var(--dim);letter-spacing:.08em;margin:6px 0 12px;min-height:1.6em}
    .${P}-roster{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;margin-bottom:4px}
    .${P}-chip{cursor:pointer;border:1px solid var(--panel-edge);background:rgba(255,255,255,.04);
      color:var(--ink);border-radius:999px;padding:6px 13px;font-size:12.5px;font-family:inherit;
      transition:.18s;letter-spacing:.04em}
    .${P}-chip:hover{border-color:rgba(255,170,150,.55);transform:translateY(-1px)}
    .${P}-p1{border-color:#7fb0ff;box-shadow:0 0 12px rgba(127,176,255,.45);background:rgba(127,176,255,.12)}
    .${P}-p2{border-color:#ff8a7a;box-shadow:0 0 12px rgba(255,138,122,.45);background:rgba(255,138,122,.12)}
    .${P}-arena{display:grid;grid-template-columns:1fr auto 1fr;gap:10px;align-items:center;margin-top:12px}
    .${P}-vsmark{font-size:18px;font-weight:800;letter-spacing:.1em;color:var(--accent);
      text-shadow:0 0 14px rgba(255,210,122,.6)}
    .${P}-fcard{border:1px solid var(--panel-edge);border-radius:12px;padding:10px 12px;background:rgba(255,255,255,.03);min-width:0}
    .${P}-fcard-p1{border-color:rgba(127,176,255,.45)}
    .${P}-fcard-p2{border-color:rgba(255,138,122,.45)}
    .${P}-fname{font-size:13.5px;font-weight:700;letter-spacing:.03em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .${P}-fmeta{font-size:10px;color:var(--dim);margin:2px 0 8px;letter-spacing:.06em}
    .${P}-stat{display:flex;align-items:center;gap:7px;margin-top:5px}
    .${P}-stlb{flex:none;width:2.6em;font-size:10px;color:var(--dim);letter-spacing:.05em}
    .${P}-bar{flex:1;height:6px;border-radius:99px;background:rgba(255,255,255,.08);overflow:hidden}
    .${P}-fill{display:block;height:100%;width:0;border-radius:99px;background:linear-gradient(90deg,#7fb0ff,#ffd27a)}
    .${P}-stv{flex:none;width:2.4em;text-align:right;font-size:11px}
    .${P}-gowrap{text-align:center;margin-top:14px}
    .${P}-go{cursor:pointer;font-family:inherit;font-size:14px;font-weight:700;letter-spacing:.3em;color:var(--ink);
      padding:9px 30px 9px 36px;border-radius:999px;border:1px solid rgba(255,170,140,.5);
      background:linear-gradient(180deg,rgba(200,70,80,.5),rgba(120,30,50,.5));
      text-shadow:0 0 10px rgba(255,160,130,.7);transition:.18s}
    .${P}-go:hover{transform:translateY(-1px);box-shadow:0 0 18px rgba(255,120,100,.4)}
    .${P}-hprow{display:flex;align-items:center;gap:8px;margin-top:5px}
    .${P}-hpnm{flex:none;width:9em;font-size:11px;letter-spacing:.03em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .${P}-hpbar{flex:1;height:8px;border-radius:99px;background:rgba(255,255,255,.08);overflow:hidden}
    .${P}-hpfill{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,#8df0b0,#ffd27a);
      transition:width .45s cubic-bezier(.3,1,.4,1), background .45s}
    .${P}-hpnum{flex:none;width:4.8em;text-align:right;font-size:10px;color:var(--dim);font-weight:600}
    .${P}-log{margin-top:12px;height:min(240px,32vh);overflow-y:auto;scrollbar-width:thin;
      border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:10px 12px;
      background:rgba(0,0,0,.28);font-size:12.5px;line-height:1.95}
    .${P}-log::-webkit-scrollbar{width:7px}
    .${P}-log::-webkit-scrollbar-thumb{background:rgba(255,170,150,.22);border-radius:4px}
    .${P}-line{color:#dfe4ff;letter-spacing:.02em}
    .${P}-line-sys{color:var(--dim)}
    .${P}-line-crit{color:var(--accent);font-weight:700;text-shadow:0 0 10px rgba(255,210,122,.55)}
    .${P}-line-miss{color:#9fd8ff;font-style:italic}
    .${P}-banner{position:relative;text-align:center;margin:14px 0 6px;font-size:clamp(20px,4.4vmin,30px);
      font-weight:800;letter-spacing:.08em;color:var(--accent);text-shadow:0 0 22px rgba(255,210,122,.65)}
    .${P}-spark{position:absolute;left:50%;top:50%;font-size:13px;color:var(--accent);
      pointer-events:none;text-shadow:0 0 8px rgba(255,210,122,.8)}`;
  document.head.append(css);

  /* ================= コーパス ================= */
  const TECH = [
    n => `${n}の一閃`,
    n => `降りそそぐ${n}の光`,
    n => `奥義「${n}メテオ」`,
    n => `超新星${n}アタック`,
    n => `${n}流・流星崩し`,
    n => `${n}の重力場展開`,
    n => `億光年${n}スパイラル`,
    n => `${n}式・等級反転`,
    n => `静かなる${n}の輪舞`,
    n => `第七天より来たる${n}`,
  ];
  const MISS = [
    d => `しかし ${d} はゆうがにかわした。`,
    () => `攻撃は夜空のかなたへ消えていった。`,
    d => `${d} は瞬きひとつでやり過ごした。`,
    () => `光は逸れ、流れ星がひとつ増えた。`,
  ];
  const RANK = { N: 1, R: 2, SR: 3, SSR: 4, UR: 5 };

  /* ================= ステータス（幾何から決定論的に） ================= */
  function statsOf(c) {
    const pts = (c.indices || []).map(i => SKY.stars[i]).filter(Boolean);
    const size = c.size || pts.length || 2;
    const avgMag = pts.length ? pts.reduce((a, s) => a + s.mag, 0) / pts.length : 2.2;
    let eSum = 0, eN = 0;
    for (const [i, j] of (c.edges || [])) {
      const a = SKY.stars[i], b = SKY.stars[j];
      if (a && b) { eSum += Math.hypot(a.x - b.x, a.y - b.y); eN++; }
    }
    const avgEdge = eN ? eSum / eN : 100;
    return {
      hp: Math.round(60 + size * 12),
      atk: Math.round(avgMag * 22),
      spd: Math.round(Math.max(20, Math.min(99, 100 / (avgEdge / 40)))),
      luck: (RANK[c.rarity] || 1) * 8,
    };
  }

  /* ================= 小道具 ================= */
  function el(tag, cls, text) {
    const e = document.createElement(tag);
    if (cls) e.className = cls;
    if (text != null) e.textContent = text;
    return e;
  }

  let overlay = null;   // modal element
  let fight = null;     // abort token while a battle runs

  function sleep(ms, tk) {
    return new Promise(res => {
      if (tk.aborted) return res();
      const t = setTimeout(() => { tk.timers.delete(t); tk.resolves.delete(res); res(); }, ms);
      tk.timers.add(t); tk.resolves.add(res);
    });
  }
  function abortFight() {
    const tk = fight;
    if (!tk) return;
    fight = null;
    tk.aborted = true;
    for (const t of tk.timers) clearTimeout(t);
    for (const r of tk.resolves) { try { r(); } catch (e) {} }
    tk.timers.clear(); tk.resolves.clear();
    try { SKY.highlight(null); } catch (e) {}
  }

  // typewriter line into the battle log, auto-scrolling
  async function typeLine(log, text, cls, tk) {
    if (tk.aborted) return;
    const div = el("div", `${P}-line` + (cls ? ` ${P}-line-${cls}` : ""));
    log.append(div);
    // time-based reveal (~15ms/char) so throttled background tabs catch up instead of crawling
    const t0 = performance.now();
    let shown = 0;
    while (shown < text.length) {
      if (tk.aborted) { div.textContent = text; return; }
      shown = Math.min(text.length, Math.max(shown + 1, Math.floor((performance.now() - t0) / 15)));
      div.textContent = text.slice(0, shown);
      log.scrollTop = log.scrollHeight;
      await sleep(30, tk);
    }
    log.scrollTop = log.scrollHeight;
  }

  /* ================= 攻撃の見た目（空側の演出） ================= */
  function shakeStars(c) {
    try {
      for (const id of (c.starIds || [])) {
        const s = SKY.stars.find(st => st.id === id);
        if (!s || !s.el) continue;
        s.el.animate([
          { transform: "translate(0,0)" },
          { transform: "translate(4px,-3px)" },
          { transform: "translate(-4px,2px)" },
          { transform: "translate(3px,3px)" },
          { transform: "translate(-2px,-2px)" },
          { transform: "translate(0,0)" },
        ], { duration: 380, easing: "ease-out" });
      }
    } catch (err) { console.error(TAG, err); }
  }
  function impactFlash(c) {
    try {
      const ct = c.centroid;
      if (!ct) return;
      const g = SKY.mk("g", { transform: `translate(${ct.x} ${ct.y})` });
      const ring = SKY.mk("circle", { cx: 0, cy: 0, r: 26, fill: "none", stroke: "var(--accent)", "stroke-width": 2, opacity: .9 });
      const core = SKY.mk("circle", { cx: 0, cy: 0, r: 10, fill: "#fff", opacity: .95, filter: "url(#soft)" });
      g.append(ring, core);
      SKY.gWorld.append(g);
      ring.animate([{ transform: "scale(.3)", opacity: .9 }, { transform: "scale(2.4)", opacity: 0 }],
        { duration: 480, easing: "ease-out", fill: "forwards" });
      core.animate([{ transform: "scale(1)", opacity: .95 }, { transform: "scale(.1)", opacity: 0 }],
        { duration: 420, easing: "ease-out", fill: "forwards" });
      setTimeout(() => g.remove(), 540);
    } catch (err) { console.error(TAG, err); }
  }
  function sparkle(host) {
    try {
      for (let i = 0; i < 18; i++) {
        const s = el("span", `${P}-spark`, "✦");
        host.append(s);
        const ang = Math.random() * Math.PI * 2, dist = 60 + Math.random() * 90;
        s.animate([
          { transform: "translate(-50%,-50%) translate(0,0) scale(1)", opacity: 1 },
          { transform: `translate(-50%,-50%) translate(${Math.cos(ang) * dist}px,${Math.sin(ang) * dist}px) scale(.2)`, opacity: 0 },
        ], { duration: 900 + Math.random() * 500, easing: "cubic-bezier(.1,.8,.3,1)", fill: "forwards" });
        setTimeout(() => s.remove(), 1600);
      }
    } catch (err) { console.error(TAG, err); }
  }

  /* ================= バトル本体 ================= */
  function mkFighter(c) {
    const st = statsOf(c);
    const hpRow = el("div", `${P}-hprow`);
    const fill = el("i", `${P}-hpfill`);
    const bar = el("div", `${P}-hpbar`);
    bar.append(fill);
    const num = el("b", `${P}-hpnum`, `${st.hp}/${st.hp}`);
    hpRow.append(el("span", `${P}-hpnm`, c.name), bar, num);
    fill.style.width = "100%";
    return { c, st, hp: st.hp, name: c.name, noun: c.noun || "星", hpRow, fill, num };
  }
  function updateHp(f) {
    const r = Math.max(0, f.hp / f.st.hp);
    f.fill.style.width = (r * 100).toFixed(1) + "%";
    f.fill.style.background = r > .5 ? "linear-gradient(90deg,#8df0b0,#ffd27a)" : r > .25 ? "#ffd27a" : "#ff8a7a";
    f.num.textContent = `${Math.max(0, Math.round(f.hp))}/${f.st.hp}`;
  }

  async function attackStep(a, d, t, tk) {
    try { SKY.highlight(a.c.id); } catch (e) {}
    await t(`▶ ${a.name}の攻撃！ ${SKY.pick(TECH)(a.noun)}！`);
    await sleep(220, tk);
    if (tk.aborted) return;
    if (Math.random() < 0.08) {
      await t(SKY.pick(MISS)(d.name), "miss");
      await sleep(240, tk);
    } else {
      const crit = Math.random() * 100 < a.st.luck;
      let dmg = Math.round(a.st.atk * (0.75 + Math.random() * 0.5));
      if (crit) dmg *= 2;
      shakeStars(d.c);
      impactFlash(d.c);
      if (crit) await t("会心の一撃！", "crit");
      d.hp = Math.max(0, d.hp - dmg);
      updateHp(d);
      await t(`${d.name} に ${dmg} のダメージ！`, crit ? "crit" : "");
      await sleep(260, tk);
    }
    try { SKY.highlight(null); } catch (e) {}
  }

  async function startBattle(ca, cb, host) {
    const tk = fight = { aborted: false, timers: new Set(), resolves: new Set() };
    try {
      const A = mkFighter(ca), B = mkFighter(cb);
      const hdr = el("div");
      hdr.append(A.hpRow, B.hpRow);
      const log = el("div", `${P}-log`);
      host.replaceChildren(hdr, log);
      const t = (txt, cls) => typeLine(log, txt, cls, tk);

      await t(`${A.name} と ${B.name}、両者は静かに対峙した。`, "sys");
      const first = A.st.spd > B.st.spd ? A : B.st.spd > A.st.spd ? B : (Math.random() < .5 ? A : B);
      const second = first === A ? B : A;
      await t(`先手、${first.name}。星々が息をのむ。`, "sys");
      await sleep(350, tk);

      const MAXT = 12;
      let turn = 0;
      while (!tk.aborted && A.hp > 0 && B.hp > 0 && turn < MAXT) {
        const at = turn % 2 === 0 ? first : second;
        await attackStep(at, at === A ? B : A, t, tk);
        turn++;
      }
      if (tk.aborted) return;

      let win, lose;
      if (A.hp <= 0 || B.hp <= 0) {
        win = A.hp > 0 ? A : B;
        lose = win === A ? B : A;
        await t(`${lose.name} は、しずかに輝きを伏せた。`, "sys");
      } else {
        await t("夜明けが近い。これ以上の戦闘を、空が許さなかった。", "sys");
        const ra = A.hp / A.st.hp, rb = B.hp / B.st.hp;
        win = ra === rb ? (A.st.luck >= B.st.luck ? A : B) : (ra > rb ? A : B);
        lose = win === A ? B : A;
        await t(`星界の裁定──残光の多い ${win.name} に軍配が上がる。`, "sys");
      }
      await sleep(320, tk);
      if (tk.aborted) return;

      const ban = el("div", `${P}-banner`, `${win.name}の勝利！`);
      host.append(ban);
      ban.animate([{ transform: "scale(.4)", opacity: 0 }, { transform: "scale(1)", opacity: 1 }],
        { duration: 480, easing: "cubic-bezier(.16,1.6,.3,1)" });
      sparkle(ban);
      ban.scrollIntoView({ behavior: "smooth", block: "nearest" });

      if (win.c && typeof win.c.story === "string") {
        win.c.story += `のちにこの星座は、${lose.name}との星合戦を制したと語り継がれる。`;
        SKY.refreshPanel();
      }
      await sleep(500, tk);
      await t("なお、星に被害はありません。よい星合戦でした。", "sys");
    } catch (err) {
      console.error(TAG, err);
    } finally {
      if (fight === tk) fight = null;
      try { SKY.highlight(null); } catch (e) {}
    }
  }

  /* ================= モーダル ================= */
  function onKey(e) { if (e.key === "Escape") closeModal(); }
  function closeModal() {
    try {
      abortFight();
      if (!overlay) return;
      const o = overlay; overlay = null;
      document.removeEventListener("keydown", onKey);
      o.animate([{ opacity: 1 }, { opacity: 0 }], { duration: 180, easing: "ease-out", fill: "forwards" });
      setTimeout(() => o.remove(), 200);
    } catch (err) { console.error(TAG, err); }
  }

  function openModal(named) {
    closeModal();
    const o = el("div", `${P}-overlay`);
    const m = el("div", `${P}-modal`);
    const close = el("button", `${P}-close`, "✕");
    close.setAttribute("aria-label", "閉じる");
    const sub = el("div", `${P}-sub`, "出場するふたつの星座を選んでください");
    const roster = el("div", `${P}-roster`);
    const arena = el("div", `${P}-arena`);
    const goWrap = el("div", `${P}-gowrap`);
    const goBtn = el("button", `${P}-go`, "開戦");
    goWrap.append(goBtn);
    const battle = el("div");
    m.append(close, el("div", `${P}-title`, "⚔ 星座バトル"), sub, roster, arena, goWrap, battle);
    o.append(m);
    document.body.append(o);
    overlay = o;
    arena.style.display = "none";
    goWrap.style.display = "none";

    const sel = [];
    const chips = new Map();
    const fighterOf = cid => SKY.constellations.find(c => c.id === cid && c.name) || null;

    function fcard(c, side) {
      const st = statsOf(c);
      const card = el("div", `${P}-fcard ${P}-fcard-${side}`);
      card.append(el("div", `${P}-fname`, c.name));
      card.append(el("div", `${P}-fmeta`, `${c.rarity || "—"} ／ ${c.size} 星`));
      [["HP", st.hp, 240], ["攻撃", st.atk, 100], ["速さ", st.spd, 99], ["運", st.luck, 40]].forEach(([lb, v, max], i) => {
        const row = el("div", `${P}-stat`);
        const bar = el("div", `${P}-bar`);
        const fill = el("i", `${P}-fill`);
        bar.append(fill);
        row.append(el("span", `${P}-stlb`, lb), bar, el("b", `${P}-stv`, String(v)));
        card.append(row);
        fill.animate([{ width: "0%" }, { width: Math.max(4, Math.min(100, v / max * 100)) + "%" }],
          { duration: 650, delay: 120 + i * 110, easing: "ease-out", fill: "forwards" });
      });
      return card;
    }

    function refreshSel() {
      chips.forEach((chip, cid) => {
        chip.classList.toggle(`${P}-p1`, sel[0] === cid);
        chip.classList.toggle(`${P}-p2`, sel[1] === cid);
      });
      arena.replaceChildren();
      if (sel.length === 2) {
        const a = fighterOf(sel[0]), b = fighterOf(sel[1]);
        if (a && b) {
          arena.append(fcard(a, "p1"), el("div", `${P}-vsmark`, "VS"), fcard(b, "p2"));
          arena.style.display = "grid";
          goWrap.style.display = "";
          sub.textContent = "両者、出そろいました。よろしいですか。";
          return;
        }
      }
      arena.style.display = "none";
      goWrap.style.display = "none";
      sub.textContent = sel.length === 1 ? "対戦相手をもうひとつ選んでください" : "出場するふたつの星座を選んでください";
    }

    for (const c of named) {
      const chip = el("button", `${P}-chip`, c.name + (c.rarity ? `　${c.rarity}` : ""));
      chip.addEventListener("click", e => {
        try {
          e.stopPropagation();
          if (fight) return;
          const i = sel.indexOf(c.id);
          if (i >= 0) sel.splice(i, 1);
          else if (sel.length < 2) sel.push(c.id);
          else sel[1] = c.id;
          refreshSel();
        } catch (err) { console.error(TAG, err); }
      });
      chips.set(c.id, chip);
      roster.append(chip);
    }

    goBtn.addEventListener("click", e => {
      try {
        e.stopPropagation();
        if (fight) return;
        const a = fighterOf(sel[0]), b = fighterOf(sel[1]);
        if (!a || !b) { SKY.toast("星座が夜に溶けてしまいました"); refreshSel(); return; }
        roster.style.display = "none";
        arena.style.display = "none";
        goWrap.style.display = "none";
        sub.textContent = "──静かな夜だった。それが、合図だった。";
        startBattle(a, b, battle).catch(err => console.error(TAG, err));
      } catch (err) { console.error(TAG, err); }
    });

    close.addEventListener("click", e => { e.stopPropagation(); closeModal(); });
    o.addEventListener("click", e => { if (e.target === o) closeModal(); });
    document.addEventListener("keydown", onKey);
    o.animate([{ opacity: 0 }, { opacity: 1 }], { duration: 220, easing: "ease-out" });
    m.animate([{ transform: "translateY(16px) scale(.95)", opacity: 0 }, { transform: "translateY(0) scale(1)", opacity: 1 }],
      { duration: 360, easing: "cubic-bezier(.2,1.25,.35,1)" });
  }

  /* ================= 入口 ================= */
  SKY.addButton("⚔️ 星座バトル", () => {
    try {
      if (fight) { SKY.toast("ただいま交戦中です"); return; }
      if (overlay) return;
      const named = SKY.constellations.filter(c => c.name);
      if (named.length < 2) { SKY.toast("戦うには、星座がふたつ必要です"); return; }
      openModal(named);
    } catch (err) { console.error(TAG, err); }
  });

  SKY.on("cleared", closeModal);
})();
</script>
<script>
// ════ plugin: meteor-wish (wave2) ════ Verified live in a browser against the real host page: modal flow, 12-20 corner-radiant shower, golden meteor landing >=60 units from stars (star.wish set, recompute, toasts), wish log (newest-first, 
(() => {
  "use strict";
  if (!window.SKY) return;
  const SKY = window.SKY;

  // ====================================================================
  //  流星群とお願いごと — meteor showers that grant wishes
  //  ☄️ 流星群 → 願いを書いて夜に放つと、最後に金色の流れ星がひとつ、
  //  星になって降りてくる。願いは localStorage("sky-wishes-v1") に残る。
  // ====================================================================

  const LS_KEY = "sky-wishes-v1";
  let busy = false;        // a shower (or its golden finale) is in flight
  let overlay = null;

  // ---- styles --------------------------------------------------------
  const style = document.createElement("style");
  style.textContent = `
    .meteor-wish-overlay{position:fixed;inset:0;z-index:8;display:flex;align-items:center;
      justify-content:center;background:rgba(3,4,14,.55);backdrop-filter:blur(5px)}
    .meteor-wish-modal{position:relative;width:min(340px,88vw);max-height:80vh;overflow-y:auto;
      scrollbar-width:thin;border-radius:18px;padding:26px 24px 18px;color:var(--ink);
      background:radial-gradient(135% 100% at 50% -10%, rgba(150,112,42,.36) 0%,
        rgba(20,22,46,.97) 52%, rgba(6,8,22,.99) 100%);
      border:1px solid rgba(255,210,122,.32);
      box-shadow:0 0 42px rgba(255,200,110,.16), inset 0 0 60px rgba(255,210,122,.05),
        0 24px 70px rgba(0,0,0,.65)}
    .meteor-wish-modal::-webkit-scrollbar{width:7px}
    .meteor-wish-modal::-webkit-scrollbar-thumb{background:rgba(255,210,122,.25);border-radius:4px}
    .meteor-wish-close{position:absolute;top:9px;right:12px;border:none;background:none;
      color:var(--dim);font-size:15px;line-height:1;padding:6px;cursor:pointer;transition:.2s}
    .meteor-wish-close:hover{color:var(--ink);transform:rotate(90deg)}
    .meteor-wish-head{text-align:center;font-size:15px;font-weight:600;letter-spacing:.08em;
      line-height:1.8;text-shadow:0 0 14px rgba(255,210,122,.4)}
    .meteor-wish-sub{text-align:center;font-size:11px;color:var(--dim);line-height:1.9;margin-top:7px}
    .meteor-wish-input{display:block;width:100%;margin-top:16px;padding:10px 12px;font-size:13px;
      font-family:inherit;color:var(--ink);background:rgba(255,255,255,.05);
      border:1px solid var(--panel-edge);border-radius:10px;outline:none;transition:.2s}
    .meteor-wish-input::placeholder{color:var(--dim)}
    .meteor-wish-input:focus{border-color:rgba(255,210,122,.55);
      box-shadow:0 0 12px rgba(255,210,122,.18)}
    .meteor-wish-launch{display:block;width:100%;margin-top:14px;padding:10px;border:none;
      border-radius:999px;cursor:pointer;font-family:inherit;font-size:13px;font-weight:600;
      letter-spacing:.14em;color:#251b06;transition:.2s;
      background:linear-gradient(180deg, rgba(255,224,156,.94), rgba(255,188,92,.88))}
    .meteor-wish-launch:hover{box-shadow:0 0 18px rgba(255,205,110,.45);transform:translateY(-1px)}
    .meteor-wish-launch:active{transform:translateY(0)}
    .meteor-wish-loglink{margin-top:15px;text-align:center;font-size:11px;color:var(--dim);
      cursor:pointer;letter-spacing:.06em;transition:.18s}
    .meteor-wish-loglink:hover{color:var(--accent);text-decoration:underline}
    .meteor-wish-list{margin-top:12px}
    .meteor-wish-item{padding:9px 2px;border-bottom:1px dashed rgba(255,210,122,.14)}
    .meteor-wish-item:last-child{border-bottom:none}
    .meteor-wish-date{font-size:10px;color:var(--dim);letter-spacing:.14em}
    .meteor-wish-text{font-size:13px;line-height:1.8;margin:3px 0 2px;word-break:break-word}
    .meteor-wish-st{font-size:10.5px;letter-spacing:.04em}
    .meteor-wish-st.meteor-wish-shine{color:var(--accent);
      text-shadow:0 0 8px rgba(255,210,122,.4)}
    .meteor-wish-st.meteor-wish-gone{color:var(--dim)}
    .meteor-wish-empty{font-size:12px;color:var(--dim);text-align:center;
      padding:20px 0 8px;line-height:1.9}`;
  document.head.append(style);

  // ---- wish log (localStorage) ----------------------------------------
  function loadWishes() {
    try {
      const a = JSON.parse(localStorage.getItem(LS_KEY) || "[]");
      return Array.isArray(a) ? a : [];
    } catch (_) { return []; }
  }
  function pushWish(w) {
    try {
      const a = loadWishes();
      a.push(w);
      while (a.length > 100) a.shift();
      localStorage.setItem(LS_KEY, JSON.stringify(a));
    } catch (err) { console.error("[meteor-wish] storage", err); }
  }

  const esc = s => String(s).replace(/[&<>"]/g,
    ch => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[ch]));

  // ---- modal -----------------------------------------------------------
  function onKey(e) { if (e.key === "Escape") closeModal(); }
  function closeModal() {
    try {
      if (!overlay) return;
      const o = overlay; overlay = null;
      document.removeEventListener("keydown", onKey);
      o.animate([{ opacity: 1 }, { opacity: 0 }],
        { duration: 180, easing: "ease-out", fill: "forwards" }).onfinish = () => o.remove();
      setTimeout(() => o.remove(), 450);   // fallback: animations pause in hidden tabs
    } catch (err) { console.error("[meteor-wish]", err); }
  }

  function openModal() {
    try {
      closeModal();
      const o = document.createElement("div");
      o.className = "meteor-wish-overlay";
      const m = document.createElement("div");
      m.className = "meteor-wish-modal";
      const x = document.createElement("button");
      x.className = "meteor-wish-close";
      x.setAttribute("aria-label", "閉じる");
      x.textContent = "✕";
      x.addEventListener("click", e => { e.stopPropagation(); closeModal(); });
      const body = document.createElement("div");
      m.append(x, body);
      o.append(m);
      document.body.append(o);
      overlay = o;
      o.addEventListener("click", e => { if (e.target === o) closeModal(); });
      document.addEventListener("keydown", onKey);
      renderInputView(body);
      o.animate([{ opacity: 0 }, { opacity: 1 }], { duration: 220, easing: "ease-out" });
      m.animate(
        [{ transform: "translateY(14px) scale(.95)", opacity: 0 },
         { transform: "translateY(0) scale(1)", opacity: 1 }],
        { duration: 360, easing: "cubic-bezier(.2,1.25,.35,1)" });
    } catch (err) { console.error("[meteor-wish]", err); }
  }

  function renderInputView(body) {
    body.innerHTML =
      `<div class="meteor-wish-head">流れ星に、お願いごとを</div>` +
      `<div class="meteor-wish-sub">流れ星が消えるまえに唱えた願いは、<br>叶うのだといいます</div>` +
      `<input class="meteor-wish-input" type="text" maxlength="60"` +
      ` placeholder="願いごと（空のままでもいい）">` +
      `<button class="meteor-wish-launch">夜に放つ</button>` +
      `<div class="meteor-wish-loglink">いままでの願い</div>`;
    const input = body.querySelector(".meteor-wish-input");
    const launch = () => {
      try {
        const text = input.value.trim();
        closeModal();
        runShower(text);
      } catch (err) { console.error("[meteor-wish]", err); busy = false; }
    };
    body.querySelector(".meteor-wish-launch").addEventListener("click", e => {
      e.stopPropagation(); launch();
    });
    input.addEventListener("keydown", e => { if (e.key === "Enter") launch(); });
    body.querySelector(".meteor-wish-loglink").addEventListener("click", e => {
      e.stopPropagation();
      try { renderLogView(body); } catch (err) { console.error("[meteor-wish]", err); }
    });
    setTimeout(() => { try { input.focus(); } catch (_) {} }, 80);
  }

  function renderLogView(body) {
    const wishes = loadWishes().slice().reverse().slice(0, 50);   // newest first
    const alive = new Set(SKY.stars.map(s => s.id));
    let list;
    if (!wishes.length) {
      list = `<div class="meteor-wish-empty">まだ、願いごとはありません。<br>` +
             `最初のひとつを、夜に放ってみてください。</div>`;
    } else {
      list = `<div class="meteor-wish-list">` + wishes.map(w => {
        const d = new Date(w.date);
        const lbl = isNaN(d) ? "—" : `${d.getFullYear()}.${d.getMonth() + 1}.${d.getDate()}`;
        const shining = w.starId != null && alive.has(w.starId);
        const st = shining
          ? `<div class="meteor-wish-st meteor-wish-shine">☆ 夜空で輝いています</div>`
          : `<div class="meteor-wish-st meteor-wish-gone">（流れてしまいました）</div>`;
        return `<div class="meteor-wish-item"><div class="meteor-wish-date">${lbl}</div>` +
               `<div class="meteor-wish-text">${esc(w.text)}</div>${st}</div>`;
      }).join("") + `</div>`;
    }
    body.innerHTML =
      `<div class="meteor-wish-head">いままでの願い</div>` + list +
      `<div class="meteor-wish-loglink">← もどる</div>`;
    body.querySelector(".meteor-wish-loglink").addEventListener("click", e => {
      e.stopPropagation();
      try { renderInputView(body); } catch (err) { console.error("[meteor-wish]", err); }
    });
  }

  // ---- meteor shower ---------------------------------------------------
  // gShoot lives in svg viewBox coords; one radiant in a random upper corner
  function runShower(wishText) {
    try {
      busy = true;
      const W = SKY.W, H = SKY.H;
      const left = Math.random() < .5;
      const radiant = {
        x: left ? W * (0.03 + Math.random() * 0.09) : W * (0.88 + Math.random() * 0.09),
        y: H * (0.02 + Math.random() * 0.10),
      };
      const n = 12 + (Math.random() * 9 | 0);   // 12..20
      let lastEnd = 0;
      for (let i = 0; i < n; i++) {
        const delay = Math.random() * 4600;
        const dur = 750 + Math.random() * 950;
        lastEnd = Math.max(lastEnd, delay + dur);
        spawnMeteor(radiant, left, delay, dur);
      }
      if (wishText) {
        setTimeout(() => {
          try { goldenMeteor(radiant, wishText); }
          catch (err) { console.error("[meteor-wish]", err); busy = false; }
        }, lastEnd + 450);
      } else {
        setTimeout(() => {
          try { SKY.toast("ただ、きれいでした"); } catch (_) {}
          busy = false;
        }, lastEnd + 350);
      }
    } catch (err) { console.error("[meteor-wish]", err); busy = false; }
  }

  function spawnMeteor(radiant, left, delay, dur) {
    const theta = 0.52 + (Math.random() - 0.5) * 0.62;          // dip below horizontal
    const dx = Math.cos(theta) * (left ? 1 : -1), dy = Math.sin(theta);
    const off = 12 + Math.random() * 130;                       // along the path
    const pj = (Math.random() - 0.5) * 70;                      // across the path
    const sx = radiant.x + dx * off - dy * pj;
    const sy = radiant.y + dy * off + dx * pj;
    const len = 40 + Math.random() * 65;
    const dist = Math.max(SKY.W, SKY.H) * (0.35 + Math.random() * 0.45);
    const peak = .45 + Math.random() * .45;
    const l = SKY.mk("line", {
      x1: sx, y1: sy, x2: sx - dx * len, y2: sy - dy * len,
      stroke: "#fff", "stroke-width": (0.9 + Math.random()).toFixed(2),
      "stroke-linecap": "round", filter: "url(#line-glow)", opacity: 0,
    });
    SKY.gShoot.append(l);
    l.animate([
      { transform: "translate(0,0)", opacity: 0, offset: 0 },
      { opacity: peak, offset: .15 },
      { opacity: peak, offset: .7 },
      { transform: `translate(${dx * dist}px,${dy * dist}px)`, opacity: 0, offset: 1 },
    ], { duration: dur, delay, easing: "ease-in", fill: "backwards" })
      .onfinish = () => l.remove();
  }

  // ---- the golden one --------------------------------------------------
  // landing spot: world coords, >=60 world-units from every star (40 tries)
  function findLanding() {
    const W = SKY.W, H = SKY.H;
    let fallback = null;
    for (let i = 0; i < 40; i++) {
      const x = W * (0.08 + Math.random() * 0.84);
      const y = H * (0.14 + Math.random() * 0.72);
      fallback = { x, y };
      let ok = true;
      for (const s of SKY.stars) {
        if (Math.hypot(s.x - x, s.y - y) < 60) { ok = false; break; }
      }
      if (ok) return { x, y };
    }
    return fallback || { x: W * 0.5, y: H * 0.5 };
  }

  function sparkle(x, y) {
    const c = SKY.mk("circle", {
      cx: x + (Math.random() * 10 - 5), cy: y + (Math.random() * 10 - 5),
      r: (Math.random() * 1.4 + .5).toFixed(2),
      fill: Math.random() < .5 ? "#ffd27a" : "#fff6dc", opacity: .9,
    });
    SKY.gShoot.append(c);
    c.animate([{ opacity: .9 }, { opacity: 0 }],
      { duration: 420 + Math.random() * 560, easing: "ease-out" })
      .onfinish = () => c.remove();
  }

  function goldenMeteor(radiant, wishText) {
    const world = findLanding();                       // world coords for the star
    const start = { x: radiant.x, y: radiant.y - 30 }; // sky coords (gShoot)
    const DUR = 2600, TAIL = 120;
    const line = SKY.mk("line", {
      stroke: "#ffe9b4", "stroke-width": 2.4, "stroke-linecap": "round",
      filter: "url(#line-glow)", opacity: 0,
    });
    SKY.gShoot.append(line);
    const t0 = performance.now();
    function frame(now) {
      try {
        const t = Math.min(1, (now - t0) / DUR);
        const e = t * t;                                    // slow start, meteoric end
        const tgt = SKY.worldToSky(world.x, world.y);       // tracks sky rotation
        const hx = start.x + (tgt.x - start.x) * e;
        const hy = start.y + (tgt.y - start.y) * e;
        const ang = Math.atan2(tgt.y - start.y, tgt.x - start.x);
        const L = TAIL * Math.min(1, t * 4);
        line.setAttribute("x1", hx); line.setAttribute("y1", hy);
        line.setAttribute("x2", hx - Math.cos(ang) * L);
        line.setAttribute("y2", hy - Math.sin(ang) * L);
        line.setAttribute("opacity", (t < .1 ? t * 9.5 : .95).toFixed(2));
        if (Math.random() < .75) {
          const k = Math.random() * L * .7;
          sparkle(hx - Math.cos(ang) * k, hy - Math.sin(ang) * k);
        }
        if (t < 1) { requestAnimationFrame(frame); }
        else { line.remove(); land(world, wishText); }
      } catch (err) {
        console.error("[meteor-wish]", err);
        try { line.remove(); } catch (_) {}
        busy = false;
      }
    }
    requestAnimationFrame(frame);
  }

  function land(world, wishText) {
    const sky = SKY.worldToSky(world.x, world.y);
    const g = SKY.mk("g");
    const glow = SKY.mk("circle", { cx: 0, cy: 0, r: 34, fill: "url(#glow)" });
    const ring = SKY.mk("circle", { cx: 0, cy: 0, r: 11, fill: "none",
      stroke: "#ffd27a", "stroke-width": 1.4, opacity: .9 });
    g.append(glow, ring);
    SKY.gShoot.append(g);
    const tr = s => `translate(${sky.x}px,${sky.y}px) scale(${s})`;
    g.animate([
      { transform: tr(.15), opacity: 0 },
      { transform: tr(1.25), opacity: 1, offset: .3 },
      { transform: tr(2.4), opacity: 0 },
    ], { duration: 900, easing: "ease-out" }).onfinish = () => g.remove();

    setTimeout(() => {   // birth the star at the flash's peak
      try {
        let star = null;
        for (let i = 0; i < 8 && !star; i++) {
          const jx = i ? Math.random() * 24 - 12 : 0;
          const jy = i ? Math.random() * 24 - 12 : 0;
          star = SKY.addStar(world.x + jx, world.y + jy);
        }
        if (star) {
          star.wish = wishText;
          SKY.recompute();
          pushWish({ text: wishText, date: new Date().toISOString(), starId: star.id });
          SKY.toast("願いは、ひとつの星になりました");
        } else {
          pushWish({ text: wishText, date: new Date().toISOString(), starId: null });
          SKY.toast("願いは、夜の奥へとけていきました");
        }
      } catch (err) { console.error("[meteor-wish]", err); }
      finally { busy = false; }
    }, 280);
  }

  // ---- dock button -----------------------------------------------------
  SKY.addButton("☄️ 流星群", () => {
    try {
      if (busy) { SKY.toast("流星群は、まだ流れている途中です"); return; }
      openModal();
    } catch (err) { console.error("[meteor-wish]", err); }
  });

  SKY.on("cleared", closeModal);
})();
</script>

// ════ plugin: yozora-keinen (夜空の経年) ════
(()=>{ "use strict";

const TAG = "[yozora-keinen]";

try{
