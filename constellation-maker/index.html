<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>星座メーカー · Constellation Maker</title>
<style>
  :root{
    --ink:#e8ecff;
    --dim:#8b93c4;
    --line:#7fb0ff;
    --star:#fff6e0;
    --accent:#ffd27a;
    --panel:rgba(12,16,38,.72);
    --panel-edge:rgba(140,160,255,.18);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;overflow:hidden;background:#03040c;
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",-apple-system,system-ui,sans-serif;
    color:var(--ink);-webkit-font-smoothing:antialiased;}
  #sky{position:fixed;inset:0;display:block;width:100vw;height:100vh;cursor:crosshair;touch-action:none;}

  /* ---- toolbar ---- */
  .topbar{position:fixed;top:0;left:0;right:0;display:flex;align-items:center;gap:14px;
    padding:14px 18px;pointer-events:none;z-index:5;}
  .brand{pointer-events:none;font-weight:600;letter-spacing:.04em;font-size:15px;
    text-shadow:0 0 18px rgba(120,150,255,.5);}
  .brand small{display:block;font-weight:400;font-size:11px;color:var(--dim);letter-spacing:.18em;margin-top:2px}
  .spacer{flex:1}
  .btn{pointer-events:auto;cursor:pointer;border:1px solid var(--panel-edge);
    background:var(--panel);color:var(--ink);border-radius:999px;padding:8px 15px;font-size:13px;
    backdrop-filter:blur(10px);transition:.18s;white-space:nowrap}
  .btn:hover{border-color:rgba(160,180,255,.5);background:rgba(30,38,80,.8);transform:translateY(-1px)}
  .btn:active{transform:translateY(0)}

  /* ---- plugin dock (toy box) ---- */
  .dock{position:fixed;left:14px;bottom:14px;display:flex;flex-wrap:wrap;gap:8px;z-index:5;max-width:70vw}
  .dock .btn{pointer-events:auto}
  .dock.folded .btn:not(.dock-toggle){display:none}
  .dock .dock-toggle{font-size:15px;padding:8px 12px}

  /* ---- hint ---- */
  .hint{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);text-align:center;
    color:var(--dim);font-size:15px;line-height:1.9;pointer-events:none;z-index:2;
    transition:opacity .6s;text-shadow:0 0 20px rgba(0,0,0,.8)}
  .hint .big{font-size:19px;color:var(--ink);letter-spacing:.06em}
  .hint .key{display:inline-block;border:1px solid var(--panel-edge);border-radius:6px;
    padding:1px 8px;margin:0 2px;color:var(--ink);background:rgba(255,255,255,.04)}

  /* ---- side panel ---- */
  .panel{position:fixed;top:64px;right:14px;width:316px;max-height:calc(100vh - 84px);
    overflow-y:auto;background:var(--panel);border:1px solid var(--panel-edge);border-radius:16px;
    padding:14px;backdrop-filter:blur(14px);z-index:4;
    box-shadow:0 18px 50px rgba(0,0,0,.5);transition:transform .3s, opacity .3s;scrollbar-width:thin;}
  .panel.hidden{transform:translateX(120%);opacity:0;pointer-events:none}
  .panel::-webkit-scrollbar{width:7px}
  .panel::-webkit-scrollbar-thumb{background:rgba(140,160,255,.25);border-radius:4px}
  .panel h2{margin:2px 4px 10px;font-size:13px;letter-spacing:.14em;color:var(--dim);font-weight:600}
  .panel .empty{color:var(--dim);font-size:13px;padding:8px 6px;line-height:1.8}

  .card{border:1px solid transparent;border-radius:12px;padding:11px 12px;margin-bottom:9px;
    background:rgba(255,255,255,.025);cursor:pointer;transition:.18s}
  .card:hover,.card.active{background:rgba(120,150,255,.12);border-color:rgba(150,175,255,.4)}
  .card .nm{font-size:15px;font-weight:600;letter-spacing:.03em;display:flex;align-items:baseline;gap:8px}
  .card .nm .dot{width:8px;height:8px;border-radius:50%;background:var(--accent);
    box-shadow:0 0 8px var(--accent);flex:none}
  .card .lat{font-style:italic;font-size:11.5px;color:var(--line);letter-spacing:.05em;margin:3px 0 0 16px}
  .card .meta{font-size:11px;color:var(--dim);margin:5px 0 0 16px}
  .card .story{font-size:12.5px;line-height:2;color:#cdd4ff;margin:9px 0 2px;
    max-height:0;overflow:hidden;transition:max-height .35s ease;border-left:2px solid rgba(150,175,255,.3);
    padding-left:10px;opacity:.0}
  .card.open .story{max-height:340px;opacity:1;margin-top:10px}
  .card .reroll{font-size:11px;color:var(--line);margin-top:8px;display:none}
  .card.open .reroll{display:inline-block}
  .card .reroll:hover{color:var(--accent);text-decoration:underline}

  .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);
    background:var(--panel);border:1px solid var(--panel-edge);border-radius:999px;
    padding:9px 18px;font-size:13px;backdrop-filter:blur(10px);opacity:0;transition:.3s;z-index:6;pointer-events:none}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<svg id="sky" xmlns="http://www.w3.org/2000/svg"></svg>

<div class="topbar">
  <div class="brand">星座メーカー<small>CONSTELLATION MAKER</small></div>
  <div class="spacer"></div>
  <button class="btn" id="scatter">✨ 星を撒く</button>
  <button class="btn" id="togglePanel">📜 星座一覧</button>
  <button class="btn" id="save">画像で保存</button>
  <button class="btn" id="clear">クリア</button>
</div>

<div class="hint" id="hint">
  <div class="big">夜空をクリックして、星を置いてみてください</div>
  近くの星はひとりでに線で結ばれ、星座になります<br>
  星座には名前と、ささやかな神話が生まれます<br>
  <span style="font-size:13px">迷ったら右上の <span class="key">✨ 星を撒く</span> を押してみて</span>
</div>

<div class="panel hidden" id="panel">
  <h2>あなたの星座</h2>
  <div id="cards"></div>
</div>

<div class="toast" id="toast"></div>
<div class="dock" id="dock"></div>

<script>
(() => {
  "use strict";
  const SVGNS = "http://www.w3.org/2000/svg";
  const svg = document.getElementById("sky");

  // ---- layers (paint order: nebula < world(bg stars < edges < labels < stars) < shoot) ----
  // gWorld is the rotatable container — everything star-related lives in world coords
  const defs    = mk("defs");
  const gNebula = mk("g");
  const gWorld  = mk("g");
  const gBg     = mk("g");
  const gEdges  = mk("g");
  const gLabels = mk("g");
  const gStars  = mk("g");
  const gShoot  = mk("g");
  gWorld.append(gBg, gEdges, gLabels, gStars);
  svg.append(defs, gNebula, gWorld, gShoot);

  defs.innerHTML = `
    <radialGradient id="sky-bg" cx="50%" cy="38%" r="85%">
      <stop offset="0%"  stop-color="#16204d"/>
      <stop offset="42%" stop-color="#0a1030"/>
      <stop offset="100%" stop-color="#03040c"/>
    </radialGradient>
    <radialGradient id="neb-a"><stop offset="0%" stop-color="#5b3a9e" stop-opacity=".5"/><stop offset="100%" stop-color="#5b3a9e" stop-opacity="0"/></radialGradient>
    <radialGradient id="neb-b"><stop offset="0%" stop-color="#1f6f8c" stop-opacity=".42"/><stop offset="100%" stop-color="#1f6f8c" stop-opacity="0"/></radialGradient>
    <radialGradient id="neb-c"><stop offset="0%" stop-color="#8c2f5f" stop-opacity=".34"/><stop offset="100%" stop-color="#8c2f5f" stop-opacity="0"/></radialGradient>
    <radialGradient id="glow"><stop offset="0%" stop-color="#fff" stop-opacity="1"/><stop offset="35%" stop-color="#fff2cf" stop-opacity=".7"/><stop offset="100%" stop-color="#ffd27a" stop-opacity="0"/></radialGradient>
    <filter id="soft" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="2.2"/></filter>
    <filter id="line-glow" x="-30%" y="-30%" width="160%" height="160%"><feGaussianBlur stdDeviation="1.4"/></filter>`;

  const bgRect = mk("rect", { x:0, y:0, width:"100%", height:"100%", fill:"url(#sky-bg)" });
  gNebula.before(bgRect);

  // ---- state ----
  let W = 0, H = 0, DPR = 1;
  let stars = [];            // {id,x,y,mag,phase,tw,el}
  let constellations = [];   // {id,name,latin,noun,story,starIds:Set,edges,centroid,size}
  let nextStar = 1, nextConst = 1;
  let hoverId = null;
  const R = 168;             // link distance
  const MIN_DIST = 14;       // ignore clicks too close to an existing star
  const NAMED_MIN = 2;       // a constellation needs >=2 stars to earn a name
  const usedNames = new Set();

  // ---- plugin event bus ----
  const listeners = new Map();
  function on(name, fn){
    if(!listeners.has(name)) listeners.set(name, []);
    listeners.get(name).push(fn);
  }
  function emit(name, arg){
    for(const f of listeners.get(name) || []){
      try{ f(arg); }catch(err){ console.error(`[plugin handler for "${name}"]`, err); }
    }
  }

  // ====================================================================
  //  layout / background
  // ====================================================================
  function resize(){
    W = window.innerWidth; H = window.innerHeight; DPR = window.devicePixelRatio || 1;
    svg.setAttribute("viewBox", `0 0 ${W} ${H}`);
    buildNebula(); buildBgStars();
  }

  function buildNebula(){
    gNebula.replaceChildren();
    const blobs = [
      ["neb-a", .26*W, .30*H, .42*Math.max(W,H)],
      ["neb-b", .74*W, .62*H, .38*Math.max(W,H)],
      ["neb-c", .54*W, .18*H, .30*Math.max(W,H)],
    ];
    blobs.forEach(([id,cx,cy,r],i)=>{
      const c = mk("circle",{cx,cy,r,fill:`url(#${id})`});
      c.style.animation = `none`;
      c.animate(
        [{transform:"translate(0,0)"},{transform:`translate(${i%2?18:-18}px,${i%2?-14:14}px)`},{transform:"translate(0,0)"}],
        {duration: 26000 + i*7000, iterations: Infinity, easing:"ease-in-out"}
      );
      gNebula.append(c);
    });
  }

  function buildBgStars(){
    gBg.replaceChildren();
    const n = Math.round((W*H)/9000);
    bg = [];
    for(let i=0;i<n;i++){
      const x = Math.random()*W, y = Math.random()*H;
      const r = Math.random()*1.1 + .25;
      const el = mk("circle",{cx:x,cy:y,r,fill:"#cdd6ff"});
      el.dataset.base = (Math.random()*.5 + .2).toFixed(3);
      el.dataset.ph = (Math.random()*Math.PI*2).toFixed(3);
      el.dataset.sp = (Math.random()*1.4 + .5).toFixed(3);
      gBg.append(el);
      bg.push(el);
    }
  }
  let bg = [];

  // ====================================================================
  //  placing stars
  // ====================================================================
  function addStar(x, y, mag){
    for(const s of stars){ if(Math.hypot(s.x-x, s.y-y) < MIN_DIST) return null; }
    const star = {
      id: nextStar++, x, y,
      mag: mag ?? (Math.random()*1.7 + 1.6),
      phase: Math.random()*Math.PI*2,
      tw: Math.random()*1.6 + .7,
      el: null
    };
    const g = mk("g",{class:"star"});
    const halo = mk("circle",{cx:x,cy:y,r:star.mag*3.4,fill:"url(#glow)"});
    const core = mk("circle",{cx:x,cy:y,r:star.mag,fill:"var(--star)"});
    g.append(halo, core);
    star.el = g; star.halo = halo; star.core = core;
    gStars.append(g);
    // little birth pop
    g.animate([{transform:"scale(.2)",opacity:0},{transform:"scale(1)",opacity:1}],
      {duration:420, easing:"cubic-bezier(.2,1.4,.4,1)"});
    stars.push(star);
    emit("star-added", star);
    return star;
  }

  function removeStar(id, opts){
    const i = stars.findIndex(s => s.id === id);
    if(i < 0) return false;
    const [s] = stars.splice(i, 1);
    s.el.remove();
    emit("star-removed", s);
    if(!opts || opts.recompute !== false) recompute();
    if(!stars.length) showHint();
    return true;
  }

  // ====================================================================
  //  graph: nearest-neighbour MST forest within radius R
  // ====================================================================
  function recompute(){
    const n = stars.length;
    const parent = stars.map((_,i)=>i);
    const find = a => { while(parent[a]!==a){ parent[a]=parent[parent[a]]; a=parent[a]; } return a; };
    const pairs = [];
    for(let i=0;i<n;i++) for(let j=i+1;j<n;j++){
      const d = Math.hypot(stars[i].x-stars[j].x, stars[i].y-stars[j].y);
      if(d <= R) pairs.push([d,i,j]);
    }
    pairs.sort((a,b)=>a[0]-b[0]);
    const mst = [];
    for(const [d,i,j] of pairs){
      const ri=find(i), rj=find(j);
      if(ri!==rj){ parent[ri]=rj; mst.push([i,j]); }
    }
    // components
    const comps = new Map();
    for(let i=0;i<n;i++){
      const r = find(i);
      if(!comps.has(r)) comps.set(r, {indices:[], edges:[], starIdSet:new Set()});
      const c = comps.get(r);
      c.indices.push(i); c.starIdSet.add(stars[i].id);
    }
    for(const [i,j] of mst){ comps.get(find(i)).edges.push([i,j]); }

    reconcile([...comps.values()]);
    render(mst);
    renderPanel();
    emit("recomputed");
  }

  // carry names/stories across recomputations by max star-id overlap
  function reconcile(newComps){
    const prev = constellations;
    const overlaps = [];
    newComps.forEach((nc,ni)=>{
      prev.forEach((pc,pi)=>{
        let ov=0; for(const id of nc.starIdSet) if(pc.starIds.has(id)) ov++;
        if(ov>0) overlaps.push([ov,ni,pi]);
      });
    });
    overlaps.sort((a,b)=>b[0]-a[0]);
    const usedN=new Set(), usedP=new Set(), assign={};
    for(const [ov,ni,pi] of overlaps){
      if(usedN.has(ni)||usedP.has(pi)) continue;
      usedN.add(ni); usedP.add(pi); assign[ni]=prev[pi];
    }
    const result = [];
    newComps.forEach((nc,ni)=>{
      const named = nc.starIdSet.size >= NAMED_MIN;
      const base = assign[ni] ? {...assign[ni]} : { id: nextConst++ };
      base.starIds = nc.starIdSet;
      base.indices = nc.indices;
      base.edges   = nc.edges;
      base.size    = nc.starIdSet.size;
      base.centroid = centroidOf(nc.indices);
      if(named){
        const wasNamed = !!base.name;
        if(!base.name){ const nm = generateName(); base.name=nm.name; base.latin=nm.latin; base.noun=nm.noun; }
        if(!base.story){ base.story = generateStory(base); }
        if(!wasNamed) emit("constellation-named", base);
      } else {
        base.name=null; base.latin=null; base.story=null; base.noun=null;
      }
      result.push(base);
    });
    constellations = result;
  }

  function centroidOf(indices){
    let x=0,y=0; for(const i of indices){ x+=stars[i].x; y+=stars[i].y; }
    return { x:x/indices.length, y:y/indices.length };
  }

  // ====================================================================
  //  rendering
  // ====================================================================
  function constIndexById(){
    const m = new Map();
    constellations.forEach(c=>{ for(const id of c.starIds) m.set(id, c.id); });
    return m;
  }

  function render(mst){
    const byStar = constIndexById();
    // tag stars with their constellation id
    stars.forEach(s=>{ s.el.dataset.cid = byStar.get(s.id) ?? "0"; });

    // edges
    gEdges.replaceChildren();
    for(const [i,j] of mst){
      const a=stars[i], b=stars[j];
      const line = mk("line",{x1:a.x,y1:a.y,x2:b.x,y2:b.y,
        stroke:"var(--line)","stroke-width":1.1,"stroke-opacity":.55,
        "stroke-linecap":"round",filter:"url(#line-glow)"});
      line.dataset.cid = byStar.get(a.id) ?? "0";
      const len = Math.hypot(b.x-a.x, b.y-a.y);
      line.setAttribute("stroke-dasharray", len);
      line.setAttribute("stroke-dashoffset", len);
      line.animate([{strokeDashoffset:len},{strokeDashoffset:0}],
        {duration:520, easing:"ease-out", fill:"forwards"});
      gEdges.append(line);
    }

    // labels
    gLabels.replaceChildren();
    for(const c of constellations){
      if(!c.name) continue;
      const t = mk("text",{x:c.centroid.x, y:c.centroid.y - labelOffset(c),
        "text-anchor":"middle", fill:"var(--accent)","font-size":13,
        "font-family":"inherit","letter-spacing":".06em",opacity:.0});
      t.textContent = c.name;
      t.style.textShadow = "0 0 12px rgba(0,0,0,.9)";
      t.dataset.cid = c.id;
      t.animate([{opacity:0},{opacity:.82}],{duration:700,fill:"forwards",delay:200});
      gLabels.append(t);
    }
    applyHighlight();
    if(stars.length) hideHint();
  }

  function labelOffset(c){
    // push the label above the topmost star of the cluster
    let top = c.centroid.y;
    for(const i of c.indices) top = Math.min(top, stars[i].y);
    return (c.centroid.y - top) + 18;
  }

  function applyHighlight(){
    const on = hoverId != null;
    stars.forEach(s=>{
      const mine = String(hoverId) === s.el.dataset.cid;
      s.el.style.opacity = !on || mine ? 1 : .28;
    });
    [...gEdges.children].forEach(l=>{
      const mine = String(hoverId) === l.dataset.cid;
      l.setAttribute("stroke-opacity", !on ? .55 : (mine ? .95 : .12));
      l.setAttribute("stroke-width", !on ? 1.1 : (mine ? 1.7 : 1.1));
    });
    [...gLabels.children].forEach(t=>{
      const mine = String(hoverId) === t.dataset.cid;
      t.setAttribute("opacity", !on ? .82 : (mine ? 1 : .25));
    });
  }

  // ====================================================================
  //  side panel
  // ====================================================================
  const cards = document.getElementById("cards");
  function renderPanel(){
    const named = constellations.filter(c=>c.name).sort((a,b)=>a.id-b.id);
    cards.replaceChildren();
    if(!named.length){
      const e = document.createElement("div");
      e.className = "empty";
      e.textContent = stars.length
        ? "星をもう少し近くに置くと、星座になります。"
        : "まだ星座はありません。夜空をクリックしてみましょう。";
      cards.append(e);
      emit("panel-rendered", {container: cards});
      return;
    }
    for(const c of named){
      const card = document.createElement("div");
      card.className = "card";
      card.dataset.cid = c.id;
      card.innerHTML =
        `<div class="nm"><span class="dot"></span>${c.name}</div>`+
        `<div class="lat">${c.latin}</div>`+
        `<div class="meta">${c.size} の星でできた星座</div>`+
        `<div class="story">${c.story}</div>`+
        `<span class="reroll">↻ 物語を語り直す</span>`;
      card.addEventListener("mouseenter", ()=>{ hoverId=c.id; applyHighlight(); });
      card.addEventListener("mouseleave", ()=>{ hoverId=null; applyHighlight(); });
      card.addEventListener("click", e=>{
        if(e.target.classList.contains("reroll")){
          c.story = generateStory(c);
          card.querySelector(".story").textContent = c.story;
          return;
        }
        card.classList.toggle("open");
      });
      cards.append(card);
    }
    emit("panel-rendered", {container: cards});
  }

  // ====================================================================
  //  name & myth generation
  // ====================================================================
  const EPITHET = ["銀の","嘆きの","永遠の","黄昏の","失われた","北風の","紅の","静寂の","暁の","第七の","眠れる","金色の","遥かなる","海鳴りの","氷の"];
  const NOUNS = ["狩人","竪琴","双子","大蛇","女王","漁師","鹿","帆船","楽師","王冠","灯","渡り鳥","梟","織り手","角笛"];
  const PROTO = {
    "狩人":"ひとりの孤独な狩人","竪琴":"嘆きをかき鳴らす竪琴の奏者","双子":"離ればなれになった双子",
    "大蛇":"翼を持つ一匹の大蛇","女王":"眠りつづける氷の女王","漁師":"月を釣ろうとした老いた漁師",
    "鹿":"銀の角を戴いた一頭の鹿","帆船":"還らぬ帆船とその船乗りたち","楽師":"星の数を数える盲目の楽師",
    "王冠":"主を失ったひとつの王冠","灯":"決して消えることのない一灯","渡り鳥":"季節を運ぶ渡り鳥の群れ",
    "梟":"夜の言葉を知る一羽の梟","織り手":"運命の糸を紡ぐ織り手","角笛":"世界の終わりを告げる角笛",
  };
  const LAT_A = ["Lyr","Aql","Cor","Vel","Dra","Cas","Ori","Cyg","Lup","Hyd","Ser","Per","And","Phe","Cae"];
  const LAT_B = ["a","is","us","ae","on","ix","um"];
  const LAT_C = ["Borealis","Australis","Major","Minor","Veneris","Noctis","Antiqua","Errans","Aeterna","Profunda"];

  function pick(a){ return a[(Math.random()*a.length)|0]; }

  function generateName(){
    let name, tries=0;
    do {
      const noun = pick(NOUNS);
      name = pick(EPITHET) + noun + "座";
      var chosenNoun = noun;
    } while(usedNames.has(name) && ++tries < 14);
    usedNames.add(name);
    const latin = pick(LAT_A)+pick(LAT_B)+" "+pick(LAT_C);
    return { name, latin, noun: chosenNoun };
  }

  // story fragments are arrays of (protagonist, constellation) => string,
  // exposed via SKY.lore so plugins can push more
  const INTRO = [
    (p)=>`むかし、空がまだ若かった頃、${p}がいた。`,
    (p)=>`星も数えるほどしかなかった時代、${p}が地上を歩いていた。`,
    (p)=>`世界の縁がまだ霧に沈んでいた頃、${p}の物語ははじまった。`,
  ];
  const DEED = [
    (p)=>`${p}は神々の禁を破り、夜の果てへと旅立った。`,
    (p)=>`${p}はたったひとつの願いのために、太陽の火に手を伸ばした。`,
    (p)=>`${p}は海の底へ沈んだ約束を、ひとりで取り戻そうとした。`,
    (p)=>`${p}は決して届かぬものを、それでも追いかけることをやめなかった。`,
  ];
  const TURN = [
    ()=>`その傲慢を、月の女神は静かに見つめていた。`,
    ()=>`風の神は、その祈りにわずかに心を動かされた。`,
    ()=>`運命を織る者たちは、その糸を断つことをためらった。`,
    ()=>`だが夜は、約束を守る者にだけ扉をひらく。`,
  ];
  const END = [
    (p,c)=>`かくして ${p}は星座となり、いまも夜ごと天をめぐっている。`,
    (p,c)=>`${p}の姿は星々に縫いとめられ、永遠に空をさまよう定めとなった。`,
    (p,c)=>`せめてもの慈悲として、${p}は ${c.name}として夜空に置かれた。`,
    (p,c)=>`そうして人々は、その光を見上げては ${c.name}と呼ぶようになった。`,
  ];

  function generateStory(c){
    const p = PROTO[c.noun] || "ひとりの旅人";
    return pick(INTRO)(p,c) + pick(DEED)(p,c) + pick(TURN)(p,c) + pick(END)(p,c);
  }

  // ====================================================================
  //  twinkle + shooting stars (animation loop)
  // ====================================================================
  let t0 = performance.now();
  function frame(now){
    const t = (now - t0) / 1000;
    for(const el of bg){
      const base = +el.dataset.base, ph = +el.dataset.ph, sp = +el.dataset.sp;
      el.setAttribute("opacity", base + base*0.7*Math.sin(t*sp + ph));
    }
    for(const s of stars){
      const k = 1 + 0.16*Math.sin(t*s.tw + s.phase);
      s.core.setAttribute("r", (s.mag*k).toFixed(2));
      s.halo.setAttribute("opacity", (0.6 + 0.4*Math.sin(t*s.tw + s.phase)).toFixed(2));
    }
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);

  function shootingStar(){
    const fromLeft = Math.random()<.5;
    const y = Math.random()*H*0.6;
    const x = fromLeft ? -40 : W+40;
    const dx = (fromLeft?1:-1) * (W*0.5 + Math.random()*W*0.3);
    const dy = H*0.25 + Math.random()*H*0.2;
    const len = 70;
    const l = mk("line",{x1:x,y1:y,x2:x-(fromLeft?len:-len),y2:y-len*0.5,
      stroke:"#fff","stroke-width":1.6,"stroke-linecap":"round",filter:"url(#line-glow)",opacity:0});
    gShoot.append(l);
    l.animate([
      {transform:"translate(0,0)",opacity:0,offset:0},
      {opacity:.9,offset:.15},
      {opacity:.9,offset:.7},
      {transform:`translate(${dx}px,${dy}px)`,opacity:0,offset:1},
    ],{duration:900+Math.random()*500, easing:"ease-in"}).onfinish = ()=>l.remove();
  }
  setInterval(()=>{ if(Math.random()<.55) shootingStar(); }, 4200);

  // ====================================================================
  //  interaction
  // ====================================================================
  svg.addEventListener("pointerdown", e=>{
    if(e.button!==0 || e.defaultPrevented) return;   // plugins claim clicks via preventDefault in a capture listener
    const p = screenToWorld(e.clientX, e.clientY);
    const s = addStar(p.x, p.y);
    if(s) recompute();
  });

  document.getElementById("scatter").addEventListener("click", ()=>{
    // drop a few compact, well-separated clusters so several distinct
    // constellations appear at once (centres kept apart so they don't merge)
    const want = 3 + (Math.random()*2|0);
    const SPREAD = 80, GAP = R + SPREAD*2 + 40;
    const centres = [];
    let guard = 0;
    while(centres.length < want && guard++ < 120){
      const cx = W*(.16+Math.random()*.68), cy = H*(.18+Math.random()*.6);
      if(centres.every(p => Math.hypot(p.x-cx, p.y-cy) > GAP)) centres.push({x:cx,y:cy});
    }
    for(const p of centres){
      const k = 4 + (Math.random()*4|0);
      for(let i=0;i<k;i++){
        const a = Math.random()*Math.PI*2, rr = Math.random()*SPREAD;
        addStar(p.x + Math.cos(a)*rr, p.y + Math.sin(a)*rr);
      }
    }
    recompute();
    toast(`${centres.length} つの星座が生まれました`);
  });

  document.getElementById("clear").addEventListener("click", ()=>{
    stars.length = 0;   // keep the array identity — it is exposed live via window.SKY
    constellations=[]; usedNames.clear(); nextStar=1; nextConst=1; hoverId=null;
    gStars.replaceChildren(); gEdges.replaceChildren(); gLabels.replaceChildren();
    renderPanel(); showHint();
    emit("cleared");
    toast("夜空をまっさらにしました");
  });

  const panel = document.getElementById("panel");
  document.getElementById("togglePanel").addEventListener("click", ()=>{
    panel.classList.toggle("hidden");
  });

  document.getElementById("save").addEventListener("click", savePNG);

  function savePNG(){
    if(!stars.length){ toast("先に星を置いてください"); return; }
    const clone = svg.cloneNode(true);
    clone.setAttribute("width", W); clone.setAttribute("height", H);
    // freeze a solid backdrop so transparency doesn't bite us
    const back = mk("rect",{x:0,y:0,width:W,height:H,fill:"#03040c"});
    clone.insertBefore(back, clone.firstChild);
    const data = new XMLSerializer().serializeToString(clone);
    const blob = new Blob([data], {type:"image/svg+xml;charset=utf-8"});
    const url = URL.createObjectURL(blob);
    const img = new Image();
    img.onload = ()=>{
      const cv = document.createElement("canvas");
      cv.width = W*2; cv.height = H*2;
      const ctx = cv.getContext("2d");
      ctx.fillStyle = "#03040c"; ctx.fillRect(0,0,cv.width,cv.height);
      ctx.drawImage(img,0,0,cv.width,cv.height);
      URL.revokeObjectURL(url);
      cv.toBlob(b=>{
        const a = document.createElement("a");
        a.href = URL.createObjectURL(b);
        a.download = "my-constellations.png";
        a.click();
        setTimeout(()=>URL.revokeObjectURL(a.href), 1000);
        toast("画像を保存しました");
      }, "image/png");
    };
    img.onerror = ()=>{ toast("保存に失敗しました"); URL.revokeObjectURL(url); };
    img.src = url;
  }

  // ---- hint + toast ----
  const hint = document.getElementById("hint");
  let hintHidden = false;
  function hideHint(){ if(!hintHidden){ hintHidden=true; hint.style.opacity=0; } }
  function showHint(){ hintHidden=false; hint.style.opacity=1; }

  const toastEl = document.getElementById("toast");
  let toastT=null;
  function toast(msg){
    toastEl.textContent = msg; toastEl.classList.add("show");
    clearTimeout(toastT); toastT=setTimeout(()=>toastEl.classList.remove("show"), 1900);
  }

  // ---- helpers ----
  function mk(tag, attrs){
    const el = document.createElementNS(SVGNS, tag);
    if(attrs) for(const k in attrs) el.setAttribute(k, attrs[k]);
    return el;
  }

  // client (mouse) coords -> world coords; honours gWorld rotation AND viewBox zoom
  function screenToWorld(clientX, clientY){
    const m = gWorld.getScreenCTM();
    if(!m) return {x: clientX, y: clientY};
    const p = new DOMPoint(clientX, clientY).matrixTransform(m.inverse());
    return {x: p.x, y: p.y};
  }
  // world coords -> top-level svg user coords (for drawing in gShoot above a star)
  function worldToSky(x, y){
    const m = gWorld.getCTM();
    if(!m) return {x, y};
    const p = new DOMPoint(x, y).matrixTransform(m);
    return {x: p.x, y: p.y};
  }

  const dock = document.getElementById("dock");
  const dockToggle = document.createElement("button");
  dockToggle.className = "btn dock-toggle";
  dockToggle.textContent = "🧰";
  dockToggle.title = "おもちゃ箱をひらく／たたむ";
  dockToggle.addEventListener("click", ()=>dock.classList.toggle("folded"));
  dock.append(dockToggle);

  function addButton(label, onClick){
    const b = document.createElement("button");
    b.className = "btn";
    b.textContent = label;
    b.addEventListener("click", onClick);
    dock.append(b);
    return b;
  }

  function highlight(cid){ hoverId = cid; applyHighlight(); }

  window.addEventListener("resize", ()=>{ resize(); render(currentMst()); });
  function currentMst(){
    // rebuild edge list for re-render after resize (positions unchanged)
    const idx = new Map(stars.map((s,i)=>[s.id,i]));
    const mst=[];
    for(const c of constellations) for(const [i,j] of (c.edges||[])) mst.push([i,j]);
    return mst;
  }

  // ==================================================================
  //  plugin API — playful extensions live in their own <script> blocks
  // ==================================================================
  window.SKY = {
    // svg + layers
    svg, defs, gWorld, gNebula, gBg, gEdges, gLabels, gStars, gShoot,
    // live state (read; custom props you set on a constellation survive recompute)
    stars,
    get constellations(){ return constellations; },
    get W(){ return W; }, get H(){ return H; },
    // helpers
    mk, toast, pick,
    addStar, removeStar, recompute,
    screenToWorld, worldToSky,
    addButton, refreshPanel: renderPanel, highlight,
    generateStory,
    lore: {EPITHET, NOUNS, PROTO, INTRO, DEED, TURN, END},
    // events: star-added(star), star-removed(star), recomputed(),
    //         constellation-named(c), panel-rendered({container}), cleared()
    //         (plugins may emit custom namespaced events too)
    on, emit,
  };

  resize();
  renderPanel();
})();
</script>

<script>
// ════ plugin: shinwa-goi-pack ════ Pure-data plugin, no UI/CSS/buttons. Pushes 22 epithets, 17 nouns with matching PROTO entries, and 9 each of INTRO/DEED/TURN/END (p,c)=>string functions into the live SKY.lore corpora. Guards: bails w
(() => {
  "use strict";
  if(!window.SKY) return;
  const SKY = window.SKY;
  const TAG = "[shinwa-goi-pack]";

  try {
    // ---- validate the live corpora before touching anything ----
    const L = SKY.lore;
    if(!L || !Array.isArray(L.EPITHET) || !Array.isArray(L.NOUNS) ||
       !L.PROTO || typeof L.PROTO !== "object" ||
       !Array.isArray(L.INTRO) || !Array.isArray(L.DEED) ||
       !Array.isArray(L.TURN)  || !Array.isArray(L.END)){
      console.error(TAG, "SKY.lore が見つからない、または形が違うため、語彙パックを読み込めませんでした。");
      return;
    }

    // ================================================================
    //  名前の接頭辞 — EPITHET（名詞の直前に置いて自然に読めるもの）
    // ================================================================
    const EPITHET = [
      "忘れられた","真夜中の","灰かぶりの","雷鳴の","硝子の",
      "さかさまの","朧月の","物言わぬ","還らずの","蒼ざめた",
      "名もなき","月影の","琥珀の","白霜の","燃えさしの",
      "迷い子の","まどろみの","千年の","うたかたの","宵闇の",
      "二度寝の","ためいきの",
    ];

    // ================================================================
    //  名詞 + 主人公句 — NOUNS / PROTO（「〜座」の前に置けるもの）
    // ================================================================
    const NOUN_PROTO = {
      "剣士":   "影だけになった剣士",
      "時計":   "時を刻むことを忘れた古い時計",
      "灯台":   "還らぬ船を待ちつづける灯台守",
      "鯨":     "星の海をただよう一頭の白い鯨",
      "人魚":   "泡になりそこねた一尾の人魚",
      "鍛冶屋": "月の欠片を打つ片腕の鍛冶屋",
      "庭師":   "枯れた楽園を守りつづける庭師",
      "砂時計": "最後のひと粒を惜しむ砂時計",
      "巫女":   "星の囁きを聴きすぎた巫女",
      "白鳥":   "湖に冠を落とした白鳥",
      "案山子": "鳥にさえ忘れられた案山子",
      "鏡":     "まことしか映せぬ古い鏡",
      "鐘":     "鳴らす者を失った大鐘",
      "牧人":   "雲の羊を数えそこねる牧人",
      "詩人":   "最後のひと言を探す放浪の詩人",
      "狐":     "百年だけ人を恋した白い狐",
      "指輪":   "海の底で持ち主を待つ指輪",
    };

    // ================================================================
    //  神話の四拍子 — INTRO / DEED / TURN / END
    //  (p, c) => string。p は主人公句、c は星座（主に END で c.name）
    // ================================================================
    const INTRO = [
      (p)=>`まだ名前というものが世界に少なかった頃、${p}がいたという。`,
      (p)=>`月がいまよりずっと近くにあった時代、${p}は生きていた。`,
      (p)=>`海と空の境がまだほどけていた頃、${p}のうわさが風に乗ってきた。`,
      (p)=>`神々が地上に降りて宴をひらいていた頃、その片隅に${p}がいた。`,
      (p)=>`最初の夜がまだ明けきらぬうちに、${p}はもう歩きはじめていた。`,
      (p)=>`言い伝えによれば、世界が二度目の冬を知らなかった頃、${p}がいた。`,
      (p)=>`星がひとつ落ちるたび物語がひとつ生まれた時代、${p}の物語もそのひとつだった。`,
      (p)=>`昔々、夜があまりに長く、誰も朝を信じなかった頃、${p}がいた。`,
      (p)=>`空の蓋がまだ薄かった頃、${p}は誰にも知られず暮らしていた。`,
    ];
    const DEED = [
      (p)=>`${p}は夜空に小さな穴をあけ、その向こうを覗こうとした。`,
      (p)=>`${p}は死者の国の門を、ただ一晩だけ借りようとした。`,
      (p)=>`${p}は神々の酒盃から、ひとしずくの永遠を盗んだ。`,
      (p)=>`${p}は自分の影を質に入れて、ひとつの星を買い取った。`,
      (p)=>`${p}は世界でいちばん古い約束を、誰にも告げずに破った。`,
      (p)=>`${p}は暁の女神の髪をひと房、形見にと乞うた。`,
      (p)=>`${p}は流れ星のあとを追い、地図の終わるところまで行ってしまった。`,
      (p)=>`${p}は月の裏側に、届くあてのない恋文を置いてきた。`,
      (p)=>`${p}は眠っていた海を、うっかり起こしてしまった。`,
    ];
    const TURN = [
      ()=>`星々はざわめき、夜の帳はひときわ深くなった。`,
      ()=>`雷を司る神は怒ったが、その怒りはどこか羨望に似ていた。`,
      ()=>`運命の織り手たちは顔を見合わせ、糸車をしばし止めた。`,
      ()=>`古い神々は罰を思案したが、誰ひとり本気にはなれなかった。`,
      ()=>`夜の女王だけが、その所業のほんとうの意味を知っていた。`,
      ()=>`天の秤はかたむき、二度と元へは戻らなかった。`,
      ()=>`それを見ていた北極星が、ひとつ瞬きをした。それが合図だった。`,
      ()=>`神々は評定をひらいたが、評定は七百年たってもまだ終わらなかった。`,
      ()=>`風はそのことを誰にも告げず、ただ南へ吹き去った。`,
    ];
    const END = [
      (p,c)=>`夜が明ける前に、${p}は光の鋲で空に打ちとめられた。`,
      (p,c)=>`いまでは ${c.name}と呼ばれるその光こそ、${p}のなれの果てだという。`,
      (p,c)=>`${p}は星になった。後悔したかどうかは、誰も知らない。`,
      (p,c)=>`罰とも褒美ともつかぬまま、${p}は ${c.name}として空に残された。`,
      (p,c)=>`以来、曇りの夜は ${p}が空でまどろんでいるのだと言われている。`,
      (p,c)=>`そうして ${p}の物語は終わり、${c.name}の物語がはじまった。`,
      (p,c)=>`船乗りたちはいまも ${c.name}を目印に、${p}の見果てぬ夢の続きを運んでいる。`,
      (p,c)=>`${p}は空にのぼり、地上でのことはきれいに忘れてしまったそうだ。`,
      (p,c)=>`年にいちど ${c.name}がひときわ強く光る夜、${p}の願いが空をよぎるという。`,
    ];

    // ================================================================
    //  注入（重複は静かにスキップ — 二重読込でも肥大しない）
    // ================================================================
    let nE = 0, nN = 0;
    for(const e of EPITHET){
      if(!L.EPITHET.includes(e)){ L.EPITHET.push(e); nE++; }
    }
    for(const [noun, proto] of Object.entries(NOUN_PROTO)){
      if(!L.NOUNS.includes(noun)){ L.NOUNS.push(noun); nN++; }
      if(!L.PROTO[noun]) L.PROTO[noun] = proto;
    }
    L.INTRO.push(...INTRO);
    L.DEED.push(...DEED);
    L.TURN.push(...TURN);
    L.END.push(...END);

    console.info(
      `${TAG} 神話語彙パックを読み込みました — ` +
      `接頭辞 +${nE} / 名詞 +${nN} / 起 +${INTRO.length} 承 +${DEED.length} 転 +${TURN.length} 結 +${END.length}`
    );
  } catch(err){
    console.error(TAG, err);
  }
})();

</script>

  const LINE_COMMENTS = [
    "完全に……直線です。天文学的奇跡です","定規ですか？　いいえ、星座です",
    "ここまで真っ直ぐな夜空は、初めて見ました","神は時々、線を引きたくなるのです",
  ];
  const ZIGZAG_COMMENTS = [
    "カシオペヤの再来！","W……いや、M……いや、伝説です",
    "ジグザグに宿る、天の遊び心","稲妻のごとき星列。女王も嫉妬します",
  ];
  const RAY_COLOR = {N:"#9aa3b8", R:"#7fb0ff", SR:"#ffd27a", SSR:"#ff6fd8", UR:"#fff3c4"};

  /* ================= 幾何鑑定 ================= */
  // 最小二乗（主軸）フィット → 主軸方向の広がり・最大垂直残差・残差の符号反転回数
  function geometry(pts){
    const n = pts.length;
    if(n < 3) return null;
    let mx=0, my=0;
    for(const p of pts){ mx+=p.x; my+=p.y; }
    mx/=n; my/=n;
    let sxx=0, syy=0, sxy=0;
    for(const p of pts){ const dx=p.x-mx, dy=p.y-my; sxx+=dx*dx; syy+=dy*dy; sxy+=dx*dy; }
    const th = 0.5*Math.atan2(2*sxy, sxx-syy);
    const ux = Math.cos(th), uy = Math.sin(th);
    const proj = pts.map(p=>({ t:(p.x-mx)*ux+(p.y-my)*uy, d:(p.y-my)*ux-(p.x-mx)*uy }));
    proj.sort((a,b)=>a.t-b.t);
    const span = proj[n-1].t - proj[0].t;
    if(span < 1) return null;
    let maxD = 0, minGap = Infinity;
    for(const q of proj) maxD = Math.max(maxD, Math.abs(q.d));
    for(let i=1;i<n;i++) minGap = Math.min(minGap, proj[i].t - proj[i-1].t);
    let flips = 0, prev = 0;
    const eps = Math.max(4, span*0.03);
    for(const q of proj){
      const s = q.d > eps ? 1 : q.d < -eps ? -1 : 0;
      if(s !== 0){ if(prev !== 0 && s !== prev) flips++; prev = s; }
    }
    return { straightness: maxD/span, flips, gapRatio: minGap/span };
  }

  function roll(size){
    const b = Math.max(0, (size||2) - 3);          // 星が多いほど上振れ
    const w = [["N",Math.max(6,50-b*5)],["R",30],["SR",14+b*2],["SSR",5+b*1.2],["UR",1+b*0.4]];
    let tot = 0; for(const [,x] of w) tot += x;
    let t = Math.random()*tot;
    for(const [k,x] of w){ if((t -= x) < 0) return k; }
    return "N";
  }

  function judge(c){
    const pts = c.indices.map(i=>SKY.stars[i]).filter(Boolean);
    const g = geometry(pts);
    if(pts.length >= 4 && g && g.straightness < 0.045)
      return { r:"UR", cm:SKY.pick(LINE_COMMENTS) };
    if(pts.length >= 5 && g && g.flips >= 4 && g.straightness <= 0.32 && g.gapRatio >= 0.08)
      return { r:"SSR", cm:SKY.pick(ZIGZAG_COMMENTS) };
    let r = roll(c.size);
    if(c.size >= 9 && (r === "N" || r === "R")) r = "SR";
    return { r, cm:SKY.pick(COMMENTS[r]) };
  }

  /* ================= カットイン（直列キュー） ================= */
  const queue = [];
  let showing = false, activeFinish = null;

  function enqueue(item){
    queue.push(item);
    if(!showing) next();
  }
  function next(){
    const item = queue.shift();
    if(!item){ showing = false; activeFinish = null; return; }
    showing = true;
    try{ showCutin(item, ()=>setTimeout(next, 240)); }
    catch(err){ console.error("[gacha] cutin", err); setTimeout(next, 0); }
  }

  function showCutin(item, done){
    const ov = document.createElement("div");
    ov.className = "gacha-cutin";
    const rays = document.createElement("div");
    rays.className = "gacha-rays";
    rays.style.background =
      `repeating-conic-gradient(from 0deg, ${RAY_COLOR[item.r]}30 0deg 7deg, transparent 7deg 16deg)`;
    const body = document.createElement("div");
    body.className = "gacha-body";
    const tag  = document.createElement("div");
    tag.className = "gacha-tag"; tag.textContent = "─ 星座鑑定 ─";
    const rank = document.createElement("div");
    rank.className = `gacha-rank gacha-rk-${item.r}`; rank.textContent = item.r;
    const name = document.createElement("div");
    name.className = "gacha-name"; name.textContent = item.name;
    const cm   = document.createElement("div");
    cm.className = "gacha-comment"; cm.textContent = `「${item.cm}」`;
    body.append(tag, rank, name, cm);
    ov.append(rays, body);
    document.body.append(ov);

    ov.animate([{opacity:0},{opacity:1}], {duration:200, easing:"ease-out"});
    rays.animate([{transform:"rotate(0turn) scale(.7)", opacity:0},
                  {transform:"rotate(.08turn) scale(1)", opacity:1}],
                 {duration:520, easing:"ease-out", fill:"both"});
    rays.animate([{transform:"rotate(0turn)"},{transform:"rotate(1turn)"}],
                 {duration:11000, iterations:Infinity, composite:"add"});
    tag.animate([{opacity:0},{opacity:1}], {duration:380, delay:120, fill:"both"});
    rank.animate([{transform:"scale(3)", opacity:0},{transform:"scale(1)", opacity:1}],
                 {duration:460, delay:90, easing:"cubic-bezier(.16,1.7,.3,1)", fill:"both"});
    name.animate([{opacity:0, transform:"translateY(14px)"},{opacity:1, transform:"translateY(0)"}],
                 {duration:420, delay:400, easing:"ease-out", fill:"both"});
    cm.animate([{opacity:0, transform:"translateY(10px)"},{opacity:1, transform:"translateY(0)"}],
               {duration:420, delay:560, easing:"ease-out", fill:"both"});

    let finished = false;
    const finish = ()=>{
      if(finished) return;
      finished = true;
      clearTimeout(timer);
      if(activeFinish === finish) activeFinish = null;
      ov.animate([{opacity:1},{opacity:0}], {duration:230, easing:"ease-out", fill:"forwards"});
      setTimeout(()=>{ ov.remove(); done(); }, 250);   // onfinish はタブ非表示中に凍るので使わない
    };
    activeFinish = finish;
    const timer = setTimeout(finish, 2600);
    ov.addEventListener("pointerdown", e=>{
      try{ e.stopPropagation(); e.preventDefault(); finish(); }
      catch(err){ console.error("[gacha] dismiss", err); }
    });
  }

  /* ================= パネルのレアリティチップ ================= */
  SKY.on("panel-rendered", ({container})=>{
    try{
      const byId = new Map(SKY.constellations.map(c=>[String(c.id), c]));
      for(const card of container.querySelectorAll(".card")){
        const c = byId.get(card.dataset.cid);
        if(!c || !c.rarity) continue;
        const nm = card.querySelector(".nm");
        if(!nm || nm.querySelector(".gacha-chip")) continue;
        const chip = document.createElement("span");
        chip.className = `gacha-chip gacha-chip-${c.rarity}`;
        chip.textContent = c.rarity;
        chip.title = c.rarityComment || "";
        nm.append(chip);
      }
    }catch(err){ console.error("[gacha] panel", err); }
  });

  /* ================= 鑑定の発火 ================= */
  SKY.on("constellation-named", c=>{
    try{
      if(c.rarity) return;                       // 引き継がれた星座は再鑑定しない
      const v = judge(c);
      c.rarity = v.r;
      c.rarityComment = v.cm;
      if(v.r === "N" || v.r === "R"){
        SKY.toast(`${v.r}　${c.name} — ${v.cm}`);
      }else{
        enqueue({ r:v.r, cm:v.cm, name:c.name });
      }
    }catch(err){ console.error("[gacha] judge", err); }
  });

  SKY.on("cleared", ()=>{
    try{
      queue.length = 0;
      if(activeFinish) activeFinish();           // 表示中のカットインも畳む
    }catch(err){ console.error("[gacha] cleared", err); }
  });
})();

</script>

<script>
// ════ plugin: orgel ════ Use this (second) submission — it fixes a typo (鳴) in two toast strings from the first call. Paste verbatim into its own <script> tag after the core script; AudioContext is created lazily on first cli
(()=>{ "use strict";
  if(!window.SKY) return;
  try{
    const SKY = window.SKY;

    // ---------- style ----------
    const style = document.createElement("style");
    style.textContent = `
      .orgel-play{margin-left:auto;flex:none;font-size:11px;font-weight:400;letter-spacing:.05em;
        color:var(--line);cursor:pointer;border:1px solid var(--panel-edge);border-radius:999px;
        padding:2px 9px;white-space:nowrap;transition:.18s;opacity:.85}
      .orgel-play:hover{color:var(--accent);border-color:rgba(255,210,122,.55);
        background:rgba(255,210,122,.08);opacity:1}
    `;
    document.head.append(style);

    // ---------- music-box audio engine (lazily built on first click) ----------
    let ctx = null, bus = null;
    function ensureAudio(){
      try{
        if(!ctx){
          const AC = window.AudioContext || window.webkitAudioContext;
          if(!AC) return null;
          ctx = new AC();
          const master = ctx.createGain(); master.gain.value = .5;
          master.connect(ctx.destination);
          bus = ctx.createGain();
          bus.connect(master);                               // dry path
          const delay = ctx.createDelay(1); delay.delayTime.value = .3;
          const fb = ctx.createGain();  fb.gain.value  = .25; // feedback shimmer
          const wet = ctx.createGain(); wet.gain.value = .2;
          bus.connect(delay); delay.connect(fb); fb.connect(delay);
          delay.connect(wet); wet.connect(master);
        }
        if(ctx.state === "suspended") ctx.resume().catch(()=>{});
        return ctx;
      }catch(err){ console.error("[orgel] audio", err); return null; }
    }

    // C major pentatonic, C4..E6 (about 2.5 octaves) — top of the sky sings highest
    const SCALE = [];
    for(let o=0;o<3;o++) for(const st of [0,2,4,7,9]) SCALE.push(60 + o*12 + st);
    SCALE.length = 13;
    const freqOf = m => 440 * Math.pow(2, (m-69)/12);
    function pitchFor(y){
      const k = Math.max(0, Math.min(1, 1 - y/Math.max(1, SKY.H)));
      return freqOf(SCALE[Math.round(k*(SCALE.length-1))]);
    }
    function gainFor(mag){
      const k = Math.max(0, Math.min(1, (mag-1.6)/1.7));   // host mags run ~1.6..3.3
      return .16 + .42*k;
    }

    function playNote(s){
      try{
        const c = ensureAudio(); if(!c) return;
        const t = c.currentTime;
        const f = pitchFor(s.y), amp = gainFor(s.mag);
        const env = c.createGain();
        env.gain.setValueAtTime(.0001, t);
        env.gain.exponentialRampToValueAtTime(amp, t + .006);
        env.gain.exponentialRampToValueAtTime(.0001, t + 1.5); // fast music-box decay
        const tone = c.createOscillator();                  // body of the tine
        tone.type = "triangle"; tone.frequency.value = f;
        const ping = c.createOscillator();                  // metallic sparkle on top
        ping.type = "sine"; ping.frequency.value = f*4.01;
        const pg = c.createGain();
        pg.gain.setValueAtTime(.4, t);
        pg.gain.exponentialRampToValueAtTime(.0001, t + .22);
        tone.connect(env); ping.connect(pg); pg.connect(env); env.connect(bus);
        tone.start(t); ping.start(t);
        tone.stop(t + 1.6); ping.stop(t + .3);
        tone.onended = ()=>{ try{ env.disconnect(); }catch(_){} };
      }catch(err){ console.error("[orgel] note", err); }
    }

    function pulse(s){
      try{
        if(!s || !s.el || !s.el.animate) return;
        s.el.style.transformBox = "fill-box";
        s.el.style.transformOrigin = "center";
        s.el.animate(
          [{transform:"scale(1)"},{transform:"scale(2)",offset:.22},{transform:"scale(1)"}],
          {duration:640, easing:"cubic-bezier(.25,.9,.3,1)"});
        s.halo.animate([{opacity:1},{opacity:.55}], {duration:640, easing:"ease-out"});
      }catch(_){}
    }

    // ---------- scheduling ----------
    const timers = new Set();
    let playing = false;       // is the whole-sky tour running?
    let btn = null;
    const LABEL_PLAY = "🎵 夜空を演奏";
    const LABEL_STOP = "⏹ 演奏をやめる";

    function after(ms, fn){
      const id = setTimeout(()=>{
        timers.delete(id);
        try{ fn(); }catch(err){ console.error("[orgel]", err); }
      }, ms);
      timers.add(id);
    }
    function stopTimers(){ for(const id of timers) clearTimeout(id); timers.clear(); }
    function stopAll(){
      stopTimers();
      playing = false;
      try{ SKY.highlight(null); }catch(_){}
      if(btn) btn.textContent = LABEL_PLAY;
    }

    // schedule one constellation starting at t0(ms); returns the end time
    function scheduleConstellation(c, t0){
      const seq = c.indices.map(i=>SKY.stars[i]).filter(Boolean).sort((a,b)=>a.x-b.x);
      const step = Math.max(170, 280 - Math.max(0, seq.length-6)*12); // busy skies hurry a little
      seq.forEach((s,k)=> after(t0 + k*step, ()=>{ playNote(s); pulse(s); }));
      return t0 + seq.length*step;
    }

    function playOne(c){
      if(playing) stopAll(); else stopTimers();   // a solo interrupts whatever was singing
      if(!ensureAudio()){ SKY.toast("この夜空では音を鳴らせないようです"); return; }
      scheduleConstellation(c, 30);
    }

    // ---------- card injection: 「♪ 奏でる」 ----------
    SKY.on("panel-rendered", ({container})=>{
      try{
        container.querySelectorAll(".card").forEach(card=>{
          if(card.querySelector(".orgel-play")) return;
          const cid = Number(card.dataset.cid);
          const span = document.createElement("span");
          span.className = "orgel-play";
          span.textContent = "♪ 奏でる";
          span.addEventListener("click", e=>{
            e.stopPropagation();
            try{
              const c = SKY.constellations.find(k=>k.id===cid);
              if(c && c.name) playOne(c);
            }catch(err){ console.error("[orgel]", err); }
          });
          (card.querySelector(".nm") || card).append(span);
        });
      }catch(err){ console.error("[orgel] panel", err); }
    });

    // ---------- dock button: play the whole sky ----------
    btn = SKY.addButton(LABEL_PLAY, ()=>{
      try{
        if(playing){ stopAll(); SKY.toast("演奏をやめました"); return; }
        const named = SKY.constellations.filter(c=>c.name).sort((a,b)=>a.id-b.id);
        if(!named.length){ SKY.toast("まだ奏でられる星座がありません"); return; }
        if(!ensureAudio()){ SKY.toast("この夜空では音を鳴らせないようです"); return; }
        stopAll();
        playing = true;
        btn.textContent = LABEL_STOP;
        SKY.toast(`${named.length} つの星座を、順に奏でます`);
        let t = 200;
        for(const c of named){
          const cid = c.id;
          after(t, ()=>SKY.highlight(cid));
          t = scheduleConstellation(c, t) + 700;   // breathe between songs
        }
        after(t, ()=>{ stopAll(); SKY.toast("今夜の演奏は、これでおしまいです"); });
      }catch(err){ console.error("[orgel] tour", err); }
    });

    SKY.on("cleared", ()=>{ try{ stopAll(); }catch(err){ console.error("[orgel]", err); } });
  }catch(err){ console.error("[orgel] init", err); }
})();
</script>

<script>
// ════ plugin: seiza-cert ════ Paste into its own <script> tag after the core script. The 「📜 証明書を発行」 action mimics the native .reroll span: it appears only when a card is open (clicked). Certificate is a 1400x990 PNG drawn fully of
(()=>{ "use strict";
  if(!window.SKY) return;
  const SKY = window.SKY;
  const INK = "#1d2440", PAPER = "#f4ecd8", GOLD = "#c9a14a", GOLD_D = "#8a6a1f";
  const SERIF = `"Hiragino Mincho ProN","Yu Mincho","Noto Serif JP",serif`;
  const CW = 1400, CH = 990;

  // ---- styles (reroll 風の per-card アクション) ----
  const style = document.createElement("style");
  style.textContent = `
    .seiza-cert-act{display:none;font-size:11px;color:var(--accent);margin:8px 0 0 14px;
      cursor:pointer;letter-spacing:.04em;user-select:none;transition:.18s}
    .card.open .seiza-cert-act{display:inline-block}
    .seiza-cert-act:hover{text-decoration:underline;filter:brightness(1.25)}`;
  document.head.append(style);

  // ---- small helpers ----
  const waDate = ()=>{
    const d = new Date(), n = d.getFullYear() - 2018;
    return `令和${n===1?"元":n}年${d.getMonth()+1}月${d.getDate()}日`;
  };
  const spaced = s => s.toUpperCase().split("").join(" ");
  function wrapJP(ctx, text, maxW){
    const lines = []; let cur = "";
    for(const ch of text){
      if(cur && ctx.measureText(cur + ch).width > maxW){ lines.push(cur); cur = ch; }
      else cur += ch;
    }
    if(cur) lines.push(cur);
    return lines;
  }
  function star5(ctx, cx, cy, R, r){
    ctx.beginPath();
    for(let i=0;i<10;i++){
      const rad = i%2 ? r : R, a = -Math.PI/2 + i*Math.PI/5;
      const x = cx + Math.cos(a)*rad, y = cy + Math.sin(a)*rad;
      i ? ctx.lineTo(x,y) : ctx.moveTo(x,y);
    }
    ctx.closePath();
  }
  function diamond(ctx, x, y, s, col){
    ctx.fillStyle = col; ctx.beginPath();
    ctx.moveTo(x,y-s); ctx.lineTo(x+s,y); ctx.lineTo(x,y+s); ctx.lineTo(x-s,y);
    ctx.closePath(); ctx.fill();
  }
  function flourish(ctx){ // 1 隅ぶんの飾り（translate/scale で 4 隅に展開）
    ctx.strokeStyle = INK; ctx.lineCap = "round";
    ctx.lineWidth = 2.4;
    ctx.beginPath();
    ctx.moveTo(98,10); ctx.lineTo(34,10);
    ctx.quadraticCurveTo(10,10,10,34); ctx.lineTo(10,98);
    ctx.stroke();
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(42,42,17, Math.PI, Math.PI*2.45); ctx.stroke();
    ctx.beginPath(); ctx.arc(42,42,7,  Math.PI*1.2, Math.PI*2.2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(98,10); ctx.quadraticCurveTo(112,14,120,26); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(10,98); ctx.quadraticCurveTo(14,112,26,120); ctx.stroke();
    ctx.fillStyle = GOLD_D;
    ctx.beginPath(); ctx.arc(42,42,2.8,0,Math.PI*2); ctx.fill();
  }
  function ribbon(ctx, x, y, ang, col){
    ctx.save(); ctx.translate(x,y); ctx.rotate(ang);
    ctx.fillStyle = col; ctx.beginPath();
    ctx.moveTo(-14,0); ctx.lineTo(14,0); ctx.lineTo(14,92);
    ctx.lineTo(0,74); ctx.lineTo(-14,92); ctx.closePath();
    ctx.fill(); ctx.restore();
  }

  // ---- 証明書本体を描く ----
  function renderCert(c){
    const cv = document.createElement("canvas");
    cv.width = CW; cv.height = CH;
    const ctx = cv.getContext("2d");

    // 紙 + 紙肌 + ヴィネット
    ctx.fillStyle = PAPER; ctx.fillRect(0,0,CW,CH);
    for(let i=0;i<240;i++){
      ctx.fillStyle = `rgba(120,95,50,${(Math.random()*.05+.02).toFixed(3)})`;
      ctx.beginPath();
      ctx.arc(Math.random()*CW, Math.random()*CH, Math.random()*1.3+.4, 0, Math.PI*2);
      ctx.fill();
    }
    const vg = ctx.createRadialGradient(700,470,260, 700,495,860);
    vg.addColorStop(0,"rgba(0,0,0,0)");
    vg.addColorStop(.72,"rgba(94,74,38,.05)");
    vg.addColorStop(1,"rgba(74,58,28,.22)");
    ctx.fillStyle = vg; ctx.fillRect(0,0,CW,CH);

    // 飾り罫（太枠 + 金線 + 細枠 + 四隅の飾り）
    ctx.strokeStyle = INK;  ctx.lineWidth = 9;   ctx.strokeRect(26,26,CW-52,CH-52);
    ctx.strokeStyle = GOLD; ctx.lineWidth = 1.6; ctx.strokeRect(38,38,CW-76,CH-76);
    ctx.strokeStyle = INK;  ctx.lineWidth = 2;   ctx.strokeRect(46,46,CW-92,CH-92);
    for(const [x,y,sx,sy] of [[46,46,1,1],[CW-46,46,-1,1],[46,CH-46,1,-1],[CW-46,CH-46,-1,-1]]){
      ctx.save(); ctx.translate(x,y); ctx.scale(sx,sy); flourish(ctx); ctx.restore();
    }

    // 表題
    ctx.textAlign = "center";
    ctx.fillStyle = INK;
    ctx.font = `bold 58px ${SERIF}`;
    ctx.fillText("星座命名証明書", 700, 142);
    ctx.fillStyle = GOLD_D;
    ctx.font = `16px ${SERIF}`;
    ctx.fillText(spaced("Certificate of Constellation Registration"), 700, 180);
    ctx.strokeStyle = GOLD; ctx.lineWidth = 1.4;
    ctx.beginPath(); ctx.moveTo(420,206); ctx.lineTo(684,206); ctx.moveTo(716,206); ctx.lineTo(980,206); ctx.stroke();
    diamond(ctx,700,206,7,GOLD); diamond(ctx,420,206,4,GOLD_D); diamond(ctx,980,206,4,GOLD_D);

    // 星座名（左カラム）
    let fs = 62;
    ctx.font = `bold ${fs}px ${SERIF}`;
    while(ctx.measureText(c.name).width > 660 && fs > 30){ fs -= 3; ctx.font = `bold ${fs}px ${SERIF}`; }
    ctx.fillStyle = INK; ctx.fillText(c.name, 470, 320);
    ctx.fillStyle = GOLD_D; ctx.font = `italic 26px ${SERIF}`;
    ctx.fillText(c.latin || "", 470, 362);

    // 本文
    ctx.textAlign = "left";
    ctx.fillStyle = "#2a3050";
    ctx.font = `25px ${SERIF}`;
    const body = `本状をもって、上記の星座が　自称国際天文連盟（SIAU）星座台帳　第${c.id}号として永久に登録されたことを証明する。`;
    wrapJP(ctx, body, 640).forEach((ln,i)=> ctx.fillText(ln, 150, 434 + i*46));

    ctx.strokeStyle = GOLD; ctx.lineWidth = 1.2;
    ctx.beginPath(); ctx.moveTo(380,576); ctx.lineTo(560,576); ctx.stroke();
    diamond(ctx,470,576,5,GOLD);

    ctx.textAlign = "center"; ctx.fillStyle = INK; ctx.font = `24px ${SERIF}`;
    ctx.fillText(`構成恒星数：${c.size}`, 470, 624);
    ctx.fillText(waDate(), 470, 672);

    // 星図（実物を額装）
    const bx=880, by=250, bw=420, bh=390;
    ctx.fillStyle = "rgba(255,252,240,.5)"; ctx.fillRect(bx,by,bw,bh);
    ctx.strokeStyle = INK;  ctx.lineWidth = 3; ctx.strokeRect(bx,by,bw,bh);
    ctx.strokeStyle = GOLD; ctx.lineWidth = 1; ctx.strokeRect(bx+7,by+7,bw-14,bh-14);
    const pts = (c.indices||[]).map(i=>SKY.stars[i]).filter(Boolean);
    if(pts.length){
      const xs = pts.map(p=>p.x), ys = pts.map(p=>p.y);
      const minX=Math.min(...xs), maxX=Math.max(...xs), minY=Math.min(...ys), maxY=Math.max(...ys);
      const pad=46, s=Math.min((bw-pad*2)/Math.max(maxX-minX,1), (bh-pad*2)/Math.max(maxY-minY,1), 3.2);
      const tx=p=> bx+bw/2 + (p.x-(minX+maxX)/2)*s;
      const ty=p=> by+bh/2 + (p.y-(minY+maxY)/2)*s;
      ctx.strokeStyle = "rgba(29,36,64,.75)"; ctx.lineWidth = 2; ctx.lineCap = "round";
      ctx.beginPath();
      for(const [i,j] of (c.edges||[])){
        const a = SKY.stars[i], b = SKY.stars[j];
        if(a && b){ ctx.moveTo(tx(a),ty(a)); ctx.lineTo(tx(b),ty(b)); }
      }
      ctx.stroke();
      for(const p of pts){
        const r = Math.max(p.mag*2.3, 3);
        ctx.fillStyle = "rgba(29,36,64,.15)";
        ctx.beginPath(); ctx.arc(tx(p),ty(p),r*2.1,0,Math.PI*2); ctx.fill();
        ctx.fillStyle = INK;
        ctx.beginPath(); ctx.arc(tx(p),ty(p),r,0,Math.PI*2); ctx.fill();
        ctx.fillStyle = "rgba(244,236,216,.9)";
        ctx.beginPath(); ctx.arc(tx(p),ty(p),r*.32,0,Math.PI*2); ctx.fill();
      }
    }
    ctx.fillStyle = GOLD_D; ctx.font = `italic 17px ${SERIF}`; ctx.textAlign = "center";
    ctx.fillText(`Fig. ${c.id} — 認定星図`, bx+bw/2, by+bh+34);

    // 金の封蝋（リボン2本 → 蝋 → 型押しの星）
    ribbon(ctx, 1152, 830,  .32, "#a8842e");
    ribbon(ctx, 1188, 830, -.18, GOLD_D);
    const sg = ctx.createRadialGradient(1150,798,8, 1170,818,64);
    sg.addColorStop(0,"#f0d690"); sg.addColorStop(.55,"#cfa54e");
    sg.addColorStop(.85,"#a8842e"); sg.addColorStop(1,"#7e6020");
    ctx.fillStyle = sg; ctx.beginPath(); ctx.arc(1170,818,62,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle = "rgba(110,84,28,.8)"; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(1170,818,62,0,Math.PI*2); ctx.stroke();
    ctx.strokeStyle = "rgba(122,92,30,.9)"; ctx.lineWidth = 1.6;
    ctx.beginPath(); ctx.arc(1170,818,50,0,Math.PI*2); ctx.stroke();
    ctx.strokeStyle = "rgba(255,255,255,.35)"; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.arc(1170,818,55,-2.6,-1.6); ctx.stroke();
    star5(ctx, 1172, 820, 25, 10); ctx.fillStyle = "rgba(255,240,200,.85)"; ctx.fill();
    star5(ctx, 1170, 818, 25, 10); ctx.fillStyle = "rgba(110,82,24,.95)"; ctx.fill();

    // 署名 + 手書きふうの飾り下線
    ctx.fillStyle = INK; ctx.font = `26px ${SERIF}`; ctx.textAlign = "center";
    ctx.fillText("自称国際天文連盟 会長　ほしの・むげん", 830, 832);
    ctx.strokeStyle = INK; ctx.lineCap = "round"; ctx.lineWidth = 1.8;
    ctx.beginPath(); ctx.moveTo(630,852); ctx.bezierCurveTo(760,842,920,866,1030,850); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(1030,850); ctx.bezierCurveTo(1052,846,1056,860,1040,862); ctx.stroke();
    ctx.lineWidth = .9;
    ctx.beginPath(); ctx.moveTo(642,857); ctx.bezierCurveTo(772,849,912,870,1016,857); ctx.stroke();

    // ささやかな注意書き
    ctx.fillStyle = "rgba(70,76,110,.75)"; ctx.font = `13px ${SERIF}`;
    ctx.fillText("※ 本証明書に法的効力はいっさいありません。星空はもともと、みんなのものです。", 700, 932);
    return cv;
  }

  // ---- 発行（PNG ダウンロード） ----
  function issue(c){
    try{
      renderCert(c).toBlob(b=>{
        try{
          if(!b){ SKY.toast("発行に失敗しました…台帳係が席を外しています"); return; }
          const a = document.createElement("a");
          a.href = URL.createObjectURL(b);
          a.download = `${c.name}_証明書.png`;
          a.click();
          setTimeout(()=>URL.revokeObjectURL(a.href), 1500);
          SKY.toast("証明書を発行しました（法的効力はありません）");
        }catch(err){ console.error("[seiza-cert]", err); }
      }, "image/png");
    }catch(err){
      console.error("[seiza-cert]", err);
      SKY.toast("発行に失敗しました");
    }
  }

  // ---- パネルカードへ注入（カードは毎回作り直されるので毎回注入） ----
  SKY.on("panel-rendered", ({container})=>{
    try{
      container.querySelectorAll(".card").forEach(card=>{
        if(card.querySelector(".seiza-cert-act")) return;
        const cid = Number(card.dataset.cid);
        const act = document.createElement("span");
        act.className = "seiza-cert-act";
        act.textContent = "📜 証明書を発行";
        act.addEventListener("click", e=>{
          e.stopPropagation();
          try{
            const c = SKY.constellations.find(x=>x.id===cid);
            if(!c || !c.name){ SKY.toast("その星座は台帳から消えてしまったようです"); return; }
            act.animate([{transform:"scale(1)"},{transform:"scale(1.16)"},{transform:"scale(1)"}],
              {duration:320, easing:"ease-out"});
            issue(c);
          }catch(err){ console.error("[seiza-cert]", err); }
        });
        card.append(act);
      });
    }catch(err){ console.error("[seiza-cert]", err); }
  });

  // 既に描画済みのパネルにも反映
  try{ SKY.refreshPanel(); }catch(err){ console.error("[seiza-cert]", err); }
})();
</script>

<script>

(() => {
  "use strict";
  if (!window.SKY) return;
  const SKY = window.SKY;

  // ====================================================================
  //  星座占い — 日替わり・真顔でふざける運勢プラグイン

  // ====================================================================

  // ---- corpora -------------------------------------------------------
  const ITEMS = [

  const DIRS = [

    "磁北と真北のあいだ", "南南東（ただし午前中のみ）", "エレベーターの扉が開く側",
    "昨日と同じ方角（覚えていれば）", "風上", "いちばん近い自動販売機の方角",
    "斜め45度上空", "Wi-Fiの電波が強いほう",
  ];
  const WORDS = [
    "全角スペースがあなたを試します", "「あとで読む」は読みません",
    "git push --force は方角が悪い", "セミコロンの忘れ物に注意",
    "本番環境は金曜の夕方に牙をむきます", "「一時的な対応」は永続します",
    "キャッシュを疑う前に、まず自分を疑いましょう", "既読スルーは星のせいにしてよい日です",
    "TODOコメントが3年目の誕生日を迎えます", "再起動で直るものは、再起動で直ります",
    "傘を持てば降らず、置いていけば降ります", "「すぐ終わる作業」ほど終わりません",
    "動いているコードに触りたい衝動を、星が止めています",
    "console.log の消し忘れが、誰かに発見されます",
    "名前を付けて保存、の名前で日が暮れます", "ゴミ出しの曜日感覚が一日ずれています",
  ];
  const ACTS = [
    "枕の向きを3度だけ変える", "観葉植物に今日の進捗を報告する",
    "冷蔵庫の中身を五十音順に並べる", "使っていないタブを7枚だけ閉じる",
    "靴下を左から履く", "湯呑みのお茶を時計回りに2回まわす",
    "スマホの充電を80%で止める勇気を持つ", "引き出しの3番目だけ整理する",
    "夜空に向かって小さく会釈する", "デスクトップのアイコンをひとつ成仏させる",
    "エレベーターの「閉」を押さずに待ってみる", "いつもより0.5秒長く深呼吸する",
    "パスワードを変えようと思うだけ思う", "消しゴムの角をひとつだけ使う",
  ];
  const OMNI = [
    "今日は省エネ運転が吉。無理は星に任せましょう。",
    "悪くはありません。期待さえしなければ。",
    "可もなく不可もなく。星々も平常運転です。",
    "だいたいうまくいきます。だいたいは。",
    "絶好調です。ただし調子に乗ると★2になります。",
  ];

  // ---- deterministic seed: (name + YYYY-MM-DD) -> mulberry32 ---------
  function hashSeed(str) {
    let h = 1779033703 ^ str.length;
    for (let i = 0; i < str.length; i++) {
      h = Math.imul(h ^ str.charCodeAt(i), 3432918353);
      h = (h << 13) | (h >>> 19);
    }
    h = Math.imul(h ^ (h >>> 16), 2246822507);
    h = Math.imul(h ^ (h >>> 13), 3266489909);
    return (h ^= h >>> 16) >>> 0;
  }
  function mulberry32(a) {
    return () => {
      a |= 0; a = (a + 0x6D2B79F5) | 0;
      let t = Math.imul(a ^ (a >>> 15), 1 | a);
      t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  }
  function fortune(name) {
    const d = new Date();
    const ymd = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
    const rng = mulberry32(hashSeed(name + "|" + ymd));
    const pk = a => a[(rng() * a.length) | 0];
    const lvl = 1 + ((rng() * 5) | 0);
    return {
      lvl, omni: OMNI[lvl - 1],
      item: pk(ITEMS), dir: pk(DIRS), word: pk(WORDS), act: pk(ACTS),
      dateLabel: `${d.getMonth() + 1}月${d.getDate()}日`,
    };
  }

  // ---- styles --------------------------------------------------------
  const style = document.createElement("style");
  style.textContent = `
    .uranai-act{display:inline-block;font-size:11px;color:#bda4ff;margin:7px 0 0 16px;
      cursor:pointer;letter-spacing:.05em;transition:.18s}
    .uranai-act:hover{color:var(--accent);text-shadow:0 0 9px rgba(255,210,122,.55)}
    .uranai-overlay{position:fixed;inset:0;z-index:8;display:flex;align-items:center;
      justify-content:center;background:rgba(3,4,14,.58);backdrop-filter:blur(5px)}
    .uranai-modal{position:relative;width:min(370px,88vw);max-height:84vh;overflow-y:auto;
      scrollbar-width:thin;border-radius:18px;padding:24px 26px 16px;color:var(--ink);
      background:radial-gradient(130% 95% at 50% -10%, rgba(86,52,150,.55) 0%,
        rgba(24,14,52,.97) 52%, rgba(10,6,26,.99) 100%);
      border:1px solid rgba(195,155,255,.38);
      box-shadow:0 0 46px rgba(140,90,240,.3), inset 0 0 60px rgba(90,50,170,.14),
        0 26px 70px rgba(0,0,0,.65)}
    .uranai-modal::-webkit-scrollbar{width:7px}
    .uranai-modal::-webkit-scrollbar-thumb{background:rgba(170,140,255,.3);border-radius:4px}
    .uranai-close{position:absolute;top:9px;right:12px;border:none;background:none;
      color:var(--dim);font-size:15px;line-height:1;padding:6px;cursor:pointer;transition:.2s}
    .uranai-close:hover{color:var(--ink);transform:rotate(90deg)}
    .uranai-head{text-align:center;font-size:15px;font-weight:600;letter-spacing:.06em;
      line-height:1.8;text-shadow:0 0 14px rgba(160,120,255,.45)}
    .uranai-date{text-align:center;font-size:10.5px;letter-spacing:.3em;color:#bda4ff;margin:3px 0 6px}
    .uranai-omni{text-align:center;margin-top:10px}
    .uranai-label{font-size:10px;letter-spacing:.3em;color:#bda4ff;margin-bottom:5px}
    .uranai-starline{font-size:20px;letter-spacing:.16em;color:var(--accent);
      text-shadow:0 0 11px rgba(255,210,122,.6)}
    .uranai-starline span{display:inline-block}
    .uranai-starline .uranai-off{color:rgba(180,150,255,.22);text-shadow:none}
    .uranai-omni-cm{font-size:12.5px;color:#cdd4ff;line-height:1.9;margin-top:5px}
    .uranai-sec{margin-top:13px;padding-top:12px;border-top:1px dashed rgba(190,150,255,.16)}
    .uranai-body{font-size:13px;line-height:1.9;color:#ece6ff}
    .uranai-foot{margin-top:16px;font-size:9.5px;color:var(--dim);line-height:1.7;
      text-align:center;opacity:.85}`;
  document.head.append(style);

  // ---- modal ---------------------------------------------------------
  const esc = s => String(s).replace(/[&<>"]/g,
    ch => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[ch]));
  const sec = (label, body) =>
    `<div class="uranai-sec"><div class="uranai-label">${label}</div>` +
    `<div class="uranai-body">${esc(body)}</div></div>`;

  let overlay = null;
  function onKey(e) { if (e.key === "Escape") closeModal(); }
  function closeModal() {
    try {
      if (!overlay) return;
      const o = overlay; overlay = null;
      document.removeEventListener("keydown", onKey);
      o.animate([{ opacity: 1 }, { opacity: 0 }],
        { duration: 200, easing: "ease-out", fill: "forwards" }).onfinish = () => o.remove();
    } catch (err) { console.error("[uranai]", err); }
  }
  function openModal(name) {
    try {
      closeModal();
      const f = fortune(name);
      const o = document.createElement("div");
      o.className = "uranai-overlay";
      const m = document.createElement("div");
      m.className = "uranai-modal";
      const starsHtml = Array.from({ length: 5 }, (_, i) =>
        i < f.lvl ? "<span>★</span>" : '<span class="uranai-off">☆</span>').join("");
      m.innerHTML =
        `<button class="uranai-close" aria-label="閉じる">✕</button>` +
        `<div class="uranai-head">${esc(name)}のあなたへ</div>` +
        `<div class="uranai-date">— ${f.dateLabel} —</div>` +
        `<div class="uranai-omni"><div class="uranai-label">総合運</div>` +
        `<div class="uranai-starline">${starsHtml}</div>` +
        `<div class="uranai-omni-cm">${esc(f.omni)}</div></div>` +
        sec("ラッキーアイテム", f.item) +
        sec("ラッキー方角", f.dir) +
        sec("今日のひとこと", f.word) +
        sec("開運アクション", f.act) +
        `<div class="uranai-foot">※本占いは星々の気分により予告なく変わります` +
        `（変わりません。日替わりです）</div>`;
      o.append(m);
      document.body.append(o);
      overlay = o;
      o.addEventListener("click", e => { if (e.target === o) closeModal(); });
      m.querySelector(".uranai-close").addEventListener("click", e => {
        e.stopPropagation(); closeModal();
      });
      document.addEventListener("keydown", onKey);
      // soft entrance: veil fades, card floats up, stars pop one by one
      o.animate([{ opacity: 0 }, { opacity: 1 }], { duration: 240, easing: "ease-out" });
      m.animate(
        [{ transform: "translateY(14px) scale(.94)", opacity: 0 },
         { transform: "translateY(0) scale(1)", opacity: 1 }],
        { duration: 380, easing: "cubic-bezier(.2,1.25,.35,1)" });
      m.querySelectorAll(".uranai-starline span").forEach((s, i) => {
        s.animate(
          [{ opacity: 0, transform: "scale(.2) rotate(-40deg)" },
           { opacity: 1, transform: "scale(1) rotate(0deg)" }],
          { duration: 420, delay: 160 + i * 85, fill: "backwards",
            easing: "cubic-bezier(.2,1.5,.4,1)" });
      });
    } catch (err) { console.error("[uranai]", err); }
  }

  // ---- per-card 「🔮 今日の運勢」 (cards are rebuilt on every render) ----
  SKY.on("panel-rendered", ({ container }) => {
    try {
      for (const card of container.querySelectorAll(".card")) {
        if (card.querySelector(".uranai-act")) continue;
        const cid = card.dataset.cid;
        const b = document.createElement("span");
        b.className = "uranai-act";
        b.textContent = "🔮 今日の運勢";
        b.addEventListener("click", e => {
          e.stopPropagation();
          try {
            const c = SKY.constellations.find(k => String(k.id) === String(cid));
            if (c && c.name) openModal(c.name);
          } catch (err) { console.error("[uranai]", err); }
        });
        card.append(b);
      }
    } catch (err) { console.error("[uranai]", err); }
  });

  SKY.on("cleared", closeModal);
})();
</script>

<script>

(()=>{ "use strict";
if(!window.SKY) return;
const SKY = window.SKY;
const PFX = "black-hole";

style.textContent = `
  .${PFX}-armed{
    border-color: rgba(255,160,90,.9) !important;

  @keyframes ${PFX}-pulse{
    0%,100%{ box-shadow: 0 0 10px rgba(255,150,70,.35); }
    50%    { box-shadow: 0 0 22px rgba(255,150,70,.85); }
  }`;
document.head.append(style);

// ---------- accretion-disk gradient (orange -> violet) ----------
const grad = SKY.mk("linearGradient", {id:`${PFX}-grad`, x1:"0%", y1:"0%", x2:"100%", y2:"100%"});
grad.append(
  SKY.mk("stop",{offset:"0%",  "stop-color":"#ff8a3c"}),
  SKY.mk("stop",{offset:"55%", "stop-color":"#ff5e7a"}),
  SKY.mk("stop",{offset:"100%","stop-color":"#9b5cff"})
);
SKY.defs.append(grad);

// ---------- state ----------
const EAT_R = 230;          // world-unit feeding radius
let armed = false;
const claimed = new Set();  // star ids currently being devoured (guards double holes)
const activeFeeds = new Set();
SKY.on("cleared", ()=>{ for(const f of activeFeeds) f.aborted = true; claimed.clear(); });

// ---------- dock button ----------
const btn = SKY.addButton("\u{1F573} ブラックホール", ()=>{
  try{
    armed = !armed;
    setArmedUI();
    SKY.toast(armed ? "次のクリックで時空が歪みます"
                    : "時空の歪みは取り消されました");
  }catch(err){ console.error("[black-hole]", err); }
});
function setArmedUI(){
  btn.classList.toggle(`${PFX}-armed`, armed);
  SKY.svg.style.cursor = armed ? "cell" : "";
}

SKY.svg.addEventListener("pointerdown", (e)=>{

    if(!armed || e.button !== 0) return;

    armed = false; setArmedUI();

  }catch(err){ console.error("[black-hole]", err); }

// ---------- tiny visual helpers ----------
function flash(x, y){
