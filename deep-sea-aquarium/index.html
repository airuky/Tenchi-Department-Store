      box-shadow:0 0 14px rgba(255,40,40,.45)}
    .haishin-dot{width:7px;height:7px;border-radius:50%;background:#fff;
      animation:haishin-pulse 1.3s ease-in-out infinite}
    @keyframes haishin-pulse{0%,100%{opacity:1}50%{opacity:.25}}
    .haishin-view{background:var(--panel);border:1px solid var(--panel-edge);border-radius:999px;
      padding:4px 11px;font-size:11.5px;color:var(--ink);letter-spacing:.05em;
      backdrop-filter:blur(8px);font-variant-numeric:tabular-nums}
    .haishin-on{border-color:rgba(255,90,90,.55)!important;box-shadow:0 0 12px rgba(255,60,60,.25)}`;
  document.head.append(style);

  /* ---------------- dom ---------------- */
  const layer = document.createElement("div");
  layer.className = "haishin-layer";
  layer.hidden = true;
  const hud = document.createElement("div");
  hud.className = "haishin-hud";
  hud.hidden = true;
  hud.innerHTML =
    `<span class="haishin-live"><span class="haishin-dot"></span>${esc("LIVE")}</span>` +
    `<span class="haishin-view"></span>`;
  const viewEl = hud.querySelector(".haishin-view");
  document.body.append(layer, hud);

  /* ---------------- state ---------------- */
  let live = false;
  let viewers = 0, baseline = 5;
  const timers  = new Set();   // every scheduled callback; all cleared on OFF
  const flights = new Set();   // running WAAPI animations = concurrency count
  const laneUse = [];          // lane -> last spawn time (soft collision avoidance)
  const lastFire = {};         // burst cooldowns
  const bornIds = new Set();   // suppress "added" burst for hanshoku children

  function later(fn, ms){
    const id = setTimeout(() => {
      timers.delete(id);
      if(!live) return;
      try{ fn(); }catch(err){ console.error(TAG, err); }
    }, ms);
    timers.add(id);
  }
  function clearTimers(){ for(const id of timers) clearTimeout(id); timers.clear(); }

  /* ---------------- viewer counter ---------------- */
  function updateView(){
    viewEl.textContent = `視聴者 ${Math.max(1, Math.round(viewers))}人`;
  }
  function spike(a, b){ viewers += rand(a, b); updateView(); }
  function walkLoop(){
    later(() => {
      viewers += ri(-1, 1);                     // random walk ±1
      viewers += (baseline - viewers) * 0.08;   // decay toward baseline
      if(viewers < 1) viewers = 1;
      updateView();
      walkLoop();
    }, rand(2500, 4500));
  }

  /* ---------------- comment flights (wall-time via WAAPI) ---------------- */
  function laneY(){
    const H = Math.max(260, window.innerHeight);
    const top = 56, bottom = H * 0.8;
    const n = Math.max(4, Math.floor((bottom - top) / 40));
    let best = 0, bestT = Infinity;
    for(let k = 0; k < 3; k++){                 // pick least-recently-used of 3 random lanes
      const i = (Math.random()*n)|0;
      const t = laneUse[i] || 0;
      if(t < bestT){ bestT = t; best = i; }
    }
    laneUse[best] = performance.now();
    return top + best * (bottom - top) / n + rand(0, 10);
  }
  function fly(el, dur){
    el.style.top = laneY().toFixed(0) + "px";
    layer.append(el);
    const dist = layer.clientWidth + el.offsetWidth + 80;
    const anim = el.animate(
      [{transform:"translateX(0)"}, {transform:`translateX(${-dist}px)`}],
      {duration:dur, easing:"linear", fill:"forwards"});
    flights.add(anim);
    const bye = () => { flights.delete(anim); el.remove(); };
    anim.onfinish = bye;
    anim.oncancel = bye;
  }
  function comment(text){
    if(!live || flights.size >= 6) return;      // ~6 concurrent max
    try{
      const el = document.createElement("div");
      el.className = "haishin-c";
      el.style.fontSize = ri(17, 22) + "px";
      el.textContent = String(text);
      fly(el, rand(6000, 9000));
    }catch(err){ console.error(TAG, err); }
  }

  /* ---------------- スパチャ ---------------- */
  function superchat(){
    if(!live || flights.size >= 8) return;
    try{
      const amt = pick([500,800,1000,1500,2000,3000,5000,8000,10000,20000,30000,50000]);
      const [bg, fg] = amt < 1000  ? ["#1565c0","#fff"]
                     : amt < 3000  ? ["#00977f","#fff"]
                     : amt < 10000 ? ["#e6a800","#241a00"]
                     : amt < 30000 ? ["#e06200","#fff"]
                     :               ["#c62828","#fff"];
      const el = document.createElement("div");
      el.className = "haishin-c haishin-sc";
      el.style.background = bg;
      el.style.color = fg;
      if(fg !== "#fff") el.style.textShadow = "none";
      const amtEl = document.createElement("div");
      amtEl.className = "haishin-sc-amt";
      amtEl.textContent = "¥" + amt.toLocaleString("ja-JP");
      const msgEl = document.createElement("div");
      msgEl.className = "haishin-sc-msg";
      msgEl.textContent = pick(SC_LINES);
      el.append(amtEl, msgEl);
      fly(el, rand(8500, 10500));
      viewers += 3;
      updateView();
    }catch(err){ console.error(TAG, err); }
  }

  /* ---------------- event bursts ---------------- */
  function burst(key, nm){
    const r = REACT[key];
    if(!live || !r) return;
    const now = performance.now();
    if(now - (lastFire[key] || -1e9) < r.cd) return;
    lastFire[key] = now;
    const pool = r.lines.slice();
    const n = Math.min(ri(r.n[0], r.n[1]), pool.length);
    for(let i = 0; i < n; i++){
      const line = pool.splice((Math.random()*pool.length)|0, 1)[0];
      const txt = typeof line === "function" ? line(nm || "あの子") : line;
      later(() => comment(txt), i === 0 ? rand(200, 600) : rand(500, 2800));
    }
    if(r.spike[1] > 0) spike(r.spike[0], r.spike[1]);
  }
  const h = fn => arg => { if(!live) return; try{ fn(arg); }catch(err){ console.error(TAG, err); } };

  SEA.on("esa:fed",        h(a => burst("esa", a && a.creature && a.creature.genome && a.creature.genome.name)));
  SEA.on("sonar:ping",     h(() => burst("sonar")));
  SEA.on("sonar:ghost",    h(() => burst("ghost")));
  SEA.on("nushi:appeared", h(() => {
    burst("nushi");
    later(superchat, rand(6000, 11000));        // always one superchat after the nushi
  }));
  SEA.on("hanshoku:born",  h(a => {
    if(a && a.child && a.child.id != null) bornIds.add(a.child.id);
    burst("born", a && a.child && a.child.genome && a.child.genome.name);
  }));
  SEA.on("creature-added", h(c => {
    if(!c) return;
    const id = c.id, nm = c.genome && c.genome.name;
    later(() => {                               // let a paired hanshoku:born land first
      if(bornIds.has(id)){ bornIds.delete(id); return; }
      burst("added", nm);
    }, 300);
  }));
  SEA.on("kurage:bloom",   h(() => burst("kurage")));
  SEA.on("rov:pass",       h(() => burst("rov")));
  SEA.on("depth:changed",  h(() => burst("depth")));
  SEA.on("cleared",        h(() => burst("cleared")));

  /* ---------------- schedulers ---------------- */
  function idleLoop(){
    later(() => { comment(pick(IDLE)); idleLoop(); }, rand(2600, 7000));
  }
  function scLoop(){
    later(() => { if(Math.random() < 0.15) superchat(); scLoop(); }, rand(20000, 35000));
  }

  /* ---------------- on / off ---------------- */
  function start(){
    live = true;
    baseline = ri(3, 8);
    viewers = baseline;
    updateView();
    hud.hidden = false;
    layer.hidden = false;
    btn.textContent = "📺 配信中";
    btn.classList.add("haishin-on");
    idleLoop(); walkLoop(); scLoop();
    later(() => comment("枠取れた"), 800);
    later(() => comment("こんばんは〜"), 2300);
    SEA.toast("配信を開始しました。深海にも視聴者はいます");
  }
  function stop(){
    live = false;
    clearTimers();
    for(const a of Array.from(flights)){ try{ a.cancel(); }catch(_){} }
    flights.clear();
    layer.replaceChildren();
    hud.hidden = true;
    layer.hidden = true;
    btn.textContent = "📺 配信";
    btn.classList.remove("haishin-on");
    SEA.toast("配信を終了しました。ご視聴ありがとうございました");
  }

  const btn = SEA.addButton("📺 配信", () => {
    try{ live ? stop() : start(); }
    catch(err){ console.error(TAG, err); }
  });
  btn.title = "水槽をライブ配信する（視聴者はたぶん実在しません）";
}catch(err){
  console.error(TAG, "初期化に失敗:", err);
}
})();
</script>

<script>
// ════ plugin: shoutou (wave2) ════ Plugin key "shoutou" (消灯). Paste verbatim into its own <script> tag after the other plugins in deep-sea-aquarium/index.html. Layering: dark rect + glow follow-l
(()=>{ "use strict";
if(!window.SEA) return;
const SEA = window.SEA;
const TAG = "[shoutou]";
try{
  /* ============================================================
     消灯 (shoutou) — lights out; only bioluminescence remains.
     A near-black veil drops between the residents and the glass,
     and a follow-layer of boosted glow clones drifts above it:
     a tank full of slow constellations.
     ============================================================ */

  const DARK_OP = "0.78";   // veil opacity
  const FADE_MS = 1500;     // smooth fade (CSS transition = wall-clock)
  const BOOST   = 1.6;      // glow radius multiplier

  /* ---------------- css ---------------- */
  const style = document.createElement("style");
  style.textContent =
    ".shoutou-dark,.shoutou-follow,.shoutou-follow *{pointer-events:none}" +
    ".shoutou-on{border-color:rgba(255,210,122,.55)!important;" +
      "box-shadow:0 0 14px rgba(255,210,122,.22);}";
  document.head.append(style);

  /* ---------------- layers ----------------
     svg order becomes: ... gCreatures < darkRect < follow < gFx
     (pellets, sonar flashes and the ROV stay visible in the dark) */
  const darkRect = SEA.mk("rect", {x:0, y:0, width:"100%", height:"100%",
    fill:"#000309", "pointer-events":"none", class:"shoutou-dark"});
  darkRect.style.opacity = "0";
  darkRect.style.transition = "opacity " + FADE_MS + "ms ease";
  const follow = SEA.mk("g", {class:"shoutou-follow", "pointer-events":"none"});
  follow.style.opacity = "0";
  follow.style.transition = "opacity " + FADE_MS + "ms ease";
  function ensureLayers(){
    if(!darkRect.isConnected) SEA.gCreatures.after(darkRect);
    if(!follow.isConnected) darkRect.after(follow);
  }
  ensureLayers();
  SEA.gSnow.style.transition = "opacity " + FADE_MS + "ms ease";

  /* ---------------- state ---------------- */
  let dark = false;
  let gen = 0;                    // toggle generation (rapid re-toggle safety)
  let rafId = 0;
  let btn = null;
  const clones = new Map();       // creature id -> {c, g}
  const savedSpeed = new Map();   // creature id -> {orig, halved}
  const raySaved = new WeakMap(); // ray polygon -> {v, p} | null (no prior inline)

  /* ---------------- light rays (gWater polygons) ----------------
     They run an infinite WAAPI shimmer, and the depth dial sets
     !important inline opacity — so: save exact inline state once,
     force 0 !important, and re-assert each frame while dark. */
  function hideRays(){
    for(const n of SEA.gWater.children){
      if(n.tagName !== "polygon") continue;
      if(!raySaved.has(n)){
        const v = n.style.getPropertyValue("opacity");
        raySaved.set(n, v ? {v, p: n.style.getPropertyPriority("opacity")} : null);
      }
      if(n.style.getPropertyValue("opacity") !== "0")
        n.style.setProperty("opacity", "0", "important");
    }
  }
  function restoreRays(){
    for(const n of SEA.gWater.children){
      if(n.tagName !== "polygon" || !raySaved.has(n)) continue;
      const s = raySaved.get(n);
      if(s) n.style.setProperty("opacity", s.v, s.p);
      else n.style.removeProperty("opacity");
      raySaved.delete(n);
    }
  }

  /* ---------------- speeds: halve at night, restore at dawn ---------------- */
  function dimSpeed(c){
    if(!c || c.id == null || savedSpeed.has(c.id)) return;
    const orig = c.speed;
    if(typeof orig !== "number" || !isFinite(orig)) return;
    const halved = orig * 0.5;
    savedSpeed.set(c.id, {orig, halved});
    c.speed = halved;
  }
  function restoreSpeeds(){
    for(const c of SEA.creatures){
      if(!c) continue;
      const s = savedSpeed.get(c.id);
      if(!s) continue;
      // exact restore when untouched; otherwise another plugin (feeding,
      // a passing ヌシ) adjusted it mid-night — preserve the ratio instead
      c.speed = Math.abs(c.speed - s.halved) < 1e-6 ? s.orig : c.speed * 2;
    }
    savedSpeed.clear();
  }

  /* ---------------- counter-glow clones ---------------- */
  function buildClone(c){
    const g = SEA.mk("g", {class:"shoutou-glow"});
    try{
      const dots = c.el.querySelectorAll('[filter="url(#c-glow)"]');
      for(const n of dots){
        const k = n.cloneNode(false);          // leaf circle / ellipse
        if(k.tagName === "circle"){
          const r = parseFloat(k.getAttribute("r"));
          if(isFinite(r)) k.setAttribute("r", (r * BOOST).toFixed(2));
        }else if(k.tagName === "ellipse"){
          const rx = parseFloat(k.getAttribute("rx"));
          const ry = parseFloat(k.getAttribute("ry"));
          if(isFinite(rx)) k.setAttribute("rx", (rx * BOOST).toFixed(2));
          if(isFinite(ry)) k.setAttribute("ry", (ry * BOOST).toFixed(2));
        }
        k.setAttribute("opacity", "1");
        // the lure bulb pulses on the live creature — let the beacon breathe too
        try{
          if(n.getAnimations && n.getAnimations().length){
            k.animate([{opacity:1},{opacity:.45},{opacity:1}],
              {duration:1700 + Math.random()*1600, iterations:Infinity, easing:"ease-in-out"});
          }
        }catch(_){ /* beacons can hold still */ }
        g.append(k);
      }
    }catch(err){ console.error(TAG, "clone", err); }
    follow.append(g);
    try{ g.animate([{opacity:0},{opacity:1}], {duration:900, easing:"ease-out"}); }catch(_){}
    return {c, g};
  }
  function mirror(rec){
    const c = rec.c;
    if(!c.el) return;
    const tr = c.el.getAttribute("transform");   // core rewrites this every frame
    if(tr) rec.g.setAttribute("transform", tr);
    else rec.g.setAttribute("transform",
      "translate(" + ((+c.x || 0).toFixed(1)) + " " + ((+c.y || 0).toFixed(1)) + ")");
    const so = c.el.style.opacity;               // respect depth-band dimming etc.
    if(rec.g.style.opacity !== so) rec.g.style.opacity = so;
  }
  function clearClones(){
    for(const [, rec] of clones){ try{ rec.g.remove(); }catch(_){} }
    clones.clear();
  }

  /* ---------------- per-frame upkeep (only while dark / fading) ---------------- */
  function frame(){
    ensureLayers();
    if(dark) hideRays();                         // depth glide / resize repaint them
    const live = new Set();
    for(const c of SEA.creatures){
      if(!c || !c.el) continue;
      live.add(c.id);
      let rec = clones.get(c.id);
      if(!rec && dark){                          // catch-all: born in the night
        rec = buildClone(c);
        clones.set(c.id, rec);
        dimSpeed(c);
      }
      if(rec) mirror(rec);
    }
    for(const [id, rec] of clones){              // vanished residents
      if(!live.has(id)){ try{ rec.g.remove(); }catch(_){} clones.delete(id); }
    }
  }
  function loop(){
    rafId = 0;
    try{ frame(); }catch(err){ console.error(TAG, err); }
    if(dark || clones.size) rafId = requestAnimationFrame(loop);
  }
  function ensureLoop(){ if(!rafId) rafId = requestAnimationFrame(loop); }

  /* ---------------- toggle ---------------- */
  function darken(){
    dark = true; gen++;
    ensureLayers();
    darkRect.style.opacity = DARK_OP;
    follow.style.opacity = "1";
    SEA.gSnow.style.opacity = ".25";
    hideRays();
    for(const c of SEA.creatures) dimSpeed(c);
    if(btn){ btn.textContent = "💡 点灯"; btn.classList.add("shoutou-on"); }
    SEA.toast("消灯します。発光生物の時間です");
    try{ SEA.emit("shoutou:dark"); }catch(err){ console.error(TAG, err); }
    ensureLoop();
  }
  function lighten(){
    dark = false;
    const my = ++gen;
    darkRect.style.opacity = "0";
    follow.style.opacity = "0";
    SEA.gSnow.style.opacity = "1";
    restoreRays();
    restoreSpeeds();
    if(btn){ btn.textContent = "🌙 消灯"; btn.classList.remove("shoutou-on"); }
    SEA.toast("点灯します。まぶしいのは一瞬です");
    try{ SEA.emit("shoutou:light"); }catch(err){ console.error(TAG, err); }
    setTimeout(() => {                           // after the fade, sweep the stars away
      try{ if(gen === my && !dark) clearClones(); }
      catch(err){ console.error(TAG, err); }
    }, FADE_MS + 150);
  }

  /* ---------------- event wiring ---------------- */
  SEA.on("creature-added", c => {
    try{
      if(!dark || !c || !c.el) return;
      dimSpeed(c);
      if(!clones.has(c.id)){
        const rec = buildClone(c);
        clones.set(c.id, rec);
        mirror(rec);
      }
      ensureLoop();
    }catch(err){ console.error(TAG, err); }
  });
  SEA.on("creature-removed", c => {
    try{
      if(!c) return;
      savedSpeed.delete(c.id);
      const rec = clones.get(c.id);
      if(rec){ try{ rec.g.remove(); }catch(_){} clones.delete(c.id); }
    }catch(err){ console.error(TAG, err); }
  });
  SEA.on("cleared", () => {
    try{ savedSpeed.clear(); clearClones(); }
    catch(err){ console.error(TAG, err); }
  });

  /* ---------------- dock button ---------------- */
  btn = SEA.addButton("🌙 消灯", () => {
    try{ dark ? lighten() : darken(); }
    catch(err){ console.error(TAG, err); }
  });
  btn.title = "明かりを落として、発光だけの水槽にします";
}catch(err){
  console.error(TAG, "初期化に失敗:", err);
}
})();
</script>

<script>
// ════ plugin: tako-dassou (wave2) ════ Plugin key "tako-dassou" (タコの脱走), ambient — no dock button, no audio. Paste verbatim into its own <script> tag after the core script in deep-sea-aquarium/index.
(()=>{ "use strict";
if(!window.SEA) return;
if(window.__TAKO_DASSOU__) return;
window.__TAKO_DASSOU__ = true;
const SEA = window.SEA;
const TAG = "[tako-dassou]";
try{
  /* ============================================================
     タコの脱走 — an ink-red octopus climbs out of the tank,
     crawls across the actual page, sits on a dock button,
     and slips back in. Nothing is stolen. Probably.
     ============================================================ */
  const esc = s => String(s).replace(/[&<>"']/g, m => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m])); // all injected markup below is static; helper kept per house rules
  const clamp = (v,lo,hi) => Math.max(lo, Math.min(hi, v));

  /* ---------------- css ---------------- */
  const style = document.createElement("style");
  style.textContent = `
    .tako-dassou-walker{position:fixed;left:0;top:0;width:46px;height:46px;z-index:10;
      cursor:pointer;pointer-events:auto;touch-action:none;will-change:transform;
      user-select:none;-webkit-user-select:none}
    .tako-dassou-walker svg{display:block;width:100%;height:100%;overflow:visible;
      transform-origin:50% 86%;transition:transform .3s ease;
      filter:drop-shadow(0 3px 6px rgba(0,0,0,.55))}
    .tako-dassou-walker.tako-dassou-hat svg{transform:scaleY(.42) scaleX(1.15)}
    .tako-dassou-hat .tako-dassou-tn,.tako-dassou-hat .tako-dassou-pp{animation-play-state:paused}
    .tako-dassou-tn{transform-box:fill-box;animation:tako-dassou-wig 1.05s ease-in-out infinite alternate}
    .tako-dassou-pp{animation:tako-dassou-dart 3.4s ease-in-out infinite}
    @keyframes tako-dassou-wig{from{transform:rotate(-8deg)}to{transform:rotate(8deg)}}
    @keyframes tako-dassou-dart{0%,16%{transform:translate(0,0)}20%,38%{transform:translate(-1.6px,.4px)}
      44%,60%{transform:translate(1.7px,0)}66%,84%{transform:translate(-.5px,-.9px)}90%,100%{transform:translate(0,0)}}
    .tako-dassou-spot{position:fixed;left:0;top:0;z-index:9;pointer-events:none;border-radius:50%;
      background:radial-gradient(circle, rgba(150,214,232,.42), rgba(150,214,232,0) 72%)}`;
  document.head.append(style);

  /* ---------------- the octopus (static markup, used in svg & html) ---------------- */
  const INK = "#aa3a46", INKD = "#5f1b26";
  function octoMarkup(){
    let m = "";
    const xs = [-9.5,-5.7,-1.9,1.9,5.7,9.5];
    for(let i=0;i<xs.length;i++){
      const x = xs[i], out = x/9.5, s = (i%2 ? 1 : -1);
      const d = `M ${x} 5.5 q ${(out*3+s*2).toFixed(1)} 5.5 ${(out*4+s*.6).toFixed(1)} 9.5`
              + ` q ${(out*2-s*3).toFixed(1)} 5 ${(out*5.5+s*1.6).toFixed(1)} 8`;
      const org = out < -.3 ? "85% 3%" : out > .3 ? "15% 3%" : "50% 3%";
      m += `<path class="tako-dassou-tn" d="${d}" fill="none" stroke="${INK}" stroke-width="2.7"`
         + ` stroke-linecap="round" style="transform-origin:${org};`
         + `animation-duration:${(.95+(i%3)*.18).toFixed(2)}s;animation-delay:${(-i*.31).toFixed(2)}s"/>`;
    }
    return m
      + `<path d="M -11 2 C -11 -15.5, 11 -15.5, 11 2 C 11 6, 6.2 8, 0 8 C -6.2 8, -11 6, -11 2 Z"`
      +   ` fill="${INK}" stroke="${INKD}" stroke-width="1.2"/>`
      + `<ellipse cx="-4.2" cy="-8.5" rx="3.4" ry="4.6" fill="#ffffff" opacity=".07"/>`
      + `<circle cx="-4.4" cy="-3.6" r="2.7" fill="#f6efe7" opacity=".95"/>`
      + `<circle cx="4.4" cy="-3.6" r="2.7" fill="#f6efe7" opacity=".95"/>`
      + `<g class="tako-dassou-pp"><circle cx="-4" cy="-3.4" r="1.25" fill="#27121a"/>`
      + `<circle cx="4.8" cy="-3.4" r="1.25" fill="#27121a"/></g>`;
  }

  /* ---------------- return splash (ripple + bubbles in the svg) ---------------- */
  function splash(x, y){
    try{
      for(let i=0;i<3;i++){
        const ring = SEA.mk("circle", {cx:x.toFixed(1), cy:y.toFixed(1), r:7, fill:"none",
          stroke:"#bfe6f2", "stroke-width":1.3, opacity:.8, "pointer-events":"none"});
        ring.style.transformBox = "fill-box";
        ring.style.transformOrigin = "center";
        SEA.gFx.append(ring);
        ring.animate([{transform:"scale(.3)", opacity:.75},{transform:`scale(${2.6+i*1.2})`, opacity:0}],
          {duration:850+i*240, delay:i*130, easing:"ease-out", fill:"both"}).onfinish = () => ring.remove();
      }
      for(let i=0;i<9;i++){
        const b = SEA.mk("circle", {cx:(x+(Math.random()-.5)*22).toFixed(1),
          cy:(y+(Math.random()-.5)*10).toFixed(1), r:(1+Math.random()*2.2).toFixed(2),
          fill:"none", stroke:"#bfe6f2", "stroke-width":.8, opacity:.7, "pointer-events":"none"});
        SEA.gFx.append(b);
        b.animate([{transform:"translate(0,0)", opacity:.7},
          {transform:`translate(${((Math.random()-.5)*30).toFixed(1)}px, ${(-40-Math.random()*60).toFixed(1)}px)`, opacity:0}],
          {duration:1100+Math.random()*900, easing:"ease-out"}).onfinish = () => b.remove();
      }
    }catch(err){ console.error(TAG, "splash", err); }
  }

  /* ---------------- perch: a random visible dock button ---------------- */
  function pickPerch(W, H){
    try{
      const btns = Array.from(document.querySelectorAll(".dock .btn")).filter(b => {
        const r = b.getBoundingClientRect();
        return r.width > 10 && r.height > 10 && r.bottom > 0 && r.top < H;
      });
      if(btns.length){
        const r = btns[(Math.random()*btns.length)|0].getBoundingClientRect();
        return {x: r.left + r.width/2, y: r.top - 6};   // sits on top, tentacles draping over
      }
    }catch(err){ console.error(TAG, "perch", err); }
    return {x: 90, y: H - 44};                          // where the dock usually lives
  }

  /* ---------------- the escape ---------------- */
  let active = false;
  let nextAt = performance.now() + 90000 + Math.random()*60000;   // first chance 90-150s

  function startEscape(){
    if(active) return;
    const W = SEA.W, H = SEA.H;
    if(!W || !H || W < 300 || H < 240) return;
    active = true;
    let gIn = null, walker = null, doneFlag = false;
    const spots = new Set();

    function cleanup(hard){
      doneFlag = true;
      try{ if(gIn){ gIn.remove(); gIn = null; } }catch(_){}
      try{ if(walker){ walker.remove(); walker = null; } }catch(_){}
      if(hard){ for(const s of spots){ try{ s.remove(); }catch(_){} } spots.clear(); }
      active = false;
      nextAt = Math.max(nextAt, performance.now() + 120000);
    }

    try{
      SEA.emit("tako:escape");

      // (1) surface near a tank edge, look around
      const side = Math.random() < .5 ? -1 : 1;
      const p0 = {x: side < 0 ? 34 + Math.random()*36 : W - 34 - Math.random()*36,
                  y: H*(.3 + Math.random()*.35)};
      gIn = SEA.mk("g");
      gIn.style.pointerEvents = "none";                 // esa keeps its water clicks
      gIn.innerHTML = `<g>${octoMarkup()}</g>`;
      gIn.setAttribute("transform", `translate(${p0.x.toFixed(1)} ${p0.y.toFixed(1)})`);
      SEA.gFx.append(gIn);
      gIn.animate([{opacity:0, transform:`translate(${p0.x}px, ${p0.y+22}px)`},
                   {opacity:1, transform:`translate(${p0.x}px, ${p0.y}px)`}],
                  {duration:750, easing:"ease-out"});
      const inner = gIn.firstChild;
      if(inner && inner.animate){
        inner.style.transformBox = "fill-box";
        inner.style.transformOrigin = "center";
        inner.animate([{transform:"rotate(0deg)"},{transform:"rotate(-6deg)"},
          {transform:"rotate(5deg)"},{transform:"rotate(0deg)"}],
          {duration:2400, delay:450, easing:"ease-in-out"});
      }
      SEA.toast("タコが脱走を企てています");

      // crawl plan: edge -> gentle meander -> dock button -> meander -> edge
      const perch = pickPerch(W, H);
      const pEnd = {x: side < 0 ? 30 : W - 30, y: H*(.35 + Math.random()*.3)};
      const pts = [p0];
      for(let i=1;i<=3;i++){
        const f = i/4;
        pts.push({x: clamp(p0.x + (perch.x-p0.x)*f + (Math.random()-.5)*W*.34, 44, W-44),
                  y: clamp(p0.y + (perch.y-p0.y)*f + (Math.random()-.5)*H*.3, 40, H-90)});
      }
      const perchIdx = pts.length;
      pts.push(perch);
      pts.push({x: clamp((perch.x+pEnd.x)/2 + (Math.random()-.5)*W*.25, 44, W-44),
                y: clamp((perch.y+pEnd.y)/2 - 40 - Math.random()*120, 40, H-90)});
      pts.push(pEnd);
      const cum = [0];
      let total = 0;
      for(let i=1;i<pts.length;i++){
        total += Math.hypot(pts[i].x-pts[i-1].x, pts[i].y-pts[i-1].y);
        cum.push(total);
      }
      if(!(total > 0)) total = 1;
      const crawlDur = 20000 + Math.random()*5000;      // ~20-25s of crawling
      const pauseDur = 2000 + Math.random()*1000;       // 2-3s on the button
      const pauseStart = crawlDur * cum[perchIdx] / total;

      function pointAt(k){
        const d = clamp(k, 0, 1) * total;
        let i = 0;
        while(i < pts.length-2 && cum[i+1] < d) i++;
        const a = pts[i], b = pts[i+1];
        const seg = (cum[i+1]-cum[i]) || 1;
        const f = clamp((d-cum[i])/seg, 0, 1);
        const e = f*f*(3-2*f);                          // soft per-leg pulses
        return {x: a.x+(b.x-a.x)*e, y: a.y+(b.y-a.y)*e};
      }

      // single elapsed-wall-time loop for the whole sequence
      const t0 = performance.now();
      const PEEK = 2800 + Math.random()*900;
      let tC0 = 0, lastNow = t0, lastSpot = 0;
      let freezeUntil = 0, wasFrozen = false, frozenAt = 0, frozenAcc = 0;
      const cur = {x: p0.x, y: p0.y};
      let movK = 0;

      function draw(x, y, rot){
        walker.style.transform =
          `translate(${(x-23).toFixed(1)}px, ${(y-23).toFixed(1)}px) rotate(${rot.toFixed(1)}deg)`;
      }
      function makeWalker(){
        walker = document.createElement("div");
        walker.className = "tako-dassou-walker";
        walker.setAttribute("title", "脱走中のタコ");
        walker.innerHTML = `<svg viewBox="-26 -26 52 52" width="46" height="46"`
          + ` xmlns="http://www.w3.org/2000/svg" aria-hidden="true">${octoMarkup()}</svg>`;
        walker.addEventListener("pointerdown", e => {
          try{
            if(e.button !== 0 && e.pointerType === "mouse") return;
            e.preventDefault();
            e.stopPropagation();
            if(performance.now() < freezeUntil) return;
            freezeUntil = performance.now() + 3000;     // hat mode: flat & still, resumes after 3s
            walker.classList.add("tako-dassou-hat");
            SEA.toast("タコは帽子のふりをしています");
          }catch(err){ console.error(TAG, "click", err); }
        });
        document.body.append(walker);
        draw(cur.x, cur.y, 0);
      }
      function dropSpot(x, y){
        const sp = document.createElement("div");
        sp.className = "tako-dassou-spot";
        const r = 7 + Math.random()*6;
        sp.style.width = r + "px";
        sp.style.height = (r*.7) + "px";
        sp.style.transform = `translate(${(x - r/2 + (Math.random()-.5)*14).toFixed(1)}px,`
          + ` ${(y + 8 + (Math.random()-.5)*8).toFixed(1)}px)`;
        document.body.append(sp);
        spots.add(sp);
        sp.animate([{opacity:.65},{opacity:.4, offset:.4},{opacity:0}],
          {duration:3600+Math.random()*1200, easing:"ease-out", fill:"both"})
          .onfinish = () => { try{ sp.remove(); }catch(_){} spots.delete(sp); };
      }

      function step(now){
        try{
          if(doneFlag) return;
          const dt = Math.min(.1, (now - lastNow)/1000 || 0);
          lastNow = now;

          if(now - t0 < PEEK){ requestAnimationFrame(step); return; }   // still peeking in the tank

          if(!walker){                                   // (2) leave the svg: html takes over
            tC0 = now;
            makeWalker();
            try{ if(gIn) gIn.remove(); }catch(_){}
            gIn = null;
          }

          const frozen = now < freezeUntil;              // hat bookkeeping (wall-time)
          if(frozen && !wasFrozen){ wasFrozen = true; frozenAt = now; }
          if(!frozen && wasFrozen){
            wasFrozen = false;
            frozenAcc += now - frozenAt;
            try{ walker.classList.remove("tako-dassou-hat"); }catch(_){}
          }
          if(frozen){ requestAnimationFrame(step); return; }

          const eff = now - tC0 - frozenAcc;
          if(eff >= crawlDur + pauseDur){                // (3) slip back into the tank
            const ex = clamp(cur.x, 20, (SEA.W || W) - 20);
            const ey = clamp(cur.y, 20, (SEA.H || H) - 20);
            cleanup(false);                              // wet spots fade on their own
            splash(ex, ey);
            SEA.toast("タコは満足して戻りました。何も盗まれていません。たぶん");
            return;
          }

          const sitting = eff >= pauseStart && eff < pauseStart + pauseDur;
          const s = eff < pauseStart ? eff : (sitting ? pauseStart : eff - pauseDur);
          const p = pointAt(s / crawlDur);
          movK += ((sitting ? 0 : 1) - movK) * Math.min(1, dt*4);
          let tx = p.x + Math.sin(eff/300) * 7 * movK;   // gentle meander
          let ty = p.y + Math.sin(eff/430 + 1.7) * 4 * movK;
          tx = clamp(tx, 18, window.innerWidth - 18);    // resize-safe
          ty = clamp(ty, 18, window.innerHeight - 12);
          const k = Math.min(1, dt*6);
          cur.x += (tx - cur.x) * k;
          cur.y += (ty - cur.y) * k;
          const rot = Math.sin(eff/160) * 5 * movK + clamp((tx - cur.x)*.25, -10, 10);
          draw(cur.x, cur.y, rot);

          if(movK > .5 && now - lastSpot > 620 + Math.random()*380){
            lastSpot = now;
            dropSpot(cur.x, cur.y);
          }
          requestAnimationFrame(step);
        }catch(err){
          console.error(TAG, "step", err);
          cleanup(true);
        }
      }
      requestAnimationFrame(step);
    }catch(err){
      console.error(TAG, "escape", err);
      cleanup(true);
    }
  }

  /* ---------------- scheduler: roll every 4-8 min at 30% ---------------- */
  setInterval(() => {
    try{
      const now = performance.now();
      if(active || now < nextAt) return;
      if(document.hidden){ nextAt = now + 30000; return; }   // an unseen escape is a wasted escape
      nextAt = now + 240000 + Math.random()*240000;
      if(Math.random() < .3) startEscape();
    }catch(err){ console.error(TAG, "roll", err); }
  }, 5000);
}catch(err){
  console.error(TAG, "init", err);
}
})();
</script>

<script>

(()=>{ "use strict";

      "あなた、食べられないほうの生き物ですよね。確認です",
      "上から降ってくるもので、嫌いなものはまだありません",
      "五分前に食べた気もしますし、五年前の気もします",
      "いま、おいしそうな音がしませんでしたか。しましたよね",
      "夢の中でも食べています。起きると減っていて困ります",
    ]},
    { label:"敬語", lines:[
      "お世話になっております。深海の者です",
      "平素より格別のご観察を賜り、厚く御礼申し上げます",
      "本日は水温も低く、絶好の遊泳日和でございます",
      "ご用件は以上でよろしいでしょうか。こちらは以上です",
      "恐れ入りますが、餌の件は前向きにご検討いただけますと幸いです",
      "今後とも変わらぬお引き立てのほど、よろしくお願い申し上げます",
      "お見送りは結構です。お気をつけてお帰りくださいませ",
    ]},
    { label:"眠い", lines:[
      "……はい。……はい？",
      "すみません、いま三割ほど寝ていました",
      "続きは夢の中で聞きます。たぶん同じ話を見ます",
      "目は開いています。開いているだけです",
      "……ふぁ。今のは、あくびです。深海にも、あります",
      "五分だけ……いえ、五時間だけ……",
      "おやすみなさい。あ、違いました。こんにちは",
    ]},
  ];
  const THANKS = [
    "さっきのは良い粒でした。87点です",
    "ごちそうさまでした。次のごはんの話をしましょう",
    "あの落下速度、完璧でした。お礼を言っておきます",
    "正直に申告します。ひとつ多く食べました",
    "おいしかったです。味は、よく覚えていませんが",
  ];

  // ---------------- state ----------------
  const fedAt    = new Map();   // creature id -> performance.now() of last meal
  const lastSaid = new Map();   // creature id -> last reply string (no repeats in a row)
  const history  = new Map();   // creature id -> last KEEP replies
  let busy = false;
  let session = 0;              // bumped on every dossier render; stale timeouts bail

  function hashStr(s){
    let h = 0;
    for(let i = 0; i < s.length; i++) h = (Math.imul(h, 31) + s.charCodeAt(i)) | 0;
    return h >>> 0;
  }
  function personaOf(genome){
    return PERSONAS[hashStr(String((genome && genome.name) || "")) % PERSONAS.length];
  }
  function pruneFed(now){
    for(const [id, t] of fedAt) if(now - t > FED_MS) fedAt.delete(id);
  }
  function pickLine(pool, avoid){
    if(pool.length < 2) return pool[0];
    let s, tries = 0;
    do{ s = pool[(Math.random() * pool.length) | 0]; }while(s === avoid && ++tries < 12);
    if(s === avoid) s = pool[(pool.indexOf(avoid) + 1) % pool.length];
    return s;
  }
  function replyFor(c){
    const now = performance.now();
    pruneFed(now);
    let pool;
    if(fedAt.has(c.id)){ pool = THANKS; fedAt.delete(c.id); }  // gratitude first, once
    else pool = personaOf(c.genome).lines;
    const s = pickLine(pool, lastSaid.get(c.id));
    lastSaid.set(c.id, s);
    return s;
  }
  function remember(id, text){
    let arr = history.get(id);
    if(!arr){
      if(history.size > 120){                       // keep the maps small
        const k = history.keys().next().value;
        history.delete(k); lastSaid.delete(k);
      }
      arr = []; history.set(id, arr);
    }
    arr.push(text);
    while(arr.length > KEEP) arr.shift();
  }

  // ---------------- wiring: memory of meals & departures ----------------
  SEA.on("esa:fed", arg => { try{
    const c = arg && arg.creature;
    if(!c || c.id == null) return;
    const now = performance.now();
    fedAt.set(c.id, now);
    pruneFed(now);
  }catch(err){ console.error(TAG, err); } });

  SEA.on("creature-removed", c => { try{
    if(!c || c.id == null) return;
    fedAt.delete(c.id); lastSaid.delete(c.id); history.delete(c.id);
  }catch(err){ console.error(TAG, err); } });

  SEA.on("cleared", () => { try{
    fedAt.clear(); lastSaid.clear(); history.clear();
  }catch(err){ console.error(TAG, err); } });

  // ---------------- css ----------------
  const style = document.createElement("style");

    .honyaku-log:empty{margin-top:0}
    .honyaku-line{display:flex;align-items:flex-start;gap:8px;
      background:rgba(95,232,210,.07);border:1px solid rgba(95,232,210,.18);border-radius:11px;
      padding:6px 11px;font-size:12.5px;line-height:1.95;color:#c8ecef;letter-spacing:.02em}
    .honyaku-dot{flex:none;width:7px;height:7px;border-radius:50%;margin-top:8px}
    .honyaku-tx{min-width:0}
    .honyaku-pend{color:var(--dim);border-style:dashed}
    .honyaku-foot{font-size:10px;color:var(--dim);opacity:.55;margin-top:7px;letter-spacing:.08em}
  `;
  document.head.append(style);

  // ---------------- ui ----------------
  function lineNode(text, genome){
    const d = document.createElement("div");
    d.className = "honyaku-line";
    const dot = document.createElement("span");
    dot.className = "honyaku-dot";
    const col = `hsl(${(genome && genome.acc) || 165},100%,68%)`;
    dot.style.background = col;
    dot.style.boxShadow = `0 0 6px ${col}`;
    const tx = document.createElement("span");
    tx.className = "honyaku-tx";
    tx.textContent = "「" + text + "」";
    d.append(dot, tx);
    return d;
  }
  function gradeFade(log){
    const ls = log.querySelectorAll(".honyaku-line:not(.honyaku-pend):not(.honyaku-dying)");
    for(let i = 0; i < ls.length; i++){
      const back = ls.length - 1 - i;                      // 0 = newest
      ls[i].style.opacity = back >= 2 ? ".38" : back === 1 ? ".66" : "1";
    }
  }

  function inject(arg){
    const c = arg && arg.creature, el = arg && arg.el;
    if(!c || !el || !c.genome) return;
    const stale = el.querySelector(".honyaku-box");        // paranoia: never two boxes
    if(stale) stale.remove();
    const mySession = ++session;
    busy = false;

    const box = document.createElement("div");
    box.className = "honyaku-box";
    box.innerHTML =
      `<div class="honyaku-head">` +
        `<button type="button" class="honyaku-btn">🗣 話しかける</button>` +
        `<span class="honyaku-tag">翻訳機の見立て：${esc(personaOf(c.genome).label)}</span>` +
      `</div>` +
      `<div class="honyaku-log"></div>` +
      `<div class="honyaku-foot">${esc(FOOT_TXT)}</div>`;
    el.append(box);

    const btn  = box.querySelector(".honyaku-btn");
    const log  = box.querySelector(".honyaku-log");
    const foot = box.querySelector(".honyaku-foot");

    // restore this resident's recent conversation
    const past = history.get(c.id) || [];
    for(const t of past) log.append(lineNode(t, c.genome));
    gradeFade(log);
    foot.style.display = past.length ? "" : "none";

    btn.addEventListener("click", () => { try{
      if(busy || mySession !== session) return;
      if(!SEA.creatures.includes(c)){
        SEA.toast("その住人は、もう水槽にいません");
        return;
      }
      busy = true;
      btn.disabled = true;
      const pend = document.createElement("div");
      pend.className = "honyaku-line honyaku-pend";
      pend.textContent = "……（翻訳中）";
      log.append(pend);

      setTimeout(() => { try{
        busy = false;
        if(mySession !== session || !box.isConnected){ pend.remove(); return; }
        btn.disabled = false;
        pend.remove();
        const text = replyFor(c);
        remember(c.id, text);
        const node = lineNode(text, c.genome);
        log.append(node);

        // oldest beyond KEEP fades away
        const ls = log.querySelectorAll(".honyaku-line:not(.honyaku-pend):not(.honyaku-dying)");
        for(let i = 0; i < ls.length - KEEP; i++){
          const ghost = ls[i];
          ghost.classList.add("honyaku-dying");
          try{
            ghost.animate(
              [{opacity: ghost.style.opacity || 1, transform:"none"},
               {opacity: 0, transform:"translateY(-4px)"}],
              {duration: 420, easing:"ease-out", fill:"forwards"}
            ).onfinish = () => ghost.remove();
          }catch(_){ ghost.remove(); }
          setTimeout(() => { try{ ghost.remove(); }catch(_){} }, 700);
        }
        gradeFade(log);
        try{
          node.animate(
            [{opacity:0, transform:"translateY(5px)"},{opacity:1, transform:"none"}],
            {duration:260, easing:"ease-out"});
        }catch(_){}
        foot.style.display = "";
      }catch(err){
        console.error(TAG, err);
        busy = false;
        try{ btn.disabled = false; pend.remove(); }catch(_){}
      } }, 480 + Math.random()*360);     // brief, deliberate "translating…" pause
    }catch(err){ console.error(TAG, err); busy = false; } });
  }

  SEA.on("dossier-opened", arg => {
    try{ inject(arg); }catch(err){ console.error(TAG, err); }
  });
}catch(err){ console.error(TAG, "初期化に失敗:", err); }
})();
</script>

    .kenbikyo-ovl.kenbikyo-show{opacity:1}
    .kenbikyo-scope{width:min(430px,94vw);max-height:92vh;overflow-y:auto;display:flex;flex-direction:column;
      background:var(--panel);border:1px solid var(--panel-edge);border-radius:16px;backdrop-filter:blur(14px);
      box-shadow:0 22px 70px rgba(0,0,0,.65);padding:14px 16px 12px;
      transform:translateY(12px);transition:transform .28s;scrollbar-width:thin}
    .kenbikyo-ovl.kenbikyo-show .kenbikyo-scope{transform:none}
    .kenbikyo-head{display:flex;align-items:baseline;gap:10px;padding:0 2px 10px}
    .kenbikyo-title{flex:1;font-size:13.5px;font-weight:600;letter-spacing:.08em;color:var(--ink)}
    .kenbikyo-x{background:none;border:none;color:var(--dim);font-size:14px;cursor:pointer;
      padding:2px 6px;font-family:inherit;transition:color .2s}
    .kenbikyo-x:hover{color:var(--ink)}
    .kenbikyo-viewwrap{display:flex;justify-content:center}
    .kenbikyo-view{width:min(360px,78vw,52vh);height:auto;cursor:crosshair}
    .kenbikyo-cap{min-height:36px;margin-top:9px;font-size:12px;line-height:1.7;color:#bfe2ee;
      text-align:center;letter-spacing:.03em;padding:0 6px}
    .kenbikyo-cap b{color:var(--warm);font-weight:600;margin-right:8px}
    .kenbikyo-dim{color:var(--dim)}
    .kenbikyo-zoom{display:flex;justify-content:center;gap:8px;margin-top:6px}
    .kenbikyo-zb{cursor:pointer;font-family:inherit;font-size:11.5px;letter-spacing:.06em;color:var(--dim);
      background:rgba(255,255,255,.03);border:1px solid var(--panel-edge);border-radius:999px;
      padding:5px 14px;transition:.18s}
    .kenbikyo-zb:hover{color:var(--ink);border-color:rgba(95,232,210,.5)}
    .kenbikyo-zb.kenbikyo-zon{color:var(--warm);border-color:rgba(255,210,122,.55);background:rgba(255,210,122,.07)}
    .kenbikyo-foot{margin-top:10px;padding-top:9px;border-top:1px dashed var(--panel-edge);
      font-size:11px;color:var(--dim);text-align:center;letter-spacing:.12em}`;
  document.head.append(style);

  /* ---------------- state ---------------- */
  let armed = false, btn = null;
  let ovl = null, orgLayer = null, titleEl = null, capEl = null, zoomBtns = [];
  let zoom = 40, sampleNo = 0, memNo = 0, defaultCap = "";
  const usedMicro = new Set();
  let noteBag = [];

  function nextNo(){
    try{
      const k = "kenbikyo:no";
      let n = parseInt(localStorage.getItem(k) || "0", 10);
      if(!isFinite(n) || n < 0) n = 0;
      n += 1;
      localStorage.setItem(k, String(n));
      return n;
    }catch(_){ return ++memNo; }
  }
  function makeMicroName(){
    for(let i=0;i<24;i++){
      let n = pick(M_HEAD) + pick(M_TAIL);
      if(Math.random() < .1) n += "モドキ";
      if(!usedMicro.has(n)){ usedMicro.add(n); return n; }
    }
    return pick(M_HEAD) + pick(M_TAIL) + ((Math.random()*90+10)|0);
  }
  function takeNote(){
    if(!noteBag.length) noteBag = NOTES.slice();
    return noteBag.splice((Math.random()*noteBag.length)|0, 1)[0];
  }

  /* ---------------- WAAPI motion helpers (wall-time driven) ---------------- */
  function spinFx(el, dur){
    el.style.transformBox = "fill-box"; el.style.transformOrigin = "center";
    el.animate([{transform:"rotate(0deg)"},{transform:"rotate(360deg)"}],
      {duration:dur, iterations:Infinity, easing:"linear"});
  }
  function wiggleFx(el, deg, dur){
    el.style.transformBox = "fill-box"; el.style.transformOrigin = "center";
    el.animate([{transform:`rotate(${-deg}deg)`},{transform:`rotate(${deg}deg)`},{transform:`rotate(${-deg}deg)`}],
      {duration:dur, iterations:Infinity, easing:"ease-in-out", delay:-Math.random()*dur});
  }
  function driftFx(el, amp, linear){
    const n = 3, pts = [];
    for(let i=0;i<n;i++) pts.push([rand(-amp,amp), rand(-amp,amp)]);
    pts.push(pts[0]);
    const dur = rand(16000, 38000);
    el.animate(pts.map((p,i)=>({
      transform:`translate(${p[0].toFixed(1)}px, ${p[1].toFixed(1)}px)`,
      easing: linear ? "linear" : "ease-in-out",
      offset: i/n
    })), {duration:dur, iterations:Infinity, delay:-Math.random()*dur});
  }

  /* ---------------- organism builders (origin center) ---------------- */
  const sw = r => Math.max(.5, r*.045);
  function gDiatom(r){
    const g = SEA.mk("g");
    const hue = 160 + Math.random()*55;
    const ln = `hsla(${hue},85%,80%,.6)`;
    g.append(SEA.mk("circle",{r:r.toFixed(1), fill:`hsla(${hue},70%,70%,.12)`, stroke:ln, "stroke-width":sw(r)}));
    const k = 6 + ((Math.random()*7)|0);
    for(let i=0;i<k;i++){
      const a = i/k*Math.PI*2, c = Math.cos(a), s = Math.sin(a);
      g.append(SEA.mk("line",{x1:(c*r*.22).toFixed(1), y1:(s*r*.22).toFixed(1),
        x2:(c*r*.9).toFixed(1), y2:(s*r*.9).toFixed(1), stroke:ln, "stroke-width":sw(r)*.8, opacity:.65}));
    }
    g.append(SEA.mk("circle",{r:(r*.22).toFixed(1), fill:"none", stroke:ln, "stroke-width":sw(r)*.8, opacity:.8}));
    spinFx(g, rand(14000, 46000));                 // 回されている
    return g;
  }
  function gFlag(r){
    const g = SEA.mk("g");
    const hue = 175 + Math.random()*60;
    const ln = `hsla(${hue},85%,80%,.65)`;
    g.append(SEA.mk("path",{d:
      `M ${(r*.95).toFixed(1)} 0 C ${(r*.95).toFixed(1)} ${(-r*.62).toFixed(1)}, ${(-r*.15).toFixed(1)} ${(-r*.66).toFixed(1)}, ${(-r*.8).toFixed(1)} ${(-r*.16).toFixed(1)}`+
      ` Q ${(-r).toFixed(1)} 0, ${(-r*.8).toFixed(1)} ${(r*.16).toFixed(1)} C ${(-r*.15).toFixed(1)} ${(r*.66).toFixed(1)}, ${(r*.95).toFixed(1)} ${(r*.62).toFixed(1)}, ${(r*.95).toFixed(1)} 0 Z`,
      fill:`hsla(${hue},70%,70%,.16)`, stroke:ln, "stroke-width":sw(r)}));
    g.append(SEA.mk("circle",{cx:(r*.4).toFixed(1), cy:0, r:Math.max(.7, r*.1).toFixed(1), fill:ln, opacity:.75}));
    const tail = SEA.mk("path",{d:`M ${(-r*.92).toFixed(1)} 0 q ${(-r*.6).toFixed(1)} ${(-r*.45).toFixed(1)}, ${(-r*1.5).toFixed(1)} ${(-r*.1).toFixed(1)}`,
      fill:"none", stroke:ln, "stroke-width":sw(r)*.9, "stroke-linecap":"round", opacity:.8});
    tail.style.transformBox = "fill-box"; tail.style.transformOrigin = "right center";
    tail.animate([{transform:"rotate(-24deg)"},{transform:"rotate(26deg)"},{transform:"rotate(-24deg)"}],
      {duration:rand(550, 950), iterations:Infinity, easing:"ease-in-out", delay:-Math.random()*900});
    g.append(tail);
    wiggleFx(g, rand(4, 9), rand(2800, 5200));
    return g;
  }
  function gCope(r){
    const g = SEA.mk("g");
    const hue = 150 + Math.random()*60;
    const ln = `hsla(${hue},80%,78%,.65)`, fl = `hsla(${hue},65%,68%,.15)`;
    g.append(SEA.mk("ellipse",{cx:(r*.3).toFixed(1), cy:0, rx:(r*.62).toFixed(1), ry:(r*.42).toFixed(1), fill:fl, stroke:ln, "stroke-width":sw(r)}));
    g.append(SEA.mk("ellipse",{cx:(-r*.35).toFixed(1), cy:0, rx:(r*.34).toFixed(1), ry:(r*.26).toFixed(1), fill:fl, stroke:ln, "stroke-width":sw(r)*.8}));
    g.append(SEA.mk("ellipse",{cx:(-r*.72).toFixed(1), cy:0, rx:(r*.2).toFixed(1), ry:(r*.15).toFixed(1), fill:fl, stroke:ln, "stroke-width":sw(r)*.8}));
    g.append(SEA.mk("path",{d:`M ${(-r*.88).toFixed(1)} 0 l ${(-r*.3).toFixed(1)} ${(-r*.18).toFixed(1)} M ${(-r*.88).toFixed(1)} 0 l ${(-r*.3).toFixed(1)} ${(r*.18).toFixed(1)}`,
      stroke:ln, "stroke-width":sw(r)*.8, fill:"none", opacity:.8}));
    g.append(SEA.mk("circle",{cx:(r*.62).toFixed(1), cy:(-r*.08).toFixed(1), r:Math.max(.6, r*.07).toFixed(1), fill:"#0a2630", opacity:.85}));
    const ant = SEA.mk("path",{d:
      `M ${(r*.7).toFixed(1)} ${(-r*.1).toFixed(1)} q ${(r*.5).toFixed(1)} ${(-r*.4).toFixed(1)}, ${(r*1.15).toFixed(1)} ${(-r*.28).toFixed(1)}`+
      ` M ${(r*.7).toFixed(1)} ${(r*.1).toFixed(1)} q ${(r*.5).toFixed(1)} ${(r*.34).toFixed(1)}, ${(r*1.1).toFixed(1)} ${(r*.3).toFixed(1)}`,
      stroke:ln, "stroke-width":sw(r)*.8, fill:"none", opacity:.85});
    ant.style.transformBox = "fill-box"; ant.style.transformOrigin = "left center";
    ant.animate([{transform:"rotate(-7deg)"},{transform:"rotate(7deg)"},{transform:"rotate(-7deg)"}],
      {duration:rand(700, 1300), iterations:Infinity, easing:"ease-in-out", delay:-Math.random()*1200});
    g.append(ant);
    wiggleFx(g, rand(5, 10), rand(2400, 4600));
    return g;
  }
  function gCube(r){                               // 立方体。説明はしない。
    const g = SEA.mk("g");
    const w = r*.8, h = r*.42, v = r*.85;
    const p = n => n.toFixed(1);
    g.append(SEA.mk("polygon",{points:`0,${p(-v)} ${p(w)},${p(-h)} 0,0 ${p(-w)},${p(-h)}`,
      fill:"rgba(210,228,236,.30)", stroke:"rgba(225,240,247,.55)", "stroke-width":sw(r)*.8}));
    g.append(SEA.mk("polygon",{points:`0,0 ${p(w)},${p(-h)} ${p(w)},${p(v-h)} 0,${p(v)}`,
      fill:"rgba(150,176,190,.26)", stroke:"rgba(225,240,247,.45)", "stroke-width":sw(r)*.8}));
    g.append(SEA.mk("polygon",{points:`0,0 ${p(-w)},${p(-h)} ${p(-w)},${p(v-h)} 0,${p(v)}`,
      fill:"rgba(95,120,135,.30)", stroke:"rgba(225,240,247,.4)", "stroke-width":sw(r)*.8}));
    return g;
  }
  function addBlobs(g, r){                         // internal organelles for the 400× giant
    const n = 4 + ((Math.random()*4)|0);
    for(let i=0;i<n;i++){
      const a = Math.random()*Math.PI*2, d = Math.random()*r*.5;
      const b = SEA.mk("circle",{cx:(Math.cos(a)*d).toFixed(1), cy:(Math.sin(a)*d).toFixed(1),
        r:(r*(.07+Math.random()*.1)).toFixed(1), fill:`hsla(${160+Math.random()*60},70%,75%,.22)`,
        stroke:"rgba(220,245,240,.25)", "stroke-width":.6});
      const dur = rand(5000, 11000), dx = rand(-r*.08, r*.08), dy = rand(-r*.08, r*.08);
      b.animate([{transform:"translate(0,0)"},{transform:`translate(${dx.toFixed(1)}px,${dy.toFixed(1)}px)`},{transform:"translate(0,0)"}],
        {duration:dur, iterations:Infinity, easing:"ease-in-out", delay:-Math.random()*dur});
      g.append(b);
    }
    g.append(SEA.mk("circle",{cx:(r*.18).toFixed(1), cy:(-r*.12).toFixed(1), r:(r*.2).toFixed(1),
      fill:"rgba(160,220,210,.16)", stroke:"rgba(220,245,240,.35)", "stroke-width":.8}));
  }

  /* ---------------- caption ---------------- */
  function setCaption(name, note){
    if(!capEl) return;
    capEl.innerHTML = `<b>${esc(name)}</b>${esc(note)}`;
  }
  function resetCaption(){
    if(!capEl) return;
    capEl.innerHTML = `<span class="kenbikyo-dim">${esc(defaultCap)}</span>`;
  }

  /* ---------------- spawn one organism into the field ---------------- */
  function spawnOrg(type, r, giant){
    const amp = giant ? rand(5, 10) : rand(8, 20);
    const margin = Math.max(6, R - r - amp - 4);
    const a = Math.random()*Math.PI*2;
    const d = giant ? Math.random()*16 : Math.sqrt(Math.random())*margin;
    const base = SEA.mk("g",{transform:`translate(${(Math.cos(a)*d).toFixed(1)} ${(Math.sin(a)*d).toFixed(1)})`});
    const drf = SEA.mk("g");
    let body;
    if(type === "diatom") body = gDiatom(r);
    else if(type === "flag") body = gFlag(r);
    else if(type === "cope") body = gCope(r);
    else body = gCube(r);
    if(giant) addBlobs(body, r);
    drf.append(body);
    const hit = SEA.mk("circle",{r:(r*(type==="flag"?1.6:1.3)+6).toFixed(1), fill:"#000", opacity:"0"});
    hit.style.pointerEvents = "all";
    drf.append(hit);
    base.append(drf);
    driftFx(drf, amp, type === "cube");            // 立方体は迷わない
    const name = makeMicroName(), note = takeNote();
    const show = e => { try{ setCaption(name, note); }catch(err){ console.error(TAG, err); } };
    hit.addEventListener("pointerenter", show);
    hit.addEventListener("pointerdown", show);
    hit.addEventListener("pointerleave", () => { try{ resetCaption(); }catch(err){ console.error(TAG, err); } });
    orgLayer.append(base);
  }
  function pickType(){
    return Math.random() < .12 ? "cube" : pick(["diatom","flag","cope"]);
  }

  /* ---------------- field roll per magnification ---------------- */
  function rollField(z){
    if(!orgLayer) return;
    zoom = z;
    usedMicro.clear();
    orgLayer.replaceChildren();
    let total = 0;
    if(z === 40){
      const n = 6 + ((Math.random()*4)|0);
      for(let i=0;i<n;i++) spawnOrg(pickType(), rand(8.5, 15), false);
      total = n;
    }else if(z === 100){
      const n = 9 + ((Math.random()*4)|0);
      for(let i=0;i<n;i++) spawnOrg(pickType(), rand(4.5, 8.5), false);
      total = n;
    }else{
      spawnOrg(pick(["diatom","flag","cope"]), rand(46, 56), true);   // 視野の半分を占める個体
      const n = 7 + ((Math.random()*5)|0);
      for(let i=0;i<n;i++) spawnOrg(pickType(), rand(2.6, 5), false);
      total = n + 1;
    }
    if(titleEl) titleEl.textContent = `採水サンプル No.${sampleNo}　倍率${z}×`;
    defaultCap = `視野内 ${total} 個体。気になるものに、そっと触れてみてください`;
    resetCaption();
    for(const b of zoomBtns) b.classList.toggle("kenbikyo-zon", +b.dataset.z === z);
  }

  /* ---------------- the scope svg ---------------- */
  function buildScopeSvg(){
    const sv = SEA.mk("svg",{viewBox:"-100 -100 200 200", class:"kenbikyo-view", "aria-label":"検鏡視野"});
    const defs = SEA.mk("defs");
    defs.innerHTML =
      `<clipPath id="kenbikyo-clip"><circle cx="0" cy="0" r="${R}"/></clipPath>`+
      `<radialGradient id="kenbikyo-water" cx="42%" cy="38%" r="78%">`+
        `<stop offset="0%" stop-color="#07242f"/><stop offset="100%" stop-color="#020c13"/></radialGradient>`+
      `<radialGradient id="kenbikyo-vig">`+
        `<stop offset="60%" stop-color="#000" stop-opacity="0"/>`+
        `<stop offset="86%" stop-color="#000" stop-opacity=".34"/>`+
        `<stop offset="100%" stop-color="#000" stop-opacity=".88"/></radialGradient>`;
    sv.append(defs);
    const field = SEA.mk("g",{"clip-path":"url(#kenbikyo-clip)"});
    field.append(SEA.mk("circle",{r:R, fill:"url(#kenbikyo-water)"}));
    const grid = SEA.mk("g",{stroke:"rgba(95,232,210,.07)", "stroke-width":.5});
    for(let v=-R; v<=R; v+=23){
      grid.append(SEA.mk("line",{x1:v, y1:-R, x2:v, y2:R}));
      grid.append(SEA.mk("line",{x1:-R, y1:v, x2:R, y2:v}));
    }
    field.append(grid);
    for(let i=0;i<14;i++){                          // motes of nothing in particular
      field.append(SEA.mk("circle",{cx:rand(-R,R).toFixed(1), cy:rand(-R,R).toFixed(1),
        r:(Math.random()*.9+.3).toFixed(2), fill:"#bcd8e6", opacity:(.06+Math.random()*.1).toFixed(2)}));
    }
    orgLayer = SEA.mk("g");
    field.append(orgLayer);
    const vig = SEA.mk("circle",{r:R, fill:"url(#kenbikyo-vig)"});
    vig.style.pointerEvents = "none";
    field.append(vig);
    sv.append(field);
    sv.append(SEA.mk("circle",{r:R, fill:"none", stroke:"rgba(95,232,210,.35)", "stroke-width":1.6}));
    sv.append(SEA.mk("circle",{r:96.5, fill:"none", stroke:"rgba(8,24,36,.95)", "stroke-width":6}));
    return sv;
  }

  /* ---------------- modal lifecycle ---------------- */
  function openScope(){
    if(ovl) return;
    sampleNo = nextNo();
    noteBag = [];
    ovl = document.createElement("div");
    ovl.className = "kenbikyo-ovl";
    ovl.innerHTML =
      `<div class="kenbikyo-scope" role="dialog" aria-modal="true" aria-label="顕微鏡">`+
        `<div class="kenbikyo-head">`+
          `<div class="kenbikyo-title"></div>`+
          `<button class="kenbikyo-x" title="閉じる">✕</button>`+
        `</div>`+
        `<div class="kenbikyo-viewwrap"></div>`+
        `<div class="kenbikyo-cap"></div>`+
        `<div class="kenbikyo-zoom">`+
          `<button class="kenbikyo-zb" data-z="40">40×</button>`+
          `<button class="kenbikyo-zb" data-z="100">100×</button>`+
          `<button class="kenbikyo-zb" data-z="400">400×</button>`+
        `</div>`+
        `<div class="kenbikyo-foot">視野の中に、また小さな水族館がある</div>`+
      `</div>`;
    titleEl = ovl.querySelector(".kenbikyo-title");
    capEl = ovl.querySelector(".kenbikyo-cap");
    zoomBtns = Array.from(ovl.querySelectorAll(".kenbikyo-zb"));
    ovl.querySelector(".kenbikyo-viewwrap").append(buildScopeSvg());
    for(const b of zoomBtns){
      b.addEventListener("click", () => { try{ rollField(+b.dataset.z); }catch(err){ console.error(TAG, err); } });
    }
    ovl.querySelector(".kenbikyo-x").addEventListener("click", closeScope);
    ovl.addEventListener("click", e => { try{ if(e.target === ovl) closeScope(); }catch(err){ console.error(TAG, err); } });
    document.body.append(ovl);
    rollField(40);
    requestAnimationFrame(() => { if(ovl) ovl.classList.add("kenbikyo-show"); });
    try{ SEA.emit("kenbikyo:sampled", {no: sampleNo}); }catch(err){ console.error(TAG, err); }
  }
  function closeScope(){
    try{
      if(!ovl) return;
      const o = ovl;
      ovl = null; orgLayer = null; titleEl = null; capEl = null; zoomBtns = [];
      o.classList.remove("kenbikyo-show");
      setTimeout(() => { try{ o.remove(); }catch(_){} }, 320);
    }catch(err){ console.error(TAG, err); }
  }

  /* ---------------- sampling mode ---------------- */
  function arm(){
    armed = true;
    if(btn) btn.classList.add("kenbikyo-armbtn");
    try{ SEA.svg.classList.add("kenbikyo-aim"); }catch(_){}
    SEA.toast("採水モード：水のどこかをクリックしてください");
  }
  function disarm(){
    armed = false;
    if(btn) btn.classList.remove("kenbikyo-armbtn");
    try{ SEA.svg.classList.remove("kenbikyo-aim"); }catch(_){}
  }

  function sampleFx(x, y){
    try{
      const ring = SEA.mk("circle",{cx:x.toFixed(1), cy:y.toFixed(1), r:4, fill:"none",
        stroke:"var(--acc, #5fe8d2)", "stroke-width":1.4, opacity:.9});
      ring.style.transformBox = "fill-box"; ring.style.transformOrigin = "center";
      SEA.gFx.append(ring);
      ring.animate([{transform:"scale(.4)", opacity:.9},{transform:"scale(6)", opacity:0}],
        {duration:700, easing:"ease-out"}).onfinish = () => ring.remove();
      for(let i=0;i<5;i++){
        const b = SEA.mk("circle",{cx:(x+(Math.random()-.5)*14).toFixed(1), cy:(y+(Math.random()-.5)*10).toFixed(1),
          r:(.8+Math.random()*1.6).toFixed(2), fill:"none", stroke:"#bfe6f2", "stroke-width":.8, opacity:.7});
        SEA.gFx.append(b);
        b.animate([{transform:"translate(0,0)", opacity:.7},
          {transform:`translate(${((Math.random()-.5)*24).toFixed(1)}px, ${(-30-Math.random()*40).toFixed(1)}px)`, opacity:0}],
          {duration:800+Math.random()*500, easing:"ease-out"}).onfinish = () => b.remove();
      }
    }catch(err){ console.error(TAG, err); }
  }

  // CAPTURE phase: fires before esa (bubble) and before creature/ROV target handlers.
  // preventDefault() makes the polite plugins bail; stopPropagation() covers the rest.
  SEA.svg.addEventListener("pointerdown", e => {
    try{
      if(!armed) return;
      if(e.defaultPrevented || e.button !== 0) return;
      e.preventDefault();
      e.stopPropagation();
      disarm();                                    // one click, one sample
      const r = SEA.svg.getBoundingClientRect();
      const x = (e.clientX - r.left) * SEA.W / Math.max(1, r.width);
      const y = (e.clientY - r.top) * SEA.H / Math.max(1, r.height);
      sampleFx(x, y);
      SEA.toast("ひとしずく、お借りしました");
      setTimeout(() => { try{ openScope(); }catch(err){ console.error(TAG, err); } }, 420);
    }catch(err){ console.error(TAG, err); }
  }, true);

  document.addEventListener("keydown", e => {
    try{
      if(e.key !== "Escape") return;
      if(ovl) closeScope();
      else if(armed){ disarm(); SEA.toast("採水を中止しました。海は気にしていません"); }
    }catch(err){ console.error(TAG, err); }
  });

  /* ---------------- dock ---------------- */
  btn = SEA.addButton("🔬 顕微鏡", () => {
    try{
      if(ovl){ closeScope(); return; }
      if(armed){ disarm(); SEA.toast("採水を中止しました。海は気にしていません"); }
      else arm();
    }catch(err){ console.error(TAG, err); }
  });
  btn.title = "水をひとしずく採って、覗いてみる";
}catch(err){
  console.error("[kenbikyo] 初期化に失敗:", err);
}
})();
</script>

<script>

          const b = SEA.mk("circle", { cx: x + (Math.random() - .5) * 12, cy: y + (Math.random() - .5) * 8,
