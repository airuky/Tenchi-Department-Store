    n => `${n}が今日いちばんの速さを出しました`,
    n => `${n}は食後、心なしか明るく光っています`,
    n => `${n}が落下地点を完璧に読んでいました`,
    n => `${n}はよく噛んで食べました。歯はありませんが`,
  ];

  // ---- pellets ----------------------------------------------------------
  function spawnPellet(x, y, now) {
    try {
      while (pellets.length >= MAX_PELLETS) removePellet(pellets[0], false);
      const el = SEA.mk("g", { class: "esa-pellet" });
      el.append(
        SEA.mk("circle", { r: 5.5, fill: "var(--warm, #ffd27a)", opacity: ".28", filter: "url(#esa-glow)" }),
        SEA.mk("circle", { r: 2.5, fill: "var(--warm, #ffd27a)", opacity: ".95" }),
        SEA.mk("circle", { cx: -0.8, cy: -0.8, r: 0.8, fill: "#fff3d6", opacity: ".85" })
      );
      el.setAttribute("transform", `translate(${x.toFixed(1)} ${y.toFixed(1)})`);
      SEA.gFx.append(el);
      el.animate([{ opacity: 0 }, { opacity: 1 }], { duration: 250, easing: "ease-out" });
      pellets.push({
        el, x0: x, y0: y, x, y, born: now,
        ph: Math.random() * Math.PI * 2,
        amp: 2.5 + Math.random() * 4,
        frq: 1 + Math.random() * 0.9,
        sink: SINK_BASE - 2 + Math.random() * 4,
      });
    } catch (err) { console.error("[esa] spawn", err); }
  }

  function removePellet(p, fade) {
    const i = pellets.indexOf(p);
    if (i >= 0) pellets.splice(i, 1);
    try {
      if (fade) {
        p.el.animate([{ opacity: 1 }, { opacity: 0 }], { duration: 450, easing: "ease-out" })
          .onfinish = () => p.el.remove();
      } else {
        p.el.remove();
      }
    } catch (err) { p.el.remove(); }
  }

  // ---- gulp effect (temporary elements only — never the live el) ------
  function gulpFx(x, y) {
    try {
      const n = 2 + ((Math.random() * 2) | 0);
      for (let i = 0; i < n; i++) {
        const b = SEA.mk("circle", {
          cx: x + (Math.random() - 0.5) * 10, cy: y + (Math.random() - 0.5) * 6,
          r: 1 + Math.random() * 1.6, fill: "none",
          stroke: "#ffe7b3", "stroke-width": 0.8, opacity: 0.8,
        });
        SEA.gFx.append(b);
        b.animate(
          [{ transform: "translate(0,0)", opacity: 0.8 },
           { transform: `translate(${(Math.random() - 0.5) * 16}px, ${-18 - Math.random() * 22}px)`, opacity: 0 }],
          { duration: 450 + Math.random() * 300, easing: "ease-out" }
        ).onfinish = () => b.remove();
      }
      const ring = SEA.mk("circle", {
        cx: x, cy: y, r: 9, fill: "none",
        stroke: "var(--warm, #ffd27a)", "stroke-width": 1.2, opacity: 0.7,
      });
      ring.style.transformOrigin = `${x}px ${y}px`;
      SEA.gFx.append(ring);
      ring.animate(
        [{ transform: "scale(.35)", opacity: 0.75 }, { transform: "scale(1.5)", opacity: 0 }],
        { duration: 420, easing: "ease-out" }
      ).onfinish = () => ring.remove();
    } catch (err) { console.error("[esa] gulp", err); }
  }

  function eat(c, p, now, st) {
    st.lastEat = now;
    removePellet(p, false);
    gulpFx(p.x, p.y);
    SEA.emit("esa:fed", { creature: c });
    if (Math.random() < 0.25) {
      try { SEA.toast(SEA.pick(PRAISE)(c.genome.name)); } catch (err) { console.error("[esa] toast", err); }
    }
  }

  // ---- main loop (elapsed-time driven) --------------------------------
  function tick(now) {
    // staggered feast drops
    for (let i = queue.length - 1; i >= 0; i--) {
      if (queue[i].t <= now) {
        const q = queue.splice(i, 1)[0];
        spawnPellet(q.x, q.y, now);
      }
    }
    const H = SEA.H;

    // sink pellets
    for (let i = pellets.length - 1; i >= 0; i--) {
      const p = pellets[i];
      const age = (now - p.born) / 1000;
      p.x = p.x0 + Math.sin(age * p.frq + p.ph) * p.amp;
      p.y = p.y0 + age * p.sink;
      if (age > LIFE_S || p.y > H - 6) { removePellet(p, true); continue; }
      p.el.setAttribute("transform", `translate(${p.x.toFixed(1)} ${p.y.toFixed(1)})`);
    }

    // attraction — steer via documented fields only; jellies drift on
    for (const c of SEA.creatures) {
      if (!c || !c.genome || c.genome.arch === "jelly") continue;
      let best = null, bd2 = SENSE2;
      for (const p of pellets) {
        const dx = p.x - c.x, dy = p.y - c.y, d2 = dx * dx + dy * dy;
        if (d2 < bd2) { bd2 = d2; best = p; }
      }
      let st = chase.get(c);
      if (best) {
        if (!st) { st = { base: c.speed, lastEat: 0 }; chase.set(c, st); }
        const dist = Math.sqrt(bd2);
        const dx = best.x - c.x;
        if (Math.abs(dx) > 4) c.dir = dx > 0 ? 1 : -1;
        c.targetY = Math.max(H * 0.12, Math.min(H * 0.88, best.y));
        c.speed = st.base * (1 + 0.6 * Math.min(1, dist / 130)); // up to ~1.6x, eases off near food
        if (dist < EAT_R && now - st.lastEat > 250) eat(c, best, now, st);
      } else if (st) {
        c.speed = st.base;
        chase.delete(c);
      }
    }
  }

  function loop(t) {
    try { tick(t); } catch (err) { console.error("[esa] tick", err); }
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);

  // ---- click open water -> one pellet ---------------------------------
  SEA.svg.addEventListener("pointerdown", (e) => {
    try {
      if (e.defaultPrevented || e.button !== 0) return; // a creature/actor claimed it
      const r = SEA.svg.getBoundingClientRect();
      if (!(r.width > 0) || !(r.height > 0)) return;
      const x = (e.clientX - r.left) * SEA.W / r.width;
      const y = (e.clientY - r.top) * SEA.H / r.height;
      spawnPellet(x, y, performance.now());
    } catch (err) { console.error("[esa] click", err); }
  });

  // ---- dock button: feeding time --------------------------------------
  let lastFeast = -1e9, cdTimer = null;
  const feastBtn = SEA.addButton("🍤 ごはんの時間", () => {
    try {
      const now = performance.now();
      if (now - lastFeast < FEAST_CD) { SEA.toast("あげすぎです"); return; }
      lastFeast = now;
      feastBtn.classList.add("esa-cd");
      clearTimeout(cdTimer);
      cdTimer = setTimeout(() => { try { feastBtn.classList.remove("esa-cd"); } catch (e) {} }, FEAST_CD);
      const n = 8 + ((Math.random() * 5) | 0); // 8-12
      for (let i = 0; i < n; i++) {
        queue.push({
          t: now + 150 + i * (90 + Math.random() * 140),
          x: SEA.W * (0.06 + 0.88 * Math.random()),
          y: 6 + Math.random() * 20,
        });
      }
      SEA.toast("ごはんの時間です。上から良いものが降ってきます");
    } catch (err) { console.error("[esa] feast", err); }
  });

  // ---- housekeeping -----------------------------------------------------
  SEA.on("cleared", () => {
    try {
      queue.length = 0;
      while (pellets.length) removePellet(pellets[0], false);
      for (const [c, st] of chase) c.speed = st.base;
      chase.clear();
    } catch (err) { console.error("[esa] cleared", err); }
  });

  SEA.on("creature-removed", (c) => {
    try {
      const st = chase.get(c);
      if (st) { c.speed = st.base; chase.delete(c); }
    } catch (err) { console.error("[esa] removed", err); }
  });
})();
</script>

<script>
// ════ plugin: sonar ════ Sonar plugin for the deep-sea aquarium. Dock button 「📡 ソナー」 fires a 3-ring teal wavefront from screen center past the corners over ~2.2s, driven by performance.now() deltas in a self-terminating rAF l
(()=>{ "use strict";
  if(!window.SEA) return;
  const SEA = window.SEA;

  // ------------------------------------------------------------------
  //  sonar — ping the dark and see what answers
  // ------------------------------------------------------------------
  const SWEEP_MS  = 2200;   // wavefront lifetime
  const RING_DELAY = 130;   // ms between concentric rings
  const RINGS     = 3;
  const COOL_MS   = 6000;   // button cooldown
  const GHOST_P   = 0.08;   // chance of a phantom shadow

  // ---- style ----
  try{
    const st = document.createElement("style");
    st.textContent = [
      ".sonar-fx{pointer-events:none}",
      ".sonar-flash *{fill:none !important;stroke:#dff4ff !important;stroke-width:1.1 !important;",
      "  filter:none !important;opacity:1 !important}",
      ".sonar-ghost *{fill:none !important;stroke:#2a5165 !important;stroke-width:1.2 !important;",
      "  filter:none !important;opacity:1 !important}",
      ".sonar-nm{font-size:11px;fill:#cfeaff;letter-spacing:.08em;text-anchor:middle;",
      "  paint-order:stroke;stroke:rgba(1,8,16,.85);stroke-width:3px;stroke-linejoin:round}",
      ".sonar-cool{opacity:.45 !important;cursor:default !important;transform:none !important}"
    ].join("\n");
    document.head.appendChild(st);
  }catch(err){ console.error("[sonar] style", err); }

  // ---- audio: lazy AudioContext, gentle sine blip + quieter echo ----
  let actx = null;
  function blip(t0, vol){
    const o = actx.createOscillator();
    const g = actx.createGain();
    o.type = "sine";
    o.frequency.setValueAtTime(1100, t0);
    o.frequency.exponentialRampToValueAtTime(940, t0 + 0.3);
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(vol, t0 + 0.012);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.32);
    o.connect(g); g.connect(actx.destination);
    o.start(t0); o.stop(t0 + 0.36);
  }
  function playPing(){
    try{
      const AC = window.AudioContext || window.webkitAudioContext;
      if(!AC) return;
      if(!actx) actx = new AC();
      if(actx.state === "suspended") actx.resume();
      const t0 = actx.currentTime + 0.02;
      blip(t0, 0.07);          // ping
      blip(t0 + 0.4, 0.022);   // ...echo
    }catch(err){ console.error("[sonar] audio", err); }
  }

  // ---- flash a resident (temporary outline clone; never touch live el) ----
  function flashCreature(c){
    try{
      const wrap = SEA.mk("g", { class:"sonar-fx sonar-flash",
        transform:`translate(${c.x.toFixed(1)} ${c.y.toFixed(1)})` });
      const clone = SEA.creatureGroup(c.genome);
      clone.setAttribute("transform", `scale(${c.flip < 0 ? -1 : 1} 1)`);
      wrap.append(clone);
      SEA.gFx.append(wrap);
      wrap.animate([{opacity:.95},{opacity:0}], {duration:1200, easing:"ease-out"})
        .onfinish = () => wrap.remove();

      const lx = Math.max(46, Math.min(SEA.W - 46, c.x));
      const ly = Math.max(18, c.y - c.genome.size * 0.55 - 12);
      const label = SEA.mk("text", { class:"sonar-fx sonar-nm",
        x:lx.toFixed(1), y:ly.toFixed(1) });
      label.textContent = c.genome.name;
      SEA.gFx.append(label);
      label.animate(
        [{opacity:0},{opacity:.95, offset:.08},{opacity:.95, offset:.72},{opacity:0}],
        {duration:2000, easing:"linear"}).onfinish = () => label.remove();
    }catch(err){ console.error("[sonar] flash", err); }
  }

  // ---- the phantom: an unregistered shadow at an empty-ish spot ----
  function planGhostSpot(){
    const W = SEA.W, H = SEA.H;
    let best = null, bestD = -1;
    for(let i=0;i<12;i++){
      const x = 90 + Math.random()*Math.max(120, W - 180);
      const y = H*0.15 + Math.random()*H*0.7;
      let d = Infinity;
      for(const c of SEA.creatures) d = Math.min(d, Math.hypot(c.x - x, c.y - y));
      if(d > bestD){ bestD = d; best = {x, y}; }
      if(bestD > 140) break;
    }
    return best;
  }
  function showGhost(gh){
    try{
      const wrap = SEA.mk("g", { class:"sonar-fx sonar-ghost",
        transform:`translate(${gh.x.toFixed(1)} ${gh.y.toFixed(1)})` });
      const grp = SEA.creatureGroup(gh.genome);
      if(Math.random() < .5) grp.setAttribute("transform", "scale(-1 1)");
      wrap.append(grp);
      SEA.gFx.append(wrap);
      wrap.animate(
        [{opacity:0},{opacity:.85, offset:.18},{opacity:.85, offset:.72},{opacity:0}],
        {duration:2500, easing:"ease-in-out"}).onfinish = () => wrap.remove();
      SEA.toast("ソナーに、未登録の影が映りました");
      SEA.emit("sonar:ghost");
    }catch(err){ console.error("[sonar] ghost", err); }
  }

  // ---- the sweep (elapsed-wall-time driven) ----
  function fireSweep(){
    const W = SEA.W, H = SEA.H;
    const cx = W/2, cy = H/2;
    const maxR = Math.hypot(W, H)/2 + 70;   // beyond the corners
    const rings = [];
    for(let i=0;i<RINGS;i++){
      rings.push(SEA.mk("circle", { class:"sonar-fx", cx, cy, r:0,
        fill:"none", stroke:"#5fe8d2", "stroke-width": i===0 ? 2 : 1.3, opacity:0 }));
    }
    SEA.gFx.append(...rings);

    const flashed = new Set();
    let ghost = null, ghostShown = false;
    if(Math.random() < GHOST_P){
      const spot = planGhostSpot();
      if(spot) ghost = { x:spot.x, y:spot.y, genome: SEA.makeGenome() };
    }

    const start = performance.now();
    const totalMs = SWEEP_MS + (RINGS-1)*RING_DELAY;
    function step(now){
      try{
        const elapsed = now - start;
        let leadR = 0;
        for(let i=0;i<RINGS;i++){
          const t = (elapsed - i*RING_DELAY) / SWEEP_MS;
          if(t < 0) continue;
          if(t >= 1){
            rings[i].setAttribute("opacity", 0);
            if(i === 0) leadR = maxR;       // make sure stragglers still get swept
            continue;
          }
          const r = (1 - Math.pow(1 - t, 1.7)) * maxR;   // ease-out expansion
          if(i === 0) leadR = r;
          rings[i].setAttribute("r", r.toFixed(1));
          rings[i].setAttribute("opacity", ((1 - t) * (i === 0 ? .55 : .3)).toFixed(3));
        }

        if(leadR > 0){
          for(const c of SEA.creatures){
            if(flashed.has(c.id)) continue;
            if(Math.hypot(c.x - cx, c.y - cy) <= leadR){
              flashed.add(c.id);
              flashCreature(c);
            }
          }
          if(ghost && !ghostShown && Math.hypot(ghost.x - cx, ghost.y - cy) <= leadR){
            ghostShown = true;
            showGhost(ghost);
          }
        }

        if(elapsed < totalMs){ requestAnimationFrame(step); }
        else{ for(const r of rings) r.remove(); }
      }catch(err){
        console.error("[sonar] sweep", err);
        for(const r of rings){ try{ r.remove(); }catch(_){} }
      }
    }
    requestAnimationFrame(step);
  }

  // ---- dock button + cooldown ----
  let lastFire = -Infinity;
  try{
    const btn = SEA.addButton("📡 ソナー", () => {
      try{
        const now = performance.now();
        if(now - lastFire < COOL_MS) return;   // authoritative even if timers throttle
        lastFire = now;
        playPing();                            // the click is the gesture
        SEA.emit("sonar:ping");
        fireSweep();
        btn.disabled = true;
        btn.classList.add("sonar-cool");
        setTimeout(() => {
          try{ btn.disabled = false; btn.classList.remove("sonar-cool"); }catch(_){}
        }, COOL_MS);
      }catch(err){ console.error("[sonar] click", err); }
    });
    btn.title = "暗闇に一度だけ問いかけます（再充電 約6秒）";
  }catch(err){ console.error("[sonar] init", err); }
})();
</script>

<script>
// ════ plugin: hydrophone ════ Hydrophone ambience plugin for deep-sea-aquarium/index.html — paste into its own <script> tag after the core script. Dock toggle 「🎧 ハイドロフォン」↔「🔇 ハイドロフォン」 with
(()=>{
"use strict";
if(!window.SEA) return;
const SEA = window.SEA;

/* ================================================================
   ハイドロフォン — listen to the deep
   Toggleable synthesized soundscape: abyssal bed, whale calls,
   clicks & creaks, rare bubbles. Whale songs radiate a faint ring
   from a random resident.
   ================================================================ */

const LABEL_OFF = "🎧 ハイドロフォン";
const LABEL_ON  = "🔇 ハイドロフォン";
const MASTER    = 0.22;

/* ---------- state ---------- */
let ctx = null;          // lazy AudioContext (first user gesture)
let graph = null;        // current live audio graph
let fading = null;       // graph currently fading out
let killT = null;        // teardown timer for the fading graph
let listening = false;
let gen = 0;             // toggle generation: stale async turnOn calls bail
let btn = null;
let brownBuf = null, tickBuf = null;
const timers = new Set();

const rand = (a, b) => a + Math.random() * (b - a);

/* ---------- style ---------- */
try{
  const st = document.createElement("style");
  st.textContent =
    ".hydrophone-on{border-color:rgba(95,232,210,.6)!important;" +
      "animation:hydrophone-breathe 5s ease-in-out infinite;}" +
    "@keyframes hydrophone-breathe{" +
      "0%,100%{box-shadow:0 0 6px rgba(95,232,210,.12)}" +
      "50%{box-shadow:0 0 16px rgba(95,232,210,.38)}}";
  document.head.appendChild(st);
}catch(err){ console.error("[hydrophone] style", err); }

/* ---------- timer helpers (all cleared on off) ---------- */
function later(fn, ms){
  const id = setTimeout(() => {
    timers.delete(id);
    if(!listening) return;
    try{ fn(); }catch(err){ console.error("[hydrophone]", err); }
  }, ms);
  timers.add(id);
}
function clearTimers(){
  for(const id of timers) clearTimeout(id);
  timers.clear();
}
function every(fn, minS, maxS, firstMinS, firstMaxS){
  const next = () => later(() => { fn(); next(); }, rand(minS, maxS) * 1000);
  later(() => { fn(); next(); }, rand(firstMinS, firstMaxS) * 1000);
}

/* ---------- noise buffers ---------- */
function makeBuffers(){
  const sr = ctx.sampleRate;

  // brown-ish noise (leaky integrator), loop-crossfaded
  brownBuf = ctx.createBuffer(1, (sr * 5) | 0, sr);
  const d = brownBuf.getChannelData(0);
  let last = 0;
  for(let i = 0; i < d.length; i++){
    last = (last + 0.02 * (Math.random() * 2 - 1)) / 1.02;
    d[i] = last * 3.2;
  }
  const F = (sr * 0.4) | 0;
  for(let i = 0; i < F; i++){
    const w = i / F;
    d[d.length - F + i] = d[d.length - F + i] * (1 - w) + d[i] * w;
  }

  // short decaying white noise for ticks
  tickBuf = ctx.createBuffer(1, (sr * 0.25) | 0, sr);
  const t = tickBuf.getChannelData(0);
  for(let i = 0; i < t.length; i++) t[i] = (Math.random() * 2 - 1) * (1 - i / t.length);
}

/* ---------- persistent graph ---------- */
function buildGraph(){
  const g = { srcs: [], nodes: [] };
  const N = (node) => { g.nodes.push(node); return node; };

  g.master = N(ctx.createGain());
  g.master.gain.value = 0;
  g.master.connect(ctx.destination);

  // (1) abyssal bed: brown noise -> lowpass 140Hz, very slow LFO swell
  const bedSrc = N(ctx.createBufferSource());
  bedSrc.buffer = brownBuf;
  bedSrc.loop = true;
  const lp = N(ctx.createBiquadFilter());
  lp.type = "lowpass"; lp.frequency.value = 140; lp.Q.value = 0.5;
  const bedGain = N(ctx.createGain());
  bedGain.gain.value = 0.24;                       // ~0.05 effective after master
  bedSrc.connect(lp); lp.connect(bedGain); bedGain.connect(g.master);
  const lfo = N(ctx.createOscillator());
  lfo.frequency.value = 0.023;                     // ~43s swell
  const lfoG = N(ctx.createGain());
  lfoG.gain.value = 0.12;
  lfo.connect(lfoG); lfoG.connect(bedGain.gain);
  bedSrc.start(); lfo.start();
  g.srcs.push(bedSrc, lfo);

  // (2) whale bus with murky feedback-delay tail
  const bus = N(ctx.createGain()); bus.gain.value = 1;
  bus.connect(g.master);
  const dly  = N(ctx.createDelay(1.5)); dly.delayTime.value = 0.45;
  const murk = N(ctx.createBiquadFilter());
  murk.type = "lowpass"; murk.frequency.value = 550;
  const fb   = N(ctx.createGain()); fb.gain.value = 0.3;
  const wet  = N(ctx.createGain()); wet.gain.value = 0.55;
  bus.connect(dly); dly.connect(murk); murk.connect(fb); fb.connect(dly);
  dly.connect(wet); wet.connect(g.master);
  g.whaleBus = bus;

  return g;
}
function teardown(g){
  if(!g) return;
  for(const s of g.srcs){ try{ s.stop(); }catch(err){} }
  for(const n of g.nodes){ try{ n.disconnect(); }catch(err){} }
}

/* ---------- (2) whale calls ---------- */
function whaleCall(vol){
  if(!graph) return;
  const bus = graph.whaleBus;
  const t0 = ctx.currentTime + 0.05;
  const dur = rand(3, 6);
  const f1 = rand(75, 110);
  const f2 = f1 * rand(1.6, 2.1);
  const f3 = f1 * rand(1.1, 1.45);

  const osc = ctx.createOscillator();
  osc.type = "sine";
  osc.frequency.setValueAtTime(f1, t0);
  osc.frequency.exponentialRampToValueAtTime(f2, t0 + dur * 0.45);
  osc.frequency.exponentialRampToValueAtTime(f3, t0 + dur);

  const vib = ctx.createOscillator();                // gentle vibrato
  vib.frequency.value = rand(1.2, 3.2);
  const vibG = ctx.createGain();
  vibG.gain.value = rand(1.5, 4);
  vib.connect(vibG); vibG.connect(osc.frequency);

  const env = ctx.createGain();
  env.gain.setValueAtTime(0, t0);
  env.gain.linearRampToValueAtTime(0.5 * vol, t0 + dur * 0.35);
  env.gain.linearRampToValueAtTime(0.32 * vol, t0 + dur * 0.7);
  env.gain.linearRampToValueAtTime(0, t0 + dur);
  osc.connect(env); env.connect(bus);

  const part = ctx.createOscillator();               // faint octave partial
  part.type = "sine";
  part.frequency.setValueAtTime(f1 * 2, t0);
  part.frequency.exponentialRampToValueAtTime(f2 * 2, t0 + dur * 0.45);
  part.frequency.exponentialRampToValueAtTime(f3 * 2, t0 + dur);
  const pEnv = ctx.createGain();
  pEnv.gain.setValueAtTime(0, t0);
  pEnv.gain.linearRampToValueAtTime(0.07 * vol, t0 + dur * 0.4);
  pEnv.gain.linearRampToValueAtTime(0, t0 + dur * 0.9);
  part.connect(pEnv); pEnv.connect(bus);

  osc.start(t0); osc.stop(t0 + dur + 0.1);
  vib.start(t0); vib.stop(t0 + dur + 0.1);
  part.start(t0); part.stop(t0 + dur + 0.1);
  osc.onended = () => { try{ env.disconnect(); pEnv.disconnect(); vibG.disconnect(); }catch(err){} };

  singRing(vol);
}
function whaleEvent(){
  whaleCall(1);
  if(Math.random() < 0.45){                          // a fainter answer
    later(() => whaleCall(rand(0.3, 0.5)), rand(4000, 9000));
  }
}

/* ---------- visual: the singer's ring ---------- */
function singRing(strength){
  try{
    let x, y;
    if(SEA.creatures.length){
      const c = SEA.pick(SEA.creatures);
      x = c.x; y = c.y;
    }else{
      x = SEA.W * rand(0.15, 0.85);
      y = SEA.H * rand(0.2, 0.8);
    }
    const g = SEA.mk("g", { transform: `translate(${x.toFixed(1)} ${y.toFixed(1)})` });
    SEA.gFx.append(g);
    const R = Math.max(120, Math.min(SEA.W, SEA.H) * 0.32);
    let lastAnim = null;
    for(let i = 0; i < 2; i++){
      const ring = SEA.mk("circle", { cx: 0, cy: 0, r: R.toFixed(0), fill: "none",
        "stroke-width": 1.1, opacity: 0, "vector-effect": "non-scaling-stroke" });
      ring.style.stroke = "var(--acc, #5fe8d2)";
      ring.style.transformBox = "fill-box";
      ring.style.transformOrigin = "center";
      g.append(ring);
      lastAnim = ring.animate([
        { transform: "scale(0.02)", opacity: 0 },
        { opacity: 0.28 * strength, offset: 0.16 },
        { transform: "scale(1)", opacity: 0 }
      ], { duration: 6800, delay: i * 1100, easing: "cubic-bezier(.2,.55,.45,1)", fill: "both" });
    }
    if(lastAnim) lastAnim.onfinish = () => g.remove();
    setTimeout(() => g.remove(), 9500);              // fallback; not a sound timer
  }catch(err){ console.error("[hydrophone] ring", err); }
}

/* ---------- (3) clicks & creaks ---------- */
function tick(t0){
  const src = ctx.createBufferSource();
  src.buffer = tickBuf;
  const f = ctx.createBiquadFilter();
  f.type = "bandpass"; f.frequency.value = rand(1600, 5200); f.Q.value = 7;
  const e = ctx.createGain();
  const d = rand(0.025, 0.07);
  e.gain.setValueAtTime(rand(0.10, 0.20), t0);
  e.gain.exponentialRampToValueAtTime(0.0008, t0 + d);
  src.connect(f); f.connect(e); e.connect(graph.master);
  src.start(t0); src.stop(t0 + d + 0.03);
  src.onended = () => { try{ e.disconnect(); }catch(err){} };
}
function creak(){
  const t0 = ctx.currentTime + 0.03;
  const d = rand(0.25, 0.6);
  const o = ctx.createOscillator();
  o.type = "sawtooth";
  o.frequency.setValueAtTime(rand(46, 110), t0);
  o.frequency.linearRampToValueAtTime(rand(30, 60), t0 + d);
  const f = ctx.createBiquadFilter();
  f.type = "bandpass"; f.Q.value = 11;
  f.frequency.setValueAtTime(rand(280, 780), t0);
  f.frequency.linearRampToValueAtTime(rand(140, 320), t0 + d);
  const e = ctx.createGain();
  e.gain.setValueAtTime(0, t0);
  e.gain.linearRampToValueAtTime(rand(0.07, 0.13), t0 + d * 0.35);
  e.gain.linearRampToValueAtTime(0, t0 + d);
  o.connect(f); f.connect(e); e.connect(graph.master);
  o.start(t0); o.stop(t0 + d + 0.05);
  o.onended = () => { try{ e.disconnect(); }catch(err){} };
}
function clickEvent(){
  if(!graph) return;
  if(Math.random() < 0.55){
    const n = Math.random() < 0.4 ? 2 + ((Math.random() * 2) | 0) : 1;   // sometimes a burst
    let t = ctx.currentTime + 0.03;
    for(let i = 0; i < n; i++){ tick(t); t += rand(0.07, 0.16); }
  }else{
    creak();
  }
}

/* ---------- (4) rare bubbles ---------- */
function blip(t0){
  const o = ctx.createOscillator();
  o.type = "sine";
  const f0 = rand(420, 900);
  o.frequency.setValueAtTime(f0, t0);
  o.frequency.exponentialRampToValueAtTime(f0 * rand(1.5, 2.2), t0 + 0.09);
  const e = ctx.createGain();
  e.gain.setValueAtTime(0, t0);
  e.gain.linearRampToValueAtTime(rand(0.05, 0.10), t0 + 0.015);
  e.gain.exponentialRampToValueAtTime(0.0008, t0 + 0.12);
  o.connect(e); e.connect(graph.master);
  o.start(t0); o.stop(t0 + 0.16);
  o.onended = () => { try{ e.disconnect(); }catch(err){} };
}
function bubbleEvent(){
  if(!graph) return;
  const n = 1 + ((Math.random() * 3) | 0);
  let t = ctx.currentTime + 0.05;
  for(let i = 0; i < n; i++){ blip(t); t += rand(0.1, 0.35); }
}

/* ---------- on / off ---------- */
function failOff(msg){
  listening = false;
  if(btn){ btn.textContent = LABEL_OFF; btn.classList.remove("hydrophone-on"); }
  if(msg) SEA.toast(msg);
}

async function turnOn(){
  const myGen = ++gen;
  const AC = window.AudioContext || window.webkitAudioContext;
  if(!AC){ failOff("この端末では音響装置が応答しません"); return; }
  if(!ctx){
    try{ ctx = new AC(); makeBuffers(); }
    catch(err){ console.error("[hydrophone] ctx", err); failOff("音響装置の起動に失敗しました"); return; }
  }
  if(killT){ clearTimeout(killT); killT = null; }    // rapid re-toggle: kill fading graph now
  if(fading){ teardown(fading); fading = null; }
  try{ if(ctx.state === "suspended") await ctx.resume(); }
  catch(err){ console.error("[hydrophone] resume", err); }
  if(!listening || myGen !== gen) return;            // toggled off / superseded while awaiting

  if(graph) teardown(graph);                         // paranoia: never two live graphs
  graph = buildGraph();
  const t = ctx.currentTime;
  graph.master.gain.setValueAtTime(0, t);
  graph.master.gain.linearRampToValueAtTime(MASTER, t + 2);   // 2s fade in

  every(whaleEvent, 18, 40, 4, 9);
  every(clickEvent, 6, 15, 3, 8);
  every(bubbleEvent, 22, 55, 10, 25);
}

function turnOff(){
  gen++;                                             // invalidate in-flight turnOn
  clearTimers();
  if(graph && ctx){
    const g = graph;
    graph = null;
    fading = g;
    const t = ctx.currentTime;
    try{
      g.master.gain.cancelScheduledValues(t);
      g.master.gain.setValueAtTime(g.master.gain.value, t);
      g.master.gain.linearRampToValueAtTime(0, t + 2);        // 2s fade out
    }catch(err){ console.error("[hydrophone] fade", err); }
    killT = setTimeout(() => {
      killT = null;
      teardown(g);
      if(fading === g) fading = null;
      if(!listening && ctx){ try{ ctx.suspend(); }catch(err){} }
    }, 2200);
  }
}

/* ---------- dock button ---------- */
try{
  btn = SEA.addButton(LABEL_OFF, () => {
    try{
      listening = !listening;
      if(listening){
        btn.textContent = LABEL_ON;
        btn.classList.add("hydrophone-on");
        SEA.toast("ハイドロフォンを下ろしました。耳を澄ませて……");
        turnOn().catch(err => { console.error("[hydrophone] on", err); failOff(); });
      }else{
        btn.textContent = LABEL_OFF;
        btn.classList.remove("hydrophone-on");
        SEA.toast("ハイドロフォンを引き上げました。あとには静寂");
        turnOff();
      }
    }catch(err){ console.error("[hydrophone] toggle", err); }
  });
  btn.title = "深海の音に耳を澄ませる";
}catch(err){ console.error("[hydrophone] init", err); }
})();
</script>

<script>
// ════ plugin: nushi ════ ヌシ plugin — ambient, no dock button. Paste verbatim into its own <script> tag after the core script in deep-sea-aquarium/index.html.  Behavior: first pass 90
(()=>{
  "use strict";
  if(!window.SEA) return;
  const SEA = window.SEA;

  /* ================= ヌシ — the colossal thing that passes ================= */

  // ---- style (tiny: hit-test control only) ----
  try{
    const st = document.createElement("style");
    st.textContent =
      ".nushi-grp{pointer-events:none}" +
      ".nushi-hit{pointer-events:all;cursor:default}";
    document.head.append(st);
  }catch(err){ console.error("[nushi] style", err); }

  // ---- soft-shadow filter in host defs ----
  try{
    const filt = SEA.mk("filter", {id:"nushi-blur", x:"-25%", y:"-60%", width:"150%", height:"220%"});
    filt.append(SEA.mk("feGaussianBlur", {stdDeviation:"5"}));
    SEA.defs.append(filt);
  }catch(err){ console.error("[nushi] defs", err); }

  // ---- corpus ----
  const MID_LINE = "……いま、大きなものが通りませんでしたか";
  const EYE_LINES = [
    "目が合いました。向こうも、そう思っています",
    "見られています。おそらく、ずっと前から",
    "向こうの図鑑に、いまあなたが載りました",
    "挨拶のつもりで鳴いたようです。低すぎて、聞こえませんが",
    "気づかれました。ただ、急ぐ様子はありません。桁が違うので",
  ];

  // ---- audio: lazy AudioContext, unlocked only by a real user gesture ----
  let audioCtx = null;
  function armAudio(){
    try{
      const AC = window.AudioContext || window.webkitAudioContext;
      if(!AC) return;
      if(!audioCtx) audioCtx = new AC();
      if(audioCtx.state === "suspended") audioCtx.resume().catch(()=>{});
    }catch(err){ console.error("[nushi] audio arm", err); }
  }
  window.addEventListener("pointerdown", armAudio, {capture:true, passive:true});

  function startRumble(durSec){
    if(!audioCtx || audioCtx.state !== "running") return; // stay silent unless already unlocked
    try{
      const t0 = audioCtx.currentTime;
      // envelope gate (clean zero at both ends)
      const master = audioCtx.createGain();
      master.gain.setValueAtTime(0, t0);
      master.gain.linearRampToValueAtTime(0.05, t0 + 6);
      master.gain.setValueAtTime(0.05, t0 + Math.max(7, durSec - 9));
      master.gain.linearRampToValueAtTime(0.0001, t0 + durSec);
      master.connect(audioCtx.destination);
      // slow swell stage, LFO-modulated
      const deep = audioCtx.createGain();
      deep.gain.value = 0.85;
      deep.connect(master);
      const lfo = audioCtx.createOscillator();
      lfo.type = "sine"; lfo.frequency.value = 0.11;
      const lg = audioCtx.createGain(); lg.gain.value = 0.15;
      lfo.connect(lg); lg.connect(deep.gain);
      // two detuned near-subsonic sines -> organic beating
      const voice = (freq)=>{
        const o = audioCtx.createOscillator();
        o.type = "sine"; o.frequency.value = freq;
        const g = audioCtx.createGain(); g.gain.value = 0.5;
        o.connect(g); g.connect(deep);
        o.start(t0); o.stop(t0 + durSec + 0.5);
        return o;
      };
      voice(33);
      const o2 = voice(36.7);
      lfo.start(t0); lfo.stop(t0 + durSec + 0.5);
      o2.onended = ()=>{ try{ master.disconnect(); }catch(_){/* already gone */} };
    }catch(err){ console.error("[nushi] rumble", err); }
  }

  // ---- silhouette builder (origin center, nose +x) ----
  function buildNushi(L, h, baseOp){
    const r = v => +v.toFixed(1);
    const F = "#02070d";
    const grp = SEA.mk("g", {class:"nushi-grp"});
    const vis = SEA.mk("g");
    const shadow = SEA.mk("g", {opacity:baseOp.toFixed(3), filter:"url(#nushi-blur)"});
    const bodyD =
      `M ${r(L*.5)} 0` +
      ` C ${r(L*.40)} ${r(-h*.52)}, ${r(L*.22)} ${r(-h*.62)}, ${r(L*.02)} ${r(-h*.58)}` +
      ` C ${r(-L*.18)} ${r(-h*.54)}, ${r(-L*.28)} ${r(-h*.30)}, ${r(-L*.38)} ${r(-h*.07)}` +
      ` L ${r(-L*.38)} ${r(h*.07)}` +
      ` C ${r(-L*.26)} ${r(h*.20)}, ${r(-L*.12)} ${r(h*.46)}, ${r(L*.06)} ${r(h*.50)}` +
      ` C ${r(L*.24)} ${r(h*.54)}, ${r(L*.40)} ${r(h*.32)}, ${r(L*.5)} 0 Z`;
    const flukeD =
      `M ${r(-L*.36)} 0` +
      ` C ${r(-L*.42)} ${r(-h*.30)}, ${r(-L*.46)} ${r(-h*.70)}, ${r(-L*.50)} ${r(-h*1.10)}` +
      ` C ${r(-L*.46)} ${r(-h*.45)}, ${r(-L*.42)} ${r(-h*.15)}, ${r(-L*.39)} ${r(-h*.03)}` +
      ` L ${r(-L*.39)} ${r(h*.03)}` +
      ` C ${r(-L*.42)} ${r(h*.15)}, ${r(-L*.46)} ${r(h*.45)}, ${r(-L*.50)} ${r(h*1.10)}` +
      ` C ${r(-L*.46)} ${r(h*.70)}, ${r(-L*.42)} ${r(h*.30)}, ${r(-L*.36)} 0 Z`;
    const dorsalD =
      `M ${r(-L*.13)} ${r(-h*.42)}` +
      ` C ${r(-L*.15)} ${r(-h*.75)}, ${r(-L*.18)} ${r(-h*.85)}, ${r(-L*.21)} ${r(-h*.88)}` +
      ` C ${r(-L*.20)} ${r(-h*.60)}, ${r(-L*.19)} ${r(-h*.45)}, ${r(-L*.17)} ${r(-h*.38)} Z`;
    const finD =
      `M ${r(L*.10)} ${r(h*.30)}` +
      ` C ${r(L*.02)} ${r(h*.80)}, ${r(-L*.05)} ${r(h*1.05)}, ${r(-L*.09)} ${r(h*1.08)}` +
      ` C ${r(-L*.03)} ${r(h*.78)}, ${r(L*.03)} ${r(h*.52)}, ${r(L*.08)} ${r(h*.36)} Z`;
    shadow.append(
      SEA.mk("path", {d:bodyD,   fill:F}),
      SEA.mk("path", {d:flukeD,  fill:F}),
      SEA.mk("path", {d:dorsalD, fill:F}),
      SEA.mk("path", {d:finD,    fill:F})
    );
    const eye = SEA.mk("circle", {cx:r(L*.37), cy:r(-h*.10), r:r(Math.max(4, h*.04)),
      fill:"#cfe6f2", opacity:".25"});
    vis.append(shadow, eye);
    const hit = SEA.mk("ellipse", {class:"nushi-hit", cx:0, cy:0,
      rx:r(L*.53), ry:r(h*1.35), fill:"#000", opacity:"0"});
    grp.append(vis, hit);
    return {grp, vis, eye, hit};
  }

  // ---- pass state ----
  let active = false;
  let timer = 0;
  const savedSpeeds = new Map(); // id -> base speed

  function clamp(v, lo, hi){ return Math.max(lo, Math.min(hi, v)); }

  function fleeFrom(ny){
    const H = SEA.H;
    for(const c of SEA.creatures){
      if(!savedSpeeds.has(c.id)){          // also catches residents born mid-pass
        savedSpeeds.set(c.id, c.speed);
        c.speed = c.speed * 1.8;
      }
      const away = (c.baseY <= ny) ? -1 : 1;
      c.targetY = clamp(ny + away * H * 0.33, H * 0.10, H * 0.90);
    }
  }
  function restoreSpeeds(){
    for(const c of SEA.creatures){
      if(savedSpeeds.has(c.id)) c.speed = savedSpeeds.get(c.id);
    }
    savedSpeeds.clear();
  }

  function schedule(ms){
    clearTimeout(timer);
    timer = setTimeout(()=>{
      try{ startPass(); }
      catch(err){ console.error("[nushi]", err); active = false; schedule(nextDelay()); }
    }, ms);
  }
  function firstDelay(){ return 90000 + Math.random()*60000; }    // 90–150 s
  function nextDelay(){  return 240000 + Math.random()*180000; }  // 4–7 min

  function startPass(){
    if(active){ schedule(60000); return; }
    const W = SEA.W, H = SEA.H;
    if(!W || !H || !SEA.gFar){ schedule(30000); return; }
    active = true;

    const L      = W * (1.4 + Math.random()*0.4);      // 1.4–1.8 × screen width
    const h      = L * (0.10 + Math.random()*0.025);
    const baseOp = 0.14 + Math.random()*0.06;          // .14–.2
    const dur    = 40000 + Math.random()*15000;        // 40–55 s
    const yMid   = H * (0.52 + Math.random()*0.28);    // mid-low
    const dirX   = Math.random() < 0.5 ? 1 : -1;
    const startX = dirX > 0 ? -(L*0.55) : W + L*0.55;
    const dist   = W + L*1.1;

    const parts = buildNushi(L, h, baseOp);
    SEA.gFar.append(parts.grp);
    startRumble(dur/1000);

    let midFired = false, clicked = false, done = false;

    parts.hit.addEventListener("pointerdown", (e)=>{
      try{
        if(e.defaultPrevented || e.button !== 0) return;
        e.preventDefault();
        if(clicked) return;
        clicked = true;                                 // once per pass
        SEA.toast(SEA.pick(EYE_LINES));
        parts.eye.animate(
          [{opacity:.25},{opacity:.6},{opacity:.25}],
          {duration:2200, easing:"ease-in-out"});
      }catch(err){ console.error("[nushi] click", err); }
    });

    function endPass(){
      if(done) return;
      done = true;
      try{ parts.grp.remove(); }catch(_){/* */}
      restoreSpeeds();
      active = false;
      schedule(nextDelay());
    }

    const t0 = performance.now();
    function step(now){
      try{
        if(done) return;
        const el   = now - t0;                          // elapsed wall time
        const prog = Math.min(1, el/dur);
        const x    = startX + dirX * dist * prog;
        const ny   = yMid + Math.sin(el/1000 * 0.72) * H * 0.022;       // slow undulation
        const tilt = Math.sin(el/1000 * 0.72 + 1.3) * 1.7;
        parts.grp.setAttribute("transform",
          `translate(${x.toFixed(1)} ${ny.toFixed(1)}) scale(${dirX} 1) rotate(${tilt.toFixed(2)})`);
        const fade = clamp(Math.min(prog*18, (1-prog)*18 + 0.001), 0, 1);
        parts.vis.setAttribute("opacity", fade.toFixed(3));
        fleeFrom(ny);
        if(!midFired && prog >= 0.5){
          midFired = true;
          try{
            SEA.toast(MID_LINE);
            SEA.emit("nushi:appeared");
          }catch(err){ console.error("[nushi] mid", err); }
        }
        if(prog >= 1){ endPass(); return; }
        requestAnimationFrame(step);
      }catch(err){
        console.error("[nushi] frame", err);
        endPass();
      }
    }
    requestAnimationFrame(step);
  }

  schedule(firstDelay());
})();
</script>

<script>
// ════ plugin: kurage-bloom ════ Ambient plugin, no dock button. Scheduler: first roll ~2min after load, then every 3-6min at 40% (rolls deferred ~30s while tab is hidden so blooms are not wasted). Bloom: 12-16 temp jellies via makeG
(() => {
  "use strict";
  if (!window.SEA) return;
  const SEA = window.SEA;

  // ===========================================================
  //  クラゲ大量発生 — kurage-bloom
  //  ボタンなしの環境イベント。ときどき水槽がクラゲで満ちる。
  //  一時クラゲは住人ではない（addCreature しない・クリック不可）。
  //  位置・脈動・不透明度はすべて経過実時間 (performance.now)
  //  の関数として毎フレーム計算する。
  // ===========================================================

  // ---------- 設定 ----------
  const FIRST_DELAY = 120000;   // 最初の発生チャンスまで ~2分
  const ROLL_MIN    = 180000;   // 以後 3〜6分ごとに判定
  const ROLL_MAX    = 360000;
  const CHANCE      = 0.4;      // 判定ごとの発生確率

  // ---------- CSS ----------
  try {
    const style = document.createElement("style");
    style.textContent =
      ".kurage-bloom-jelly,.kurage-bloom-jelly *{pointer-events:none}" +
      ".kurage-bloom-tint{pointer-events:none}";
    document.head.append(style);
  } catch (err) { console.error("[kurage-bloom] style", err); }

  // ---------- 状態 ----------
  let nextRollAt = performance.now() + FIRST_DELAY;
  let bloom = null;   // {t0, endAt, jellies[], tint}

  // ---------- 発生 ----------
  function startBloom(now) {
    const W = SEA.W, H = SEA.H;
    const count = 12 + ((Math.random() * 5) | 0);   // 12〜16匹
    const jellies = [];
    let latestEnd = 0;

    for (let i = 0; i < count; i++) {
      // 通りすがりの群れなので、住人用の名前プールを消費しないよう
      // 名前・学名・生態は上書きで渡す（makeGenome は上書きを尊重する）
      const genome = SEA.makeGenome({
        arch: "jelly",
        size: 22 + Math.random() * 44,
        name: "（通りすがりのクラゲ）",
        latin: "Medusa vagans",
        eco: "気が済むまで漂い、気が済むと帰る。",
        lenM: "不明",
      });
      const el = SEA.creatureGroup(genome);
      el.setAttribute("class", "sea-creature kurage-bloom-jelly");
      el.style.pointerEvents = "none";   // 彼らは天気であって住人ではない
      el.setAttribute("opacity", "0");
      SEA.gFx.append(el);

      const delay = (i / count) * 10000 + Math.random() * 800;  // ~10秒かけて続々と入場
      const life  = 50000 + Math.random() * 20000;              // 50〜70秒の滞在
      latestEnd = Math.max(latestEnd, delay + life);
      jellies.push({
        el, delay, life,
        fadeIn:  2500 + Math.random() * 1500,
        fadeOut: 3500 + Math.random() * 1800,
        x0: 40 + Math.random() * Math.max(80, W - 80),
        y0: H + 70 + Math.random() * 70,            // 画面下から
        rise:   6 + Math.random() * 6,              // px/s 上昇
        driftX: (Math.random() - .5) * 8,           // px/s 横流れ
        swayA:  10 + Math.random() * 18,            // 揺れ幅
        swayW:  .25 + Math.random() * .3,           // 揺れ角速度
        pulseW: 1.1 + Math.random() * 1.1,          // 脈動角速度
        phase:  Math.random() * Math.PI * 2,        // 個体ごとの位相
        scale:  .7 + Math.random() * .55,
        done: false,
      });
    }

    // 水のごく薄いティアール色（誰も気づかないくらいでいい）
    const tint = SEA.mk("rect", {
      x: 0, y: 0, width: "100%", height: "100%",
      fill: "#46e0c8", opacity: 0, "class": "kurage-bloom-tint",
    });
    SEA.gWater.append(tint);

    bloom = { t0: now, endAt: now + latestEnd + 200, jellies, tint };
    SEA.toast("クラゲが大量発生しています。本日の閉館予定はありません");
    try { SEA.emit("kurage:bloom"); } catch (err) { console.error("[kurage-bloom] emit", err); }
    requestAnimationFrame(frame);
  }

  // ---------- 毎フレーム（経過時間駆動） ----------
  function step(now) {
    const b = bloom;
    if (!b) return;
    const t = now - b.t0;

    for (const j of b.jellies) {
      if (j.done) continue;
      const a = t - j.delay;            // この個体の入場からの経過 ms
      if (a < 0) continue;              // まだ出番ではない
      if (a >= j.life) { j.el.remove(); j.done = true; continue; }
      const s = a / 1000;
      const x = j.x0 + j.driftX * s + Math.sin(j.phase + s * j.swayW) * j.swayA;
      const y = j.y0 - j.rise * s + Math.sin(j.phase * 1.7 + s * .9) * 6;
      if (y < -140) { j.el.remove(); j.done = true; continue; }  // 上端から静かに退場
      const squish = 1 + .07 * Math.sin(j.phase + s * j.pulseW); // やわらかい傘の脈動
      j.el.setAttribute("transform",
        "translate(" + x.toFixed(1) + " " + y.toFixed(1) + ") " +
        "scale(" + j.scale.toFixed(3) + " " + (j.scale * squish).toFixed(3) + ")");
      const op = .8 * Math.max(0, Math.min(1, a / j.fadeIn, (j.life - a) / j.fadeOut));
      j.el.setAttribute("opacity", op.toFixed(3));
    }

    // ティント（リサイズで gWater が作り直されたら戻す）
    if (!b.tint.isConnected) {
      try { SEA.gWater.append(b.tint); } catch (err) { console.error("[kurage-bloom] tint", err); }
    }
    const dur = b.endAt - b.t0;
    const tintOp = .05 * Math.max(0, Math.min(1, t / 6000, (dur - t) / 8000));
    b.tint.setAttribute("opacity", tintOp.toFixed(4));

    if (t >= dur) finishBloom();
  }

  function frame(now) {
    if (!bloom) return;
    try { step(now); }
    catch (err) { console.error("[kurage-bloom] frame", err); hardStop(); return; }
    if (bloom) requestAnimationFrame(frame);
  }

  // ---------- 解散 ----------
  function finishBloom() {
    const b = bloom;
    if (!b) return;
    bloom = null;
    for (const j of b.jellies) { if (!j.done) { j.el.remove(); j.done = true; } }
    b.tint.remove();
    SEA.toast("クラゲは気が済んだようです");
  }

  function hardStop() {   // 想定外エラー時の後始末（トーストなし）
    const b = bloom;
    if (!b) return;
    bloom = null;
    try {
      for (const j of b.jellies) j.el.remove();
      b.tint.remove();
    } catch (_) { /* 黙って沈む */ }
  }

  // ---------- スケジューラ ----------
  // インターバルはバックグラウンドで間引かれるが、判定間隔が分単位
  // なので「遅れて起きる」だけで害はない。満了処理もここで保険を掛ける。
  setInterval(() => {
    try {
      const now = performance.now();
      if (bloom) {
        if (now >= bloom.endAt) finishBloom();  // rAF が止まっていても解散だけは進める
        return;
      }
      if (now < nextRollAt) return;
      if (document.hidden) { nextRollAt = now + 30000; return; }  // 誰も見ていない発生はもったいない
      nextRollAt = now + ROLL_MIN + Math.random() * (ROLL_MAX - ROLL_MIN);
      if (Math.random() < CHANCE) startBloom(now);
    } catch (err) { console.error("[kurage-bloom] tick", err); }
  }, 5000);

  // "cleared" について：一時クラゲは住人ではないので水槽が空にされても
  // そのまま漂い続ける（仕様どおり）。このプラグインは SEA.creatures に
  // 一切触れないため、cleared で壊れる状態を持たない。
})();
</script>

<script>

/* ============================================================

}catch(err){ console.error("[tansa-rov] defs", err); }

/* ---------- transmissions (research-vessel deadpan) ---------- */
const LINES = [
  "未知の生物多数。もう数えていません",
  "光る個体に手を振られました。規定により振り返せません",
  "本日の調査結果: 全員かわいい",
  "サンプル採取を試みましたが、先方が嫌そうだったので中止しました",
  "視界不良。ただし雰囲気は良好",
  "進路上に大きな影を確認。見なかったことにします",
  "水温2度。心は温かいです",
  "こちら探査機。本日もまだ誰にも食べられていません",
  "ライトを消すと、向こうが光ってくれます。優しい海です",
  "帰投したくありません。繰り返します、帰投したくありません",
  "プロペラの騒音に苦情が一件。代わりに謝っておきました",
  "観察記録: 目が合うとみんな逃げます。私もです",
];

/* headlight cone, in ROV-local coords (nose = +x) */
const CONE = { x0:34, len:150, w0:4, w1:30 };

let st = null;                                            // active pass state
let nextAt = performance.now() + 45000 + Math.random()*35000;   // first pass 45-80s
let lastNow = performance.now();
const lit = new Map();                                    // id -> creature currently brightened

/* ---------- build the drone ---------- */
function buildRov(){
  const g = SEA.mk("g", {class:"tansa-rov", "pointer-events":"none"});

  // headlight cone (drawn first, hull covers the apex)
  const cone = SEA.mk("polygon", {points:"34,-4 184,-30 184,30 34,4", fill:"url(#tansa-rov-beam)"});
  cone.animate(
    [{opacity:.82},{opacity:.95},{opacity:.74},{opacity:.9},{opacity:.82}],
    {duration:2600, iterations:Infinity, easing:"ease-in-out"});
  g.append(cone);

  // tether cable: separate path in world coords (appended under the drone)
  const cable = SEA.mk("path", {d:"", fill:"none", stroke:"#9fb9c2", "stroke-width":1.1,
    opacity:.45, "stroke-linecap":"round", "pointer-events":"none"});

  // skid + hull + darker panels
  g.append(SEA.mk("rect", {x:-28, y:9,   width:52, height:3.4, rx:1.7, fill:"#4a4128"}));
  g.append(SEA.mk("rect", {x:-32, y:-14, width:64, height:26,  rx:7,   fill:"#e8d27a",
    stroke:"#6e5f30", "stroke-width":1.2}));
  g.append(SEA.mk("rect", {x:-26, y:-9, width:17, height:8, rx:2, fill:"#b29548"}));
  g.append(SEA.mk("rect", {x:-6,  y:-9, width:12, height:8, rx:2, fill:"#8f7a3e"}));
  g.append(SEA.mk("rect", {x:-26, y:2,  width:30, height:5, rx:2, fill:"#c8ad5c", opacity:.8}));

  // blinking nav light
  const nav = SEA.mk("circle", {cx:-29, cy:-10, r:1.3, fill:"#ff8d7a"});
  nav.animate([{opacity:1},{opacity:.15},{opacity:1}],
    {duration:1900, iterations:Infinity, easing:"ease-in-out"});
  g.append(nav);

  // headlight lamp
  g.append(SEA.mk("circle", {cx:31, cy:0, r:3.4, fill:"#eafff8",
    filter:"url(#tansa-rov-glow)", opacity:.95}));

  // antenna (cable anchor)
  g.append(SEA.mk("path", {d:"M 4 -14 L 4 -20", stroke:"#6e5f30", "stroke-width":1.4,
    "stroke-linecap":"round"}));
  g.append(SEA.mk("circle", {cx:4, cy:-21, r:1.6, fill:"#9fb9c2"}));

  // two propeller discs (WAAPI spin)
  const propAnims = [];
  for(const py of [-7, 7]){
    g.append(SEA.mk("circle", {cx:-36, cy:py, r:5.4, fill:"rgba(2,12,18,.35)",
      stroke:"#5c5130", "stroke-width":1.2}));
    const blades = SEA.mk("g");
    blades.append(
      SEA.mk("rect", {x:-40.5, y:py-1,   width:9, height:2, rx:1, fill:"#cfd8da", opacity:.9}),
      SEA.mk("rect", {x:-37,   y:py-4.5, width:2, height:9, rx:1, fill:"#cfd8da", opacity:.9})
    );
    blades.style.transformBox = "fill-box";
    blades.style.transformOrigin = "center";
    propAnims.push(blades.animate(
      [{transform:"rotate(0deg)"},{transform:"rotate(360deg)"}],
      {duration:340, iterations:Infinity, easing:"linear"}));
    g.append(blades);
  }

  // camera dome (pupil turns toward residents during pauses)
  g.append(SEA.mk("rect", {x:14, y:-15, width:8, height:4, rx:1.5, fill:"#6e5f30"}));
  g.append(SEA.mk("circle", {cx:18, cy:-16, r:5, fill:"rgba(180,225,238,.30)",
    stroke:"#9fc6d4", "stroke-width":1}));
  const pupil = SEA.mk("circle", {cx:20.2, cy:-16, r:2, fill:"#142b34"});
  g.append(pupil);

  // generous invisible hit rect — the only interactive part
  const hit = SEA.mk("rect", {x:-56, y:-38, width:116, height:76, fill:"none",
    class:"tansa-rov-hit"});
  hit.style.pointerEvents = "all";

    try{
      if(e.button !== 0) return;
      e.preventDefault();

    }catch(err){ console.error("[tansa-rov] click", err); }
  });

/* ---------- pass lifecycle ---------- */
function startPass(now){
  const W = SEA.W, H = SEA.H;
  const dir = Math.random() < .5 ? 1 : -1;
  const speed = (W + 240) / (32 + Math.random()*6);       // crossing takes ~35s
  const startX = dir > 0 ? -120 : W + 120;
  const pauses = [];                                       // curiosity stops
  if(Math.random() < .75) pauses.push({x: W*(.30 + Math.random()*.25), t: 2 + Math.random()});
  if(Math.random() < .30) pauses.push({x: W*(.58 + Math.random()*.22), t: 2 + Math.random()});
  pauses.sort((a,b) => dir > 0 ? a.x - b.x : b.x - a.x);

  const parts = buildRov();
  SEA.gFx.append(parts.cable, parts.g);
  st = Object.assign(parts, {
    dir, speed, pauses,
    x: startX,
    y0: H*(.28 + Math.random()*.44),
    pauseLeft: 0,
    cableTopX: startX - dir*90,
    lookX: 2.2, lookY: 0,
    sent: false,
  });
  SEA.emit("rov:pass");
  updatePass(now, 0);                                      // place before first paint
}

function endPass(){
  try{
    for(const [, c] of lit){ try{ c.el.style.filter = ""; }catch(_e){} }
    lit.clear();
    if(st){ st.g.remove(); st.cable.remove(); }
  }catch(err){ console.error("[tansa-rov] end", err); }
  st = null;
  nextAt = performance.now() + (120 + Math.random()*120)*1000;   // next in 2-4 min
}

function setProps(rate){
  for(const a of st.propAnims){ try{ a.playbackRate = rate; }catch(_e){} }
}

function updatePass(now, dt){
  const W = SEA.W;

  // travel / curiosity pause
  if(st.pauseLeft > 0){
    st.pauseLeft -= dt;
    if(st.pauseLeft <= 0){ st.pauseLeft = 0; setProps(1); }
  }else{
    st.x += st.dir * st.speed * dt;
    const p = st.pauses[0];
    if(p && (st.dir > 0 ? st.x >= p.x : st.x <= p.x)){
      st.pauses.shift();
      st.pauseLeft = p.t;
      setProps(.15);
    }
  }

  // gentle bob + tilt (own actor: safe to set transform)
  const yNow = st.y0 + Math.sin(now/1000*.8)*4 + Math.sin(now/1000*.23)*3;
  const tilt = Math.sin(now/1000*.6)*2;
  st.g.setAttribute("transform",
    `translate(${st.x.toFixed(1)} ${yNow.toFixed(1)}) rotate(${tilt.toFixed(1)}) scale(${st.dir} 1)`);

  // tether cable: lags behind, gentle S-curve to the top edge
  st.cableTopX += ((st.x - st.dir*90) - st.cableTopX) * Math.min(1, dt*1.4);
  const ax = st.x + st.dir*4, ay = yNow - 19;
  st.cable.setAttribute("d",
    `M ${st.cableTopX.toFixed(1)} -12 ` +
    `C ${(st.cableTopX + st.dir*16).toFixed(1)} ${(ay*.35).toFixed(1)}, ` +
    `${(ax - st.dir*50).toFixed(1)} ${(ay*.72).toFixed(1)}, ` +
    `${ax.toFixed(1)} ${ay.toFixed(1)}`);

  syncLit(yNow);
  updateDome(yNow, dt);

  if((st.dir > 0 && st.x > W + 140) || (st.dir < 0 && st.x < -140)) endPass();
}

/* residents inside the cone get a style-only brightening */
function syncLit(yNow){
  const cs = SEA.creatures;
  for(const c of cs){
    const lx = (c.x - st.x) * st.dir;                      // into ROV-local space
    let inside = false;
    if(lx >= CONE.x0 && lx <= CONE.x0 + CONE.len){
      const halfW = CONE.w0 + (lx - CONE.x0)/CONE.len * (CONE.w1 - CONE.w0);
      inside = Math.abs(c.y - yNow) <= halfW;
    }
    if(inside && !lit.has(c.id)){
      lit.set(c.id, c);
      if(!c.el.style.transition) c.el.style.transition = "filter .45s ease";
      c.el.style.filter = "brightness(1.6)";
    }else if(!inside && lit.has(c.id)){
      lit.delete(c.id);
      c.el.style.filter = "";
    }
  }
  for(const [id, c] of lit){                               // purge removed residents
    if(!cs.includes(c)){ lit.delete(id); try{ c.el.style.filter = ""; }catch(_e){} }
  }
}

/* camera dome: looks forward; during pauses, turns toward the nearest resident */
function updateDome(yNow, dt){
  let tx = 2.2, ty = 0;
  if(st.pauseLeft > 0){
    let best = null, bd = Infinity;
    for(const c of SEA.creatures){
      const d = (c.x - st.x)*(c.x - st.x) + (c.y - yNow)*(c.y - yNow);
      if(d < bd){ bd = d; best = c; }
    }
    if(best){
      const a = Math.atan2(best.y - yNow, (best.x - st.x) * st.dir);
      tx = Math.cos(a)*2.2; ty = Math.sin(a)*2.2;
    }
  }
  const k = Math.min(1, dt*4);
  st.lookX += (tx - st.lookX)*k;
  st.lookY += (ty - st.lookY)*k;
  st.pupil.setAttribute("cx", (18 + st.lookX).toFixed(2));
  st.pupil.setAttribute("cy", (-16 + st.lookY).toFixed(2));
}

/* once per pass: transmission to the mothership */
function transmit(){
  try{
    if(!st || st.sent) return;
    st.sent = true;
    SEA.toast("📡 母船へ: " + SEA.pick(LINES));
    const ring = SEA.mk("circle", {cx:st.x.toFixed(1), cy:(st.y0 - 26).toFixed(1), r:5,
      fill:"none", stroke:"#ffd27a", "stroke-width":1.2, "pointer-events":"none"});
    ring.style.transformBox = "fill-box";
    ring.style.transformOrigin = "center";
    SEA.gFx.append(ring);
    ring.animate(
      [{transform:"scale(1)", opacity:.85},{transform:"scale(5)", opacity:0}],
      {duration:900, easing:"ease-out"}).onfinish = () => ring.remove();
  }catch(err){ console.error("[tansa-rov] transmit", err); }
}

/* ---------- main loop: elapsed-wall-time driven ---------- */
function tick(now){
  try{
    const dt = Math.min(.25, Math.max(0, (now - lastNow)/1000) || 0);
    lastNow = now;
    if(!st){
      if(now >= nextAt && SEA.W > 60 && SEA.H > 60) startPass(now);
    }else{
      updatePass(now, dt);
    }
  }catch(err){
    console.error("[tansa-rov]", err);
    try{ endPass(); }catch(_e){}
  }
  requestAnimationFrame(tick);
}
requestAnimationFrame(t => { lastNow = t; requestAnimationFrame(tick); });
})();
</script>

  const prepped = new WeakSet(), visState = new WeakMap();
  function prep(c){
    if(!c || !c.el || prepped.has(c.el)) return;
    prepped.add(c.el);
    c.el.style.transition = "opacity 1s ease";
  }
  function applyCreatures(){
    for(const c of SEA.creatures){
      if(!c.el || !c.genome) continue;
      prep(c);
      const inBand = Math.abs(c.genome.depth - depth) <= BAND;
      if(visState.get(c.el) !== inBand){
        visState.set(c.el, inBand);
        c.el.style.opacity = inBand ? "1" : "0.04";
      }
    }
  }
  SEA.on("creature-added", c => { try{ prep(c); applyCreatures(); }catch(err){ console.error(TAG, err); } });

  /* ---------------- depth state & glide ---------------- */
  let depth = 800, target = 800, lastEmitted = 800;
  let raf = 0, lastT = 0, settleT = 0;

  function tempAt(d){ return d >= 3000 ? 1.4 : 1.4 + 16.6 * Math.pow(1 - d / 3000, 1.35); }

  function updateUI(){
    const f = depth / MAXD;
    handle.style.top = (f * 100) + "%";
    chip.style.top   = (f * 100) + "%";
    chip.innerHTML = esc(Math.round(depth)) + "m ／ 水温" + esc(tempAt(depth).toFixed(1)) + "℃ ／ " + esc(Math.round(depth / 100)) + "MPa";
    tgtMark.style.top = (target / MAXD * 100) + "%";
    tgtMark.style.opacity = Math.abs(target - depth) > 4 ? ".85" : "0";
  }
  function applyAll(){ updateUI(); applyWater(); applyCreatures(); }

  function step(now){
    raf = 0;
    try{
      const dt = Math.min(.1, (now - lastT) / 1000 || 0);
      lastT = now;
      const diff = target - depth, mx = GLIDE * dt;
      depth = Math.abs(diff) <= mx ? target : depth + Math.sign(diff) * mx;
      applyAll();
      if(depth !== target) raf = requestAnimationFrame(step);
      else scheduleSettle();
    }catch(err){ console.error(TAG, err); }
  }
  function startGlide(){
    if(raf) return;
    lastT = performance.now();
    raf = requestAnimationFrame(step);
  }
  function scheduleSettle(){
    clearTimeout(settleT);
    settleT = setTimeout(() => {
      try{
        if(depth !== target) return;
        const d = Math.round(depth);
        if(d !== lastEmitted){
          lastEmitted = d;
          SEA.emit("depth:changed", {depth: d});
        }
      }catch(err){ console.error(TAG, err); }
    }, 1000);
  }
  function setTarget(d){
    d = Math.max(0, Math.min(MAXD, d));
    if(d === target) return;
    target = d;
    clearTimeout(settleT);
    updateUI();
    startGlide();
  }

  /* ---------------- drag (HTML pointer events — no svg conflicts) ---------------- */
  let dragging = false;
  function setFromY(cy){
    const r = gauge.getBoundingClientRect();
    const f = Math.max(0, Math.min(1, (cy - r.top) / r.height));
    setTarget(Math.round(f * MAXD / 10) * 10);
  }
  gauge.addEventListener("pointerdown", e => {
    try{
      if(e.button !== 0 && e.pointerType === "mouse") return;
      e.preventDefault();
      dragging = true;
      gauge.classList.add("senkou-drag");
      try{ gauge.setPointerCapture(e.pointerId); }catch(_){}
      setFromY(e.clientY);
    }catch(err){ console.error(TAG, err); }
  });
  gauge.addEventListener("pointermove", e => {
    try{ if(dragging) setFromY(e.clientY); }catch(err){ console.error(TAG, err); }
  });
  const endDrag = () => { dragging = false; gauge.classList.remove("senkou-drag"); };
  gauge.addEventListener("pointerup", endDrag);
  gauge.addEventListener("pointercancel", endDrag);

  /* ---------------- hadal bonus (wall-time, max 2 per dive) ---------------- */
  let hadalCount = 0, lastRoll = Date.now();
  setInterval(() => {
    try{
      const now = Date.now();
      if(depth <= 5500){ hadalCount = 0; lastRoll = now; return; }
      if(now - lastRoll < 25000) return;
      lastRoll = now;
      if(hadalCount >= 2 || Math.random() >= .3) return;
      hadalCount++;
      SEA.addCreature({
        arch:  SEA.pick(["angler", "eel"]),
        depth: Math.max(0, Math.min(MAXD, Math.round(depth + (Math.random() * 600 - 300)))),
        acc:   SEA.pick([0, 315]),
        eyeN:  Math.random() < .5 ? 0 : 1,
        eyeS:  .2 + Math.random() * .3,
        size:  62 + Math.random() * 26,
      });
      SEA.toast("深界から、何かが来ました");
    }catch(err){ console.error(TAG, err); }
  }, 5000);

  /* ---------------- resize: core's buildWater() ran first, re-attach ---------------- */
  window.addEventListener("resize", () => {
    try{ ensureWater(); applyWater(); }catch(err){ console.error(TAG, err); }
  });

  /* ---------------- init (start at 800m) ---------------- */
  ensureWater();
  applyAll();
}catch(err){ console.error(TAG, err); }
})();
</script>

<script>
// ════ plugin: kakeawase ════ Plugin key "kakeawase" (掛け合わせ). Paste verbatim into its own <script> tag after the core script in deep-sea-aquarium/index.html. No dock button (per spec); the only UI is a per-card pill action injecte
(()=>{ "use strict";
if(!window.SEA) return;
const SEA = window.SEA;

/* ============================================================
   掛け合わせ (kakeawase) — breed two residents into a new genome
   ============================================================ */

// ---- style ----
try{
  const style = document.createElement("style");
  style.textContent = `
    .kakeawase-act{display:inline-block;margin:8px 0 0 16px;font-size:11px;color:var(--dim);
      border:1px solid rgba(95,232,210,.25);border-radius:999px;padding:2px 10px;cursor:pointer;
      transition:.18s;user-select:none;letter-spacing:.04em}
    .kakeawase-act:hover{color:var(--acc);border-color:rgba(95,232,210,.55);background:rgba(95,232,210,.08)}
    .card.kakeawase-armed{border-color:rgba(255,210,122,.6);background:rgba(255,210,122,.07);
      box-shadow:0 0 16px rgba(255,210,122,.16)}
    .card.kakeawase-armed .kakeawase-act{color:var(--warm);border-color:rgba(255,210,122,.6)}
  `;
  document.head.append(style);
}catch(err){ console.error("[kakeawase] style", err); }

// ---- state ----
let armedId = null;          // creature id armed as parent A, or null
let coolUntil = 0;           // performance.now() timestamp until which the tank is shy

const NUM_FIELDS = ["size","hue","acc","bodyR","finS","eyeN","eyeS",
                    "spots","stripes","tail","tent","lure","speed"];
const KANA_RE = /^[ァ-ヶー]+$/;

function clamp(v, lo, hi){ return Math.max(lo, Math.min(hi, v)); }

// ---- name fusion: head of A + tail of B ----
function fuseName(a, b){
  try{
    const head = a.slice(0, 2 + ((Math.random()*2)|0));            // leading 2-3 kana
    const tLen = Math.min(b.length, 2 + ((Math.random()*2)|0));    // trailing 2-3 kana
    const fused = head + b.slice(b.length - tLen);
    if(fused.length < 4) return null;                              // too short = ugly
    if(!KANA_RE.test(fused)) return null;
    if(fused.includes("ーー")) return null;                        // ugly seam
    if(fused === a || fused === b) return null;
    if(SEA.creatures.some(c => c.genome.name === fused)) return null;
    return fused;
  }catch(err){ console.error("[kakeawase] fuseName", err); return null; }
}

// ---- offspring genome ----
function makeOffspring(ga, gb){
  const donor = SEA.makeGenome();                 // one fresh donor for mutations
  const child = { arch: Math.random() < .5 ? ga.arch : gb.arch };
  for(const k of NUM_FIELDS){
    let v = Math.random() < .5 ? ga[k] : gb[k];   // 50/50 inheritance
    if(Math.random() < .15) v = donor[k];         // ~15% mutation within natural range
    child[k] = v;
  }
  child.depth = Math.max(100,
    Math.round((ga.depth + gb.depth)/2 + (Math.random()*600 - 300)));
  const fused = fuseName(ga.name, gb.name);
  if(fused) child.name = fused;                   // else core invents a fresh name
  let sentence = "";
  try{
    const pool = Math.random() < .5 ? SEA.lore.ECO_HABIT : SEA.lore.ECO_MYSTERY;
    sentence = SEA.pick(pool)(fused || ga.name);
  }catch(err){ console.error("[kakeawase] eco", err); }
  child.eco = `${ga.name}と${gb.name}のあいだに生まれた。` + sentence;
  // latin & lenM left absent on purpose: the core fills them
  return child;
}

// ---- birth effects ----
function glowRing(x, y, delay){
  try{
    const ring = SEA.mk("circle", {cx:x, cy:y, r:26, fill:"none",
      stroke:"hsl(45, 100%, 76%)", "stroke-width":2, opacity:.85});
    ring.style.transformOrigin = `${x}px ${y}px`;
    SEA.gFx.append(ring);
    ring.animate(
      [{transform:"scale(.15)", opacity:.85}, {transform:"scale(2.8)", opacity:0}],
      {duration:1700, delay:delay||0, easing:"cubic-bezier(.16,.84,.36,1)", fill:"both"}
    ).onfinish = () => ring.remove();
  }catch(err){ console.error("[kakeawase] glowRing", err); }
}
function burstBubbles(x, y){
  try{
    for(let i=0;i<12;i++){
      const b = SEA.mk("circle", {cx:x+(Math.random()-.5)*36, cy:y+(Math.random()-.5)*26,
        r:(.8+Math.random()*2.4).toFixed(2), fill:"none",
        stroke:"#ffe9bd", "stroke-width":.8, opacity:.7});
      SEA.gFx.append(b);
      b.animate([
        {transform:"translate(0,0)", opacity:.7},
        {transform:`translate(${(Math.random()-.5)*50}px, ${-50-Math.random()*90}px)`, opacity:0}
      ],{duration:1400+Math.random()*1300, delay:Math.random()*300,
         easing:"ease-out", fill:"both"}).onfinish = () => b.remove();
    }
  }catch(err){ console.error("[kakeawase] bubbles", err); }
}

// ---- card marks (highlight + label), reapplied without a full re-render ----
function refreshMarks(){
  try{
    document.querySelectorAll(".card[data-cid]").forEach(card => {
      const armed = armedId !== null && Number(card.dataset.cid) === armedId;
      card.classList.toggle("kakeawase-armed", armed);
      const act = card.querySelector(".kakeawase-act");
      if(act) act.textContent = armed ? "💞 お相手を待っています" : "🧬 掛け合わせる";
    });
  }catch(err){ console.error("[kakeawase] refreshMarks", err); }
}

// ---- breeding ----
function breed(idA, idB){
  const pa = SEA.creatures.find(c => c.id === idA);
  const pb = SEA.creatures.find(c => c.id === idB);
  armedId = null;
  if(!pa || !pb){
    refreshMarks();
    SEA.toast("お相手は暗闇に紛れてしまいました");
    return;
  }
  const mx = clamp((pa.x + pb.x)/2, 70, SEA.W - 70);
  const my = clamp((pa.y + pb.y)/2, SEA.H*.12, SEA.H*.88);
  const over = makeOffspring(pa.genome, pb.genome);
  const child = SEA.addCreature(over);            // re-renders panel (armedId already null)
  // place the newborn between its parents
  child.x = mx; child.baseY = my; child.targetY = my; child.y = my;
  glowRing(mx, my, 0);
  glowRing(mx, my, 260);
  burstBubbles(mx, my);
  coolUntil = performance.now() + 12000;
  SEA.toast(`${pa.genome.name}と${pb.genome.name}のあいだに、${child.genome.name}が生まれました`);
  SEA.emit("hanshoku:born", {child, parents:[pa, pb]});
}

// ---- action click: arm / disarm / pick partner ----
function onAct(e, cid){
  e.stopPropagation();
  try{
    if(armedId === null){
      if(performance.now() < coolUntil){
        SEA.toast("水槽がまだ照れています");
        return;
      }
      if(!SEA.creatures.some(c => c.id === cid)) return;
      armedId = cid;
      refreshMarks();
      SEA.toast("お相手を一覧から選んでください");
    } else if(armedId === cid){
      armedId = null;                              // re-click disarms
      refreshMarks();
      SEA.toast("縁談は、静かに流れました");
    } else {
      breed(armedId, cid);
    }
  }catch(err){ console.error("[kakeawase] onAct", err); }
}

// ---- per-card injection (cards are rebuilt on every panel-rendered) ----
function inject(root){
  try{
    if(!root) return;
    root.querySelectorAll(".card[data-cid]").forEach(card => {
      if(card.querySelector(".kakeawase-act")) return;
      const cid = Number(card.dataset.cid);
      const act = document.createElement("span");
      act.className = "kakeawase-act";
      act.textContent = (armedId === cid) ? "💞 お相手を待っています" : "🧬 掛け合わせる";
      act.addEventListener("click", e => onAct(e, cid));
      card.append(act);
      if(armedId === cid) card.classList.add("kakeawase-armed");
    });
  }catch(err){ console.error("[kakeawase] inject", err); }
}

SEA.on("panel-rendered", arg => {
  inject((arg && arg.container) || document.getElementById("cards"));
});
SEA.on("cleared", () => { armedId = null; });
SEA.on("creature-removed", c => {
  try{
    if(c && c.id === armedId){ armedId = null; refreshMarks(); }
  }catch(err){ console.error("[kakeawase] creature-removed", err); }
});

// pick up any cards already on screen at load time
inject(document.getElementById("cards"));
})();
</script>

    ]},
    rov:    { cd:15000, n:[2,4], spike:[2,4], lines:[
      "業者さんだ","点検おつかれさまです","メカきた","中の人いるのかな","プロペラ音すき",
    ]},
    added:  { cd:4000,  n:[2,4], spike:[2,4], lines:[
      "新人さん！","初配信おめでとう","また増えた","推しが増えるの早い",

    depth:  { cd:6000,  n:[2,4], spike:[1,3], lines:[

  const SC_LINES = [

  ];

  /* ---------------- css ---------------- */
  const style = document.createElement("style");
  style.textContent = `
    .haishin-layer{position:fixed;inset:0;overflow:hidden;pointer-events:none;z-index:3}
    .haishin-layer[hidden]{display:none}
    .haishin-c{position:absolute;left:100%;top:0;white-space:nowrap;pointer-events:none;
      font-weight:700;color:#fff;will-change:transform;letter-spacing:.02em;
      text-shadow:1px 1px 0 rgba(2,12,20,.92),-1px 1px 0 rgba(2,12,20,.92),
        1px -1px 0 rgba(2,12,20,.92),-1px -1px 0 rgba(2,12,20,.92),0 0 7px rgba(0,0,0,.6)}
    .haishin-sc{display:flex;flex-direction:column;gap:2px;padding:8px 16px;border-radius:10px;
      box-shadow:0 4px 18px rgba(0,0,0,.45);text-shadow:0 1px 2px rgba(0,0,0,.45)}
    .haishin-sc-amt{font-size:15px;font-weight:800;letter-spacing:.06em}
    .haishin-sc-msg{font-size:17px;font-weight:600}
    .haishin-hud{position:fixed;top:62px;left:16px;z-index:5;display:flex;align-items:center;
      gap:9px;pointer-events:none}
    .haishin-hud[hidden]{display:none}
    .haishin-live{display:inline-flex;align-items:center;gap:6px;background:#d22;color:#fff;
