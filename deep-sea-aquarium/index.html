<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>深海水族館 · Deep-Sea Aquarium</title>
<style>
  :root{
    --ink:#dcebf5;
    --dim:#7fa3b8;
    --acc:#5fe8d2;
    --warm:#ffd27a;
    --panel:rgba(6,18,30,.78);
    --panel-edge:rgba(95,232,210,.16);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;overflow:hidden;background:#010810;
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",-apple-system,system-ui,sans-serif;
    color:var(--ink);-webkit-font-smoothing:antialiased;}
  #sea{position:fixed;inset:0;display:block;width:100vw;height:100vh;}

  /* ---- toolbar ---- */
  .topbar{position:fixed;top:0;left:0;right:0;display:flex;align-items:center;gap:14px;
    padding:14px 18px;pointer-events:none;z-index:5;}
  .brand{pointer-events:none;font-weight:600;letter-spacing:.04em;font-size:15px;
    text-shadow:0 0 18px rgba(95,232,210,.45);}
  .brand small{display:block;font-weight:400;font-size:11px;color:var(--dim);letter-spacing:.18em;margin-top:2px}
  .spacer{flex:1}
  .btn{pointer-events:auto;cursor:pointer;border:1px solid var(--panel-edge);
    background:var(--panel);color:var(--ink);border-radius:999px;padding:8px 15px;font-size:13px;
    backdrop-filter:blur(10px);transition:.18s;white-space:nowrap;font-family:inherit}
  .btn:hover{border-color:rgba(95,232,210,.5);background:rgba(10,34,52,.85);transform:translateY(-1px)}
  .btn:active{transform:translateY(0)}

  /* ---- plugin dock (toy box) ---- */
  .dock{position:fixed;left:14px;bottom:14px;display:flex;flex-wrap:wrap;gap:8px;z-index:5;max-width:70vw}
  .dock .btn{pointer-events:auto}
  .dock.folded .btn:not(.dock-toggle){display:none}
  .dock .dock-toggle{font-size:15px;padding:8px 12px}

  /* ---- hint ---- */
  .hint{position:fixed;left:50%;top:46%;transform:translate(-50%,-50%);text-align:center;
    color:var(--dim);font-size:15px;line-height:2;pointer-events:none;z-index:2;
    transition:opacity 1.2s;text-shadow:0 0 20px rgba(0,0,0,.8)}
  .hint .big{font-size:19px;color:var(--ink);letter-spacing:.08em}

  /* ---- side panel ---- */
  .panel{position:fixed;top:64px;right:14px;width:330px;max-height:calc(100vh - 84px);
    overflow-y:auto;background:var(--panel);border:1px solid var(--panel-edge);border-radius:16px;
    padding:14px;backdrop-filter:blur(14px);z-index:4;
    box-shadow:0 18px 50px rgba(0,0,0,.5);transition:transform .3s, opacity .3s;scrollbar-width:thin;}
  .panel.hidden{transform:translateX(120%);opacity:0;pointer-events:none}
  .panel::-webkit-scrollbar{width:7px}
  .panel::-webkit-scrollbar-thumb{background:rgba(95,232,210,.25);border-radius:4px}
  .panel h2{margin:2px 4px 10px;font-size:13px;letter-spacing:.14em;color:var(--dim);font-weight:600}
  .panel .empty{color:var(--dim);font-size:13px;padding:8px 6px;line-height:1.8}

  .card{border:1px solid transparent;border-radius:12px;padding:11px 12px;margin-bottom:9px;
    background:rgba(255,255,255,.025);cursor:pointer;transition:.18s}
  .card:hover,.card.active{background:rgba(95,232,210,.09);border-color:rgba(95,232,210,.35)}
  .card .nm{font-size:15px;font-weight:600;letter-spacing:.03em;display:flex;align-items:baseline;gap:8px}
  .card .nm .dot{width:8px;height:8px;border-radius:50%;background:var(--acc);
    box-shadow:0 0 8px var(--acc);flex:none}
  .card .lat{font-style:italic;font-size:11.5px;color:#8fd8ff;letter-spacing:.05em;margin:3px 0 0 16px}
  .card .meta{font-size:11px;color:var(--dim);margin:5px 0 0 16px}
  .card .story{font-size:12.5px;line-height:2;color:#bfe2ee;margin:9px 0 2px;
    max-height:0;overflow:hidden;transition:max-height .35s ease;border-left:2px solid rgba(95,232,210,.3);
    padding-left:10px;opacity:0}
  .card.open .story{max-height:340px;opacity:1;margin-top:10px}

  /* ---- info card (creature dossier) ---- */
  .dossier{position:fixed;left:50%;bottom:76px;transform:translateX(-50%) translateY(16px);
    width:min(420px,92vw);background:var(--panel);border:1px solid var(--panel-edge);
    border-radius:16px;padding:16px 18px;backdrop-filter:blur(14px);z-index:6;
    box-shadow:0 18px 50px rgba(0,0,0,.55);opacity:0;pointer-events:none;transition:.25s}
  .dossier.show{opacity:1;pointer-events:auto;transform:translateX(-50%) translateY(0)}
  .dossier .x{position:absolute;top:8px;right:12px;color:var(--dim);cursor:pointer;font-size:14px;
    padding:4px;transition:.2s}
  .dossier .x:hover{color:var(--ink)}
  .dossier .nm{font-size:17px;font-weight:600;letter-spacing:.04em}
  .dossier .lat{font-style:italic;font-size:12px;color:#8fd8ff;margin-top:2px}
  .dossier .meta{font-size:11.5px;color:var(--dim);margin-top:7px;letter-spacing:.05em}
  .dossier .eco{font-size:12.5px;line-height:2;color:#bfe2ee;margin-top:9px;
    border-left:2px solid rgba(95,232,210,.3);padding-left:10px}

  .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);
    background:var(--panel);border:1px solid var(--panel-edge);border-radius:999px;
    padding:9px 18px;font-size:13px;backdrop-filter:blur(10px);opacity:0;transition:.3s;z-index:7;pointer-events:none}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<svg id="sea" xmlns="http://www.w3.org/2000/svg"></svg>

<div class="topbar">
  <div class="brand">深海水族館<small>DEEP-SEA AQUARIUM</small></div>
  <div class="spacer"></div>
  <button class="btn" id="release">🐟 放流する</button>
  <button class="btn" id="togglePanel">🐚 住人一覧</button>
  <button class="btn" id="save">画像で保存</button>
  <button class="btn" id="clear">水槽を空にする</button>
</div>

<div class="hint" id="hint">
  <div class="big">ようこそ。ここは光の届かない水族館です</div>
  泳いでいる住人をクリックすると、その生態がわかります<br>
  <span style="font-size:13px">新しい住人は右上の「🐟 放流する」から</span>
</div>

<div class="panel hidden" id="panel">
  <h2>水槽の住人</h2>
  <div id="cards"></div>
</div>

<div class="dossier" id="dossier"></div>
<div class="toast" id="toast"></div>
<div class="dock" id="dock"></div>

<script>
(() => {
  "use strict";
  const SVGNS = "http://www.w3.org/2000/svg";
  const svg = document.getElementById("sea");

  // ---- layers ----
  const defs       = mk("defs");
  const gWater     = mk("g");   // background: gradient, light rays
  const gSnow      = mk("g");   // marine snow
  const gFar       = mk("g");   // distant silhouettes (plugins: ヌシ etc.)
  const gCreatures = mk("g");   // the residents
  const gFx        = mk("g");   // bubbles, effects, plugin actors (food, ROV...)
  svg.append(defs, gWater, gSnow, gFar, gCreatures, gFx);

  defs.innerHTML = `
    <linearGradient id="sea-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#04304a"/>
      <stop offset="28%" stop-color="#032136"/>
      <stop offset="62%" stop-color="#021322"/>
      <stop offset="100%" stop-color="#000509"/>
    </linearGradient>
    <linearGradient id="ray" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7fd8e8" stop-opacity=".14"/>
      <stop offset="100%" stop-color="#7fd8e8" stop-opacity="0"/>
    </linearGradient>
    <filter id="c-glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="2.6"/>
    </filter>
    <filter id="c-soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="1.1"/>
    </filter>`;

  const bgRect = mk("rect", { x:0, y:0, width:"100%", height:"100%", fill:"url(#sea-bg)" });
  gWater.before(bgRect);

  // ---- state ----
  let W = 0, H = 0;
  const creatures = [];          // {id, genome, el, x, y, baseY, targetY, dir, flip, speed, phase, pulse, turnT, tilt}
  let nextId = 1;
  const usedNames = new Set();

  // ---- plugin event bus ----
  const listeners = new Map();
  function on(name, fn){
    if(!listeners.has(name)) listeners.set(name, []);
    listeners.get(name).push(fn);
  }
  function emit(name, arg){
    for(const f of listeners.get(name) || []){
      try{ f(arg); }catch(err){ console.error(`[plugin handler for "${name}"]`, err); }
    }
  }

  // ====================================================================
  //  name & lore generation
  // ====================================================================
  const PREFIX = ["ユメ","オボロ","ヨミ","ホネ","ガラス","カガミ","フカミ","クロ","シズク","ヒカリ",
                  "ナミダ","カゲ","ユウレイ","トゲ","ハゴロモ","ヤミ","ホシ","ツキ","マボロシ","イバラ",
                  "コゴエ","シラタマ","ウタカタ","ムゲン"];
  const CORES = {
    fish:   ["ウオ","イワシ","ザメ","タツ","ギンポ","デメ","ハダカ"],
    eel:    ["ウナギ","アナゴ","ウミヘビ","ヒモ"],
    jelly:  ["クラゲ","カムロ","フウセン"],
    ray:    ["エイ","カスベ","テンガイ"],
    angler: ["アンコウ","ツリビト","チョウチン"],
  };
  const SUFFIX = ["モドキ","ダマシ","オトシゴ"];
  const GENUS_STEM = ["Abysso","Bathy","Chasmo","Stygio","Vampyro","Phantasmo","Umbra","Nocti","Cryo","Somni"];
  const GENUS_TAIL = { fish:"ichthys", eel:"anguilla", jelly:"medusa", ray:"raja", angler:"lophius" };
  const SPECIES = ["profundus","lucens","umbrae","nocturna","abyssalis","tristis","somnians","vitrea",
                   "fragilis","mirabilis","silentii","perdita","spectralis","innominata"];
  const ECO_FOOD = [
    (n)=>`マリンスノーだけを食べて生きている。偏食である。`,
    (n)=>`光るものならなんでも口に入れる。後悔も多い。`,
    (n)=>`眠っているプランクトンを起こさないように食べる。`,
    (n)=>`同族の見る夢を栄養にしているという説があるが、誰も確かめていない。`,
    (n)=>`捕食シーンを見た者はいない。いつの間にか満腹そうな顔をしている。`,
    (n)=>`沈んでくる落とし物を選り好みせずに食べる。海の掃除屋である。`,
  ];
  const ECO_GLOW = [
    (n)=>`発光は仲間への合図と考えられているが、仲間が確認されたことはない。`,
    (n)=>`光で獲物をおびき寄せる。たまに自分でその光に見とれている。`,
    (n)=>`怒ると明るくなる。明るいときは近づかないほうがよい。`,
    (n)=>`発光の理由は不明。本人もよく分かっていない可能性がある。`,
    (n)=>`月の満ち欠けに合わせて光量が変わる。ここまで月光は届かないのに、である。`,
  ];
  const ECO_HABIT = [
    (n)=>`ひどく人見知りで、視線を感じると泳ぐ速さが1割落ちる。`,
    (n)=>`眠りながら泳ぐ。起きているところを観察した記録は少ない。`,
    (n)=>`水圧の変化で機嫌が分かる。今日はたぶん普通。`,
    (n)=>`縄張り意識はないが、お気に入りの暗がりはある。`,
    (n)=>`群れを作らない。一度だけ作ろうとして、やめた形跡がある。`,
    (n)=>`歌うように鳴くが、可聴域より遥かに低いので誰にも聞こえない。`,
  ];
  const ECO_MYSTERY = [
    (n)=>`生きた個体の長期観察例は、この水槽が世界初である。`,
    (n)=>`標本はすべて溶けてしまうため、学界では半ば伝説扱いになっている。`,
    (n)=>`発見者は「もう一度会いたい」とだけ言い残して山に帰った。`,
    (n)=>`DNA解析の結果は「該当なし」だった。機材は正常だった。`,
    (n)=>`じつは二匹で一匹かもしれないという指摘があるが、未確認である。`,
  ];

  function pick(a){ return a[(Math.random()*a.length)|0]; }

  function makeName(arch){
    let name, tries = 0;
    do{
      name = pick(PREFIX) + pick(CORES[arch]) + (Math.random() < .25 ? pick(SUFFIX) : "");
    } while(usedNames.has(name) && ++tries < 20);
    usedNames.add(name);
    return name;
  }
  function makeEco(name){
    const pools = [ECO_FOOD, ECO_GLOW, ECO_HABIT, ECO_MYSTERY];
    const a = pools.splice((Math.random()*pools.length)|0, 1)[0];
    const b = pick(pools);
    return pick(a)(name) + pick(b)(name);
  }

  // ====================================================================
  //  genome
  // ====================================================================
  const ARCHS = ["fish","fish","fish","fish","jelly","jelly","eel","eel","ray","angler","angler"];
  const DEPTH_BAND = { fish:[200,2200], eel:[400,3200], jelly:[200,4200], ray:[300,2600], angler:[800,6400] };

  function makeGenome(over){
    over = over || {};
    const arch = over.arch || pick(ARCHS);
    const band = DEPTH_BAND[arch];
    const g = {
      arch,
      size:   28 + Math.random()*42,
      hue:    [195,210,230,260,285,320,350][ (Math.random()*7)|0 ],
      acc:    pick([165,185,45,315,90,200]),
      bodyR:  .32 + Math.random()*.22,
      finS:   .6 + Math.random()*.8,
      eyeN:   Math.random() < .12 ? 3 : (Math.random() < .82 ? 1 : 2),
      eyeS:   .8 + Math.random()*1.4,
      spots:  2 + (Math.random()*5|0),
      stripes:(Math.random()*3|0),
      tail:   (Math.random()*3|0),
      tent:   4 + (Math.random()*3|0),
      lure:   .8 + Math.random()*.8,
      depth:  Math.round(band[0] + Math.random()*(band[1]-band[0])),
      speed:  14 + Math.random()*26,
    };
    Object.assign(g, over);
    if(!g.name)  g.name  = makeName(g.arch);
    if(!g.latin) g.latin = pick(GENUS_STEM) + GENUS_TAIL[g.arch] + " " + pick(SPECIES);
    if(!g.eco)   g.eco   = makeEco(g.name);
    if(!g.lenM){
      const mul = { fish:1.4, eel:3.2, jelly:1.1, ray:2.2, angler:1.2 }[g.arch];
      const m = g.size/40 * mul * (0.5 + Math.random());
      g.lenM = m >= 1 ? `約${m.toFixed(1)}m` : `約${Math.round(m*100)}cm`;
    }
    return g;
  }

  // ====================================================================
  //  creature renderer — pure: genome -> <g> (origin center, nose +x)
  // ====================================================================
  function body(hue, l){ return `hsl(${hue}, 42%, ${l}%)`; }
  function neon(acc){ return `hsl(${acc}, 100%, 68%)`; }

  function glowDot(x, y, r, acc){
    const d = mk("circle", {cx:x, cy:y, r, fill:neon(acc), filter:"url(#c-glow)"});
    d.setAttribute("opacity", .9);
    return d;
  }
  function eye(x, y, r){
    const g = mk("g");
    g.append(
      mk("circle", {cx:x, cy:y, r, fill:"#dff4ff", opacity:.92}),
      mk("circle", {cx:x + r*.25, cy:y, r:r*.45, fill:"#04222e"})
    );
    return g;
  }

  function creatureGroup(g){
    const grp = mk("g", {class:"sea-creature"});
    const L = g.size, Hh = g.size*g.bodyR;
    const bf = body(g.hue, 17), bl = body(g.hue, 30);

    if(g.arch === "fish"){
      const tailLen = L*.32*(1+g.tail*.18);
      const tailPts = g.tail===0
        ? `${-L/2},0 ${-L/2-tailLen},${-Hh*.7} ${-L/2-tailLen},${Hh*.7}`
        : g.tail===1
          ? `${-L/2},0 ${-L/2-tailLen},${-Hh*.45} ${-L/2-tailLen*.6},0 ${-L/2-tailLen},${Hh*.45}`
          : `${-L/2},0 ${-L/2-tailLen*.8},${-Hh*1.1} ${-L/2-tailLen*.4},0 ${-L/2-tailLen*.8},${Hh*1.1}`;
      grp.append(mk("polygon",{points:tailPts, fill:bl, opacity:.85}));
      grp.append(mk("path",{d:`M ${-L/2} 0 C ${-L/5} ${-Hh}, ${L/4} ${-Hh}, ${L/2} 0 C ${L/4} ${Hh}, ${-L/5} ${Hh}, ${-L/2} 0 Z`,
        fill:bf, stroke:bl, "stroke-width":1}));
      grp.append(mk("path",{d:`M ${-L*.12} ${-Hh*.92} L ${L*.06} ${-Hh*1.55*g.finS} L ${L*.18} ${-Hh*.8} Z`, fill:bl, opacity:.9}));
      grp.append(mk("path",{d:`M ${L*.02} ${Hh*.85} L ${-L*.08} ${Hh*1.4*g.finS} L ${-L*.18} ${Hh*.7} Z`, fill:bl, opacity:.7}));
      for(let i=0;i<g.stripes;i++){
        const sx = -L*.25 + i*L*.2;
        grp.append(mk("path",{d:`M ${sx} ${-Hh*.75} Q ${sx+L*.06} 0, ${sx} ${Hh*.75}`,
          stroke:bl, "stroke-width":2, fill:"none", opacity:.55}));
      }
      for(let i=0;i<g.spots;i++){
        grp.append(glowDot(-L*.32 + i*(L*.6/Math.max(1,g.spots-1)), Hh*.35, 1.6, g.acc));
      }
      for(let i=0;i<g.eyeN;i++) grp.append(eye(L*.30 - i*5, -Hh*.18 - i*4, 2.6*g.eyeS));
    }

    else if(g.arch === "eel"){
      const len = L*1.9, amp = Hh*.9;
      const d = `M ${-len/2} 0
                 C ${-len/4} ${-amp}, ${-len/8} ${amp}, ${0} 0
                 S ${len/4} ${-amp}, ${len/2} 0`;
      grp.append(mk("path",{d, stroke:bf, "stroke-width":Math.max(4,Hh*.55), fill:"none",
        "stroke-linecap":"round"}));
      grp.append(mk("path",{d, stroke:bl, "stroke-width":Math.max(1.5,Hh*.18), fill:"none",
        "stroke-linecap":"round", opacity:.6}));
      for(let i=0;i<g.spots;i++){
        const t = i/(Math.max(1,g.spots-1));
        grp.append(glowDot(-len/2 + t*len, Math.sin(t*Math.PI*2)*amp*.5, 1.5, g.acc));
      }
      grp.append(mk("circle",{cx:len/2, cy:0, r:Math.max(3,Hh*.4), fill:bf, stroke:bl,"stroke-width":1}));
      grp.append(eye(len/2 + 1, -1.5, 2*g.eyeS));
    }

    else if(g.arch === "jelly"){
      const R = L*.42;
      let dome = `M ${-R} 0 A ${R} ${R*.9} 0 0 1 ${R} 0`;
      const sc = 4, sw = (R*2)/sc;
      for(let i=0;i<sc;i++){
        dome += ` Q ${R - sw*(i+.5)} ${R*.28}, ${R - sw*(i+1)} ${R*.06}`;
      }
      dome += " Z";
      grp.append(mk("path",{d:dome, fill:bf, stroke:bl, "stroke-width":1, opacity:.88}));
      grp.append(mk("ellipse",{cx:0, cy:-R*.3, rx:R*.45, ry:R*.3, fill:neon(g.acc),
        filter:"url(#c-glow)", opacity:.55}));
      for(let i=0;i<g.tent;i++){
        const tx = -R*.8 + i*(R*1.6/Math.max(1,g.tent-1));
        const tl = R*(1.4 + Math.random()*1.2);
        const t = mk("path",{d:`M ${tx} ${R*.05} q ${(Math.random()-.5)*14} ${tl*.5}, ${(Math.random()-.5)*10} ${tl}`,
          stroke:bl, "stroke-width":1.4, fill:"none", opacity:.6, "stroke-linecap":"round"});
        t.style.transformOrigin = `${tx}px 0px`;
        t.animate([{transform:"rotate(-6deg)"},{transform:"rotate(6deg)"},{transform:"rotate(-6deg)"}],
          {duration:3000+Math.random()*2500, iterations:Infinity, easing:"ease-in-out"});
        grp.append(t);
      }
      for(let i=0;i<g.spots;i++){
        grp.append(glowDot(-R*.6 + i*(R*1.2/Math.max(1,g.spots-1)), -R*.1, 1.4, g.acc));
      }
    }

    else if(g.arch === "ray"){
      const Wd = L*1.1, Hd = L*.46;
      grp.append(mk("path",{d:`M ${-Wd/2} 0 Q ${-Wd*.05} ${-Hd}, ${Wd/2} 0 Q ${-Wd*.05} ${Hd}, ${-Wd/2} 0 Z`,
        fill:bf, stroke:bl, "stroke-width":1}));
      grp.append(mk("path",{d:`M ${-Wd/2} 0 q ${-Wd*.3} ${-4}, ${-Wd*.55} ${2}`,
        stroke:bl, "stroke-width":1.6, fill:"none", "stroke-linecap":"round"}));
      for(let i=0;i<g.spots;i++){
        grp.append(glowDot(-Wd*.2 + i*(Wd*.5/Math.max(1,g.spots-1)), 0, 1.6, g.acc));
      }
      grp.append(eye(Wd*.3, -Hd*.25, 2.2*g.eyeS));
      if(g.eyeN > 1) grp.append(eye(Wd*.36, -Hd*.1, 1.8*g.eyeS));
    }

    else { // angler
      const R = L*.42;
      grp.append(mk("circle",{cx:-R*.15, cy:0, r:R, fill:bf, stroke:bl, "stroke-width":1}));
      let teeth = `M ${R*.5} ${R*.18}`;
      const tn = 4;
      for(let i=0;i<tn;i++){
        teeth += ` l ${-R*.22} ${R*.16} l ${-R*.06} ${-R*.12}`;
      }
      grp.append(mk("path",{d:teeth, stroke:"#cfe8ef", "stroke-width":1.3, fill:"none", opacity:.85}));
      grp.append(mk("path",{d:`M ${R*.62} ${R*.1} Q ${R*.1} ${R*.55}, ${-R*.5} ${R*.4}`,
        stroke:bl, "stroke-width":1.6, fill:"none", opacity:.8}));
      const lureX = R*.55*g.lure, lureY = -R*(1.15 + g.lure*.45);
      grp.append(mk("path",{d:`M ${-R*.1} ${-R*.95} Q ${lureX*.4} ${lureY}, ${lureX} ${lureY*.92}`,
        stroke:bl, "stroke-width":1.6, fill:"none"}));
      const bulb = glowDot(lureX, lureY*.92, 3.4, g.acc);
      bulb.animate([{opacity:.95},{opacity:.35},{opacity:.95}],
        {duration:1600+Math.random()*1800, iterations:Infinity, easing:"ease-in-out"});
      grp.append(bulb);
      grp.append(mk("path",{d:`M ${-R*.9} ${-R*.3} L ${-R*1.5} ${-R*.7*g.finS} L ${-R*1.4} ${R*.1} Z`, fill:bl, opacity:.8}));
      grp.append(eye(R*.32, -R*.3, 2.4*g.eyeS));
      for(let i=0;i<Math.min(g.spots,3);i++){
        grp.append(glowDot(-R*.6 + i*R*.4, R*.5, 1.4, g.acc));
      }
    }
    return grp;
  }

  // ====================================================================
  //  residents
  // ====================================================================
  function addCreature(over){
    const genome = makeGenome(over);
    const c = {
      id: nextId++,
      genome,
      x: 80 + Math.random()*(Math.max(200,W) - 160),
      y: 0,
      baseY: H*(.18 + Math.random()*.62),
      targetY: 0,
      dir: Math.random() < .5 ? 1 : -1,
      flip: 1,
      speed: genome.speed,
      phase: Math.random()*Math.PI*2,
      pulse: .8 + Math.random()*1.2,
      turnT: 2 + Math.random()*5,
      tilt: 0,
      el: null,
    };
    c.targetY = c.baseY;
    c.y = c.baseY;
    c.flip = c.dir;
    c.el = creatureGroup(genome);
    c.el.style.cursor = "pointer";
    c.el.addEventListener("pointerdown", e => {
      if(e.defaultPrevented || e.button !== 0) return;
      e.preventDefault();
      openInfo(c);
      emit("creature-clicked", c);
    });
    gCreatures.append(c.el);
    creatures.push(c);
    birthBubbles(c.x, c.y);
    c.el.animate([{opacity:0},{opacity:1}],{duration:900, easing:"ease-out"});
    emit("creature-added", c);
    renderPanel();
    return c;
  }

  function removeCreature(id, opts){
    const i = creatures.findIndex(c => c.id === id);
    if(i < 0) return false;
    const [c] = creatures.splice(i, 1);
    c.el.remove();
    emit("creature-removed", c);
    if(!opts || opts.silent !== true) renderPanel();
    return true;
  }

  // ====================================================================
  //  swimming (elapsed-time driven)
  // ====================================================================
  let lastT = 0;
  function frame(now){
    const dt = Math.min(.1, (now - lastT)/1000 || 0);
    lastT = now;
    for(const c of creatures){
      const g = c.genome;
      c.phase += dt * c.pulse;

      if(g.arch === "jelly"){
        c.baseY += Math.sin(c.phase*.3) * dt * 6;
        c.x += Math.sin(c.phase*.17) * dt * 5;
        c.y = c.baseY + Math.sin(c.phase)*14;
        c.baseY = Math.max(H*.1, Math.min(H*.9, c.baseY));
        const squish = 1 + .08*Math.sin(c.phase*2);
        c.el.setAttribute("transform",
          `translate(${c.x.toFixed(1)} ${c.y.toFixed(1)}) scale(1 ${squish.toFixed(3)})`);
        continue;
      }

      c.turnT -= dt;
      if(c.turnT <= 0){
        c.turnT = 3 + Math.random()*6;
        if(Math.random() < .25) c.dir *= -1;
        c.targetY = Math.max(H*.12, Math.min(H*.88, c.baseY + (Math.random()-.5)*H*.3));
      }
      const margin = 70;
      if(c.x > W - margin && c.dir > 0) c.dir = -1;
      if(c.x < margin && c.dir < 0) c.dir = 1;

      const slow = (g.arch === "ray") ? .6 : 1;
      c.x += c.dir * c.speed * slow * dt;
      c.baseY += (c.targetY - c.baseY) * Math.min(1, dt*.5);
      c.y = c.baseY + Math.sin(c.phase) * (g.arch === "eel" ? 10 : 6);
      c.flip += (c.dir - c.flip) * Math.min(1, dt*5);
      const tilt = (g.arch === "eel") ? Math.sin(c.phase)*7
                 : (g.arch === "ray") ? Math.sin(c.phase*.7)*4 : Math.sin(c.phase)*2;
      const flapY = (g.arch === "ray") ? 1 + .06*Math.sin(c.phase*1.4) : 1;
      c.el.setAttribute("transform",
        `translate(${c.x.toFixed(1)} ${c.y.toFixed(1)}) rotate(${tilt.toFixed(1)}) scale(${c.flip.toFixed(3)} ${flapY.toFixed(3)})`);
    }
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(t => { lastT = t; requestAnimationFrame(frame); });

  // ====================================================================
  //  ambience: light rays, marine snow, bubbles
  // ====================================================================
  function buildWater(){
    gWater.replaceChildren();
    for(let i=0;i<4;i++){
      const x = W*(.12 + i*.24) + (Math.random()-.5)*60;
      const w = 60 + Math.random()*90;
      const lean = (Math.random()-.5)*120;
      const ray = mk("polygon",{points:`${x},-20 ${x+w},-20 ${x+w*.55+lean},${H*.7} ${x-w*.45+lean},${H*.7}`,
        fill:"url(#ray)"});
      ray.animate([{opacity:.4},{opacity:1},{opacity:.4}],
        {duration:7000+Math.random()*6000, iterations:Infinity, easing:"ease-in-out"});
      gWater.append(ray);
    }
  }

  function buildSnow(){
    gSnow.replaceChildren();
    const n = Math.round(W*H/26000);
    for(let i=0;i<n;i++){
      const f = mk("circle",{cx:Math.random()*W, cy:Math.random()*H,
        r:(Math.random()*1.3+.4).toFixed(2), fill:"#bcd8e6", opacity:(.12+Math.random()*.3).toFixed(2)});
      const fall = 16000 + Math.random()*36000;
      f.animate([
        {transform:"translate(0,0)"},
        {transform:`translate(${(Math.random()-.5)*60}px, ${H+30}px)`}
      ],{duration:fall, iterations:Infinity, delay:-Math.random()*fall, easing:"linear"});
      gSnow.append(f);
    }
  }

  function birthBubbles(x, y){
    for(let i=0;i<8;i++){
      const b = mk("circle",{cx:x+(Math.random()-.5)*30, cy:y+(Math.random()-.5)*20,
        r:1+Math.random()*2.6, fill:"none", stroke:"#bfe6f2", "stroke-width":.8, opacity:.7});
      gFx.append(b);
      b.animate([
        {transform:"translate(0,0)", opacity:.7},
        {transform:`translate(${(Math.random()-.5)*40}px, ${-60-Math.random()*80}px)`, opacity:0}
      ],{duration:1200+Math.random()*1200, easing:"ease-out"}).onfinish = () => b.remove();
    }
  }
  setInterval(() => {        // ambient stray bubbles
    if(Math.random() < .5 && creatures.length){
      const c = pick(creatures);
      birthBubblesAt(c.x, c.y - 10);
    }
  }, 6000);
  function birthBubblesAt(x, y){
    const b = mk("circle",{cx:x, cy:y, r:1.2+Math.random()*1.8, fill:"none",
      stroke:"#bfe6f2", "stroke-width":.8, opacity:.55});
    gFx.append(b);
    b.animate([
      {transform:"translate(0,0)", opacity:.55},
      {transform:`translate(${(Math.random()-.5)*30}px, ${-H*.4}px)`, opacity:0}
    ],{duration:6000+Math.random()*4000, easing:"ease-out"}).onfinish = () => b.remove();
  }

  // ====================================================================
  //  panel & dossier
  // ====================================================================
  const cards = document.getElementById("cards");
  function renderPanel(){
    cards.replaceChildren();
    if(!creatures.length){
      const e = document.createElement("div");
      e.className = "empty";
      e.textContent = "水槽は空です。暗闇だけが泳いでいます。";
      cards.append(e);
      emit("panel-rendered", {container: cards});
      return;
    }
    for(const c of creatures){
      const g = c.genome;
      const card = document.createElement("div");
      card.className = "card";
      card.dataset.cid = c.id;
      card.innerHTML =
        `<div class="nm"><span class="dot"></span>${g.name}</div>`+
        `<div class="lat">${g.latin}</div>`+
        `<div class="meta">全長 ${g.lenM} ・ 生息深度 ${g.depth}m</div>`+
        `<div class="story">${g.eco}</div>`;
      card.querySelector(".dot").style.background = `hsl(${g.acc},100%,68%)`;
      card.querySelector(".dot").style.boxShadow = `0 0 8px hsl(${g.acc},100%,68%)`;
      card.addEventListener("click", () => card.classList.toggle("open"));
      card.addEventListener("mouseenter", () => { c.el.setAttribute("filter","url(#c-soft)"); });
      card.addEventListener("mouseleave", () => { c.el.removeAttribute("filter"); });
      cards.append(card);
    }
    emit("panel-rendered", {container: cards});
  }

  const dossier = document.getElementById("dossier");
  let dossierFor = null;
  function openInfo(c){
    const g = c.genome;
    dossierFor = c.id;
    dossier.innerHTML =
      `<span class="x">✕</span>`+
      `<div class="nm">${g.name}</div>`+
      `<div class="lat">${g.latin}</div>`+
      `<div class="meta">全長 ${g.lenM}　／　生息深度 ${g.depth}m　／　観察個体 No.${String(c.id).padStart(3,"0")}</div>`+
      `<div class="eco">${g.eco}</div>`;
    dossier.querySelector(".x").addEventListener("click", closeInfo);
    dossier.classList.add("show");
    emit("dossier-opened", {creature: c, el: dossier});
  }
  function closeInfo(){ dossier.classList.remove("show"); dossierFor = null; }
  on("creature-removed", c => { if(dossierFor === c.id) closeInfo(); });

  // ====================================================================
  //  UI buttons
  // ====================================================================
  document.getElementById("release").addEventListener("click", () => {
    const c = addCreature();
    toast(`${c.genome.name} が放流されました`);
    hideHint();
  });
  document.getElementById("togglePanel").addEventListener("click", () => {
    document.getElementById("panel").classList.toggle("hidden");
  });
  document.getElementById("clear").addEventListener("click", () => {
    while(creatures.length) removeCreature(creatures[creatures.length-1].id, {silent:true});
    renderPanel(); closeInfo();
    emit("cleared");
    toast("水槽は静かになりました");
  });
  document.getElementById("save").addEventListener("click", savePNG);

  function savePNG(){
    const clone = svg.cloneNode(true);
    clone.setAttribute("width", W); clone.setAttribute("height", H);
    const back = mk("rect",{x:0,y:0,width:W,height:H,fill:"#010810"});
    clone.insertBefore(back, clone.firstChild);
    const data = new XMLSerializer().serializeToString(clone);
    const url = URL.createObjectURL(new Blob([data], {type:"image/svg+xml;charset=utf-8"}));
    const img = new Image();
    img.onload = () => {
      const cv = document.createElement("canvas");
      cv.width = W*2; cv.height = H*2;
      const ctx = cv.getContext("2d");
      ctx.fillStyle = "#010810"; ctx.fillRect(0,0,cv.width,cv.height);
      ctx.drawImage(img,0,0,cv.width,cv.height);
      URL.revokeObjectURL(url);
      cv.toBlob(b => {
        const a = document.createElement("a");
        a.href = URL.createObjectURL(b);
        a.download = "deep-sea-aquarium.png";
        a.click();
        setTimeout(()=>URL.revokeObjectURL(a.href), 1000);
        toast("水槽を撮影しました（フラッシュは焚いていません）");
      }, "image/png");
    };
    img.onerror = () => { toast("撮影に失敗しました"); URL.revokeObjectURL(url); };
    img.src = url;
  }

  // ---- dock ----
  const dock = document.getElementById("dock");
  const dockToggle = document.createElement("button");
  dockToggle.className = "btn dock-toggle";
  dockToggle.textContent = "🧰";
  dockToggle.title = "おもちゃ箱をひらく／たたむ";
  dockToggle.addEventListener("click", () => dock.classList.toggle("folded"));
  dock.append(dockToggle);
  function addButton(label, onClick){
    const b = document.createElement("button");
    b.className = "btn";
    b.textContent = label;
    b.addEventListener("click", onClick);
    dock.append(b);
    return b;
  }

  // ---- hint & toast ----
  const hint = document.getElementById("hint");
  let hintT = setTimeout(hideHint, 9000);
  function hideHint(){ clearTimeout(hintT); hint.style.opacity = 0; }

  const toastEl = document.getElementById("toast");
  let toastT = null;
  function toast(msg){
    toastEl.textContent = msg; toastEl.classList.add("show");
    clearTimeout(toastT); toastT = setTimeout(()=>toastEl.classList.remove("show"), 2200);
  }

  // ---- helpers ----
  function mk(tag, attrs){
    const el = document.createElementNS(SVGNS, tag);
    if(attrs) for(const k in attrs) el.setAttribute(k, attrs[k]);
    return el;
  }

  function resize(){
    W = window.innerWidth; H = window.innerHeight;
    svg.setAttribute("viewBox", `0 0 ${W} ${H}`);
    buildWater(); buildSnow();
  }
  window.addEventListener("resize", resize);

  // ==================================================================
  //  plugin API
  // ==================================================================
  window.SEA = {
    svg, defs, gWater, gSnow, gFar, gCreatures, gFx,
    creatures,                       // live array (do not reassign)
    get W(){ return W; }, get H(){ return H; },
    mk, toast, pick,
    makeGenome, creatureGroup,       // pure: genome -> fresh <g> (origin center, nose +x)
    addCreature, removeCreature,     // addCreature(genomeOverrides?) -> creature
    refreshPanel: renderPanel,
    openInfo, closeInfo,
    addButton,
    lore: {PREFIX, CORES, SUFFIX, GENUS_STEM, SPECIES, ECO_FOOD, ECO_GLOW, ECO_HABIT, ECO_MYSTERY},
    on, emit,                        // events: creature-added(c), creature-removed(c),
                                     //   creature-clicked(c), dossier-opened({creature,el}),
                                     //   panel-rendered({container}), cleared()
                                     // plugins may emit custom namespaced events (e.g. "esa:fed")
  };

  // ---- opening ----
  resize();
  renderPanel();
  setTimeout(()=>{ addCreature(); }, 600);
  setTimeout(()=>{ addCreature(); }, 1600);
  setTimeout(()=>{ addCreature(); }, 2800);
  setTimeout(()=>{ addCreature(); renderPanel(); }, 4200);
})();
</script>

<script>

(()=>{ "use strict";

    const V_GHOST = [

      ()=>`名簿にない影がひとつ。名簿のほうが正しいことを祈る。`,

    const V_NUSHI = [

      ()=>`水槽がクラゲでいっぱいだ。仕事が増えたのか減ったのか、まだ分からない。`,
    ];
    const V_ROV = [
      ()=>`ROVが横切っていった。操縦者に心当たりがない。`,
      ()=>`無人機が一往復。点検だと思いたい。点検であってくれ。`,
      ()=>`ROV通過。ライトがまぶしい。深海の作法を学んでほしい。`,
    ];
    const V_DEPTH = [
      n=>`${n}mまで潜った。耳が抜けない。`,
      n=>`深度を${n}mに変更。窓の外の暗さが一段階濃くなった。`,
      n=>`${n}mへ。ここまで来ると、上も下も同じ色をしている。`,
    ];
    const MONO = [
      `今日も来館者はゼロ。魚は全員来た。`,
      `閉館時間という概念を、この館は持たない。`,
      `非常口の場所を、まだ知らない。たぶん無い。`,
      `水圧は今日も平常。私の肩こりも平常。`,
      `明日の予定：見回り、給餌、暗闇の点検。`,
      `誰にも読まれない日誌は、日記と何が違うのだろう。`,
      `照明がひとつ切れた。深海が少し本物に近づいた。`,
      `帰り道を思い出せない日がある。今日はまだ大丈夫。`,
      `住人の名前は全部言える。人間の知り合いより多い。`,
      `今日の水温は低い。昨日も低かった。明日も低い。安心する。`,
    ];
    const EMPTY_LINE = `特記事項なし。水は静かで、職務に支障なし。`;

    // ---------------- the log ----------------
    const entries = [];               // {t, text} | {t, kind, bucket, n, vi}
    const MAX = 400;
    function push(e){ entries.push(e); if(entries.length > MAX) entries.splice(0, entries.length - MAX); }
    function log(text){ push({ t: Date.now(), text }); }

    const AGG = { esa: { v: V_ESA }, sonar: { v: V_SONAR } };
    const lastAgg = { esa: null, sonar: null };
    function bump(kind){
      const now = Date.now(), bucket = Math.floor(now / 600000);   // ~10 min buckets
      const cur = lastAgg[kind];
      if(cur && cur.bucket === bucket){ cur.n++; return; }
      const e = { t: now, kind, bucket, n: 1, vi: (Math.random()*AGG[kind].v.length)|0 };
      lastAgg[kind] = e;
      push(e);

    function textOf(e){
      if(e.kind){ try{ return AGG[e.kind].v[e.vi % AGG[e.kind].v.length](e.n); }catch(_){ return ""; } }
      return e.text || "";

    SEA.on("kurage:bloom",   safe(() => log(pick(V_BLOOM)())));
    SEA.on("rov:pass",       safe(() => log(pick(V_ROV)())));

    let lastLoggedDepth = null;          // delta measured from the last depth WRITTEN, so drift accumulates
    SEA.on("depth:changed", safe(arg => {
      const d = Number(arg && arg.depth);
      if(!isFinite(d)) return;
      const base = lastLoggedDepth === null ? 0 : lastLoggedDepth;
      if(Math.abs(d - base) >= 800){
        log(pick(V_DEPTH)(Math.round(d)));
        lastLoggedDepth = d;
      }
    }));

    // ---------------- notebook UI ----------------
    const style = document.createElement("style");
    style.textContent = `

      .nisshi-label{position:absolute;top:-13px;left:50%;transform:translateX(-50%) rotate(-1.4deg);

        padding:7px 20px;border-radius:2px;box-shadow:0 3px 10px rgba(0,0,0,.45);white-space:nowrap}
      .nisshi-label::before,.nisshi-label::after{content:"";position:absolute;top:-7px;width:36px;height:15px;
        background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.12);border-radius:1px}
      .nisshi-label::before{left:-15px;transform:rotate(-28deg)}
      .nisshi-label::after{right:-15px;transform:rotate(28deg)}
      .nisshi-close{position:absolute;top:8px;right:10px;background:none;border:none;color:#9b8a64;
        font-size:14px;cursor:pointer;padding:5px 7px;font-family:inherit;transition:color .2s}
      .nisshi-close:hover{color:#e7d9b4}
      .nisshi-pages{flex:1;overflow-y:auto;min-height:120px;padding:7px 20px 16px 32px;margin-right:3px;
        font-size:13.5px;line-height:30px;letter-spacing:.04em;color:#e3d6bd;scrollbar-width:thin;
        background-image:linear-gradient(to right, transparent 0 23px, rgba(255,150,120,.14) 23px 24px, transparent 24px),
          repeating-linear-gradient(to bottom, transparent 0 29px, rgba(255,210,122,.13) 29px 30px);
        background-attachment:local,local}
      .nisshi-pages::-webkit-scrollbar{width:7px}
      .nisshi-pages::-webkit-scrollbar-thumb{background:rgba(255,210,122,.22);border-radius:4px}

        background:rgba(0,0,0,.18);border-radius:0 0 6px 6px}

    `;
    document.head.appendChild(style);

    const ovl = document.createElement("div");
    ovl.className = "nisshi-ovl";
    ovl.innerHTML =
      `<div class="nisshi-book" role="dialog" aria-modal="true" aria-label="飼育日誌">` +
        `<div class="nisshi-label"></div>` +
        `<button class="nisshi-close" title="閉じる">✕</button>` +
        `<div class="nisshi-pages"></div>` +
        `<div class="nisshi-foot">` +
          `<div class="nisshi-foot-h">本日のひとりごと</div>` +
          `<div class="nisshi-mono"></div>` +
          `<div class="nisshi-pageno"></div>` +
        `</div>` +
      `</div>`;
    document.body.appendChild(ovl);

    const labelEl  = ovl.querySelector(".nisshi-label");
    const pagesEl  = ovl.querySelector(".nisshi-pages");
    const monoEl   = ovl.querySelector(".nisshi-mono");
    const pagenoEl = ovl.querySelector(".nisshi-pageno");
    const closeBtn = ovl.querySelector(".nisshi-close");

    let pageMem = 0;
    function nextPage(){
      try{
        const k = "nisshi:page";
        let n = parseInt(localStorage.getItem(k) || "0", 10);
        if(!isFinite(n) || n < 0) n = 0;
        n += 1;
        localStorage.setItem(k, String(n));
        return n;
      }catch(_){ return ++pageMem; }
    }

    const lineHTML = (t, s) =>
      `<div class="nisshi-line"><span class="nisshi-t">${esc(hhmm(t))}</span><span class="nisshi-x">${esc(s)}</span></div>`;

    function render(){
      const list = entries.slice().sort((a,b) => a.t - b.t);
      pagesEl.innerHTML = list.length
        ? list.map(e => lineHTML(e.t, textOf(e))).join("")
        : lineHTML(Date.now(), EMPTY_LINE);
    }

    const open = safe(() => {
      const d = new Date();
      labelEl.textContent = `飼育日誌　${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`;
      render();
      monoEl.textContent = pick(MONO);
      pagenoEl.textContent = `第 ${nextPage()} 頁`;
      ovl.classList.add("nisshi-show");
      requestAnimationFrame(() => { pagesEl.scrollTop = pagesEl.scrollHeight; });
      try{ closeBtn.focus({ preventScroll: true }); }catch(_){}
    });
    const close = safe(() => ovl.classList.remove("nisshi-show"));

    closeBtn.addEventListener("click", close);
    ovl.addEventListener("click", safe(e => { if(e.target === ovl) close(); }));
    document.addEventListener("keydown", safe(e => {
      if(e.key === "Escape" && ovl.classList.contains("nisshi-show")) close();
    }));

    SEA.addButton("📔 飼育日誌", open);
  }catch(err){
    console.error("[飼育日誌] 初期化に失敗:", err);
  }
})();
</script>

<script>
// ════ plugin: zukan ════ Paste verbatim into its own <script> tag after the core script. Storage: "sea-zukan-v1" holds {total, entries[]} — entries match the spec shape (name/latin/arch/lenM/depth/eco/date/genome deep-clone),
(() => {
  "use strict";
  if (!window.SEA) return;
  const SEA = window.SEA;
  const KEY = "sea-zukan-v1";
  const CAP = 200;
  const ARCH_ORDER = ["fish", "eel", "jelly", "ray", "angler"];
  const ARCH_LABEL = { fish: "魚", eel: "ウナギ", jelly: "クラゲ", ray: "エイ", angler: "アンコウ" };
  const FLAVOR = "この個体と同じ模様は、二度と生成されません";

  const esc = s => String(s == null ? "" : s).replace(/[&<>"']/g,
    m => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[m]));

  // ================= storage =================
  function load() {
    try {
      const raw = localStorage.getItem(KEY);
      if (raw) {
        const d = JSON.parse(raw);
        if (Array.isArray(d)) return { total: d.length, entries: d };
        if (d && Array.isArray(d.entries)) return { total: Math.max(0, d.total | 0), entries: d.entries };
      }
    } catch (err) { console.error("[zukan] load", err); }
    return { total: 0, entries: [] };
  }
  let state = load();
  function save() {
    try { localStorage.setItem(KEY, JSON.stringify(state)); }
    catch (err) { console.error("[zukan] save", err); }
  }
  function dayKey(d) { return d.getFullYear() + "-" + (d.getMonth() + 1) + "-" + d.getDate(); }

  function record(c) {
    try {
      const g = c && c.genome;
      if (!g || !g.name) return;
      const today = dayKey(new Date());
      if (state.entries.some(e => e && e.name === g.name && dayKey(new Date(e.date)) === today)) return;
      state.entries.push({
        name: g.name,
        latin: g.latin || "",
        arch: g.arch || "fish",
        lenM: g.lenM || "？",
        depth: typeof g.depth === "number" ? g.depth : 0,
        eco: g.eco || "",
        date: new Date().toISOString(),
        genome: JSON.parse(JSON.stringify(g)),
      });
      while (state.entries.length > CAP) state.entries.shift();
      state.total++;
      save();
      if (overlay) renderModal();
    } catch (err) { console.error("[zukan] record", err); }
  }

  // ================= css =================
  const style = document.createElement("style");
  style.textContent = `
  .zukan-overlay{position:fixed;inset:0;z-index:8;display:flex;align-items:center;justify-content:center;
    background:rgba(0,4,9,.6);backdrop-filter:blur(3px);opacity:0;transition:opacity .28s;padding:18px}
  .zukan-overlay.zukan-show{opacity:1}
  .zukan-modal{width:min(720px,94vw);max-height:min(80vh,760px);display:flex;flex-direction:column;
    background:var(--panel);border:1px solid var(--panel-edge);border-radius:16px;backdrop-filter:blur(14px);
    box-shadow:0 22px 70px rgba(0,0,0,.65);overflow:hidden;transform:translateY(12px);transition:transform .28s}
  .zukan-overlay.zukan-show .zukan-modal{transform:translateY(0)}
  .zukan-head{position:relative;padding:15px 18px 12px;border-bottom:1px solid var(--panel-edge);flex:none}
  .zukan-title{font-size:16px;font-weight:600;letter-spacing:.08em;color:var(--ink)}
  .zukan-title small{margin-left:9px;font-weight:400;font-size:10px;color:var(--dim);letter-spacing:.22em}
  .zukan-x{position:absolute;top:11px;right:13px;color:var(--dim);cursor:pointer;font-size:14px;padding:4px;transition:.2s}
  .zukan-x:hover{color:var(--ink)}
  .zukan-stats{display:flex;flex-wrap:wrap;gap:7px;margin-top:11px;font-size:11px;color:var(--dim)}
  .zukan-chip{border:1px solid var(--panel-edge);border-radius:999px;padding:3px 10px;
    background:rgba(255,255,255,.03);letter-spacing:.05em;white-space:nowrap}
  .zukan-chip b{color:var(--ink);font-weight:600;margin-left:5px}
  .zukan-chip small{font-size:10px}
  .zukan-grid{flex:1;overflow-y:auto;padding:14px;display:grid;
    grid-template-columns:repeat(auto-fill,minmax(128px,1fr));gap:10px;align-content:start;scrollbar-width:thin}
  .zukan-grid::-webkit-scrollbar{width:7px}
  .zukan-grid::-webkit-scrollbar-thumb{background:rgba(95,232,210,.25);border-radius:4px}
  .zukan-empty{grid-column:1/-1;color:var(--dim);font-size:13px;line-height:2;text-align:center;padding:34px 10px}
  .zukan-cell{border:1px solid transparent;border-radius:12px;background:rgba(255,255,255,.025);
    padding:9px 8px 10px;cursor:pointer;transition:background .18s,border-color .18s;text-align:center;min-width:0}
  .zukan-cell:hover{background:rgba(95,232,210,.07);border-color:rgba(95,232,210,.3)}
  .zukan-cell.zukan-open{grid-column:1/-1;display:flex;gap:16px;align-items:flex-start;text-align:left;
    background:rgba(95,232,210,.06);border-color:rgba(95,232,210,.35)}
  .zukan-figwrap{min-width:0}
  .zukan-cell.zukan-open .zukan-figwrap{flex:none;width:148px;text-align:center}
  .zukan-thumb{display:block;width:100%;height:72px}
  .zukan-nm{font-size:12.5px;font-weight:600;letter-spacing:.03em;margin-top:5px;color:var(--ink);
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .zukan-date{font-size:10.5px;color:var(--dim);margin-top:2px;letter-spacing:.08em}
  .zukan-detail{display:none;min-width:0;flex:1}
  .zukan-cell.zukan-open .zukan-detail{display:block}
  .zukan-lat{font-style:italic;font-size:12px;color:#8fd8ff;letter-spacing:.05em;margin-top:2px}
  .zukan-meta{font-size:11px;color:var(--dim);margin-top:6px;letter-spacing:.05em}
  .zukan-eco{font-size:12.5px;line-height:2;color:#bfe2ee;margin-top:8px;
    border-left:2px solid rgba(95,232,210,.3);padding-left:10px}
  .zukan-flavor{font-size:11px;color:var(--warm);opacity:.85;margin-top:10px;letter-spacing:.06em}
  .zukan-foot{flex:none;display:flex;align-items:center;justify-content:space-between;gap:12px;
    padding:11px 16px;border-top:1px solid var(--panel-edge)}
  .zukan-wipe{cursor:pointer;font-family:inherit;font-size:11.5px;color:var(--dim);background:transparent;
    border:1px solid var(--panel-edge);border-radius:999px;padding:6px 13px;transition:.18s;white-space:nowrap}
  .zukan-wipe:hover{color:#ffb4a8;border-color:rgba(255,140,120,.45)}
  .zukan-count{font-size:11px;color:var(--dim);letter-spacing:.06em;text-align:right}`;
  document.head.append(style);

  // ================= thumbnails =================
  function fitScale(g) {
    const size = +g.size || 40;
    const extX = { fish: 1.0, eel: 2.05, jelly: 0.85, ray: 1.4, angler: 1.1 }[g.arch] || 1.3;
    let extY;
    switch (g.arch) {
      case "fish":   extY = (g.bodyR || .4) * 1.6 * Math.max(1, g.finS || 1); break;
      case "eel":    extY = (g.bodyR || .4) * 1.2; break;
      case "jelly":  extY = .78; break;
      case "ray":    extY = .55; break;
      case "angler": extY = .42 * (1.2 + (g.lure || 1) * .5); break;
      default:       extY = .8;
    }
    return Math.min(1, 56 / (size * extX), 36 / (size * extY));
  }

  function thumb(genome) {
    const sv = SEA.mk("svg", { viewBox: "-60 -40 120 80", class: "zukan-thumb", "aria-hidden": "true" });
    try {
      if (!genome || !genome.arch) throw new Error("missing genome");
      const grp = SEA.creatureGroup(genome);
      const s = fitScale(genome);
      const wrap = SEA.mk("g");
      let t = "";
      if (genome.arch === "jelly") t = `translate(0 ${(-(+genome.size || 40) * .35 * s).toFixed(1)}) `;
      wrap.setAttribute("transform", t + `scale(${s.toFixed(3)})`);
      wrap.append(grp);
      sv.append(wrap);
    } catch (err) {
      console.error("[zukan] thumb", err);
      sv.append(SEA.mk("circle", { cx: 0, cy: 0, r: 3, fill: "#5fe8d2", opacity: .55 }));
    }
    return sv;
  }

  // ================= modal =================
  let overlay = null;

  function onKey(e) { if (e.key === "Escape") closeModal(); }

  function cell(en) {
    const c = document.createElement("div");
    c.className = "zukan-cell";
    const d = new Date(en.date);
    const md = isNaN(d.getTime()) ? "—" : (d.getMonth() + 1) + "/" + d.getDate();
    const fig = document.createElement("div");
    fig.className = "zukan-figwrap";
    fig.append(thumb(en.genome));
    const cap = document.createElement("div");
    cap.innerHTML =
      `<div class="zukan-nm">${esc(en.name)}</div>` +
      `<div class="zukan-date">${esc(md)}</div>`;
    fig.append(cap);
    const det = document.createElement("div");
    det.className = "zukan-detail";
    det.innerHTML =
      `<div class="zukan-lat">${esc(en.latin)}</div>` +
      `<div class="zukan-meta">全長 ${esc(en.lenM)}　／　生息深度 ${esc(en.depth)}m</div>` +
      `<div class="zukan-eco">${esc(en.eco)}</div>` +
      `<div class="zukan-flavor">${esc(FLAVOR)}</div>`;
    c.append(fig, det);
    c.addEventListener("click", () => {
      try {
        const was = c.classList.contains("zukan-open");
        const parent = c.parentElement;
        if (parent) for (const o of parent.querySelectorAll(".zukan-open")) o.classList.remove("zukan-open");
        if (!was) c.classList.add("zukan-open");
      } catch (err) { console.error("[zukan] cell", err); }
    });
    return c;
  }

  function renderModal() {
    try {
      if (!overlay) return;
      const counts = { fish: 0, eel: 0, jelly: 0, ray: 0, angler: 0 };
      let deepest = 0;
      for (const e of state.entries) {
        if (e && counts[e.arch] != null) counts[e.arch]++;
        if (e && +e.depth > deepest) deepest = +e.depth;
      }
      overlay.querySelector(".zukan-stats").innerHTML =
        `<span class="zukan-chip">総記録数<b>${state.entries.length}</b></span>` +
        ARCH_ORDER.map(a =>
          `<span class="zukan-chip"><small>${ARCH_LABEL[a]}</small><b>${counts[a]}</b></span>`).join("") +
        `<span class="zukan-chip">最深記録<b>${deepest ? esc(deepest) + "m" : "—"}</b></span>`;

      const grid = overlay.querySelector(".zukan-grid");
      grid.replaceChildren();
      if (!state.entries.length) {
        const e = document.createElement("div");
        e.className = "zukan-empty";
        e.textContent = "まだ記録がありません。最初の来館者を、ここで待っています。";
        grid.append(e);
      } else {
        for (const en of state.entries.slice().reverse()) grid.append(cell(en));
      }
      overlay.querySelector(".zukan-count").textContent =
        `あなたはこれまでに ${state.total} の来館者を見送りました`;
    } catch (err) { console.error("[zukan] render", err); }
  }

  function openModal() {
    try {
      if (overlay) return;
      overlay = document.createElement("div");
      overlay.className = "zukan-overlay";
      overlay.innerHTML =
        `<div class="zukan-modal">` +
          `<div class="zukan-head">` +
            `<div class="zukan-title">深海図鑑<small>ABYSSAL RECORDS</small></div>` +
            `<span class="zukan-x" title="とじる">✕</span>` +
            `<div class="zukan-stats"></div>` +
          `</div>` +
          `<div class="zukan-grid"></div>` +
          `<div class="zukan-foot">` +
            `<button class="zukan-wipe">記録を全て消す</button>` +
            `<div class="zukan-count"></div>` +
          `</div>` +
        `</div>`;
      overlay.addEventListener("click", e => { if (e.target === overlay) closeModal(); });
      overlay.querySelector(".zukan-x").addEventListener("click", closeModal);
      overlay.querySelector(".zukan-wipe").addEventListener("click", () => {
        try {
          if (!confirm("図鑑の記録をすべて消しますか？\nこの操作は取り消せません。")) return;
          state = { total: 0, entries: [] };
          save();
          renderModal();
          SEA.toast("図鑑は白紙に戻りました");
        } catch (err) { console.error("[zukan] wipe", err); }
      });
      document.body.append(overlay);
      renderModal();
      requestAnimationFrame(() => { if (overlay) overlay.classList.add("zukan-show"); });
      document.addEventListener("keydown", onKey);
    } catch (err) { console.error("[zukan] open", err); }
  }

  function closeModal() {
    try {
      if (!overlay) return;
      const o = overlay;
      overlay = null;
      document.removeEventListener("keydown", onKey);
      o.classList.remove("zukan-show");
      setTimeout(() => o.remove(), 320);
    } catch (err) { console.error("[zukan] close", err); }
  }

  // ================= wiring =================
  SEA.on("creature-added", c => { try { record(c); } catch (err) { console.error("[zukan]", err); } });
  try { for (const c of [...SEA.creatures]) record(c); }
  catch (err) { console.error("[zukan] initial scan", err); }
  try {
    SEA.addButton("📖 図鑑", () => {
      try { overlay ? closeModal() : openModal(); }
      catch (err) { console.error("[zukan] button", err); }
    });
  } catch (err) { console.error("[zukan] dock", err); }
})();
</script>
