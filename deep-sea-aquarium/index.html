          SEA.gFx.append(b);
          b.animate([{ transform: "translate(0,0)", opacity: .7 },
            { transform: `translate(${((Math.random() - .5) * 18).toFixed(1)}px, ${(-16 - Math.random() * 20).toFixed(1)}px)`, opacity: 0 }],
            { duration: 500 + Math.random() * 300, easing: "ease-out" }).onfinish = () => b.remove();
        }
      } catch (err) { console.error(TAG, "sparkle", err); }
    }

    /* ---------------- arrival: bottle ---------------- */
    function arriveBottle(p) {
      const isl = p.fromIsland || "どこかの島", vil = p.fromVillage || "どこかの村";
      const msg = String(p.message || "（にじんで読めない）");
      pushLog(recvLog, { ico: TOY_ICON.island, sum: `瓶の手紙：${isl}・${vil}より`, t: Date.now() });
      SEA.toast("海流が、瓶を運んできました");
      SEA.emit("kairyu:arrived", { type: "bottle" });

      const el = SEA.mk("g", { class: "kairyu-bottle" });
      el.append(
        SEA.mk("rect", { x: -7, y: -8, width: 14, height: 26, rx: 5.5, fill: "rgba(170,230,220,.16)", stroke: "#9fd8cc", "stroke-width": 1, "stroke-opacity": .65 }),
        SEA.mk("rect", { x: -3.5, y: -16, width: 7, height: 9, rx: 2, fill: "rgba(170,230,220,.16)", stroke: "#9fd8cc", "stroke-width": 1, "stroke-opacity": .65 }),
        SEA.mk("rect", { x: -3, y: -20.5, width: 6, height: 5.5, rx: 1.5, fill: "#b98d5a" }),
        SEA.mk("rect", { x: -3.4, y: -3, width: 6.8, height: 17, rx: 1.2, fill: "#e7d9b4", opacity: .88, transform: "rotate(-4)" }),
        SEA.mk("path", { d: "M -4.2 -6 q -1.4 9 0 19", stroke: "#dffaf3", "stroke-width": 1.1, fill: "none", opacity: .5 }),
        SEA.mk("circle", { cx: 0, cy: 4, r: 9, fill: "#5fe8d2", opacity: .1, filter: "url(#kairyu-glow)" })
      );
      SEA.gFx.append(el);
      const a = {
        el, born: performance.now(),
        x0: SEA.W * (.18 + Math.random() * .64), startY: -36,
        SINK: 12, REST: 120, FADE: 1.6, landed: false, x: 0, y: 0,
        update(now) {
          const t = (now - this.born) / 1000;
          const floorY = SEA.H - 17;
          if (t >= this.SINK + this.REST + this.FADE) return false;
          const p1 = Math.min(1, t / this.SINK);
          this.y = this.startY + (floorY - this.startY) * p1;
          const sway = 1 - p1 * .85;
          this.x = this.x0 + Math.sin(t * .9) * 11 * sway;
          const rot = p1 < 1 ? Math.sin(t * 1.5) * 11 * sway : Math.min(1, (t - this.SINK) * 1.2) * 64;
          if (p1 >= 1 && !this.landed) { this.landed = true; sparkle(this.x, this.y + 4, "#bcd8e6"); }
          if (t > this.SINK + this.REST) this.el.setAttribute("opacity", Math.max(0, 1 - (t - this.SINK - this.REST) / this.FADE).toFixed(2));
          this.el.setAttribute("transform", `translate(${this.x.toFixed(1)} ${this.y.toFixed(1)}) rotate(${rot.toFixed(1)})`);
          return true;
        },
      };
      clickable(el, 36, 54, () => openPop(a,
        `<div class="kairyu-pop-h">${esc(isl)}・${esc(vil)}より</div><div>${esc(msg)}</div>`, a.x, a.y));
      actors.add(a); ensureLoop();
    }

    /* ---------------- arrival: specialty ---------------- */
    function arriveSpecialty(p) {
      const name = p.name || "なにか", isl = p.island || "どこかの島", vil = p.village || "どこかの村";
      pushLog(recvLog, { ico: TOY_ICON.island, sum: `特産品「${name}」（${isl}・${vil}）`, t: Date.now() });
      SEA.toast(`本日の特別メニュー: ${name}（${isl}・${vil}産）`);
      SEA.emit("kairyu:arrived", { type: "specialty" });
      for (let i = 0; i < 3; i++) {
        setTimeout(() => { try { dropSpecial(name); } catch (err) { console.error(TAG, err); } }, i * 7000 + Math.random() * 2500);
      }
    }
    function dropSpecial(name) {
      const el = SEA.mk("g");
      el.append(
        SEA.mk("circle", { r: 6, fill: "#ff9ad5", opacity: .3, filter: "url(#kairyu-glow)" }),
        SEA.mk("circle", { r: 2.8, fill: "#ffd27a", stroke: "#ff9ad5", "stroke-width": 1.1, opacity: .95 }),
        SEA.mk("circle", { cx: -.9, cy: -.9, r: .8, fill: "#fff3d6", opacity: .9 })
      );
      SEA.gFx.append(el);
      el.animate([{ opacity: 0 }, { opacity: 1 }], { duration: 300, easing: "ease-out" });
      const a = {
        el, born: performance.now(),
        x0: SEA.W * (.1 + Math.random() * .8), y0: 8 + Math.random() * 18,
        sink: 12 + Math.random() * 5, amp: 3 + Math.random() * 4,
        frq: 1 + Math.random(), ph: Math.random() * 6.28, x: 0, y: 0,
        update(now) {
          const t = (now - this.born) / 1000;
          if (t > 75 || this.y > SEA.H - 8) return false;
          this.x = this.x0 + Math.sin(t * this.frq + this.ph) * this.amp;
          this.y = this.y0 + t * this.sink;
          if (t > .6) {
            for (const c of SEA.creatures) {
              if (!c || !c.genome) continue;
              const dx = c.x - this.x, dy = c.y - this.y;
              if (dx * dx + dy * dy < 576) {                 // ~24px: we do the gulp ourselves
                sparkle(this.x, this.y, "#ffb3c8");
                if (Math.random() < .3) { try { SEA.toast(`${c.genome.name}が「${name}」を味わっています`); } catch (_) {} }
                return false;
              }
            }
          }
          this.el.setAttribute("transform", `translate(${this.x.toFixed(1)} ${this.y.toFixed(1)})`);
          return true;
        },
      };
      actors.add(a); ensureLoop();
    }

    /* ---------------- arrival: page ---------------- */
    function censor(s) {
      const chars = String(s || "").split("");
      if (chars.length < 6) return chars.join("");
      const n = 2 + ((Math.random() * 2) | 0), spans = [];
      let guard = 0;
      while (spans.length < n && guard++ < 40) {
        const len = 1 + ((Math.random() * 3) | 0);
        const st = (Math.random() * (chars.length - len)) | 0;
        if (spans.some(([a, b]) => st < b + 1 && st + len > a - 1)) continue;
        spans.push([st, st + len]);
      }
      spans.sort((a, b) => b[0] - a[0]);
      for (const [a, b] of spans) chars.splice(a, b - a, "…");
      return chars.join("");
    }
    function arrivePage(p) {
      const era = p.era || "", year = (p.year == null ? "？" : p.year);
      const text = censor(p.text || "");
      pushLog(recvLog, { ico: TOY_ICON.chronicle, sum: `${era}${year}年の頁`, t: Date.now() });
      SEA.toast("海流が、濡れた頁を運んできました");
      SEA.emit("kairyu:arrived", { type: "page" });

      const el = SEA.mk("g", { class: "kairyu-page" });
      el.append(SEA.mk("path", { d: "M -13 -17 Q 0 -19.5 13 -17 L 14 16 Q 1 18.5 -12 16.5 Z",
        fill: "#e3d6bd", stroke: "#b9a87e", "stroke-width": .9, opacity: .93 }));
      for (let i = 0; i < 4; i++) {
        el.append(SEA.mk("line", { x1: -9, y1: -10 + i * 7, x2: 9.5, y2: -10 + i * 7,
          stroke: "#8a7a58", "stroke-width": 1, opacity: .55 }));
      }
      SEA.gFx.append(el);
      const a = {
        el, born: performance.now(),
        x0: SEA.W * (.16 + Math.random() * .68), ph: Math.random() * 6.28,
        FALL: 26, REST: 90, FADE: 1.6, x: 0, y: 0,
        update(now) {
          const t = (now - this.born) / 1000;
          const floorY = SEA.H - 13;
          if (t >= this.FALL + this.REST + this.FADE) return false;
          const p1 = Math.min(1, t / this.FALL);
          this.y = -30 + (floorY + 30) * p1;
          const sway = 1 - p1 * .7;
          this.x = this.x0 + Math.sin(t * .75 + this.ph) * 44 * sway;
          const rot = p1 < 1 ? Math.sin(t * .75 + this.ph + 1.2) * 26 * sway : Math.sin(this.ph) * 8;
          if (t > this.FALL + this.REST) this.el.setAttribute("opacity", Math.max(0, 1 - (t - this.FALL - this.REST) / this.FADE).toFixed(2));
          this.el.setAttribute("transform", `translate(${this.x.toFixed(1)} ${this.y.toFixed(1)}) rotate(${rot.toFixed(1)})`);
          return true;
        },
      };
      clickable(el, 40, 48, () => openPop(a,
        `<div class="kairyu-pop-h">${esc(era)}${esc(year)}年の記録</div><div>${esc(text)}</div>` +
        `<div class="kairyu-pop-aside">――水に濡れて、ところどころ読めない</div>`, a.x, a.y));
      actors.add(a); ensureLoop();
    }

    /* ---------------- receive ---------------- */
    const seen = new Set();
    function process(env) {
      if (!env || typeof env !== "object" || !env.id) return;
      if (seen.has(env.id)) return;
      seen.add(env.id);
      if (env.to !== SELF) return;
      removeFromOwnInbox(env.id);          // it may have been queued before broadcast
      const p = (env.payload && typeof env.payload === "object") ? env.payload : {};
      try {
        if (env.type === "bottle") arriveBottle(p);
        else if (env.type === "specialty") arriveSpecialty(p);
        else if (env.type === "page") arrivePage(p);
      } catch (err) { console.error(TAG, "handle", err); }
    }
    // drain own inbox on load, gently staggered
    try {
      const queued = lsArr(INBOX[SELF]).filter(e => e && e.to === SELF);
      queued.forEach((env, i) => setTimeout(() => {
        try { process(env); } catch (err) { console.error(TAG, err); }
      }, 2600 + i * 1700));
    } catch (err) { console.error(TAG, "drain", err); }

    /* ---------------- send ---------------- */
    function sendCreature() {
      const list = SEA.creatures;
      if (!list || !list.length) return null;
      const c = SEA.pick(list);
      if (!c || !c.genome) return null;
      const g = c.genome;
      const to = SEA.pick(["island", "chronicle"]);
      const env = { id: mkId(), from: SELF, to, type: "creature",
        payload: { name: g.name, lenM: g.lenM, eco: g.eco, arch: g.arch },
        sentAt: new Date().toISOString() };
      deliver(env);
      pushLog(sentLog, { ico: TOY_ICON[to], sum: `目撃報告「${g.name}」 → ${TOY_LABEL[to]}へ`, t: Date.now() });
      return env;
    }
    // auto-send: staggered start 60-120s, then every 3-6 min
    function schedule(ms) {
      setTimeout(() => {
        try { sendCreature(); } catch (err) { console.error(TAG, "auto", err); }
        schedule(180000 + Math.random() * 180000);
      }, ms);
    }
    schedule(60000 + Math.random() * 60000);

    /* ---------------- log modal ---------------- */
    const ovl = document.createElement("div");
    ovl.className = "kairyu-ovl";
    ovl.innerHTML =
      `<div class="kairyu-modal" role="dialog" aria-modal="true" aria-label="海流便">` +
        `<div class="kairyu-head">🌊 海流便<small>OCEAN CURRENT POST</small><span class="kairyu-x">✕</span></div>` +
        `<div class="kairyu-body">` +
          `<div class="kairyu-sec">受信箱</div><div class="kairyu-recv"></div>` +
          `<div class="kairyu-sec">送信記録</div><div class="kairyu-sent"></div>` +
        `</div>` +
        `<div class="kairyu-foot">` +
          `<span class="kairyu-note">便りは、ときどき勝手に流れていきます</span>` +
          `<button class="kairyu-flow">いま流す</button>` +
        `</div>` +
      `</div>`;
    document.body.append(ovl);
    const recvEl = ovl.querySelector(".kairyu-recv"), sentEl = ovl.querySelector(".kairyu-sent");

    function listHTML(list, emptyMsg) {
      if (!list.length) return `<div class="kairyu-empty">${esc(emptyMsg)}</div>`;
      return list.slice().reverse().map(e =>
        `<div class="kairyu-item"><span class="kairyu-ico">${e.ico}</span>` +
        `<span class="kairyu-sum">${esc(e.sum)}</span><span class="kairyu-tm">${esc(hhmm(e.t))}</span></div>`).join("");
    }
    function renderLog() {
      try {
        if (!ovl.classList.contains("kairyu-show")) return;
        recvEl.innerHTML = listHTML(recvLog, "まだ何も流れ着いていません。海流は気まぐれです。");
        sentEl.innerHTML = listHTML(sentLog, "まだ何も流していません。");
      } catch (err) { console.error(TAG, "render", err); }
    }
    function openModal() { ovl.classList.add("kairyu-show"); renderLog(); }
    function closeModal() { ovl.classList.remove("kairyu-show"); }

    ovl.querySelector(".kairyu-x").addEventListener("click", closeModal);
    ovl.addEventListener("click", e => { if (e.target === ovl) closeModal(); });
    ovl.querySelector(".kairyu-flow").addEventListener("click", () => {
      try {
        const env = sendCreature();
        if (!env) { SEA.toast("水槽が空です。流せる便りがありません"); return; }
        SEA.toast(`「${env.payload.name}」の目撃報告を、海流に流しました`);
      } catch (err) { console.error(TAG, "flow", err); }
    });
    document.addEventListener("keydown", e => {
      try {
        if (e.key !== "Escape") return;
        if (popFor) closePop();
        else if (ovl.classList.contains("kairyu-show")) closeModal();
      } catch (_) {}
    });

    const btn = SEA.addButton("🌊 海流便", () => {
      try { ovl.classList.contains("kairyu-show") ? closeModal() : openModal(); }
      catch (err) { console.error(TAG, "button", err); }
    });
    try { btn.title = "海のむこうの遊び場と、便りをやりとりします"; } catch (_) {}
  } catch (err) {
    console.error("[kairyu] 初期化に失敗:", err);
  }
})();
</script>

<script>
// ════ plugin: hyoui (wave3) ════ Paste verbatim into its own <script> tag after the wave-2 plugin blocks in deep-sea-aquarium/index.html. Plugin key "
(()=>{ "use strict";
// ════ plugin: hyoui (wave3) ════ 🕹 憑依 — possess a resident, swim it with the arrow keys.
if(!window.SEA) return;
const SEA = window.SEA;
const TAG = "[憑依]";
try{

  const esc = s => String(s == null ? "" : s).replace(/[&<>"']/g,
    m => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));

  // ---------------- tuning ----------------
  const BOOST      = 2.2;    // max speed factor while a horizontal key is held
  const RISE       = 90;     // vertical steering offset (px)
  const JELLY_SPD  = 80;     // px/s direct nudge for jellies (their model ignores dir/speed)
  const WALL       = 72;     // keep inside the core's 70px bounce margin (no flip jitter)
  const SCAT_R     = 110, SCAT_R2 = SCAT_R * SCAT_R;
  const SCAT_MS    = 2000;
  const SCAT_BOOST = 1.4;

  // ---------------- css ----------------
  const style = document.createElement("style");
  style.textContent = `
    .hyoui-hint{position:fixed;left:50%;bottom:70px;transform:translateX(-50%) translateY(14px);
      background:var(--panel,rgba(6,18,30,.78));border:1px solid var(--panel-edge,rgba(95,232,210,.16));
      border-radius:999px;padding:8px 18px;font-size:12.5px;letter-spacing:.06em;color:var(--ink,#dcebf5);
      backdrop-filter:blur(10px);z-index:6;opacity:0;pointer-events:none;transition:.25s;white-space:nowrap}
    .hyoui-hint.hyoui-show{opacity:1;transform:translateX(-50%) translateY(0)}
    .hyoui-hint .hyoui-nm{color:var(--acc,#5fe8d2);font-weight:600;margin-right:10px}
    .hyoui-hint .hyoui-k{color:var(--warm,#ffd27a)}
    .hyoui-act{margin-top:11px;padding-top:10px;border-top:1px dashed rgba(95,232,210,.22)}
    .hyoui-btn{cursor:pointer;font-family:inherit;font-size:12px;color:var(--ink,#dcebf5);
      background:rgba(95,232,210,.08);border:1px solid rgba(95,232,210,.3);border-radius:999px;
      padding:5px 13px;letter-spacing:.04em;transition:.18s;white-space:nowrap}
    .hyoui-btn:hover{border-color:rgba(95,232,210,.6);background:rgba(95,232,210,.14)}
    .hyoui-tag{font-size:10px;color:var(--dim,#7fa3b8);letter-spacing:.06em;margin-left:9px}`;
  document.head.append(style);

  // ---------------- hint bar ----------------
  const hint = document.createElement("div");
  hint.className = "hyoui-hint";
  document.body.append(hint);
  function showHint(name){
    hint.innerHTML =
      `<span class="hyoui-nm">🕹 ${esc(name)}</span>` +
      `<span class="hyoui-k">← → ↑ ↓</span> で泳ぐ ／ <span class="hyoui-k">Esc</span> で離れる`;
    hint.classList.add("hyoui-show");
  }
  function hideHint(){ hint.classList.remove("hyoui-show"); }

  // ---------------- state ----------------
  let P = null;                 // {c, base, fac, ring, lastH, lastV}
  const held = new Set();       // currently-down arrow keys
  const scat = new Map();       // creature id -> {c, base, until}
  let loopOn = false, lastT = 0;

  // ---------------- pulsing ring (gFx, follows per frame) ----------------
  function makeRing(c){
    const g = SEA.mk("g", {class:"hyoui-ring"});
    const r = Math.max(26, ((c.genome && c.genome.size) || 40) * 0.85);
    const halo = SEA.mk("circle", {cx:0, cy:0, r:(r*0.7).toFixed(1),
      fill:"var(--acc,#5fe8d2)", opacity:".07"});
    const ring = SEA.mk("circle", {cx:0, cy:0, r:r.toFixed(1), fill:"none",
      stroke:"var(--acc,#5fe8d2)", "stroke-width":"1.6", opacity:".8"});
    ring.style.transformOrigin = "0px 0px";
    try{
      ring.animate([
        {transform:"scale(1)",    opacity:.8},
        {transform:"scale(1.22)", opacity:.22},
        {transform:"scale(1)",    opacity:.8}],
        {duration:1700, iterations:Infinity, easing:"ease-in-out"});
      halo.animate([{opacity:.1},{opacity:.03},{opacity:.1}],
        {duration:1700, iterations:Infinity, easing:"ease-in-out"});
      g.animate([{opacity:0},{opacity:1}], {duration:350, easing:"ease-out"});
    }catch(_){}
    g.append(halo, ring);
    SEA.gFx.append(g);
    return g;
  }
  function dropRing(g){
    try{
      const a = g.animate([{opacity:1},{opacity:0}], {duration:320, easing:"ease-out"});
      a.onfinish = () => g.remove();
      setTimeout(() => { try{ g.remove(); }catch(_){} }, 600);
    }catch(_){ try{ g.remove(); }catch(_){} }
  }

  // ---------------- possession ----------------
  function alive(c){ return !!c && SEA.creatures.indexOf(c) >= 0; }

  function possess(c){
    if(!alive(c)){ SEA.toast("その住人は、もう水槽にいません"); return; }
    if(P){
      if(P.c === c) return;
      release("switch");
    }
    P = { c, base: c.speed, fac: 1, ring: makeRing(c), lastH: 0, lastV: 0 };
    held.clear();
    showHint(c.genome && c.genome.name || "名前のない何か");
    try{ SEA.closeInfo(); }catch(_){}
    SEA.toast(`${(c.genome && c.genome.name) || "それ"}に乗り移りました。違和感は、たぶん向こうも感じています`);
    startLoop();
  }

  function release(reason){
    if(!P) return;
    const p = P; P = null;
    held.clear();
    hideHint();
    dropRing(p.ring);
    try{
      if(alive(p.c) && typeof p.base === "number" && isFinite(p.base)) p.c.speed = p.base;
    }catch(err){ console.error(TAG, err); }
    // unscatter everyone right away
    for(const [, s] of scat){
      try{ if(alive(s.c)) s.c.speed = s.base; }catch(_){}
    }
    scat.clear();
    const nm = (p.c && p.c.genome && p.c.genome.name) || "それ";
    if(reason === "esc")       SEA.toast(`${nm}は、何事もなかったように泳ぎ直しました`);
    else if(reason === "gone") SEA.toast(`${nm}がいなくなり、憑依は解けました`);
    // "cleared"/"switch": stay quiet (core / the next possession will speak)
  }

  // ---------------- key state ----------------
  const ARROWS = ["ArrowLeft","ArrowRight","ArrowUp","ArrowDown"];
  document.addEventListener("keydown", e => {
    try{
      if(!P) return;
      if(e.key === "Escape"){ release("esc"); return; }
      if(ARROWS.indexOf(e.key) < 0) return;
      e.preventDefault();                       // no page scroll while possessing
      held.add(e.key);
      if(e.key === "ArrowLeft")  P.lastH = -1;
      if(e.key === "ArrowRight") P.lastH = 1;
      if(e.key === "ArrowUp")    P.lastV = -1;
      if(e.key === "ArrowDown")  P.lastV = 1;
    }catch(err){ console.error(TAG, err); }
  });
  document.addEventListener("keyup", e => {
    try{ if(ARROWS.indexOf(e.key) >= 0) held.delete(e.key); }catch(_){}
  });
  window.addEventListener("blur", () => held.clear());

  function heldH(){
    const L = held.has("ArrowLeft"), R = held.has("ArrowRight");
    if(L && R) return P.lastH; if(L) return -1; if(R) return 1; return 0;
  }
  function heldV(){
    const U = held.has("ArrowUp"), D = held.has("ArrowDown");
    if(U && D) return P.lastV; if(U) return -1; if(D) return 1; return 0;
  }

  // ---------------- per-frame steering (after the core frame: our values win) ----------------
  function step(now){
    if(!P){ loopOn = false; return; }
    const dt = Math.min(.05, (now - lastT) / 1000 || 0);
    lastT = now;
    try{
      const c = P.c;
      if(!alive(c)){ release("gone"); return; }
      const W = SEA.W, H = SEA.H;
      const h = heldH(), v = heldV();
      const jelly = c.genome && c.genome.arch === "jelly";

      if(jelly){
        // jellies ignore dir/speed/targetY — nudge x / baseY gently instead
        if(h) c.x = Math.max(40, Math.min(W - 40, c.x + h * JELLY_SPD * dt));
        if(v) c.baseY += v * JELLY_SPD * dt;     // core clamps baseY to 10%..90%
      }else{
        // horizontal: dir + eased boost up to 2.2x base while held
        const want = h ? BOOST : 1;
        P.fac += (want - P.fac) * Math.min(1, dt * 5);
        if(Math.abs(P.fac - 1) < .01) P.fac = 1;
        c.speed = P.base * P.fac;
        if(h){
          c.dir = h;
          // hold just inside the core's bounce margin so it never flip-flops at the glass
          if(h > 0 && c.x > W - WALL) c.x = W - WALL;
          if(h < 0 && c.x < WALL)     c.x = WALL;
        }
        // vertical: retarget continuously while held
        if(v) c.targetY = Math.max(H * .1, Math.min(H * .9, c.y + v * RISE));
      }

      // ring follows the body
      P.ring.setAttribute("transform", `translate(${c.x.toFixed(1)} ${c.y.toFixed(1)})`);

      // ---- nearby residents scatter ----
      const tNow = performance.now();
      for(const o of SEA.creatures){
        if(!o || o === c || !o.genome || o.genome.arch === "jelly") continue;
        if(scat.has(o.id)) continue;
        const dx = o.x - c.x, dy = o.y - c.y;
        if(dx*dx + dy*dy < SCAT_R2){
          const away = (o.y >= c.y) ? 1 : -1;
          o.targetY = Math.max(H * .1, Math.min(H * .9, o.y + away * 140));
          const base = o.speed;
          o.speed = base * SCAT_BOOST;
          scat.set(o.id, {c: o, base, until: tNow + SCAT_MS});
        }
      }
      for(const [id, s] of scat){
        if(tNow >= s.until){
          try{ if(alive(s.c)) s.c.speed = s.base; }catch(_){}
          scat.delete(id);
        }
      }
    }catch(err){ console.error(TAG, err); }
    requestAnimationFrame(step);
  }
  function startLoop(){
    if(loopOn) return;
    loopOn = true;
    lastT = performance.now();
    requestAnimationFrame(step);
  }

  // ---------------- dossier action ----------------
  SEA.on("dossier-opened", arg => {
    try{
      const c = arg && arg.creature, el = arg && arg.el;
      if(!c || !el) return;
      const stale = el.querySelector(".hyoui-act");
      if(stale) stale.remove();
      const row = document.createElement("div");
      row.className = "hyoui-act";
      const mine = P && P.c === c;
      row.innerHTML =
        `<button type="button" class="hyoui-btn">${mine ? "🕹 離れる" : "🕹 憑依する"}</button>` +
        `<span class="hyoui-tag">${mine ? "現在この個体に乗っています" : "矢印キーで、しばらく代わりに泳げます"}</span>`;
      row.querySelector(".hyoui-btn").addEventListener("click", () => {
        try{
          if(P && P.c === c){ SEA.closeInfo(); release("esc"); }
          else possess(c);
        }catch(err){ console.error(TAG, err); }
      });
      el.append(row);
    }catch(err){ console.error(TAG, err); }
  });

  // ---------------- housekeeping ----------------
  SEA.on("creature-removed", c => {
    try{
      if(c && c.id != null) scat.delete(c.id);     // gone — nothing to restore
      if(P && P.c === c) release("gone");
    }catch(err){ console.error(TAG, err); }
  });
  SEA.on("cleared", () => {
    try{ release("cleared"); scat.clear(); }catch(err){ console.error(TAG, err); }
  });

}catch(err){
  console.error("[憑依] 初期化に失敗:", err);
}
})();
</script>

<script>
// ════ plugin: tanjobi-kai (wave3) ════ tanjobi-kai (🎂誕生日会), wave-3 ambient plugin — paste verbatim into its own <script> tag after the existing 16 plugin blocks in deep-sea-aquarium/index.html. No do
(()=>{ "use strict";
if(!window.SEA) return;
if(window.__TANJOBI_KAI__) return;
window.__TANJOBI_KAI__ = true;
const SEA = window.SEA;
const TAG = "[誕生日会]";
try{
  /* ============================================================
     🎂 誕生日会 — 住人にはみな誕生日があり、水槽はそれを祝う。
     周期(6〜10分)と初回オフセットは genome.name のハッシュから
     決定論的に決まり、入居時刻（放流時。開場時にいた者は開場時）
     から数える。会はおよそ25秒、一度にひとつ。重なれば順番待ち。
     ボタンなし。純粋な環境の喜び。
     ============================================================ */

  // ---------- tuning ----------
  const PARTY_MS   = 25000;          // length of one party
  const PERIOD_MIN = 360000;         // birthdays recur every 6...
  const PERIOD_RNG = 240001;         // ...to 10 minutes
  const FIRST_MIN  = 60000;          // nobody parties in their first minute
  const SENSE      = 260;            // birthday resident smells cake from here
  const EAT_R      = 24;             // anyone this close eats it
  const QUEUE_CAP  = 3;
  const COLORS     = ["#5fe8d2","#ffd27a","#ff9fb2","#9fb6ff","#c8f07a","#f2a35f"];

  const clamp = (v,lo,hi)=>Math.max(lo,Math.min(hi,v));

  // ---------- css ----------
  const style = document.createElement("style");
  style.textContent = ".tanjobi-fx,.tanjobi-fx *{pointer-events:none}";
  document.head.append(style);

  // ---------- own glow filter (no coupling to core ids) ----------
  try{
    const f = SEA.mk("filter",{id:"tanjobi-glow",x:"-150%",y:"-150%",width:"400%",height:"400%"});
    f.append(SEA.mk("feGaussianBlur",{stdDeviation:"2.4"}));
    SEA.defs.append(f);
  }catch(err){ console.error(TAG,"defs",err); }

  // ---------- deterministic birthday clocks ----------
  function hash(s){
    let h = 2166136261;
    for(let i=0;i<s.length;i++){ h ^= s.charCodeAt(i); h = Math.imul(h, 16777619); }
    return h >>> 0;
  }
  const clocks = new Map();          // creature id -> {period, next}
  function ensureClock(c, now){
    try{
      if(!c || c.id == null || clocks.has(c.id)) return;
      const h = hash(String((c.genome && c.genome.name) || ("名無し" + c.id)));
      const period = PERIOD_MIN + (h % PERIOD_RNG);
      const h2 = Math.imul(h, 2654435761) >>> 0;
      const offset = FIRST_MIN + (h2 % (period - FIRST_MIN));
      clocks.set(c.id, { period, next: now + offset });
    }catch(err){ console.error(TAG,"clock",err); }
  }

  // ---------- builders ----------
  function makeHat(){
    const g = SEA.mk("g",{class:"tanjobi-fx"});
    g.append(
      SEA.mk("polygon",{points:"-7,0 7,0 0,-16", fill:"#ffd27a", stroke:"#a97d2e","stroke-width":".8"}),
      SEA.mk("path",{d:"M -4.4 -5.8 L 4.4 -5.8", stroke:"#ff9fb2","stroke-width":"2.2",opacity:".9"}),
      SEA.mk("path",{d:"M -2.1 -11 L 2.1 -11", stroke:"#5fe8d2","stroke-width":"2",opacity:".9"}),
      SEA.mk("circle",{cy:-17.2, r:2.4, fill:"#5fe8d2", filter:"url(#tanjobi-glow)", opacity:".95"})
    );
    SEA.gFx.append(g);
    g.animate([{opacity:0},{opacity:1}],{duration:500,easing:"ease-out"});
    return g;
  }

  function makeCake(ax){
    const W = SEA.W, H = SEA.H;
    const x0 = clamp(ax + (Math.random()*160 - 80), 60, Math.max(60, W - 60));
    const el = SEA.mk("g",{class:"tanjobi-fx"});
    el.append(
      SEA.mk("circle",{cy:-10, r:17, fill:"#ffd27a", opacity:".16", filter:"url(#tanjobi-glow)"}),
      SEA.mk("circle",{cy:0,   r:12,  fill:"#a9742f", stroke:"#6e4a1c","stroke-width":"1"}),
      SEA.mk("circle",{cy:-7,  r:9.2, fill:"#d9a64a", stroke:"#8a5f24","stroke-width":".9"}),
      SEA.mk("circle",{cy:-13, r:6.6, fill:"#ffd27a", stroke:"#c79545","stroke-width":".8"}),
      SEA.mk("circle",{cx:-3.2, cy:-16.2, r:.9, fill:"#ff9fb2", opacity:".9"}),
      SEA.mk("circle",{cx:2.8,  cy:-16.6, r:.9, fill:"#5fe8d2", opacity:".9"}),
      SEA.mk("rect",{x:-1.1, y:-26.5, width:2.2, height:7.4, rx:.6, fill:"#fff3d6"})
    );
    const flame = SEA.mk("circle",{cy:-28.4, r:2.4, fill:"#ffe7b3", filter:"url(#tanjobi-glow)"});
    flame.animate([{opacity:.95},{opacity:.4},{opacity:.95}],
      {duration:900+Math.random()*500, iterations:Infinity, easing:"ease-in-out"});
    el.append(flame);
    SEA.gFx.append(el);
    el.animate([{opacity:0},{opacity:1}],{duration:400,easing:"ease-out"});
    return { el, x0, x:x0, y0:-30, y:-30, born:performance.now(),
             ph:Math.random()*Math.PI*2, sink:15+Math.random()*6, rest:H*.82 };
  }

  function spawnConfetto(p, initial){
    try{
      const el = SEA.mk("rect",{width:5.2, height:3.4, rx:.9, class:"tanjobi-fx",
        fill:COLORS[(Math.random()*COLORS.length)|0], opacity:".92"});
      SEA.gFx.append(el);
      p.confetti.push({
        el,
        ox:(Math.random()-.5)*180,
        x: p.anchorX + (Math.random()-.5)*180,
        y: p.anchorY - (initial ? 40+Math.random()*150 : 110+Math.random()*50),
        vy: 20+Math.random()*16,
        swayA: 6+Math.random()*10, swayW: 1.4+Math.random()*2, ph: Math.random()*Math.PI*2,
        rot: Math.random()*360, rotV: (Math.random()-.5)*260,
      });
    }catch(err){ console.error(TAG,"confetto",err); }
  }

  function burst(x, y){
    try{
      for(let i=0;i<12;i++){
        const b = SEA.mk("circle",{cx:(x+(Math.random()-.5)*26).toFixed(1),
          cy:(y+(Math.random()-.5)*18).toFixed(1), r:(1+Math.random()*2.4).toFixed(2),
          fill:"none", stroke:"#ffe7b3","stroke-width":".8", opacity:".8", class:"tanjobi-fx"});
        SEA.gFx.append(b);
        b.animate([
          {transform:"translate(0,0)", opacity:.8},
          {transform:`translate(${((Math.random()-.5)*40).toFixed(1)}px, ${(-40-Math.random()*70).toFixed(1)}px)`, opacity:0}
        ],{duration:900+Math.random()*800, easing:"ease-out"}).onfinish = () => b.remove();
      }
      const ring = SEA.mk("circle",{cx:x.toFixed(1), cy:y.toFixed(1), r:12, fill:"none",
        stroke:"#ffd27a","stroke-width":"1.4", opacity:".8", class:"tanjobi-fx"});
      ring.style.transformBox = "fill-box";
      ring.style.transformOrigin = "center";
      SEA.gFx.append(ring);
      ring.animate([{transform:"scale(.3)",opacity:.8},{transform:"scale(2.4)",opacity:0}],
        {duration:600, easing:"ease-out"}).onfinish = () => ring.remove();
    }catch(err){ console.error(TAG,"burst",err); }
  }

  // ---------- party state ----------
  let cur = null;                    // {bdayId, t0, anchorX, anchorY, topOff, hat, cake, confetti[], maxConf}
  const queue = [];                  // creature ids waiting their turn

  function dropHat(p){
    const h = p.hat;
    if(!h) return;
    p.hat = null;
    try{
      h.animate([{opacity:1},{opacity:0}],{duration:700,easing:"ease-out"}).onfinish = () => h.remove();
    }catch(_){ h.remove(); }
  }

  function eatCake(p, eater){
    const k = p.cake;
    if(!k) return;
    p.cake = null;
    try{
      burst(k.x, k.y);
      k.el.remove();
      if(eater && eater.id !== p.bdayId && eater.genome && eater.genome.name){
        SEA.toast(`ケーキは${eater.genome.name}に食べられました。こういう日もあります`);
      }
    }catch(err){ console.error(TAG,"eat",err); }
  }

  function startParty(c){
    if(cur || !c) return;
    let hat = null, cake = null;
    try{
      const nm = (c.genome && c.genome.name) || "誰か";
      hat = makeHat();
      cake = makeCake(c.x);
      cur = {
        bdayId: c.id, t0: performance.now(),
        anchorX: c.x, anchorY: c.y,
        topOff: ((c.genome && c.genome.size) || 40) * .55,
        hat, cake,
        confetti: [], maxConf: 18 + ((Math.random()*9)|0),   // 18〜26枚
      };
      for(let i=0;i<12;i++) spawnConfetto(cur, true);
      SEA.toast(`本日は${nm}の誕生日です。拍手は水中なのでくぐもります`);
      SEA.emit("bday:party", {creature: c});
      wake();
    }catch(err){
      console.error(TAG,"start",err);
      cur = null;
      try{ if(hat) hat.remove(); }catch(_){}
      try{ if(cake) cake.el.remove(); }catch(_){}
    }
  }

  function endParty(){
    const p = cur;
    if(!p) return;
    cur = null;
    try{
      dropHat(p);
      for(const f of p.confetti){
        try{
          f.el.animate([{opacity:.92},{opacity:0}],{duration:900,easing:"ease-out"})
            .onfinish = () => f.el.remove();
        }catch(_){ f.el.remove(); }
      }
      p.confetti.length = 0;
      if(p.cake){
        const k = p.cake;
        p.cake = null;
        try{
          k.el.animate([{opacity:1},{opacity:0}],{duration:1200,easing:"ease-out"})
            .onfinish = () => k.el.remove();
        }catch(_){ k.el.remove(); }
      }
    }catch(err){ console.error(TAG,"end",err); }
  }

  function hardStop(){               // 想定外のときは黙って片付ける
    const p = cur;
    cur = null;
    if(!p) return;
    try{
      if(p.hat) p.hat.remove();
      if(p.cake) p.cake.el.remove();
      for(const f of p.confetti) f.el.remove();
      p.confetti.length = 0;
    }catch(_){ /* 静かに散会 */ }
  }

  // ---------- per-frame (elapsed wall time; rAF self-terminates) ----------
  let rafOn = false, lastT = 0;
  function wake(){
    if(rafOn) return;
    rafOn = true; lastT = 0;
    requestAnimationFrame(loop);
  }
  function loop(now){
    try{ tick(now); }
    catch(err){ console.error(TAG,"tick",err); hardStop(); }
    if(cur) requestAnimationFrame(loop);
    else rafOn = false;
  }

  function tick(now){
    const p = cur;
    if(!p) return;
    const dt = Math.min(.1, lastT ? (now - lastT)/1000 : 0);
    lastT = now;
    const t = now - p.t0;
    const H = SEA.H;

    // guest of honour (may slip away mid-party — the cake stays)
    let c = null;
    if(p.bdayId != null){
      c = SEA.creatures.find(x => x.id === p.bdayId) || null;
      if(!c){ p.bdayId = null; dropHat(p); }
    }
    if(c){ p.anchorX = c.x; p.anchorY = c.y; }

    // party hat bobbing just above the head, tracking each frame
    if(p.hat && c){
      const hy = p.anchorY - p.topOff - 13 + Math.sin(t*.0023)*3;
      const hr = Math.sin(t*.0016)*9;
      p.hat.setAttribute("transform",
        `translate(${p.anchorX.toFixed(1)} ${hy.toFixed(1)}) rotate(${hr.toFixed(1)})`);
    }

    // confetti fluttering down around the resident, following its x loosely
    const floor = p.anchorY + 150;
    for(let i=p.confetti.length-1;i>=0;i--){
      const f = p.confetti[i];
      f.x += (p.anchorX + f.ox - f.x) * Math.min(1, dt*.7);
      f.y += f.vy * dt;
      f.rot += f.rotV * dt;
      if(f.y > floor || f.y > H + 20){
        f.el.remove();
        p.confetti.splice(i,1);
        continue;
      }
      const sx = f.x + Math.sin(f.ph + t*.001*f.swayW) * f.swayA;
      const tum = .35 + .65*Math.abs(Math.sin(f.ph*2 + t*.0026));
      f.el.setAttribute("transform",
        `translate(${sx.toFixed(1)} ${f.y.toFixed(1)}) rotate(${f.rot.toFixed(0)}) scale(1 ${tum.toFixed(2)})`);
    }
    if(p.confetti.length < p.maxConf && t < PARTY_MS - 5000 && Math.random() < dt*6){
      spawnConfetto(p, false);
    }

    // the cake: drops from the surface, sinks slowly, hovers above the floor
    if(p.cake){
      const k = p.cake;
      const age = (now - k.born)/1000;
      k.x = k.x0 + Math.sin(age*.7 + k.ph)*7;
      const yRaw = k.y0 + age*k.sink;
      k.y = yRaw < k.rest ? yRaw : k.rest + Math.sin(age*1.3)*2.5;
      k.el.setAttribute("transform", `translate(${k.x.toFixed(1)} ${k.y.toFixed(1)})`);

      // birthday resident steers toward it (documented fields only; jellies drift on)
      if(c && c.genome && c.genome.arch !== "jelly"){
        const dx = k.x - c.x, dy = k.y - c.y;
        if(dx*dx + dy*dy < SENSE*SENSE){
          if(Math.abs(dx) > 6) c.dir = dx > 0 ? 1 : -1;
          c.targetY = clamp(k.y, H*.12, H*.88);
        }
      }
      // any resident close enough eats it — birthday or thief
      if(k.y > 0){
        for(const r of SEA.creatures){
          if(!r) continue;
          const ddx = r.x - k.x, ddy = r.y - k.y;
          if(ddx*ddx + ddy*ddy < EAT_R*EAT_R){ eatCake(p, r); break; }
        }
      }
    }

    if(t >= PARTY_MS) endParty();
  }

  // ---------- scheduler (wall-time poll; throttle-safe) ----------
  setInterval(() => {
    try{
      const now = performance.now();
      for(const c of SEA.creatures) ensureClock(c, now);   // stragglers get clocks too
      if(!SEA.creatures.length) return;                    // no residents, no parties
      for(const [id, k] of clocks){
        if(now < k.next) continue;
        if(document.hidden){ k.next = now + 30000; continue; }   // 観客のいない会はもったいない
        while(k.next <= now) k.next += k.period;           // deterministic recurrence
        if(!SEA.creatures.some(c => c.id === id)){ clocks.delete(id); continue; }
        if((cur && cur.bdayId === id) || queue.includes(id)) continue;
        if(cur){
          if(queue.length < QUEUE_CAP) queue.push(id);
        }else{
          const c = SEA.creatures.find(x => x.id === id);
          if(c) startParty(c);
        }
      }
      if(!cur && queue.length && !document.hidden){
        while(queue.length){
          const id = queue.shift();
          const c = SEA.creatures.find(x => x.id === id);
          if(c){ startParty(c); break; }
        }
      }
    }catch(err){ console.error(TAG,"schedule",err); }
  }, 2000);

  // ---------- wiring ----------
  SEA.on("creature-added", c => {
    try{ ensureClock(c, performance.now()); }
    catch(err){ console.error(TAG,err); }
  });
  SEA.on("creature-removed", c => {
    try{
      if(!c) return;
      clocks.delete(c.id);
      const qi = queue.indexOf(c.id);
      if(qi >= 0) queue.splice(qi, 1);
      if(cur && cur.bdayId === c.id){
        cur.bdayId = null;            // 主役不在でも会は最後まで。ケーキは早いもの勝ち
        dropHat(cur);
      }
    }catch(err){ console.error(TAG,err); }
  });
  SEA.on("cleared", () => {
    try{
      queue.length = 0;
      clocks.clear();
      hardStop();
    }catch(err){ console.error(TAG,err); }
  });

  // residents already present at load: their clocks start now
  const tLoad = performance.now();
  for(const c of [...SEA.creatures]) ensureClock(c, tLoad);
}catch(err){
  console.error(TAG, "初期化に失敗:", err);
}
})();
</script>

    ".shinkai-bgm-on{border-color:rgba(176,156,255,.55)!important;" +
      "animation:shinkai-bgm-sway 7s ease-in-out infinite;}" +
    "@keyframes shinkai-bgm-sway{" +
      "0%,100%{box-shadow:0 0 6px rgba(176,156,255,.10)}" +
      "50%{box-shadow:0 0 15px rgba(176,156,255,.34)}}";
  document.head.appendChild(st);
}catch(err){ console.error("[深海BGM] style", err); }

/* ================= audio graph ================= */
function buildGraph(){
  master = ctx.createGain();
  master.gain.value = 0.0001;
  lpOut = ctx.createBiquadFilter();
  lpOut.type = "lowpass"; lpOut.frequency.value = 9000; lpOut.Q.value = 0.4;
  master.connect(lpOut); lpOut.connect(ctx.destination);

  padBus = ctx.createGain(); padBus.gain.value = 0.9;  padBus.connect(master);
  dryBus = ctx.createGain(); dryBus.gain.value = 0.85; dryBus.connect(master);

  // 長いディレイ — 暗い水の中の、光の残響
  dlySend = ctx.createGain(); dlySend.gain.value = 1;
  const dly = ctx.createDelay(2);
  dly.delayTime.value = 0.61;
  const dlp = ctx.createBiquadFilter();
  dlp.type = "lowpass"; dlp.frequency.value = 2200;
  const fb  = ctx.createGain(); fb.gain.value = 0.45;
  const wet = ctx.createGain(); wet.gain.value = 0.4;
  dlySend.connect(dly); dly.connect(dlp); dlp.connect(fb); fb.connect(dly);
  dlp.connect(wet); wet.connect(master);
}

/* ---- パッド: 3本のデチューン三角波 × コード構成音 -> lowpass ~700 -> ゆっくり swell ---- */
function schedulePad(t){
  const set = darkDepth ? DARK : NORMAL;
  chordIdx ^= 1;
  const ch = set[chordIdx];
  curPool = ch.pool;

  const end = t + CHORD_DUR + FADE;
  const cg = ctx.createGain();
  cg.gain.setValueAtTime(0.0001, t);
  cg.gain.linearRampToValueAtTime(0.5, t + FADE);          // ゆっくり浮かび上がる
  cg.gain.setValueAtTime(0.5, t + CHORD_DUR);
  cg.gain.exponentialRampToValueAtTime(0.0001, end);       // ゆっくり沈む
  const lp = ctx.createBiquadFilter();
  lp.type = "lowpass"; lp.frequency.value = rand(620, 760); lp.Q.value = 0.7;
  lp.connect(cg); cg.connect(padBus);

  // 超低速LFO — 水のうねり
  const lfo = ctx.createOscillator();
  lfo.frequency.value = rand(0.03, 0.06);
  lfo.phase; // (no-op, clarity)
  const lfoG = ctx.createGain(); lfoG.gain.value = 0.08;
  lfo.connect(lfoG); lfoG.connect(cg.gain);
  lfo.start(t); lfo.stop(end + 0.3); reg(lfo);

  for(const m of ch.pad){
    const ng = ctx.createGain(); ng.gain.value = 0.08;
    ng.connect(lp);
    for(const det of [-6, 0, 6]){
      const o = ctx.createOscillator();
      o.type = "triangle";
      o.frequency.value = FREQ(m);
      o.detune.value = det + rand(-1.5, 1.5);
      o.connect(ng);
      o.start(t); o.stop(end + 0.3); reg(o);
    }
  }
}

/* ---- 雫: triangle + lowpass プラック ---- */
function dropNote(t, m, vel, dec, bright){
  if(!ctx || !dryBus) return;
  const o = ctx.createOscillator();
  o.type = "triangle"; o.frequency.value = FREQ(m);
  const fl = ctx.createBiquadFilter();
  fl.type = "lowpass"; fl.Q.value = 1;
  fl.frequency.setValueAtTime(bright ? rand(3400, 4200) : rand(2200, 3000), t);
  fl.frequency.exponentialRampToValueAtTime(bright ? 900 : 520, t + 0.45);
  const g = ctx.createGain();
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(vel, t + 0.015);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dec);
  o.connect(fl); fl.connect(g);
  g.connect(dryBus); g.connect(dlySend);
  o.start(t); o.stop(t + dec + 0.12); reg(o);
}

/* ---- モチーフ生成 — 同じフレーズは二度続かない ---- */
function scheduleDrop(t){
  const pool = curPool;
  let notes = [], key = "";
  for(let tries = 0; tries < 6; tries++){
    notes = [];
    const n = [1, 1, 2, 2, 3, 3, 4][irand(0, 6)];
    let off = 0;
    for(let i = 0; i < n; i++){
      notes.push([off, pool[irand(0, pool.length - 1)]]);
      off += rand(0.28, 0.85);
    }
    key = notes.map(p => p[1]).join(",");
    if(key !== lastMotif) break;
  }
  lastMotif = key;
  for(const [off, m] of notes){
    dropNote(t + off, m, rand(0.3, 0.48), rand(2.4, 3.4), false);
  }
}

/* ---- 心拍 — 深海の水圧 ---- */
function heart(t){
  const o = ctx.createOscillator();
  o.type = "sine"; o.frequency.value = 55;
  const g = ctx.createGain();
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(0.25, t + 0.03);   // master後 ≒0.04
  g.gain.exponentialRampToValueAtTime(0.0001, t + 0.43);
  o.connect(g); g.connect(master);
  o.start(t); o.stop(t + 0.55); reg(o);
}

/* ================= 先読みスケジューラ ================= */
function tick(){
  try{
    if(!playing || !ctx || !master) return;
    const horizon = ctx.currentTime + HORIZON;
    while(nextChordT < horizon){ schedulePad(nextChordT); nextChordT += CHORD_DUR; }
    while(nextDropT < horizon){
      scheduleDrop(nextDropT);
      nextDropT += (Math.random() < 0.15) ? rand(10, 14) : rand(5, 9);  // 休符も音楽
    }
    while(nextHeartT < horizon){ heart(nextHeartT); nextHeartT += rand(7.2, 8.8); }
  }catch(err){ console.error("[深海BGM] tick", err); }
}

/* ================= start / stop ================= */
function teardown(){
  clearTimeout(killT); killT = null;
  clearInterval(schedT); schedT = null;
  for(const s of live){ try{ s.onended = null; s.stop(0); }catch(e){} }
  live.clear();
  if(master){ try{ master.disconnect(); }catch(e){} }
  master = lpOut = padBus = dryBus = dlySend = null;
}

function start(){
  try{
    teardown();
    if(!ctx){
      const AC = window.AudioContext || window.webkitAudioContext;
      if(!AC){ console.error("[深海BGM] WebAudio非対応"); return; }
      ctx = new AC();
    }
    if(ctx.state === "suspended") ctx.resume().catch(()=>{});
    buildGraph();
    const now = ctx.currentTime;
    master.gain.setValueAtTime(0.0001, now);
    master.gain.exponentialRampToValueAtTime(MASTER, now + 2.5);  // 〜2.5sかけて浮上
    chordIdx = 1;
    nextChordT = now + 0.08;
    nextDropT  = now + rand(2.5, 4.5);
    nextHeartT = now + rand(1.2, 2.5);
    playing = true;
    tick();
    schedT = setInterval(tick, 250);
    updateBtn();
  }catch(err){ console.error("[深海BGM] start", err); }
}

function stop(){
  try{
    playing = false;
    clearInterval(schedT); schedT = null;
    if(ctx && master){
      const now = ctx.currentTime, g = master.gain;
      g.cancelScheduledValues(now);
      g.setValueAtTime(Math.max(g.value, 0.0001), now);
      g.exponentialRampToValueAtTime(0.0001, now + 1);            // 〜1sで沈む
    }
    clearTimeout(killT);
    killT = setTimeout(() => {
      teardown();
      try{ if(ctx && ctx.state === "running") ctx.suspend().catch(()=>{}); }catch(e){}
    }, 1150);
    updateBtn();
  }catch(err){ console.error("[深海BGM] stop", err); }
}

/* ================= unlock arming ================= */
function disarm(){
  if(armFn){ try{ window.removeEventListener("pointerdown", armFn, true); }catch(e){} armFn = null; }
}
function arm(){
  if(armFn) return;
  armFn = () => {
    armFn = null;  // {once:true} が外してくれる
    try{ if(enabled && !playing) start(); }
    catch(err){ console.error("[深海BGM] unlock", err); }
  };
  window.addEventListener("pointerdown", armFn, {capture:true, passive:true, once:true});
}

/* ================= dock button ================= */
function updateBtn(){
  if(!btn) return;
  btn.textContent = enabled ? LABEL_ON : LABEL_OFF;
  btn.classList.toggle("shinkai-bgm-on", enabled);
}
function onToggle(){
  try{
    enabled = !enabled;
    try{ localStorage.setItem(KEY, enabled ? "on" : "off"); }catch(e){}
    disarm();
    if(enabled){
      start();   // このクリック自体がアンロックのジェスチャー
      try{ SEA.toast("🎶 深海にBGMがながれはじめた…"); }catch(e){}
    }else{
      stop();
      try{ SEA.toast("🔇 BGMをとめました（海はまだ歌っている）"); }catch(e){}
    }
    updateBtn();
  }catch(err){ console.error("[深海BGM] toggle", err); }
}

try{
  btn = SEA.addButton(enabled ? LABEL_ON : LABEL_OFF, onToggle);
  btn.title = "深海BGM — 浮遊する生成音楽のオン・オフ";
  updateBtn();
  if(enabled) arm();
}catch(err){ console.error("[深海BGM] init", err); }

/* ================= 水槽に耳をすます ================= */
SEA.on("hanshoku:born", () => {
  try{
    if(!playing || !ctx) return;
    const pool = curPool.slice().sort((a, b) => a - b);
    let notes = pool.slice(irand(0, Math.max(0, pool.length - 4)));
    notes = notes.slice(0, 4);
    while(notes.length < 4) notes.push(notes[notes.length - 1] + 5);
    const t0 = ctx.currentTime + 0.05;
    notes.forEach((m, i) => dropNote(t0 + i * 0.17, m, 0.38, 1.6, true));  // 小さく明るい上行
    nextDropT = Math.max(nextDropT, t0 + 4);  // 産声のあとは少し間を置く
  }catch(err){ console.error("[深海BGM] born", err); }
});

SEA.on("nushi:appeared", () => {
  try{
    if(!playing || !ctx || !master) return;
    const now = ctx.currentTime, g = master.gain;
    g.cancelScheduledValues(now);                 // 深海が息を呑む
    g.setValueAtTime(Math.max(g.value, 0.0001), now);
    g.exponentialRampToValueAtTime(Math.max(MASTER * 0.3, 0.0001), now + 2);
    g.setValueAtTime(MASTER * 0.3, now + 9);
    g.exponentialRampToValueAtTime(MASTER, now + 12);
    // 低いクラスターがゆっくり膨らむ
    const cg = ctx.createGain();
    cg.gain.setValueAtTime(0.0001, now);
    cg.gain.linearRampToValueAtTime(0.85, now + 4.5);
    cg.gain.exponentialRampToValueAtTime(0.0001, now + 10);
    const fl = ctx.createBiquadFilter();
    fl.type = "lowpass"; fl.frequency.value = 240; fl.Q.value = 0.6;
    fl.connect(cg); cg.connect(master);
    [[31, "sine"], [32, "sine"], [38, "triangle"]].forEach(([m, ty]) => {
      const o = ctx.createOscillator();
      o.type = ty; o.frequency.value = FREQ(m);
      o.detune.value = rand(-3, 3);
      o.connect(fl);
      o.start(now); o.stop(now + 10.5); reg(o);
    });
  }catch(err){ console.error("[深海BGM] nushi", err); }
});

SEA.on("depth:changed", arg => {
  try{
    const d = arg && typeof arg.depth === "number" ? arg.depth : 0;
    darkDepth = d > 5000;   // 次のコード交代から、より暗い和声へ
  }catch(err){ console.error("[深海BGM] depth", err); }
});

SEA.on("esa:fed", () => {
  try{
    if(!playing || !ctx || Math.random() >= 0.15) return;
    const t = ctx.currentTime + 0.02;
    const o = ctx.createOscillator();
    o.type = "sine"; o.frequency.value = FREQ(irand(89, 96));
    const g = ctx.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.16, t + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.3);
    o.connect(g); g.connect(dryBus); g.connect(dlySend);
    o.start(t); o.stop(t + 0.4); reg(o);
  }catch(err){ console.error("[深海BGM] esa", err); }
});

})();
</script>

  }catch(err){ console.error(TAG, "style", err); }

  /* ---------------- unlock banner (queued) ---------------- */

  function pumpBanner(){
    if(bBusy || !bq.length) return;
    bBusy = true;
    const d = bq.shift();
    try{
      const el = document.createElement("div");
      el.className = "ach-shinkai-banner";
      el.innerHTML =
        `<div class="ach-shinkai-bicon">${esc(d.icon || "🏆")}</div>` +
        `<div><div class="ach-shinkai-bkick">🏆 実績解除</div>` +
        `<div class="ach-shinkai-btitle">${esc(d.title || "")}</div></div>`;
      document.body.append(el);
      requestAnimationFrame(() => requestAnimationFrame(() => el.classList.add("ach-shinkai-bshow")));
      setTimeout(() => {
        try{ el.classList.remove("ach-shinkai-bshow"); }catch(_){}
        setTimeout(() => { try{ el.remove(); }catch(_){} bBusy = false; pumpBanner(); }, 600);
      }, 4500);
    }catch(err){ console.error(TAG, "banner", err); bBusy = false; }
  }

  /* ---------------- unlock core ---------------- */
  function unlock(id){
    try{
      const st = readJSON(K_STATE);
      if(st[id]) return;
      st[id] = {at: new Date().toISOString(), toy: TOY};
      writeJSON(K_STATE, st);
      queueBanner(defOf(id));
      try{ SEA.emit("shinkai:ach-unlocked", {id}); }catch(err){ console.error(TAG, err); }
      if(Object.keys(st).length >= 30) unlock("cross:kiroku-ma");
    }catch(err){ console.error(TAG, "unlock", err); }
  }

  /* ---------------- cross-world & threshold checks ---------------- */
  function checkYotsuSekai(){
    const c = readJSON(K_CNT);
    const ok = ["hoshizora","shinkai","shima","rekishi"]
      .every(t => (typeof c["visited-"+t] === "number" ? c["visited-"+t] : 0) >= 1);
    if(ok) unlock("cross:yotsu-sekai");
  }
  function checkShijuso(){
    try{
      const ok = ["hoshizora-bgm","shinkai-bgm","shima-bgm","rekishi-bgm"]
        .every(k => localStorage.getItem(k) === "on");
      if(ok) unlock("cross:shijuso");
    }catch(err){ console.error(TAG, err); }
  }
  function checkThresholds(){
    if(cnt("shinkai-esa-fed")  >= 50) unlock("shinkai:kyuji-gakari");
    if(cnt("shinkai-sonar")    >= 10) unlock("shinkai:sonar-gishi");
    if(cnt("shinkai-kenbikyo") >=  3) unlock("shinkai:plankton-gakusha");
    if(cnt("shinkai-kairyu")   >=  3) unlock("shinkai:kairyu-no-tomo");
    if(cnt("shinkai-irai")     >= 10) unlock("shinkai:otokui-sama");
    if(cnt("shinkai-sandaime") >=  1) unlock("shinkai:sandaime");
  }

  /* ---------------- event wiring ---------------- */
  SEA.on("creature-added", safe(() => {
    unlock("shinkai:hatsu-horyu");
    if(SEA.creatures && SEA.creatures.length >= 12) unlock("shinkai:daikazoku");
  }));
  SEA.on("hanshoku:born", safe(p => {
    unlock("shinkai:enmusubi");
    const parents = (p && p.parents) || [];
    const chained = parents.some(q => q && q.genome && String(q.genome.eco || "").includes("あいだに生まれた"));
    if(chained){
      bump("shinkai-sandaime");
      unlock("shinkai:sandaime");
    }
  }));
  SEA.on("depth:changed", safe(p => {
    if(p && typeof p.depth === "number" && p.depth >= 7000) unlock("shinkai:shinen");
  }));
  SEA.on("esa:fed",          safe(() => { if(bump("shinkai-esa-fed")  >= 50) unlock("shinkai:kyuji-gakari"); }));
  SEA.on("sonar:ping",       safe(() => { if(bump("shinkai-sonar")    >= 10) unlock("shinkai:sonar-gishi"); }));
  SEA.on("kenbikyo:sampled", safe(() => { if(bump("shinkai-kenbikyo") >=  3) unlock("shinkai:plankton-gakusha"); }));
  SEA.on("kairyu:arrived",   safe(() => { if(bump("shinkai-kairyu")   >=  3) unlock("shinkai:kairyu-no-tomo"); }));

  const SIMPLE = {
    "nushi:appeared": "shinkai:nushi",
    "sonar:ghost":    "shinkai:maboroshi",
    "kurage:bloom":   "shinkai:kurage-biyori",
    "tako:escape":    "shinkai:dasso-hojo",
    "bday:party":     "shinkai:tanjobi-shuyaku",
    "shoutou:dark":   "shinkai:shoto-no-bi"
  };
  for(const ev of Object.keys(SIMPLE)){
    SEA.on(ev, safe(() => unlock(SIMPLE[ev])));
  }

    unlock("shinkai:hatsu-irai");
    if(bump("shinkai-irai") >= 10) unlock("shinkai:otokui-sama");
  }));

    unlock("shinkai:moyo-gae");

      : it ? [it.name, it.id, it.title, it.label, it.kind].filter(x => typeof x === "string").join(" ") : "";

  }));
  SEA.on("shinkai:currency", safe(p => {
    if(p && typeof p.total === "number" && p.total >= 300) unlock("shinkai:shinju-fujin");
  }));

  try{
    const tEl = document.getElementById("toast");

      new MO(safe(() => {
        const t = tEl.textContent || "";

      })).observe(tEl, {childList:true, characterData:true, subtree:true});
    }
  }catch(err){ console.error(TAG, "observer", err); }

  /* ---------------- 手帳 (notebook) modal ---------------- */
  const SEC_ORDER = ["hoshizora","shinkai","shima","rekishi","cross"];
  const SEC_LABEL = {hoshizora:"🌌 星空", shinkai:"🌊 深海", shima:"🏝 島々", rekishi:"📜 年代記", cross:"🚪 横断"};
  let ovl = null;

  function bookHTML(){
    const defs = readJSON(K_DEFS), st = readJSON(K_STATE);
    let total = 0, got = 0, secs = "";
    for(const key of SEC_ORDER){
      const list = Array.isArray(defs[key]) ? defs[key] : null;
      let rows = "", sTot = 0, sGot = 0;
      if(!list || !list.length){
        rows = `<div class="ach-shinkai-empty">（未踏の世界）</div>`;
      }else{
        for(const d of list){
          if(!d || !d.id) continue;
          sTot++;
          const un = st[d.id];
          if(un) sGot++;
          const hidden = d.secret && !un;
          const icon  = hidden ? "❓"     : (d.icon  || "🏆");
          const title = hidden ? "？？？" : (d.title || d.id);
          const desc  = hidden ? "？？？" : (d.desc  || "");
          rows += `<div class="ach-shinkai-row${un ? " ach-shinkai-got" : ""}">` +
            `<div class="ach-shinkai-ricon">${esc(icon)}</div>` +
            `<div class="ach-shinkai-rbody"><div class="ach-shinkai-rtitle">${esc(title)}` +
            (un ? `<span class="ach-shinkai-rdate">${esc(fmtDate(un.at))}</span>` : "") +
            `</div><div class="ach-shinkai-rdesc">${esc(desc)}</div></div></div>`;
        }
      }
      total += sTot; got += sGot;
      secs += `<div class="ach-shinkai-sec"><div class="ach-shinkai-shead">` +
        `<span>${esc(SEC_LABEL[key] || key)}</span>` +
        (sTot ? `<span class="ach-shinkai-scount">${sGot}/${sTot}</span>` : "") +
        `</div>${rows}</div>`;
    }
    return {secs, total, got};
  }
  function onKey(e){ if(e.key === "Escape") closeBook(); }
  function closeBook(){
    try{
      if(!ovl) return;
      const o = ovl; ovl = null;
      document.removeEventListener("keydown", onKey);
      o.classList.remove("ach-shinkai-show");
      setTimeout(() => { try{ o.remove(); }catch(_){} }, 280);
    }catch(err){ console.error(TAG, err); }
  }
  function openBook(){
    try{
      if(ovl){ closeBook(); return; }
      const b = bookHTML();
      ovl = document.createElement("div");
      ovl.className = "ach-shinkai-ovl";
      ovl.innerHTML =
        `<div class="ach-shinkai-book" role="dialog" aria-modal="true" aria-label="実績手帳">` +
          `<div class="ach-shinkai-head"><div class="ach-shinkai-htitle">🏆 実績手帳</div>` +
          `<div class="ach-shinkai-htotal">${b.got}/${b.total}</div>` +
          `<button class="ach-shinkai-x" title="閉じる">✕</button></div>` +
          `<div class="ach-shinkai-bbody">${b.secs}</div>` +
          `<div class="ach-shinkai-foot">この頁は、四つの世界で共有されています</div>` +
        `</div>`;
      ovl.addEventListener("click", e => { try{ if(e.target === ovl) closeBook(); }catch(err){ console.error(TAG, err); } });
      ovl.querySelector(".ach-shinkai-x").addEventListener("click", closeBook);
      document.addEventListener("keydown", onKey);
      document.body.append(ovl);
      requestAnimationFrame(() => { if(ovl) ovl.classList.add("ach-shinkai-show"); });
    }catch(err){ console.error(TAG, "book", err); }
  }

  try{
    const btn = SEA.addButton("🏆 実績", openBook);
    btn.title = "実績手帳 — 四つの世界の記録をひらく";
  }catch(err){ console.error(TAG, "button", err); }

  /* ---------------- on load ---------------- */
  safe(function boot(){
    bump("visited-" + TOY);
    checkYotsuSekai();
    checkShijuso();
    checkThresholds();
    const st = readJSON(K_STATE);
    if(Object.keys(st).length >= 30) unlock("cross:kiroku-ma");
  })();
})();
</script>

  const TRAITS = {
    eye3:  {lbl:"目が3つの",             archs:ALL_ARCH,                  test:g=>(g.eyeN|0)>=3},
    big:   {lbl:"全長2mを超える",        archs:["fish","eel","ray"],      test:g=>lenMeters(g)>=2},
    red:   {lbl:"真っ赤な",              archs:ALL_ARCH,                  test:isRed},
    hoshi: {lbl:"星屑模様の",            archs:ALL_ARCH,                  test:g=>(g.spots|0)>=5},
    shima: {lbl:"しましまの",            archs:["fish"],                  test:g=>(g.stripes|0)>=2},
    lure:  {lbl:"ちょうちん持ちの",      archs:["angler"],                test:g=>g.arch==="angler"},
    deep:  {lbl:"深度3000mより深くに棲む",archs:["eel","jelly","angler"], test:g=>(+g.depth||0)>=3000},
    swift: {lbl:"とびきり泳ぎの速い",    archs:["fish","eel"],            test:g=>(+g.speed||0)>=33},
  };
  const TKEYS = Object.keys(TRAITS);

  /* ============================================================
     来館者の依頼 (2 open requests)
     ============================================================ */
  const VISITORS = ["常連のおばあさん","遠足の子ども","匿名の研究者","休暇中の船乗り","夜勤明けの灯台守",
    "引退した潜水士","深海雑誌の記者","クラゲ同好会の会長","初デートのふたり","似顔絵描きの青年",
    "出張帰りの会社員","長靴をはいた釣り人"];
  const FLAVORS = [
    "昔、海でそういうのを一度だけ見た気がするんです",
    "夢に出てきたので、確かめに来ました",
    "図鑑には載っていませんでした。だからここに来ました",
    "亡き祖父が日記に書き残していたんです",
    "見られたら、明日からまた頑張れる気がします",
    "理由は聞かないでください。どうしても、なんです",
    "友人と賭けをしているんです。負けられません",
    "卒業論文のためです。テーマはまだ決めていません",
    "前に来たとき、ガラス越しに目が合った気がして",
  ];
  const requests = [];
  function genRequest(){
    for(let i=0;i<14;i++){
      const tk = rnd(TKEYS), t = TRAITS[tk];
      const arch = (Math.random()<.5 && t.archs.length>1) ? rnd(t.archs) : "";
      if(requests.some(r => r.tk===tk && r.arch===arch)) continue;
      return {tk, arch, visitor:rnd(VISITORS), flavor:rnd(FLAVORS), reward:30+((Math.random()*31)|0)};
    }
    return {tk:rnd(TKEYS), arch:"", visitor:rnd(VISITORS), flavor:rnd(FLAVORS), reward:30+((Math.random()*31)|0)};
  }
  function wantText(r){
    const t = TRAITS[r.tk]; if(!t) return "なにかすごいのが見たい";
    return t.lbl + (r.arch ? (ARCH_LBL[r.arch]||"住人") : "住人") + "が見たい";
  }
  function matches(r, g){
    const t = TRAITS[r.tk]; if(!t || !g) return false;
    if(r.arch){ if(g.arch !== r.arch) return false; }
    else if(!t.archs.includes(g.arch)) return false;
    try{ return !!t.test(g); }catch(e){ return false; }
  }
  function saveRequests(){
    try{
      localStorage.setItem("game-shinkai-irai", JSON.stringify(
        requests.map(r=>({tk:r.tk,arch:r.arch,visitor:r.visitor,flavor:r.flavor,reward:r.reward}))));
    }catch(e){}
  }
  function loadRequests(){
    try{
      const a = JSON.parse(localStorage.getItem("game-shinkai-irai")||"[]");
      if(Array.isArray(a)) for(const r of a){
        if(requests.length>=2) break;
        if(r && TRAITS[r.tk] && isFinite(+r.reward))
          requests.push({tk:r.tk, arch:(typeof r.arch==="string"?r.arch:""),
            visitor:String(r.visitor||rnd(VISITORS)).slice(0,24),
            flavor:String(r.flavor||rnd(FLAVORS)).slice(0,60),
            reward:clamp(Math.round(+r.reward),30,60)});
      }
    }catch(e){}
    while(requests.length<2) requests.push(genRequest());
  }

  /* ---------------- visitor dot at the glass ---------------- */
  function visitorPeek(){
    try{
      const left = Math.random()<.5;
      const x = left ? 14 : SEA.W-14;
      const y = clamp(SEA.H*(.3+Math.random()*.45), 60, SEA.H-80);
      const g = SEA.mk("g", {class:"game-shinkai-visitor", "pointer-events":"none"});
      const inner = SEA.mk("g");
      const dx = left ? 1.6 : -1.6;
      inner.append(
        SEA.mk("circle",{cx:0,cy:0,r:8,fill:"#06101b",stroke:"rgba(255,210,122,.55)","stroke-width":1.2}),
        SEA.mk("circle",{cx:dx,cy:-1.6,r:1.5,fill:"#ffd27a"}),
        SEA.mk("circle",{cx:dx+(left?4.4:-4.4),cy:-1.6,r:1.5,fill:"#ffd27a"}),
        SEA.mk("circle",{cx:left?7:-7,cy:7,r:2.1,fill:"#06101b",stroke:"rgba(255,210,122,.4)","stroke-width":1})
      );
      inner.animate([{transform:"translateY(0px)"},{transform:"translateY(-3px)"},{transform:"translateY(0px)"}],
        {duration:1800,iterations:Infinity,easing:"ease-in-out"});
      g.append(inner);
      g.setAttribute("transform",`translate(${x.toFixed(1)} ${y.toFixed(1)})`);
      SEA.gFx.append(g);
      g.animate([{opacity:0},{opacity:.95}],{duration:500,easing:"ease-out",fill:"both"});
      setTimeout(()=>{
        try{ g.animate([{opacity:.95},{opacity:0}],{duration:700,fill:"both"}).onfinish=()=>g.remove(); }
        catch(e){ g.remove(); }
      }, 9200);
    }catch(err){ console.error(TAG,"visitor",err); }
  }

  function checkRequests(){
    let hits = 0;
    try{
      for(let i=0;i<requests.length;i++){
        const r = requests[i];
        const c = SEA.creatures.find(c => c && c.genome && matches(r, c.genome));
        if(!c) continue;
        hits++;
        award(r.reward, "irai", c.x, c.y - 30);
        SEA.toast(`${r.visitor}は大満足の様子です（+${r.reward} 🫧）`);
        visitorPeek();
        SEA.emit("irai:fulfilled", {visitor:r.visitor, want:wantText(r), reward:r.reward, creature:c});
        requests[i] = genRequest();
      }
      if(hits){ saveRequests(); if(isOpen()) renderModal(); }
    }catch(err){ console.error(TAG,"checkRequests",err); }
    return hits;
  }

  /* ============================================================
     📅 デイリー依頼 — deterministic from local yyyy-mm-dd
     ============================================================ */
  const cnt = f => { let n=0; for(const c of SEA.creatures){ try{ if(c&&c.genome&&f(c.genome)) n++; }catch(e){} } return n; };
  const DAILY = [
    {txt:"目が3つの住人を2匹、同時に展示する",                      prog:()=>[Math.min(2,cnt(g=>(g.eyeN|0)>=3)),2]},
    {txt:"全長2mを超える大物を3匹そろえる",                         prog:()=>[Math.min(3,cnt(g=>lenMeters(g)>=2)),3]},
    {txt:"真っ赤な住人と、星屑模様（発光点5つ以上）の住人を同時に展示する",
      prog:()=>[(cnt(isRed)>0?1:0)+(cnt(g=>(g.spots|0)>=5)>0?1:0),2]},
    {txt:"クラゲを3匹、同じ闇にただよわせる",                       prog:()=>[Math.min(3,cnt(g=>g.arch==="jelly")),3]},
    {txt:"5つの系統（魚・ウナギ・クラゲ・エイ・アンコウ）を全員そろえる",
      prog:()=>{ const s=new Set(); for(const c of SEA.creatures){ if(c&&c.genome) s.add(c.genome.arch); }
        return [ALL_ARCH.filter(a=>s.has(a)).length,5]; }},
    {txt:"ちょうちん持ち（アンコウ）を2匹お迎えする",               prog:()=>[Math.min(2,cnt(g=>g.arch==="angler")),2]},
    {txt:"深度3000mより深くに棲む住人を2匹招く",                    prog:()=>[Math.min(2,cnt(g=>(+g.depth||0)>=3000)),2]},
    {txt:"しましま（縞2本以上）の魚を2匹、群れさせる",              prog:()=>[Math.min(2,cnt(g=>g.arch==="fish"&&(g.stripes|0)>=2)),2]},
  ];
  function dateKey(){
    const d = new Date();
    return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
  }
  function seedFrom(s){ let h=0; for(let i=0;i<s.length;i++) h=(Math.imul(h,31)+s.charCodeAt(i))|0; return h>>>0; }
  function todaysQuest(){ return DAILY[seedFrom(dateKey()+"#shinkai") % DAILY.length]; }
  let memDailyKey = "";
  function dailyDone(){
    const k = "daily-shinkai-"+dateKey();
    try{ return localStorage.getItem(k)==="1"; }catch(e){ return memDailyKey===k; }
  }
  function markDaily(){
    const k = "daily-shinkai-"+dateKey(); memDailyKey = k;
    try{ localStorage.setItem(k,"1"); }catch(e){}
  }
  function banner(big, small){
    try{
      const b = document.createElement("div");
      b.className = "game-shinkai-banner";
      b.innerHTML = `<b>${esc(big)}</b><span>${esc(small)}</span>`;
      document.body.append(b);
      b.animate([{transform:"translate(-50%,-28px)",opacity:0},{transform:"translate(-50%,0)",opacity:1}],
        {duration:420,easing:"cubic-bezier(.2,.9,.3,1)",fill:"both"});
      setTimeout(()=>{
        try{ b.animate([{opacity:1},{opacity:0}],{duration:520,fill:"both"}).onfinish=()=>b.remove(); }
        catch(e){ b.remove(); }
      }, 3300);
    }catch(err){ console.error(TAG,"banner",err); }
  }
  function checkDaily(){
    try{
      if(dailyDone()) return false;
      const q = todaysQuest();
      const [cur,need] = q.prog();
      if(cur < need) return false;
      markDaily();
      award(80, "daily");
      banner("📅 本日の依頼、達成！", "報酬 80 🫧、たしかにお支払いしました");
      SEA.emit("quest:daily-clear", {date:dateKey(), quest:q.txt});
      if(isOpen()) renderModal();
      return true;
    }catch(err){ console.error(TAG,"checkDaily",err); return false; }
  }

  /* ============================================================
     🪸 水槽デコ
     ============================================================ */
  const DECOS = {
    iwa:    {name:"岩",            price:20},
    kaisou: {name:"ゆらゆら海藻",  price:30},
    tsubo:  {name:"あやしい壺",    price:60},
    neon:   {name:"ネオン珊瑚",    price:80},
    fune:   {name:"沈没船",        price:120},
  };
  const MAXDECO = 30;
  const placed = [];           // {t, fx, fy, el}
  let pendingType = null;

  function drawDeco(t){
    const g = SEA.mk("g", {class:"game-shinkai-deco"});
    try{
      if(t==="iwa"){
        g.append(SEA.mk("path",{d:"M -24 0 Q -28 -10 -18 -17 Q -8 -24 4 -21 Q 18 -19 22 -8 Q 24 -2 22 0 Z",
          fill:"#16293a", stroke:"#2b4860","stroke-width":1}));
        g.append(SEA.mk("path",{d:"M 20 0 Q 19 -7 27 -9 Q 34 -10 35 -3 Q 35 0 34 0 Z",
          fill:"#122230", stroke:"#2b4860","stroke-width":.8}));
        g.append(SEA.mk("path",{d:"M -12 -14 Q -6 -18 2 -16", stroke:"#3b5e77","stroke-width":1, fill:"none", opacity:.7}));
        g.append(SEA.mk("circle",{cx:10,cy:-9,r:1.2,fill:"#3b5e77",opacity:.8}));
      }
      else if(t==="kaisou"){
        const n = 3+((Math.random()*3)|0);
        for(let i=0;i<n;i++){
          const bx = -10 + i*(20/Math.max(1,n-1));
          const h = 38 + Math.random()*30, lean = (Math.random()-.5)*12;
          const s = SEA.mk("path",{d:`M ${bx} 0 Q ${(bx+lean).toFixed(1)} ${(-h*.55).toFixed(1)} ${(bx+lean*.4).toFixed(1)} ${(-h).toFixed(1)}`,
            stroke:`hsl(${(152+Math.random()*24)|0}, 45%, ${(26+Math.random()*10)|0}%)`,
            "stroke-width":3, fill:"none", "stroke-linecap":"round", opacity:.9});
          s.style.transformOrigin = `${bx}px 0px`;
          s.animate([{transform:"rotate(-6deg)"},{transform:"rotate(6deg)"},{transform:"rotate(-6deg)"}],
            {duration:2800+Math.random()*2600, iterations:Infinity, easing:"ease-in-out", delay:-Math.random()*2000});
          g.append(s);
        }
      }
      else if(t==="tsubo"){
        g.append(SEA.mk("path",{d:"M -9 0 C -13 -8 -11 -18 -4 -22 L -5 -26 L 5 -26 L 4 -22 C 11 -18 13 -8 9 0 Z",
          fill:"#241a2e", stroke:"#4a3a58","stroke-width":1}));
        g.append(SEA.mk("ellipse",{cx:0,cy:-26,rx:5.5,ry:1.8,fill:"#11091a",stroke:"#4a3a58","stroke-width":1}));
        g.append(SEA.mk("path",{d:"M -7 -14 Q 0 -11 7 -14", stroke:"#4a3a58","stroke-width":.8, fill:"none", opacity:.8}));
        g.append(SEA.mk("path",{d:"M -10 -19 Q -15 -17 -11 -13", stroke:"#4a3a58","stroke-width":1, fill:"none"}));
        g.append(SEA.mk("path",{d:"M 10 -19 Q 15 -17 11 -13", stroke:"#4a3a58","stroke-width":1, fill:"none"}));
        const gl = SEA.mk("circle",{cx:0,cy:-27,r:2.4,fill:"#b48cff",opacity:.4,filter:"url(#game-shinkai-glow)"});
        gl.animate([{opacity:.12},{opacity:.5},{opacity:.12}],{duration:3400,iterations:Infinity,easing:"ease-in-out"});
        g.append(gl);
      }
      else if(t==="neon"){
        for(const d of ["M 0 0 C -3 -9 -11 -13 -13 -25","M 0 0 C 2 -11 11 -15 11 -29","M 0 0 C 0 -7 -3 -14 3 -19"])
          g.append(SEA.mk("path",{d, stroke:"#143241","stroke-width":3.2, fill:"none","stroke-linecap":"round"}));
        const dots = [[-13,-25],[-8,-17],[11,-29],[13,-21],[3,-19],[-2,-12]];
        dots.forEach((p,i)=>{
          const dot = SEA.mk("circle",{cx:p[0],cy:p[1],r:1.8,
            fill:`hsl(${i%2? 315:165},100%,68%)`, filter:"url(#game-shinkai-glow)"});
          dot.animate([{opacity:.35},{opacity:.95},{opacity:.35}],
            {duration:1600+Math.random()*1700, iterations:Infinity, easing:"ease-in-out", delay:-Math.random()*1500});
          g.append(dot);
        });
      }
      else if(t==="fune"){
        g.append(SEA.mk("path",{d:"M -52 0 Q -57 -13 -45 -19 L -21 -22 L -14 -10 L -7 -22 L 30 -23 Q 50 -21 54 -8 Q 56 -2 52 0 Z",
          fill:"#13222f", stroke:"#2c4255","stroke-width":1.2}));
        g.append(SEA.mk("path",{d:"M -45 -16 L -22 -18 M -8 -19 L 48 -19", stroke:"#24414f","stroke-width":1, fill:"none", opacity:.8}));
        for(const px of [-34, 12, 32])
          g.append(SEA.mk("circle",{cx:px,cy:-9,r:2.6,fill:"#0a141d",stroke:"#33505e","stroke-width":.8}));
        const win = SEA.mk("circle",{cx:12,cy:-9,r:1.4,fill:"var(--warm,#ffd27a)",opacity:.7,filter:"url(#game-shinkai-glow)"});
        win.animate([{opacity:.2},{opacity:.8},{opacity:.2}],{duration:4200,iterations:Infinity,easing:"ease-in-out"});
        g.append(win);
        g.append(SEA.mk("path",{d:"M 8 -22 L 15 -64", stroke:"#2c4255","stroke-width":2,"stroke-linecap":"round"}));
        g.append(SEA.mk("path",{d:"M 2 -50 L 28 -54", stroke:"#2c4255","stroke-width":1.4,"stroke-linecap":"round"}));
        g.append(SEA.mk("polygon",{points:"15,-64 31,-59 15,-54", fill:"#1d3a49", opacity:.9}));
        g.append(SEA.mk("path",{d:"M 13 -52 Q 24 -47 22 -36 L 12 -39 Z", fill:"#1a3140", opacity:.75}));
      }
    }catch(err){ console.error(TAG,"draw",err); }
    return g;
  }

  function positionDeco(rec){
    try{ rec.el.setAttribute("transform",
      `translate(${(rec.fx*SEA.W).toFixed(1)} ${(rec.fy*SEA.H).toFixed(1)})`); }catch(e){}
  }
  function placeDeco(rec, fresh){
    try{
      const el = SEA.mk("g",{class:"game-shinkai-decoroot","pointer-events":"none"});
      el.append(drawDeco(rec.t));
      SEA.gFar.append(el);
      rec.el = el;
      positionDeco(rec);
      placed.push(rec);
      if(fresh){
        el.animate([{opacity:0},{opacity:1}],{duration:650,easing:"ease-out"});
        for(let i=0;i<3;i++) bubbleFrom(rec.fx*SEA.W+(Math.random()-.5)*20, rec.fy*SEA.H-10);
      }
    }catch(err){ console.error(TAG,"place",err); }
  }
  function saveDecos(){
    try{
      localStorage.setItem("game-shinkai-deco", JSON.stringify(
        placed.map(d=>({t:d.t, fx:+d.fx.toFixed(4), fy:+d.fy.toFixed(4)}))));
    }catch(e){}
  }
  function loadDecos(){
    try{
      const a = JSON.parse(localStorage.getItem("game-shinkai-deco")||"[]");
      if(Array.isArray(a)) for(const r of a.slice(0,MAXDECO)){
        if(!r || !DECOS[r.t]) continue;
        const fx = +r.fx, fy = +r.fy;
        if(!isFinite(fx)||!isFinite(fy)) continue;
        placeDeco({t:r.t, fx:clamp(fx,0,1), fy:clamp(fy,.5,1)}, false);
      }
    }catch(err){ console.error(TAG,"loadDecos",err); }
  }
  function bubbleFrom(x, y, col){
    try{
      const dx = ((Math.random()-.5)*26).toFixed(0), dy = (70+Math.random()*90).toFixed(0);
      const b = SEA.mk("circle",{cx:x.toFixed(1),cy:y.toFixed(1),r:(1.4+Math.random()*1.8).toFixed(1),
        fill:"none",stroke:col||"#bfe6f2","stroke-width":.8,opacity:.6});
      SEA.gFx.append(b);
      b.animate([{transform:"translate(0,0)",opacity:.6},{transform:`translate(${dx}px, -${dy}px)`,opacity:0}],
        {duration:3200+Math.random()*2400,easing:"ease-out"}).onfinish = ()=>b.remove();
    }catch(err){ console.error(TAG,"bubble",err); }
  }

  function buy(t){
    try{
      const it = DECOS[t]; if(!it) return;
      if(placed.length >= MAXDECO){ SEA.toast("そろそろ床が見えなくなってきました"); return; }
      if(!spend(it.price)) return;
      pendingType = t;
      closeModal();
      SEA.svg.style.cursor = "crosshair";
      SEA.toast(`${it.name}：水槽の底をクリックで配置します（Escで中止）`);
    }catch(err){ console.error(TAG,"buy",err); }
  }

  // placement claims the next svg click (CAPTURE + preventDefault → no pellet, no dossier)
  SEA.svg.addEventListener("pointerdown", e=>{
    try{
      if(!pendingType || e.button !== 0) return;
      e.preventDefault(); e.stopPropagation();
      const r = SEA.svg.getBoundingClientRect();
      if(!(r.width>0) || !(r.height>0)) return;
      let x = (e.clientX-r.left)*SEA.W/r.width;
      let y = (e.clientY-r.top)*SEA.H/r.height;
      x = clamp(x, 30, SEA.W-30);
      y = clamp(y, SEA.H*.75, SEA.H-6);     // seabed: lower 25%
      const t = pendingType;
      pendingType = null; SEA.svg.style.cursor = "";
      const rec = {t, fx:x/SEA.W, fy:y/SEA.H};
      placeDeco(rec, true);
      saveDecos();
      SEA.emit("deco:placed", {item:{type:t, name:DECOS[t].name, x, y}});
      SEA.toast(`${DECOS[t].name}を置きました。住人の反応をお待ちください`);
    }catch(err){ console.error(TAG,"placement",err); }
  }, true);

  document.addEventListener("keydown", e=>{
    try{
      if(e.key !== "Escape") return;
      if(pendingType){
        const it = DECOS[pendingType];
        pendingType = null; SEA.svg.style.cursor = "";
        if(it) award(it.price, "refund");
        SEA.toast("配置をやめました。真珠は返してもらいました");
        return;
      }
      if(isOpen()) closeModal();
    }catch(err){ console.error(TAG,"esc",err); }
  });

  /* ---- creature interaction (cheap, every few seconds) ---- */
  setInterval(()=>{
    try{
      if(document.hidden || !placed.length) return;
      const d = placed[(Math.random()*placed.length)|0];
      const px = d.fx*SEA.W, py = d.fy*SEA.H;
      // one swimmer is nudged toward a random deco
      if(Math.random() < .8){
        let best = null, bd = 1e18;
        for(const c of SEA.creatures){
          if(!c || !c.genome || c.genome.arch==="jelly") continue;
          const dd = Math.abs(c.x-px)+Math.abs(c.y-py);
          if(dd < bd){ bd = dd; best = c; }
        }
        if(best){
          best.dir = px > best.x ? 1 : -1;
          best.targetY = clamp(py-26, SEA.H*.12, SEA.H*.88);
        }
      }
      // jellies drift up above the kelp
      for(const k of placed){
        if(k.t !== "kaisou") continue;
        const kx = k.fx*SEA.W, ky = k.fy*SEA.H;
        for(const c of SEA.creatures){
          if(!c || !c.genome || c.genome.arch!=="jelly") continue;
          if(Math.abs(c.x-kx) < 130 && c.baseY > ky-100) c.baseY -= 9;
        }
      }
      // the あやしい壺 exhales now and then
      for(const k of placed){
        if(k.t==="tsubo" && Math.random() < .45)
          bubbleFrom(k.fx*SEA.W, k.fy*SEA.H-27, "#cfa8ff");
      }
    }catch(err){ console.error(TAG,"ambient",err); }
  }, 4500);

  /* ============================================================
     依頼ボード modal
     ============================================================ */
  let overlay = null, modalBody = null, balEl = null;
  function ensureOverlay(){
    if(overlay) return;
    overlay = document.createElement("div");
    overlay.className = "game-shinkai-ovl";
    overlay.innerHTML =
      `<div class="game-shinkai-modal">
        <div class="game-shinkai-head">
          <div class="game-shinkai-title">🧾 依頼ボード<small>REQUEST BOARD</small></div>
          <div class="game-shinkai-bal"></div><span class="game-shinkai-x">✕</span>
        </div>
        <div class="game-shinkai-body"></div>
      </div>`;
    modalBody = overlay.querySelector(".game-shinkai-body");
    balEl = overlay.querySelector(".game-shinkai-bal");
    overlay.querySelector(".game-shinkai-x").addEventListener("click", closeModal);
    overlay.addEventListener("pointerdown", e=>{ if(e.target===overlay) closeModal(); });
    document.body.append(overlay);
  }
  function isOpen(){ return !!(overlay && overlay.classList.contains("game-shinkai-show")); }
  function openModal(){ try{ ensureOverlay(); renderModal(); overlay.classList.add("game-shinkai-show"); }catch(err){ console.error(TAG,"open",err); } }
  function closeModal(){ try{ if(overlay) overlay.classList.remove("game-shinkai-show"); }catch(e){} }

  function renderModal(){
    try{
      if(!overlay) return;
      balEl.textContent = "所持 " + getBal() + " 🫧";
      const q = todaysQuest();
      const done = dailyDone();
      let cur = 0, need = 1;
      try{ const p = q.prog(); cur = p[0]; need = p[1]; }catch(e){}
      const pct = done ? 100 : Math.round(clamp(cur/Math.max(1,need),0,1)*100);
      let html =
        `<div class="game-shinkai-sec">📅 今日の依頼</div>
         <div class="game-shinkai-daily${done?" game-shinkai-done":""}">
           <div class="game-shinkai-qtxt">${esc(q.txt)}</div>
           <div class="game-shinkai-qbar"><i style="width:${pct}%"></i></div>
           <div class="game-shinkai-qmeta">${done?"達成済み ✔　また明日お越しください":"進捗 "+cur+" / "+need}　・　報酬 80 🫧</div>
         </div>
         <div class="game-shinkai-sec">🧾 来館者の依頼<button class="game-shinkai-inspect">🔍 検分する</button></div>`;
      for(const r of requests){
        html +=
          `<div class="game-shinkai-req">
             <div class="game-shinkai-vis">${esc(r.visitor)}<span>報酬 ${r.reward} 🫧</span></div>
             <div class="game-shinkai-want">「${esc(wantText(r))}」</div>
             <div class="game-shinkai-flv">${esc(r.flavor)}</div>
           </div>`;
      }
      html += `<div class="game-shinkai-sec">🪸 もようがえ<span class="game-shinkai-balmini">設置 ${placed.length}/${MAXDECO}</span></div>
               <div class="game-shinkai-shop">`;
      for(const k in DECOS){
        html += `<div class="game-shinkai-item" data-t="${k}">
                   <div class="game-shinkai-thumb"></div>
                   <div class="game-shinkai-inm">${esc(DECOS[k].name)}</div>
                   <button class="game-shinkai-buy">${DECOS[k].price} 🫧</button>
                 </div>`;
      }
      html += `</div><div class="game-shinkai-note">買ったあと、水槽の底をクリックして置き場所を決めます</div>`;
      modalBody.innerHTML = html;
      const insp = modalBody.querySelector(".game-shinkai-inspect");
      if(insp) insp.addEventListener("click", ()=>{
        try{
          const a = checkRequests(), b = checkDaily();
          if(!a && !b){ SEA.toast("お眼鏡にかなう住人は、まだいないようです"); renderModal(); }
        }catch(err){ console.error(TAG,"inspect",err); }
      });
      modalBody.querySelectorAll(".game-shinkai-item").forEach(item=>{
        try{
          const t = item.dataset.t;
          const sv = SEA.mk("svg",{viewBox:"-62 -72 124 76","aria-hidden":"true"});
          sv.append(drawDeco(t));
          item.querySelector(".game-shinkai-thumb").append(sv);
          item.querySelector(".game-shinkai-buy").addEventListener("click", ()=>buy(t));
        }catch(err){ console.error(TAG,"item",err); }
      });
    }catch(err){ console.error(TAG,"render",err); }
  }

  /* ============================================================
     wiring
     ============================================================ */
  let checkT = null;
  function scheduleCheck(){
    clearTimeout(checkT);
    checkT = setTimeout(()=>{ try{ checkRequests(); checkDaily(); }catch(err){ console.error(TAG,"check",err); } }, 700);
  }
  SEA.on("creature-added", scheduleCheck);
  SEA.on("hanshoku:born", scheduleCheck);
  SEA.on("shinkai:currency", ()=>{ try{ if(isOpen()) renderModal(); }catch(e){} });
  window.addEventListener("resize", ()=>{
    try{ for(const d of placed) positionDeco(d); layoutChip(); }catch(e){}
  });

  SEA.addButton("🧾 依頼", openModal);
  loadRequests();
  loadDecos();
  setTimeout(scheduleCheck, 5200);   // after the opening releases settle

}catch(err){ console.error("[game-shinkai] init", err); }
})();
</script>

</body>
</html>
