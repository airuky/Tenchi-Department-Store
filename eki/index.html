    "忘れ物をしました。何を忘れたかは、忘れました",
    "このノート、前のページの人は元気でしょうか",
    "自動販売機のあたたかいの、最後の一本をもらいました。すみません",
    "終電を逃したのではなく、夜を選んだのだと思うことにします",
    "猫に道を聞いたら無視されました。正しい対応だと思います",
    "ここの時計、少し遅れていますね。おかげで間に合いました",
    "3番線を探しています。見つけた方は、そっとしておいてください",
  ];
  const NOTE_WORLD = {
    hoshizora: [
      "星空行きに乗ります。地上の灯りに、よろしく伝えてください",
      "願いごとを三つ持ってきました。ひとつは駅に置いていきます",
      "上ばかり見て歩いたら柱にぶつかりました。柱は無事です",
    ],
    shinkai: [
      "深海行きに乗ります。傘は置いていきます。使ってください",
      "息継ぎの練習をしてきました。向こうでは要らないそうですが",
      "沈んだ手紙が向こうで待っているそうです。差出人は私です",
    ],
    shima: [
      "島々行きです。砂時計の砂を補充しに帰ります",
      "波の音を録音しに行きます。聞かせる相手はこれから探します",
      "靴に前回の砂が残っていました。連れて帰ります",
    ],
    rekishi: [
      "年代記行き。私のことも、いつか注釈になるのでしょうか",
      "千年前のニュースの続報を見に行きます。気になっていたので",
      "昔の自分に会ったら敬語を使うべきか、まだ考えています",
    ],
  };
  const NOTE_THANKS = [
    "ノート、読みました。検印が丁寧で安心しました",
    "検印、見ました。あれは良い角度です",
    "返事が来るとは思っていませんでした。また書きます",
  ];
  const REG_MANNERS = [
    "改札の前で、慣れた会釈をした",
    "切符を出す手つきに迷いがない",
    "「いつもの」と言い慣れている",
    "ベンチの定位置を目で確認した",
    "駅員より先に改札に着いていた",
  ];

  /* ================= css ================= */
  const style = document.createElement("style");
  style.textContent = `
  .eki-note-ovl{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
    background:rgba(3,6,18,.62);backdrop-filter:blur(4px);z-index:9;opacity:0;pointer-events:none;transition:.3s}
  .eki-note-ovl.show{opacity:1;pointer-events:auto}
  .eki-note-card{width:min(440px,92vw);max-height:78vh;overflow-y:auto;background:var(--panel);
    border:1px solid var(--panel-edge);border-radius:18px;padding:20px 22px;
    box-shadow:0 24px 70px rgba(0,0,0,.6);scrollbar-width:thin}
  .eki-note-card h3{margin:0 0 8px;font-size:13px;letter-spacing:.22em;color:var(--acc);font-weight:600}
  .eki-note-card .btn{width:100%;margin-top:14px}
  .eki-note-sub{font-size:11.5px;color:var(--dim);line-height:1.9;margin-bottom:6px}
  .eki-note-khint{font-size:10px;color:var(--dim);opacity:.7;letter-spacing:.08em;
    text-align:right;margin-bottom:10px}
  .eki-note-empty{font-size:12.5px;color:var(--dim);text-align:center;line-height:2.2;padding:24px 0}
  .eki-note-entry{position:relative;background:linear-gradient(160deg,#f6eedb,#e9dec2);color:#2c2a22;
    border-radius:9px;border:1px dashed rgba(90,70,40,.45);padding:10px 12px 12px 50px;
    margin-bottom:10px;font-size:12.5px;min-height:62px}
  .eki-note-mark{position:absolute;left:9px;top:11px;width:30px;height:30px;border:2.4px solid var(--c,#8a8f9c);
    color:var(--c,#8a8f9c);border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-size:14px;font-weight:700;mix-blend-mode:multiply;transform:rotate(-8deg)}
  .eki-note-meta{font-weight:700;font-size:12.5px;color:#33301f}
  .eki-note-meta span{font-weight:400;font-size:10px;color:#8c7a55;margin-left:7px;letter-spacing:.08em}
  .eki-note-text{margin-top:5px;line-height:1.8;padding-right:42px}
  .eki-note-kenin{position:absolute;right:9px;bottom:8px;cursor:pointer;border:1px solid #a8503c;
    color:#a8503c;background:rgba(255,255,255,.4);border-radius:999px;padding:3px 10px;
    font-size:11px;font-family:inherit;transition:.15s}
  .eki-note-kenin:hover{background:#a8503c;color:#f6eedb;transform:translateY(-1px)}
  .eki-note-seal{position:absolute;right:12px;bottom:7px;width:36px;height:36px;border:2.6px solid #d9412c;
    color:#d9412c;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;
    font-size:13px;font-weight:700;line-height:1.1;mix-blend-mode:multiply;
    transform:rotate(var(--rot,-10deg));pointer-events:none}
  .eki-note-seal small{font-size:5.5px;letter-spacing:.12em;font-weight:600}
  .eki-note-seal.eki-note-slam{animation:eki-note-slam .38s cubic-bezier(.2,1.5,.4,1) both}
  @keyframes eki-note-slam{0%{transform:scale(2.4) rotate(-32deg);opacity:0}
    62%{transform:scale(.9) rotate(var(--rot,-10deg));opacity:1}
    100%{transform:scale(1) rotate(var(--rot,-10deg));opacity:.92}}
  .eki-note-row{display:flex;align-items:center;gap:8px;font-size:13px;padding:8px 2px;
    border-bottom:1px dashed rgba(255,255,255,.08)}
  .eki-note-rname{flex:1;font-weight:600}
  .eki-note-rcount{color:var(--acc);font-weight:600}
  .eki-note-rlast{color:var(--dim);min-width:76px;text-align:right}
  .eki-note-foot{font-size:11.5px;color:var(--dim);line-height:1.9;margin-top:12px}
  .eki-note-tag{display:inline-block;border:1px solid #a8503c;color:#a8503c;border-radius:999px;
    font-size:9px;padding:1px 7px;margin-left:7px;letter-spacing:.18em;vertical-align:2px;font-weight:600}
  .eki-note-keychip{align-self:flex-end;font-size:10px;color:var(--dim);opacity:.55;
    letter-spacing:.1em;margin-top:-4px;padding-right:6px;pointer-events:none;user-select:none}`;
  document.head.appendChild(style);

  /* ================= モーダル（ノート／名簿 共用） ================= */
  const ovl = document.createElement("div");
  ovl.className = "eki-note-ovl";
  document.body.appendChild(ovl);
  let view = null;                         // "note" | "roster" | null
  function close(){
    view = null;
    ovl.classList.remove("show");
    ovl.innerHTML = "";
  }
  ovl.addEventListener("pointerdown", e => { if(e.target === ovl) close(); });

  function cardEl(){
    const c = document.createElement("div");
    c.className = "eki-note-card";
    return c;
  }
  function closeBtn(c){
    const b = document.createElement("button");
    b.className = "btn";
    b.textContent = "とじる";
    b.addEventListener("click", close);
    c.appendChild(b);
  }
  function sealEl(anim){
    const s = document.createElement("div");
    s.className = "eki-note-seal" + (anim ? " eki-note-slam" : "");
    s.style.setProperty("--rot", (-16 + Math.random()*20).toFixed(0) + "deg");
    s.innerHTML = `検<small>よぞら駅</small>`;
    return s;
  }

  function entryEl(en){
    const w = WORLDS[en.world];
    const d = document.createElement("div");
    d.className = "eki-note-entry";
    d.dataset.id = en.id;
    d.innerHTML =
      `<div class="eki-note-mark" style="--c:${w ? w.color : "#8a8f9c"}">${esc(w ? w.char : "？")}</div>` +
      `<div class="eki-note-meta">${esc(en.name)}<span>${esc(en.clock || "")}　${w ? esc(w.label) + "行き" : "行き先不明"}</span></div>` +
      `<div class="eki-note-text">「${esc(en.text)}」</div>`;
    if(en.replied){
      d.appendChild(sealEl(false));
    } else {
      const b = document.createElement("button");
      b.className = "eki-note-kenin";
      b.textContent = "⌖ 検印";
      b.title = "返事のかわりに、駅のはんこを押す";
      b.addEventListener("click", () => stampEntry(en, d));
      d.appendChild(b);
    }
    return d;
  }

  function stampEntry(en, d){
    if(!en || en.replied) return;
    en.replied = true;
    if(data.pending.length < 6 && !data.pending.some(q => q.name === en.name))
      data.pending.push({name: en.name, world: en.world});
    save();
    updateDot();
    if(d){
      const b = d.querySelector(".eki-note-kenin");
      if(b) b.remove();
      d.appendChild(sealEl(true));
    }
    toast(`${en.name}の書き込みに検印を押した。届くといいのですが`);
    E.emit("note:stamped", en);
  }

  function openNotebook(){
    view = "note";
    ovl.innerHTML = "";
    const c = cardEl();
    c.innerHTML =
      `<h3>📓 駅ノート</h3>` +
      `<div class="eki-note-sub">改札を通った人が、ときどき何か書いていきます。検印を押すと、返事になります。</div>` +
      `<div class="eki-note-khint">5 / N ＝ 上から順に検印　・　Esc ＝ とじる</div>`;
    if(!data.entries.length)
      c.innerHTML += `<div class="eki-note-empty">まだ何も書かれていません。<br>紙だけが、夜の準備をしています。</div>`;
    for(const en of data.entries) c.appendChild(entryEl(en));
    closeBtn(c);
    ovl.appendChild(c);
    ovl.classList.add("show");
  }

  function openRoster(){
    view = "roster";
    ovl.innerHTML = "";
    const c = cardEl();
    const rows = [...data.roster].sort((a, b) => (b.count - a.count) || ((b.t|0) - (a.t|0)));
    let html =
      `<h3>👥 常連名簿</h3>` +
      `<div class="eki-note-sub">名前を覚えた人の控えです。「いつものところまで」と言われたら、ここで思い出してください。</div>`;
    if(!rows.length)
      html += `<div class="eki-note-empty">まだ誰も載っていません。<br>一度通った人から、順に覚えます。</div>`;
    for(const r of rows){
      const w = WORLDS[r.last];
      html += `<div class="eki-note-row"><span class="eki-note-rname">${esc(r.name)}</span>` +
        `<span class="eki-note-rcount">${r.count|0}回</span>` +
        `<span class="eki-note-rlast">${w ? w.emoji + " " + esc(w.label) : "—"}</span></div>`;
    }
    html += `<div class="eki-note-foot">常連ボーナス累計　${data.bonus|0}回${data.bonus ? "。覚えられる駅は、いい駅です" : ""}</div>`;
    c.innerHTML = html;
    closeBtn(c);
    ovl.appendChild(c);
    ovl.classList.add("show");
  }

  /* ================= ベンチの駅ノート（小道具） ================= */
  const book = mk("g", {class:"eki-note-book", transform:`translate(206 ${PLAT_Y - 26})`});
  const bookIn = mk("g");
  const bookTitle = mk("title");
  bookTitle.textContent = "駅ノート（すこし湿っている）";
  const bookChar = mk("text", {x:2, y:-2.4, "text-anchor":"middle", fill:"#d9c27a",
    "font-size":5, "letter-spacing":"1"});
  bookChar.textContent = "記";
  bookIn.append(
    mk("rect", {x:-16, y:-20, width:38, height:24, fill:"#000", opacity:0}),     // 当たり判定
    mk("rect", {x:-11, y:-9, width:22, height:9, rx:1.6, fill:"#52402c",
      stroke:"rgba(255,181,88,.45)", "stroke-width":.8}),
    mk("rect", {x:-9.5, y:-7.4, width:19, height:1.6, rx:.8, fill:"#e9dec2", opacity:.9}),
    mk("rect", {x:-11, y:-9, width:3.4, height:9, rx:1.6, fill:"#3a2c1e"}),
    mk("ellipse", {cx:-4.5, cy:-4, rx:2.4, ry:1.4, fill:"#3a2c1e", opacity:.5}), // しみ
    mk("rect", {x:12.5, y:-3.2, width:8.5, height:2, rx:1, fill:"#a8503c"}),     // 鉛筆
    bookChar
  );
  const bookDot = mk("circle", {cx:10, cy:-13, r:2.4, fill:"#ffb558"});
  bookDot.animate([{opacity:.25},{opacity:1},{opacity:.25}],
    {duration:1700, iterations:Infinity, easing:"ease-in-out"});
  book.append(bookTitle, bookIn, bookDot);
  E.layers.gFx.append(book);
  book.style.cursor = "pointer";
  book.addEventListener("pointerdown", e => {
    e.preventDefault();
    e.stopPropagation();
    if(view === "note") close(); else openNotebook();
  });
  function updateDot(){
    bookDot.style.display = data.entries.some(x => !x.replied) ? "" : "none";
  }
  function bumpBook(){
    bookIn.animate(
      [{transform:"translate(0,0)"},
       {transform:"translate(0,-7px) rotate(-7deg)"},
       {transform:"translate(0,0)"}],
      {duration:620, easing:"cubic-bezier(.2,1.4,.4,1)"});
    updateDot();
  }

  /* ================= 操作（トップバー・キー・ヒントチップ） ================= */
  const topbar = document.querySelector(".topbar");
  if(topbar){
    const b = document.createElement("button");
    b.className = "btn";
    b.textContent = "👥 常連名簿";
    b.addEventListener("click", () => { if(view === "roster") close(); else openRoster(); });
    topbar.appendChild(b);
  }
  const booth = document.querySelector(".booth");
  if(booth){
    const chip = document.createElement("div");
    chip.className = "eki-note-keychip";
    chip.textContent = "⌨ 1〜4＝はんこ　B＝保留";
    booth.appendChild(chip);
  }
  document.addEventListener("keydown", e => {
    if(e.metaKey || e.ctrlKey || e.altKey || !view) return;
    if(e.key === "Escape"){ close(); e.stopPropagation(); return; }
    if(view === "note" && (e.key === "5" || e.key === "n" || e.key === "N")){
      e.preventDefault();
      const en = data.entries.find(x => !x.replied);
      if(en) stampEntry(en, ovl.querySelector(`[data-id="${en.id}"]`));
      else toast("検印待ちの書き込みはありません");
    }
    e.stopPropagation();   // ノートを読んでいる間、1〜4/B を改札に流さない
  }, true);

  /* ================= 書き込み・名簿の記録 ================= */
  const gatePassed = new WeakSet();      // 改札を通って出た人（夜明けの立ち去りは除く）
  const regulars = new WeakMap();        // p -> {fromNote, last}

  function writeNote(p){
    const w = WORLDS[p.exitWorld] ? p.exitWorld : pick(WK);
    const flavored = NOTE_WORLD[w];
    const text = (flavored && Math.random() < .55) ? pick(flavored) : pick(NOTE_GEN);
    const en = {
      id: Date.now().toString(36) + Math.random().toString(36).slice(2, 7),
      name: p.name, world: w, text, clock: E.clock, t: Date.now(), replied: false,
    };
    data.entries.unshift(en);
    if(data.entries.length > 60) data.entries.length = 60;
    save();
    bumpBook();
    toast(`${p.name}は、駅ノートに何か書き残していった`);
    if(view === "note") openNotebook();
    E.emit("note:written", en);
  }

  function remember(p){
    let r = data.roster.find(x => x.name === p.name);
    if(!r){
      r = {name: p.name, count: 0, last: "shima", t: 0};
      data.roster.unshift(r);
      if(data.roster.length > 40) data.roster.length = 40;
    }
    r.count++;
    r.t = Date.now();
    if(WORLDS[p.exitWorld]) r.last = p.exitWorld;
    save();
  }

  E.on("passenger-stamped", ev => {
    const p = ev && ev.passenger;
    if(!p) return;
    // 正解で通過、または2回目の間違いで「自分で行きます」→ どちらも改札を通る
    if(ev.correct || p.misses >= 1) gatePassed.add(p);
    const info = regulars.get(p);
    if(info && ev.correct && p.misses === 0){
      data.bonus++;
      save();
      const wk = WORLDS[ev.world] ? ev.world : "shima";
      award(wk, 2);
      setTimeout(() => {
        try{
          p.inner.animate(
            [{transform:"rotate(0)"},
             {transform:"rotate(32deg) translate(0,4px)", offset:.3},
             {transform:"rotate(30deg) translate(0,4px)", offset:.72},
             {transform:"rotate(0)"}],
            {duration:1500, easing:"ease-in-out"});
        }catch(err){}
      }, 80);
      setTimeout(() =>
        toast(`${p.name}は深々と、長めのおじぎをした　＋2 ${CURR[wk]}`), 980);
    }
  });

  E.on("passenger-exit", p => {
    if(!p || !gatePassed.has(p)) return;
    remember(p);
    if(Math.random() < .35) writeNote(p);
  });

  /* ================= 常連の帰還 ================= */
  let tonight = data.pending.splice(0);  // 検印した相手は、次の夜に来るかもしれない
  save();
  E.on("shift-start", () => { tonight = data.pending.splice(0); save(); });

  E.on("train-arrived", t => {
    if(!t || E.stats.shiftOver) return;
    let cand = null, fromNote = false;
    if(tonight.length && Math.random() < .7){
      cand = tonight.shift();
      fromNote = true;
    } else if(data.roster.length && Math.random() < .22){   // 降車2〜4人 × 一人あたり約8%
      cand = pick(data.roster);
    }
    if(!cand) return;
    if(E.passengers.some(q => q.name === cand.name)){
      if(fromNote) tonight.push(cand);     // 同名の人がいる夜は、次の列車で
      return;
    }
    const last = WORLDS[cand.last || cand.world] ? (cand.last || cand.world) : pick(WK);
    setTimeout(() => {
      try{
        if(E.stats.shiftOver) return;
        const x = Math.max(60, Math.min(1140, t.stopX + pick(t.doorXs)));
        const p = E.makePassenger({
          name: cand.name,
          manner: fromNote ? "ノートの返事を確かめに来た" : pick(REG_MANNERS),
          world: last,
          riddle: {t: "いつものところまで", h: "名簿に書いてあります。見ても、反則ではありません"},
          x,
        });
        regulars.set(p, {fromNote, last});
        E.enqueue(p);
        E.emit("regular:returned", p);
        toast(fromNote ? `${p.name}「${pick(NOTE_THANKS)}」` : `${p.name}が、今夜も来た`);
      }catch(err){}
    }, 1500 + Math.random()*900);
  });

  /* ================= 切符の「常連」タグ ================= */
  const ticketEl = document.getElementById("ticket");
  if(ticketEl && typeof MutationObserver === "function"){
    new MutationObserver(() => {
      const p = E.queue[0];
      if(!p || p.state !== "gate" || !regulars.has(p)) return;
      const pn = ticketEl.querySelector(".pname");
      if(!pn || pn.querySelector(".eki-note-tag")) return;
      const tag = document.createElement("span");
      tag.className = "eki-note-tag";
      tag.textContent = "常連";
      pn.insertBefore(tag, pn.querySelector(".pm"));
    }).observe(ticketEl, {childList: true});
  }

  updateDot();
})();
</script>

</body>
</html>
