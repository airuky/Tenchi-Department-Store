<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>異界食堂 · Ikai Shokudo</title>
<style>
  :root{
    --ink:#f2e8d5;
    --dim:#9d92a8;
    --acc:#ffb45e;
    --warm:#ffd27a;
    --panel:rgba(22,15,32,.82);
    --panel-edge:rgba(255,180,94,.18);
    --kh:228px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;overflow:hidden;
    background:linear-gradient(#11102e 0%, #0b0a22 55%, #060514 100%);
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",-apple-system,system-ui,sans-serif;
    color:var(--ink);-webkit-font-smoothing:antialiased;}
  #stage{position:fixed;left:0;right:0;top:0;bottom:var(--kh);width:100%;height:calc(100vh - var(--kh));display:block}

  /* ---- toolbar ---- */
  .topbar{position:fixed;top:0;left:0;right:0;display:flex;align-items:center;gap:14px;
    padding:14px 18px;pointer-events:none;z-index:5;}
  .brand{pointer-events:none;font-weight:600;letter-spacing:.04em;font-size:15px;
    text-shadow:0 0 18px rgba(255,180,94,.45);}
  .brand small{display:block;font-weight:400;font-size:11px;color:var(--dim);letter-spacing:.18em;margin-top:2px}
  .spacer{flex:1}
  .btn{pointer-events:auto;cursor:pointer;border:1px solid var(--panel-edge);
    background:var(--panel);color:var(--ink);border-radius:999px;padding:8px 15px;font-size:13px;
    backdrop-filter:blur(10px);transition:.18s;white-space:nowrap;font-family:inherit}
  .btn:hover{border-color:rgba(255,180,94,.5);background:rgba(42,28,40,.88);transform:translateY(-1px)}
  .btn:active{transform:translateY(0)}
  .btn.pill{cursor:default}
  .btn.pill:hover{border-color:var(--panel-edge);background:var(--panel);transform:none}

  /* ---- plugin dock (toy box) ---- */
  .dock{position:fixed;left:14px;bottom:calc(var(--kh) + 14px);display:flex;flex-wrap:wrap;gap:8px;z-index:6;max-width:70vw}
  .dock .btn{pointer-events:auto}
  .dock.folded .btn:not(.dock-toggle){display:none}
  .dock .dock-toggle{font-size:15px;padding:8px 12px}

  /* ---- hint ---- */
  .hint{position:fixed;left:50%;top:38%;transform:translate(-50%,-50%);text-align:center;
    color:var(--dim);font-size:15px;line-height:2;pointer-events:none;z-index:2;
    transition:opacity 1.2s;text-shadow:0 0 20px rgba(0,0,0,.8)}
  .hint .big{font-size:19px;color:var(--ink);letter-spacing:.08em}

  /* ---- side panel (常連帳) ---- */
  .panel{position:fixed;top:64px;right:14px;width:300px;max-height:calc(100vh - var(--kh) - 84px);
    overflow-y:auto;background:var(--panel);border:1px solid var(--panel-edge);border-radius:16px;
    padding:14px;backdrop-filter:blur(14px);z-index:4;
    box-shadow:0 18px 50px rgba(0,0,0,.5);transition:transform .3s, opacity .3s;scrollbar-width:thin;}
  .panel.hidden{transform:translateX(120%);opacity:0;pointer-events:none}
  .panel::-webkit-scrollbar{width:7px}
  .panel::-webkit-scrollbar-thumb{background:rgba(255,180,94,.25);border-radius:4px}
  .panel h2{margin:2px 4px 10px;font-size:13px;letter-spacing:.14em;color:var(--dim);font-weight:600}
  .panel .empty{color:var(--dim);font-size:13px;padding:8px 6px;line-height:1.8}
  .rcard{border:1px solid transparent;border-radius:12px;padding:10px 12px;margin-bottom:8px;
    background:rgba(255,255,255,.03)}
  .rcard .nm{font-size:14px;font-weight:600}
  .rcard .nm em{font-style:normal;font-size:11px;color:var(--acc);margin-left:7px}
  .rcard .meta{font-size:11.5px;color:var(--dim);margin-top:5px;line-height:1.7}

  /* ---- kitchen workspace ---- */
  .kitchen{position:fixed;left:0;right:0;bottom:0;z-index:5;
    background:rgba(16,11,24,.92);border-top:1px solid var(--panel-edge);
    backdrop-filter:blur(12px);padding:10px 14px 12px;max-height:46vh;overflow-y:auto;scrollbar-width:thin}
  .khead{display:flex;align-items:center;gap:12px;margin-bottom:9px;flex-wrap:wrap}
  .klabel{font-size:12px;letter-spacing:.18em;color:var(--dim);font-weight:600}
  .board{font-size:12px;color:#cfe3c8;background:#16241c;border:1px solid #34483a;
    border-radius:7px;padding:5px 11px;letter-spacing:.04em}
  .board b{color:#ffe9ad;font-weight:600}
  .dishname{font-size:13px;color:var(--warm);letter-spacing:.03em;min-height:1em}
  .btn.serve{background:rgba(255,180,94,.16);border-color:rgba(255,180,94,.45);font-weight:600}
  .btn.serve:hover:not(:disabled){background:rgba(255,180,94,.3)}
  .btn.serve:disabled{opacity:.35;cursor:default;transform:none}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:7px}
  .ing{border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:7px 10px;cursor:pointer;
    background:rgba(255,255,255,.035);transition:.15s;user-select:none}
  .ing:hover{background:rgba(255,180,94,.08);border-color:rgba(255,180,94,.3)}
  .ing.sel{background:rgba(255,180,94,.14);border-color:var(--acc);transform:translateY(-2px);
    box-shadow:0 6px 16px rgba(0,0,0,.35)}
  .ing .nm{font-size:13px;font-weight:600;letter-spacing:.02em}
  .ing .tg{margin-top:4px;display:flex;gap:4px;flex-wrap:wrap}
  .ing .tg span{font-size:10.5px;color:var(--dim);border:1px solid rgba(255,255,255,.1);
    border-radius:999px;padding:1px 7px}
  .ing.sel .tg span{color:var(--warm);border-color:rgba(255,180,94,.4)}

  /* ---- night-end card ---- */
  .nightcard{position:fixed;inset:0;z-index:8;display:flex;align-items:center;justify-content:center;
    background:rgba(5,4,12,.6);backdrop-filter:blur(4px);opacity:0;pointer-events:none;transition:opacity .35s}
  .nightcard.show{opacity:1;pointer-events:auto}
  .nc{width:min(380px,90vw);background:var(--panel);border:1px solid var(--panel-edge);border-radius:16px;
    padding:22px 24px;box-shadow:0 22px 60px rgba(0,0,0,.6);
    transform:translateY(12px);transition:transform .35s}
  .nightcard.show .nc{transform:translateY(0)}
  .nc h3{margin:0 0 14px;font-size:15px;letter-spacing:.1em;color:var(--warm);font-weight:600}
  .nc .row{display:flex;justify-content:space-between;font-size:13.5px;padding:6px 2px;
    border-bottom:1px dashed rgba(255,255,255,.08)}
  .nc .row b{color:var(--ink);font-weight:600}
  .nc .row span{color:var(--dim)}
  .nc .foot{font-size:12px;color:var(--dim);font-style:italic;margin:14px 0 16px;line-height:1.9}
  .nc .btn{display:block;margin:0 auto;font-size:14px;padding:9px 22px}

  .toast{position:fixed;left:50%;bottom:calc(var(--kh) + 14px);transform:translateX(-50%) translateY(20px);
    background:var(--panel);border:1px solid var(--panel-edge);border-radius:999px;
    padding:9px 18px;font-size:13px;backdrop-filter:blur(10px);opacity:0;transition:.3s;z-index:7;pointer-events:none}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<svg id="stage" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 620" preserveAspectRatio="xMidYMax meet"></svg>

<div class="topbar">
  <div class="brand">異界食堂<small>IKAI SHOKUDO</small></div>
  <div class="spacer"></div>
  <div class="btn pill" id="repPill">⭐ 評判 0</div>
  <button class="btn" id="toggleRegulars">📓 常連帳</button>
</div>

<div class="hint" id="hint">
  <div class="big">ようこそ。ここは夜にだけ開く食堂です</div>
  お客の注文をきいて、下の調理場から食材を3つえらんで「お出しする」<br>
  <span style="font-size:13px">ことばのてざわり（温・ぬるぬる・なつかしい…）を合わせるのがコツです</span>
</div>

<div class="panel hidden" id="panel">
  <h2>常連帳 — REGULARS</h2>
  <div id="regularsList"></div>
</div>

<div class="kitchen" id="kitchen">
  <div class="khead">
    <span class="klabel">調理場</span>
    <span class="board" id="board"></span>
    <span class="spacer"></span>
    <span class="dishname" id="dishName"></span>
    <button class="btn serve" id="serveBtn" disabled>お出しする</button>
  </div>
  <div class="grid" id="pantry"></div>
</div>

<div class="nightcard" id="nightcard"><div class="nc" id="ncInner"></div></div>
<div class="toast" id="toast"></div>
<div class="dock" id="dock"></div>
<script>
(() => {
  "use strict";
  const SVGNS = "http://www.w3.org/2000/svg";
  const stage = document.getElementById("stage");

  // ---- tiny helpers ----
  function mk(tag, attrs){
    const el = document.createElementNS(SVGNS, tag);
    if(attrs) for(const k in attrs) el.setAttribute(k, attrs[k]);
    return el;
  }
  const pick = a => a[(Math.random()*a.length)|0];
  const esc = s => String(s).replace(/[&<>"']/g, m =>
    ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));
  function shuffle(a){
    const b = a.slice();
    for(let i=b.length-1;i>0;i--){ const j=(Math.random()*(i+1))|0; [b[i],b[j]]=[b[j],b[i]]; }
    return b;
  }
  function mulberry32(seed){
    let t = seed >>> 0;
    return () => {
      t += 0x6D2B79F5;
      let r = Math.imul(t ^ t >>> 15, 1 | t);
      r ^= r + Math.imul(r ^ r >>> 7, 61 | r);
      return ((r ^ r >>> 14) >>> 0) / 4294967296;
    };
  }
  // 文字数で折り返す（「、」を優先）
  function wrap(text, n=14){
    const segs = String(text).split("、");
    const lines = [];
    let cur = "";
    segs.forEach((s, i) => {
      const piece = s + (i < segs.length-1 ? "、" : "");
      if(cur && (cur+piece).length > n){ lines.push(cur); cur = piece; }
      else cur += piece;
      while(cur.length > n+4){ lines.push(cur.slice(0,n+2)); cur = cur.slice(n+2); }
    });
    if(cur) lines.push(cur);
    return lines;
  }

  // ---- storage (always guarded) ----
  function loadLS(key, def){
    try{ const v = localStorage.getItem(key); return v === null ? def : JSON.parse(v); }
    catch(e){ return def; }
  }
  function saveLS(key, val){
    try{ localStorage.setItem(key, JSON.stringify(val)); }catch(e){}
  }

  // ---- plugin event bus ----
  const listeners = new Map();
  function on(name, fn){
    if(!listeners.has(name)) listeners.set(name, []);
    listeners.get(name).push(fn);
  }
  function emit(name, arg){
    for(const f of listeners.get(name) || []){
      try{ f(arg); }catch(err){ console.error(`[plugin handler for "${name}"]`, err); }
    }
  }

  // ====================================================================
  //  corpora — tags, pantry, worlds, lines
  // ====================================================================
  const TAG_GROUPS = [
    ["温","冷"],
    ["ぬるぬる","かりかり","ふわふわ"],
    ["甘い","しょっぱい","にがい","なつかしい"],
    ["光る","静かな","にぎやかな"],
  ];
  const TAGS = TAG_GROUPS.flat();
  const TAG_FRAGS = {
    "温":["あたたかくて","湯気の立つ"],
    "冷":["ひんやりした","つめたい"],
    "ぬるぬる":["ぬるぬるした"],
    "かりかり":["かりかりの"],
    "ふわふわ":["ふわふわした"],
    "甘い":["甘い","甘めの"],
    "しょっぱい":["しょっぱい","塩のきいた"],
    "にがい":["すこし苦い"],
    "なつかしい":["なつかしい味の","故郷の味に、すこし似ていて、すこし違う"],
    "光る":["光る","ほのかに光る"],
    "静かな":["静かな","いちばん静かな"],
    "にぎやかな":["にぎやかな","祭りみたいな"],
  };
  const ORDER_ENDINGS = [
    "ものをください","ものを。急ぎません","のがいいです",
    "やつを。名前は知りません","ものはありますか。なければ似たもので",
    "のを。夢で食べた気がします","ものを。医者には内緒で",
  ];
  const REG_LINES = [
    "いつもの。","いつものを。説明は省きます。","あれです。あの、いつもの。",
    "今日も、例のやつを。","いつもの。変えないでください。","……（うなずいた。いつものだ）",
  ];
  const INGREDIENT_POOL = [
    {name:"月見うどん玉", dn:"月見", tags:["温","なつかしい"]},
    {name:"発光きのこ", dn:"きのこ", tags:["光る","にがい"]},
    {name:"凍った波", dn:"波", tags:["冷","静かな"]},
    {name:"歩くワカメ", dn:"ワカメ", tags:["ぬるぬる","にぎやかな"]},
    {name:"星屑ふりかけ", dn:"星屑", tags:["光る","甘い"]},
    {name:"思い出の出汁", dn:"思い出", tags:["温","なつかしい"]},
    {name:"揚げたての流れ星", dn:"流れ星", tags:["かりかり","光る"]},
    {name:"雲の白玉", dn:"白玉", tags:["ふわふわ","甘い"]},
    {name:"深海の塩", dn:"塩", tags:["しょっぱい","静かな"]},
    {name:"黙りこむ豆腐", dn:"豆腐", tags:["静かな","ふわふわ"]},
    {name:"祭囃子の佃煮", dn:"佃煮", tags:["にぎやかな","しょっぱい"]},
    {name:"昨日の雨", dn:"雨", tags:["冷","なつかしい"]},
    {name:"よく喋る山椒", dn:"山椒", tags:["にぎやかな","にがい"]},
    {name:"真夜中の温泉卵", dn:"温玉", tags:["静かな","温"]},
    {name:"砂浜のクッキー", dn:"砂浜", tags:["かりかり","甘い"]},
    {name:"苦労した昆布", dn:"昆布", tags:["にがい","ぬるぬる"]},
    {name:"毛糸のそうめん", dn:"そうめん", tags:["温","ふわふわ"]},
    {name:"凍み月のかけら", dn:"月", tags:["冷","光る"]},
    {name:"焼いた木枯らし", dn:"木枯らし", tags:["かりかり","冷"]},
    {name:"うろこ雲の南蛮漬け", dn:"南蛮", tags:["しょっぱい","ぬるぬる"]},
    {name:"初恋の砂糖漬け", dn:"初恋", tags:["甘い","なつかしい"]},
    {name:"雷おこし（本物）", dn:"雷", tags:["かりかり","にぎやかな"]},
    {name:"蛍イカの寝言", dn:"寝言", tags:["光る","静かな"]},
    {name:"あの日の給食カレー", dn:"カレー", tags:["温","なつかしい"]},
    {name:"泣いた塩むすび", dn:"むすび", tags:["しょっぱい","なつかしい"]},
    {name:"ふくらむ闇", dn:"闇", tags:["ふわふわ","にがい"]},
  ];
  const FORMS = ["和え","鍋","茶漬け","蒸し","椀","丼","スープ","定食"];

  const WORLDS = {
    shinkai:  {label:"深海の客",   cur:"currency-shinkai",   hues:[210,225,195],
               tip:"チップに真珠を置いていきました"},
    shima:    {label:"島の客",     cur:"currency-shima",     hues:[35,28,45],
               tip:"チップに貝殻と小銭を置いていきました"},
    rekishi:  {label:"年代記の客", cur:"currency-rekishi",   hues:[275,290,260],
               tip:"チップに古い銀貨を置いていきました。元号が読めません"},
    hoshizora:{label:"星空の客",   cur:"currency-hoshizora", hues:[230,250,215],
               tip:"チップに星のかけらを置いていきました。まだ温かい"},
    kinjo:    {label:"ご近所の常連", cur:null, hues:[25,30,20],
               tip:"チップに葉っぱを置いていきました。あとで数えます"},
  };
  const WORLD_KEYS = ["shinkai","shima","rekishi","hoshizora","kinjo"];
  const NAMES = {
    shinkai:  ()=> pick(["ヒレ","ウロコ","シオ","ナミ","フカ","クラゲ"]) + pick(["ナガ","マル","スケ","コ","ジマ"]) + "さん",
    shima:    ()=> pick(["磯野","浜田","椰子田","南風原","渚","潮見"]) + "さん",
    rekishi:  ()=> pick(["遍歴の","引退した","三代目","袖すれの","匿名の"]) + pick(["勇者","魔導士","写本師","吟遊詩人","騎士"]),
    hoshizora:()=> pick(["こと座の","ベガ似の","等級不明の","流れそこねた","北寄りの"]) + pick(["ひと","星","客","灯り"]),
    kinjo:    ()=> "タヌキの" + pick(["ポン","マメ","ブン","チャ","ドン"]) + pick(["タ","キチ","スケ","マル"]),
  };
  const MOODS = ["腹ぺこ","しずか","上機嫌","眠そう","旅疲れ","物思い"];

  const REACTIONS = {
    3: ["……故郷より故郷でした。困ります","星のあじがする。たぶん合ってる",
        "器まで食べていいか、3秒考えました","これを知らない頃の自分のことは、忘れます",
        "無言になりましたが、いい無言です","明日もこの席は空いていますか。空けてください",
        "涙が出ました。成分はだいたい出汁です"],
    2: ["おいしいです。事実として","悪くない。むしろ良い。語彙が追いつきません",
        "故郷の味に、すこし勝っています。内緒にします","湯気の角度が良かった",
        "八割がた正解です。残り二割は私の問題です","ごちそうさま。皿は光るほど空です"],
    1: ["……方向性は感じました。方向だけ","嫌いではないです。好きへの道は遠いですが",
        "半分は当たりです。どの半分かは言えません","これはこれで。これはこれとして",
        "故郷を思い出しかけて、やめました","水がおいしかったです"],
    0: ["お皿は綺麗です。それだけは","……今日はそういう日だったのだと思います",
        "箸が一度も迷いませんでした。戻る方向に","これの得意な人を知っています。私ではないです",
        "注文を、覚えていますか。いえ、いいんです","持ち帰りはできますか。できなくていいです"],
  };
  const CLOSE_LINES = [
    "のれんを下ろした。湯気はまだ立っている。","看板の灯を消した。猫はまだいる。",
    "売上を数えた。葉っぱが混ざっていた。","椅子を拭いた。一脚だけ、まだ温かい。",
    "鍋の底に夜が少し残った。明日の出汁にする。","外は静かだ。異界も寝る時間らしい。",
  ];

  // ====================================================================
  //  scene — viewBox 1000x620, counter mid, stools, noren, lantern, window
  // ====================================================================
  const defs   = mk("defs");
  const gBack  = mk("g");   // wall, window, noren, lantern
  const gStool = mk("g");   // stools
  const gCust  = mk("g");   // customers
  const gCount = mk("g");   // counter top (overlaps customers' laps)
  const gFx    = mk("g");   // bubbles, steam, stars
  stage.append(defs, gBack, gStool, gCust, gCount, gFx);

  defs.innerHTML = `
    <linearGradient id="wallG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1b1838"/><stop offset="70%" stop-color="#120f28"/>
      <stop offset="100%" stop-color="#0c0a1d"/>
    </linearGradient>
    <linearGradient id="woodG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8a5a30"/><stop offset="35%" stop-color="#6e4423"/>
      <stop offset="100%" stop-color="#4e2f17"/>
    </linearGradient>
    <linearGradient id="skyG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a1034"/><stop offset="100%" stop-color="#141a4a"/>
    </linearGradient>
    <radialGradient id="lantG" cx=".5" cy=".42" r=".75">
      <stop offset="0%" stop-color="#ffe9b0"/><stop offset="55%" stop-color="#ffb45e"/>
      <stop offset="100%" stop-color="#c96f2a"/>
    </radialGradient>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="5"/></filter>
    <filter id="softglow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>`;

  function buildScene(){
    // wall + floor
    gBack.append(mk("rect",{x:0,y:0,width:1000,height:620,fill:"url(#wallG)"}));
    gBack.append(mk("rect",{x:0,y:548,width:1000,height:72,fill:"#171024"}));
    for(let i=0;i<7;i++)
      gBack.append(mk("line",{x1:60+i*140,y1:548,x2:40+i*140,y2:620,stroke:"#221833","stroke-width":2}));

    // window (right) with night sky
    const win = mk("g",{transform:"translate(700,84)"});
    win.innerHTML = `
      <rect x="-8" y="-8" width="216" height="186" rx="10" fill="#2c1f16"/>
      <rect x="0" y="0" width="200" height="170" rx="5" fill="url(#skyG)"/>

    return shuffle(TAG_GROUPS).slice(0, k).map(g => pick(g));
  }
  function orderText(tags){
    const frags = tags.map(t => pick(TAG_FRAGS[t]));
    return frags.join("、") + pick(ORDER_ENDINGS);

  function makeCustomer(over){
    over = over || {};
    const world = over.world || pick(WORLD_KEYS);
    const seed  = over.seed != null ? over.seed : (Math.random()*1e9)|0;
    let name = over.name;
    if(!name && world === "shinkai") name = zukanCameo();
    if(!name) name = NAMES[world]();
    const c = {
      id: nextId++, name, world, seed,
      hue: over.hue != null ? over.hue : pick(WORLDS[world].hues),
      mood: pick(MOODS),
      seat: over.seat != null ? over.seat : pick(SEATS),
      regular: over.regular || null,        // ref into regulars[]
      order: null, el: null, served: false,
    };
    if(c.regular){
      const t = c.regular.tags.slice();
      c.order = { tags: shuffle(t).slice(0, Math.min(3, t.length)),
                  text: pick(REG_LINES), isUsual: true };
    } else {
      const tags = makeOrderTags();
      c.order = { tags, text: orderText(tags), isUsual: false };
    }
    return c;
  }

  // ---- speech bubble (pure SVG, wraps text) ----
  let bubbleEl = null;
  function showBubble(c, text, opts){
    opts = opts || {};
    hideBubble();
    const lines = wrap(text, 14);
    const header = `${c.name}（${c.mood}）`;
    const lineH = 21, padX = 16, padY = 12;
    const wMax = Math.max(header.length*11.5, ...lines.map(l=>l.length*14.8), 110);
    const bw = Math.min(wMax + padX*2, 360);
    const bh = padY*2 + 15 + lines.length*lineH + (opts.stars ? 22 : 0);
    const bx = Math.max(70 + bw/2, Math.min(930 - bw/2, c.seat));
    const by = 232;                        // bubble bottom
    const g = mk("g");
    g.append(mk("polygon",{points:`${c.seat-9},${by+4} ${c.seat+9},${by+4} ${c.seat},${by+22}`,
      fill:"#f5ecd9"}));
    g.append(mk("rect",{x:bx-bw/2, y:by-bh, width:bw, height:bh, rx:13,
      fill:"#f5ecd9", stroke:"rgba(40,25,20,.35)", "stroke-width":1.5}));
    const hd = mk("text",{x:bx, y:by-bh+padY+9, "text-anchor":"middle",
      "font-size":11, fill:"#8a7a68", "letter-spacing":1});
    hd.textContent = c.regular ? header + "・常連" : header;
    g.append(hd);
    lines.forEach((l,i)=>{
      const t = mk("text",{x:bx, y:by-bh+padY+32+i*lineH, "text-anchor":"middle",
        "font-size":14.5, fill:"#2a2034", "font-weight":600});
      t.textContent = l;
      g.append(t);
    });
    if(opts.stars != null){
      const t = mk("text",{x:bx, y:by-padY-3, "text-anchor":"middle","font-size":15,
        fill:"#d99a2b", "letter-spacing":3});
      t.textContent = opts.stars > 0 ? "★".repeat(opts.stars) : "…";
      g.append(t);

    g.style.transformOrigin = `${c.seat}px ${by+22}px`;
    g.style.transformBox = "view-box";
    g.animate([{transform:"scale(.6)", opacity:0},{transform:"scale(1)", opacity:1}],

    customers.push(c);
    state.current = c;
    setTimeout(()=>{
      if(state.current !== c) return;
      showBubble(c, c.order.text);
      state.phase = "waiting";
      renderPantry();
    }, 1280);
    if(c.regular){
      visitedTonight.add(c.name);
      toast(`常連の${c.name}が来ました。覚えていますか`);
      emit("regular-returned", c);
    } else {
      toast(`${c.name}（${WORLDS[c.world].label}）が来店しました`);
    }
    emit("customer-arrived", c);
    return c;
  }

  function customerLeaves(c){
    hideBubble();
    const a = c.el.animate([
      {transform:`translate(${c.seat}px, 470px)`, opacity:1},
      {transform:"translate(1090px, 470px)", opacity:1},
    ],{duration:1050, easing:"cubic-bezier(.55,.06,.7,.4)"});
    a.onfinish = () => c.el.remove();
    const at = customers.indexOf(c);
    if(at >= 0) customers.splice(at, 1);
    if(state.current === c) state.current = null;
    emit("customer-left", c);
  }

  // ---- serving & judging ----
  function serve(){
    if(state.phase !== "waiting" || !previewDish || !state.current) {
      if(!state.current) toast("お客さんがまだ来ていません");
      return;
    }
    const c = state.current, dish = previewDish;
    state.phase = "react";
    serveBtn.disabled = true;
    const matches = c.order.tags.filter(t => dish.tags.includes(t)).length;
    const need = c.order.tags.length;
    const tier = matches >= need ? 3 : (matches >= 2 ? 2 : matches);
    const bonus = state.specials.every(t => dish.tags.includes(t)) ? 1 : 0;

    steamBurst(c.seat, 372);
    setTimeout(()=>{
      showBubble(c, pick(REACTIONS[tier]), {stars:tier});
      if(tier > 0) starFloat(c.seat, 250, tier);
      state.rep += tier + bonus;
      saveLS("shokudo-rep", state.rep);
      renderRep(tier + bonus > 0);
      if(bonus) setTimeout(()=>toast("本日のおすすめと一致。黒板の面目が立ちました（評判+1）"), 600);

      const T = state.tonight;
      T.served++; life.served++;
      if(tier >= 2) T.satisfied++;
      if(tier === 3){ T.star3++; life.star3++; registerRegular(c, dish); }
      T.repGained += tier + bonus;

      // tip
      const tipChance = tier === 3 ? .6 : tier === 2 ? .25 : 0;
      if(Math.random() < tipChance){
        const amt = 2 + ((Math.random()*5)|0);
        const w = WORLDS[c.world];
        if(award(c.world, amt)){
          T.tips += amt;
          setTimeout(()=>toast(`${w.tip}（+${amt}）`), 1500);
        } else {
          setTimeout(()=>toast(w.tip), 1500);
        }
        emit("tip", {customer:c, world:c.world, amount:w.cur ? amt : 0});
      }
      saveLS("shokudo-life-v1", life);
      emit("dish-served", {customer:c, dish, score:tier});

      sel = []; previewDish = null; renderPantry();
      setTimeout(()=>{
        customerLeaves(c);
        state.phase = "empty";
        flowT = setTimeout(nextStep, 1500 + Math.random()*1700);
      }, 3000);
    }, 700);
  }
  serveBtn.addEventListener("click", serve);
  window.addEventListener("keydown", e => {
    if(e.key === "Enter" && !serveBtn.disabled) serve();
  });

  function registerRegular(c, dish){
    let r = regulars.find(r => r.name === c.name);
    if(r){ r.visits++; r.tags = dish.tags.slice(); r.dish = dish.name; r.lastNight = state.night; }
    else {
      r = {name:c.name, world:c.world, hue:c.hue, seed:c.seed,
           tags:dish.tags.slice(), dish:dish.name, visits:1, lastNight:state.night};
      regulars.push(r);
      setTimeout(()=>toast(`${c.name}は常連になりそうです（常連帳に記載）`), 2400);
    }
    visitedTonight.add(c.name);
    saveLS("shokudo-regulars-v1", regulars);
    renderRegulars();
  }

  // ---- night flow ----
  function startNight(n){
    customers.slice().forEach(c => { try{ c.el && c.el.remove(); }catch(e){} });
    customers.length = 0; state.current = null; hideBubble();
    state.night = n;
    saveLS("shokudo-night", n);
    state.pantry = shuffle(INGREDIENT_POOL).slice(0, 18);
    state.specials = shuffle(TAG_GROUPS).slice(0,2).map(g => pick(g));
    state.tonight = {night:n, total:5+((Math.random()*5)|0), served:0, satisfied:0,
                     star3:0, tips:0, repGained:0};
    visitedTonight.clear();
    sel = []; previewDish = null;
    state.phase = "empty";
    renderPantry(); renderBoard(); renderRep();
    toast(`第${n}夜。のれんを出しました（お客 ${state.tonight.total}名の気配）`);
    emit("night-start", {night:n});
    clearTimeout(flowT);
    flowT = setTimeout(nextStep, 2400);
  }
  function nextStep(){
    if(state.phase !== "empty") return;
    if(state.tonight.served >= state.tonight.total){ endNight(); return; }
    spawnCustomer();
  }
  function endNight(){
    state.phase = "closed";
    const T = state.tonight;
    life.nights++; saveLS("shokudo-life-v1", life);
    const rate = T.served ? Math.round(T.satisfied / T.served * 100) : 0;
    const inner = document.getElementById("ncInner");
    inner.innerHTML = `
      <h3>本日の営業成績 — 第${T.night}夜</h3>
      <div class="row"><span>来店</span><b>${T.served} 名</b></div>
      <div class="row"><span>満足率</span><b>${rate}%</b></div>
      <div class="row"><span>大満足（★3）</span><b>${T.star3} 名</b></div>
      <div class="row"><span>チップ</span><b>${T.tips}</b></div>
      <div class="row"><span>評判</span><b>+${T.repGained} → ⭐${state.rep}</b></div>
      <div class="foot">${esc(pick(CLOSE_LINES))}</div>
      <button class="btn" id="nextNightBtn">また明日も開ける</button>`;
    document.getElementById("nightcard").classList.add("show");
    document.getElementById("nextNightBtn").addEventListener("click", ()=>{
      document.getElementById("nightcard").classList.remove("show");
      startNight(state.night + 1);
    });
    emit("night-end", {stats:{...T, rate, rep:state.rep}});
  }

  // ---- regulars panel ----
  const regularsList = document.getElementById("regularsList");
  function renderRegulars(){
    if(!regulars.length){
      regularsList.innerHTML = `<div class="empty">まだ誰も。★3の一皿が、人を常連にします。</div>`;
      return;
    }
    regularsList.innerHTML = regulars.map(r=>`
      <div class="rcard">
        <div class="nm">${esc(r.name)}<em>${esc(WORLDS[r.world] ? WORLDS[r.world].label : "?")}・${r.visits}回</em></div>
        <div class="meta">いつもの：${r.tags.map(esc).join("・")}<br>（${esc(r.dish)}）</div>
      </div>`).join("");
  }
  document.getElementById("toggleRegulars").addEventListener("click", ()=>{
    document.getElementById("panel").classList.toggle("hidden");
    renderRegulars();
  });

  // ---- dock ----
  const dock = document.getElementById("dock");
  const dockToggle = document.createElement("button");
  dockToggle.className = "btn dock-toggle";
  dockToggle.textContent = "🧰";
  dockToggle.title = "おもちゃ箱をひらく／たたむ";
  dockToggle.addEventListener("click", () => dock.classList.toggle("folded"));
  dock.append(dockToggle);
  function addButton(label, onClick){
    const b = document.createElement("button");
    b.className = "btn";
    b.textContent = label;
    b.addEventListener("click", onClick);
    dock.append(b);
    return b;
  }

  // ---- hint & toast ----
  const hint = document.getElementById("hint");
  let hintT = setTimeout(hideHint, 11000);
  function hideHint(){ clearTimeout(hintT); hint.style.opacity = 0; }
  pantryEl.addEventListener("click", hideHint, {once:true});

  const toastEl = document.getElementById("toast");
  let toastT = null;
  function toast(msg){
    toastEl.textContent = msg; toastEl.classList.add("show");
    clearTimeout(toastT); toastT = setTimeout(()=>toastEl.classList.remove("show"), 2600);
  }

  // ==================================================================
  //  plugin API
  // ==================================================================
  window.SHOKUDO = {
    stage, defs, gBack, gStool, gCust, gCount, gFx,
    kitchen: document.getElementById("kitchen"), pantryEl,
    SEATS,
    customers, regulars,             // live arrays (do not reassign)
    state,                           // {night, rep, phase, specials, pantry, current, tonight}
    mk, toast, pick, esc, wrap, shuffle,
    makeCustomer, customerGroup,     // pure-ish: customer -> fresh <g> (origin = seat, feet y0)
    spawnCustomer, serve, startNight, endNight,
    showBubble, hideBubble, steamBurst, starFloat,
    award,                           // award(worldKey, amount) -> bool (world currencies)
    addButton,
    lore: {TAGS, TAG_GROUPS, TAG_FRAGS, INGREDIENT_POOL, FORMS, WORLDS, NAMES, MOODS,
           ORDER_ENDINGS, REG_LINES, REACTIONS, CLOSE_LINES},
    on, emit,                        // events: customer-arrived(c), dish-served({customer,dish,score}),
                                     //   customer-left(c), night-start({night}), night-end({stats}),
                                     //   regular-returned(c), tip({customer,world,amount})
                                     // plugins may emit custom namespaced events (e.g. "okami:special")
  };

  // ---- opening ----
  buildScene();
  renderRegulars();
  renderRep();
  scheduleCat();
  setTimeout(()=>{ try{ catVisit(); }catch(e){} }, 14000);
  startNight(state.night);
})();
</script>

<script>
// ════ plugin: shokudo-shiire (wave2) ════ Append before </body> after the core script. 海流仕入れ: read-only BroadcastChannel("sandbox-kairyu-v1") listener (never posts) + 2-min read-only peeks at kairyu-inb
(() => {
  "use strict";
  if(!window.SHOKUDO) return;
  if(window.__shokudoShiire) return;
  window.__shokudoShiire = true;
  const S = window.SHOKUDO;
  const LSK = "shokudo-shiire";

  // ---- storage (guarded) ----
  const lj = (k, d) => { try{ const v = localStorage.getItem(k); return v === null ? d : JSON.parse(v); }catch(e){ return d; } };
  const sj = (k, v) => { try{ localStorage.setItem(k, JSON.stringify(v)); }catch(e){} };

  // ---- style ----
  const css = document.createElement("style");
  css.textContent = `
    .ing.shokudo-shiire-ltd{position:relative;border-color:rgba(127,232,255,.38);background:rgba(127,232,255,.06)}
    .ing.shokudo-shiire-ltd:hover{border-color:rgba(127,232,255,.6);background:rgba(127,232,255,.1)}
    .ing.shokudo-shiire-ltd.sel{border-color:#7fe8ff;background:rgba(127,232,255,.16)}
    .ing.shokudo-shiire-ltd.sel .tg span{color:#bfeaff;border-color:rgba(127,232,255,.45)}
    .shokudo-shiire-ribbon{position:absolute;top:-8px;right:8px;font-size:10px;letter-spacing:.1em;
      color:#062430;background:#7fe8ff;border-radius:999px;padding:1.5px 8px;font-weight:700;
      pointer-events:none;box-shadow:0 2px 8px rgba(0,0,0,.45)}
    .shokudo-shiire-feed:disabled{opacity:.38;cursor:default;transform:none}
    @keyframes shokudo-shiire-pulse{0%,100%{box-shadow:0 0 8px rgba(255,210,122,.16)}50%{box-shadow:0 0 18px rgba(255,210,122,.42)}}
    .shokudo-shiire-feed.shokudo-shiire-on{border-color:rgba(255,210,122,.6);animation:shokudo-shiire-pulse 1.8s ease-in-out infinite}
  `;
  document.head.append(css);

  // ====================================================================
  //  corpora
  // ====================================================================
  const KEY_TAGS = [
    ["凍","冷"],["氷","冷"],["雪","冷"],["冷","冷"],["蜃気楼","冷"],
    ["焼い","かりかり"],["揚げ","かりかり"],["煎","かりかり"],["干物","かりかり"],
    ["湯","温"],["温","温"],["蒸","温"],["南風","温"],
    ["光","光る"],["星","光る"],["蛍","光る"],["月","光る"],
    ["蜜","甘い"],["糖","甘い"],["パパイヤ","甘い"],["バナナ","甘い"],["果","甘い"],["甘","甘い"],
    ["塩","しょっぱい"],["潮","しょっぱい"],["海","しょっぱい"],["ウニ","しょっぱい"],
    ["苦","にがい"],["渋","にがい"],["発酵","にがい"],
    ["眠","静かな"],["昼寝","静かな"],["静","静かな"],["ひそ","静かな"],["人見知り","静かな"],["夜","静かな"],
    ["歩","にぎやかな"],["踊","にぎやかな"],["歌","にぎやかな"],["喋","にぎやかな"],["祭","にぎやかな"],["雷","にぎやかな"],
    ["ワカメ","ぬるぬる"],["昆布","ぬるぬる"],["クラゲ","ぬるぬる"],["藻","ぬるぬる"],["泳","ぬるぬる"],["ぬる","ぬるぬる"],
    ["雲","ふわふわ"],["綿","ふわふわ"],["パン","ふわふわ"],["ふわ","ふわふわ"],
    ["昔","なつかしい"],["思い出","なつかしい"],["古","なつかしい"],["夕焼け","なつかしい"],["故郷","なつかしい"],
  ];
  // 珍しい→なつかしい＋にぎやかな（既定）
  const DEFAULT_TAGS = ["なつかしい","にぎやかな"];
  const BOAT_GOODS = [
    {name:"歌うヤシガニ",     island:"まどろみ礁"},
    {name:"満月のパパイヤ",   island:"三日月環礁"},
    {name:"遠泳してきたバナナ", island:"流れ藻島"},
    {name:"塩漬けの南風",     island:"潮鳴り岬"},
    {name:"発酵した夕焼け",   island:"夕凪島"},
    {name:"人見知りのウニ",   island:"ひそひそ岩礁"},
    {name:"波音の干物",       island:"さざなみ州"},
    {name:"昼寝する夜光貝",   island:"うずまき島"},
    {name:"よく冷えた蜃気楼", island:"かげろう環礁"},
  ];
  const LTD_REMARKS = [
    "限定の味がします。具体的には、嬉しい味",
    "市場の噂は本当だったんですね",
    "島の風の味がする。便りより速い",
    "来週にはもう無い味でしょう。覚えました",
    "海の向こうの話を、皿で聞きました",
  ];

  function inferTags(name){
    const out = [];
    for(const [kw, tag] of KEY_TAGS){
      if(name.indexOf(kw) >= 0 && out.indexOf(tag) < 0){
        out.push(tag);
        if(out.length === 2) return out;
      }
    }
    for(const t of DEFAULT_TAGS) if(out.length < 2 && out.indexOf(t) < 0) out.push(t);
    return out;
  }
  function dnOf(n){
    n = String(n);
    let s = n.split("の").pop() || n;
    s = s.replace(/^(歩く|踊る|歌う|喋る|凍った|焼いた|揚げた|発酵した|昼寝する|遠泳してきた|よく冷えた|塩漬け)/, "");
    if(s.length > 4) s = s.slice(-4);
    return s || n.slice(-2);
  }

  // ====================================================================
  //  1) 海流仕入れ — limited-time ingredients from the ocean-mail network
  // ====================================================================
  let seen = lj(LSK + "-seen", []);          // envelope ids (cap 64)
  let ltd  = lj(LSK + "-ltd", []);           // active limited items
  let everSeen = lj(LSK + "-ever", false);   // a real envelope was ever seen
  if(!Array.isArray(seen)) seen = [];
  if(!Array.isArray(ltd)) ltd = [];

  function syncKH(){ try{ window.dispatchEvent(new Event("resize")); }catch(e){} }

  function decorate(){
    const cards = S.pantryEl.querySelectorAll(".ing");
    for(const card of cards){
      const it = S.state.pantry[+card.dataset.i];
      if(!it || !it.shiireLtd || card.dataset.shiireDeco) continue;
      card.dataset.shiireDeco = "1";
      card.classList.add("shokudo-shiire-ltd");
      card.title = `${it.island}産・${S.state.night > it.night ? "今夜かぎり" : "明晩まで"}`;
      const r = document.createElement("span");
      r.className = "shokudo-shiire-ribbon";
      r.textContent = "限定";
      card.append(r);
    }
  }
  // the core re-renders the grid via innerHTML — re-apply ribbons each time
  try{
    new MutationObserver(() => { try{ decorate(); }catch(e){} })
      .observe(S.pantryEl, {childList:true});
  }catch(e){}

  function appendCard(it){
    try{
      const i = S.state.pantry.indexOf(it);
      if(i < 0) return;
      const div = document.createElement("div");
      div.className = "ing";
      div.dataset.i = i;
      div.innerHTML = `<div class="nm">${S.esc(it.name)}</div>
        <div class="tg">${it.tags.map(t => `<span>${S.esc(t)}</span>`).join("")}</div>`;
      S.pantryEl.append(div);
      decorate();
      syncKH();
    }catch(e){}
  }

  function normEnv(d){
    if(!d || typeof d !== "object") return null;
    if((d.type || d.kind) !== "specialty") return null;
    const p = (d.payload && typeof d.payload === "object") ? d.payload : d;
    if(!p.name) return null;
    const island = p.island || p.village || "名のない島";
    const id = d.id != null ? String(d.id) : `${p.name}@${island}`;
    return {id, name: String(p.name).slice(0, 24), island: String(island).slice(0, 16)};
  }

  function ingest(env, viaBoat){
    if(seen.indexOf(env.id) >= 0) return;
    seen.push(env.id);
    if(seen.length > 64) seen.splice(0, seen.length - 64);
    sj(LSK + "-seen", seen);
    if(!viaBoat && !everSeen){ everSeen = true; sj(LSK + "-ever", true); }
    if(ltd.length >= 4){
      S.toast(`「${env.name}」の便りも見ましたが、棚がもういっぱいです`);
      return;
    }
    const it = {name: env.name, dn: dnOf(env.name), tags: inferTags(env.name),
                island: env.island, night: S.state.night, shiireLtd: true};
    ltd.push(it);
    sj(LSK + "-ltd", ltd);
    S.state.pantry.push(it);
    appendCard(it);
    S.toast(viaBoat
      ? `行商の小舟が寄り、「${it.name}」を仕入れました（${it.island}産）`
      : `市場で「${it.name}」を仕入れました（${it.island}産）`);
    S.emit("shiire:limited", {name: it.name});
  }

  // (a) eavesdrop on the ocean-mail broadcast (read-only — we never post)
  try{
    if("BroadcastChannel" in window){
      const bc = new BroadcastChannel("sandbox-kairyu-v1");
      bc.onmessage = ev => {
        try{ const env = normEnv(ev.data); if(env) ingest(env, false); }catch(e){}
      };
    }
  }catch(e){}

  // (b) peek (read-only) at neighbouring inboxes every ~2 min
  function peekInboxes(){
    for(const key of ["kairyu-inbox-aquarium", "kairyu-inbox-chronicle"]){
      let raw = null;
      try{ raw = localStorage.getItem(key); }catch(e){}
      if(!raw) continue;
      let v = null;
      try{ v = JSON.parse(raw); }catch(e){ continue; }
      const arr = Array.isArray(v) ? v
        : v && Array.isArray(v.queue) ? v.queue
        : v && Array.isArray(v.envelopes) ? v.envelopes
        : v && Array.isArray(v.messages) ? v.messages : [];
      for(const d of arr){
        const env = normEnv(d);
        if(env) ingest(env, false);
      }
    }
  }

  // (c) solo-play fallback: the peddler boat (only while no real envelope ever seen)
  function boatDeliver(){
    const g = S.pick(BOAT_GOODS);
    ingest({id: "boat-" + Date.now() + "-" + ((Math.random() * 1e6) | 0),
            name: g.name, island: g.island}, true);
  }

  // serving a limited dish: +1 reputation, the customer notices
  S.on("dish-served", p => {
    try{
      if(!p || !p.dish || !Array.isArray(p.dish.cards)) return;
      if(!p.dish.cards.some(cd => cd && cd.shiireLtd)) return;
      S.state.rep += 1;
      sj("shokudo-rep", S.state.rep);
      if(S.state.tonight) S.state.tonight.repGained += 1;
      const pill = document.getElementById("repPill");
      if(pill){
        pill.textContent = `⭐ 評判 ${S.state.rep}`;
        pill.animate([{transform:"scale(1)"},{transform:"scale(1.14)"},{transform:"scale(1)"}],
          {duration:380, easing:"ease-out"});
      }
      const nm = p.customer && p.customer.name ? p.customer.name : "客";
      setTimeout(() => S.toast(`${nm}「${S.pick(LTD_REMARKS)}」（限定食材・評判+1）`), 3300);
    }catch(e){}
  });

  // ====================================================================
  //  2) 招き猫 — the cat at the window becomes feedable
  // ====================================================================
  const catData = Object.assign({fed:0, named:false, lastNight:0}, lj(LSK + "-cat", {}));
  let catEl = null, catTimerT = null, catStayT = null;
  let kanbanEl = null, kanbanActive = false;

  function scarf(){
    const g = S.mk("g");
    g.append(S.mk("path",{d:"M -7.5 -22 q 7.5 4.5 15 0 l .6 4.4 q -8.2 5 -16.4 0 Z", fill:"#c0504a"}));
    g.append(S.mk("path",{d:"M 4 -18.5 l 3.2 7.5 4 -1.8 -3.4 -7.5 Z", fill:"#a8423d"}));
    return g;
  }
  // small sitting silhouette; origin = bottom centre (x,y in view-box coords)
  function catGroup(x, y, sc, named){
    const g = S.mk("g",{transform:`translate(${x},${y}) scale(${sc})`, opacity:0});
    const title = S.mk("title");
    title.textContent = named ? "招福丸" : "名のない猫";
    g.append(title);
    g.append(S.mk("path",{d:"M -12 0 Q -15 -18 -7 -25 L -10 -34 L -3 -29 Q 0 -30.5 3 -29 L 10 -34 L 7 -25 Q 15 -18 12 0 Z",
      fill:"#07060f"}));
    const eyes = S.mk("g");
    eyes.append(S.mk("circle",{cx:-3.8, cy:-25, r:1.7, fill:"#ffd27a"}));
    eyes.append(S.mk("circle",{cx: 3.8, cy:-25, r:1.7, fill:"#ffd27a"}));
    eyes.style.transformBox = "fill-box";
    eyes.style.transformOrigin = "center";
    eyes.animate([
      {transform:"scaleY(1)"},{transform:"scaleY(1)", offset:.9},
      {transform:"scaleY(.1)", offset:.94},{transform:"scaleY(1)"},
    ],{duration:4200 + Math.random()*1800, iterations:Infinity});
    g.append(eyes);
    const tail = S.mk("path",{d:"M 11 -2 q 12 -3 10 -16", stroke:"#07060f",
      "stroke-width":4, fill:"none", "stroke-linecap":"round"});
    tail.style.transformBox = "view-box";
    tail.style.transformOrigin = `${x + 11*sc}px ${y - 2*sc}px`;
    tail.animate([{transform:"rotate(0deg)"},{transform:"rotate(16deg)"},{transform:"rotate(0deg)"}],
      {duration:2400 + Math.random()*900, iterations:Infinity, easing:"ease-in-out"});
    g.append(tail);
    if(named) g.append(scarf());
    return g;
  }

  function fxText(s, x, y){
    try{
      const t = S.mk("text",{x, y, "font-size":15, "text-anchor":"middle"});
      t.textContent = s;
      const a = t.animate([
        {opacity:0, transform:"translateY(10px)"},{opacity:1, offset:.35},
        {opacity:0, transform:"translateY(-22px)"},
      ],{duration:1400, easing:"ease-out"});
      a.onfinish = () => { try{ t.remove(); }catch(e){} };
      S.gFx.append(t);
    }catch(e){}
  }

  function relaxNote(c){
    try{
      if(!c || !c.el || c.el.querySelector(".shokudo-shiire-note")) return;
      const t = S.mk("text",{x:36, y:-148, "font-size":14, fill:"#ffd27a",
        class:"shokudo-shiire-note", opacity:0});
      t.textContent = "♪";
      t.animate([
        {opacity:0, transform:"translateY(4px)"},{opacity:.85, offset:.4},
        {opacity:0, transform:"translateY(-14px)"},
      ],{duration:3000, iterations:Infinity, easing:"ease-in-out"});
      c.el.append(t);
    }catch(e){}
  }

  const feedBtn = S.addButton("🐟 残り物をあげる", () => { try{ feed(); }catch(e){} });
  feedBtn.classList.add("shokudo-shiire-feed");
  feedBtn.disabled = true;
  function updateFeedBtn(){
    const here = !!catEl;
    feedBtn.disabled = !here;
    feedBtn.classList.toggle("shokudo-shiire-on", here);
    feedBtn.title = here
      ? "窓辺の猫に、今日の残り物を（無料）"
      : catData.named
        ? `招福丸はいまは留守です（世話 ${catData.fed}晩）`
        : `猫はいまは留守です（世話 ${catData.fed}/5晩）`;
  }
  updateFeedBtn();

  function scheduleWindowCat(first){
    clearTimeout(catTimerT);
    catTimerT = setTimeout(() => { try{ catArrive(); }catch(e){} },
      first ? 45000 + Math.random()*45000 : 120000 + Math.random()*120000);
  }
  function catArrive(){
    if(catEl || kanbanActive){ scheduleWindowCat(false); return; }
    catEl = catGroup(714, 256, 1, catData.named);   // window sill, left edge
    S.gBack.append(catEl);
    catEl.animate([{opacity:0},{opacity:1}],{duration:900, fill:"forwards", easing:"ease-out"});
    if(Math.random() < .6)
      S.toast(catData.named ? "招福丸が窓辺に来ました。今日も無報酬です"
                            : "窓辺に猫が来ています。残り物を狙う目です");
    updateFeedBtn();
    clearTimeout(catStayT);
    catStayT = setTimeout(() => { catGone(); scheduleWindowCat(false); },
      36000 + Math.random()*9000);                  // ~40s stay
  }
  function catGone(){
    const el = catEl;
    catEl = null;
    clearTimeout(catStayT);
    if(el){
      const a = el.animate([{opacity:1},{opacity:0}],{duration:900, easing:"ease-in"});
      a.onfinish = () => { try{ el.remove(); }catch(e){} };
    }
    updateFeedBtn();
  }

  function feed(){
    if(!catEl){ S.toast("窓辺に猫はいません。気配だけです"); return; }
    fxText("🐟", 714, 290);
    setTimeout(() => fxText("♥", 714, 248), 900);
    catGone();
    scheduleWindowCat(false);

    if(catData.lastNight !== S.state.night){
      catData.fed++;
      catData.lastNight = S.state.night;
      sj(LSK + "-cat", catData);
    }

    // 看板猫 — sits by the door (stage right, where customers come in)
    kanbanActive = true;
    if(kanbanEl){ try{ kanbanEl.remove(); }catch(e){} }
    kanbanEl = catGroup(952, 612, 1.3, catData.named);
    const sign = S.mk("g",{transform:"translate(-30,-4)"});
    sign.innerHTML = `
      <rect x="-15" y="-32" width="26" height="26" rx="3" fill="#241a14" stroke="#3a2a1c"/>
      <text x="-2" y="-21" text-anchor="middle" font-size="8.5" fill="#ffd27a">看板</text>
      <text x="-2" y="-11" text-anchor="middle" font-size="8.5" fill="#ffd27a">猫</text>`;
    kanbanEl.append(sign);
    S.gStool.append(kanbanEl);
    kanbanEl.animate([{opacity:0},{opacity:1}],{duration:900, fill:"forwards", easing:"ease-out"});

    if(S.state.tonight && S.state.phase !== "closed"){
      S.state.tonight.total += 1;
      setTimeout(() => S.toast("看板猫の効き目で、今夜の客足がひとり増えそうです"), 2700);
    }
    S.customers.forEach(relaxNote);   // 既にいる客もくつろぐ

    S.toast("猫は満足し、店の看板を引き受けました（無報酬）");
    S.emit("cat:fed");

    if(catData.fed >= 5 && !catData.named){
      catData.named = true;
      sj(LSK + "-cat", catData);
      setTimeout(() => {
        S.toast("五晩の恩義。猫に名がつきました——「招福丸」。襟巻きを進呈");
        try{ if(kanbanEl) kanbanEl.append(scarf()); }catch(e){}
        S.emit("cat:hired");
      }, 5200);
    }
    updateFeedBtn();
  }

  // while the 看板猫 is on duty, arriving customers visibly relax
  S.on("customer-arrived", c => {
    if(kanbanActive) setTimeout(() => relaxNote(c), 1400);
  });

  // ====================================================================
  //  night flow hooks
  // ====================================================================
  S.on("night-start", ev => {
    try{
      const night = ev && ev.night != null ? ev.night : S.state.night;
      // cat: shift over
      kanbanActive = false;
      if(kanbanEl){ try{ kanbanEl.remove(); }catch(e){} kanbanEl = null; }
      catGone();
      scheduleWindowCat(false);
      // limited stock: current night + next, then it goes home to the sea
      const before = ltd.length;
      ltd = ltd.filter(it => night <= it.night + 1);
      if(ltd.length !== before){
        sj(LSK + "-ltd", ltd);
        setTimeout(() => S.toast("限定の棚を整理しました。海のものは海へ"), 2900);
      }
      for(const it of ltd){ S.state.pantry.push(it); appendCard(it); }
    }catch(e){}
  });

  // ---- opening (core has already run startNight) ----
  ltd = ltd.filter(it => it && it.name && S.state.night <= it.night + 1);
  sj(LSK + "-ltd", ltd);
  for(const it of ltd){ it.shiireLtd = true; S.state.pantry.push(it); appendCard(it); }

  setTimeout(() => { try{ peekInboxes(); }catch(e){} }, 15000);
  setInterval(() => { try{ peekInboxes(); }catch(e){} }, 120000);
  setInterval(() => { try{ if(!everSeen && Math.random() < .2) boatDeliver(); }catch(e){} }, 180000);
  scheduleWindowCat(true);
})();
</script>

<script>
// ════ plugin: shokudo-recipe (wave2) ════ Verified live in browser against the real core (appended to a test copy, zero console errors). Recipe book: ★3 dishes enshrined under "shokudo-recipe:book-v1" (
(() => {
  "use strict";
  if(!window.SHOKUDO) return;
  const S = window.SHOKUDO;
  const { esc, pick, toast, on, emit, award, state, lore } = S;
  const LSKEY = "shokudo-recipe:book-v1";
  const CAP = 30;

  /* ================= storage ================= */
  function loadBook(){
    try{
      const v = localStorage.getItem(LSKEY);
      const a = v ? JSON.parse(v) : [];
      return Array.isArray(a) ? a.filter(r => r && r.key && r.name && Array.isArray(r.ings) && Array.isArray(r.tags)) : [];
    }catch(e){ return []; }
  }
  const book = loadBook();
  function saveBook(){ try{ localStorage.setItem(LSKEY, JSON.stringify(book)); }catch(e){} }

  /* ================= css ================= */
  const css = document.createElement("style");
  css.textContent = `
  .shokudo-recipe-overlay{position:fixed;inset:0;z-index:8;display:flex;align-items:center;justify-content:center;
    background:rgba(5,4,12,.6);backdrop-filter:blur(4px);opacity:0;pointer-events:none;transition:opacity .3s}
  .shokudo-recipe-overlay.shokudo-recipe-show{opacity:1;pointer-events:auto}
  .shokudo-recipe-modal{width:min(420px,92vw);max-height:min(72vh,560px);display:flex;flex-direction:column;
    background:var(--panel);border:1px solid var(--panel-edge);border-radius:16px;padding:18px 18px 13px;
    box-shadow:0 22px 60px rgba(0,0,0,.6);backdrop-filter:blur(14px);
    transform:translateY(12px);transition:transform .3s}
  .shokudo-recipe-overlay.shokudo-recipe-show .shokudo-recipe-modal{transform:translateY(0)}
  .shokudo-recipe-head{display:flex;align-items:center;gap:10px;margin-bottom:10px}
  .shokudo-recipe-head h3{margin:0;font-size:14px;letter-spacing:.12em;color:var(--warm);font-weight:600;flex:1}
  .shokudo-recipe-count{font-size:11px;color:var(--dim)}
  .shokudo-recipe-x{cursor:pointer;border:1px solid var(--panel-edge);background:transparent;color:var(--dim);
    border-radius:999px;width:26px;height:26px;font-size:13px;font-family:inherit;transition:.15s}
  .shokudo-recipe-x:hover{color:var(--ink);border-color:rgba(255,180,94,.5)}
  .shokudo-recipe-list{overflow-y:auto;scrollbar-width:thin;flex:1}
  .shokudo-recipe-list::-webkit-scrollbar{width:7px}
  .shokudo-recipe-list::-webkit-scrollbar-thumb{background:rgba(255,180,94,.25);border-radius:4px}
  .shokudo-recipe-card{border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:10px 12px;margin-bottom:8px;
    background:rgba(255,255,255,.03);cursor:pointer;transition:.15s;user-select:none}
  .shokudo-recipe-card:hover{background:rgba(255,180,94,.08);border-color:rgba(255,180,94,.35)}
  .shokudo-recipe-nm{font-size:14px;font-weight:600;color:var(--warm)}
  .shokudo-recipe-nm em{font-style:normal;font-size:11px;color:var(--acc);margin-left:7px}
  .shokudo-recipe-ings{font-size:12px;color:var(--ink);margin-top:5px;line-height:1.6}
  .shokudo-recipe-tags{margin-top:5px;display:flex;gap:4px;flex-wrap:wrap}
  .shokudo-recipe-tags span{font-size:10.5px;color:var(--dim);border:1px solid rgba(255,255,255,.12);
    border-radius:999px;padding:1px 7px}
  .shokudo-recipe-meta{font-size:11px;color:var(--dim);margin-top:5px}
  .shokudo-recipe-empty{color:var(--dim);font-size:13px;padding:10px 6px;line-height:1.9}
  .shokudo-recipe-foot{font-size:11px;color:var(--dim);margin-top:10px;text-align:center}
  .shokudo-recipe-chips{display:flex;align-items:center;gap:4px;flex-wrap:wrap;max-width:46vw}
  .shokudo-recipe-chips span{font-size:10.5px;color:var(--dim);border:1px solid rgba(255,255,255,.14);
    border-radius:999px;padding:1px 8px;transition:.15s}
  .shokudo-recipe-chips .shokudo-recipe-hit{color:#b8e6a0;border-color:rgba(140,220,110,.6);background:rgba(110,200,90,.12)}
  .shokudo-recipe-filters{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin:0 0 8px}
  .shokudo-recipe-flabel{font-size:11px;letter-spacing:.14em;color:var(--dim);font-weight:600}
  .shokudo-recipe-fbtn{cursor:pointer;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);
    color:var(--dim);border-radius:999px;padding:3px 12px;font-size:11.5px;font-family:inherit;transition:.15s}
  .shokudo-recipe-fbtn:hover{border-color:rgba(255,180,94,.4);color:var(--ink)}
  .shokudo-recipe-fbtn.shokudo-recipe-on{background:rgba(255,180,94,.16);border-color:var(--acc);color:var(--warm)}
  .ing.shokudo-recipe-dim{opacity:.28;filter:saturate(.3)}
  .ing.shokudo-recipe-lock{opacity:.45;filter:grayscale(.6);cursor:default}
  .ing.shokudo-recipe-lock:hover{background:rgba(255,255,255,.035);border-color:rgba(255,255,255,.07)}`;
  document.head.append(css);

  /* ================= recipe naming（品書き名） ================= */
  const PRE = ["月夜の","宵闇の","星降る","常夜の","まぼろしの","湯気立つ","異界の","のれん裏の","ほろ酔い","遠雷の"];
  const SUF = ["三重奏","奇譚","小夜曲","御膳","綺譚","夜咄","幻想曲","百物語","残響","独奏"];
  function fancyName(dish){
    for(let t = 0; t < 14; t++){
      const n = pick(PRE) + pick(dish.cards).dn + pick(SUF);
      if(!book.some(b => b.name === n)) return n;
    }
    return pick(PRE) + pick(dish.cards).dn + pick(SUF) + "・改";
  }
  const keyOf = cards => cards.map(c => c.name).slice().sort().join("¦");

  /* ================= recipe book modal ================= */
  const overlay = document.createElement("div");
  overlay.className = "shokudo-recipe-overlay";
  overlay.innerHTML = `
    <div class="shokudo-recipe-modal">
      <div class="shokudo-recipe-head">
        <h3>📖 品書き — RECIPES</h3>
        <span class="shokudo-recipe-count"></span>
        <button class="shokudo-recipe-x" title="とじる">✕</button>
      </div>
      <div class="shokudo-recipe-list"></div>
      <div class="shokudo-recipe-foot">レシピを押すと、その材料を調理場に並べます</div>
    </div>`;
  document.body.append(overlay);
  const listEl  = overlay.querySelector(".shokudo-recipe-list");
  const countEl = overlay.querySelector(".shokudo-recipe-count");

  let modalOpen = false;
  function openModal(){ modalOpen = true; renderBook(); overlay.classList.add("shokudo-recipe-show"); }
  function closeModal(){ modalOpen = false; overlay.classList.remove("shokudo-recipe-show"); }
  overlay.addEventListener("click", e => { if(e.target === overlay) closeModal(); });
  overlay.querySelector(".shokudo-recipe-x").addEventListener("click", closeModal);
  window.addEventListener("keydown", e => { if(e.key === "Escape" && modalOpen) closeModal(); });

  function renderBook(){
    countEl.textContent = `${book.length} / ${CAP}`;
    if(!book.length){
      listEl.innerHTML = `<div class="shokudo-recipe-empty">まだ白紙です。★3の一皿が、ここに載ります。</div>`;
      return;
    }
    listEl.innerHTML = book.map((r, i) => `
      <div class="shokudo-recipe-card" data-bi="${i}">
        <div class="shokudo-recipe-nm">${esc(r.name)}<em>${r.times|0}回提供</em></div>
        <div class="shokudo-recipe-ings">${r.ings.map(esc).join("・")}</div>
        <div class="shokudo-recipe-tags">${r.tags.map(t => `<span>${esc(t)}</span>`).join("")}</div>
        <div class="shokudo-recipe-meta">第${r.born|0}夜に生まれた一皿（${esc(r.dishName || "")}）</div>
      </div>`).reverse().join("");
  }

  // click a recipe -> auto-select its 3 ingredients (DOM clicks, same path as the player)
  function cookRecipe(r){
    if(state.phase !== "waiting" || !state.current){ toast("お客が席につくのを待ちましょう"); return; }
    const idx = r.ings.map(n => state.pantry.findIndex(p => p.name === n));
    if(idx.some(i => i < 0)){ toast("材料が切れています"); return; }
    let guard = 0;                                   // deselect whatever is on the tray
    while(guard++ < 8){
      const c = S.pantryEl.querySelector(".ing.sel");
      if(!c) break;
      c.click();
    }
    for(const i of idx){                             // re-query each time: pantry re-renders per click
      const c = S.pantryEl.querySelector(`.ing[data-i="${i}"]`);
      if(c && !c.classList.contains("sel")) c.click();
    }
    closeModal();
    toast(`『${r.name}』の支度を始めました`);
  }
  listEl.addEventListener("click", e => {
    const card = e.target.closest(".shokudo-recipe-card");
    if(!card) return;
    const r = book[+card.dataset.bi];
    if(r) cookRecipe(r);
  });

  S.addButton("📖 品書き", () => { modalOpen ? closeModal() : openModal(); });

  /* ================= recipe birth & times-served ================= */
  on("dish-served", ({customer, dish, score}) => {
    try{
      if(!dish || !Array.isArray(dish.cards) || dish.cards.length !== 3) return;
      const key = keyOf(dish.cards);
      let r = book.find(b => b.key === key);
      if(r) r.times = (r.times|0) + 1;
      else if(score === 3){
        r = { key, name: fancyName(dish), dishName: dish.name,
              ings: dish.cards.map(c => c.name), tags: dish.tags.slice(),
              times: 1, born: state.night };
        if(book.length >= CAP){                      // evict the least-served (oldest wins ties)
          let worst = 0;
          for(let i = 1; i < book.length; i++) if((book[i].times|0) < (book[worst].times|0)) worst = i;
          book.splice(worst, 1);
        }
        book.push(r);
        setTimeout(() => toast(`★3の一皿を品書きに書き留めました — 『${r.name}』`), 3400);
        emit("recipe:born", {name: r.name});
      }
      if(r) saveBook();
      // rumor order fulfilled exactly -> bonus tip
      if(customer && customer.order && customer.order.recipeKey === key && score === 3){
        const amt = 4 + ((Math.random()*5)|0);       // 4-8, via core award() (never negative)
        if(award(customer.world, amt))
          setTimeout(() => toast(`噂どおりの味、と${customer.name}。チップをはずみました（+${amt}）`), 2600);
        else
          setTimeout(() => toast(`噂どおりの味、と${customer.name}。立派な葉っぱを置いていきました`), 2600);
      }
      if(modalOpen) renderBook();
    }catch(err){ console.error("[shokudo-recipe]", err); }
  });

  /* ================= regulars order by recipe name ================= */
  on("regular-returned", c => {
    try{
      if(!c || !c.order || !c.regular || !book.length) return;
      if(Math.random() > .55) return;                // "may" — a rumor, not a rule
      const pref = c.regular.tags || [];
      const candidates = book.filter(b =>
        b.tags.filter(t => pref.includes(t)).length >= 2 &&
        b.ings.every(n => state.pantry.some(p => p.name === n)));
      if(!candidates.length) return;
      const r = pick(candidates);
      const liked = r.tags.filter(t => pref.includes(t));
      const rest  = r.tags.filter(t => !pref.includes(t));
      // order tags ⊆ recipe tags -> serving exactly that recipe is an automatic ★3 (core judging)
      c.order.tags = liked.concat(rest).slice(0, Math.min(3, r.tags.length));
      c.order.text = `『${r.name}』を。噂で聞きました`;
      c.order.recipeKey = r.key;
      emit("recipe:ordered", {name: r.name});
      setTimeout(() => { if(state.current === c) toast(`噂が一人歩きしています。『${r.name}』のご指名です`); }, 1500);
    }catch(err){ console.error("[shokudo-recipe]", err); }
  });

  /* ================= 調理場QoL: live tag preview + family filters + lock ================= */
  const serveBtn = document.getElementById("serveBtn");
  const chipsEl = document.createElement("span");
  chipsEl.className = "shokudo-recipe-chips";
  chipsEl.style.display = "none";
  if(serveBtn && serveBtn.parentNode) serveBtn.parentNode.insertBefore(chipsEl, serveBtn);

  const FAM = ["温度","食感","味","その他"];
  let fFam = -1, fIdx = 0;
  const filterEl = document.createElement("div");
  filterEl.className = "shokudo-recipe-filters";
  const flabel = document.createElement("span");
  flabel.className = "shokudo-recipe-flabel";
  flabel.textContent = "絞り込み";
  filterEl.append(flabel);
  const fbtns = FAM.map((nm, i) => {
    const b = document.createElement("button");
    b.className = "shokudo-recipe-fbtn";
    b.textContent = nm;
    b.title = "押すたびに " + lore.TAG_GROUPS[i].join("→") + "→解除";
    b.addEventListener("click", () => {
      if(fFam !== i){ fFam = i; fIdx = 0; }
      else if(++fIdx >= lore.TAG_GROUPS[i].length){ fFam = -1; fIdx = 0; }
      renderFilters(); applyDecor();
    });
    filterEl.append(b);
    return b;
  });
  S.pantryEl.parentNode.insertBefore(filterEl, S.pantryEl);
  function renderFilters(){
    fbtns.forEach((b, i) => {
      const active = fFam === i;
      b.textContent = active ? `${FAM[i]}：${lore.TAG_GROUPS[i][fIdx]}` : FAM[i];
      b.classList.toggle("shokudo-recipe-on", active);
    });
  }

  function applyDecor(){
    try{
      const cards = S.pantryEl.querySelectorAll(".ing");
      const ftag = fFam >= 0 ? lore.TAG_GROUPS[fFam][fIdx] : null;
      const selTags = [];
      let nSel = 0;
      cards.forEach(card => { if(card.classList.contains("sel")) nSel++; });
      cards.forEach(card => {
        const ing = state.pantry[+card.dataset.i];
        if(!ing) return;
        const isSel = card.classList.contains("sel");
        if(isSel) for(const t of ing.tags) if(!selTags.includes(t)) selTags.push(t);
        card.classList.toggle("shokudo-recipe-dim", !!ftag && !isSel && !ing.tags.includes(ftag));
        card.classList.toggle("shokudo-recipe-lock", nSel >= 3 && !isSel);
      });
      const want = (state.current && state.current.order) ? state.current.order.tags : [];
      chipsEl.innerHTML = selTags.map(t =>
        `<span class="${want.includes(t) ? "shokudo-recipe-hit" : ""}">${esc(t)}</span>`).join("");
      chipsEl.style.display = selTags.length ? "" : "none";
    }catch(e){}
  }
  // pantry re-renders via innerHTML -> childList mutations; our class tweaks on children don't re-trigger
  new MutationObserver(applyDecor).observe(S.pantryEl, {childList:true});
  const decorSoon = () => setTimeout(applyDecor, 0);
  on("customer-arrived", decorSoon);
  on("customer-left", decorSoon);
  on("night-start", () => { decorSoon(); if(modalOpen) renderBook(); });
  on("night-end", closeModal);

  renderFilters();
  applyDecor();
  try{ window.dispatchEvent(new Event("resize")); }catch(e){}  // let the core re-measure --kh
})();
</script>

</body>
