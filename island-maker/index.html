<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>架空の島メーカー · Island Maker</title>
<style>
  :root{
    --ink:#2b3a45;
    --paper:#f4ecd9;
    --dim:#7a8b94;
    --sea-ink:#e9f4f6;
    --acc:#2f8f83;
    --warm:#c97b4a;
    --panel:rgba(248,242,226,.92);
    --panel-edge:rgba(60,90,100,.25);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;overflow:hidden;background:#9fd2d8;
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",-apple-system,system-ui,sans-serif;
    color:var(--ink);-webkit-font-smoothing:antialiased;}
  #map{position:fixed;inset:0;display:block;width:100vw;height:100vh;cursor:crosshair;}

  .topbar{position:fixed;top:0;left:0;right:0;display:flex;align-items:center;gap:14px;
    padding:14px 18px;pointer-events:none;z-index:5;}
  .brand{pointer-events:none;font-weight:700;letter-spacing:.05em;font-size:15px;color:#1f3038;
    text-shadow:0 1px 0 rgba(255,255,255,.5)}
  .brand small{display:block;font-weight:500;font-size:10.5px;color:#46707c;letter-spacing:.2em;margin-top:2px}
  .spacer{flex:1}
  .btn{pointer-events:auto;cursor:pointer;border:1.5px solid var(--panel-edge);
    background:var(--panel);color:var(--ink);border-radius:999px;padding:8px 15px;font-size:13px;
    transition:.18s;white-space:nowrap;font-family:inherit;font-weight:600;
    box-shadow:0 2px 8px rgba(20,60,70,.15)}
  .btn:hover{border-color:rgba(47,143,131,.6);transform:translateY(-1px)}
  .btn:active{transform:translateY(0)}

  .dock{position:fixed;left:14px;bottom:14px;display:flex;flex-wrap:wrap;gap:8px;z-index:5;max-width:70vw}
  .dock .btn{pointer-events:auto}
  .dock.folded .btn:not(.dock-toggle){display:none}
  .dock .dock-toggle{font-size:15px;padding:8px 12px}

  .hint{position:fixed;left:50%;top:46%;transform:translate(-50%,-50%);text-align:center;
    color:#33555f;font-size:15px;line-height:2;pointer-events:none;z-index:2;
    transition:opacity .8s}
  .hint .big{font-size:19px;color:#1f3038;letter-spacing:.08em;font-weight:700}

  .panel{position:fixed;top:64px;right:14px;width:336px;max-height:calc(100vh - 84px);
    overflow-y:auto;background:var(--panel);border:1.5px solid var(--panel-edge);border-radius:16px;
    padding:14px;z-index:4;box-shadow:0 14px 40px rgba(20,60,70,.25);
    transition:transform .3s, opacity .3s;scrollbar-width:thin;}
  .panel.hidden{transform:translateX(120%);opacity:0;pointer-events:none}
  .panel h2{margin:2px 4px 10px;font-size:13px;letter-spacing:.14em;color:#46707c;font-weight:700}
  .panel .empty{color:var(--dim);font-size:13px;padding:8px 6px;line-height:1.8}

  .card{border:1.5px solid transparent;border-radius:12px;padding:11px 12px;margin-bottom:9px;
    background:rgba(255,255,255,.5);cursor:pointer;transition:.18s}
  .card:hover,.card.active{background:rgba(47,143,131,.08);border-color:rgba(47,143,131,.4)}
  .card .nm{font-size:15px;font-weight:700;letter-spacing:.03em;display:flex;align-items:baseline;gap:8px}
  .card .nm .dot{width:8px;height:8px;border-radius:50%;background:var(--acc);flex:none}
  .card .meta{font-size:11px;color:#5b7680;margin:5px 0 0 16px}
  .card .vill{font-size:12px;color:#3d5a64;margin:6px 0 0 16px;line-height:1.9}
  .card .vill b{font-weight:700}
  .card .story{font-size:12.5px;line-height:2;color:#4a5f68;margin:9px 0 2px;
    max-height:0;overflow:hidden;transition:max-height .35s ease;border-left:2.5px solid rgba(47,143,131,.4);
    padding-left:10px;opacity:0}
  .card.open .story{max-height:340px;opacity:1;margin-top:10px}

  .dossier{position:fixed;left:50%;bottom:76px;transform:translateX(-50%) translateY(16px);
    width:min(440px,92vw);background:var(--panel);border:1.5px solid var(--panel-edge);
    border-radius:16px;padding:16px 18px;z-index:6;
    box-shadow:0 14px 40px rgba(20,60,70,.3);opacity:0;pointer-events:none;transition:.25s}
  .dossier.show{opacity:1;pointer-events:auto;transform:translateX(-50%) translateY(0)}
  .dossier .x{position:absolute;top:8px;right:12px;color:var(--dim);cursor:pointer;font-size:14px;padding:4px}
  .dossier .x:hover{color:var(--ink)}
  .dossier .nm{font-size:17px;font-weight:700;letter-spacing:.04em}
  .dossier .meta{font-size:11.5px;color:#5b7680;margin-top:6px;letter-spacing:.04em}
  .dossier .vill{font-size:12.5px;color:#3d5a64;margin-top:9px;line-height:2}
  .dossier .legend{font-size:12.5px;line-height:2;color:#4a5f68;margin-top:9px;
    border-left:2.5px solid rgba(47,143,131,.4);padding-left:10px}

  .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);
    background:rgba(31,48,56,.92);color:#f0f6f4;border-radius:999px;
    padding:9px 18px;font-size:13px;opacity:0;transition:.3s;z-index:7;pointer-events:none}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<svg id="map" xmlns="http://www.w3.org/2000/svg"></svg>

<div class="topbar">
  <div class="brand">架空の島メーカー<small>ISLAND MAKER</small></div>
  <div class="spacer"></div>
  <button class="btn" id="scatter">🏝 群島を生やす</button>
  <button class="btn" id="togglePanel">🗺 島の台帳</button>
  <button class="btn" id="save">地図を保存</button>
  <button class="btn" id="clear">海にもどす</button>
</div>

<div class="hint" id="hint">
  <div class="big">海をクリックすると、島が隆起します</div>
  島には名前と村が生まれ、村には名産品と言い伝えが生まれます<br>
  <span style="font-size:13px">島をクリックすると詳細がわかります</span>
</div>

<div class="panel hidden" id="panel">
  <h2>島の台帳</h2>
  <div id="cards"></div>
</div>

<div class="dossier" id="dossier"></div>
<div class="toast" id="toast"></div>
<div class="dock" id="dock"></div>

<script>
(() => {
  "use strict";
  const SVGNS = "http://www.w3.org/2000/svg";
  const svg = document.getElementById("map");

  // ---- layers ----
  const defs     = mk("defs");
  const gSea     = mk("g");   // sea texture: wave marks, sparkles
  const gIslands = mk("g");   // the islands (each a <g> at its position)
  const gLabels  = mk("g");   // island name labels
  const gFx      = mk("g");   // ships, weather, plugin actors (above land)
  const gDeco    = mk("g");   // compass rose etc (top, pointer-events none)
  svg.append(defs, gSea, gIslands, gLabels, gFx, gDeco);
  gDeco.setAttribute("pointer-events", "none");

  defs.innerHTML = `
    <radialGradient id="sea-bg" cx="50%" cy="42%" r="90%">
      <stop offset="0%"  stop-color="#a8dade"/>
      <stop offset="55%" stop-color="#8ecdd6"/>
      <stop offset="100%" stop-color="#6fb4c4"/>
    </radialGradient>
    <filter id="i-soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>`;

  const bgRect = mk("rect", { x:0, y:0, width:"100%", height:"100%", fill:"url(#sea-bg)" });
  gSea.before(bgRect);

  // ---- state ----
  let W = 0, H = 0;
  const islands = [];   // {id, x, y, size, pts, name, area, peak, villages:[], el, label}
  let nextId = 1;
  const usedIsland = new Set(), usedVillage = new Set();

  // ---- event bus ----
  const listeners = new Map();
  function on(name, fn){
    if(!listeners.has(name)) listeners.set(name, []);
    listeners.get(name).push(fn);
  }
  function emit(name, arg){
    for(const f of listeners.get(name) || []){
      try{ f(arg); }catch(err){ console.error(`[plugin handler for "${name}"]`, err); }
    }
  }

  // ====================================================================
  //  lore
  // ====================================================================
  const ISLAND_PRE = ["オボロ","シオサイ","ヨイマチ","ウタタネ","カタスミ","トオボエ","ナナメ","ヒルネ",
    "カモメ","シンキロウ","ウラハラ","ツキノワ","ナギサ","ハテノ","ワスレ","アクビ","サザナミ","トオミ",
    "クラゲ","シラナミ","ユウナギ","マヨイ"];
  const ISLAND_SUF = ["島","島","島","ヶ島","小島","環礁","大島"];
  const VILLAGE_STEM = ["アサナギ","シオカゼ","フナムシ","クジラミ","ヒデリ","アマヤドリ","イソギク",
    "ナミマ","トマリギ","ヤドカリ","シラス","ウミネコ","カキガラ","ホシズナ","ヒガタ","アミド"];
  const VILLAGE_SUF = ["村","村","浦","湊","集落","番屋"];
  const SPECIALTY = [
    "四角いタコ","鳴く塩","ひとりでに帰ってくるブーメラン貝","満月味のミカン","無口なニワトリの卵",
    "歩くワカメ","雨の日だけ甘くなるイチジク","折りたたみ式のカツオ","字が読めるイカ（読むだけ）",
    "苦労味のハチミツ","防水の水","昼寝専用の砂","うわさ話でふくらむパン","方角に厳しいヒトデ",
    "燃えない流木","引き潮のジャム","左利き用のサザエ","謝りながら育つ大根","とても静かな鈴",
    "他人の夢のつくだ煮","曜日感覚のあるフナムシ","半透明のさつまいも",
  ];
  const LEGEND = [
    (i)=>`むかし、${i.name}は隣の島と背くらべをして負け、悔しさで少しだけ沈んだという。`,
    (i)=>`満月の夜、浜の砂を数える者が現れる。数え終わった者はまだいない。`,
    (i)=>`${i.name}の形は、眠っている大きな亀の背中だと言われている。亀本人は否定している。`,
    (i)=>`島でいちばん高い場所に登って叫ぶと、三日後にその言葉が波で返ってくる。送料はかからない。`,
    (i)=>`昔この島に流れ着いた旅人が「ここでいい」と言った。島はそれをずっと覚えている。`,
    (i)=>`霧の濃い朝、島がほんの少しだけ移動しているという噂がある。役場は否定も肯定もしていない。`,
    (i)=>`島の木をむやみに数えてはいけない。数えると一本増えるからである。`,
    (i)=>`${i.name}の井戸の水を飲むと、忘れていた約束をひとつ思い出す。だいたい気まずい。`,
    (i)=>`年に一度、海鳥がいっせいに同じ方角を向く日がある。その方角に何があるかは誰も調べていない。`,
    (i)=>`島の岬には「振り返らずに渡れば願いが叶う」橋があるが、景色が良すぎて全員振り返る。`,
    (i)=>`大昔、この島は空を飛んでいたが、疲れてここに降りたと伝わる。以来ずっと休んでいる。`,
    (i)=>`島のどこかに開かずの祠がある。開かずというより、誰も場所を覚えていない。`,
  ];
  function popText(){
    const n = 8 + (Math.random()*220|0);
    return pick([
      `${n}人と犬${1+(Math.random()*4|0)}匹`,
      `${n}人（うち1人はたぶんいない）`,
      `${n}人と猫多数`,
      `${n}人。全員顔見知り`,
      `${n}人（自己申告）`,
    ]);
  }

  function pick(a){ return a[(Math.random()*a.length)|0]; }

  function makeIslandName(){
    let name, tries = 0;
    do{ name = pick(ISLAND_PRE) + pick(ISLAND_SUF); }
    while(usedIsland.has(name) && ++tries < 20);
    usedIsland.add(name);
    return name;
  }
  function makeVillageName(){
    let name, tries = 0;
    do{ name = pick(VILLAGE_STEM) + pick(VILLAGE_SUF); }
    while(usedVillage.has(name) && ++tries < 20);
    usedVillage.add(name);
    return name;
  }

  // ====================================================================
  //  island generation
  // ====================================================================
  function makeShape(size){
    const N = 16;
    const a = 2 + (Math.random()*2|0), b = 4 + (Math.random()*3|0);
    const p1 = Math.random()*Math.PI*2, p2 = Math.random()*Math.PI*2;
    const amp1 = .14 + Math.random()*.1, amp2 = .08 + Math.random()*.08;
    const pts = [];
    for(let i=0;i<N;i++){
      const t = i/N*Math.PI*2;
      const r = size*(0.78 + amp1*Math.sin(a*t+p1) + amp2*Math.sin(b*t+p2));
      pts.push([Math.cos(t)*r, Math.sin(t)*r]);
    }
    return pts;
  }
  function smoothPath(pts, scale){
    scale = scale || 1;
    const p = pts.map(([x,y]) => [x*scale, y*scale]);
    const n = p.length;
    let d = "";
    for(let i=0;i<n;i++){
      const c = p[i], nx = p[(i+1)%n];
      const mx = (c[0]+nx[0])/2, my = (c[1]+nx[1])/2;
      if(i===0) d = `M ${mx.toFixed(1)} ${my.toFixed(1)}`;
      else d += ` Q ${c[0].toFixed(1)} ${c[1].toFixed(1)}, ${mx.toFixed(1)} ${my.toFixed(1)}`;
    }
    const c0 = p[0], cl = p[n-1];
    d += ` Q ${c0[0].toFixed(1)} ${c0[1].toFixed(1)}, ${((c0[0]+p[1][0])/2).toFixed(1)} ${((c0[1]+p[1][1])/2).toFixed(1)}`;
    return d + " Z";
  }

  function makeVillage(isl, over){
    const v = Object.assign({
      name: makeVillageName(),
      specialty: pick(SPECIALTY),
      pop: popText(),
      angle: Math.random()*Math.PI*2,
      isTown: false,
    }, over || {});
    return v;
  }

  function makeIsland(x, y, over){
    over = over || {};
    const size = over.size || (36 + Math.random()*54);
    const isl = {
      id: nextId++,
      x, y, size,
      pts: makeShape(size),
      name: over.name || makeIslandName(),
      area: +(size*size/520).toFixed(1),                       // それっぽいkm²
      peak: Math.round(size*(2.2 + Math.random()*5)),          // 最高標高m
      villages: [],
      el: null, label: null,
    };
    isl.legend = over.legend || pick(LEGEND)(isl);
    const vn = size > 75 ? 3 : size > 52 ? 2 : 1;
    for(let i=0;i<vn;i++){
      const v = makeVillage(isl);
      v.angle = (i/vn)*Math.PI*2 + Math.random()*0.8;
      isl.villages.push(v);
    }
    return isl;
  }

  // ====================================================================
  //  island rendering
  // ====================================================================
  function houseCluster(v, r){
    const g = mk("g");
    const hx = Math.cos(v.angle)*r, hy = Math.sin(v.angle)*r;
    const n = v.isTown ? 6 : 2 + (Math.random()*3|0);
    for(let i=0;i<n;i++){
      const dx = (Math.random()-.5)*12, dy = (Math.random()-.5)*9;
      g.append(mk("rect",{x:hx+dx-2.4, y:hy+dy-2.2, width:4.8, height:4.4, rx:.8,
        fill: i%3===0 ? "#c2503e" : "#8a6a4f", stroke:"#5d4636", "stroke-width":.5}));
    }
    const t = mk("text",{x:hx, y:hy+13, "text-anchor":"middle", "font-size":8.5,
      fill:"#3a4a52", "letter-spacing":".04em", "font-weight":"600"});
    t.textContent = v.name;
    g.append(t);
    return g;
  }

  function islandGroup(isl){
    const g = mk("g", {class:"isle"});
    g.setAttribute("transform", `translate(${isl.x} ${isl.y})`);

    const shallow = mk("path",{d:smoothPath(isl.pts, 1.22), fill:"#cdeef0", opacity:.65, filter:"url(#i-soft)"});
    const sand    = mk("path",{d:smoothPath(isl.pts, 1.0),  fill:"#ead9a6", stroke:"#cdb87f", "stroke-width":1.2});
    const grass   = mk("path",{d:smoothPath(isl.pts, .8),   fill:"#9dc27a"});
    const forest  = mk("path",{d:smoothPath(isl.pts, .56),  fill:"#6da25e", opacity:.9});
    g.append(shallow, sand, grass, forest);

    if(isl.size > 58){
      const mp = [];
      const mr = isl.size*.26, MN = 7;
      for(let i=0;i<MN;i++){
        const t = i/MN*Math.PI*2;
        mp.push([Math.cos(t)*mr*(0.7+Math.random()*.5), Math.sin(t)*mr*(0.7+Math.random()*.5)]);
      }
      g.append(mk("path",{d:smoothPath(mp,1), fill:"#9a8d7e", stroke:"#7d7163","stroke-width":.8}));
      if(isl.size > 78){
        const sp = mp.map(([x,y])=>[x*.45, y*.45]);
        g.append(mk("path",{d:smoothPath(sp,1), fill:"#f2efe6"}));
      }
    }

    const treeN = Math.round(isl.size/8);
    for(let i=0;i<treeN;i++){
      const t = Math.random()*Math.PI*2, r = Math.random()*isl.size*.5;
      const tx = Math.cos(t)*r, ty = Math.sin(t)*r;
      g.append(mk("circle",{cx:tx, cy:ty, r:1.6+Math.random()*1.4, fill:"#4c7a44"}));
    }

    // roads between villages (through the interior, dashed)
    const gV = mk("g", {class:"isle-villages"});
    const vr = isl.size*.82;
    if(isl.villages.length > 1){
      for(let i=0;i<isl.villages.length;i++){
        const a = isl.villages[i], b = isl.villages[(i+1)%isl.villages.length];
        if(isl.villages.length === 2 && i === 1) break;
        const ax = Math.cos(a.angle)*vr, ay = Math.sin(a.angle)*vr;
        const bx = Math.cos(b.angle)*vr, by = Math.sin(b.angle)*vr;
        gV.append(mk("path",{d:`M ${ax} ${ay} Q ${(ax+bx)*.2} ${(ay+by)*.2}, ${bx} ${by}`,
          stroke:"#a98f63", "stroke-width":1.3, fill:"none", "stroke-dasharray":"3 3", opacity:.8}));
      }
    }
    for(const v of isl.villages) gV.append(houseCluster(v, vr));
    g.append(gV);
    return g;
  }

  function islandLabel(isl){
    const t = mk("text",{x:isl.x, y:isl.y - isl.size*1.32 - 8, "text-anchor":"middle",
      "font-size":14, fill:"#1f3038", "letter-spacing":".18em", "font-weight":"700"});
    t.textContent = isl.name;
    const sub = mk("text",{x:isl.x, y:isl.y - isl.size*1.32 + 6, "text-anchor":"middle",
      "font-size":8.5, fill:"#46707c", "letter-spacing":".1em"});
    sub.textContent = `約${isl.area}km²・${isl.villages.length}村`;
    const g = mk("g");
    g.append(t, sub);
    return g;
  }

  function rippleAt(x, y, r0){
    for(let i=0;i<3;i++){
      const ring = mk("circle",{cx:x, cy:y, r:r0, fill:"none", stroke:"#fff",
        "stroke-width":1.6, opacity:.7});
      ring.style.transformOrigin = `${x}px ${y}px`;
      gFx.append(ring);
      ring.animate([
        {transform:"scale(.5)", opacity:.7},
        {transform:`scale(${1.8+i*.5})`, opacity:0}
      ],{duration:1400+i*500, delay:i*220, easing:"ease-out"}).onfinish = () => ring.remove();
    }
  }

  // ====================================================================
  //  add / remove
  // ====================================================================
  function tooClose(x, y, size){
    for(const o of islands){
      if(Math.hypot(o.x-x, o.y-y) < (o.size + size)*1.5) return true;
    }
    return false;
  }

  function addIsland(x, y, over){
    const size = (over && over.size) || (36 + Math.random()*54);
    if(tooClose(x, y, size)){ toast("ここは近すぎます。島同士がけんかします"); return null; }
    const m = size*1.4;
    if(x < m || x > W-m || y < m+40 || y > H-m){ toast("もう少し沖でお願いします"); return null; }
    const isl = makeIsland(x, y, Object.assign({size}, over||{}));
    isl.el = islandGroup(isl);
    isl.el.style.cursor = "pointer";
    isl.el.addEventListener("pointerdown", e => {
      if(e.defaultPrevented || e.button !== 0) return;
      e.preventDefault();
      openInfo(isl);
      emit("island-clicked", isl);
    });
    gIslands.append(isl.el);
    // rise animation
    isl.el.style.transformOrigin = `${isl.x}px ${isl.y}px`;
    isl.el.animate([
      {transform:"scale(0)", opacity:0},
      {transform:"scale(1.06)", opacity:1, offset:.7},
      {transform:"scale(1)", opacity:1}
    ],{duration:1100, easing:"cubic-bezier(.2,1.2,.4,1)"});
    rippleAt(isl.x, isl.y, size);
    setTimeout(() => {
      isl.label = islandLabel(isl);
      isl.label.setAttribute("opacity", 0);
      gLabels.append(isl.label);
      isl.label.animate([{opacity:0},{opacity:1}],{duration:700, fill:"forwards"});
    }, 700);
    islands.push(isl);
    emit("island-added", isl);
    renderPanel();
    hideHint();
    return isl;
  }

  function removeIsland(id, opts){
    const i = islands.findIndex(s => s.id === id);
    if(i < 0) return false;
    const [isl] = islands.splice(i, 1);
    rippleAt(isl.x, isl.y, isl.size);
    isl.el.remove();
    if(isl.label) isl.label.remove();
    emit("island-removed", isl);
    if(!opts || opts.silent !== true) renderPanel();
    return true;
  }

  function addVillage(islandId, over){
    const isl = islands.find(s => s.id === islandId);
    if(!isl) return null;
    const v = makeVillage(isl, over);

        `<div class="meta">約${isl.area}km² ・ 最高標高${isl.peak}m ・ ${isl.villages.length}村</div>`+

  //  interaction & UI
  // ====================================================================

  });
  document.getElementById("togglePanel").addEventListener("click", () => {
    document.getElementById("panel").classList.toggle("hidden");
  });
  document.getElementById("clear").addEventListener("click", () => {
    while(islands.length) removeIsland(islands[islands.length-1].id, {silent:true});
    renderPanel(); closeInfo();
    emit("cleared");
    toast("すべて海にもどりました");
    showHint();
  });
  document.getElementById("save").addEventListener("click", savePNG);

  function savePNG(){
    const clone = svg.cloneNode(true);
    clone.setAttribute("width", W); clone.setAttribute("height", H);
    const data = new XMLSerializer().serializeToString(clone);
    const url = URL.createObjectURL(new Blob([data], {type:"image/svg+xml;charset=utf-8"}));
    const img = new Image();
    img.onload = () => {
      const cv = document.createElement("canvas");
      cv.width = W*2; cv.height = H*2;
      const ctx = cv.getContext("2d");
      ctx.fillStyle = "#8ecdd6"; ctx.fillRect(0,0,cv.width,cv.height);
      ctx.drawImage(img,0,0,cv.width,cv.height);
      URL.revokeObjectURL(url);
      cv.toBlob(b => {
        const a = document.createElement("a");
        a.href = URL.createObjectURL(b);
        a.download = "my-archipelago.png";
        a.click();
        setTimeout(()=>URL.revokeObjectURL(a.href), 1000);
        toast("海図を保存しました");
      }, "image/png");
    };
    img.onerror = () => { toast("保存に失敗しました"); URL.revokeObjectURL(url); };
    img.src = url;
  }

  // ---- dock ----
  const dock = document.getElementById("dock");
  const dockToggle = document.createElement("button");
  dockToggle.className = "btn dock-toggle";
  dockToggle.textContent = "🧰";
  dockToggle.title = "おもちゃ箱をひらく／たたむ";
  dockToggle.addEventListener("click", () => dock.classList.toggle("folded"));
  dock.append(dockToggle);
  function addButton(label, onClick){
    const b = document.createElement("button");
    b.className = "btn";
    b.textContent = label;
    b.addEventListener("click", onClick);
    dock.append(b);
    return b;
  }

  // ---- hint & toast ----
  const hint = document.getElementById("hint");
  function hideHint(){ hint.style.opacity = 0; }
  function showHint(){ hint.style.opacity = 1; }

  const toastEl = document.getElementById("toast");
  let toastT = null;
  function toast(msg){
    toastEl.textContent = msg; toastEl.classList.add("show");
    clearTimeout(toastT); toastT = setTimeout(()=>toastEl.classList.remove("show"), 2200);
  }

  // ---- helpers ----
  function mk(tag, attrs){
    const el = document.createElementNS(SVGNS, tag);
    if(attrs) for(const k in attrs) el.setAttribute(k, attrs[k]);
    return el;
  }

  function resize(){
    W = window.innerWidth; H = window.innerHeight;
    svg.setAttribute("viewBox", `0 0 ${W} ${H}`);
    buildSea(); buildCompass();
  }
  window.addEventListener("resize", resize);

  // ==================================================================
  //  plugin API
  // ==================================================================
  window.ISLE = {
    svg, defs, gSea, gIslands, gLabels, gFx, gDeco,
    islands,                          // live array (do not reassign)
    get W(){ return W; }, get H(){ return H; },
    mk, toast, pick,
    addIsland,                        // (x, y, over?) -> island | null (too close / too near shore)
    removeIsland,                     // (id, {silent}?)
    addVillage,                       // (islandId, over?) -> village (re-renders village layer + label)
    smoothPath,                       // (pts, scale?) -> closed smooth path d
    refreshPanel: renderPanel,
    openInfo, closeInfo,
    addButton,
    lore: {ISLAND_PRE, ISLAND_SUF, VILLAGE_STEM, VILLAGE_SUF, SPECIALTY, LEGEND},
    on, emit,                         // events: island-added(isl), island-removed(isl), island-clicked(isl),
                                      //   village-added({island, village}), dossier-opened({island, el}),
                                      //   panel-rendered({container}), cleared()
                                      // plugins may emit custom namespaced events (e.g. "ferry:arrived")
  };

  resize();
  renderPanel();
})();
</script>

    /* ================= modal ================= */
    let ovl = null;
    function close(){ if(ovl){ ovl.remove(); ovl = null; } }
    document.addEventListener("keydown", e => {
      try{ if(e.key === "Escape" && ovl) close(); }catch(err){ console.error("[kwbn]", err); }
    });

    function openPaper(){
      try{
        if(ovl){ close(); return; }
        let issue = 1;
        try{
          issue = (parseInt(localStorage.getItem(LSK), 10) || 0) + 1;
          localStorage.setItem(LSK, String(issue));
        }catch(e){ /* 私製版として発行 */ }

        const head = buildHead();

        let pool = log.filter(e => e !== head.used);
        if(agg.whale > 0 && head.kind !== "whale")
          pool = pool.concat([{type:"whale-agg", t:agg.whaleT, n:agg.whale}]);
        pool.sort((a, b) => b.t - a.t);
        const briefs = [];
        for(const e of pool){
          if(briefs.length >= 4) break;
          const line = briefLine(e);
          if(line) briefs.push(`<div class="kwbn-line">一、${line}<span class="kwbn-time">（${hourOf(e.t)}ごろ）</span></div>`);
        }

        let secs = "";
        if(briefs.length)
          secs += `<div class="kwbn-rule"></div><div class="kwbn-sech">【続報】</div>${briefs.join("")}`;
        if(agg.ferry > 0){
          let f = `連絡船、本日${kanjiNum(agg.ferry)}往復。船頭は元気とのこと。`;
          const tr = topRoute();
          if(tr && agg.ferry > 1) f += `もっとも賑わうは${esc(tr)}の航路なり。`;
          secs += `<div class="kwbn-rule"></div><div class="kwbn-sech">【航路だより】</div><div class="kwbn-line">${f}</div>`;
        }
        if(head.kind === "peace")
          secs += `<div class="kwbn-rule"></div><div class="kwbn-sech">【風のうわさ】</div><div class="kwbn-line">${esc(I.pick(RUMORS))}</div>`;
        secs += `<div class="kwbn-rule"></div><div class="kwbn-sech">【売り声】</div><div class="kwbn-line">${esc(I.pick(ADS))}</div>`;

        const d = new Date();
        const dateStr = `島暦${kanjiNum(d.getMonth() + 1)}月${kanjiNum(d.getDate())}日（${"日月火水木金土"[d.getDay()]}曜）`;

        ovl = document.createElement("div");
        ovl.className = "kwbn-ovl";
        ovl.innerHTML =
          `<div class="kwbn-paper" role="dialog" aria-label="島々瓦版">` +
            `<div class="kwbn-body">` +
              `<div class="kwbn-date"><span>${dateStr}</span><span>晴れときどき波</span></div>` +
              `<div class="kwbn-rule kwbn-rule-top"></div>` +
              `<div class="kwbn-head">${head.title}</div>` +
              `<div class="kwbn-article">${head.art}</div>` +
              secs +
              `<div class="kwbn-foot">発行: 島々瓦版　一部 貝がら三枚</div>` +
              `<button class="kwbn-close" type="button">畳んで戻る</button>` +
            `</div>` +
            `<div class="kwbn-side">` +
              `<div class="kwbn-title">島々瓦版</div>` +
              `<div class="kwbn-hanko">読売</div>` +
              `<div class="kwbn-issue">第${kanjiNum(issue)}号</div>` +
            `</div>` +
          `</div>`;
        ovl.addEventListener("pointerdown", e => {
          try{ if(e.target === ovl){ e.preventDefault(); close(); } }catch(err){ console.error("[kwbn]", err); }
        });
        ovl.querySelector(".kwbn-close").addEventListener("click", close);
        document.body.append(ovl);
        try{
          ovl.querySelector(".kwbn-paper").animate(
            [{transform:"scale(.94) rotate(.6deg)", opacity:0}, {transform:"scale(1) rotate(0deg)", opacity:1}],
            {duration:260, easing:"cubic-bezier(.2,1.1,.4,1)"});
        }catch(e){}
      }catch(err){ console.error("[kwbn] open", err); }
    }

    I.addButton("🗞 瓦版", openPaper);
  }catch(err){ console.error("[kwbn] init", err); }
})();
</script>

<script>
// ════ plugin: tanken-explorer ════ Paste into its own <script> tag after the core script in island-maker/index.html. Ambient sailboat (white sail, thin hull, terracotta pennant) lives in ISLE.gFx and is phase/wall-time driven (performa
(()=>{ "use strict";
if(!window.ISLE) return;
try{
  const ISLE = window.ISLE;
  const LSKEY = "isle-tanken-v1", CAP = 80, LAND_MS = 8000;
  const esc = s => String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
  const hhmm = () => { const d=new Date(); return String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0"); };

  // ---------- corpora ----------
  const REACT = [
    "味はする。","二度目はないが、一度目でよかった。","持ち帰りは断られた。理由は聞きそびれた。",
    "うまい。うまいが、何かを試されている気もした。","飲み込むまでがやや長かった。記録には残す。",
    "村の人は毎日これを食べているらしい。尊敬する。","舌が驚いていた。私も驚いていた。",
    "噛むほどに謎が深まる味。要研究とする。","おかわりを勧められたので、礼を述べて浜まで歩いた。早足で。",
    "正直に言えば好きだ。正直に言うまで三口かかった。","説明の難しい味である。海を見ながら食べるとちょうどよい。",
  ];
  const PEAK_TAIL = [
    "登る前から高いと分かっていたが、実際に高かった。以上である。",
    "眺めの九割は海だった。残りもおおむね海だった。良い島である。",
    "頂上で帽子が飛んだ。帽子はいま、この島のものである。",
  ];
  const POP_TAIL = [
    "数え直すのは失礼にあたるそうなので、台帳を信じる。",
    "全員に挨拶したつもりが、途中から二周目に入っていた気がする。",
    "正確さより気持ちが大事、とのことだった。同感である。",
  ];
  const LEG_TAIL = [
    "現地で検証を試みたが、採取できたのは波の音だけだった。",
    "半分だけ信じることにした。残り半分は荷物になるので置いていく。",
    "手帳には「要再調査」とだけ書いた。再調査の予定は未定である。",
  ];
  const REVISIT = [
    ()=>"再訪。前より木が増えた気がするが、数えると増えるらしいので数えない。",
    (i,v)=>v?`再訪。${v.name}の犬に覚えられていた。探検家として一歩前進である。`:"再訪。浜の犬に覚えられていた。探検家として一歩前進である。",
    ()=>"再訪。特に変わりはない。変わりがないことを確かめるのも仕事のうちである。",
    ()=>"再訪。「また来たのか」という顔をされた。また来たのである。",
    ()=>"再訪。前回書き忘れたことを書きに来たが、何を忘れたか忘れた。風はよい。",
    (i)=>`再訪。${i.name}の砂浜は今日も砂でできていた。安心して出航する。`,
    (i,v)=>v?`再訪。「${v.specialty}」をまた勧められた。学んだので今回は丁重に辞退した。`:"再訪。名産をまた勧められた。学んだので今回は丁重に辞退した。",
  ];
  const SIGNOFF = [
    "本日もよい風でした。","インクが残り少ない。次の島で買えるとは思えないが、聞くだけ聞く。",
    "帆の継ぎあてがまた一枚増えた。勲章である。","明日はもう少し遠くへ行く。たぶん。",
    "夕方の海は金色だった。これは何度見てもよい。","観測は続く。風のある限り。",
  ];
  const SEA_NOTE = "海ばかりである。それはそれでよい。";

  function fieldNote(isl, revisit){
    const v = isl.villages.length ? ISLE.pick(isl.villages) : null;
    if(revisit) return ISLE.pick(REVISIT)(isl, v);
    const bodies = [];
    if(v){
      const taste = ()=>`${v.name}の名産「${v.specialty}」を試食した。${ISLE.pick(REACT)}`;
      bodies.push(taste, taste); // 試食は探検の華なので重み2
      bodies.push(()=>`${v.name}の人口は${v.pop}とのこと。${ISLE.pick(POP_TAIL)}`);
    }
    bodies.push(()=>`最高地点（標高${isl.peak}m）に登頂した。${ISLE.pick(PEAK_TAIL)}`);
    bodies.push(()=>`古い言い伝えを聞いた。${isl.legend}${ISLE.pick(LEG_TAIL)}`);
    return `${isl.name}に上陸。` + ISLE.pick(bodies)();
  }

  // ---------- journal storage ----------
  let journal = [];
  try{
    const raw = localStorage.getItem(LSKEY);
    if(raw){ const a = JSON.parse(raw);
      if(Array.isArray(a)) journal = a.filter(e=>e && typeof e.txt==="string").slice(-CAP); }
  }catch(err){ console.error("[tanken] load", err); }
  function saveJournal(){ try{ localStorage.setItem(LSKEY, JSON.stringify(journal)); }catch(err){ console.error("[tanken] save", err); } }
  function addEntry(islName, txt){
    try{
      journal.push({t: hhmm(), isle: islName||"", txt});
      if(journal.length > CAP) journal.splice(0, journal.length-CAP);
      saveJournal();
      if(ov.classList.contains("tanken-show")) renderBook();
    }catch(err){ console.error("[tanken] entry", err); }
  }

  // ---------- css ----------
  const style = document.createElement("style");
  style.textContent = `
  .tanken-ov{position:fixed;inset:0;z-index:8;background:rgba(31,48,56,.35);display:flex;
    align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s}
  .tanken-ov.tanken-show{opacity:1;pointer-events:auto}
  .tanken-book{width:min(420px,92vw);max-height:min(560px,84vh);display:flex;flex-direction:column;
    background:#7a5238;border-radius:14px;padding:10px;transform:translateY(12px);transition:transform .25s;
    box-shadow:0 18px 50px rgba(20,40,50,.45), inset 0 0 0 2px rgba(0,0,0,.18);
    background-image:radial-gradient(circle at 30% 20%, rgba(255,255,255,.07), transparent 60%)}
  .tanken-ov.tanken-show .tanken-book{transform:none}
  .tanken-head{display:flex;align-items:center;gap:10px;padding:6px 8px 10px;color:#f4e8ce}
  .tanken-title{font-weight:700;font-size:15px;letter-spacing:.08em}
  .tanken-count{margin-left:auto;font-size:11px;color:#e8d3ad;letter-spacing:.05em}
  .tanken-x{border:0;background:rgba(244,236,217,.15);color:#f4e8ce;border-radius:50%;width:24px;height:24px;
    cursor:pointer;font-size:12px;line-height:1;font-family:inherit;flex:none}
  .tanken-x:hover{background:rgba(244,236,217,.32)}
  .tanken-pages{flex:1;overflow-y:auto;background:#f7f0dd;border-radius:8px;padding:12px 14px;
    border:1.5px dashed rgba(122,82,56,.5);scrollbar-width:thin;min-height:120px}
  .tanken-e{padding:9px 2px;border-bottom:1px dashed rgba(122,82,56,.3)}
  .tanken-e:last-child{border-bottom:0}
  .tanken-eh{display:flex;align-items:baseline;gap:8px}
  .tanken-time{font-size:10.5px;color:#c97b4a;font-weight:700;letter-spacing:.06em}
  .tanken-isle{font-size:13px;font-weight:700;color:#2b3a45;letter-spacing:.04em}
  .tanken-body{font-size:12.5px;line-height:1.9;color:#4a4234;margin-top:3px}
  .tanken-empty{font-size:12.5px;color:#8a7a5e;line-height:1.9;padding:8px 2px}
  .tanken-foot{padding:9px 8px 4px;font-size:11.5px;color:#e8d3ad;text-align:right;letter-spacing:.04em}`;
  document.head.append(style);

  // ---------- journal modal ----------
  const ov = document.createElement("div");
  ov.className = "tanken-ov";
  ov.innerHTML =
    `<div class="tanken-book" role="dialog" aria-label="探検記">`+
    `<div class="tanken-head"><span class="tanken-title">⛵ 探検記</span>`+
    `<span class="tanken-count"></span><button class="tanken-x" title="とじる">✕</button></div>`+
    `<div class="tanken-pages"></div><div class="tanken-foot"></div></div>`;
  document.body.append(ov);
  const pagesEl = ov.querySelector(".tanken-pages");
  const countEl = ov.querySelector(".tanken-count");
  const footEl  = ov.querySelector(".tanken-foot");
  function renderBook(){
    try{
      const isls = ISLE.islands;
      const n = isls.filter(i=>visited.has(i.id)).length;
      countEl.textContent = `踏査済み: ${n}島／発見待ち: ${isls.length-n}島`;
      if(!journal.length){
        pagesEl.innerHTML = `<div class="tanken-empty">まだ何も書かれていない。これから書くのである。</div>`;
        return;
      }
      pagesEl.innerHTML = journal.slice().reverse().map(e =>
        `<div class="tanken-e"><div class="tanken-eh"><span class="tanken-time">${esc(e.t)}</span>`+
        `<span class="tanken-isle">${esc(e.isle||"外洋")}</span></div>`+
        `<div class="tanken-body">${esc(e.txt)}</div></div>`).join("");
    }catch(err){ console.error("[tanken] renderBook", err); }
  }
  function openBook(){ renderBook(); footEl.textContent = "— " + ISLE.pick(SIGNOFF); ov.classList.add("tanken-show"); }
  function closeBook(){ ov.classList.remove("tanken-show"); }
  ov.addEventListener("pointerdown", e => { if(e.target === ov) closeBook(); });
  ov.querySelector(".tanken-x").addEventListener("click", () => { try{ closeBook(); }catch(err){ console.error("[tanken]", err); } });
  document.addEventListener("keydown", e => { if(e.key === "Escape" && ov.classList.contains("tanken-show")) closeBook(); });
  ISLE.addButton("⛵ 探検記", () => {
    try{ ov.classList.contains("tanken-show") ? closeBook() : openBook(); }
    catch(err){ console.error("[tanken] button", err); }
  });

  // ---------- the boat ----------
  const boatG = ISLE.mk("g", {class:"tanken-boat"});
  const titleEl = ISLE.mk("title"); titleEl.textContent = "探検家の船（クリックで探検記）"; boatG.append(titleEl);
  const wake = ISLE.mk("g", {opacity:0});
  wake.append(ISLE.mk("path",{d:"M -13 2 q -6 2 -11 1", stroke:"#ffffff","stroke-width":1.3, fill:"none","stroke-linecap":"round", opacity:.7}));
  wake.append(ISLE.mk("path",{d:"M -12 4.5 q -4 1.5 -8 1", stroke:"#ffffff","stroke-width":1, fill:"none","stroke-linecap":"round", opacity:.5}));
  boatG.append(wake);
  boatG.append(ISLE.mk("path",{d:"M -11 0 L 12 0 Q 10 4.5 5.5 5 L -5.5 5 Q -10 4.5 -11 0 Z", fill:"#b08457", stroke:"#5d4636","stroke-width":.9}));
  boatG.append(ISLE.mk("line",{x1:0, y1:0, x2:0, y2:-16, stroke:"#5d4636","stroke-width":1.1}));
  boatG.append(ISLE.mk("path",{d:"M 0 -15.5 Q 8 -11 9.5 -3 L 0 -2.6 Z", fill:"#fdfbf2", stroke:"#c9bd9e","stroke-width":.7}));
  boatG.append(ISLE.mk("path",{d:"M -0.8 -15.8 L -6 -14 L -0.8 -12.4 Z", fill:"#c97b4a"}));
  boatG.style.cursor = "pointer";
  boatG.addEventListener("pointerdown", e => {
    if(e.button !== 0) return;
    e.preventDefault();           // 海クリック＝島生成を起こさせない
    try{ ov.classList.contains("tanken-show") ? closeBook() : openBook(); }
    catch(err){ console.error("[tanken] boat click", err); }
  });
  ISLE.gFx.append(boatG);

  // ---------- actors: anchor & footprints ----------
  let anchorEl = null;
  function dropAnchor(){
    clearAnchor(true);
    try{
      const g = ISLE.mk("g", {"pointer-events":"none", opacity:0});
      g.append(ISLE.mk("line",{x1:boat.x, y1:boat.y+3, x2:boat.x+4, y2:boat.y+9,
        stroke:"#5d4636","stroke-width":1, "stroke-dasharray":"2 1.6", opacity:.8}));
      g.append(ISLE.mk("circle",{cx:boat.x+4, cy:boat.y+9, r:1.9, fill:"#2b3a45", opacity:.85}));
      ISLE.gFx.insertBefore(g, boatG);
      g.animate([{opacity:0},{opacity:1}],{duration:300, fill:"forwards"});
      anchorEl = g;
    }catch(err){ console.error("[tanken] anchor", err); }
  }
  function clearAnchor(instant){
    const g = anchorEl; anchorEl = null;
    if(!g) return;
    if(instant){ g.remove(); return; }
    try{
      const a = g.animate([{opacity:1},{opacity:0}],{duration:300, fill:"forwards"});
      a.onfinish = () => { try{ g.remove(); }catch(e){} };
      setTimeout(() => { try{ g.remove(); }catch(e){} }, 1500);
    }catch(err){ g.remove(); }
  }
  function footprints(isl, ang){
    try{
      const g = ISLE.mk("g", {"pointer-events":"none"});
      const px = -Math.sin(ang), py = Math.cos(ang);
      const r0 = isl.size*0.95, r1 = isl.size*0.28, STEPS = 7;
      const dots = [];
      for(let i=0;i<STEPS;i++) dots.push({f:i/(STEPS-1), s:(i%2 ? 2.2 : -2.2)});        // 浜→内陸
      for(let i=STEPS-1;i>=0;i--) dots.push({f:i/(STEPS-1), s:(i%2 ? 2.2 : -2.2)+4});   // 内陸→浜（少しずらす）
      dots.forEach((d,k) => {
        const rr = r0 + (r1-r0)*d.f;
        const c = ISLE.mk("circle",{cx:isl.x+Math.cos(ang)*rr+px*d.s, cy:isl.y+Math.sin(ang)*rr+py*d.s,
          r:1.3, fill:"#6b4f37", opacity:0});
        c.animate([{opacity:0},{opacity:.6}],{duration:200, delay:240+k*210, fill:"forwards"});
        g.append(c);
      });
      ISLE.gFx.insertBefore(g, boatG);
      const fade = g.animate([{opacity:1},{opacity:0}],{duration:1400, delay:5900, fill:"forwards"});
      fade.onfinish = () => { try{ g.remove(); }catch(e){} };
      setTimeout(() => { try{ g.remove(); }catch(e){} }, 12000);
    }catch(err){ console.error("[tanken] footprints", err); }
  }

  // ---------- sailing brain (wall-time driven) ----------
  const visited = new Set();
  let lastIsleId = 0, seaNoted = false, driftSince = 0;
  const W0 = ISLE.W || 800, H0 = ISLE.H || 600;
  const boat = {x: W0*(0.3+Math.random()*0.4), y: H0*(0.6+Math.random()*0.25)};
  let facing = 1, tilt = 0;
  let st = {mode:"plan"};
  const easeIO = p => p < .5 ? 2*p*p : 1 - Math.pow(-2*p+2, 2)/2;
  function setHeading(dx, dy){
    facing = dx >= 0 ? 1 : -1;
    tilt = Math.max(-18, Math.min(18, Math.atan2(dy, Math.abs(dx)) * 57.3 * 0.35));
  }
  function startDriftLeg(now){
    const W = ISLE.W||800, H = ISLE.H||600;
    const a = Math.random()*Math.PI*2, r = 90 + Math.random()*150;
    const tx = Math.max(50, Math.min(W-50, boat.x + Math.cos(a)*r));
    const ty = Math.max(80, Math.min(H-60, boat.y + Math.sin(a)*r));
    setHeading(tx-boat.x, ty-boat.y);
    const dist = Math.hypot(tx-boat.x, ty-boat.y) || 1;
    st = {mode:"drift", t0:now, dur:Math.max(1500, dist/0.016), from:{x:boat.x,y:boat.y}, to:{x:tx,y:ty}};
  }
  function plan(now){
    const isls = ISLE.islands;
    if(!isls.length){ driftSince = now; startDriftLeg(now); return; }
    const unv = isls.filter(i => !visited.has(i.id));
    let pool = unv.length ? unv : (isls.length > 1 ? isls.filter(i => i.id !== lastIsleId) : isls);
    if(!pool.length) pool = isls;
    const isl = ISLE.pick(pool);
    const ang = Math.atan2(boat.y - isl.y, boat.x - isl.x);   // 島から見て船のいる側に投錨
    const to = {x: isl.x + Math.cos(ang)*isl.size*1.5, y: isl.y + Math.sin(ang)*isl.size*1.5};
    const dist = Math.hypot(to.x-boat.x, to.y-boat.y) || 1;
    setHeading(to.x-boat.x, to.y-boat.y);
    st = {mode:"sail", t0:now, dur:Math.max(1100, dist/0.042), from:{x:boat.x,y:boat.y}, to, isl, ang};
  }
  function land(now){
    const isl = st.isl;
    boat.x = st.to.x; boat.y = st.to.y;
    const revisit = visited.has(isl.id);
    visited.add(isl.id); lastIsleId = isl.id;
    tilt = 0;
    dropAnchor();
    footprints(isl, st.ang);
    st = {mode:"land", t0:now, isl};
    try{ ISLE.emit("explorer:visited", {island: isl}); }catch(err){ console.error("[tanken] emit", err); }
    seaNoted = false;
    addEntry(isl.name, fieldNote(isl, revisit));
  }
  function tick(now){
    if(st.mode === "plan"){ plan(now); }
    else if(st.mode === "sail"){
      if(ISLE.islands.indexOf(st.isl) < 0){ plan(now); }
      else{
        const p = Math.min(1, (now-st.t0)/st.dur), e = easeIO(p);
        boat.x = st.from.x + (st.to.x-st.from.x)*e;
        boat.y = st.from.y + (st.to.y-st.from.y)*e;
        if(p >= 1) land(now);
      }
    }
    else if(st.mode === "land"){
      if(ISLE.islands.indexOf(st.isl) < 0 || now - st.t0 >= LAND_MS){
        clearAnchor(false);
        st = {mode:"plan"};
      }
    }
    else if(st.mode === "drift"){
      if(ISLE.islands.length){ st = {mode:"plan"}; }
      else{
        const p = Math.min(1, (now-st.t0)/st.dur), e = easeIO(p);
        boat.x = st.from.x + (st.to.x-st.from.x)*e;
        boat.y = st.from.y + (st.to.y-st.from.y)*e;
        if(p >= 1) startDriftLeg(now);
        if(!seaNoted && now - driftSince > 20000){ seaNoted = true; addEntry("", SEA_NOTE); }
      }
    }
    const bob = Math.sin(now/520)*1.3;
    boatG.setAttribute("transform",
      `translate(${boat.x.toFixed(1)} ${(boat.y+bob).toFixed(1)}) scale(${facing} 1) rotate(${tilt.toFixed(1)})`);
    wake.setAttribute("opacity", st.mode === "sail" ? .55 : st.mode === "drift" ? .3 : 0);
  }
  function loop(now){
    try{ tick(now); }catch(err){ console.error("[tanken] tick", err); st = {mode:"plan"}; }
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);

  ISLE.on("island-added", () => { if(st.mode === "drift") st = {mode:"plan"}; });
  ISLE.on("cleared", () => { clearAnchor(true); st = {mode:"plan"}; });
}catch(err){ console.error("[tanken-explorer] init failed", err); }
})();
</script>

<script>
// ════ plugin: tourist-pamphlet ════ Tourist brochure plugin (key "pamph"). Injects a 「📰 パンフ」 link into each ledger card on "panel-rendered" (guarded against duplicates, stopPropagation so the card's story doesn't toggle) and into the do
(() => {
  "use strict";
  if (!window.ISLE) return;
  const ISLE = window.ISLE;

  try {

    // ---------- helpers ----------
    const esc = s => String(s).replace(/[&<>"']/g, c =>
      ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
    const ERR = e => console.error("[pamph]", e);

    // ---------- corpora ----------
    const CATCH = [
      i => `何もない、がぜんぶある。`,
      i => `${i.name}で、予定を捨てよう。`,
      i => `波の音に、既読はつきません。`,
      i => `ようこそ、時間が余る島へ。`,
      i => `${i.name}。地図のすみで、待ってます。`,
      i => `がんばらない旅、はじめませんか。`,
      i => `明日のことは、潮にきいてください。`,
      i => `ここでは、昼寝が予定に入ります。`,
      i => `${i.name}、本日もおおむね凪。`,
      i => `帰りの船を、つい逃したくなる島。`,
      i => `電波より、波を。`,
      i => `人口より、カモメが多い日もあります。`,
    ];
    const C_MORNING = [
      v => `${v.name}で${v.specialty}の朝市をひやかす`,
      v => `港でカモメの点呼を見学する`,
      v => `${v.name}の防波堤で釣り糸を垂れる（釣果は問わない）`,
      v => `浜で貝がらの検品（任意参加）`,
    ];
    const C_NOON = [
      v => `砂浜で計画的な昼寝`,
      v => `${v.name}の食堂で${v.specialty}定食（日替わりで毎日同じ）`,
      v => `島いちばんの木陰を視察する`,
      v => `${v.specialty}の産地を遠くから眺める`,
    ];
    const C_AFTERNOON = [
      v => `何もしない（自由時間）`,
      v => `坂をのぼって、おりる`,
      v => `${v.name}の掲示板を熟読する`,
      v => `波打ちぎわで石をひとつ選ぶ（お持ち帰りは一個まで）`,
      v => `${v.specialty}について島の人に質問し、はぐらかされる`,
    ];
    const C_EVENING = [
      v => `岬で夕日の進捗を確認する`,
      v => `港で連絡船を見送る（乗らない）`,
      v => `${v.name}の灯りを数えながら宿へもどる`,
    ];
    const SALES = [
      "お土産にどうぞ。賞味期限は気分です",
      "数量限定（数えていません）",
      "島の人もたまに買います",
      "箱だけは立派です",
      "説明できないおいしさ（説明は放棄）",
      "お一人様何点でも。むしろ持って帰ってほしい",
      "贈ると会話が生まれます。主に質問",
      "当観光協会いちおし。次点はありません",
      "効能は特にありませんが、気は済みます",
      "持ち帰り用の袋は風と相談で選びます",
    ];
    const ACCESS = [
      "連絡船で行けます（来れば）",
      "アクセス: 困難",
      "迷っているうちに着きます",
      "港から徒歩。島内はすべて徒歩",
      "お問い合わせ: 浜で大きめの声でどうぞ",
      "カーナビには出ません。出たらそれは別の島です",
      "所要時間: 潮しだい",
    ];

    // ---------- styles ----------
    const style = document.createElement("style");
    style.textContent = `
      .pamph-link{display:inline-block;margin:7px 0 0 16px;font-size:11.5px;font-weight:700;
        color:#2f8f83;cursor:pointer;letter-spacing:.05em;
        border-bottom:1px dashed rgba(47,143,131,.55);user-select:none}
      .pamph-link:hover{color:#c97b4a;border-bottom-color:rgba(201,123,74,.6)}
      .pamph-link--dossier{margin:10px 0 0}
      .pamph-overlay{position:fixed;inset:0;z-index:8;background:rgba(31,48,56,.42);
        display:flex;align-items:center;justify-content:center;
        opacity:0;pointer-events:none;transition:opacity .22s}
      .pamph-overlay.pamph-show{opacity:1;pointer-events:auto}
      .pamph-modal{position:relative;width:min(430px,92vw);max-height:86vh;overflow-y:auto;
        background:#f9f1dd;color:#2b3a45;border:2px solid #c97b4a;border-radius:18px;
        padding:24px 28px 18px;line-height:1.9;scrollbar-width:thin;
        box-shadow:0 18px 50px rgba(20,60,70,.4),inset 0 0 0 5px #f9f1dd,inset 0 0 0 6.5px rgba(47,143,131,.5);
        transform:translateY(14px);transition:transform .22s}
      .pamph-overlay.pamph-show .pamph-modal{transform:translateY(0)}
      .pamph-x{position:absolute;top:10px;right:14px;font-size:14px;color:#8a7a5e;cursor:pointer;padding:4px}
      .pamph-x:hover{color:#2b3a45}
      .pamph-band{display:inline-block;background:#c97b4a;color:#fdf6e6;font-size:10.5px;
        font-weight:700;letter-spacing:.16em;padding:3px 13px;border-radius:999px}
      .pamph-catch{font-size:21px;font-weight:800;letter-spacing:.02em;line-height:1.55;
        margin:13px 0 2px;color:#2b3a45}
      .pamph-mapwrap{display:flex;justify-content:center;margin:12px 0 2px}
      .pamph-mapsvg{width:184px;height:auto;background:#fdf8ea;
        border:1.5px dashed rgba(201,123,74,.55);border-radius:12px}
      .pamph-h{font-size:11.5px;font-weight:800;letter-spacing:.22em;color:#2f8f83;
        margin:16px 0 5px;padding-bottom:3px;border-bottom:2px dotted rgba(201,123,74,.5)}
      .pamph-row{font-size:13px;color:#3d5a64;display:flex;gap:9px;align-items:baseline}
      .pamph-row b{flex:none;color:#c97b4a;font-size:12px;letter-spacing:.06em}
      .pamph-body{font-size:13px;color:#3d5a64}
      .pamph-item{margin-bottom:7px}
      .pamph-item b{color:#2b3a45}
      .pamph-src{font-size:11px;color:#7a8b94;margin-left:2px}
      .pamph-copy{font-size:11.5px;color:#8a7a5e;line-height:1.7}
      .pamph-reroll{display:inline-block;margin-top:14px;font-size:12px;font-weight:700;
        color:#2f8f83;cursor:pointer;border-bottom:1px dashed rgba(47,143,131,.55);user-select:none}
      .pamph-reroll:hover{color:#c97b4a}
      .pamph-foot{margin-top:13px;padding-top:8px;border-top:1px solid rgba(43,58,69,.15);
        font-size:10.5px;letter-spacing:.08em;color:#8a7a5e;text-align:right}
    `;
    document.head.append(style);

    // ---------- modal shell (built once) ----------
    const overlay = document.createElement("div");
    overlay.className = "pamph-overlay";
    const modal = document.createElement("div");
    modal.className = "pamph-modal";
    overlay.append(modal);
    document.body.append(overlay);

    const state = { open: false, isl: null, lastCatch: -1 };

    overlay.addEventListener("click", e => {
      try { if (e.target === overlay) closeBrochure(); } catch (err) { ERR(err); }
    });
    document.addEventListener("keydown", e => {
      try { if (state.open && e.key === "Escape") closeBrochure(); } catch (err) { ERR(err); }
    });

    // ---------- generators ----------
    const vof = isl => isl.villages.length
      ? ISLE.pick(isl.villages)
      : { name: isl.name, specialty: "潮風" };

    function buildCourse(isl) {
      const rows = [];
      rows.push(["10:00", ISLE.pick(C_MORNING)(vof(isl))]);
      rows.push([ISLE.pick(["12:00", "12:30", "13:00"]), ISLE.pick(C_NOON)(vof(isl))]);
      const aft = C_AFTERNOON.slice().sort(() => Math.random() - .5);
      rows.push(["15:30", aft[0](vof(isl))]);
      if (Math.random() < .5) rows.splice(2, 0, ["14:30", aft[1](vof(isl))]);
      rows.push([ISLE.pick(["17:00", "17:30"]), ISLE.pick(C_EVENING)(vof(isl))]);
      return rows;
    }

    function souvenirHTML(isl) {
      if (!isl.villages.length) return `<div class="pamph-item">名産品は現在、海が検討中です。</div>`;
      const copies = SALES.slice().sort(() => Math.random() - .5);
      return isl.villages.map((v, i) =>
        `<div class="pamph-item"><b>${esc(v.specialty)}</b>` +
        `<span class="pamph-src">（${esc(v.name)}産）</span>` +
        `<div class="pamph-copy">${esc(copies[i % copies.length])}</div></div>`
      ).join("");
    }

    function mapSVG(isl) {
      const sc = 0.5;
      const R = Math.round(isl.size * 0.66 + 22);
      const ring = ISLE.smoothPath(isl.pts, sc * 1.22);
      const body = ISLE.smoothPath(isl.pts, sc);
      const vr = isl.size * 0.82 * sc;
      let dots = "";
      for (const v of isl.villages) {
        const x = +(Math.cos(v.angle) * vr).toFixed(1);
        const y = +(Math.sin(v.angle) * vr).toFixed(1);
        dots += `<circle cx="${x}" cy="${y}" r="2.6" fill="#c97b4a" stroke="#fdf8ea" stroke-width="1.1"/>` +
          `<text x="${x}" y="${y + 10.5}" text-anchor="middle" font-size="7.5" font-weight="600" fill="#2b3a45">${esc(v.name)}</text>`;
      }
      const wv = (x, y) =>
        `<path d="M ${x} ${y} q 4 -3 8 0 q 4 3 8 0" stroke="#2f8f83" stroke-width="1" fill="none" opacity=".45" stroke-linecap="round"/>`;
      return `<svg class="pamph-mapsvg" viewBox="${-R} ${-R} ${R * 2} ${R * 2}" xmlns="http://www.w3.org/2000/svg">` +
        wv(-R + 12, R - 16) + wv(-R + 14, -R + 26) + wv(R - 36, R - 20) +
        `<path d="${ring}" fill="none" stroke="rgba(47,143,131,.5)" stroke-width="1" stroke-dasharray="4 3"/>` +
        `<path d="${body}" fill="#bfe0d2" stroke="#2f8f83" stroke-width="1.6"/>` +
        dots +
        `<g opacity=".75">` +
        `<line x1="${R - 18}" y1="${-R + 26}" x2="${R - 18}" y2="${-R + 13}" stroke="#c97b4a" stroke-width="1.4"/>` +
        `<polygon points="${R - 18},${-R + 9} ${R - 21.5},${-R + 15} ${R - 14.5},${-R + 15}" fill="#c97b4a"/>` +
        `<text x="${R - 18}" y="${-R + 37}" text-anchor="middle" font-size="8" font-weight="700" fill="#c97b4a">N</text>` +
        `</g></svg>`;
    }

    function rollCover(animate) {
      const isl = state.isl;
      if (!isl) return;
      let idx, tries = 0;
      do { idx = (Math.random() * CATCH.length) | 0; }
      while (idx === state.lastCatch && ++tries < 10);
      state.lastCatch = idx;
      const cEl = modal.querySelector(".pamph-catch");
      const kEl = modal.querySelector(".pamph-course");
      if (!cEl || !kEl) return;
      cEl.textContent = CATCH[idx](isl);
      kEl.innerHTML = buildCourse(isl)
        .map(([t, s]) => `<div class="pamph-row"><b>${t}</b><span>${esc(s)}</span></div>`)
        .join("");
      if (animate) {
        for (const el of [cEl, kEl]) {
          el.animate(
            [{ opacity: 0, transform: "translateY(4px)" }, { opacity: 1, transform: "translateY(0)" }],
            { duration: 300, easing: "ease-out" });
        }
      }
    }

    // ---------- open / close ----------
    function openBrochure(isl) {
      state.isl = isl;
      modal.innerHTML =
        `<span class="pamph-x" title="とじる">✕</span>` +
        `<div class="pamph-band">${esc(isl.name)} 観光パンフレット</div>` +
        `<div class="pamph-catch"></div>` +
        `<div class="pamph-mapwrap">${mapSVG(isl)}</div>` +
        `<div class="pamph-h">モデルコース（1日）</div><div class="pamph-course"></div>` +
        `<div class="pamph-h">名産品コーナー</div><div class="pamph-body">${souvenirHTML(isl)}</div>` +
        `<div class="pamph-h">アクセス</div><div class="pamph-body">${esc(ISLE.pick(ACCESS))}</div>` +
        `<div class="pamph-reroll">↻ 別の表紙にする</div>` +
        `<div class="pamph-foot">発行: ${esc(isl.name)}観光協会（会員1名）</div>`;
      rollCover(false);
      modal.querySelector(".pamph-x").addEventListener("click", e => {
        try { e.stopPropagation(); closeBrochure(); } catch (err) { ERR(err); }
      });
      modal.querySelector(".pamph-reroll").addEventListener("click", e => {
        try { e.stopPropagation(); rollCover(true); } catch (err) { ERR(err); }
      });
      overlay.classList.add("pamph-show");
      state.open = true;
      modal.scrollTop = 0;
    }

    function closeBrochure() {
      overlay.classList.remove("pamph-show");
      state.open = false;
      state.isl = null;
    }

    // ---------- link injection ----------
    function makeLink(isl) {
      const s = document.createElement("span");
      s.className = "pamph-link";
      s.textContent = "📰 パンフ";
      s.title = "観光パンフレットをひらく";
      s.addEventListener("click", e => {
        e.stopPropagation();
        try { openBrochure(isl); } catch (err) { ERR(err); }
      });
      return s;
    }

    ISLE.on("panel-rendered", ({ container }) => {
      try {
        for (const card of container.querySelectorAll(".card")) {
          if (card.querySelector(".pamph-link")) continue;
          const isl = ISLE.islands.find(s => String(s.id) === card.dataset.cid);
          if (isl) card.append(makeLink(isl));
        }
      } catch (err) { ERR(err); }
    });

    ISLE.on("dossier-opened", ({ island, el }) => {
      try {
        if (el.querySelector(".pamph-link")) return;
        const link = makeLink(island);
        link.classList.add("pamph-link--dossier");
        el.append(link);
      } catch (err) { ERR(err); }
    });

    ISLE.on("island-removed", isl => {
      try { if (state.open && state.isl && state.isl.id === isl.id) closeBrochure(); }
      catch (err) { ERR(err); }
    });
    ISLE.on("cleared", () => {
      try { if (state.open) closeBrochure(); } catch (err) { ERR(err); }
    });

  } catch (err) {
    console.error("[pamph] init failed", err);
  }
})();
</script>

<script>
// ════ plugin: volcano-subsidence ════ Volcano & subsidence plugin (key "volcano"). Paste verbatim into its own <script> tag after the core script in island-maker/index.html. Ambient only — no doc
(() => {
  "use strict";
  if (!window.ISLE) return;
  const I = window.ISLE;
  const LS_KEY = "isle-atlantis-v1";
  const busy = new Set(); // island ids currently mid-geology (no overlapping events)

  // ------------------------------------------------------------------
  // helpers
  // ------------------------------------------------------------------
  const rnd = (a, b) => a + Math.random() * (b - a);
  const minutes = (a, b) => rnd(a * 60000, b * 60000);
  function guard(fn) {
    return function (...args) {
      try { return fn.apply(this, args); }
      catch (err) { console.error("[volcano]", err); }
    };
  }
  function raf(fn) { requestAnimationFrame(guard(fn)); }

  // own soft-blur filter for ash (prefixed id, appended — never overwrites defs)
  try {
    const f = I.mk("filter", { id: "volcano-soft", x: "-60%", y: "-60%", width: "220%", height: "220%" });
    f.append(I.mk("feGaussianBlur", { stdDeviation: 2.2 }));
    I.defs.append(f);
  } catch (err) { console.error("[volcano]", err); }

  // ------------------------------------------------------------------
  // lore
  // ------------------------------------------------------------------
  const ERAS = ["凪永", "潮明", "浜応", "鯨和", "磯久", "雲宝", "汐徳"];
  const eraYear = () => `${I.pick(ERAS)}${1 + (Math.random() * 45 | 0)}`;
  const ERUPT_LEGENDS = [
    (e) => `${e}年の噴火のとき、村人は全員見物に出ていて無事だった。`,
    (e) => `${e}年の噴火では灰が三日降り続き、島中の屋根が同じ色になった。役場は「統一感が出た」と記録している。`,
    (e) => `${e}年の大噴火を、島ではいまも「山の咳払い」と呼んでいる。山の名誉のためである。`,
    (e) => `${e}年の噴火の晩は海がほんのり温かく、魚が集まりすぎて翌日の漁が休みになった。`,
    (e) => `${e}年の噴火は前触れなく始まったが、終わるときは律儀に小さく三回鳴ったと伝わる。`,
  ];
  const VOLC_SPECIALTY = ["温かい砂", "煙味のチーズ", "火山灰のふりかけ（無味）", "たまに温泉"];
  const ASH = ["#97a3a8", "#8a979d", "#a7b1b4", "#b3babc"];
  const EMBER = ["#e8743c", "#f2a23a", "#d8542e"];

  // ------------------------------------------------------------------
  // small fx
  // ------------------------------------------------------------------
  function ripple(x, y, r0, scaleTo, dur, width) {
    try {
      const ring = I.mk("circle", { cx: x, cy: y, r: Math.max(1, r0), fill: "none",
        stroke: "#ffffff", "stroke-width": width || 1.4, opacity: .65, "pointer-events": "none" });
      ring.style.transformOrigin = `${x}px ${y}px`;
      I.gFx.append(ring);
      ring.animate([
        { transform: "scale(.6)", opacity: .65 },
        { transform: `scale(${scaleTo})`, opacity: 0 }
      ], { duration: dur, easing: "ease-out" }).onfinish = () => ring.remove();
    } catch (err) { console.error("[volcano]", err); }
  }

  function puff(isl, wind) {
    try {
      const cx = isl.x + rnd(-5, 5), cy = isl.y - isl.size * .15 + rnd(-3, 3);
      const c = I.mk("circle", { cx, cy, r: rnd(5, 9).toFixed(1), fill: I.pick(ASH),
        opacity: 0, filter: "url(#volcano-soft)", "pointer-events": "none" });
      c.style.transformOrigin = `${cx}px ${cy}px`;
      I.gFx.append(c);
      const dx = wind * rnd(.7, 1.5) + rnd(-10, 10);
      const dy = -rnd(36, 74);
      c.animate([
        { transform: "translate(0px, 0px) scale(.55)", opacity: 0 },
        { opacity: rnd(.32, .5), offset: .2 },
        { transform: `translate(${dx.toFixed(1)}px, ${dy.toFixed(1)}px) scale(${rnd(2.2, 3.4).toFixed(2)})`, opacity: 0 }
      ], { duration: rnd(2600, 4200), easing: "ease-out" }).onfinish = () => c.remove();
    } catch (err) { console.error("[volcano]", err); }
  }

  function ember(isl) {
    try {
      const ang = Math.random() * Math.PI * 2;
      const dist = isl.size * rnd(1.15, 1.9);
      const sx = isl.x + rnd(-3, 3), sy = isl.y - isl.size * .18;
      const ex = isl.x + Math.cos(ang) * dist;
      const ey = isl.y + Math.sin(ang) * dist * .72 + isl.size * .15;
      const arc = rnd(34, 72);
      const d = I.mk("circle", { cx: sx, cy: sy, r: rnd(1.5, 2.5).toFixed(1),
        fill: I.pick(EMBER), "pointer-events": "none" });
      I.gFx.append(d);
      const frames = [];
      for (let i = 0; i <= 8; i++) {
        const t = i / 8;
        frames.push({ transform:
          `translate(${((ex - sx) * t).toFixed(1)}px, ${((ey - sy) * t - arc * 4 * t * (1 - t)).toFixed(1)}px)` });
      }
      d.animate(frames, { duration: rnd(700, 1100), easing: "linear" })
        .onfinish = guard(() => { d.remove(); ripple(ex, ey, 2.5, 3, 800, 1.1); });
    } catch (err) { console.error("[volcano]", err); }
  }

  // ------------------------------------------------------------------
  // ERUPTION  (~12s, elapsed-time driven; survives tab throttling)
  // ------------------------------------------------------------------
  function erupt(isl) {
    if (!isl || !isl.el) return;
    busy.add(isl.id);
    const T0 = performance.now();
    const PRE = 2400, DUR = 12000, TAIL = 1800;
    const wind = (Math.random() < .5 ? -1 : 1) * rnd(20, 48);
    const orig = isl.el.getAttribute("transform");
    let announced = false, midSaid = false, nextPuff = PRE, nextEmber = PRE + 400;
    I.toast(`${isl.name}の山が、なにか言いたげです`);

    function cleanup(aborted) {
      busy.delete(isl.id);
      try { if (isl.el.isConnected) isl.el.setAttribute("transform", orig); }
      catch (err) { console.error("[volcano]", err); }
      if (aborted) return;
      isl.legend = I.pick(ERUPT_LEGENDS)(eraYear());
      if (Math.random() < .3 && isl.villages.length) {
        const v = I.pick(isl.villages);
        v.specialty = I.pick(VOLC_SPECIALTY);
        I.toast(`${v.name}の名産が「${v.specialty}」に変わりました。山からのお詫びです`);
      }
      I.refreshPanel();
    }

    function step(now) {
      const t = now - T0;
      if (!isl.el.isConnected || I.islands.indexOf(isl) < 0) { cleanup(true); return; }
      if (t >= DUR) { cleanup(false); return; }
      const env = t < PRE ? .3 * (t / PRE)
                : t > DUR - TAIL ? Math.max(0, (DUR - t) / TAIL)
                : 1;
      const amp = 2 * env; // ±2px max jitter
      isl.el.setAttribute("transform",
        `translate(${(isl.x + (Math.random() * 2 - 1) * amp).toFixed(1)} ${(isl.y + (Math.random() * 2 - 1) * amp).toFixed(1)})`);
      if (t >= PRE) {
        if (!announced) { announced = true; I.emit("volcano:eruption", { island: isl }); }
        if (!midSaid && t > DUR * .5) { midSaid = true; I.toast(`${isl.name}、噴火中。村は意外と冷静です`); }
        if (t >= nextPuff) { nextPuff = t + rnd(620, 980); puff(isl, wind); }
        if (t >= nextEmber && t < DUR - 2200) { nextEmber = t + rnd(900, 1700); ember(isl); }
      }
      raf(step);
    }
    raf(step);
  }

  // ------------------------------------------------------------------
  // SUBSIDENCE  (~8s sink of the smallest island)
  // ------------------------------------------------------------------
  function sink(isl) {
    if (!isl || !isl.el) return;
    busy.add(isl.id);
    const D = 8000, T0 = performance.now();
    // CSS transform overrides the translate attribute -> keep translate inside keyframes
    isl.el.style.transformOrigin = "0px 0px";
    const sinkAnim = isl.el.animate([
      { transform: `translate(${isl.x}px, ${isl.y}px) scale(1)`, opacity: 1 },
      { transform: `translate(${isl.x}px, ${isl.y}px) scale(.02)`, opacity: 0 }
    ], { duration: D, easing: "cubic-bezier(.55,0,.8,.45)", fill: "forwards" });
    const labelAnim = isl.label
      ? isl.label.animate([{ opacity: 1 }, { opacity: 0 }], { duration: D * .55, fill: "forwards" })
      : null;
    let nextRing = 500;

    function step(now) {
      const t = now - T0;
      if (!isl.el.isConnected || I.islands.indexOf(isl) < 0) { busy.delete(isl.id); return; }
      if (t >= nextRing && t < D - 600) {
        nextRing = t + 1500;
        ripple(isl.x, isl.y, isl.size * (1.1 - .7 * Math.min(1, t / D)), 1.9, 1800, 1.6);
      }
      if (t < D) { raf(step); return; }
      busy.delete(isl.id);
      if (I.islands.length <= 1) { // never leave an empty sea: undo the dive
        sinkAnim.cancel();
        if (labelAnim) labelAnim.cancel();
        I.toast(`${isl.name}は、沈むのをやめたようです`);
        return;
      }
      remember(isl);
      I.removeIsland(isl.id);
      I.toast(`${isl.name}は、静かに海へ帰っていきました`);
      I.emit("volcano:sunk", { island: isl });
    }
    raf(step);
  }

  // ------------------------------------------------------------------
  // sunken-island memory (localStorage)
  // ------------------------------------------------------------------
  function readAtlantis() {
    try {
      const list = JSON.parse(localStorage.getItem(LS_KEY) || "[]");
      return Array.isArray(list) ? list : [];
    } catch (err) { return []; }
  }
  function remember(isl) {
    try {
      const list = readAtlantis();
      list.push({ name: isl.name, legend: isl.legend, t: Date.now() });
      while (list.length > 50) list.shift();
      localStorage.setItem(LS_KEY, JSON.stringify(list));
    } catch (err) { console.error("[volcano] memory", err); }
  }

  // ------------------------------------------------------------------
  // clocks
  // ------------------------------------------------------------------
  function eruptionClock() {
    setTimeout(guard(() => {
      try {
        if (Math.random() < .35) {
          const cand = I.islands.filter(s => s.size > 55 && !busy.has(s.id));
          if (cand.length) erupt(I.pick(cand));
        }
      } finally { eruptionClock(); }
    }), minutes(3, 6));
  }
  function sinkClock() {
    setTimeout(guard(() => {
      try {
        if (Math.random() < .18 && I.islands.length >= 3) {
          const cand = I.islands.filter(s => !busy.has(s.id));
          if (cand.length) sink(cand.reduce((a, b) => (b.size < a.size ? b : a)));
        }
      } finally { sinkClock(); }
    }), minutes(4, 8));
  }

  try {
    const sunken = readAtlantis();
    if (sunken.length) {
      setTimeout(guard(() => I.toast(`この海には、沈んだ島が${sunken.length}つ眠っています`)), 30000);
    }
  } catch (err) { console.error("[volcano]", err); }

  eruptionClock();
  sinkClock();
})();
</script>

<script>
// ════ plugin: island-weather ════ Ambient weather plugin (no dock button). Everything lives in one pointer-events:none group appended to ISLE.gFx, so sea clicks beneath clouds/rain/typhoon still create islands. Clouds: 3-5 blurred whi
(()=>{
  "use strict";
  if(!window.ISLE) return;
  const I = window.ISLE;
  try{
    const mk = I.mk;

    // ---------- style ----------
    const st = document.createElement("style");
    st.textContent = ".island-weather-layer{pointer-events:none}";
    document.head.appendChild(st);

    // ---------- filters ----------
    const fSoft = mk("filter",{id:"island-weather-soft", x:"-60%", y:"-60%", width:"220%", height:"220%"});
    fSoft.append(mk("feGaussianBlur",{stdDeviation:6}));
    const fSoft2 = mk("filter",{id:"island-weather-soft2", x:"-60%", y:"-60%", width:"220%", height:"220%"});
    fSoft2.append(mk("feGaussianBlur",{stdDeviation:2.5}));
    I.defs.append(fSoft, fSoft2);

    // ---------- layer (above land, ignores all clicks) ----------
    const gW = mk("g",{class:"island-weather-layer","pointer-events":"none"});
    I.gFx.append(gW);

    // ====================================================================
    //  clouds
    // ====================================================================
    const clouds = [];
    const CLOUD_N = 3 + (Math.random()*3|0);   // 3–5
    let speedMult = 1;                          // typhoon doubles this

    function makeCloud(fromEdge){
      const g = mk("g");
      const rainy = Math.random() < .25;
      const parts = 3 + (Math.random()*2|0);    // 3–4 puffs
      const shapes = [];
      for(let i=0;i<parts;i++){
        shapes.push({
          cx:(i-(parts-1)/2)*26 + (Math.random()-.5)*10,
          cy:(Math.random()-.5)*12,
          rx:20 + Math.random()*12,
          ry:11 + Math.random()*6,
        });
      }
      // shadow: same blobs, dark, offset +18px down-right, drawn first
      const shadow = mk("g",{transform:"translate(18,18)", opacity:.08, filter:"url(#island-weather-soft2)"});
      for(const s of shapes) shadow.append(mk("ellipse",{cx:s.cx, cy:s.cy, rx:s.rx, ry:s.ry, fill:"#1f3038"}));
      const puffs = mk("g",{opacity:.7, filter:"url(#island-weather-soft)"});
      for(const s of shapes) puffs.append(mk("ellipse",{cx:s.cx, cy:s.cy, rx:s.rx, ry:s.ry, fill:"#ffffff"}));
      g.append(shadow, puffs);

      let rainG = null, tint = null, rainUntil = 0;
      if(rainy){
        // faint diagonal strokes falling under the cloud, looping
        rainG = mk("g",{opacity:.55});
        const ln = 6 + (Math.random()*3|0);
        for(let k=0;k<ln;k++){
          const lx = (Math.random()-.5)*64, ly = 26 + Math.random()*12;
          const line = mk("line",{x1:lx, y1:ly, x2:lx-5, y2:ly+12,
            stroke:"#5e8fa0", "stroke-width":1.2, "stroke-linecap":"round", opacity:.6});
          line.animate([
            {transform:"translateY(0px)", opacity:0},
            {opacity:.7, offset:.25},
            {transform:"translateY(26px)", opacity:0}
          ],{duration:900+Math.random()*500, iterations:Infinity, delay:-Math.random()*1400, easing:"linear"});
          rainG.append(line);
        }
        // gray tint over the puffs; fades as the rain spends itself
        tint = mk("g",{opacity:.55, filter:"url(#island-weather-soft)"});
        for(const s of shapes) tint.append(mk("ellipse",{cx:s.cx, cy:s.cy, rx:s.rx, ry:s.ry, fill:"#9fb0b8"}));
        g.append(rainG, tint);
        rainUntil = performance.now() + (60 + Math.random()*30)*1000;   // 60–90s
      }
      gW.append(g);
      return {
        g, rainy, rainG, tint, rainUntil,
        x: fromEdge ? -140 : Math.random()*I.W,
        fy: .08 + Math.random()*.84,                       // height as fraction of H (resize-safe)
        vx: (I.W + 280) / (120 + Math.random()*120),       // crossing takes 2–4 min
        phase: Math.random()*Math.PI*2,
      };
    }
    for(let i=0;i<CLOUD_N;i++) clouds.push(makeCloud(false));

    function stopRain(c){
      c.rainy = false;
      if(c.rainG){ c.rainG.remove(); c.rainG = null; }
      if(c.tint){ c.tint.remove(); c.tint = null; }
    }

    function dropRipple(isl){
      const a = Math.random()*Math.PI*2, r = Math.random()*isl.size*.55;
      const x = isl.x + Math.cos(a)*r, y = isl.y + Math.sin(a)*r;
      const dot = mk("circle",{cx:x, cy:y, r:2.4, fill:"none",
        stroke:"#ffffff", "stroke-width":1, opacity:.7});
      dot.style.transformOrigin = `${x}px ${y}px`;
      gW.append(dot);
      dot.animate([
        {transform:"scale(.3)", opacity:.75},
        {transform:"scale(1.5)", opacity:0}
      ],{duration:850, easing:"ease-out"}).onfinish = () => dot.remove();
    }

    // ====================================================================
    //  typhoon
    // ====================================================================
    let ty = null;
    let nextCheck = performance.now() + (360 + Math.random()*240)*1000;  // 6–10 min

    function spiralD(a0, turns, r0, r1, steps){
      let d = "";
      for(let i=0;i<=steps;i++){
        const t = i/steps, a = a0 + turns*Math.PI*2*t, r = r0 + (r1-r0)*t;
        d += (i ? " L " : "M ") + (Math.cos(a)*r).toFixed(1) + " " + (Math.sin(a)*r).toFixed(1);
      }
      return d;
    }

    function startTyphoon(now){
      try{
        const fromLeft = Math.random() < .5, m = 200;
        const g = mk("g",{"pointer-events":"none"});
        const spin = mk("g",{opacity:.9});
        // soft annulus of cloud around a small clear eye
        spin.append(mk("circle",{r:46, fill:"none", stroke:"#ffffff", "stroke-width":42,
          opacity:.15, filter:"url(#island-weather-soft)"}));
        for(let k=0;k<3;k++){
          spin.append(mk("path",{d:spiralD(k*Math.PI*2/3, .62, 16, 68, 26),
            stroke:"#ffffff", "stroke-width":11, fill:"none", "stroke-linecap":"round",
            opacity:.82, filter:"url(#island-weather-soft2)"}));
        }
        spin.append(mk("circle",{r:13, fill:"none", stroke:"#ffffff", "stroke-width":2, opacity:.35}));
        g.append(spin);
        gW.append(g);

        // temporary extra wave marks: the sea gets busy
        const waves = mk("g");
        const n = Math.round(I.W*I.H/30000);
        for(let i=0;i<n;i++){
          const x = Math.random()*I.W, y = Math.random()*I.H, w = 10 + Math.random()*16;
          const p = mk("path",{d:`M ${x} ${y} q ${w*.25} -4, ${w*.5} 0 q ${w*.25} 4, ${w*.5} 0`,
            stroke:"#ffffff", "stroke-width":1.3, fill:"none", opacity:0, "stroke-linecap":"round"});
          p.animate([{opacity:0},{opacity:.45+Math.random()*.3},{opacity:0}],
            {duration:1600+Math.random()*1600, iterations:Infinity, delay:-Math.random()*3000, easing:"ease-in-out"});
          waves.append(p);
        }
        I.gSea.append(waves);

        // very subtle island shake (cancel() removes the effect cleanly)
        const shake = I.gIslands.animate([
          {transform:"translate(0px,0px)"},
          {transform:"translate(1.1px,-0.7px)"},
          {transform:"translate(-1px,0.6px)"},
          {transform:"translate(0.7px,1px)"},
          {transform:"translate(0px,0px)"}
        ],{duration:300, iterations:Infinity});

        ty = {
          g, spin, waves, shake, t0: now, dur: 50000,
          x0: fromLeft ? -m : I.W + m,
          x1: fromLeft ? I.W + m : -m,
          y0: I.H*(.25 + Math.random()*.5),
          y1: I.H*(.25 + Math.random()*.5),
        };
        speedMult = 2;
        I.toast("台風が来ています。各村、雨戸を閉めたり閉めなかったりしています");
        I.emit("weather:typhoon");
      }catch(err){ console.error("[island-weather] typhoon", err); }
    }

    function tickTyphoon(now){
      const f = (now - ty.t0)/ty.dur;
      if(f >= 1){ endTyphoon(); return; }
      const x = ty.x0 + (ty.x1 - ty.x0)*f;
      const y = ty.y0 + (ty.y1 - ty.y0)*f + Math.sin(f*Math.PI*3)*24;
      ty.g.setAttribute("transform", `translate(${x.toFixed(1)} ${y.toFixed(1)})`);
      ty.spin.setAttribute("transform", `rotate(${(-(now - ty.t0)/1000*60)%360})`);
    }

    function endTyphoon(){
      try{
        ty.shake.cancel();
        ty.waves.remove();
        ty.g.remove();
      }catch(err){ console.error("[island-weather] typhoon end", err); }
      ty = null;
      speedMult = 1;
      I.toast("台風一過。空気がいい匂いです");
    }

    // ====================================================================
    //  main loop — elapsed wall time via performance.now() deltas
    // ====================================================================
    let last = performance.now();
    let errCount = 0;
    function tick(now){
      try{
        const dt = Math.min((now - last)/1000, 30);   // big background jumps still advance, capped
        last = now;

        for(let i=0;i<clouds.length;i++){
          const c = clouds[i];
          c.x += c.vx * dt * speedMult;
          const y = c.fy*I.H + Math.sin(now/9000 + c.phase)*9;
          c.g.setAttribute("transform", `translate(${c.x.toFixed(1)} ${y.toFixed(1)})`);

          if(c.rainy){
            const left = c.rainUntil - now;
            if(left <= 0){
              stopRain(c);
            }else{
              // lighten over the final stretch
              if(c.tint)  c.tint.setAttribute("opacity",  (.55*Math.min(1, left/15000)).toFixed(2));
              if(c.rainG) c.rainG.setAttribute("opacity", (.55*Math.min(1, left/8000)).toFixed(2));
              // sporadic ripple dots on land beneath the rain patch
              if(Math.random() < dt*2.5){
                const ry = y + 46;
                const hits = I.islands.filter(s => Math.hypot(s.x - c.x, s.y - ry) < s.size*.9 + 42);
                if(hits.length) dropRipple(I.pick(hits));
              }
            }
          }
          if(c.x > I.W + 150){           // respawn on the upwind (left) side
            c.g.remove();
            clouds[i] = makeCloud(true);
          }
        }

        if(now >= nextCheck){
          nextCheck = now + (360 + Math.random()*240)*1000;   // 6–10 min
          if(!ty && Math.random() < .2) startTyphoon(now);
        }
        if(ty) tickTyphoon(now);
      }catch(err){
        console.error("[island-weather]", err);
        if(++errCount > 30) return;       // give up rather than spam forever
      }
      requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  }catch(err){ console.error("[island-weather] init", err); }
})();
</script>

<script>
// ════ plugin: mura-hatten ════ Paste verbatim into its own <script> tag after the core script in island-maker/index.html. Engine: a 1s setInterval compares performance.now() against a sche
(() => {
  "use strict";
  if(!window.ISLE) return;
  const ISLE = window.ISLE;
  const TAG = "[mura-hatten]";

  // ---------------- config ----------------
  const STEP_MIN = 25000, STEP_MAX = 40000;   // growth tick: every 25-40s
  const PROMOTE_AT = 5;                       // growth points needed for 町
  const PROMO_COOLDOWN = 180000;              // one promotion per island per 3 min
  const RETRY_EMPTY = 10000;                  // re-check sooner while map is empty

  // ---------------- helpers ----------------
  const esc = s => String(s).replace(/[&<>"']/g,
    c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
  const rand = (a, b) => a + Math.random()*(b - a);

  function villageXY(isl, v){
    const r = isl.size*0.82;
    return [isl.x + Math.cos(v.angle)*r, isl.y + Math.sin(v.angle)*r];
  }

  // ---------------- css ----------------
  try{
    const st = document.createElement("style");
    st.textContent = `
      .mura-hatten-meter{font-size:11px;color:#5b7680;margin:6px 0 0 16px;
        letter-spacing:.05em;line-height:1.9}
      .mura-hatten-meter .mura-hatten-dots{color:#2f8f83;letter-spacing:.14em}
      .mura-hatten-meter .mura-hatten-wait{color:#c97b4a;font-size:10px}
    `;
    document.head.append(st);
  }catch(err){ console.error(TAG, err); }

  // ---------------- promotion cooldown bookkeeping ----------------
  const promoAt = new Map(); // island.id -> performance.now() of last promotion
  ISLE.on("island-removed", isl => { try{ promoAt.delete(isl.id); }catch(err){ console.error(TAG, err); } });
  ISLE.on("cleared", () => { try{ promoAt.clear(); }catch(err){ console.error(TAG, err); } });

  // ---------------- fx: tiny "+" sparkle per growth step ----------------
  function sparkle(isl, v){
    try{
      if(!isl.el || !isl.el.isConnected) return;
      const [x, y] = villageXY(isl, v);
      const g = ISLE.mk("g");
      g.setAttribute("pointer-events", "none");
      const t = ISLE.mk("text",{x, y:y-7, "text-anchor":"middle", "font-size":11,
        fill:"#2f8f83", "font-weight":"700", stroke:"#f4ecd9", "stroke-width":2.5,
        "paint-order":"stroke"});
      t.textContent = "＋";
      g.append(t);
      for(let i=0;i<3;i++){
        g.append(ISLE.mk("circle",{cx:x+rand(-9,9), cy:y+rand(-8,2),
          r:rand(.7,1.5), fill:"#ffffff", opacity:.85}));
      }
      ISLE.gFx.append(g);
      g.animate([
        {transform:"translate(0,0)",     opacity:0},
        {transform:"translate(0,-4px)",  opacity:1, offset:.25},
        {transform:"translate(0,-14px)", opacity:0}
      ],{duration:1300, easing:"ease-out"}).onfinish = () => g.remove();
      setTimeout(() => g.remove(), 2600);
    }catch(err){ console.error(TAG, err); }
  }

  // ---------------- fx: promotion confetti ----------------
  function confetti(x, y){
    try{
      const COLORS = ["#c2503e","#2f8f83","#c97b4a","#e8c14d","#fdf6e3","#5b8bb0"];
      const g = ISLE.mk("g");
      g.setAttribute("pointer-events", "none");
      ISLE.gFx.append(g);
      for(let i=0;i<22;i++){
        const a = Math.random()*Math.PI*2, sp = rand(14, 48);
        const dx = Math.cos(a)*sp, dy = Math.sin(a)*sp - rand(4, 16);
        const dot = Math.random() < .5
          ? ISLE.mk("circle",{cx:x, cy:y, r:rand(1.4,2.8), fill:ISLE.pick(COLORS)})
          : ISLE.mk("rect",{x:x-1.6, y:y-1.6, width:3.2, height:3.2, rx:.6, fill:ISLE.pick(COLORS)});
        dot.style.transformOrigin = `${x}px ${y}px`;
        g.append(dot);
        dot.animate([
          {transform:"translate(0,0) rotate(0deg)", opacity:1},
          {transform:`translate(${dx}px,${dy}px) rotate(${rand(-200,200)|0}deg)`, opacity:1, offset:.65},
          {transform:`translate(${dx}px,${dy+13}px) rotate(${rand(-300,300)|0}deg)`, opacity:0}
        ],{duration:rand(1500,2200), delay:rand(0,160), easing:"cubic-bezier(.2,.7,.4,1)", fill:"forwards"});
      }
      const stamp = ISLE.mk("text",{x, y:y-12, "text-anchor":"middle", "font-size":15,
        fill:"#c97b4a", "font-weight":"700", stroke:"#fdf6e3", "stroke-width":3,
        "paint-order":"stroke", "letter-spacing":".12em"});
      stamp.textContent = "祝・町";
      stamp.style.transformOrigin = `${x}px ${y}px`;
      g.append(stamp);
      stamp.animate([
        {transform:"translate(0,8px) scale(.5)", opacity:0},
        {transform:"translate(0,0) scale(1.12)", opacity:1, offset:.3},
        {transform:"translate(0,-5px) scale(1)", opacity:1, offset:.75},
        {transform:"translate(0,-16px) scale(1)", opacity:0}
      ],{duration:2100, easing:"ease-out"});
      setTimeout(() => g.remove(), 2700);
    }catch(err){ console.error(TAG, err); }
  }

  // ------- faithful re-render of village layer + label (mirrors core) -------
  function houseCluster(v, r){
    const g = ISLE.mk("g");
    const hx = Math.cos(v.angle)*r, hy = Math.sin(v.angle)*r;
    const n = v.isTown ? 6 : 2 + (Math.random()*3|0);
    for(let i=0;i<n;i++){
      const dx = (Math.random()-.5)*12, dy = (Math.random()-.5)*9;
      g.append(ISLE.mk("rect",{x:hx+dx-2.4, y:hy+dy-2.2, width:4.8, height:4.4, rx:.8,
        fill: i%3===0 ? "#c2503e" : "#8a6a4f", stroke:"#5d4636", "stroke-width":.5}));
    }
    const t = ISLE.mk("text",{x:hx, y:hy+13, "text-anchor":"middle", "font-size":8.5,
      fill:"#3a4a52", "letter-spacing":".04em", "font-weight":"600"});
    t.textContent = v.name;
    g.append(t);
    return g;
  }

  function rebuildVillageLayer(isl){
    if(!isl.el || !isl.el.isConnected) return;
    const gV = ISLE.mk("g", {class:"isle-villages"});
    const vr = isl.size*.82;
    if(isl.villages.length > 1){
      for(let i=0;i<isl.villages.length;i++){
        const a = isl.villages[i], b = isl.villages[(i+1)%isl.villages.length];
        if(isl.villages.length === 2 && i === 1) break;
        const ax = Math.cos(a.angle)*vr, ay = Math.sin(a.angle)*vr;
        const bx = Math.cos(b.angle)*vr, by = Math.sin(b.angle)*vr;
        gV.append(ISLE.mk("path",{d:`M ${ax} ${ay} Q ${(ax+bx)*.2} ${(ay+by)*.2}, ${bx} ${by}`,
          stroke:"#a98f63", "stroke-width":1.3, fill:"none", "stroke-dasharray":"3 3", opacity:.8}));
      }
    }
    for(const vv of isl.villages) gV.append(houseCluster(vv, vr));
    const old = isl.el.querySelector(".isle-villages");
    if(old) old.replaceWith(gV); else isl.el.append(gV);
  }
