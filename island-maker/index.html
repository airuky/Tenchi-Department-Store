      const lenM = (typeof p.lenM === "number" && isFinite(p.lenM)) ? p.lenM : null;
      g.addEventListener("pointerdown", e => {
        try{
          if(e.button !== 0) return;
          e.preventDefault();                           // 島クリック＝台帳 を起こさせない
          const bits = [];
          if(lenM != null) bits.push(`体長およそ${lenM}m`);
          if(p.eco) bits.push(`暮らし: ${String(p.eco)}`);
          I.toast(`「${name}」。` + (bits.length ? bits.join("、") + "。" : "") + "村人はまだ見ています");
        }catch(err){ console.error(TAG, err); }
      });
      isl.el.append(g);
      g.animate([{opacity:0},{opacity:1}], {duration:600, fill:"forwards"});
      ashore.push({g, inner, dots, isl, bx, by, ang, due: nowMs() + 90000});
      I.toast(`${isl.name}の浜に、見たことのない生きものが打ち上がりました。名前は「${name}」というらしい（誰も聞いていないのに）`);
      const yr = (p.year != null && p.year !== "") ? esc(String(p.year)) + "年" : "";
      isl.legend += `${yr}——浜に${esc(name)}が上がった日のことは、まだ語り草である。`;
      I.refreshPanel();
    }
    function returnToSea(rec){
      try{
        if(!rec.g.isConnected) return;
        const d = Math.max(16, (rec.isl.size || 40)*.3);
        for(const dot of rec.dots){
          try{ dot.animate([{opacity:1},{opacity:0}], {duration:1600, delay:1500, fill:"forwards", easing:"ease-out"}); }
          catch(err){ console.error(TAG, err); }
        }
        const anim = rec.inner.animate(
          [{transform:"translate(0px,0px)", opacity:1},
           {transform:`translate(0px,${(-d).toFixed(1)}px)`, opacity:.95, offset:.8},
           {transform:`translate(0px,${(-d*1.25).toFixed(1)}px)`, opacity:0}],
          {duration:2600, easing:"ease-in", fill:"forwards"});
        anim.onfinish = () => {
          try{
            ripple(rec.isl.x + rec.bx + Math.cos(rec.ang)*d*1.1,
                   rec.isl.y + rec.by + Math.sin(rec.ang)*d*1.1, 6);
            setTimeout(() => { try{ rec.g.remove(); }catch(e){} }, 1800);
          }catch(err){ console.error(TAG, err); try{ rec.g.remove(); }catch(e){} }
        };
        I.toast("村人たちが、生きものをそっと海へ帰しました");
      }catch(err){ console.error(TAG, err); try{ rec.g.remove(); }catch(e){} }
    }

    /* ================= soaked chronicle page ================= */
    const pop = document.createElement("div");
    pop.className = "kairyu-pop";
    document.body.append(pop);
    let popIsl = null, popStamp = -1;
    function closePop(){ pop.classList.remove("kairyu-pshow"); popIsl = null; }
    document.addEventListener("pointerdown", e => {
      try{
        if(popIsl == null) return;
        if(e.timeStamp === popStamp) return;
        if(pop.contains(e.target)) return;
        closePop();
      }catch(err){ console.error(TAG, err); }
    });
    function openPagePop(e, isl, gx, gy, p){
      try{
        const era = (p.era != null && p.era !== "") ? String(p.era) : "どこかの時代";
        const yr = (p.year != null && p.year !== "") ? `・${esc(String(p.year))}年` : "";
        pop.innerHTML =
          `<span class="kairyu-x" title="とじる">✕</span>`+
          `<div class="kairyu-pt">異国の年代記の切れはし</div>`+
          `<div class="kairyu-pera">📜 ${esc(era)}${yr}（インクは半分にじんでいる）</div>`+
          `<div class="kairyu-pbody">${esc(String(p.text || "（読める部分はなかった）"))}</div>`+
          `<div class="kairyu-pnote">${esc(era)}という時代があるらしい。ここには、ない。</div>`;
        pop.querySelector(".kairyu-x").addEventListener("click", ev => {
          try{ ev.stopPropagation(); closePop(); }catch(err){ console.error(TAG, err); }
        });
        pop.style.visibility = "hidden";
        pop.classList.add("kairyu-pshow");
        const w = pop.offsetWidth || 256, h = pop.offsetHeight || 150;
        let left = Math.max(8, Math.min(window.innerWidth - w - 8, gx - w/2));
        let top = gy - h - 18;
        if(top < 64) top = gy + 16;
        top = Math.max(8, Math.min(window.innerHeight - h - 8, top));
        pop.style.left = left + "px"; pop.style.top = top + "px";
        pop.style.visibility = "";
        popIsl = isl.id; popStamp = e.timeStamp;
      }catch(err){ console.error(TAG, err); }
    }
    function beachPage(p){
      const isl = I.pick(I.islands);
      if(!isl || !isl.el || !isl.el.isConnected) return;
      const pts = (Array.isArray(isl.pts) && isl.pts.length) ? isl.pts : [[isl.size || 40, 0]];
      const bp = I.pick(pts);
      const bx = bp[0]*.9, by = bp[1]*.9;
      const g = I.mk("g", {class:"kairyu-paper",
        transform:`translate(${bx.toFixed(1)} ${by.toFixed(1)}) rotate(${(Math.random()*44 - 22)|0})`});
      g.append(I.mk("rect", {x:-4.5, y:-6, width:9, height:12, rx:1,
        fill:"#f6efdc", stroke:"#b9a87f", "stroke-width":.8, opacity:.95}));
      for(let i = 0; i < 3; i++)
        g.append(I.mk("path", {d:`M -2.5 ${-3+i*3} h 5`, stroke:"#8d9aa3", "stroke-width":.7, opacity:.8}));
      g.append(I.mk("path", {d:"M -4.5 2 L -4.5 6 L 0 6 Z", fill:"#cfe3e2", opacity:.7}));   // 濡れた角
      g.addEventListener("pointerdown", e => {
        try{
          if(e.button !== 0) return;
          e.preventDefault();                           // 台帳を開かせない
          openPagePop(e, isl, isl.x + bx, isl.y + by, p);
        }catch(err){ console.error(TAG, err); }
      });
      isl.el.append(g);
      g.animate([{opacity:0},{opacity:1}], {duration:600, fill:"forwards"});
      papers.push({g, islId: isl.id});
      while(papers.length > 4){ const old = papers.shift(); try{ old.g.remove(); }catch(e){} }
      I.toast("浜に、ぬれた紙きれが流れ着きました");
    }
    I.on("island-removed", isl => {
      try{
        for(let i = papers.length - 1; i >= 0; i--) if(!papers[i].g.isConnected) papers.splice(i, 1);
        if(isl && popIsl === isl.id) closePop();
      }catch(err){ console.error(TAG, err); }
    });
    I.on("cleared", () => { try{ papers.length = 0; closePop(); }catch(err){ console.error(TAG, err); } });

    /* ================= receive ================= */
    function receive(env){
      if(!isEnv(env) || seen.has(env.id)) return;
      seen.add(env.id);
      let text = "";
      try{
        const p = (env.payload && typeof env.payload === "object") ? env.payload : {};
        if(env.type === "creature"){
          const nm = String(p.name || "ナマエフメイ");
          queueVisual(() => beachCreature(p));
          text = `漂着：「${nm}」${(typeof p.lenM === "number" && isFinite(p.lenM)) ? `（約${p.lenM}m）` : ""}`;
        }else if(env.type === "page"){
          queueVisual(() => beachPage(p));
          text = `年代記の切れはし（${String(p.era || "時代不詳")}${p.year != null ? "・" + String(p.year) + "年" : ""}）`;
        }else if(env.type === "bottle"){
          I.toast("瓶が戻ってきました。海流は几帳面です");
          text = "瓶が戻ってきた（海流は几帳面）";
        }else{
          text = `正体不明の漂着物（${String(env.type)}）`;
        }
      }catch(err){ console.error(TAG, err); text = "（処理中に波をかぶった）"; }
      pushLog(inLog, {t: Date.now(), from: env.from, text});
      try{ I.emit("kairyu:received", {envelope: env}); }catch(err){ console.error(TAG, err); }
    }

    /* ================= send ================= */
    function makeEnv(to, type, payload){
      return { id: "isl-" + Date.now().toString(36) + "-" + Math.random().toString(36).slice(2, 9),
        from: SELF, to, type, payload, sentAt: new Date().toISOString() };
    }
    function send(env){
      try{ pushToInbox(env); }catch(err){ console.error(TAG, err); }
      try{ if(chan) chan.postMessage(env); }catch(err){ console.error(TAG, err); }
      const text = env.type === "bottle"
        ? `瓶詰めの手紙 → ${TOY_LABEL[env.to]}（${String(env.payload.fromVillage)}より）`
        : `名産の便り「${String(env.payload.name)}」 → ${TOY_LABEL[env.to]}`;
      pushLog(outLog, {t: Date.now(), to: env.to, text});
      try{ I.emit("kairyu:sent", {envelope: env}); }catch(err){ console.error(TAG, err); }
    }
    function sendOne(toastIt){
      try{
        const to = I.pick(["aquarium", "chronicle"]);
        const isl = I.islands.length ? I.pick(I.islands) : null;
        const vil = (isl && isl.villages && isl.villages.length) ? I.pick(isl.villages) : null;
        let env;
        if(vil && Math.random() < .45){
          env = makeEnv(to, "specialty", {name: vil.specialty, village: vil.name, island: isl.name});
        }else{
          env = makeEnv(to, "bottle", {message: assembleLetter(),
            fromIsland: isl ? isl.name : "名もなき浜", fromVillage: vil ? vil.name : "名もなき浜"});
        }
        send(env);
        if(toastIt) I.toast(env.type === "bottle"
          ? `瓶詰めの手紙を海流に流しました（宛先: ${TOY_LABEL[to]}）`
          : `名産「${env.payload.name}」の便りを流しました（宛先: ${TOY_LABEL[to]}）`);
      }catch(err){ console.error(TAG, err); }
    }

    /* ================= log modal ================= */
    const ovl = document.createElement("div");
    ovl.className = "kairyu-ovl";
    ovl.innerHTML =
      `<div class="kairyu-box" role="dialog" aria-label="海流便">`+
        `<span class="kairyu-x" title="とじる">✕</span>`+
        `<div class="kairyu-h">🌊 海流便</div>`+
        `<div class="kairyu-sub">よその水域と、海流でゆるく文通しています。切手は不要。日数は海まかせ。</div>`+
        `<div class="kairyu-sec">受信箱</div><div class="kairyu-in"></div>`+
        `<div class="kairyu-sec">送信記録</div><div class="kairyu-out"></div>`+
        `<div class="kairyu-foot"><button class="kairyu-send" type="button">🍶 いま流す</button></div>`+
      `</div>`;
    document.body.append(ovl);
    const inEl = ovl.querySelector(".kairyu-in"), outEl = ovl.querySelector(".kairyu-out");
    let modalOpen = false;
    function fmtT(t){ const d = new Date(t), p = n => String(n).padStart(2, "0"); return `${p(d.getHours())}:${p(d.getMinutes())}`; }
    function renderLog(){
      try{
        inEl.innerHTML = inLog.length ? inLog.map(r =>
          `<div class="kairyu-row"><span class="kairyu-ic">${TOY_ICON[r.from] || "🌊"}</span>`+
          `<span class="kairyu-tx">${esc(r.text)}</span><span class="kairyu-tm">${fmtT(r.t)}</span></div>`).join("")
          : `<div class="kairyu-none">まだ何も流れ着いていません。海流は気まぐれです。</div>`;
        outEl.innerHTML = outLog.length ? outLog.map(r =>
          `<div class="kairyu-row"><span class="kairyu-ic">→${TOY_ICON[r.to] || "🌊"}</span>`+
          `<span class="kairyu-tx">${esc(r.text)}</span><span class="kairyu-tm">${fmtT(r.t)}</span></div>`).join("")
          : `<div class="kairyu-none">まだ何も流していません。</div>`;
      }catch(err){ console.error(TAG, err); }
    }
    function renderIfOpen(){ if(modalOpen) renderLog(); }
    function openModal(){ renderLog(); ovl.classList.add("kairyu-show"); modalOpen = true; }
    function closeModal(){ ovl.classList.remove("kairyu-show"); modalOpen = false; }
    ovl.addEventListener("pointerdown", e => {
      try{ if(e.target === ovl){ e.preventDefault(); closeModal(); } }catch(err){ console.error(TAG, err); }
    });
    ovl.querySelector(".kairyu-x").addEventListener("click", closeModal);
    ovl.querySelector(".kairyu-send").addEventListener("click", () => { sendOne(true); renderLog(); });
    document.addEventListener("keydown", e => { if(e.key === "Escape" && modalOpen) closeModal(); });
    I.addButton("🌊 海流便", () => { modalOpen ? closeModal() : openModal(); });

    /* ================= drain inbox on load ================= */
    function drain(){
      if(!lsOK) return;
      try{
        const a = lsRead(INBOX[SELF]);
        if(!a.length) return;
        const done = new Set();
        for(const env of a){
          try{ if(isEnv(env)){ receive(env); done.add(env.id); } }
          catch(err){ console.error(TAG, err); }
        }
        const left = lsRead(INBOX[SELF]).filter(e => isEnv(e) && !done.has(e.id));
        lsWrite(INBOX[SELF], left);
      }catch(err){ console.error(TAG, err); }
    }
    drain();

    /* ================= scheduler (performance.now ticked) ================= */
    let nextSend = nowMs() + 60000 + Math.random()*60000;     // 初便 60-120s
    setInterval(() => {
      try{
        const t = nowMs();
        if(t >= nextSend){
          nextSend = t + 180000 + Math.random()*180000;       // 以後 3-6分
          sendOne(false);
        }
        for(let i = ashore.length - 1; i >= 0; i--){
          const rec = ashore[i];
          if(!rec.g.isConnected){ ashore.splice(i, 1); continue; }
          if(t >= rec.due){ ashore.splice(i, 1); returnToSea(rec); }
        }
      }catch(err){ console.error(TAG, err); }
    }, 1000);

  }catch(err){ console.error("[kairyu] init", err); }
})();
</script>

<script>
// ════ plugin: yugure-dusk (wave3) ════ Plugin key "yugure" (夕暮れ). Paste verbatim into its own <script> tag after the existing plugin blocks in island-maker/
(() => {
  "use strict";
  if(!window.ISLE) return;
  const I = window.ISLE;
  const TAG = "[yugure]";
  try{
    /* ---------------- css ---------------- */
    const style = document.createElement("style");
    style.textContent = `
      .yugure-ovl{position:fixed;inset:0;z-index:1;pointer-events:none;opacity:0;
        transition:opacity 3s ease;
        background:linear-gradient(to top,
          rgba(255,118,42,.62) 0%, rgba(226,103,84,.5) 26%,
          rgba(132,82,140,.44) 58%, rgba(44,50,114,.56) 100%)}
      .yugure-ovl.yugure-on{opacity:.38}
      .yugure-dimwrap{position:fixed;inset:0;z-index:1;pointer-events:none;opacity:0;
        transition:opacity 3s ease}
      .yugure-dimwrap.yugure-on{opacity:1}
      .yugure-dim{position:absolute;inset:0;background:#141c4a;opacity:.1}
    `;
    document.head.append(style);

    /* ---------------- defs (own ids only) ---------------- */
    try{
      const halo = I.mk("radialGradient", {id:"yugure-halo"});
      halo.append(
        I.mk("stop", {offset:"0%",   "stop-color":"#ffdf9e", "stop-opacity":".9"}),
        I.mk("stop", {offset:"45%",  "stop-color":"#ffc06a", "stop-opacity":".32"}),
        I.mk("stop", {offset:"100%", "stop-color":"#ffc06a", "stop-opacity":"0"}));
      I.defs.append(halo);
    }catch(err){ console.error(TAG, err); }

    /* ---------------- screen layers ---------------- */
    const ovl = document.createElement("div");
    ovl.className = "yugure-ovl";
    const dimWrap = document.createElement("div");
    dimWrap.className = "yugure-dimwrap";
    const dim = document.createElement("div");
    dim.className = "yugure-dim";
    dimWrap.append(dim);
    document.body.append(ovl, dimWrap);
    try{   // slow breathing of the dim layer (WAAPI: wall-clock, throttle-safe)
      dim.animate([{opacity:.05},{opacity:.17}],
        {duration:8000, direction:"alternate", iterations:Infinity, easing:"ease-in-out"});
    }catch(err){ console.error(TAG, err); }

    /* ---------------- state ---------------- */
    let duskOn = false, gen = 0, fadeAnim = null;
    let nextPractice = Infinity;
    const lights = new Map();            // island.id -> {g, anims[]}
    const fwGroups = new Set();          // live firework <g>s
    const gNight = I.mk("g", {"pointer-events":"none"});
    const gGlow  = I.mk("g");
    const gFw    = I.mk("g");
    gNight.append(gGlow, gFw);

    /* ---------------- helpers ---------------- */
    function capeOf(isl){                // farthest shape point from center (local coords)
      let bx = isl.size, by = 0, bd = -1;
      const pts = Array.isArray(isl.pts) ? isl.pts : [];
      for(const p of pts){
        const d = Math.hypot(p[0], p[1]);
        if(d > bd){ bd = d; bx = p[0]; by = p[1]; }
      }
      return [bx, by];
    }
    function villagePos(isl, v){
      const r = isl.size * .82;
      return [isl.x + Math.cos(v.angle)*r, isl.y + Math.sin(v.angle)*r];
    }
    function randomVillage(){
      const cand = [];
      try{
        for(const isl of I.islands)
          for(const v of (isl.villages || [])) cand.push({isl, v});
      }catch(e){}
      return cand.length ? I.pick(cand) : null;
    }

    /* ---------------- window lights & shore lanterns ---------------- */
    function igniteLight(lg, rec, delay){
      try{
        const a = lg.animate([
          {opacity:0},
          {opacity:1,  offset:.45},
          {opacity:.2, offset:.62},
          {opacity:1}
        ],{duration:650+Math.random()*350, delay, fill:"forwards", easing:"ease-out"});
        rec.anims.push(a);
        a.onfinish = () => {
          try{
            lg.setAttribute("opacity", 1);
            rec.anims.push(lg.animate([{opacity:.72},{opacity:1}],
              {duration:1300+Math.random()*1600, direction:"alternate", iterations:Infinity,
               easing:"ease-in-out", delay:-Math.random()*1200}));
          }catch(e){}
        };
      }catch(err){ console.error(TAG, err); }
    }

    function lightIsland(isl, base, spread){
      try{
        if(!isl || lights.has(isl.id)) return;
        if(!I.islands.some(s => s.id === isl.id)) return;
        const g = I.mk("g", {"pointer-events":"none"});
        const rec = {g, anims:[]};

        for(const v of (isl.villages || [])){
          const [vx, vy] = villagePos(isl, v);
          const n = 2 + (Math.random()*3|0);
          for(let i=0;i<n;i++){
            const lx = vx + (Math.random()*11 - 5.5);
            const ly = vy + (Math.random()*8 - 4);
            const lg = I.mk("g", {opacity:0});
            lg.append(
              I.mk("circle", {cx:lx.toFixed(1), cy:ly.toFixed(1), r:3.2, fill:"url(#yugure-halo)"}),
              I.mk("rect", {x:(lx-.8).toFixed(1), y:(ly-.8).toFixed(1), width:1.6, height:1.6,
                rx:.3, fill:"#ffe08a", stroke:"#b98e3e", "stroke-width":.25}));
            g.append(lg);
            igniteLight(lg, rec, base + Math.random()*spread);
          }
        }

        // shore lantern at the most seaward cape (lines up with the lighthouse, if any)
        const [cx0, cy0] = capeOf(isl);
        const sc = Math.max(.85, Math.min(1.25, isl.size/58));
        const lift = (isl.villages && isl.villages.length >= 2) ? 14.5*sc : 4.5;
        const gx = isl.x + cx0, gy = isl.y + cy0 - lift;
        const cg = I.mk("g", {opacity:0});
        const haloC = I.mk("circle", {cx:gx.toFixed(1), cy:gy.toFixed(1),
          r:(9*sc).toFixed(1), fill:"url(#yugure-halo)"});
        const dot = I.mk("circle", {cx:gx.toFixed(1), cy:gy.toFixed(1), r:1.7, fill:"#ffd76a"});
        cg.append(haloC, dot);
        g.append(cg);
        const on = cg.animate([{opacity:0},{opacity:1}],
          {duration:1200, delay:base + Math.random()*spread, fill:"forwards", easing:"ease-out"});
        rec.anims.push(on);
        on.onfinish = () => {
          try{
            cg.setAttribute("opacity", 1);
            haloC.style.transformBox = "fill-box";
            haloC.style.transformOrigin = "50% 50%";
            rec.anims.push(haloC.animate(
              [{transform:"scale(.85)", opacity:.55},{transform:"scale(1.12)", opacity:.95}],
              {duration:2300+Math.random()*900, direction:"alternate", iterations:Infinity,
               easing:"ease-in-out"}));
          }catch(e){}
        };

        gGlow.append(g);
        lights.set(isl.id, rec);
      }catch(err){ console.error(TAG, err); }
    }

    function unlight(id){
      try{
        const rec = lights.get(id);
        if(!rec) return;
        lights.delete(id);
        for(const a of rec.anims){ try{ a.cancel(); }catch(e){} }
        try{ rec.g.remove(); }catch(e){}
      }catch(err){ console.error(TAG, err); }
    }
    function clearLights(){ for(const id of [...lights.keys()]) unlight(id); }
    function clearFireworks(){
      for(const g of [...fwGroups]){ try{ g.remove(); }catch(e){} }
      fwGroups.clear();
    }

    /* ---------------- fireworks ---------------- */
    const FW_COLORS = ["#ffd76a","#e8895a","#7fd6c9","#f2a7c2","#fff3c9","#9fb6ff"];

    function burst(g, x, y){
      try{
        const col = I.pick(FW_COLORS), col2 = I.pick(FW_COLORS);
        const n = 24 + (Math.random()*17|0);
        const R = 26 + Math.random()*22;
        let left = n + 1;
        const done = () => { if(--left <= 0){ try{ g.remove(); }catch(e){} fwGroups.delete(g); } };

        const flash = I.mk("circle", {cx:x, cy:y, r:6.5, fill:"#fff8dc", opacity:.95});
        flash.style.transformBox = "fill-box";
        flash.style.transformOrigin = "50% 50%";
        g.append(flash);
        flash.animate([{transform:"scale(.3)", opacity:.95},{transform:"scale(2.1)", opacity:0}],
          {duration:340, easing:"ease-out"}).onfinish = () => { try{ flash.remove(); }catch(e){} done(); };

        for(let i=0;i<n;i++){
          const a = (i/n)*Math.PI*2 + Math.random()*.18;
          const r = R*(.72 + Math.random()*.34);
          const dx = Math.cos(a)*r, dy = Math.sin(a)*r;
          const p = I.mk("circle", {cx:x, cy:y, r:(1.1+Math.random()*.9).toFixed(1),
            fill: i%2 ? col : col2});
          g.append(p);
          p.animate([
            {transform:"translate(0px,0px)", opacity:1},
            {transform:`translate(${(dx*.72).toFixed(1)}px,${(dy*.72+5).toFixed(1)}px)`, opacity:.9, offset:.45},
            {transform:`translate(${dx.toFixed(1)}px,${(dy+24).toFixed(1)}px)`, opacity:0}
          ],{duration:1000+Math.random()*600, easing:"cubic-bezier(.12,.62,.4,.98)"})
            .onfinish = () => { try{ p.remove(); }catch(e){} done(); };
        }
      }catch(err){ console.error(TAG, err); try{ g.remove(); }catch(e){} fwGroups.delete(g); }
    }

    function shell(gx, gy, delay){
      try{
        if(!duskOn) return;
        const g = I.mk("g", {"pointer-events":"none"});
        gFw.append(g);
        fwGroups.add(g);
        const bx = gx + (Math.random()*36 - 18);
        const by = Math.max(46, gy - (58 + Math.random()*42));
        const spark = I.mk("line", {x1:bx.toFixed(1), y1:(gy-2).toFixed(1),
          x2:bx.toFixed(1), y2:(gy-8).toFixed(1),
          stroke:"#ffd98c", "stroke-width":1.3, "stroke-linecap":"round", opacity:0});
        g.append(spark);
        const rise = spark.animate([
          {transform:"translate(0,0)", opacity:0},
          {transform:"translate(0,-10px)", opacity:1, offset:.12},
          {transform:`translate(0,${(by-(gy-2)).toFixed(1)}px)`, opacity:.85}
        ],{duration:620+Math.random()*240, delay, easing:"cubic-bezier(.25,.6,.45,1)", fill:"forwards"});
        rise.onfinish = () => {
          try{
            spark.remove();
            if(!duskOn || !g.isConnected){ try{ g.remove(); }catch(e){} fwGroups.delete(g); return; }
            burst(g, bx, by);
          }catch(err){ console.error(TAG, err); }
        };
      }catch(err){ console.error(TAG, err); }
    }

    /* ---------------- dusk toggle ---------------- */
    function setDusk(on, quiet){
      try{
        if(on === duskOn) return;
        duskOn = on;
        gen++;
        const my = gen;
        if(fadeAnim){ try{ fadeAnim.cancel(); }catch(e){} fadeAnim = null; }

        if(on){
          ovl.classList.add("yugure-on");
          dimWrap.classList.add("yugure-on");
          try{
            I.gSea.style.transition = "opacity 3s ease";
            I.gSea.style.opacity = ".35";
          }catch(e){}
          clearLights(); clearFireworks();
          gNight.setAttribute("opacity", 1);
          if(!gNight.isConnected) I.gFx.append(gNight);
          for(const isl of I.islands) lightIsland(isl, 400, 4600);   // 点灯時刻：最初の～5秒
          nextPractice = performance.now() + 90000;
          btn.textContent = "☀ 朝にする";
          if(!quiet) I.toast("日が暮れてきました。村々に灯りがともります");
        }else{
          ovl.classList.remove("yugure-on");
          dimWrap.classList.remove("yugure-on");
          try{ I.gSea.style.opacity = ""; }catch(e){}
          nextPractice = Infinity;
          btn.textContent = "🌆 夕暮れ";
          try{
            const a = gNight.animate([{opacity:1},{opacity:0}],
              {duration:1600, easing:"ease-out", fill:"forwards"});
            fadeAnim = a;
            a.onfinish = () => {
              try{
                if(gen !== my) return;
                clearLights(); clearFireworks();
                try{ gNight.remove(); }catch(e){}
                try{ a.cancel(); }catch(e){}
              }catch(err){ console.error(TAG, err); }
            };
          }catch(err){
            clearLights(); clearFireworks();
            try{ gNight.remove(); }catch(e){}
          }
          if(!quiet) I.toast("朝が来ました。灯りはまた夕方に");
        }
      }catch(err){ console.error(TAG, err); }
    }

    const btn = I.addButton("🌆 夕暮れ", () => {
      try{ setDusk(!duskOn); }catch(err){ console.error(TAG, err); }
    });

    /* ---------------- events ---------------- */
    I.on("island-added", isl => {
      try{ if(duskOn && isl) lightIsland(isl, 1500, 1600); }
      catch(err){ console.error(TAG, err); }
    });
    I.on("village-added", a => {
      try{
        if(!duskOn || !a || !a.island) return;
        unlight(a.island.id);
        lightIsland(a.island, 300, 900);
      }catch(err){ console.error(TAG, err); }
    });
    I.on("island-removed", isl => {
      try{ if(isl) unlight(isl.id); }catch(err){ console.error(TAG, err); }
    });
    I.on("cleared", () => {
      try{
        clearLights(); clearFireworks();
        if(duskOn) setDusk(false, true);
      }catch(err){ console.error(TAG, err); }
    });
    I.on("matsuri:held", a => {
      try{
        if(!duskOn || !a || !a.island || !a.village) return;
        if(!I.islands.some(s => s.id === a.island.id)) return;
        const [gx, gy] = villagePos(a.island, a.village);
        for(let k=0;k<5;k++) shell(gx, gy, k*1200 + Math.random()*300);   // 5発の花火
      }catch(err){ console.error(TAG, err); }
    });

    /* ---- practice shell: roughly every 90s, 25% (1s tick vs performance.now) ---- */
    setInterval(() => {
      try{
        if(!duskOn) return;
        const now = performance.now();
        if(now < nextPractice) return;
        nextPractice = now + 75000 + Math.random()*30000;
        if(Math.random() >= .25) return;
        const c = randomVillage();
        if(!c) return;
        const [gx, gy] = villagePos(c.isl, c.v);
        shell(gx, gy, 0);
        I.toast("打ち上げの練習だそうです。本番は未定です");
      }catch(err){ console.error(TAG, err); }
    }, 1000);
  }catch(err){ console.error(TAG, "init failed", err); }
})();
</script>

<script>
// ════ plugin: ookame-island (wave3) ════ Plugin key "kame" (🐢 大亀の島). Paste verbatim into its own <script> tag after the existing wave-1/2 plugin blocks in isl
(() => {
  "use strict";
  if(!window.ISLE) return;
  const I = window.ISLE;
  const TAG = "[kame]";
  try{
    /* ================= config ================= */
    const DARK  = "#1d5f58";          // dark teal silhouette
    const DARK2 = "#16463f";
    const STIR_MIN = 6, STIR_MAX = 10;        // minutes between stirs
    const STIR_P   = .25;
    const TREMBLE  = 3200, EMERGE = 2400;     // ms
    const SWIM_MIN = 60000, SWIM_SPAN = 30000;
    const BRIDGE_PAD = 140;                   // center dist < sizeA+sizeB+140 -> a bridge may exist
    const KAME_LEGEND = "この島は時々、場所が変わる。地図屋は見なかったことにしている。";
    const rnd = (a, b) => a + Math.random()*(b - a);
    const minutes = (a, b) => rnd(a*60000, b*60000);

    /* ================= css ================= */
    const style = document.createElement("style");
    style.textContent = ".kame-rig{pointer-events:none}.kame-fx{pointer-events:none}";
    document.head.append(style);

    /* ================= state ================= */
    let swim = null;          // active sequence (never two at once)
    let rafBusy = false;
    const alive = isl => !!(isl && isl.el && isl.el.isConnected && I.islands.indexOf(isl) >= 0);
    const smallest = () => I.islands.reduce((a, b) => (b.size < a.size ? b : a));

    /* ================= small fx ================= */
    function ringAt(x, y, r0, grow, dur, w, n){
      try{
        for(let i=0;i<(n||1);i++){
          const c = I.mk("circle",{class:"kame-fx", cx:x, cy:y, r:Math.max(2, r0), fill:"none",
            stroke:"#ffffff", "stroke-width":w||1.6, opacity:.65, "pointer-events":"none"});
          c.style.transformOrigin = `${x}px ${y}px`;
          I.gFx.append(c);
          try{
            c.animate([
              {transform:"scale(.55)", opacity:.65},
              {transform:`scale(${grow + i*.45})`, opacity:0}
            ],{duration:dur + i*420, delay:i*240, easing:"ease-out"}).onfinish = () => c.remove();
          }catch(e){}
          setTimeout(() => { try{ c.remove(); }catch(e){} }, dur + i*700 + 1200);
        }
      }catch(err){ console.error(TAG, err); }
    }
    function spawnWake(s){
      try{
        const isl = s.isl;
        const hx = Math.cos(s.heading), hy = Math.sin(s.heading);
        const px = isl.x - hx*isl.size*1.02, py = isl.y - hy*isl.size*1.02;  // stern
        for(const sgn of [1, -1]){
          const a = s.heading + Math.PI + sgn*.5;          // V opens backward
          const dx = Math.cos(a), dy = Math.sin(a);
          const L = 9 + isl.size*.13;
          const ln = I.mk("line",{class:"kame-fx", x1:px.toFixed(1), y1:py.toFixed(1),
            x2:(px + dx*L).toFixed(1), y2:(py + dy*L).toFixed(1),
            stroke:"#ffffff", "stroke-width":1.5, "stroke-linecap":"round",
            opacity:.5, "pointer-events":"none"});
          I.gFx.append(ln);
          try{
            ln.animate([
              {transform:"translate(0px,0px)", opacity:.5},
              {transform:`translate(${(dx*16).toFixed(1)}px,${(dy*16).toFixed(1)}px)`, opacity:0}
            ],{duration:2300, easing:"ease-out"}).onfinish = () => ln.remove();
          }catch(e){}
          setTimeout(() => { try{ ln.remove(); }catch(e){} }, 3000);
        }
      }catch(err){ console.error(TAG, err); }
    }

    /* ================= label follows the island =================
       Labels are absolute-positioned <text> built from isl.x/y; other plugins
       rebuild them at the live coords, so we track per-element base coords and
       translate the group by the delta. */
    function stampLabelBase(isl){
      try{
        const lb = isl.label;
        if(lb && lb.isConnected && !lb.__kameBase) lb.__kameBase = {x:isl.x, y:isl.y};
      }catch(err){ console.error(TAG, err); }
    }
    function placeLabel(isl){
      try{
        const lb = isl.label;
        if(!lb || !lb.isConnected || !lb.__kameBase) return;
        lb.setAttribute("transform",
          `translate(${(isl.x - lb.__kameBase.x).toFixed(2)} ${(isl.y - lb.__kameBase.y).toFixed(2)})`);
      }catch(err){ console.error(TAG, err); }
    }

    /* ================= the turtle rig (flippers + sleepy head) ================= */
    function buildRig(s){
      try{
        const isl = s.isl;
        const k = Math.max(.75, Math.min(1.6, isl.size/55));
        const g = I.mk("g",{class:"kame-rig", "pointer-events":"none", opacity:.92});
        const grows = [];
        const mkGrow = () => {
          const gr = I.mk("g");
          gr.style.transformBox = "fill-box";
          gr.style.transformOrigin = "0% 50%";
          return gr;
        };
        for(const a of [48, 132, -48, -132]){            // four flippers
          const arm   = I.mk("g",{transform:`rotate(${a})`});
          const shift = I.mk("g",{transform:`translate(${(isl.size*.9).toFixed(1)} 0) scale(${k.toFixed(2)})`});
          const gr = mkGrow();
          const blade = I.mk("path",{d:"M 0 -2.4 Q 9 -7, 16.5 -4 Q 21.5 0, 16.5 4 Q 9 7, 0 2.4 Z",
            fill:DARK, stroke:DARK2, "stroke-width":.8, "stroke-linejoin":"round"});
          blade.style.transformBox = "fill-box";
          blade.style.transformOrigin = "0% 50%";
          gr.append(blade); shift.append(gr); arm.append(shift); g.append(arm);
          grows.push(gr);
          try{
            blade.animate([{transform:"rotate(-9deg)"},{transform:"rotate(13deg)"}],
              {duration:1300 + Math.random()*600, delay:-Math.random()*1200,
               direction:"alternate", iterations:Infinity, easing:"ease-in-out"});
          }catch(e){}
        }
        {                                                // sleepy head, toward heading
          const shift = I.mk("g",{transform:`translate(${(isl.size*.94).toFixed(1)} 0) scale(${k.toFixed(2)})`});
          const gr = mkGrow();
          const bob = I.mk("g");
          bob.style.transformBox = "fill-box";
          bob.style.transformOrigin = "50% 50%";
          bob.append(
            I.mk("ellipse",{cx:3.5, cy:0, rx:5.4, ry:3.9, fill:DARK}),
            I.mk("ellipse",{cx:11.5, cy:0, rx:7, ry:5.4, fill:DARK, stroke:DARK2, "stroke-width":.8}),
            I.mk("path",{d:"M 11 -3.6 q 2 -1, 3.6 0", stroke:"#bfe0d8", "stroke-width":.9,
              fill:"none", "stroke-linecap":"round"}),
            I.mk("path",{d:"M 11 3.6 q 2 1, 3.6 0", stroke:"#bfe0d8", "stroke-width":.9,
              fill:"none", "stroke-linecap":"round"})
          );
          gr.append(bob); shift.append(gr); g.append(shift);
          grows.push(gr);
          try{
            bob.animate([{transform:"translate(0px,0px)"},{transform:"translate(1.6px,0px)"}],
              {duration:2600, direction:"alternate", iterations:Infinity, easing:"ease-in-out"});
          }catch(e){}
        }
        I.gFx.append(g);
        for(let i=0;i<grows.length;i++){                 // emerge from under the shore
          try{
            grows[i].animate([
              {transform:"scale(.04)"},{transform:"scale(1.12)", offset:.75},{transform:"scale(1)"}
            ],{duration:1500, delay:i*130, easing:"cubic-bezier(.3,1.3,.4,1)", fill:"backwards"});
          }catch(e){}
        }
        s.rig = g; s.grows = grows;
        placeRig(s);
      }catch(err){ console.error(TAG, err); }
    }
    function placeRig(s){
      try{
        if(!s.rig) return;
        s.rig.setAttribute("transform",
          `translate(${s.isl.x.toFixed(2)} ${s.isl.y.toFixed(2)}) rotate(${(s.heading*180/Math.PI).toFixed(1)})`);
      }catch(err){ console.error(TAG, err); }
    }
    function retractRig(s){
      const rig = s.rig;
      if(!rig) return;
      s.rig = null;
      try{
        for(const gr of s.grows){
          try{ gr.animate([{transform:"scale(1)"},{transform:"scale(.04)"}],
            {duration:900, easing:"ease-in", fill:"forwards"}); }catch(e){}
        }
        rig.animate([{opacity:.92},{opacity:0}],{duration:1000, delay:300, fill:"forwards"})
          .onfinish = () => { try{ rig.remove(); }catch(e){} };
      }catch(e){ try{ rig.remove(); }catch(_){} }
      setTimeout(() => { try{ rig.remove(); }catch(e){} }, 2400);
    }
    function killRig(s){ try{ if(s.rig){ s.rig.remove(); s.rig = null; } }catch(e){} }

    /* ================= target picking (core-compatible margins) ================= */
    function findTarget(isl){
      const m = isl.size*1.4;
      const minX = m, maxX = I.W - m, minY = m + 40, maxY = I.H - m;
      if(maxX <= minX || maxY <= minY) return null;
      for(let pass=0; pass<2; pass++){
        const minTravel = pass === 0 ? 170 : 70;
        for(let i=0; i<70; i++){
          const x = rnd(minX, maxX), y = rnd(minY, maxY);
          if(Math.hypot(x - isl.x, y - isl.y) < minTravel) continue;
          let ok = true;
          for(const o of I.islands){
            if(o === isl) continue;
            if(Math.hypot(o.x - x, o.y - y) < (o.size + isl.size)*1.5){ ok = false; break; }
          }
          if(ok) return [x, y];
        }
      }
      return null;
    }
    function bridgeNear(isl){
      return I.islands.some(o => o !== isl &&
        Math.hypot(o.x - isl.x, o.y - isl.y) < o.size + isl.size + BRIDGE_PAD);
    }

    /* ================= the sequence ================= */
    function startSwim(isl, target){
      swim = {
        isl, t0: performance.now(),
        sx: isl.x, sy: isl.y, tx: target[0], ty: target[1],
        heading: Math.atan2(target[1] - isl.y, target[0] - isl.x),
        dur: SWIM_MIN + Math.random()*SWIM_SPAN,
        phase: "tremble", swimT0: 0,
        rig: null, grows: [],
        nextRipple: 0, nextWake: 0, midSaid: false,
        eruptAbort: false, endAt: 0,
      };
      stampLabelBase(isl);
      I.toast(`……${isl.name}が、起きた`);
      ringAt(isl.x, isl.y, isl.size*.9, 2, 1600, 1.6, 3);
      startPump();
    }

    function beginSettle(s, early){
      s.phase = "settle";
      const isl = s.isl;
      try{
        if(!early){ isl.x = s.tx; isl.y = s.ty; }
        if(isl.el && isl.el.isConnected)
          isl.el.setAttribute("transform", `translate(${isl.x.toFixed(2)} ${isl.y.toFixed(2)})`);
        placeLabel(isl);
        placeRig(s);
      }catch(err){ console.error(TAG, err); }
      retractRig(s);
      ringAt(isl.x, isl.y, isl.size*.85, 2.4, 2800, 2, 1);   // one big yawn
      I.toast(early
        ? `${isl.name}は噴火に驚いて、寝なおすことにした`
        : `${isl.name}は、何事もなかったような顔をしている`);
      if(Math.hypot(isl.x - s.sx, isl.y - s.sy) > 60){
        try{
          if(typeof isl.legend === "string" && isl.legend.indexOf(KAME_LEGEND) < 0){
            isl.legend += KAME_LEGEND;
            I.refreshPanel();
          }
        }catch(err){ console.error(TAG, err); }
        try{ I.emit("kame:moved", {island: isl}); }catch(err){ console.error(TAG, err); }
      }
      s.endAt = performance.now() + 1800;
    }

    function step(now){
      const s = swim;
      if(!s) return;
      const isl = s.isl;
      if(!alive(isl)){ hardCleanup(); return; }
      if(s.eruptAbort && s.phase !== "settle"){ beginSettle(s, true); return; }
      const t = now - s.t0;

      if(s.phase === "tremble"){
        if(t >= TREMBLE){
          s.phase = "emerge";
          buildRig(s);
        }else{
          const amp = 1.8*Math.min(1, t/800);            // jitter AROUND the translate base
          isl.el.setAttribute("transform",
            `translate(${(isl.x + (Math.random()*2-1)*amp).toFixed(2)} ${(isl.y + (Math.random()*2-1)*amp).toFixed(2)})`);
          if(t >= s.nextRipple){
            s.nextRipple = t + 750;
            ringAt(isl.x, isl.y, isl.size*(.7 + Math.random()*.4), 1.8, 1500, 1.4, 1);
          }
        }
      }else if(s.phase === "emerge"){
        const te = t - TREMBLE;
        if(te >= EMERGE){
          s.phase = "swim";
          s.swimT0 = now;
          s.nextWake = now;
          isl.el.setAttribute("transform", `translate(${isl.x.toFixed(2)} ${isl.y.toFixed(2)})`);
        }else{
          const amp = 1.6*Math.max(0, 1 - te/EMERGE);    // tremble dies down
          isl.el.setAttribute("transform",
            `translate(${(isl.x + (Math.random()*2-1)*amp).toFixed(2)} ${(isl.y + (Math.random()*2-1)*amp).toFixed(2)})`);
        }
      }else if(s.phase === "swim"){
        const p = Math.min(1, (now - s.swimT0)/s.dur);
        const e = p*p*(3 - 2*p);                          // ease-in-out, elapsed wall time
        const sway = Math.sin(p*Math.PI*5)*Math.sin(p*Math.PI)*7;
        const pxn = -Math.sin(s.heading), pyn = Math.cos(s.heading);
        stampLabelBase(isl);                              // label may have been rebuilt mid-swim
        isl.x = s.sx + (s.tx - s.sx)*e + pxn*sway;        // mutate LIVE coords: ferries etc. stay coherent
        isl.y = s.sy + (s.ty - s.sy)*e + pyn*sway;
        isl.el.setAttribute("transform", `translate(${isl.x.toFixed(2)} ${isl.y.toFixed(2)})`);
        placeLabel(isl);
        placeRig(s);
        if(p > .03 && p < .97 && now >= s.nextWake){ s.nextWake = now + 380; spawnWake(s); }
        if(!s.midSaid && p >= .5){
          s.midSaid = true;
          I.toast(`${isl.name}が、ゆっくり泳いでいます。村人は慣れた様子です`);
        }
        if(p >= 1) beginSettle(s, false);
      }else if(s.phase === "settle"){
        if(now >= s.endAt) swim = null;
      }
    }

    function hardCleanup(){
      const s = swim;
      if(!s) return;
      swim = null;
      killRig(s);
    }

    /* ================= pump: rAF for smoothness + 1s interval for hidden tabs ================= */
    function pump(){
      if(!swim){ rafBusy = false; return; }
      try{ step(performance.now()); }
      catch(err){ console.error(TAG, err); hardCleanup(); }
      if(swim) requestAnimationFrame(pump); else rafBusy = false;
    }
    function startPump(){
      if(rafBusy) return;
      rafBusy = true;
      requestAnimationFrame(pump);
    }
    setInterval(() => {
      try{ if(swim) step(performance.now()); }
      catch(err){ console.error(TAG, err); hardCleanup(); }
    }, 1000);

    /* ================= stir clock: every 6-10 min, 25% ================= */
    function maybeStir(){
      if(swim) return;
      if(I.islands.length < 2) return;
      if(Math.random() >= STIR_P) return;
      const isl = smallest();
      if(!alive(isl)) return;
      if(bridgeNear(isl)){                                // a bridge (or one soon): pretend to sleep
        I.toast(`${isl.name}は起き上がろうとして、橋に気づき、寝たふりをした`);
        return;
      }
      const target = findTarget(isl);
      if(!target) return;                                 // no quiet spot: stay asleep
      startSwim(isl, target);
    }
    (function clock(){
      setTimeout(() => {
        try{ maybeStir(); }catch(err){ console.error(TAG, err); }
        clock();
      }, minutes(STIR_MIN, STIR_MAX));
    })();

    /* ================= guards ================= */
    I.on("island-removed", isl => {
      try{ if(swim && isl && swim.isl.id === isl.id) hardCleanup(); }
      catch(err){ console.error(TAG, err); }
    });
    I.on("cleared", () => { try{ hardCleanup(); }catch(err){ console.error(TAG, err); } });
    I.on("volcano:eruption", a => {                       // yield to geology, settle where we are
      try{ if(swim && a && a.island && swim.isl.id === a.island.id) swim.eruptAbort = true; }
      catch(err){ console.error(TAG, err); }
    });
  }catch(err){ console.error("[kame] init failed", err); }
})();
</script>

<script>
// ════ plugin: shima-tetsudo (wave3) ════ Plugin key "rail" (shima-tetsudo). Paste verbatim into its own <script> tag after the existing wave-1/2 plugin blocks in index.html
// ════ plugin: shima-tetsudo (wave3) ════ 島の鉄道 — islands with >=3 villages earn a tiny loop railway
// with a steam train. Paste verbatim into its own <script> tag after the existing plugin blocks in
// island-maker/index.html.
(() => {
  "use strict";
  if(!window.ISLE) return;
  try{
    const I = window.ISLE;
    const TAG = "[rail]";
    const mk = I.mk;

    const MAXR = 2;            // 鉄道は全体で2路線まで
    const SPEED = 28;          // 平均速度 px/s
    const DWELL = 3000;        // 駅停車 ms
    const TIE_STEP = 7;        // 枕木間隔 px
    const INKBROWN = "#6b5237";
    const rand = (a,b) => a + Math.random()*(b-a);
    const clamp = (v,a,b) => Math.min(b, Math.max(a, v));
    const easeIO = p => p < .5 ? 2*p*p : 1 - Math.pow(-2*p+2, 2)/2;

    const CONDUCTOR = [
      "次は終点、のち始発です",
      "お乗りのお客さま、いません。本日も安全運行です",
      "切符は拝見しません。気持ちだけ拝見します",
      "踏切はありません。渡るのは波だけです",
      "一周しても景色は海です。二周目もだいたい海です",
      "お忘れ物のお知らせ：誰も乗っていないのに傘が一本",
      "本日も定刻通り、どこへも参りません",
    ];

    // ---------------- css ----------------
    const style = document.createElement("style");
    style.textContent = `
      .rail-train{cursor:pointer}
      .rail-puff{pointer-events:none}`;
    document.head.append(style);

    // ---------------- state ----------------
    const railways = new Map();   // islandId -> rec
    const pending  = new Map();   // islandId -> timeoutId
    let lastToot = 0;             // 全路線共通の汽笛クールダウン
    let lastSay  = -1;            // 車掌のひとこと直前回避
    let rafId = null;

    const capacityLeft = () => railways.size + pending.size < MAXR;
    const findIsland = id => I.islands.find(s => s && s.id === id);

    // ---------------- rolling stock ----------------
    function mkLoco(){
      const g = mk("g");
      g.append(
        mk("rect",{x:-4.5, y:-4.6, width:3.2, height:2.8, rx:.6, fill:"#a85f33", stroke:"#7c4a2a", "stroke-width":.6}),
        mk("rect",{x:-4.5, y:-2.4, width:9, height:4, rx:1, fill:"#c97b4a", stroke:"#7c4a2a", "stroke-width":.6}),
        mk("rect",{x:2.2, y:-4.8, width:1.5, height:2.6, rx:.5, fill:"#2b3a45"}),
        mk("circle",{cx:-2.6, cy:2, r:1.2, fill:"#2b3a45"}),
        mk("circle",{cx:2.4, cy:2, r:1.2, fill:"#2b3a45"}),
        mk("rect",{x:-6.2, y:-5.4, width:12.4, height:8.8, fill:"#000", "fill-opacity":0}));
      return g;
    }
    function mkCarriage(){
      const g = mk("g");
      g.append(
        mk("rect",{x:-4, y:-2.1, width:8, height:3.9, rx:1, fill:"#f4ecd9", stroke:INKBROWN, "stroke-width":.6}),
        mk("rect",{x:-4, y:-2.1, width:8, height:1.1, rx:.6, fill:"#c97b4a", opacity:.9}),
        mk("rect",{x:-2.7, y:-.7, width:1.4, height:1.3, rx:.3, fill:"#8fb6bb"}),
        mk("rect",{x:-.5, y:-.7, width:1.4, height:1.3, rx:.3, fill:"#8fb6bb"}),
        mk("rect",{x:1.7, y:-.7, width:1.4, height:1.3, rx:.3, fill:"#8fb6bb"}),
        mk("circle",{cx:-2.3, cy:2, r:1.1, fill:"#2b3a45"}),
        mk("circle",{cx:2.3, cy:2, r:1.1, fill:"#2b3a45"}),
        mk("rect",{x:-5.4, y:-3.6, width:10.8, height:7, fill:"#000", "fill-opacity":0}));
      return g;
    }

    // ---------------- build / rebuild ----------------
    function buildGraphics(rec){
      const isl = rec.isl;
      const g = mk("g", {class:"rail-g"});
      const d = I.smoothPath(isl.pts, 0.62);
      const track = mk("path",{d, fill:"none", stroke:INKBROWN, "stroke-width":1.2,
        opacity:.8, "stroke-linecap":"round"});
      g.append(track);
      isl.el.append(g);                       // 島と一緒に揺れ・沈み・移動する

      const L = track.getTotalLength();
      // 枕木（線路に直交する短いティック）
      let ties = "";
      for(let s = 0; s < L; s += TIE_STEP){
        const p = track.getPointAtLength(s);
        const q = track.getPointAtLength((s + .6) % L);
        let dx = q.x - p.x, dy = q.y - p.y;
        const m = Math.hypot(dx, dy) || 1; dx /= m; dy /= m;
        const nx = -dy, ny = dx, h = 1.7;
        ties += `M ${(p.x-nx*h).toFixed(1)} ${(p.y-ny*h).toFixed(1)} L ${(p.x+nx*h).toFixed(1)} ${(p.y+ny*h).toFixed(1)} `;
      }
      g.append(mk("path",{d:ties, stroke:INKBROWN, "stroke-width":.8, fill:"none", opacity:.45}));

      // 駅：各村にいちばん近い線路上の点へホームを置く
      const vr = isl.size * .82;
      const stations = [];
      for(const v of isl.villages){
        const vx = Math.cos(v.angle)*vr, vy = Math.sin(v.angle)*vr;
        let bs = 0, bd = Infinity, bp = null;
        for(let s = 0; s < L; s += 3){
          const p = track.getPointAtLength(s);
          const dd = (p.x-vx)*(p.x-vx) + (p.y-vy)*(p.y-vy);
          if(dd < bd){ bd = dd; bs = s; bp = p; }
        }
        if(bp) stations.push({s:bs, x:bp.x, y:bp.y, vx, vy});
      }
      stations.sort((a,b) => a.s - b.s);
      const kept = [];
      for(const st of stations){               // 近すぎる駅は統合
        const prev = kept[kept.length-1];
        if(prev && st.s - prev.s < 12) continue;
        if(kept.length && ((kept[0].s + L) - st.s) < 12) continue;
        kept.push(st);
      }
      for(const st of kept){
        const q = track.getPointAtLength((st.s + .6) % L);
        const ang = Math.atan2(q.y - st.y, q.x - st.x) * 180 / Math.PI;
        let ox = st.vx - st.x, oy = st.vy - st.y;
        const om = Math.hypot(ox, oy) || 1;
        const px = st.x + ox/om*2.6, py = st.y + oy/om*2.6;
        g.append(mk("rect",{x:px-1.8, y:py-1.8, width:3.6, height:3.6, rx:.5,
          fill:"#f4ecd9", stroke:INKBROWN, "stroke-width":.7,
          transform:`rotate(${ang.toFixed(1)} ${px.toFixed(1)} ${py.toFixed(1)})`}));
      }

      // 停車スケジュール：駅間は easeIO、平均速度 SPEED
      const segs = [];
      let cycle;
      if(kept.length){
        let t = 0;
        for(let i = 0; i < kept.length; i++){
          const from = kept[i].s;
          let len = (kept[(i+1)%kept.length].s - from + L) % L;
          if(len < 1) len = L;
          const dur = len / SPEED * 1000;
          segs.push({start:t, dur, from, len});
          t += dur + DWELL;
        }
        cycle = t;
      }else{
        cycle = L / SPEED * 1000;
      }

      // 列車（機関車＋客車2両）
      const k = clamp(isl.size/85, .6, 1);
      const trainG = mk("g", {class:"rail-train"});
      const title = mk("title");
      title.textContent = "島の鉄道（クリックで車掌のひとこと）";
      trainG.append(title);
      const cars = [
        {el:mkLoco(),     off:0},
        {el:mkCarriage(), off:-10.5*k},
        {el:mkCarriage(), off:-20.5*k},
      ];
      for(let i = cars.length-1; i >= 0; i--) trainG.append(cars[i].el);
      trainG.addEventListener("pointerdown", e => {
        try{
          if(e.button !== 0) return;
          e.preventDefault();                  // 海クリック・島クリックを横取りしない作法
          let idx, tries = 0;
          do{ idx = (Math.random()*CONDUCTOR.length)|0; }while(idx === lastSay && ++tries < 8);
          lastSay = idx;
          I.toast(CONDUCTOR[idx]);
        }catch(err){ console.error(TAG, err); }
      });
      g.append(trainG);

      rec.g = g; rec.track = track; rec.L = L;
      rec.segs = segs.length ? segs : null; rec.cycle = cycle;
      rec.cars = cars; rec.k = k;
      rec.prevMoving = true; rec.lastPuff = 0;
    }

    function destroyRailway(id){
      const rec = railways.get(id);
      if(!rec) return;
      railways.delete(id);
      try{ if(rec.g) rec.g.remove(); }catch(err){ console.error(TAG, err); }
      if(!railways.size && rafId != null){ cancelAnimationFrame(rafId); rafId = null; }
    }

    function rebuildRailway(rec){
      try{
        const isl = findIsland(rec.isl.id);
        if(!isl || !isl.el || !isl.el.isConnected){ destroyRailway(rec.isl.id); return; }
        if(rec.g) rec.g.remove();
        rec.isl = isl;
        buildGraphics(rec);
      }catch(err){ console.error(TAG, "rebuild", err); destroyRailway(rec.isl.id); }
    }

    // ---------------- motion ----------------
    function distAt(rec, tMs){
      if(!rec.segs) return {d:(tMs/1000*SPEED) % rec.L, moving:true};
      let t = tMs % rec.cycle;
      for(const s of rec.segs){
        if(t < s.start + s.dur){
          const u = (t - s.start) / s.dur;
          return {d:(s.from + s.len*easeIO(u)) % rec.L, moving:u > .02 && u < .98};
        }
        if(t < s.start + s.dur + DWELL)
          return {d:(s.from + s.len) % rec.L, moving:false};
      }
      return {d:rec.segs[0].from, moving:false};
    }

    function puff(rec, lx, ly, ca, sa){
      try{
        const k = rec.k;
        const sx = lx + (ca*2.9 - sa*(-5.2))*k;   // 煙突の先（車体ローカル 2.9,-5.2）
        const sy = ly + (sa*2.9 + ca*(-5.2))*k;
        const wx = rec.isl.x + sx, wy = rec.isl.y + sy;
        const c = mk("circle",{class:"rail-puff", cx:wx, cy:wy, r:1.2*k,
          fill:"#90999e", opacity:.5});
        c.style.transformOrigin = `${wx}px ${wy}px`;
        I.gFx.append(c);
        c.animate([
          {transform:"translate(0px,0px) scale(.7)", opacity:.5},
          {transform:"translate(-7px,-12px) scale(2.6)", opacity:0}
        ],{duration:1400 + Math.random()*400, easing:"ease-out"}).onfinish = () => c.remove();
      }catch(err){ console.error(TAG, "puff", err); }
    }

    function tick(){
      rafId = null;
      try{
        const now = performance.now();
        for(const rec of [...railways.values()]){
          const isl = rec.isl;
          if(!isl.el || !isl.el.isConnected || I.islands.indexOf(isl) < 0){
            destroyRailway(isl.id); continue;
          }
          const st = distAt(rec, now - rec.t0);
          let lx = 0, ly = 0, ca = 1, sa = 0;
          for(let i = 0; i < rec.cars.length; i++){
            const car = rec.cars[i];
            const d = ((st.d + car.off) % rec.L + rec.L) % rec.L;
            const p = rec.track.getPointAtLength(d);
            const q = rec.track.getPointAtLength((d + 1) % rec.L);
            const ang = Math.atan2(q.y - p.y, q.x - p.x);
            car.el.setAttribute("transform",
              `translate(${p.x.toFixed(2)} ${p.y.toFixed(2)}) rotate(${(ang*180/Math.PI).toFixed(1)}) scale(${rec.k})`);
            if(i === 0){ lx = p.x; ly = p.y; ca = Math.cos(ang); sa = Math.sin(ang); }
          }
          // 蒸気：走行中は約700ms、停車中はのんびり
          const cad = st.moving ? 650 + Math.random()*150 : 1800;
          if(now - rec.lastPuff > cad){ rec.lastPuff = now; puff(rec, lx, ly, ca, sa); }
          // 発車の汽笛（全路線あわせて2分に1回まで）
          if(st.moving && !rec.prevMoving && Date.now() - lastToot > 120000 && Math.random() < .4){
            lastToot = Date.now();
            I.toast(`ポーッ（${isl.name}鉄道、定時運行中）`);
          }
          rec.prevMoving = st.moving;
        }
      }catch(err){ console.error(TAG, "tick", err); }
      if(railways.size) rafId = requestAnimationFrame(tick);
    }

    // ---------------- commissioning ----------------
    function commission(id){
      pending.delete(id);
      try{
        const isl = findIsland(id);
        if(!isl || !isl.el || !isl.el.isConnected) return;
        if(railways.has(id) || !capacityLeft()) return;
        if(!isl.villages || isl.villages.length < 3) return;
        const rec = {isl, t0:performance.now()};
        buildGraphics(rec);
        railways.set(id, rec);
        I.toast(`${isl.name}に鉄道が通りました。どこへも行けませんが、ぐるっと回れます`);
        I.emit("rail:built", {island: isl});
        if(rafId == null) rafId = requestAnimationFrame(tick);
      }catch(err){ console.error(TAG, "commission", err); }
    }

    function consider(isl){
      try{
        if(!isl || railways.has(isl.id) || pending.has(isl.id)) return;
        if(!isl.villages || isl.villages.length < 3) return;
        if(!capacityLeft()) return;
        pending.set(isl.id, setTimeout(() => commission(isl.id), rand(40000, 80000)));
      }catch(err){ console.error(TAG, "consider", err); }
    }
    function considerAll(){ for(const isl of I.islands) consider(isl); }

    // ---------------- events ----------------
    I.on("village-added", a => {
      try{
        const isl = a && a.island;
        if(!isl) return;
        const rec = railways.get(isl.id);
        if(rec) rebuildRailway(rec);          // 駅とダイヤを引き直す
        else consider(isl);
      }catch(err){ console.error(TAG, err); }
    });
    I.on("island-added", isl => {             // 新しく隆起した島も審査対象に
      try{ consider(isl); }catch(err){ console.error(TAG, err); }
    });
    I.on("island-removed", isl => {
      try{
        if(!isl) return;
        const t = pending.get(isl.id);
        if(t != null){ clearTimeout(t); pending.delete(isl.id); }
        destroyRailway(isl.id);               // gは島ごと消えているが帳簿を締める
        considerAll();                        // 枠が空いたら次の候補へ
      }catch(err){ console.error(TAG, err); }
    });
    I.on("cleared", () => {
      try{
        for(const t of pending.values()) clearTimeout(t);
        pending.clear();
        for(const id of [...railways.keys()]) destroyRailway(id);
      }catch(err){ console.error(TAG, err); }
    });
    I.on("kame:moved", a => {                 // 亀島が泳いだら線路を引き直す（対応プラグインがあれば）
      try{
        const isl = a && a.island ? a.island : a;
        if(!isl || isl.id == null) return;
        const rec = railways.get(isl.id);
        if(rec) rebuildRailway(rec);
      }catch(err){ console.error(TAG, err); }
    });

    considerAll();                            // 読み込み時点ですでに大きな島があれば
  }catch(err){ console.error("[rail] init", err); }
})();
</script>


<script>
// ════ plugin: shima-bgm (bgm) ════ Paste verbatim into its own <script> tag after the existing plugin blocks in island-maker/index.html (after the yugur
(() => {
  "use strict";
  if(!window.ISLE) return;
  const I = window.ISLE;
  const TAG = "[shima-bgm]";
  const LSK = "shima-bgm";
  try{
    /* ================= consts ================= */
    const BASE_BPM = 92, DUSK_BPM = 76, MATSURI_MULT = 1.12;
    const HORIZON = 1.6, TICK_MS = 250, MASTER_GAIN = 0.16;
    const mtof = m => 440 * Math.pow(2, (m - 69) / 12);
    // F major. roots low, tones mid (midi)
    const CHORDS = {
      F:   {root:53, tones:[57,60,65,69]},
      Dm:  {root:50, tones:[57,62,65,69]},
      Bb:  {root:46, tones:[58,62,65,70]},
      C:   {root:48, tones:[55,60,64,67]},
      Am:  {root:45, tones:[57,60,64,69]},
      Gm7: {root:43, tones:[55,58,62,65]},
    };
    const PENT = [65,67,69,72,74,77,79,81];      // F major pentatonic, kalimba register

    /* ================= state ================= */
    let ctx = null, master = null, lp = null, bandBus = null, noiseBuf = null;
    let playing = false, armed = false, tickTimer = null;
    let enabled = "on";
    try{ enabled = localStorage.getItem(LSK) || "on"; }catch(err){ console.error(TAG, err); }
    enabled = enabled === "on";

    let stepTotal = 0, nextStepTime = 0;
    let cycleNo = -1, prog = ["F","Dm","Bb","C"];
    let barArp = new Set(), strumStep = -1;
    const melodyMap = new Map();                 // absolute step -> [{midi, vel}]
    let nextPhraseStep = 0, lastCall = null, lastSig = "";
    let matsuriUntil = 0, typhStart = Infinity, typhoonUntil = 0, nextWorryTime = 0;
    let duskNow = false;
    const ksCache = new Map();

    function effBpm(t){
      let b = duskNow ? DUSK_BPM : BASE_BPM;
      if(t < matsuriUntil) b *= MATSURI_MULT;
      return b;
    }

    /* ================= dusk poll (yugure overlay) ================= */
    setInterval(() => {
      try{
        let d = false;
        for(const el of document.querySelectorAll('[class*="yugure"]')){
          if(!(el instanceof HTMLElement)) continue;
          const cs = getComputedStyle(el);
          if(cs.position === "fixed" && parseFloat(cs.opacity) > 0.02){ d = true; break; }
        }
        duskNow = d;
      }catch(err){ console.error(TAG, err); }
    }, 5000);

    /* ================= voices ================= */
    function playMarimba(t, freq, vel, dest, decay){
      decay = decay || 0.8;
      const o = ctx.createOscillator(); o.type = "sine";
      o.frequency.setValueAtTime(freq * 1.015, t);                 // pitch-drop attack
      o.frequency.exponentialRampToValueAtTime(freq, t + 0.03);
      const g = ctx.createGain();
      g.gain.setValueAtTime(0.0001, t);
      g.gain.linearRampToValueAtTime(vel, t + 0.006);
      g.gain.exponentialRampToValueAtTime(0.0001, t + decay);
      o.connect(g); g.connect(dest);
      const o3 = ctx.createOscillator(); o3.type = "sine";         // quiet 3rd harmonic
      o3.frequency.setValueAtTime(freq * 3 * 1.015, t);
      o3.frequency.exponentialRampToValueAtTime(freq * 3, t + 0.03);
      const g3 = ctx.createGain();
      g3.gain.setValueAtTime(0.0001, t);
      g3.gain.linearRampToValueAtTime(vel * 0.14, t + 0.004);
      g3.gain.exponentialRampToValueAtTime(0.0001, t + decay * 0.35);
      o3.connect(g3); g3.connect(dest);
      o.start(t);  o.stop(t + decay + 0.1);
      o3.start(t); o3.stop(t + decay * 0.35 + 0.1);
    }
    function playKalimba(t, freq, vel){
      const o = ctx.createOscillator(); o.type = "sine";
      o.frequency.setValueAtTime(freq * 1.018, t);
      o.frequency.exponentialRampToValueAtTime(freq, t + 0.02);
      const g = ctx.createGain();
      g.gain.setValueAtTime(0.0001, t);
      g.gain.linearRampToValueAtTime(vel, t + 0.004);
      g.gain.exponentialRampToValueAtTime(0.0001, t + 0.5);
      o.connect(g); g.connect(bandBus);
      const o2 = ctx.createOscillator(); o2.type = "sine";          // tine ping (inharmonic)
      o2.frequency.setValueAtTime(freq * 2.93, t);
      const g2 = ctx.createGain();
      g2.gain.setValueAtTime(0.0001, t);
      g2.gain.linearRampToValueAtTime(vel * 0.3, t + 0.003);
      g2.gain.exponentialRampToValueAtTime(0.0001, t + 0.09);
      o2.connect(g2); g2.connect(bandBus);
      o.start(t);  o.stop(t + 0.6);
      o2.start(t); o2.stop(t + 0.15);
    }
    function noiseHit(t, vel, fType, f0, q, dur){
      const src = ctx.createBufferSource(); src.buffer = noiseBuf; src.loop = true;
      const flt = ctx.createBiquadFilter(); flt.type = fType; flt.frequency.value = f0; flt.Q.value = q;
      const g = ctx.createGain();
      g.gain.setValueAtTime(0.0001, t);
      g.gain.linearRampToValueAtTime(vel, t + 0.008);
      g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
      src.connect(flt); flt.connect(g); g.connect(bandBus);
      src.start(t, Math.random() * 0.8);
      src.stop(t + dur + 0.05);
    }
    // classic Karplus-Strong: noise-filled delay line + averaging feedback
    function ksBuf(freq){
      const key = Math.round(freq * 10);
      let b = ksCache.get(key);
      if(b) return b;
      const sr = ctx.sampleRate;
      const N = Math.max(2, Math.round(sr / freq));
      const len = Math.floor(sr * 0.55);
      b = ctx.createBuffer(1, len, sr);
      const out = b.getChannelData(0);
      const dl = new Float32Array(N);
      for(let i = 0; i < N; i++) dl[i] = Math.random() * 2 - 1;
      const fb = 0.957;                                            // muted uke decay
      let idx = 0;
      for(let i = 0; i < len; i++){
        const j = (idx + 1) % N;
        out[i] = dl[idx];
        dl[idx] = fb * 0.5 * (dl[idx] + dl[j]);
        idx = j;
      }
      ksCache.set(key, b);
      if(ksCache.size > 40) ksCache.delete(ksCache.keys().next().value);
      return b;
    }
    function ksPluck(t, freq, vel){
      const src = ctx.createBufferSource(); src.buffer = ksBuf(freq);
      const g = ctx.createGain();
      g.gain.setValueAtTime(vel, t);
      g.gain.setValueAtTime(vel, t + 0.25);
      g.gain.exponentialRampToValueAtTime(0.0001, t + 0.5);
      src.connect(g); g.connect(bandBus);
      src.start(t); src.stop(t + 0.55);
    }
    function strum(t, ch){
      const tones = Math.random() < 0.25 ? ch.tones.slice().reverse() : ch.tones;
      for(let i = 0; i < 4; i++)
        ksPluck(t + i * 0.012 + Math.random() * 0.002, mtof(tones[i % tones.length]), 0.035 + Math.random() * 0.015);
    }
    function playPad(t, ch, dur){                                  // dusk-only warm pad
      const flt = ctx.createBiquadFilter(); flt.type = "lowpass"; flt.frequency.value = 750;
      const g = ctx.createGain();
      g.gain.setValueAtTime(0.0001, t);
      g.gain.linearRampToValueAtTime(0.035, t + Math.min(1.4, dur * 0.45));
      g.gain.setValueAtTime(0.035, t + dur);
      g.gain.linearRampToValueAtTime(0.0001, t + dur + 1.4);
      flt.connect(g); g.connect(bandBus);
      for(const m of [ch.root + 12, ch.tones[0], ch.tones[2]]){
        for(const det of [-4, 4]){
          const o = ctx.createOscillator(); o.type = "triangle";
          o.frequency.value = mtof(m); o.detune.value = det;
          o.connect(flt); o.start(t); o.stop(t + dur + 1.6);
        }
      }
    }

    /* ================= generative scheduling ================= */
    function ensureCycle(bar){
      const cyc = Math.floor(bar / 4);
      if(cyc === cycleNo) return;
      cycleNo = cyc;
      prog = ["F","Dm","Bb","C"];
      if(cyc > 0 && cyc % 4 === 3){                                // every 4th cycle: substitute
        if(Math.random() < 0.5) prog[1] = "Am"; else prog[2] = "Gm7";
        if(Math.random() < 0.2){ prog[1] = "Am"; prog[2] = "Gm7"; }
      }
    }
    function genPhrase(s){
      const oct = duskNow ? -12 : 0;
      const isResp = !!lastCall && Math.random() < 0.7;
      let degs, durs;
      if(isResp){                                                  // response: echo, drop, resolve
        durs = lastCall.durs.slice();
        const drop = 1 + (Math.random() * 2 | 0);
        degs = lastCall.degs.map(d => Math.min(PENT.length - 1, Math.max(0, d - drop)));
        if(durs.length > 4 && Math.random() < 0.5){ durs.pop(); degs.pop(); }
        degs[degs.length - 1] = [0, 3, 5][(Math.random() * 3) | 0];
        durs[durs.length - 1] = 3;
        lastCall = null;
      }else{                                                       // call: wandering 4-7 notes
        const n = 4 + (Math.random() * 4 | 0);
        degs = []; durs = [];
        let d = 1 + (Math.random() * 4 | 0);
        for(let i = 0; i < n; i++){
          d = Math.min(PENT.length - 1, Math.max(0, d));
          degs.push(d);
          d += [-1, 1, 1, 2, -2][(Math.random() * 5) | 0];
          durs.push([1, 1, 1, 2, 2, 3][(Math.random() * 6) | 0]);
        }
        lastCall = {degs: degs.slice(), durs: durs.slice()};
      }
      let sig = degs.join("") + "|" + durs.join("");
      if(sig === lastSig){                                         // never the same phrase twice
        degs[(Math.random() * degs.length) | 0] = (Math.random() * PENT.length) | 0;
        sig = degs.join("") + "|" + durs.join("");
      }
      lastSig = sig;
      let st = s;
      for(let i = 0; i < degs.length; i++){
        const arr = melodyMap.get(st) || [];
        arr.push({midi: PENT[degs[i]] + oct, vel: 0.26 + Math.random() * 0.12});
        melodyMap.set(st, arr);
        st += durs[i];
      }
      nextPhraseStep = st + (lastCall ? 4 + (Math.random() * 4 | 0)    // response comes soon
                                      : 7 + (Math.random() * 9 | 0));  // rest ~2-5s
    }
    function scheduleStep(s, t){
      const sib = s % 8, bar = (s - sib) / 8;
      if(sib === 0){
        ensureCycle(bar);
        barArp = new Set();
        const pool = [2, 3, 4, 6, 7];
        const nA = (duskNow ? 1 : 2) + (Math.random() * 2 | 0);
        while(barArp.size < nA) barArp.add(pool[(Math.random() * pool.length) | 0]);
        strumStep = Math.random() < (duskNow ? 0.18 : 0.35) ? (Math.random() < 0.5 ? 3 : 5) : -1;
      }
      const ch = CHORDS[prog[bar % 4]];
      const muted = t > typhStart && t < typhoonUntil;             // typhoon: band tacet
      if(s >= nextPhraseStep && !muted) genPhrase(s);
      const mel = melodyMap.get(s);
      melodyMap.delete(s);
      if(muted) return;
      if(!duskNow && Math.random() > 0.12)                          // shaker, swung 8ths
        noiseHit(t, (sib % 2 ? 0.05 : 0.03) * (0.75 + Math.random() * 0.5),
                 "bandpass", 4800 + Math.random() * 1500, 1.2, 0.15);
      if(t < matsuriUntil && sib % 2 === 1){                        // matsuri offbeat jingle
        noiseHit(t, 0.045, "highpass", 7200, 0.7, 0.09);
        noiseHit(t + 0.032, 0.028, "highpass", 8400, 0.7, 0.13);
      }
      if(sib === 0){
        playMarimba(t, mtof(ch.root), 0.42, bandBus, 1.0);
        if(duskNow) playPad(t, ch, 4 * 60 / effBpm(t));
      }
      if(barArp.has(sib) && Math.random() > 0.1)
        playMarimba(t, mtof(ch.tones[(Math.random() * ch.tones.length) | 0]),
                    0.18 + Math.random() * 0.1, bandBus, 0.8);
      if(sib === strumStep) strum(t, ch);
      if(mel) for(const ev of mel) playKalimba(t, mtof(ev.midi), ev.vel);
    }
    function tick(){
      try{
        if(!ctx) return;
        const now = ctx.currentTime;
        if(nextStepTime < now - 0.25) nextStepTime = now + 0.1;     // resync after deep sleep
        let guard = 0;
        while(nextStepTime < now + HORIZON && guard++ < 64){
          scheduleStep(stepTotal, nextStepTime);
          nextStepTime += (stepTotal % 2 === 0 ? 0.58 : 0.42) * (60 / effBpm(nextStepTime));
          stepTotal++;
        }
        if(now < typhoonUntil){                                     // worried low marimba
          while(nextWorryTime < now + HORIZON && nextWorryTime < typhoonUntil){
            playMarimba(nextWorryTime, mtof([50, 45, 46][(Math.random() * 3) | 0]), 0.4, master, 1.8);
            nextWorryTime += 4;
          }
        }
      }catch(err){ console.error(TAG, err); }
    }

    /* ================= transport ================= */
    function startAudio(){
      try{
        if(playing) return;
        ctx = new (window.AudioContext || window.webkitAudioContext)();
        ksCache.clear();
        noiseBuf = ctx.createBuffer(1, ctx.sampleRate | 0, ctx.sampleRate);
        const nd = noiseBuf.getChannelData(0);
        for(let i = 0; i < nd.length; i++) nd[i] = Math.random() * 2 - 1;
        master = ctx.createGain();
        lp = ctx.createBiquadFilter(); lp.type = "lowpass"; lp.frequency.value = 9000; lp.Q.value = 0.5;
        bandBus = ctx.createGain(); bandBus.gain.value = 1;
        bandBus.connect(master); master.connect(lp); lp.connect(ctx.destination);
        const t0 = ctx.currentTime;
        master.gain.setValueAtTime(0.0001, t0);
        master.gain.exponentialRampToValueAtTime(MASTER_GAIN, t0 + 2.5);   // fade-in
        stepTotal = 0; nextStepTime = t0 + 0.2;
        melodyMap.clear(); lastCall = null; lastSig = "";
        cycleNo = -1; prog = ["F","Dm","Bb","C"]; barArp = new Set(); strumStep = -1;
        matsuriUntil = 0; typhStart = Infinity; typhoonUntil = 0; nextWorryTime = 0;
        nextPhraseStep = 10 + (Math.random() * 8 | 0);
        playing = true;
        if(tickTimer) clearInterval(tickTimer);
        tickTimer = setInterval(tick, TICK_MS);
        if(ctx.state !== "running") ctx.resume().catch(() => {});
        tick();
      }catch(err){ console.error(TAG, err); }
    }
    function stopAudio(){
      try{
        if(!playing) return;
        playing = false;
        if(tickTimer){ clearInterval(tickTimer); tickTimer = null; }
        const c = ctx, m = master;
        ctx = null; master = null; bandBus = null; lp = null;
        if(c && m){
          const t = c.currentTime;
          m.gain.cancelScheduledValues(t);
          m.gain.setValueAtTime(Math.max(m.gain.value, 0.0001), t);
          m.gain.exponentialRampToValueAtTime(0.0001, t + 1);       // 1s fade-out
          setTimeout(() => {
            try{ m.disconnect(); }catch(err){ console.error(TAG, err); }
            try{ c.close(); }catch(err){ console.error(TAG, err); }
          }, 1200);
        }
      }catch(err){ console.error(TAG, err); }
    }
    function disarm(){
      if(!armed) return; armed = false;
      window.removeEventListener("pointerdown", onUnlock, true);
    }
    function onUnlock(){
      try{
        if(!enabled){ disarm(); return; }
        if(!playing) startAudio();
        else if(ctx && ctx.state !== "running") ctx.resume().catch(() => {});
        if(ctx && ctx.state === "running") disarm();                // stays armed if locked
      }catch(err){ console.error(TAG, err); }
    }
    function arm(){
      if(armed) return; armed = true;
      window.addEventListener("pointerdown", onUnlock, {capture: true, passive: true});
    }

    /* ================= dock button ================= */
    const btn = I.addButton(enabled ? "🎶 BGM" : "🔇 BGM", () => {
      try{
        enabled = !enabled;
        try{ localStorage.setItem(LSK, enabled ? "on" : "off"); }catch(err){ console.error(TAG, err); }
        btn.textContent = enabled ? "🎶 BGM" : "🔇 BGM";
        if(enabled){
          startAudio();                                             // click = unlock gesture
          if(ctx && ctx.state !== "running") ctx.resume().catch(() => {});
          I.toast("🎶 島のBGM、はじまります（へ長調・波まかせ）");
        }else{
          disarm();
          stopAudio();
          I.toast("🔇 BGMをとめました。あとは波の音でどうぞ");
        }
      }catch(err){ console.error(TAG, err); }
    });
    btn.title = "島のBGM（生成音楽・同じフレーズは二度と流れません）";

    /* ================= adaptive events ================= */
    I.on("matsuri:held", () => {
      try{ if(playing && ctx) matsuriUntil = ctx.currentTime + 20; }catch(err){ console.error(TAG, err); }
    });
    I.on("weather:typhoon", () => {
      try{
        if(!playing || !ctx || !bandBus) return;
        const t = ctx.currentTime;
        typhStart = t; typhoonUntil = t + 50;
        nextWorryTime = Math.max(nextWorryTime, t + 2.5);
        const g = bandBus.gain;
        g.cancelScheduledValues(t);
        g.setValueAtTime(Math.max(g.value, 0.0001), t);
        g.exponentialRampToValueAtTime(0.0001, t + 2);              // band ducks out
        g.setValueAtTime(0.0001, typhoonUntil);
        g.exponentialRampToValueAtTime(1, typhoonUntil + 4);        // band returns
      }catch(err){ console.error(TAG, err); }
    });

    /* ================= startup ================= */
    if(enabled) arm();
  }catch(err){ console.error(TAG, err); }
})();
</script>


<script>

      {id:"shima:ehagaki-shokunin",icon:"📮", title:"絵はがき職人",     desc:"ポストのない海から絵はがきを投函した"},
      {id:"shima:kaibutsu",        icon:"🐉", title:"怪物実在説",       desc:"海図の怪物をつついて学説を聞いた", secret:true},
      {id:"shima:hatsu-hakkutsu",  icon:"⛏", title:"初発掘",           desc:"はじめての宝を掘り当てた"},
      {id:"shima:treasure-hunter", icon:"💎", title:"トレジャーハンター", desc:"宝を5回掘り当てた"},
      {id:"shima:hacchunushi",     icon:"📦", title:"発注主",           desc:"島の依頼に応えた"},
      {id:"shima:nikka",           icon:"📋", title:"日課",             desc:"今日のおつかいをやり遂げた"},
      {id:"shima:kaigara-narikin", icon:"🐚", title:"貝がら成金",       desc:"貝がらを400枚ためこんだ"},
    ];
    const CROSS = [
      {id:"cross:yotsu-sekai", icon:"🚪", title:"四つの世界の旅人", desc:"すべてのおもちゃを訪れた"},
      {id:"cross:shijuso",     icon:"🎶", title:"四重奏",           desc:"すべての世界に音楽を流した"},
      {id:"cross:kiroku-ma",   icon:"📚", title:"記録魔",           desc:"実績を合計30個解除した", secret:true},
    ];
    (function register(){
      const all = readObj(K_DEFS);
      all[TOY] = DEFS;

      writeObj(K_DEFS, all);
    })();
    const findDef = id => DEFS.find(d => d.id === id) || CROSS.find(d => d.id === id) || null;

    /* ================= counters ================= */
    function bump(key, n){

    document.head.append(style);

    /* ================= 解除バナー（賞状ふう・直列キュー） ================= */

    banner.className = "ach-shima-banner";
    document.body.append(banner);
    const bq = [];
    let bShowing = false;
    function nextBanner(){
      try{
        const def = bq.shift();

          `<div class="ach-shima-rib">🏆 実績解除</div>` +
          `<div class="ach-shima-bt">${esc(def.icon)} ${esc(def.title)}</div>` +
          (def.desc ? `<div class="ach-shima-bd">${esc(def.desc)}</div>` : "");

          try{
            banner.classList.remove("ach-shima-in");

          }catch(err){ console.error(TAG, err); bShowing = false; }

    /* ================= unlock ================= */
    const isUnlocked = id => { try{ return !!readObj(K_STATE)[id]; }catch(e){ return false; } };

        if(st[id]) return false;                          // 二重解除なし

        writeObj(K_STATE, st);
        queueBanner(findDef(id) || {icon:"🏆", title:id, desc:""});
        try{ I.emit(TOY + ":ach-unlocked", {id}); }catch(err){ console.error(TAG, err); }
        checkKiroku();
        return true;
      }catch(err){ console.error(TAG, "unlock", id, err); return false; }

    function checkYotsu(){

    listen("matsuri:held",     () => { if(bump("shima-matsuri") >= 3) unlock("shima:matsurizuki"); });
    listen("weather:typhoon",  () => unlock("shima:taifu-ikka"));
    listen("volcano:eruption", () => unlock("shima:hinoshima"));
    listen("volcano:sunk",     () => unlock("shima:chinbotsu"));
    listen("hashi:built",      () => unlock("shima:kakehashi"));
    listen("rail:built",       () => { if(bump("shima-rail") >= 2) unlock("shima:tetsudo-o"); });
    listen("kame:moved",       () => unlock("shima:kame"));
    listen("sealife:whale",    () => unlock("shima:kujira"));
    listen("kankou:visited",   () => { if(bump("shima-kankou") >= 5) unlock("shima:kanko-taishi"); });
    /* gameplay-systems プラグイン（同梱予定）のイベント — 来たら解除される */
    listen("takara:dug", () => {
      unlock("shima:hatsu-hakkutsu");
      if(bump("shima-takara") >= 5) unlock("shima:treasure-hunter");
    });
    listen("irai:fulfilled",    () => unlock("shima:hacchunushi"));
    listen("quest:daily-clear", () => unlock("shima:nikka"));
    listen("shima:currency",    p => { if(p && +p.total >= 400) unlock("shima:kaigara-narikin"); });

    /* ================= トースト観測（イベントのない出来事はここで拾う） ================= */
    const toastEl = document.getElementById("toast");
    if(toastEl){
      const KAIBUTSU = ["絵です", "縮尺どおり", "見テイナイ", "インクの染み", "学術的には未確認"];
      const mo = new MutationObserver(() => {
        try{
          const t = toastEl.textContent || "";
          if(t.includes("灯台守の記録")) unlock("shima:todai-no-tomo");
          if(t.includes("ポストはありません") || t.includes("気持ちは届きます")) unlock("shima:ehagaki-shokunin");
          if(KAIBUTSU.some(p => t.includes(p))) unlock("shima:kaibutsu");
          if(t.includes("BGM")) setTimeout(() => { try{ checkShijuso(); }catch(e){} }, 80);
        }catch(err){ console.error(TAG, "toast-obs", err); }
      });
      mo.observe(toastEl, {childList:true, characterData:true, subtree:true});
    }

    /* ================= 実績手帳 ================= */
    const SECTIONS = [
      {key:"hoshizora", label:"星空"},
      {key:"shinkai",   label:"深海"},
      {key:"shima",     label:"島々"},
      {key:"rekishi",   label:"年代記"},
      {key:"cross",     label:"横断"},
    ];
    const ovl = document.createElement("div");
    ovl.className = "ach-shima-ovl";
    document.body.append(ovl);
    let open = false;

    function fmtDate(iso){
      try{
        const d = new Date(iso);
        if(isNaN(d)) return "";
        return d.getFullYear() + "." + (d.getMonth() + 1) + "." + d.getDate();
      }catch(e){ return ""; }
    }
    function render(){
      const all = readObj(K_DEFS);
      const st = readObj(K_STATE);
      let total = 0, got = 0, body = "";
      for(const sec of SECTIONS){
        const list = Array.isArray(all[sec.key]) ? all[sec.key] : null;
        if(!list || !list.length){
          body += `<div class="ach-shima-sec"><span>${esc(sec.label)}</span></div>` +
                  `<div class="ach-shima-untrod">（未踏の世界）</div>`;
          continue;
        }
        const sGot = list.filter(d => d && st[d.id]).length;
        total += list.length; got += sGot;
        body += `<div class="ach-shima-sec"><span>${esc(sec.label)}</span><small>${sGot}/${list.length}</small></div>`;
        for(const d of list){
          if(!d || !d.id) continue;
          const rec = st[d.id];
          if(rec){
            body += `<div class="ach-shima-row ach-shima-got">` +
              `<div class="ach-shima-ic">${esc(d.icon || "🏆")}</div><div>` +
              `<div class="ach-shima-t">${esc(d.title)}<span class="ach-shima-date">${esc(fmtDate(rec.at))} 解除</span></div>` +
              `<div class="ach-shima-d">${esc(d.desc)}</div></div></div>`;
          }else if(d.secret){
            body += `<div class="ach-shima-row ach-shima-lock">` +
              `<div class="ach-shima-ic">？</div><div>` +
              `<div class="ach-shima-t">？？？</div><div class="ach-shima-d">？？？</div></div></div>`;
          }else{
            body += `<div class="ach-shima-row ach-shima-lock">` +
              `<div class="ach-shima-ic">${esc(d.icon || "🏆")}</div><div>` +
              `<div class="ach-shima-t">${esc(d.title)}</div>` +
              `<div class="ach-shima-d">${esc(d.desc)}</div></div></div>`;
          }
        }
      }
      ovl.innerHTML = `<div class="ach-shima-book" role="dialog" aria-label="実績手帳">` +
        `<button class="ach-shima-x" title="とじる">✕</button>` +
        `<div class="ach-shima-head"><h2>🏆 実績手帳</h2><span class="ach-shima-total">${got}/${total}</span></div>` +
        `<div class="ach-shima-sub">四つの世界の記録。ここに書いたことは、だいたい本当です</div>` +
        body + `</div>`;
      const x = ovl.querySelector(".ach-shima-x");
      if(x) x.addEventListener("click", closeBook);
    }
    function openBook(){ try{ render(); ovl.classList.add("ach-shima-show"); open = true; }catch(err){ console.error(TAG, err); } }
    function closeBook(){ ovl.classList.remove("ach-shima-show"); open = false; }
    ovl.addEventListener("pointerdown", e => { try{ if(e.target === ovl) closeBook(); }catch(err){ console.error(TAG, err); } });
    document.addEventListener("keydown", e => { try{ if(e.key === "Escape" && open) closeBook(); }catch(err){ console.error(TAG, err); } });
    try{ I.addButton("🏆 実績", () => { open ? closeBook() : openBook(); }); }
    catch(err){ console.error(TAG, "addButton", err); }

    /* ================= 起動時 ================= */
    bump("visited-shima");
    checkYotsu();
    checkShijuso();
    checkKiroku();
  } catch(err){ console.error(TAG, "init", err); }
})();
</script>

    function spawnMap(){
      try{

    function dig(x, y){
      try{
        if(!hunt) return;
