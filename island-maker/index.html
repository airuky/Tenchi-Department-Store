  function rebuildLabel(isl){
    if(!isl.label || !isl.label.isConnected) return;
    const t = ISLE.mk("text",{x:isl.x, y:isl.y - isl.size*1.32 - 8, "text-anchor":"middle",
      "font-size":14, fill:"#1f3038", "letter-spacing":".18em", "font-weight":"700"});
    t.textContent = isl.name;
    const sub = ISLE.mk("text",{x:isl.x, y:isl.y - isl.size*1.32 + 6, "text-anchor":"middle",
      "font-size":8.5, fill:"#46707c", "letter-spacing":".1em"});
    sub.textContent = `約${isl.area}km²・${isl.villages.length}村`;
    const g = ISLE.mk("g");
    g.append(t, sub);
    isl.label.replaceWith(g);
    isl.label = g;
  }

  // ---------------- town flavor ----------------
  function townName(name){
    const stem = String(name).replace(/(集落|番屋|村|浦|湊|町)$/, "");
    return stem + "町";
  }
  function townPop(){
    const n = 200 + (Math.random()*700|0);
    return ISLE.pick([
      `${n}人と信号機${1+(Math.random()*2|0)}基`,
      `${n}人と自動販売機${3+(Math.random()*6|0)}台`,
      `${n}人。回覧板は二系統`,
      `${n}人（町制施行を機に数え直し）`,
      `${n}人。うち役場職員${2+(Math.random()*4|0)}人`,
    ]);
  }

  // ---------------- promotion ----------------
  function promote(isl, v){
    try{
      if(!ISLE.islands.includes(isl) || !isl.villages.includes(v) || v.isTown) return;
      const oldName = v.name;
      v.isTown = true;
      v.name = townName(oldName);
      v.pop = townPop();
      v._hatten = PROMOTE_AT;
      rebuildVillageLayer(isl);
      rebuildLabel(isl);
      promoAt.set(isl.id, performance.now());
      const [x, y] = villageXY(isl, v);
      confetti(x, y);
      ISLE.toast(`${oldName}は、${v.name}になりました。本人がいちばん驚いています`);
      ISLE.emit("growth:promoted", {island: isl, village: v});
      ISLE.refreshPanel();
    }catch(err){ console.error(TAG, err); }
  }

  // ---------------- growth meter in the ledger panel ----------------
  let cardsBox = null;
  function injectMeters(){
    if(!cardsBox || !cardsBox.isConnected) return;
    for(const card of cardsBox.querySelectorAll(".card")){
      const isl = ISLE.islands.find(s => s.id === +card.dataset.cid);
      let meter = card.querySelector(".mura-hatten-meter");
      const rows = isl ? isl.villages
        .filter(v => !v.isTown && (v._hatten|0) > 0)
        .map(v => {
          const h = Math.min(PROMOTE_AT, v._hatten|0);
          const wait = h >= PROMOTE_AT ? `<span class="mura-hatten-wait">（書類審査中）</span>` : "";
          return `🌱 ${esc(v.name)} <span class="mura-hatten-dots">${"●".repeat(h)}${"○".repeat(PROMOTE_AT-h)}</span>${wait}`;
        }) : [];
      if(!rows.length){ if(meter) meter.remove(); continue; }
      if(!meter){
        meter = document.createElement("div");
        meter.className = "mura-hatten-meter";
        const story = card.querySelector(".story");
        if(story) card.insertBefore(meter, story); else card.append(meter);
      }
      meter.innerHTML = rows.join("<br>");
    }
  }
  ISLE.on("panel-rendered", ({container}) => {
    try{ cardsBox = container; injectMeters(); }catch(err){ console.error(TAG, err); }
  });

  // ---------------- engine (elapsed wall time, throttle-proof) ----------------
  function step(){
    const cands = [];
    for(const isl of ISLE.islands){
      if(!isl || !isl.el || !isl.el.isConnected) continue;
      for(const v of isl.villages) if(!v.isTown) cands.push({isl, v});
    }
    if(!cands.length) return false;
    const {isl, v} = ISLE.pick(cands);
    v._hatten = Math.min(PROMOTE_AT, (v._hatten|0) + 1);
    sparkle(isl, v);
    if(v._hatten >= PROMOTE_AT){
      const last = promoAt.get(isl.id);
      if(last === undefined || performance.now() - last >= PROMO_COOLDOWN){
        promote(isl, v);
        return true;
      }
    }
    injectMeters(); // quiet in-place update, no full panel rebuild
    return true;
  }

  let nextAt = performance.now() + rand(STEP_MIN, STEP_MAX);
  setInterval(() => {
    try{
      const now = performance.now();
      if(now < nextAt) return;
      const did = step();
      nextAt = now + (did ? rand(STEP_MIN, STEP_MAX) : RETRY_EMPTY);
    }catch(err){ console.error(TAG, err); }
  }, 1000);
})();
</script>

<script>
// ════ plugin: matsuri ════ Plugin key "matsuri" (村祭り). Paste verbatim into its own <script> tag after the core script in island-maker/index.html. Integration details: festival scene is
(()=>{ "use strict";
if(!window.ISLE) return;
try{
  const I = window.ISLE;
  const DUR = 20000;          // festival length (ms, wall time)
  const COOLDOWN = 90000;     // per-island manual cooldown
  const AUTO_MIN = 180000, AUTO_SPAN = 120000, AUTO_CHANCE = 0.4;

  const esc = s => String(s).replace(/[&<>"']/g, c =>
    ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

  // ---- corpora -------------------------------------------------------
  const REASONS = [
    "豊漁を祝って","特に理由なく","カレンダーの都合で","名産品の在庫処分を兼ねて",
    "太鼓の試し打ちのつもりが本気になり","隣の村への対抗心から","去年のぶんを思い出したように",
    "風向きがちょうどよかったので","予算を年度内に使い切るため","物置から提灯が出てきたので",
  ];
  const TRADITIONS = [
    "全員が主催者である","雨天決行、晴天順延である","最後に必ず誰かが感極まる",
    "開始の合図を誰も聞いたことがない","終わりの時刻が決まっていない","来賓が毎年カモメである",
    "神輿が年々少しずつ小さくなっている","翌朝にはなぜか片付けが終わっている",
    "太鼓より先に拍手がはじまる","反省会のほうが本祭より長い",
  ];
  const COLORS = ["#c2503e","#2f8f83","#e2b33c","#c97b4a","#f4ecd9","#5b8db1"];

  // ---- style ---------------------------------------------------------
  const style = document.createElement("style");
  style.textContent = `
    .matsuri-btn{display:inline-block;margin:8px 0 0 16px;padding:3px 11px;font-size:11px;
      border-radius:999px;border:1px solid rgba(47,143,131,.45);background:rgba(255,255,255,.65);
      color:#2f8f83;cursor:pointer;font-family:inherit;font-weight:600;letter-spacing:.03em;
      transition:.15s}
    .matsuri-btn:hover{background:rgba(47,143,131,.12);border-color:rgba(47,143,131,.7)}
    .matsuri-btn:active{transform:translateY(1px)}`;
  document.head.appendChild(style);

  // ---- state ---------------------------------------------------------
  const festivals = new Map();   // village object -> fest record
  const cooldownAt = new Map();  // island id -> timestamp of last festival start

  // ---- festival actors -----------------------------------------------
  function spawnRing(f){
    const ring = I.mk("circle",{cx:0, cy:-1, r:6, fill:"none", stroke:"#c2503e",
      "stroke-width":1.4, opacity:.6});
    ring.style.transformBox = "fill-box";
    ring.style.transformOrigin = "50% 50%";
    f.g.append(ring);
    ring.animate([
      {transform:"scale(.35)", opacity:.6},
      {transform:"scale(2.8)", opacity:0}
    ],{duration:900, easing:"ease-out"}).onfinish = () => ring.remove();
  }

  function spawnConfetti(f){
    const n = 2 + (Math.random()*3|0);
    for(let i=0;i<n;i++){
      const d = I.mk("circle",{cx:(Math.random()*18-9).toFixed(1), cy:-8,
        r:(1+Math.random()).toFixed(1), fill:I.pick(COLORS), stroke:"#5d4636", "stroke-width":.3});
      f.g.append(d);
      d.animate([
        {transform:"translate(0,0)", opacity:1},
        {transform:`translate(${(Math.random()*12-6).toFixed(1)}px, ${(-(12+Math.random()*16)).toFixed(1)}px)`, opacity:0}
      ],{duration:700+Math.random()*500, easing:"cubic-bezier(.2,.7,.3,1)"}).onfinish = () => d.remove();
    }
  }

  function buildScene(f){
    const g = f.g, anims = f.anims;
    // two poles + sagging rope above the houses
    g.append(I.mk("line",{x1:-16, y1:0, x2:-16, y2:-20, stroke:"#8a6a4f", "stroke-width":1.2, "stroke-linecap":"round"}));
    g.append(I.mk("line",{x1:16,  y1:0, x2:16,  y2:-22, stroke:"#8a6a4f", "stroke-width":1.2, "stroke-linecap":"round"}));
    g.append(I.mk("path",{d:"M -16 -20 Q 0 -13, 16 -22", stroke:"#5d4636", "stroke-width":.8, fill:"none"}));
    // 3-5 pennants strung along the rope, gently waving
    const nF = 3 + (Math.random()*3|0);
    for(let i=0;i<nF;i++){
      const t = (i+1)/(nF+1), u = 1-t;
      const px = u*u*-16 + t*t*16;                       // quad bezier (ctrl x = 0)
      const py = u*u*-20 + 2*u*t*-13 + t*t*-22;
      const fl = I.mk("polygon",{points:
        `${(px-2.6).toFixed(1)},${py.toFixed(1)} ${(px+2.6).toFixed(1)},${py.toFixed(1)} ${px.toFixed(1)},${(py+6).toFixed(1)}`,
        fill:I.pick(COLORS), stroke:"#5d4636", "stroke-width":.4});
      fl.style.transformBox = "fill-box";
      fl.style.transformOrigin = "50% 0%";
      anims.push(fl.animate([{transform:"rotate(-7deg)"},{transform:"rotate(8deg)"}],
        {duration:800+Math.random()*500, direction:"alternate", iterations:Infinity,
         easing:"ease-in-out", delay:-Math.random()*800}));
      g.append(fl);
    }
    // 2-3 villager dots shuffling back and forth
    const nV = 2 + (Math.random()*2|0);
    for(let i=0;i<nV;i++){
      const c = I.mk("circle",{cx:(Math.random()*14-7).toFixed(1), cy:(2+Math.random()*5).toFixed(1),
        r:1.7, fill:"#3a4a52", opacity:.9});
      anims.push(c.animate([{transform:"translateX(-5px)"},{transform:"translateX(5px)"}],
        {duration:1100+Math.random()*700, direction:"alternate", iterations:Infinity,
         easing:"ease-in-out", delay:-Math.random()*1000}));
      g.append(c);
    }
  }

  // ---- lifecycle -----------------------------------------------------
  function endFestival(f, fast){
    if(f.ended) return;
    f.ended = true;
    cancelAnimationFrame(f.raf);
    for(const a of f.anims){ try{ a.cancel(); }catch(e){} }
    festivals.delete(f.v);
    if(fast){ f.g.remove(); return; }
    try{
      f.g.animate([{opacity:1},{opacity:0}],{duration:600, fill:"forwards"})
        .onfinish = () => f.g.remove();
    }catch(e){ f.g.remove(); }
    // legacy: 30% chance the island legend gains a line
    try{
      if(Math.random() < 0.3 && I.islands.some(s => s.id === f.isl.id)){
        f.isl.legend += `なお、${esc(f.v.name)}の祭りは${I.pick(TRADITIONS)}ことで知られる。`;
        I.refreshPanel();
      }
    }catch(err){ console.error("[matsuri] legacy", err); }
  }

  function startFestival(isl, v){
    try{
      if(!isl || !v || festivals.has(v)) return false;
      if(!I.islands.some(s => s.id === isl.id)) return false;
      const r = isl.size * 0.82;
      const gx = isl.x + Math.cos(v.angle)*r;
      const gy = isl.y + Math.sin(v.angle)*r;
      const g = I.mk("g",{transform:`translate(${gx.toFixed(1)} ${gy.toFixed(1)})`,
        "pointer-events":"none"});
      const f = {isl, v, g, anims:[], raf:0, start:performance.now(),
        nextRing:250, nextConf:550, ended:false};
      buildScene(f);
      I.gFx.append(g);
      f.anims.push(g.animate([{opacity:0},{opacity:1}],{duration:400, fill:"forwards"}));
      festivals.set(v, f);
      cooldownAt.set(isl.id, Date.now());
      const step = now => {
        try{
          if(f.ended) return;
          const el = now - f.start;                  // wall-time driven
          if(el >= DUR){ endFestival(f, false); return; }
          if(el >= f.nextRing){ spawnRing(f);     f.nextRing = el + 950; }
          if(el >= f.nextConf){ spawnConfetti(f); f.nextConf = el + 450 + Math.random()*450; }
          f.raf = requestAnimationFrame(step);
        }catch(err){
          console.error("[matsuri] frame", err);
          try{ endFestival(f, true); }catch(e){}
        }
      };
      f.raf = requestAnimationFrame(step);
      I.toast(`${v.name}で${I.pick(REASONS)}祭りがはじまりました。理由は後付けだそうです`);
      I.emit("matsuri:held", {island: isl, village: v});
      return true;
    }catch(err){ console.error("[matsuri] start", err); return false; }
  }

  // ---- manual trigger (per island card) --------------------------------
  function manual(isl){
    const now = Date.now();
    if(now - (cooldownAt.get(isl.id) || 0) < COOLDOWN){
      I.toast("祭りの準備にはまだ時間がかかります");
      return;
    }
    const free = (isl.villages || []).filter(v => !festivals.has(v));
    if(!free.length){ I.toast("この島はすでに祭りの真っ最中です"); return; }
    startFestival(isl, I.pick(free));
  }

  I.on("panel-rendered", arg => {
    try{
      const container = arg && arg.container;
      if(!container) return;
      for(const card of container.querySelectorAll(".card")){
        if(card.querySelector(".matsuri-btn")) continue;
        const isl = I.islands.find(s => String(s.id) === card.dataset.cid);
        if(!isl) continue;
        const b = document.createElement("button");
        b.type = "button";
        b.className = "matsuri-btn";
        b.textContent = "\u{1F38F} 祭りを開く";
        b.addEventListener("click", e => {
          e.stopPropagation();
          try{ manual(isl); }catch(err){ console.error("[matsuri] manual", err); }
        });
        card.append(b);
      }
    }catch(err){ console.error("[matsuri] panel-rendered", err); }
  });

  // ---- ambient trigger: every 3-5 min, 40% chance ----------------------
  function armAuto(){
    setTimeout(() => {
      try{
        if(Math.random() < AUTO_CHANCE){
          const cand = [];
          for(const isl of I.islands)
            for(const v of isl.villages)
              if(!festivals.has(v)) cand.push({isl, v});
          if(cand.length){ const c = I.pick(cand); startFestival(c.isl, c.v); }
        }
      }catch(err){ console.error("[matsuri] auto", err); }
      armAuto();
    }, AUTO_MIN + Math.random()*AUTO_SPAN);
  }
  armAuto();

  // ---- cleanup ----------------------------------------------------------
  I.on("cleared", () => {
    try{
      for(const f of [...festivals.values()]) endFestival(f, true);
      cooldownAt.clear();
    }catch(err){ console.error("[matsuri] cleared", err); }
  });
  I.on("island-removed", isl => {
    try{
      for(const f of [...festivals.values()])
        if(f.isl.id === isl.id) endFestival(f, true);
    }catch(err){ console.error("[matsuri] island-removed", err); }
  });
}catch(err){ console.error("[matsuri] init", err); }
})();
</script>

<script>
// ════ plugin: renrakusen-ferry ════ 連絡船 (renrakusen) ambient ferry plugin for island-maker/index.html. Paste into its own <script> tag after the core script (after window.ISLE exists). No dock 
(()=>{
"use strict";
if(!window.ISLE) return;
const I = window.ISLE;
const TAG = "[renrakusen]";
try{
  // ---------- style ----------
  const style = document.createElement("style");
  style.textContent = ".renrakusen-ferry{cursor:pointer}";
  document.head.appendChild(style);

  // ---------- in-service announcements (deadpan ferry-company voice) ----------
  const ANNOUNCE = [
    "本日も微妙に揺れます。",
    "お乗り遅れの際は、泳がないようご協力をお願いいたします。",
    "船内での昼寝は推奨されています。",
    "当社の時刻表は、潮の気分により毎日変わります。",
    "カモメへの餌付けはご遠慮ください。カモメが調子に乗ります。",
    "救命胴衣は座席の下にございます。たぶんございます。",
    "本日の欠航はございません。船がもう出てしまったためです。",
    "お忘れ物は大切に保管したのち、当社も大切に忘れます。",
    "景色は右舷も左舷も、おおむね海でございます。",
    "揺れを感じた場合は、揺れたなと思っていただければ結構です。",
  ];

  // ---------- layers (own container inside gFx; wake under boats) ----------
  const layer  = I.mk("g", {class:"renrakusen-layer"});
  const gWake  = I.mk("g");
  const gBoats = I.mk("g");
  gWake.setAttribute("pointer-events", "none");
  layer.append(gWake, gBoats);
  I.gFx.append(layer);

  // ---------- helpers ----------
  const clamp = (v,a,b)=>Math.min(b,Math.max(a,v));
  const smoothstep = t=>t*t*(3-2*t);
  function villaged(){ return I.islands.filter(s=>s && s.villages && s.villages.length); }
  function offshore(isl, v){
    const d = isl.size*0.82 + 30;
    return [isl.x + Math.cos(v.angle)*d, isl.y + Math.sin(v.angle)*d];
  }
  function nearestIsland(x, y, pool){
    let best=null, bd=Infinity;
    for(const s of pool){ const d=Math.hypot(s.x-x, s.y-y); if(d<bd){ bd=d; best=s; } }
    return best;
  }
  function nearestVillage(isl, x, y){
    let best=null, bd=Infinity;
    for(const v of isl.villages){
      const p=offshore(isl, v);
      const d=Math.hypot(p[0]-x, p[1]-y);
      if(d<bd){ bd=d; best=v; }
    }
    return best;
  }
  function smallRipple(x, y){
    try{
      for(let i=0;i<2;i++){
        const c=I.mk("circle",{cx:x, cy:y, r:5, fill:"none", stroke:"#ffffff", "stroke-width":1.3, opacity:.6});
        c.style.transformOrigin = `${x}px ${y}px`;
        gWake.append(c);
        c.animate([
          {transform:"scale(.4)", opacity:.6},
          {transform:`scale(${2+i})`, opacity:0}
        ],{duration:900+i*350, delay:i*140, easing:"ease-out"}).onfinish = ()=>c.remove();
      }
    }catch(err){ console.error(TAG, err); }
  }
  function puff(x, y){
    try{
      const c=I.mk("circle",{cx:x, cy:y, r:1.7, fill:"#f4efe2", opacity:.55});
      c.style.transformOrigin = `${x}px ${y}px`;
      gWake.append(c);
      const dx=(Math.random()-.5)*6;
      c.animate([
        {transform:"translate(0,0) scale(1)", opacity:.55},
        {transform:`translate(${dx}px,-13px) scale(2.6)`, opacity:0}
      ],{duration:2200, easing:"ease-out"}).onfinish = ()=>c.remove();
    }catch(err){ console.error(TAG, err); }
  }
  function spawnWake(f){
    try{
      const h=f.heading;
      const bx=f.x-Math.cos(h)*9, by=f.y-Math.sin(h)*9;
      for(const s of [-1,1]){
        const a=h+Math.PI+s*0.38;
        const ln=I.mk("line",{x1:bx, y1:by, x2:bx+Math.cos(a)*9, y2:by+Math.sin(a)*9,
          stroke:"#ffffff", "stroke-width":1.2, "stroke-linecap":"round", opacity:.5});
        gWake.append(ln);
        ln.animate([{opacity:.5},{opacity:0}],{duration:1500, easing:"linear"}).onfinish = ()=>ln.remove();
      }
    }catch(err){ console.error(TAG, err); }
  }

  // ---------- the boat (side view, ~18px, bow faces +x; flipped when sailing left) ----------
  function buildBoat(){
    const g=I.mk("g",{class:"renrakusen-ferry"});
    const gBob=I.mk("g");
    const gFlip=I.mk("g");
    g.append(gBob); gBob.append(gFlip);
    gFlip.append(I.mk("circle",{cx:0, cy:-2, r:14, fill:"none", "pointer-events":"all"})); // hit area
    gFlip.append(I.mk("line",{x1:-8, y1:-0.5, x2:-8, y2:-8.5, stroke:"#5d4636", "stroke-width":.9}));
    gFlip.append(I.mk("polygon",{points:"-8,-8.5 -3.6,-7.3 -8,-6.1", fill:"#2f8f83"}));
    gFlip.append(I.mk("rect",{x:-4.6, y:-9.6, width:2.6, height:4.4, rx:.6, fill:"#3a4a52"}));
    gFlip.append(I.mk("rect",{x:-4.6, y:-9.6, width:2.6, height:1.5, rx:.6, fill:"#c2503e"}));
    gFlip.append(I.mk("rect",{x:-6.5, y:-6, width:9, height:5.8, rx:1, fill:"#fdfaf1", stroke:"#8a5a35", "stroke-width":.7}));
    gFlip.append(I.mk("circle",{cx:-4.2, cy:-3.1, r:1.1, fill:"#8ecdd6", stroke:"#5b7680", "stroke-width":.4}));
    gFlip.append(I.mk("circle",{cx:-0.8, cy:-3.1, r:1.1, fill:"#8ecdd6", stroke:"#5b7680", "stroke-width":.4}));
    gFlip.append(I.mk("path",{d:"M -9 -0.6 L 9 -0.6 L 6.4 4.6 Q 0 6.6 -6.4 4.6 Z",
      fill:"#c97b4a", stroke:"#8a5a35", "stroke-width":.8, "stroke-linejoin":"round"}));
    return {g, gBob, gFlip};
  }

  // ---------- routing ----------
  const ferries = [];

  function planVoyage(f, now){
    const pool = villaged();
    if(pool.length < 2) return false;
    const src = (f.dockIslandId!=null && pool.find(s=>s.id===f.dockIslandId)) || nearestIsland(f.x, f.y, pool);
    if(!src) return false;
    const others = pool.filter(s=>s.id!==src.id);
    if(!others.length) return false;
    const dst = I.pick(others);
    const fromV = (f.dockVillageName && src.villages.find(v=>v.name===f.dockVillageName))
               || nearestVillage(src, f.x, f.y) || I.pick(src.villages);
    const toV = I.pick(dst.villages);
    if(!fromV || !toV) return false;
    const end = offshore(dst, toV);
    const sx=f.x, sy=f.y, ex=end[0], ey=end[1];
    const dist = Math.hypot(ex-sx, ey-sy) || 1;
    const nx = -(ey-sy)/dist, ny = (ex-sx)/dist;          // perpendicular -> gentle curve
    const bow = dist*(0.12+Math.random()*0.12)*(Math.random()<.5?-1:1);
    f.leg = { sx, sy, cx:(sx+ex)/2+nx*bow, cy:(sy+ey)/2+ny*bow, ex, ey,
      t0:now, dur:clamp(14000+dist*22, 18000, 30000),     // 18-30s, longer for longer crossings
      destId:dst.id, from:fromV.name, to:toV.name, lost:false };
    f.mode = "voyage";
    return true;
  }
  function planCircle(f, now){
    if(!I.islands.length) return false;
    const isl = nearestIsland(f.x, f.y, I.islands);
    if(!isl) return false;
    f.circle = { id:isl.id, r:isl.size+36, a0:Math.atan2(f.y-isl.y, f.x-isl.x),
      t0:now, dir:Math.random()<.5?1:-1 };
    f.mode = "circle";
    return true;
  }
  function replan(f, now){
    try{
      if(planVoyage(f, now)) return;
      if(planCircle(f, now)) return;
      f.mode = "drift";
    }catch(err){ console.error(TAG, err); f.mode="drift"; }
  }

  // ---------- fleet ----------
  function spawnFerry(){
    try{
      const b = buildBoat();
      const f = {
        g:b.g, gBob:b.gBob, gFlip:b.gFlip,
        x:I.W*0.5, y:I.H*0.55,
        heading:Math.random()*Math.PI*2, flip:1,
        phase:Math.random()*Math.PI*2, seed:Math.random()*1000,
        mode:"drift", leg:null, circle:null,
        dockIslandId:null, dockVillageName:null,
        dockedUntil:0, pendingEmit:null,
        nextSmoke:performance.now()+1500+Math.random()*2000,
        nextWake:0, retiring:false,
      };
      f.g.addEventListener("pointerdown", e=>{
        try{
          if(e.button!==0) return;
          e.preventDefault();                              // never raise an island under the ferry
          I.toast(`船内放送「${I.pick(ANNOUNCE)}」`);
        }catch(err){ console.error(TAG, err); }
      });
      const pool = villaged();
      if(pool.length){                                     // depart from just offshore of a real village
        const src=I.pick(pool), v=I.pick(src.villages);
        const p=offshore(src, v);
        f.x=p[0]; f.y=p[1];
        f.dockIslandId=src.id; f.dockVillageName=v.name;
      }
      f.g.setAttribute("transform", `translate(${f.x} ${f.y})`);
      gBoats.append(f.g);
      try{ f.g.animate([{opacity:0},{opacity:1}],{duration:700, easing:"ease-out"}); }catch(e){}
      smallRipple(f.x, f.y);
      ferries.push(f);
      replan(f, performance.now());
    }catch(err){ console.error(TAG, err); }
  }
  function despawn(f){
    const idx = ferries.indexOf(f);
    if(idx>=0) ferries.splice(idx, 1);
    smallRipple(f.x, f.y);
    try{
      f.g.animate([{opacity:1},{opacity:0}],{duration:600, easing:"ease-out"}).onfinish = ()=>f.g.remove();
    }catch(e){ f.g.remove(); }
  }
  function manageFleet(){
    const n = I.islands.length;
    if(!ferries.length) spawnFerry();                      // flagship always sails
    if(n>=4 && ferries.length<2) spawnFerry();             // second ferry at >=4 islands
    if(n<2){ for(let i=1;i<ferries.length;i++) ferries[i].retiring=true; }
    else   { for(const f of ferries) f.retiring=false; }
  }

  // ---------- per-frame update (positions derive from elapsed wall time) ----------
  function updateFerry(f, now, dt){
    if(f.retiring && f.mode!=="voyage" && f.mode!=="docked"){ despawn(f); return; }
    const ox=f.x, oy=f.y;

    if(f.mode==="voyage"){
      const leg=f.leg;
      const k=clamp((now-leg.t0)/leg.dur, 0, 1);
      const u=smoothstep(k), w=1-u;
      f.x = w*w*leg.sx + 2*w*u*leg.cx + u*u*leg.ex;
      f.y = w*w*leg.sy + 2*w*u*leg.cy + u*u*leg.ey;
      if(k>=1){
        f.leg=null;
        if(leg.lost){                                      // destination sank mid-voyage: leg ended in open water
          f.dockIslandId=null; f.dockVillageName=null;
          replan(f, now);
        }else{
          smallRipple(f.x, f.y);
          f.mode="docked";
          f.dockedUntil=now+2000;
          f.pendingEmit={from:leg.from, to:leg.to};
          f.dockIslandId=leg.destId; f.dockVillageName=leg.to;
        }
      }
    }
    else if(f.mode==="docked"){
      if(now>=f.dockedUntil){
        if(f.pendingEmit){
          const p=f.pendingEmit; f.pendingEmit=null;
          try{ I.emit("ferry:voyage", p); }catch(err){ console.error(TAG, err); }
        }
        if(f.retiring){ despawn(f); return; }
        replan(f, now);
      }
    }
    else if(f.mode==="circle"){                            // sightseeing lap around the lone island
      const isl=I.islands.find(s=>s.id===f.circle.id);
      if(!isl || villaged().length>=2){ replan(f, now); }
      else{
        const a=f.circle.a0 + f.circle.dir*(now-f.circle.t0)*(Math.PI*2/42000);
        const tx=isl.x+Math.cos(a)*f.circle.r, ty=isl.y+Math.sin(a)*f.circle.r;
        const kk=1-Math.exp(-dt*0.002);
        f.x+=(tx-f.x)*kk; f.y+=(ty-f.y)*kk;
      }
    }
    else{                                                  // drift idly near center until land appears
      if(I.islands.length){ replan(f, now); }
      else{
        const tx=I.W/2 + Math.sin(now*0.00021+f.seed)*Math.min(90, I.W*0.1);
        const ty=I.H/2 + Math.sin(now*0.00015+f.seed*1.7)*Math.min(60, I.H*0.08);
        const kk=1-Math.exp(-dt*0.0009);
        f.x+=(tx-f.x)*kk; f.y+=(ty-f.y)*kk;
      }
    }

    // heading / flip / wake
    const dx=f.x-ox, dy=f.y-oy;
    const sp=Math.hypot(dx, dy)/Math.max(dt, 1)*1000;
    if(sp>1 && (dx||dy)) f.heading=Math.atan2(dy, dx);
    if(Math.abs(dx)>0.02) f.flip = dx<0 ? -1 : 1;
    if(sp>7 && now>=f.nextWake){
      f.nextWake=now+150+Math.random()*80;
      spawnWake(f);
    }

    // bobbing + transforms
    const bob=Math.sin(now*0.0027+f.phase)*1.3;
    const wob=Math.sin(now*0.0018+f.phase)*3;
    f.g.setAttribute("transform", `translate(${f.x.toFixed(1)} ${f.y.toFixed(1)})`);
    f.gBob.setAttribute("transform", `translate(0 ${bob.toFixed(2)}) rotate(${wob.toFixed(2)})`);
    f.gFlip.setAttribute("transform", `scale(${f.flip} 1)`);

    // chimney puffs
    if(now>=f.nextSmoke){
      f.nextSmoke=now+2600+Math.random()*2000;
      puff(f.x - f.flip*3.3, f.y - 10 + bob);
    }
  }

  // ---------- events ----------
  I.on("island-removed", isl=>{
    try{
      for(const f of ferries){
        if(f.leg && f.leg.destId===isl.id) f.leg.lost=true;   // finish leg toward open water, then re-route
        if(f.dockIslandId===isl.id){ f.dockIslandId=null; f.dockVillageName=null; }
      }
    }catch(err){ console.error(TAG, err); }
  });

  // ---------- main loop ----------
  let last = performance.now();
  function loop(){
    try{
      const now = performance.now();
      const dt = Math.min(now-last, 5000);
      last = now;
      manageFleet();
      for(let i=ferries.length-1;i>=0;i--) updateFerry(ferries[i], now, dt);
    }catch(err){ console.error(TAG, err); }
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
}catch(err){ console.error(TAG, err); }
})();
</script>

<script>
// ════ plugin: sea-life ════ Paste into its own <script> tag after the core script in island-maker/index.html. No dock button, no panel injection — purely ambient. All motion is driven b
(() => {
  "use strict";
  if (!window.ISLE) return;
  const I = window.ISLE;
  const PFX = "sealife";
  const TAU = Math.PI * 2;
  const rnd = (a, b) => a + Math.random() * (b - a);
  const clamp01 = v => v < 0 ? 0 : v > 1 ? 1 : v;
  const esc = s => String(s).replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));

  // ---- whale greeting corpus (deadpan) ----
  const GREET = [
    "目が合いました。クジラは会釈をしました",
    "目が合いました。クジラは何も言いませんでした",
    "クジラは軽くうなずき、回遊業務に戻りました",
    "目が合いました。先に目をそらしたのはあなたです",
    "クジラはあなたを認知しました。手続きは以上です",
  ];

  // ---- shapes (local coords, waterline = y0, facing +x) ----
  const BACK_D  = "M -32 10 C -32 -4 -20 -16 -2 -17 C 12 -17 24 -11 30 -1 C 32 3 33 7 33 10 Z";
  const FIN_D   = "M -4 -15 C -2 -23 4 -26 9 -24 C 4 -21 1 -18 0 -13 Z";
  const FLUKE_D = "M 0 14 C -1 5 -4 -3 -16 -12 C -9 -7 -5 -2 -4 5 C -2 2 2 2 4 5 C 5 -2 9 -7 16 -12 C 4 -3 1 5 0 14 Z";
  const BIRD_D  = "M -4.8 -2.4 Q -2.4 1.4 0 -1.2 Q 2.4 1.4 4.8 -2.4";
  const BODY_FILL = "#41606f", BODY_EDGE = "#2e4754";

  try {
    const st = document.createElement("style");
    st.textContent = `.${PFX}-hit{cursor:pointer}`;
    document.head.append(st);
    const cp = I.mk("clipPath", { id: PFX + "-clip" });
    cp.append(I.mk("rect", { x: -130, y: -140, width: 260, height: 140 })); // keeps only what is above the waterline
    I.defs.append(cp);
  } catch (e) { console.error("[sealife init]", e); }

  // ================= one-shot fx (WAAPI, same pattern as host rippleAt) =================
  function ripple(x, y, s) {
    try {
      const el = I.mk("ellipse", { cx: x, cy: y, rx: s, ry: s * .38, fill: "none", stroke: "#fff", "stroke-width": 1.5, opacity: .7, "pointer-events": "none" });
      el.style.transformOrigin = `${x}px ${y}px`;
      I.gFx.append(el);
      el.animate([{ transform: "scale(.4)", opacity: .75 }, { transform: "scale(2.4)", opacity: 0 }],
        { duration: 1300, easing: "ease-out" }).onfinish = () => el.remove();
    } catch (e) { console.error("[sealife ripple]", e); }
  }
  function splash(x, y, n) {
    try {
      for (let i = 0; i < n; i++) {
        const c = I.mk("circle", { cx: x, cy: y, r: rnd(1, 2.3), fill: "#fff", opacity: .9, "pointer-events": "none" });
        I.gFx.append(c);
        const dx = rnd(-14, 14), up = rnd(8, 20);
        c.animate([
          { transform: "translate(0,0)", opacity: .95 },
          { transform: `translate(${(dx * .7).toFixed(1)}px,${-up}px)`, opacity: .8, offset: .45 },
          { transform: `translate(${dx.toFixed(1)}px,${rnd(2, 6).toFixed(1)}px)`, opacity: 0 }
        ], { duration: rnd(550, 900), easing: "ease-out" }).onfinish = () => c.remove();
      }
    } catch (e) { console.error("[sealife splash]", e); }
  }
  function spout(x, y, dirx) {
    try {
      const g = I.mk("g", { "pointer-events": "none" });
      for (let i = 0; i < 4; i++) {
        const a = (-90 + (i - 1.5) * 24) * Math.PI / 180, L = rnd(7, 11);
        g.append(I.mk("line", { x1: x, y1: y, x2: x + Math.cos(a) * L, y2: y + Math.sin(a) * L, stroke: "#fff", "stroke-width": 1.5, "stroke-linecap": "round" }));
      }
      g.style.transformOrigin = `${x}px ${y}px`;
      I.gFx.append(g);
      g.animate([{ transform: "scale(.25)", opacity: 0 }, { transform: "scale(1)", opacity: .9, offset: .35 }, { transform: "scale(1.15)", opacity: 0 }],
        { duration: 900, easing: "ease-out" }).onfinish = () => g.remove();
      const m = I.mk("circle", { cx: x, cy: y - 7, r: 5, fill: "#fff", opacity: 0, "pointer-events": "none" });
      m.style.transformOrigin = `${x}px ${y - 7}px`;
      I.gFx.append(m);
      m.animate([
        { transform: "translate(0px,0px) scale(.4)", opacity: 0 },
        { opacity: .5, offset: .25 },
        { transform: `translate(${(-dirx * 8).toFixed(1)}px,-15px) scale(1.9)`, opacity: 0 }
      ], { duration: 2300, easing: "ease-out" }).onfinish = () => m.remove();
    } catch (e) { console.error("[sealife spout]", e); }
  }

  // ================= actor loop (elapsed wall time) =================
  const actors = new Set();
  function addActor(a) { actors.add(a); }
  function tick() {
    const now = performance.now();
    for (const a of Array.from(actors)) {
      let alive = false;
      try { alive = a.update(now); }
      catch (err) { console.error("[sealife actor]", err); if (a.fail) { try { a.fail(); } catch (_) { } } }
      if (!alive) { try { a.el.remove(); } catch (_) { } actors.delete(a); }
    }
    try { schedule(now); } catch (err) { console.error("[sealife schedule]", err); }
    requestAnimationFrame(tick);
  }

  // ================= whale =================
  let whaleBusy = false;
  function findLane() {
    const W = I.W, H = I.H;
    let best = null;
    for (let k = 0; k < 26; k++) {
      const dir = Math.random() < .5 ? 1 : -1;
      const y0 = H * rnd(.16, .84);
      const y1 = Math.min(H * .9, Math.max(H * .12, y0 + rnd(-.12, .12) * H));
      const x0 = dir > 0 ? -70 : W + 70, x1 = dir > 0 ? W + 70 : -70;
      let clear = 1e9;
      for (let s = 0; s <= 14; s++) {
        const t = s / 14, px = x0 + (x1 - x0) * t, py = y0 + (y1 - y0) * t;
        for (const o of I.islands) clear = Math.min(clear, Math.hypot(o.x - px, o.y - py) - o.size * 1.45);
      }
      if (!best || clear > best.clear) best = { x0, y0, x1, y1, clear };
    }
    return best;
  }

  function startWhale(t0) {
    try {
      whaleBusy = true;
      const lane = findLane();
      const dx = lane.x1 - lane.x0, dy = lane.y1 - lane.y0;
      const len = Math.hypot(dx, dy), ux = dx / len, uy = dy / len;
      const mir = ux >= 0 ? 1 : -1;                                  // mirror instead of rotate(180): keeps the hump upright
      const tilt = Math.atan2(mir * dy, mir * dx) * 180 / Math.PI;
      const DUR = 20000, WIN = .17;                                  // each breach ~3.4s
      const nB = Math.random() < .5 ? 2 : 3;
      const centers = [];
      for (let i = 0; i < nB; i++) centers.push(.14 + (i + .5) * (.58 / nB) + rnd(-.015, .015));
      const fStart = centers[nB - 1] + WIN / 2 + .015, fWin = .15;   // fluke after the last breach
      const endP = fStart + fWin + .02;

      const root = I.mk("g", { "pointer-events": "none" });
      const clipG = I.mk("g", { "clip-path": `url(#${PFX}-clip)` });
      const back = I.mk("g");
      back.append(
        I.mk("path", { d: BACK_D, fill: BODY_FILL, stroke: BODY_EDGE, "stroke-width": 1, "stroke-linejoin": "round" }),
        I.mk("path", { d: FIN_D, fill: BODY_FILL, stroke: BODY_EDGE, "stroke-width": .8 })
      );
      const hit = I.mk("ellipse", { cx: 0, cy: -9, rx: 46, ry: 26, fill: "transparent", "pointer-events": "none", class: PFX + "-hit" });
      back.append(hit);
      const fluke = I.mk("g", { opacity: 0 });
      fluke.append(I.mk("path", { d: FLUKE_D, fill: BODY_FILL, stroke: BODY_EDGE, "stroke-width": 1, "stroke-linejoin": "round" }));
      clipG.append(back, fluke);
      root.append(clipG);
      I.gFx.append(root);

      let greeted = false, curYOff = 30, hitOn = false;
      hit.addEventListener("pointerdown", e => {
        try {
          if (e.button !== 0 || curYOff > 8) return;   // only while the back is actually up
          e.preventDefault();                          // no island under the whale, please
          if (!greeted) { greeted = true; I.toast(I.pick(GREET)); }
        } catch (err) { console.error("[sealife whale-click]", err); }
      });

      const flags = centers.map(() => ({ up: false, spout: false, down: false }));
      const fl = { up: false, end: false };

      addActor({
        el: root,
        fail() { whaleBusy = false; },
        update(now) {
          const p = (now - t0) / DUR;
          if (p >= endP) { whaleBusy = false; return false; }
          const px = lane.x0 + dx * p, py = lane.y0 + dy * p;
          root.setAttribute("transform", `translate(${px.toFixed(1)} ${py.toFixed(1)}) rotate(${tilt.toFixed(1)}) scale(${mir} 1)`);
          let yOff = 30, act = -1, q = 0;
          for (let i = 0; i < nB; i++) {
            const s = centers[i] - WIN / 2;
            if (p >= s && p <= s + WIN) { act = i; q = (p - s) / WIN; yOff = 26 - 30 * Math.sin(Math.PI * q); break; }
          }
          curYOff = yOff;
          back.setAttribute("transform", `translate(0 ${yOff.toFixed(1)})`);
          const on = yOff < 8;
          if (on !== hitOn) { hitOn = on; hit.setAttribute("pointer-events", on ? "all" : "none"); }
          if (act >= 0) {
            const f = flags[act];
            if (!f.up && q > .1) {
              f.up = true; splash(px, py, 5); ripple(px, py, 15);
              if (act === 0) { I.toast("クジラです"); I.emit("sealife:whale"); }
            }
            if (act === 0 && !f.spout && q > .44) { f.spout = true; spout(px + ux * 10, py + uy * 10 - 17, ux); }
            if (!f.down && q > .87) { f.down = true; splash(px, py, 4); ripple(px, py, 12); }
          }
          const fp = (p - fStart) / fWin;
          if (fp >= 0 && fp < 1) {
            fluke.setAttribute("opacity", 1);
            let fy;
            if (fp < .38) fy = 30 - 32 * Math.sin((fp / .38) * Math.PI / 2);      // rise
            else if (fp < .58) fy = -2;                                           // hold
            else fy = -2 + 34 * (1 - Math.cos(((fp - .58) / .42) * Math.PI / 2)); // slip under
            fluke.setAttribute("transform", `translate(-30 ${fy.toFixed(1)}) rotate(${(-9 + fp * 20).toFixed(1)})`);
            const fx = px - ux * 30, fyW = py - uy * 30;
            if (!fl.up && fp > .05) { fl.up = true; splash(fx, fyW, 4); ripple(fx, fyW, 13); }
            if (!fl.end && fp > .9) { fl.end = true; ripple(fx, fyW, 16); }
          } else if (fp >= 1) fluke.setAttribute("opacity", 0);
          return true;
        }
      });
    } catch (e) { whaleBusy = false; console.error("[sealife whale]", e); }
  }

  // ================= seabirds =================
  let birdsBusy = false;
  function startBirds(t0) {
    try {
      birdsBusy = true;
      const W = I.W, H = I.H;
      let ax, ay;
      if (I.islands.length && Math.random() < .8) {
        const o = I.pick(I.islands);
        ax = o.x; ay = Math.max(60, o.y - o.size - 30);  // bias: pass over an island
      } else { ax = W * rnd(.2, .8); ay = H * rnd(.18, .6); }
      const dir = Math.random() < .5 ? 1 : -1, s = rnd(-.22, .22);
      const ux = dir * Math.cos(s), uy = Math.sin(s);
      const L = Math.hypot(W, H) * .62;
      const x0 = ax - ux * L, y0 = ay - uy * L;
      const DUR = 12000;
      const n = 3 + (Math.random() * 4 | 0);
      const px_ = -uy, py_ = ux;
      const g = I.mk("g", { "pointer-events": "none", opacity: .85 });
      const birds = [];
      for (let i = 0; i < n; i++) {
        const row = Math.ceil(i / 2), side = (i % 2) ? 1 : -1;       // loose V behind the leader
        const b = I.mk("path", { d: BIRD_D, stroke: "#33555f", "stroke-width": 1.5, fill: "none", "stroke-linecap": "round" });
        g.append(b);
        birds.push({ el: b, back: row * 16 + rnd(-3, 3), lat: i === 0 ? 0 : side * (row * 10 + rnd(-2, 2)), s: rnd(1, 1.5), ph: rnd(0, TAU), fw: rnd(6, 9) });
      }
      I.gFx.append(g);
      addActor({
        el: g,
        fail() { birdsBusy = false; },
        update(now) {
          const t = (now - t0) / DUR;
          if (t >= 1) { birdsBusy = false; return false; }
          const cx = x0 + ux * 2 * L * t, cy = y0 + uy * 2 * L * t, ts = (now - t0) / 1000;
          for (const b of birds) {
            const bx = cx - ux * b.back + px_ * b.lat;
            const by = cy - uy * b.back + py_ * b.lat + Math.sin(ts * 2.1 + b.ph) * 2.6;  // bobbing
            const flap = .55 + .55 * Math.sin(ts * b.fw + b.ph);
            b.el.setAttribute("transform", `translate(${bx.toFixed(1)} ${by.toFixed(1)}) scale(${b.s.toFixed(2)} ${(b.s * flap).toFixed(2)})`);
          }
          return true;
        }
      });
    } catch (e) { birdsBusy = false; console.error("[sealife birds]", e); }
  }

  // ================= fish shadows =================
  let fishBusy = false;
  function startFish(t0) {
    try {
      if (!I.islands.length) return;
      fishBusy = true;
      const o = I.pick(I.islands);
      const ox = o.x, oy = o.y, r = o.size * rnd(1.18, 1.36);        // the shallow ring sits at ~1.22
      const th0 = rnd(0, TAU), dd = (Math.random() < .5 ? -1 : 1) * rnd(.9, 1.6);
      const DUR = 10000;
      const n = 8 + (Math.random() * 7 | 0);
      const g = I.mk("g", { "pointer-events": "none", opacity: 0 });
      const fish = [];
      for (let i = 0; i < n; i++) {
        const e = I.mk("ellipse", { rx: rnd(2.6, 3.8), ry: rnd(1, 1.5), fill: "#173039" });
        g.append(e);
        fish.push({ el: e, al: rnd(-16, 16), lat: rnd(-7, 7), ph: rnd(0, TAU), wf: rnd(6, 10) });
      }
      I.gFx.append(g);
      addActor({
        el: g,
        fail() { fishBusy = false; },
        update(now) {
          const t = (now - t0) / DUR;
          if (t >= 1) { fishBusy = false; return false; }
          g.setAttribute("opacity", (.18 * clamp01(Math.min(t / .12, (1 - t) / .16, 1))).toFixed(3));
          const th = th0 + dd * t;
          const cx = ox + Math.cos(th) * r, cy = oy + Math.sin(th) * r;
          const hd = th + (dd > 0 ? Math.PI / 2 : -Math.PI / 2);
          const hx = Math.cos(hd), hy = Math.sin(hd), ts = (now - t0) / 1000;
          for (const f of fish) {
            const w = f.lat + Math.sin(ts * f.wf + f.ph) * 1.8;      // wiggle
            const x = cx + hx * f.al - hy * w, y = cy + hy * f.al + hx * w;
            f.el.setAttribute("transform", `translate(${x.toFixed(1)} ${y.toFixed(1)}) rotate(${(hd * 180 / Math.PI).toFixed(1)})`);
          }
          return true;
        }
      });
    } catch (e) { fishBusy = false; console.error("[sealife fish]", e); }
  }

  // ================= scheduler =================
  const boot = performance.now();
  let tW = boot + rnd(50000, 90000);     // first whale a touch early, then every 2-4 min
  let tB = boot + rnd(15000, 35000);
  let tF = boot + rnd(20000, 40000);
  function schedule(now) {
    if (now >= tW) { tW = now + rnd(120000, 240000); if (!whaleBusy) startWhale(now); }
    if (now >= tB) { tB = now + rnd(60000, 100000); if (!birdsBusy) startBirds(now); }
    if (now >= tF) { tF = now + rnd(40000, 52000); if (!fishBusy && I.islands.length && Math.random() < .5) startFish(now); }
  }

  requestAnimationFrame(tick);
})();
</script>
